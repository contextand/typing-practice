<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>글방</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;800;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: #fff;
    font-family: 'Noto Sans KR', sans-serif;
    overflow: hidden;
  }
  .geulbang-layout {
    display: flex;
    width: 100vw;
    height: 100vh;
    box-shadow: inset 0 0 0 1px #1a1a1a;
  }
  .geulbang-col {
    flex: 1;
    position: relative;
    padding: 44px;
    overflow: hidden;
  }
  .geulbang-col + .geulbang-col {
    border-left: 1px solid #1a1a1a;
  }
  .geulbang-quote {
    font-size: 30px;
    font-weight: 300;
    color: #222;
    line-height: 2;
    word-break: keep-all;
    white-space: pre-wrap;
  }
  .geulbang-footnote {
    position: absolute;
    bottom: 44px;
    left: 44px;
    right: 44px;
    font-size: 15px;
    font-weight: 300;
    color: #222;
    line-height: 2;
  }
  .geulbang-textarea {
    width: 100%;
    height: 100%;
    resize: none;
    border: none;
    outline: none;
    background: transparent;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 20px;
    font-weight: 800;
    color: #1a1a1a;
    line-height: 2;
  }
  .geulbang-textarea::placeholder { color: #ddd; }
</style>
</head>
<body>
<div class="geulbang-layout">
  <div class="geulbang-col">
    <div class="geulbang-quote" id="geulbangQuote"></div>
    <div class="geulbang-footnote">발췌한 문장 중 좋은 것을 한 번 더 발췌한 문장들입니다.<br>출처는 기록하지 못했습니다.</div>
  </div>
  <div class="geulbang-col">
    <textarea class="geulbang-textarea" placeholder="초안 쓰세요" autocomplete="off" spellcheck="false"></textarea>
  </div>
  <div class="geulbang-col">
    <textarea class="geulbang-textarea" placeholder="퇴고 하세요" autocomplete="off" spellcheck="false"></textarea>
  </div>
</div>

. 내가 받은 일은 반드시 기록하고, 해결하고, 공유하자.", "내 업무의 맥락은 내가 가장 잘 알아야 한다.", "질문할 땐 의도도 함께 말하자. 서로를 시험하지 말고 빠르게 커뮤니케이션 하자.", "말이 바뀌어야 한다. 언어가 전부다. 아이의 행동을 바꾸고 싶으면 쉽고 정확한 사랑의 언어를 써야 한다. 회화는 실천이고 실전이다.", "소모적인 대화말고 그 상황에 필요한 말만 하라.", "하고 싶은 일에는 방법이 보이고 하기 싫은 일에는 핑계가 보인다.", "작은 변화를 미리 감지하는 사람, 더 크게 확장하여 느끼는 사람들이 책을 읽고 글을 쓴다.", "내가 내 것을 지키자고, 남을 다치게 했다. 나는 정당한데, 정당함이 죄책감을 지워주진 못했다.", "이 일을 이제 하고 싶지 않다기 보다는 이 일을 건강하게 잘하고 싶다는 마음", "조금 비참한 게 영혼에는 좋아요", "효과적으로 일하는 사람들은 '계획'이 아닌 '시간'에서 출발한다. 어떤 일을 할 때 절대적으로 모자라고, 대체제가 없으며, 모든 것에 소요되는 자원은 시간이다.", "개는 왜 사람 따위를 이토록 사랑하는 걸까? 개의 중심은 제 안에 있지 않고 자기가 바라보는 사람 안에 있는 것 같다.", "그를 제대로 아는 게 존중이 아니라 그가 나를 제대로 알도록 해주는 게 존중이라는 것을 최근에 깨달았다.", "사람을 먼저 챙기면 일은 전부 다 잘 풀리게 돼있어", "내가 하는 일의 가장 첫번째 고객은 함께 일하는 사람들이다.", "회의가 막힐 때 1) 용어 정의 2) 맥락 3) 히든 인터레스트", "프로는 회복력이 있는 아마추어", "우리의 현재 상황과 화해할지 결정하는 것은 결과가 아닌 태도다.", "할 수 있어서 하는 게 아니고, 해봤는데 할 수 있었다 라는 결론", "작가란 오늘 아침 글을 쓴 사람이다.", "바쁜 건 나쁘다. 정말 그렇게 생각한다. 시간의 여유가 없으면 마음의 여유도 없으니까", "좋은 표준을 만들려면 끊임없이 자기 생각을 의심하고 조사하고 확인해야 해요. 성실성이 없으면 불가능하죠.", "뭐 하는 곳인지 한 번에 잡혀야죠. 이어서 어떤 근본으로 자랐는지 (히스토리) 함께 할 수 있는 건 뭔지 (체험) 디테일이 꼬리를 물고 죽죽 나와야 해요.", "내가 나로 사는 것이 왜 누군가에겐 상처일까요?", "좋아하는 일을 오래 하려면, 조금 덜 좋아하는 마음이 필요하다.", "옛날은 가는 게 아니고 이렇게 자꾸 오는 것이었다.", "다정함은 자세다. 뭔가 필요하다고 생각할 때 '내가 도와줄게'라고 몸으로 말하는 것", "시간이 지나도 내 마음이 편한 쪽을 선택해요.", "자기가 행복해지는 순간을 잘 알고 그 시간을 만들기 위해 애쓰는 사람", "파는 일이라고 생각하면 내 상품에 집중하게 되지만, 사게 하는 일이라고 생각하면 소비자의 상황에 집중하게 됩니다.", "상대방이 왜 그런 피드백을 했는지 문장 뒤의 의미를 생각해봅니다. 피드백은 결론보다 이유가 핵심입니다.", "같은 일을 같은 곳에서 같은 시간 같은 마음으로", "소중한 건 꿈이 아니라 매일의 생활", "고객의 지시 때문이 아니라 내 눈에 보이기 때문에 전력을 다한다.", "가장 큰 리스크는 클라이언트의 기대를 파악하지 못하는 것. 추구하는 건 클라이언트의 기대를 넘어서는 것.", "내 의견을 관철하는 건 중요하지 않아요. 우리의 해결책이 나아지는 것이 더 중요합니다.", "사람은 나를 믿어주는 사람을 믿어요. 나를 좋아하는 사람은 어쩐지 나도 좋아하게 되잖아요. 함께 일하는 사람을 저는 좋아합니다. 좋아하는 것까지 일이라고 생각해요.", "뭐가 됐든 '일단 해본다'는 노선", "누구보다도 그것에 대해 많이 생각할 것, 누구보다도 그것을 더 많이 좋아할 것", "형식만 남고 마음이 사라지면 고생일 뿐", "어찌되었건 피곤하면 열심히 산거야", "중요한 건 내 편을 만드는 거지. 나를 믿지 않고 인정하지 않는 사람들의 마음을 바꾸려 애쓰는 게 아니라는 것. 언제나 오직 나를 위해 사랑하는 사람들을 믿고 앞으로 나아가야 한다는 것.", "내가 나로 사는 것이 왜 누군가에겐 상처일까요?", "결정했으면 설명할 수 있어야 한다.", "오늘도 모두가 치사량까진 아닌 밤을 넘기고 있습니다. 견딜 만큼은 불행해도 괜찮나봐.", "당신이 매일 하는 일을 바꾸기 전까지는 당신의 삶에는 그 어떤 변화도 생기지 않을 겁니다.", "NOW OR NEVER", "하루 5분만 집 안 어딘가를 청소하면 깨끗한 집에서 살 수 있다.", "인생이란게 원래 엉터리야. 알겠냐?", "마음에 없는 말을 찾으려고 허리까지 다녀왔다.", "커뮤니케이션은 아름답지 않다. 같은 것을 반복해서 말하는 시간을 아까워 말자.", "모든 생각을 하나로 모아주는 능력이 밤에 있다.", "큰 질문이나 주제를 찾고 그것을 계속 지니고 살아가는 게 삶을 살아가는 한가지 방법으로 유효할 것", "모방하고 싶은 대상이 있는 순간은 그렇지 않은 순간보다 덜 밋밋하니까. 무언가를 따라하는 순간에는 애씀 없이 그 무언가를 하게 된다.", "YOU DO YOU I'LL DO ME", "중요한 건, 실망하지 않는 거", "업무 커뮤니케이션의 원칙, 상대방의 시간을 덜 뺏는 방식을 택할 것", "우리 삶에 생존만 있는 게 아니라 사치와 허영과 아름다움이 깃드는 게 좋았다.", "친절은 마인드의 문제가 아니라 몸의 문제다.", "말을 많이 한 날에는 책을 더 열심히 읽는다.", "당신은 잘하고 있다고 전부터 말해주고 싶었어요. 삶을 대하는 태도가 참 멋있다고.", "분위기 있는 사람과 탄탄한 브랜딩을 가진 회사", "온 힘을 다해 일하면 자기 주위의 풍경이 변한다.", "모든 사물에 대해 냉정함을 유지하는 태도", "다정한 것이 살아남는다.", "무엇을 해야 하는지 분명하게 전달한다면 상대는 행동하기를 두려워하지 않는다.", "스스로를 비난하지 않고 계속 걸어가는 법", "우리는 서로의 진심을 모른다. 태도로 읽을 뿐", "상황을 통제하는 우아함", "비가 오면 손가락을 벌려요. 그 사이로 비가 지나가게", "서로의 존재를 확인하는 꾸준한 가시성", "운동은 나를 버티는 일이자 몰랐던 나를 발견하는 일", "면접은 유도와 같다. 처음엔 영문도 모른채 필사적이라 주변이 보이지 않지만 익숙해지면 보인다. 상대방의 마음의 움직임. 숨결", "실패란 했다는 것의 증거, 실패가 쌓이면 그게 경력", "정신력이 강하면 만성질환에 걸린다.", "실패가 무슨 뜻인지 아니? 다시 한 번 하라는 거야.", "'나는 무엇인가'가 아닌 '어떻게 움직이고 어떻게 멈출 것인가'에 집중한다.", "진심으로 성장하고 싶은 신인은 똑바로 응시하지, 그런 녀석은 반드시 성장해", "다수가 마침표를 찍고 멈춰있을 때 그는 그 위에 갈고리를 걸어 물음표를 만든다.", "오늘은 그냥 오늘이야", "기억은 기록이 아니라 해석이니까. 엄청나게 많은 메모를 했지만 활용하진 못했다. 제대로 된 체계가 있어야 한다.", "수평으로 함께 잠겨보려고", "결코 절망하지 않을 나의 친구들과 가족들에게", "우리에게 무슨 일이 있고, 또 있었더라도 우린 앞으로 잘 달릴 수 있다.", "필연적으로 비거니즘은 실패와 용서의 장르", "무엇이 우리를 인간으로 만드는 가 말이 우리를 인간으로 만든다. 목소리나 소리가 아니고 뜻을 이해하고자 시도하고 어떤 생각이나 감정을 전달하고자 애쓰는 언어로서의 말. 기억과 의미를 주고 받는 대화로서의 말. 애써 말하는 것이 사랑의 조건이라면 그 말을 애써 듣는 것 역시 사랑의 조건이라고 생각했다.", "어떤 상황에서도 결코 가난해질 수 없는 풍요로운 마음", "품위있고 건강하며 유능하고 재미있는 사람", "오늘도 일을 하며 배운다. 일 자체를 배우며, 일 바깥세상의 흐름도 알게 된다. 나를 견디고 다루는 법을 익히는 한편으로 다른 이들을 존중하는 법을 배운다. 동료들과 부딪치고 협력하는 동안 내 안에만 고여 있지 않고 변화한다. 일 하는 사람으로 살기에 조금씩 나아질 기회를 얻는다고 나는 믿는다.", "업무는 일을 마칠 때가 아니라 내가 한 일을 알릴 때 끝나는 거였다. 널리 알릴수록 비슷한 일의 기회를 물고 오는 게 일의 속성이기 때문이다.", "취향보다는 행위가 그 사람에 대해 말해준다고 믿게 된다. 행동이 그 주체에 대해 들려주는 이야기에 흥미를 느낀다. 무엇을 좋아하는가 보다는 매일 무엇을 하며 살아가는가 말이다.", "때론 나의 주장보다 중요한 것은 사람들의 수용이다.", "오른 손이 하는 일을 왼손이 꾸준히 기록해야 한다. 기록하는 왼손의 모습조차 기록되어야 한다.", "타자에 눈 뜨고 거듭 깨어나는 삶", "그럼에도 불구하고,\n그들에게 구멍을 빠져나올 수 있는 용기를 주고 싶었다.\n그들이 덜 외로울 수 있도록 돕고 싶었다.\n그들에게 괜찮다고 말하고 싶었다.\n그들에게 다정해지고 싶었다.", "아무리 작은 일이라도 매일 해내면 불안감이 사라진다.", "누군가의 마음을 사로잡기 위해 할 수 있는 가장 쉬운 연습은 '내 마음이 사로잡혔던 순간'을 찾는 게 아닐까요.", "매일 기록하는 사람은 하루도 자신을 잊지 않습니다.", "불교의 법은 모든 것이 나로부터 나아가 나에게로 돌아온다고 믿는다.", "우리는 자기만의 성공을 정의해야 한다. 추상적으로 그저 행복하게 살고 싶다고 말하는 것은 도움이 되지 않는다. 가능한 한 구체적이고, 명확하게 성공을 정의해야 한다. 어떤 일을 할 때 내가 가장 행복한지, 어떻게 살아야 내 삶의 의미를 찾을 수 있을지, 어떤 것을 통해 내가 이 사회에서 제 역할을 할 수 있을지 등 내가 근본적으로 어떤 사람이고, 어떤 이상을 가진 사람인지를 먼저 고민해야 한다. 그래야 성공에 가까워 질 수 있다.", "함께 일하는 서로를 대하는 방식이 일의 전부다.", "고요하고 담담하게 문제의 한복판을 지나갈 줄 알아야 한다. 상대를 넘어뜨리려고 생각하는 순간, 내 자신의 마음도 더러워지기 때문이다.", "좋은 질문을 가진 사람, 좋은 대화를 나눌 수 있는 동료", "상투적이라서 해로운 말", "뭔가가 누군가가 즉시 싫고 밉고 무서울 때 나는 그것이 어느 정도로 상상된 것인지 혐오는 아닌지를 생각한다.", "그만두지 않고 엉성하게 같이 했으면 좋겠어요.", "어떻게든 소비자가 '여기서 내 얘기를 하고 있구나, 내 고민을 말하고 있구나'하고 느끼게 해야 한다.", "혐오는 우리 모두 안에 있다. 외적 혹은 내적 법으로 적절히 막아내지 못한다면 자신도 모르게 그 순간 약자를 찾아 난폭성을 발휘한다.", "문장을 써. 문장, 이라고 쓰지 말고 문장을 써. 그게 내가 하고 싶은 일이니까.", "잘 만들고 싶어 하면 잘 만드는 사람이 되어 있을 줄 알았는데, 그냥 안 만드는 사람이 되어 있더라.", "누구의 잘못도 아니라고 말하는 사람은 믿음이 안 간다.", "세상에 지지 않는 방법은 나 스스로 작다고 생각하지 않는 것", "사람이 가장 절대적인 권력을 갖는 건 다른 사람들의 시선으로 부터 자유로워질 때", "남들의 평가보다 자신의 노력에 더 높은 점수를 주는 사람.", "좋아하는 것을 이야기하는 사람이 좋아 보인다.", "눈 앞에 보이는 것들을 하나씩 하다보면 방향이 생겨", "어떤 말도 허투루 뱉지 않는, 잠시라도 무기력과 혼란에 빠져 삶을 낭비하지 않을 것 같은 태도", "오래 고통에 단련된 사람들이 특유하게 갖는 침통한 침착성", "오래 혼자 있으면 혼자말을 하게 된다.", "해내야죠. 어려울 건 없습니다.", "보고 싶은 것만 보고 좁게 살아간다. 비밀 첩보원 처럼, 들키지 않으려고", "나는 아주아주 행복한 사람으로 죽을거야. 아무도 그걸 못 막을 거야.", "마음의 긴장도", "나에게 주어진 맥락과 상황속에서 할 수 있는 일을 탐색하고 실천합니다.", "모든 질문은 유효하고 반드시 누군가에게는 도움이 됩니다.", "상대방과 내가 동의하는 곳에서부터 이야기를 시작할 것. 수많은 근거보다는 적은 수의 강력한 근거를 제시할 것. 강력하게 주장하는 것이 아니라 진심을 다해 질문할 것.", "조심하는 마음", "요즘 사람들은 행복할 여유는 없어서 일단 상처받지 않는 걸 목표로 한다.", "아이는 죽는다. 어떻게 해도.. 하지만 우리는 덜 죽는 방법을 알고 있다. 쉽게 완벽을 이야기하는 게 아니라 포기하지 않는 게 중요하다.", "내일을 위해 오늘을 희생하지 않는다.", "인
