 관심을 기울이며 행동한다. 우리는 왜 이렇게 오래, 열심히 일할까? 우리는 왜 일하지 않는 상태를 임시적인 것으로 여기거나, 돈을 벌 만큼 번 '파이어족'만 달성 가능한 것으로 생각하거나, 일터로 복귀하기 위한 충전의 시간으로만 여겨 왔을까/ 모든 사람이 '모두의 더 적게 일하는 삶'을 함께 지향한다면 세상은 완전히 달라질 것이다.", "보는 사람이 존재하기 때문에 하게 되는 노동이 바로 '가짜 노동이다. '할 일을 다 마친 사람은 자유롭게 시간을 보내도 된다'는 합의가 이루어져 있고 '타인이 일을 얼마나 하는지는 신경 쓸 필요가 없다'는 분위기가 자리 잡은 조직이 아닌 이상, 가짜 노동은 수시로 이루어질 수밖에 없다. PC 메신저 창을 투명하게 만드는 기능, 보고 있던 사이트 창을 빠르게 바꾸는 프로그램이 있다는 건 많은 사람이 때때로 일하는 퍼포먼스를 하고 있다는 뜻일 테다. 그리고 때로는, 내가 나의 관중이 되기도 한다. 이 일 저 일을 끊임없이 수행하면서 나는 바쁜 사람임을 나 자신에게 증명하려 애쓴다. 조직 바깥에서 혼자 일하는 장점 가운데 하나는 가짜 노동을 하는 시간이 줄었다는 것이다. 오늘 하기로 한 일을 전부 끝내면 미련 없이 책상 앞을 떠난다. 퍼포먼스하지 않아도 될 자유를 내게 준다.", "커뮤니케이션 방식에 대한 노하우를 나누는 자리에서 '아이디어를 설득하는 데에도 전략이 필요하다'는 이야기를 들었다. 누군가는 일부러 상사에게 더 많이, 자주 업무 상황을 공유하고 의견을 받는다고 했다. 저마다 머릿속에 있는 생각이 다르기 때문에 남을 설득하기 어려운 거라면, 내 머릿속에 있는 생각을 타인과 어느 정도 미리 동기화해 놓는 과정이 필요한 것이다. 자주 대화하고, 서로의 아이디어를 경청하고, 거기에 의견을 보태고, 이 아이디어를 함께 더 낫게 만들었음을 인정하기. '전략'이라고 표현했지만 어떤 면에서는 같이 일하는 사람들 간의 '돌봄'이라고 할 수 있을 것 같다.", "일 이야기를 열심히 하다 보면 좀 머쓱해진다. 일하지 않고도 돈 버는 방법이 도처에 널린 시대에, 일이 뭐라고 이렇게 떠들고 있을까. 진짜 돈을 많이 번 사람들은 이미 노동에서 손을 떼 버린 게 아닐까, 불로소득으로 부를 쌓는 데 실패한 사람들만 일 잘하는 방법이 뭔지 헛된 토론을 하고 있는 건 아닐까 하는 망상이 들기도 한다. 몇 년 치 연봉을 모아도 서울에서 집 한 채를 살 수 없다는데, 성실하고 유능한 노동자가 되어야 한다는 전통적인 노동윤리를 담은 메시지는 과연 어떻게 사람들을 설득할 수 있을까. 아니, 설득할 수 없기 때문에 어느 순간부터는 일에서 의미를 찾아야 한다는 메시지가 널리 퍼진 건 아닐까. 주식과 부동산 투자에 비해 돈도 별로 안 되는데 의미마저 없다면, 누가 일을 계속하려고 하겠는가 말이다.", "겉으로는 같은 이름표가 붙은 일을 하더라도 모든 사람이 그 일을 똑같은 방식으로 하지는 않으며, 그래서 우리 모두에게는 무엇으로도 대체될 수 없는 고유하고 특별한 노하우가 있다는 사실을 믿는다. 전문성이라는 게 눈에 보이는 자격증이나 수치화할 수 있는 기술만이 아니라는 사실을 더 많은 사람이 알았으면 좋겠다.", "폴더링, 즉 폴더별로 정리를 잘한다는 건 무엇인가? 그건 단순히 정리정돈에 능하다는 뜻이 아니다. 무엇과 무엇을 어떤 키워드로 묶어야 하는지, 어떻게 정리해야 나중에 효율적으로 찾아 쓸 수 있는지 제대로 파악하고 있다는 뜻이다. 나는 폴더링을 잘하는 사람은 일도 잘할 확률이 높다는 편견을 품고 있는데, 근거가 아주 없진 않은 것 같다.", "도움이 필요하다고 말할 수 있다는 건 최소한 내가 어떤 부분에서 부족하다는 걸 알고 있다는 의미이자 다른 사람들을 신뢰한다는 신호이기도 하다. 혼자인 나는 모르는 것, 할 수 없는 것이 많다. 타인의 손길이 나를, 내 일을 더 낫게 만든다.", "마감을 지킨다는 건 내가 지금은 이 정도라는 사실을 인정하는 것, 내가 할 수 없는 부분은 포기하는 연습을 하는 것이다. 내가 생각하기에 부족한 결과물을 세상에 내보여도 큰일이 벌어지지 않는다는 사실을, 다음 마감에 조금 더 나아지기 위해서는 무엇이 필요한지를 배우는 과정일지도 모른다. 나 자신의 빈틈과 모자람을 견디는 훈련인 셈이다.", "썩 내키지 않는데도 타율에 의해 해야 하는 일을 되도록 하지 않으며 살고 싶다. 일 때문에 다른 즐거움을 접어 둬야 하는 삶이 아니면 좋겠다. 이윤과 생산성을 중심으로 삼고 싶지는 않다. 무엇보다 경제적 자유를 얻어 가능해질 '나중의' 삶을 위해 지금을 희생하는 방식으로 살고 싶지는 않다. 이제 나는 무엇이 되고 싶은지 생각하지 않는다. 다양한 일을 거쳐 보았기 때문일 수도, 웬만큼 경력이 쌓였기 때문일 수도 있다. 어떻게 살고 싶은지 고민하는 게 무엇이 되고 싶은지 고민하는 것보다 어렵지만 중요하다는 걸, 늦게라도 알게 돼서 다행이다.", "모두에게는 언제든 어떤 사정이든 생길 수 있고, 모두가 그 사실을 조직 안에서 죄책감 없이 공유할 수 있어야 하며, 그럴 때 조직은 일하는 방식을, 원칙을, 시스템을 바꿀 수도 있어야 한다. 일은 일이고 삶은 삶이라고, 개인의 사정이 가급적 업무에 영향을 끼쳐서는 안 된다는 생각에 나는 반대한다. 일은 그 정도로 가치 있지도 않고, 삶과 깨끗하게 분리될 수도 없다.", "많은 사람이 일은 일이다, 따라서 일터에서는 일에 관한 이야기만 나눠야 한다고 말한다. 일터에서 사적인 이야기, 갈등이 생길 수밖에 없는 이야기는 알아서 꺼내지 말아야 한다는 것이다. 그런데 다들 부동산, 골프, 주식 얘기는 쉽게 나눈다. 이건 동료들을 불편하게 만들지 않는 주제인가? 돈과 그 돈으로 즐길 수 있는 비싼 스포츠에 관한 이야기는 누구나 환영하는 걸까? 앞의 주제는 괜찮지만, 노동권과 선거와 페미니즘 등은 왜 일터의 대화 주제가 될 수 없는지 잘 납득되지 않는다. 일터는 한 사람의 생활과 분리되는 공간이 아니다. 일을 비롯한 우리 삶의 모든 면면은 정치와 뗄려야 뗄 수 없다. 평소의 일터에서 정치사회적 대화를 자연스럽게 나눌 수 있어야, 일터에 변화가 필요할 때 일하는 사람들이 제대로 목소리를 낼 수 있을 것이다. 일터에서는 일만 해야 한다는 생각은 틀렸다. 그건 일하는 모두를 각자 외롭게 만드는 지름길이다.", "일은 누구도 혼자 해낼 수 없다. 여러 사람의 힘을 합칠 때라야 제대로 완수할 수 있다. 일과 일, 사람과 사람 사이를 단단하게 이어 붙이는 게 다정함과 친절함 같은 태도라면 여기에 훨씬 더 높은 가치를 부여해야 하지 않을까. 게다가 그건 어떤 사람이 선천적으로 지닌 본성이 아니라, 부단히 노력하여 발휘할 수 있게 된 전문적인 역량으로 이해해야 할 것이다. 바쁘게 돌아가는 일터에서 부러 마음과 에너지를 쓰는 건 누구에게나 쉽지 않다.", "무례한 사람을 만나면 저 사람 대체 왜 저러나 싶지만, '다 사정이 있겠지'라고 생각하면 대체로 유하게 넘길 수 있다. 그래, 일정이 빡빡한 거겠지. 그래, 상사에게 진행 상황을 얼른 보고해야겠지. 상대가 하루를 망치지 않도록, 그가 '이번 주 일 좀 잘 풀리는데?'라는 기쁨을 느낄 수 있도록 호흡을 맞춰 주는 것도 나쁘지 않다. 누군가는 나에게 그런 친절을 베풀고 있을지도 모르니까.", "내가 하는 일에 대한 '평가'가 수반된다는 점이 피드백을 더더욱 꺼리게 만든다. 피드백을 스스로 요청하는 행위에는 용기가 필요하다. 대신 전략도 있어야 한다. 이 일에 대한 전체적이고 두루뭉술한 피드백을 부탁하기보다, 어떤 부분에 대한 피드백을 어느 정도선으로 받고 싶은지 미리 밝히는 편이 좋다. 피드백하는 사람도 거기에 맞춰 피드백을 할 수 있어서 덜 부담스럽고, 피드백을 받는 사람 또한 좀 더 집중적인 개선이 필요한 부분에 대한 의견을 받을 수 있어 효율적이다. 내가 하는 일이 아니기 때문에 던질 수 있는 무책임한 피드백도, 피드백을 요청하고도 방어적인 태도를 갖게 되는 결과도 방지할 수 있다.", "그가 고유한 방식으로 일하고 움직이는 모습을 보는 것만으로도 덩달아 기분이 좋아졌다. 누군가 하는 일이 그의 몸에 새겨지고, 일과 사람이 하나가 되어 특정한 리듬을 만들어 내기도 한다는 것이 신비로웠다.", "'나'는 어떤 흐름과 접근법으로 일을 기획하는지 한 번쯤 정리해 볼 필요가 있다. 우리가 저마다 지닌 기획법은 어떤 일을 하든 우리의 핵심 역량이 될 것이다.", "\"회의록 작성은 회의 자료를 미리 준비할 수 있는 사람이 맡아야 해요. 조직 내 막내가 아니라요.\" 언젠가 커뮤니티의 한 멤버가 이렇게 말했다. 회의가 업무에 대한 모두의 이해 수준을 비슷하게 맞추고 누가 무엇을 할지 결정하는 시간이라면, 회의록은 그것을 가능하게 만드는 효율적인 기록물이 되어야 한다. 회의 맥락을 제대로 파악하기 힘든 저연차 직원이 회의록을 작성하거나, 이전 내용을 검색하기 어려운 방식으로 회의록을 작성한다면 모든 직원에게 정보가 골고루 흐르지 못할 것이다. 그동안 '다들 그렇게 하니까' 관성적으로 했던 일이 얼마나 많았을까. 그 일이 어떤 맥락에 있는지, 무엇 때문에 그 일을 '그렇게' 해야 하는지 고민할 필요가 있다.", "현재 대부분의 일자리는 질병과 장애가 없는, 하루에 9시간을 꼬박 일할 수 있는, 그리고 어쩌면 집에서 돌봄 노동을 해 줄 이가 있는 노동자를 상정한다. 이 기준이 얼마나 허구이며 환상인지는 몸이 아프거나, 주변 누군가를 집중적으로 돌봐야 하는 상황에 처하면 바로 알게 된다. 사람들은 대체로 자신의 체력과 상황이 변하지 않을 거라고, 지금과 비슷한 생산성을 유지하며 일할 수 있을 거라고 생각하는 경향이 있다. 삶은 언제나 불확실하고 상황은 언제든 변할 수 있기에 질병도, 장애도, 돌봄 대상도 없는 상태에서의 노동을 기준 삼아서는 안 되는데도 말이다."]}, {"title": "자매일기", "author": "박소영, 박수영", "genre": "에세이", "publisher": "무제", "passages": ["이렇게 말하면 조금 과하게 들릴지도 모르지만 언제부턴가 내 몫의 무언가를 '내어놓는' 행위에 거부감 비슷한 것을 품게 됐다. 아침에 눈을 떠서부터 밤에 잠들 때까지 나는 무언가를 끊임없이 방출하거나 소모하고 있으니까. 내 머릿속 지도에서는 내가 가는 모든 곳이 텅 비어지고 오염된다. 우리 삶은 그렇게 착취 혹은 황폐화라는 방식으로 이 행성과 연결된다. 나는 되도록 작게 존재하고 싶다. 있는 듯 없는 듯 조용히 살다가 조용히 저물고 싶다. 최소한의 흔적만을 남기면서. 존재론적 미니멀리즘을 추구하면서. ​", "간절하게 지키고 싶은 것이 있는 사람이 늘 약자다. ​", "내 힘듦보다 중요한 것은 도움이 필요한 동물이 제때 도움을 받게 하는 것이므로, 정말 필요할 때 목소리를 내고자 되도록 말을 아끼기로 했다. '동물 구호 활동을 하는 사람은 대체로 피곤하니 가까이하지 않는 편이 좋다'는 인상을 주거나 '나는 그런 일에 발을 담그지 말아야지'하고 단념하게 만드는 일 역시 우리로서는 막을 필요가 있었다. ​", "그러니까 나는 낯설게 하기에 성공해야 한다는 것. 그런데 낯설게 하기는 나를 위한 것도, 독자를 위한 것도 아니고, 오로지 세계의 갱신을 위한 것이어야 한다는 것. 모든 글이 이 세계를 위해, 세계의 변화를 위해 쓰여야 한다는 것. ​", "회사 근처 미술관에서 열린 미디어아트전을 보러 간 날의 이야기다. 최신 기술로 파도를 재현해 놓은 전시였는데, 입구에 들어서자마자 묘한 기분에 사로잡혔다. 디지털 기술로 만든 물결은 색과 파형이 진짜 파도에 가까워서 잠시 다른 생각을 하면 이곳을 바다라고 착각할 수도 있을 것 같았다. 수영은 지금 같은 시대에 예술이 말해야 하는 것은 '어디에서나 바다를 만날 수 있다'가 아니라 '바다는 바다에 가야만 볼 수 있다'가 되어야 한다고 단호하게 말했다. 그러니까 진짜 바다를 대체할 수 있는 것은 지구상 어디에도 없다는 것, 그러므로 좋은 예술 작품이라면 바다를 지키기 위해 지금 이 순간 할 수 있는 일을 해야 한다는 것을 일깨워야 한다고. 나아가 언제라도 바다를 만날 수 있도록 서울 한가운데에 바다를 재현해놓는 것은 그래서 윤리적이지 않다고 덧붙였다. 그날 내가 위로받았음을, 명백한 위안이 거기 존재했다는 사실을 부인할 수 없지만 수영의 말은 무거운 진실에 가까웠다. ​", "음악을 사랑한다고 느끼면서도 어느시점부터는 내 마음을 거기에 온전히 의탁할 수 없게 되었다. 음악이 본질적으로 위로와 맞닿아 있다는, 그 위로가 곧 다시 안주나 망각과 이어진다는 생각 때문이었다. 위로를 받은 사람은 자기 안을 추스르고 홀연히 다음을 향해 나아간다. 위로가 있어야 했던 처음의 이유는 잊은 채. 바깥은 달라지지 않았으나 이제 그의 안이 달라졌으므로. 그러니까 음악은 듣는 이의 마음을 달래고 어루만짐으로써 이전과 같은 방식으로 계속 살아가도록 하는 원동력인 셈이다. ​", "무언가를 사진 찍는 것이 대상을 어떤 식으로든 고정시켜 소유하려는 행위라면, 그 기저에는 보고 싶다는 욕망이 깔려 있을 것이다. 무언가를 보려는 의자가 있을 때 인간은 그 의지를 어떤 식으로든 실현하기 위해 수단과 방법을 가리지 않는다. 먼 거리를 이동함으로써 공간의 제약을 뛰어넘고, 전에 없던 도구를 발명해냄으로써 목표를 달성한다. 나는 인간의 이런 면이 위대한 동시에 징글징글하다고 느낀다."]}, {"title": "작업자의 사전", "author": "구구, 서해인", "genre": "사회정치", "publisher": "유유히", "passages": ["\"마감이 있다\"는 말은 객관적인 사실을 이야기하는 것뿐인데, 왜 누군가에겐 감정을 추동하는 말이 되는걸까? 질문을 던지다보니, '마감이 있는 사람'은 곧 '수요가 있는 사람'이라는 뜻을 내포하고 있기도 하더라고요. 이렇게 우리가 관성적으로, 일상적으로 사용하는 단어가 시장에서 나의 가치를 드러내는 말이 되기도 하고, 사회 규범을 나타내기도 한다는 점이 흥미로워서 '작업자'의 말을 정리할 필요를 느꼈던 것 같아요.", "저마다의 '일'의 형태가 다른데도 일을 늘 같은 단어로 설명하고 있는 것에 대한 의문으로 이어졌어요. 우리는 왜 다른 작업에 대해서 같은 단어로 설명할까? 내가 작업에 관련한 어떤 단어를 이야기할 때, 상대방도 내가 의도한 의미와 같은 의미로 받아들일까?", "일에 있어서 경험이 중요한 이유는 일을 잘 하기 위해서이기도 하지만, '일을 할 수 있음(없음)'을 가늠하기 위해서 인 것 같아요. '할 수 있음(없음)'을 가늠하는 일이 곧 작업물의 퀄리티나 삶의 질에 중대한 영향을 미치기도 하고요.", "메일을 잘 쓰는 게 사회가 요구하는 일잘러의 첫 번째 조건이기 때문에 작업자들은 거절 메일조차 정중하고 능력 있게 보이도록 쓴다. 훗날을 도모하기 위함이라고 해도 이는 분명 가성비의 관점에서 효율이 떨어지는 일인데, 누구 하나 메일을 쓰는 행위 자체에 비용을 책정하지 않기 때문이다.", "회의 참가자들이 같은 곳에서 같은 이야기를 공유했다는 믿음은 실제로 작업을 실행할 때 보란 듯이 부서지곤 하므로, 미팅에서 논의된 사항은 사소한 것이라도 문서의 형태로 남기는 편이 좋다.", "현대인이 SNS로 인해 집중력을 잃었다고 이야기하는 자들은 SNS를 생계를 위한 주요 수단으로 활용하지 않는 경우가 많다. 그들은 경제적, 사회적 자본을 이미 갖고 있기 때문에 SNS가 아니더라도 의미 있는 인맥을 형성할 수 있고, 갖은 의뢰와 제안 속에 파묻힐 수 있다.", "완성도와 관련한 좋은 핑계거리. 작업자는 '초안'이라는 단어를 붙임으로써 해당 작업물이 현 단계에서 완성되지 않은 작업이라고 정당화하며 이를 통해 안도감을 얻는다. 초안에 대한 정의는 각자가 다른데, 일반적으로 초안은 무한한 잠재력을 가진 원고로 여겨지는 경우가 많고, 이 때문에 클라이언트는 초안을 토대로 다양한 의견을 제시한다. 이때 작업자는 클라이언트의 의견을 반영하는 과정에서 사실 초안이 자신이 할 수 있는 (거의) 최대치였다는 사실을 깨닫기도 한다.", "사람들이 '좋다'고 말하는 예술 작품 또는 상품들은 권력, 돈, 명예를 가진 자들이 적극적으로 발견하고 향유한다는 점에서 그들에 의해 구체화된 층위가 반영된 결과물이다.", "개인과 집단이 공유하는 모수 자체가 줄어들다 보니, 타인의 목록은 올해 내가 놓친 콘텐츠를 발견하는 장이 된다.", "덕업일치 - 방구석 덕후를 자본의 충실한 노예로 만들기 위한 자본주의의 교모한 기술. 애당초 덕과 업은 일치하는 것이 아니라 한쪽이 다른 한쪽으로 전환될 뿐이다.", "명명백백히 뒷광고가 아니라고 말할 수 있는 '우리와 이해관계가 전혀 없는 익명의 누군가'가 바이럴이라는 물꼬를 터주는 일은 작업자의 연대기에 자리할 거대한 사건이다. 이 사건은 누군가가 자발적으로 홍보를 하고 싶을 만큼 우리가 하고 있는 일이 매력적이라는 확신, 그동안 우리가 완전히 헛다리를 짚고 있던 건 아니라는 자기 긍정으로 이어진다.", "때로는 '널 좋아해'라는 감상적인 고백보다 '넌 쓸만해'라는 노동 시장에서의 냉정한 판단이 더 위로되는 시기를 지나가게 된다. 나의 쓰임을 증명하는 하루가 수당이 되고, 끝이 보이지 않던 한 달이 모여 월 급여가 된다. 그러다 보면 이벤트처럼 연봉협상 일이 다가온다. 물가 상승률을 실눈으로 바라보고 있는 듯한 조직은, 직원에게 매해 '희망 연봉'을 의례적으로 묻지만, 그 희망을 충족시켜 주지 않는다. 그럴 거면 그냥 '절망 연봉'이라고 하자.", "종종 성장은 아주 오래전에 쏘아버린 화살이 삶이라는 과녁에 꽂히듯 매일을 착실하게 살아내는 와중에 찾아오기도 한다. 강박을 버리고 매일을 그저 쌓아가는 것. 그것이야말로 작업자들이 잊지 말아야 할 성장의 제 1조건이다.", "타깃 - 개인을 상품의 개별 단위로 이해하는 자본주의의 특성을 노골적으로 드러내는 대표적인 용어. 이로부터 파생된 '타깃팅'도 자주 쓰인다. 자본주의는 인간 군상을 인간적으로 이해하는 시도를 인문학적 호기심의 영역으로 밀어내고, 그 자리를 인간성이 사라진 합리적인 상품들로 채운다. 화살에 꽂힌 인간은 피 대신 돈을 토하며 시장의 논리에 충실히 복무할 뿐이다.", "'그냥' 하는 게 가능한 사람의 곁엔 대신 생각하고, 대신 문제를 해결해 줄 조력자가 있다. 1인 작업자가 생각하지 않은 채로 작업에 돌입할 수 있는 경우는 돈이든 사람이든 '조력'이 존재하는 경우뿐이다. 1인 작업자는 작업뿐 아니라 자기 삶에 대해 끊임없이 고민하고, 결정하고, 실행하며, 실패 또한 온전히 감수해야 하므로 애초에 그냥 한다는 것은 판타지인 셈이다."]}, {"title": "재능을 돈으로 바꿀 수 있을까", "author": "엄주", "genre": "에세이, 예술", "publisher": "위즈덤하우스", "passages": ["엄주 작가의 그림을 오래 좋아한 팬으로서 왕성한 생산성에 늘 감탄해왔다. 클라이언트가 되어 작업을 부탁해본 적도 있다. 체계적인 의뢰서 시스템을 만들어두고 효율적으로 소통해 납품하는 방식에 놀랐다. 과정은 쾌적했고 일정은 정확했으며 결과물은 만족스러웠다. 그는 의뢰받지도 않은 그림을 엄청나게 그려내면서도 13년간 마감을 한 번도 어기지 않았다고 한다. 어떻게 이런 게 가능할까? 내 취향의 예술가가 동시에 능숙한 자영업자라니? 책을 읽으며 의문이 해소되었다. 지속 가능한 창작의 길에 대한 모색과 실험, 좋아하고 잘하는 일을 돈 되는 일로도 만들고자 치열하게 거쳐온 훈련과 시도를 본다. 또 사랑을 본다. 그림을 그려 돈을 벌다가 지쳐 쉴 때 또 그림을 그리고, 남의 그림을 보러 다니며 에너지를 채우는 지독한 사랑. 그리고 동료 프리랜서로서 위로받는다. 다 괜찮아질 거라고 장및빛 빈말로 퉁치는 긍정이 아니라 어려움을 겪고 해결해본 사람의 신랄과 담담에서 오는 정확한 위로다. 모든 분야의 창작자, 재능을 어떻게 직접으로 연결할 수 있을까 고민하는 사람, 일보다 돈 문제로 고통받는 프리랜서들에게 특히 추천한다. - 황선우 ​", "행복한 행위에 가늠할 수 있는 다른 형태의 가치가 붙으면 행위 자체의 가치가 한정된다. 아이러니하지 않은가. 가치가 붙는 순간부터 다른 의미의 가치가 없어진다는 것이다. 가장 큰 가치는 돈으로 환산할 수 없는 가치지만, 그런 마음가짐으로는 먹고살 수가 없다. 그렇다면 나의 그림을 어느 정도 가치 있게 봐주는 이에게 내가 만족할 만큼의 값어치로 파는 일은 맞는 경우인지 따져보자면 그것도 쉽지 않다. 내 작업의 가치를 나도 사실 잘 모르기 때문이다. 셈하기 어려운 가치를 만들어내면서 돈을 벌고자 하는 것이 어찌나 어리석었던지, 나는 10여 년 동안 매일 후회했다. 다른 마음이 필요했다. 장사꾼의 마음 같은 것이. 다음 달의 카드값을 갚기 위해 자식 같은 작업물을 팔아 저려오는 가슴을 진정시키며 흥정을 시작했다. \"이렇게는 힘듭니다.\" \"그건 할 수 있습니다.\" \"그건 좀 더 값을 쳐주셔야 합니다.\" 이런 식의 이야기들로 아주 조금씩 내 값을 올려야 했다. 돈과 가장 먼 대척점에 있어야 할 것 같은 사람이 돈 이야기를 가장 많이 해야 한다. 하나하나 놓치지 않고 계약서상의 불공평한 부분을 찾아내서 수정 요청을 해야 한다. 허허실실 웃는 얼굴로 그림을 그려서는 제값에 팔 수가 없다. 원하는 바를 제시하는 사람들을 앞에 두고, 자영업자의 마음으로 가격과 일정을 맞춰드린다. ​", "나는 나의 노동을 지키기 위해 체계를 만들었다. 거창한 것은 아니고 '의뢰서'를 만들어 서로의 책임을 확인하고 약속을 지키기 위해 노력하자는 것이다. 나의 작업에 비용을 지불하는 사람들의 예산과 기간이 중요하듯, 작업을 위한 나의 고민과 노동도 동등하게 존중받아야 한다고 생각했다. 모든 프로젝트가 예정된 마감일에 맞춰 안전하게 완료되지 않을 수도 있으니, 만약 작업이 중단되면 그 기간까지의 노동에 대한 비용을 정산받을 수 있도록 설정해두었다. 그리고 작업의 사용 방식과 기간을 정해 가격을 산정하려고 노력했다. 생활 속의 달인들을 소개하는 방송 프로그램을 보면 그들의 노동이 예술의 경지에 올랐다는 표현이 자주 나온다. 반면 예술가의 노동이 예술의 경지에 올랐다는 말은 무언가 받아들이기 어색한 지점이 있다. 예술작품을 만들어내는 사람의 노동은 예술의 경지에 오르지 못하는 것일까? 그런 창작을 위한 행위가 노동으로 인정만 되어도 다행이라는 생각을 한다. 노동과 예술 사이에서 오늘도 분투하는 사람들의 안전을 기원하며 글을 마친다. ​", "경험으로 살펴볼 때, 프리랜서가 활동하기에 한국은 수월한 곳이 아니다. '빨리 빨리'의 민족답게 일정이 급박한 경우가 많고 업무의 체계도 없고 위계로 사람을 압박하는 경우도 많은 편이라, 정규직원도 일하기 좋은 환경이 아닌 상황에서 외주 작가(외부 용역)는 그야말로 꿔다 놓은 보릿자루 신세가 될 때가 많다. 안타깝지만 내가 챙길 수 있는 것을 먼저 나서서 적극적으로 찾아야만 그나마 본전이라도 챙길 수 있다. 늘 은근하게 깔려 있는 불안을 해소하려면 의뢰서를 통해 사전 정보를 최대한 많이 확보하고, 계약서를 신경 써서 작성하여 미래에 일어날 불상사를 막는 수밖에 없다. 의뢰받은 일의 법적인 검토와 그것에 드는 비용까지 온전히 혼자 감당해야 하는 것이 프리랜서이기에, 스스로를 보호할 수 있는 장치는 되도록 일을 시작하기 전에 마련해두기를 추천한다. ​", "보통은 업체가 제시한 표준 계약서를 사용하지만 몇 가지 빼먹지 않고 포함시키는 조항이 있다. - 정산날짜 - 자체 보상 규정 - 제3자 판매 금지 (양도 금지) - 계약서에 없는 부분은 협의 후에 진행할 것 - 수정 횟수 제한 외뢰보다 무게감이 좀 더 가벼운 원고 요청에도 꼭 계약서를 쓴다. - 의뢰 업체 정보 - 작업자 정보 - 의뢰 내용 - 작업물 인도 기한 - 정산 기한 - 추후 법적인 문제는 상호 합의를 통해 하도록 한다. ​", "끝이 좋지 않을 의뢰인이 될 가능성의 신호를 몇가지 살펴보겠다. - 내 이름을 안 쓰거나 틀리게 적었다. - 프로젝트 설명이 장황하나 요점이 없어 분명하게 보이는 내용이 없다. - 작업 일정이 터무니없이 짧다. - 작업 단가를 미리 제시하지 않고, 내가 정해서 말하도록 유도한다. - 작업물 받는 일정만 챙기고 정산 날짜는 말하지 않는다. - 양도 계약서를 선호한다. - 예산이 터무니없이 적다. ​", "모든 파일명을 날짜와 클라이언트, 작업명, 작업자명으로 정리를 해두면 좋다. 여러 외주작업자와 일을 하는 담당자 입장에서도 찾기 편할뿐더러, 최후의 급박한 상황에서는 나에게 제일 도움이 된다. ​", "프리랜서는 누구보다 규칙적으로 살아야 한다. 아무리 규칙으로 정해두어도 강제성이 없어서 거의 집착하다시피 규칙을 사수하려고 애써야 한다. 왜냐하면 건강과 시간이 곧 돈이기 때문이다. 그리고 돈은 곧 내 일상을 지탱해주는 기본 요소이기도 하다. 그러나 불안한 마음에 돈을 좇아 일을 많이 받으면, 결국 과부하가 와서 부족한 시간을 붙잡고 마감만 하다가 건강을 해치게 된다. ​", "경력이 아무리 오래되어도 어떤 방식으로 일하는지 모르는 담당자와 일을 시작하는 것은 늘 부담스럽다. 특히나 창작물을 주고받는 성격의 일은 소통의 방식에 따라 잘 풀릴 수도 있고 쉬운 길을 두고 더 힘든 길을 가게 되는 수도 있는데, 정말 슬프게도 이 모든 것은 담당자에게 달려 있다. ​", "우선 메일 앞에서는 언제나 제가 가장 좋았던 부분을 먼저 말합니다. 그게 작업자에 대한 존중의 의미이기도 하고, 편집자가 상상했던 것보다 더 효과적으로 이미지를 구현해준 삽화가분들을 향한 경탄이기도 합니다. 그 과정에서 삽화가분들도 작업 방향을 설정하는 데 더 수월해 하시는 것 같더라고요. 그리고 수정 요청을 할 때는 꼭 근거를 말하고 전달하는 편입니다. 원하는 방향에 맞는 문제 해결 방안도 함께 제시하고요. 가장 신경 쓰는 부분은 수정 횟수를 줄이는 것이에요. 첫 번째 시안이 입수되면 내부 관계자들에게 무조건 공유해서 작업 방향을 확인합니다. 중간에 다른 의견이 나와서 일이 틀어지지 않게 하기 위해서요. 그때의 피드백은 제 선에서 정리하는 편이고요. 인상 평가가 주된 경우가 많기도 하고, 그 내용을 다 전달하다가는 삽화가분들도 힘들고 저도 힘드니까요. - 서해문집 이현정 편집자 ​", "우선 의뢰서가 있으면 좋은 점은 작가가 원하는 조건을 미리 알 수 있다는 것입니다. 항목이 정리되어 있어서 접근성이 좋기도 하고 기본적인 신뢰도도 올라갑니다. 편집자 입장에서는 외주를 맡기는 작가에 대해 알지 못하니 불안한 지점이 많아요. 그런 부분을 해소하고 신뢰를 주는 방식이라 좋았습니다. 아무래도 이쪽 분야의 일은 불안과 변수를 낮추는 것이 관건인 것 같아요. 그런 의미에서 의뢰서가 있는 게 서로에게 신뢰의 고리를 만드는 데 중요한 역할을 하는 것 같습니다. - 서해문집 이현정 편집자 ​", "창작은 노동으로 잘 치부되지 않는다. 창작을 해본 사람이라면 그 활동이 머리와 몸, 둘 다 힘든 중노동에 속한다는 생각을 할 수밖에 없는데도 말이다. 무언가를 만드는 일이 사회에 분명한 의의를 보여주지 못한다는 이유로 존재가 쉽게 지워지는 시장 분위기 속에서 창작으로 돈을 벌기란 쉽지 않다. 경기가 나빠지면 사람들은 꾸미는 것을 멈추고, 문화 예술에 사용하던 돈을 줄이거나 아예 없앤다. 기업은 디자인 부서를 제일 먼저 감축하고 진행하던 문화 예술 지원 사업을 멈춘다. 예술이 먹고사는 일 다음인 사람들에게는 가장 먼저 쳐낼 목록일지 몰라도, 예술이 먹고사는 일의 최전선인 사람들에게는 아주 큰 타격이 아닐 수 없다. 예술업 종사자야말로 운이 좋아 관심을 받게 되면 더 부지런히 활동해야 하는 이유이다. 지원과 관심이 언제 어떻게 끊길지 모른다. ​", "그림을 그리기 위해서는 지형지물이나 사람을 유심히 봐야 한다. 그냥 보는 것과 본 형태를 다시 만들어내기 위해 유심히 보는 것은 완전히 다르다. 후자가 잔상이 더 오래 남는다. 이 훈련은 따로 그림을 그리지 않아도 할 수 있다. 그림을 그린다고 가정하고 눈앞에 보이는 것을 천천히 보면 되니까. 형태를 따라가며 보면 더 정확하게 볼 수 있고 기억할 수 있다. ​", "다른 사람들의 응원과 관심을 받기 시작하면 혼자 하는 마라톤에 끝이 오게 마련이다. ​", "예전에 한 프로그램에서 연예인 이효리가 구교환 배우와 이옥섭 감독을 만나 이야기 나누는 것을 보았는데, 그때 이옥섭 감독이 해준 말이 인상적이었다. 사람이 미우면 사랑해버리라는 것이다. 쉽게 사랑하는 것이 나에게도 여전히 어려운 일이지만, 무언가를 사랑하는 순간부터 서사가 만들어진다고 생각한다. 창작자들에게 서사는 작업을 시작하게 만들어주는 좋은 동력이 될 수 있다. 궁금하고, 알고 싶고, 그러다 이야기를 만들어내면 이미 창작이 시작된 것이다. 그래서 매일 쉽게 사랑해보려고 한눈파는 노력을 하고 있다. ​", "결국 무엇을 이용해서 표현하느냐는 나중의 문제라고 생각한다. 세상을 보는 방식과 마음을 풀어가는 방식이 좀 더 깊은 숙성의 시간을 맞고 나면, 어떤 매체가 되었든 작업의 의미가 일관되게 관통하는 지점이 생긴다. 그러니 가장 먼저 해야 하는 것은 자신에 대한 탐구일 것이다. 작업을 해내는 작업자에 대한 이해도를 높여야 하는 사람. 바로 작가 자신이다. 그리고 나서 세상과 사람에 대한 탐구와 이해를 시작해도 늦지 않는다. ​", "분명 그들이 원하는 알 수 없는 무언가가 있다는 것은 알겠지만, 시각적으로 구체화를 하려고 하면 눈앞에 쉴 새 없이 안개가 펼쳐졌다 걷히기를 반복한다. 그들이 원하는 것과 내가 하고 싶은 것 사이에서 줄타기를 적절하게 해야 좋은 이미지가 나올 텐데, 요즘의 나는 그 두 가지 전부를 완전히 못하고 있다. 줄에서 떨이진 셈이다. 그래서 효능감보다 절망감이 높은 하루를 살아가고 있다. 다른 방식의 '캐치마인드'인가 싶기도 하다. '내가 생각하는 것을 어디 한번 맞춰봐. 근데 거기에 너의 재능을 덧붙여야 해.' 그들이 원하는 이미지를 찾아보려고 탐정이 되었다가, 종이나 아이패드 앞에서는 다시 작가가 되려고 노력한다. 나는 탐정인가 작가인가."]}, {"title": "재인, 재욱, 재훈", "author": "정세랑", "genre": "소설", "publisher": "은행나무", "passages": ["마음이 놓이지 않는다고 해서 모든 걸 내가 다 할 수는 없어. 뻣뻣해진 손가락으로 운전대를 쥐고 재인은 생각했다. 모든 걸 내가 다 하다가는 성격이 나빠지고 말 거야.", "'너도 배고파?' 재인이 재욱에게 물었다. '고픈가.' 재욱이 대답 아닌 대답을 했다. 그 정도는 알았으면 좋겠다고, 재인은 미간을 찌푸렸다. 배가 고픈지 않은지 정도는 알아야 하지 않나.", "다른 사람들의 대화를 따라잡는 일조차 피로했다. 재인과 재훈의 치고받는 대화에도 은근히 스트레스를 받았다. 누군가 중요한 말, 중요한 일에만 다른 색깔로 표시를 해주면 좋겠다고 생각했다.", "아무것도 아닌 우연, 아주 조그만 초능력, 평범학고 작은 친절, 자주 마주치는 다정함에 대한 이야기를 쓰고 싶었다."]}, {"title": "적당한 실례", "author": "양다솔", "genre": "에세이", "publisher": "은행나무", "passages": ["웃겨보겠다고 무대까지 올라온 사람과, 어디 한번 해보라고 관객석에 앉은 사람들 사이에 의도치 않은 웃음이 터지기란 결혼 정보 회사에서 운명의 사랑을 만날 딱 그 정도 확률만큼 어렵다. 차라리 자수성가하고 정치인으로 출세하는 편이, 우산 하나 들고 '언젠가 벼락이 치겠지'하고 기다리는 편이 나을지도 모른다. 애처롭다. 애처롭다.", "나는 가장 불편한 관객이며 안 웃긴 코미디언이다. 그럼에도 나는 비건으로 농담을 만들고 싶다는 원대한 꿈을 갖고 있었다. 언젠가 동료 코미디언들을 앉혀놓고 비건을 주제로 농담을 도전했다. 나는 점점 뜨거워지는데 애들은 점점 차가워져서 그 방에 기후위기가 오는 줄 알았다. 무대가 끝나자 다들 '미안하다', '반성하겠다' 하고 줄줄이 고해성사를 했다. 웃음 타율이 0에 수렴했다.", "모든 장소와 모든 때가 차 마시기 참으로 좋은 순간이다. 아침이면 깨어나서 좋고 오후에는 빛과 함께 무르익어서 좋으며 밤에는 하루를 가다듬기에 좋다. 심지어 새벽의 다도는 고요한 적막과 함께 고를 수 있는 최고의 방법이다. 많은 날에는 맑아서 흐린 날에는 흐려서 맛있다. 비 오는 날에는 빗소리를 들으며, 눈이 내리면 창밖을 바라보며 차를 마시는 그곳이 천국이다. 봄 여름 가을 겨울, 혼자 함께 여럿이, 아이 친구 노인 할 것 없이 끝내준다.", "차는 사람처럼 각자의 길을 간다. 시간이 갈수록 맛이 좋아지지만, 단순히 시간만 지난다고 해서 맛있어지지는 않는다. 적절한 환경에서 충분한 시간을 견딘 차는 빛을 발하지만, 안 좋은 환경에서 보관한 차들은 그렇지 못하다. 나이를 먹는다고 해서 당연히 훌륭한 어른이 되지 않는 것과 비슷하다. 마치 사람처럼 스물부터 예순까지 가장 맛있게 무르익고, 이후엔 맛이 떨어지기 시작해 백 년이 넘은 차는 마시지 않는다. 또 하나의 흥미로운 사실은 너무 적은 양의 차를 따로 오래 보관하면 그 맛과 생명력을 잃어버린다는 점이다. 하물며 차도 혼자 떨어져 있으면 살 수 없다는 것이다.", "선생님은 친절한 미소로 나를 안내하며 학생들이 별로 집중하지 않더라도 개의치 말라고 일러주었다. 나 또한 웃으며, 그것이 나의 유일한 희망이라고 답했다. 강단에 서자마자 그대로 말했다. 나는 목소리가 꽤 좋은 편이니 그 김에 한숨 자는 게 어떻겠냐고. 실로 내가 그들에게 줄 수 있는 유일한 것은 추가 수면 시간이었다. 결국 나는 내가 이상하다는 얘기부터 시작할 수밖에 없었다. 평생 교복을 입어본 적이 없고, 여러분과 같은 나이엔 절에서 행자 생활을 했으며, 스무 살 때는 겁도 없이 무전여행을 떠났다고 말이다. '좋았어, 지금까지 잘 왔어. 앞으로 한 걸음도 삐끗하면 안돼'라고 생각하고 있을 여러분이 그 모든 길에서 삐끗했을 때 마주칠 사람, 여러분이 두려워할 만한 선택의 총합체가 나일지도 모른다고 말하며 웃었다.", "제가 좋아하는 이야기는 모범적이고 아름다운 것과는 거리가 멀었습니다. 제 삶과 마찬가지로요. 저는 배움이나 교훈을 읽으며 쓰고 싶다고 생각한 적이 없었습니다. 그런 것이 글이라면 쓸 수 없다는 생각이 들었습니다. 오히려 아주 이상한 사람들의 이상한 글들이 저를 쓰도록 떠밀었습니다. 아주 이상한 일이었습니다.", "도스토옙스키는 말했다. \"아름다움이 세상을 구원하리라.\" 아름다움은 능력이다. 힘이고, 낙이고, 무기다. 당신은 내면의 아름다움에 너무 치중해 살았다! 책 좀 그만 읽어라! 자기가 어떻게 생겼는지는 알고 있나? 이너 뷰티 타령 좀 그만해라! 당신의 내면과 한없이 동떨어진 외면을 직시하라! 싱크 좀 맞춰라! 내면와 외면이 일치를 향해 나아가는 과정에서, 당신은 실질적인 자신감과 편안함을 얻는 자신을 발견할 것이다. 외면의 아름다움은 당신의 더 아름다운 내면으로 향하는 길이 되어줄 것이다. 세상은 당신에게 빠질 준비가 됐다. 시작은 무조건 얼싸안고 기합을 외친다. 나아질 거라는 확신이 이 수업의 핵심이다. 모든 것은 기세가 중요한 법이니까. 귤과 가숙의 눈에 털끝만큼의 의심이라도 서렸다가는 나는 언제든 벌떡 일어나 블루투스 마이크를 들고 온다. 조명을 모두 소등하고 디스코볼을 켠다. 삽시간에 거실이 노래방이 된다. 둘은 엄청난 것이 오고 있음을 감지한다. 나는 반주를 튼다. 첫 곡은 에일리의 '보여줄게'다. 나는 귤에게 마이크를 건네며 말한다. \"명곡입니다. 마음을 실어 부르세요.\" 귤은 얼굴이 홍당무처럼 빨개져서 거의 울먹이며 소절을 따라 부른다. \"보여줄게 완전히 달라진 나 보여줄게 훨씬 더 이뻐진 나.\" 나는 신이 나서 손뼉을 친다.", "나는 까불고 있었다. 잘 쳐줘야 작가 지망생 혹은 아마추어 작가인 내가 반나절에 한 편씩 글을 보내도 시원찮을 판에 격일간을 선언했다. 감사함에 구독자 한 분 한 분에게 찾아가 큰절을 해도 모자랄 판에 이렇게 적어 보냈다. \"발송 시간은 저도 모릅니다. 재촉한다고 빨라지지 않으니 느긋하게 기다리면서 함께 행복합시다.\" \"인재지변으로 인한 휴재가 있을 수 있습니다. 응급실을 izi의 노래로만 기억하고 싶거든요.\" \"혹시 심술 난 피드백을 보내실 시에는 다이다이 뜨자는 것으로 알고 링에서 만날 약속을 잡으면 되겠습니다.\" 그것은 24년 전통의 욕쟁이 할머니 국밥집처럼, 어딘가 짠하고 찐한 구석이 있었다. 작가로서는 0년이지만 양다솔로서는 27년이라는, 그 세월이 만들어낸 기세였다. 아니, 실은 다리를 달달 떨며 보냈다. 어찌나 아슬아슬하던지. 리허설도 없이 줄 위에 폴짝 올라선 외줄타기 곡예사가 된 기분이었다. 그 순간의 나를 무너뜨리기는 아주 쉬웠을 것이다. 쿡, 찌르며 \"웃기지 마세요\" 한마디면 즉시 무릎을 끓고 긴 사과문을 썼을 것이다. 놀랍게도 돌아온 답은 \"너무 웃겨요\" 였다. 광대가 관객을 만난 것이다.", "누구에게나 하고 싶은 이야기가 있다. 막상 마이크를 쥐여주면 할 말이 없는 사람은 없다. 살면서 깨달은 진리다. 조금 부끄럽고 서투를 뿐, 모두가 말할 순간을 기다리고 있다.", "그는 웅크리고 있었다. 가만히 누워 길고 느린 꿈을 꾸고 있었다. 내 마음은 산란해졌다. 가난한 자가 움직이지 않는 것만큼 무서운 일은 없다. 끊임없이 움직여야 한다. 그래야만 한다. 버스를 세 번이 아니라 다섯 번 여섯 번 갈아타야 할지라도 가야만 한다. 가난은 움직이지 않는 자를 보살피지 않는다. 끊임없이 움직여 자신을 책임지고, 살기 위해 기꺼이 지금을 숫자로 환산해야 한다. 나는 그에게 쉬라고 말할 수 없다. 쉬지 말라고도 할 수 없다. 살아 있기 위해 돈을 벌어야 한다고, 살아 있기 위해 쉬어야 한다고도 말할 수 없다. 그를 깨울 수 없다. 그저 시간이 잠시 멈췄으면 했다. 새로 태어날 수 있을 정도로 깊이 잠든 그가, 그 긴 잠에서 깨어나 나른한 기지개를 켤 때까지.", "바야흐로 좋아하는 것만 보고 살 수 있는 세상이다. 이제 나와 다른 존재를 마주치지 않아도 된다. 알고리즘은 입안의 혀처럼 내가 원하는 것을 알려준다. '말하지 않아도' 나보다 내가 원하는 것을 더 잘 파악한다. 기분 나쁘고, 다르고, 불편한, '보기 싫은' 것들은 손가락으로 '관심 없음', '싫어요'를 누르는 것으로 쉽게 치울 수 있다. 시선은 초 단위로 나뉘어 기록되고, 클릭 몇 번은 다음을 결정하는 근거가 된다. 결정할 것은 점점 더 줄어든다. 하나의 거대하고 확고한 선호를 만든다. '눈빛만 봐도' 알 수 있게 된다. 나와 다른 언어를 쓰고 다른 생각을 하는 사람을 만나는 불편함, 갈등은 사라진다. 어쩌다 나와 완전히 다른 언어를 가진 사람을 만나면 문득 말문이 막힌다. 나와 다르게 생각하는 사람을 좀처럼 마주칠 수 없기 때문이다. 자신이 평소에 당연하게 생각해 온 신념, 사용해 온 언어들을 한 번도 들어보지 못한 타인이 이 세상에 가득하다는 것을 깨닫는다. 그럼 어디서부터 말하기 시작해야 할까.", "상대를 곤경에 빠뜨리기 가장 쉬운 방법을 알고 있다. 만나자마자 \"비건입니다\"라고 말하는 것이다. 대부분의 이들은 이후로도 눈을 똑똑히 뜨고 내가 뭘 먹는지 지켜본다. 그리고 혼란과 기쁨이 뒤섞인 얼굴로 숨 가쁘게 달려와 이렇게 묻는다. \"지금 티라미수 먹는 거예요? 티라미수는 유제품인데.\" 그런 질문을 받는 순간에는 약간의 전율마저 느낀다. 먹는다는 지극히 사적인 영역이 누구에게나 침범 가능한 영역으로 변모하는 장면을 겪고 있으므로.", "비건의 지향점은 완벽함이 아니다. 자신을 이루는 신념의 하나이며, 세상을 보는 입장일 뿐이다. 엄밀히 말해서 나는 비건 함량 미달인지도 모르겠다. 우리나라에서 비건을 하려면 건강하고 부지런하고 아름다워야 하며, 상냥하고 친절하고 심지어 똑똑해야 한다. 그야말로 완벽해야 한다. 앞으로는 만나자마자 \"저는 비건이 아닙니다\"라고 밝혀야 할지도 모르겠다.", "까불이는 그 커다란 입을 길게 늘어뜨려 기괴하고 호쾌한 미소를 머금고 말했다. '이상한 나라의 앨리스' 속 캐셔의 고양이 같은 입꼬리다. \"이제부터 지각자와 결석자는 성대모사를 하겠습니다.\" 청천벽력과 같은 발언에 참여자들이 웅성거린다. 그곳에 온 누구도, 사람들 앞에 서서 성대모사를 하는 일 따위는 평생 해본 적이 없었다. 누구도 그들에게 그런 역할을 바란 적이 없었다. 혼란의 도가니에도 아랑곳하지 않고 까불이는 말한다. \"사람들이 여러분 보고 맨날 샌님이라고 놀리죠? 살면서 웃기다는 말 한 번도 못 들어봤죠? 이참에 성대모사를 제대로 연마해서 진정한 재주꾼이 누군지 보여주자 이겁니다. 하하!\" 사람들은 웃고 있지만 눈은 울면서 마지못해 고개를 끄덕였다. 엉터리인 글을 쓰는 한이 있더라도 지각과 결석은 절대로 하지 않겠다고 이를 악문다. 그의 말을 따르기로 해서다. 까불이는 누군가에게 약속을 하고, 그걸 지키는 장면은 늘 아름답다고 확신한다. \"재밌는 글을 쓰기란 돌처럼 굳은 똥을 싸는 것만큼이나 어렵다는 것을 아실 겁니다. 쓰는 순간과 쓰지 않는 순간 모두 글 생각에 시달리며 왜 이런 고문을 자청했는가를 되물을 즈음, 마감 시간은 얄짤없이 우리를 향해 돌진해 오고 있지요. 그때 우리가 떠올릴 수 있는 것은 같은 시간에 다른 곳에서 싸우고 있을 동료의 얼굴뿐입니다. 함께 쓰기로 약속했기 때문이죠. 하여 그 약속을 지키지 못했다면, 우리가 근본적으로 추구하고 있는 바로 그 '재미'를 가져와야 합당하겠습니다\"", "그가 그 무대에 서기까지 그 농담들을 얼마나 많이 반복했을까. 그는 어찌하여 그 무대에 서고자 한 것일까. 어느 순간 내 눈에 그는 생존자로 보인다. 이야기할 수 있어서, 누군가를 웃게 할 수 있어서 살아남은 사람 말이다. 그 쇼에서 선보인 농담은 그로서는 닳고 닳은 농담, 마지막까지 살아 남은 농담일 것이다. 수많은 작은 코미디 클럽에서 매일 시도했을 농담들. 냉담한 반응과 가끔 들려오는 실소 사이에서 실패하고, 고치고, 다시 도약했을 이야기들. 무엇이든 그 정도로 갈고닦으면 윤이 난다. 그가 10년이 넘는 시간 동안 실패했을 수많은 농담은 그를 비춘 눈부신 스포트라이트와 그만큼 짙은 그림자 사이 어딘가에 깃들어 있다. 무대 위 코미디언의 말이란 오래 길들인 무사의 칼처럼 날카롭게 반짝인다. 말함으로써 다시 생을 다짐하는 강인한 생명력이다. 관객의 입장에서는 그가 지금 막 떠오른 것을 마구 떠드는 것처럼 보일 테지만 말이다.", "북토크가 끝나갈 즈음 독자분들께 이렇게 말했다. \"지금부터 제가 노래를 하겠습니다.\" 조용했던 관객들의 눈이 작게 흔들린다. '노래를 한대', '노래를?' 나는 목을 가다듬고 말을 잇는다. \"절대 잘 불러서 부르는 게 아닙니다. 저를 보러 여기에 와주신 귀한 여러분께 제가 해드릴 수 있는 게 없어서 부릅니다. 귀가 아니라 마음으로 들어주셔야 합니다. 얘가 정말 진심으로 고마운가 봐 그렇게 생각해 주세요.\"", "만나는 사람마다 물었다. 북토크가 뭐죠? 북은 책이고, 토크는 이야기잖아. 그런데 할 얘기는 책에 다 썼는데?"]}, {"title": "전쟁 없는 세상", "author": "마이클 율 쇠렌센", "genre": "사회정치", "publisher": "오월의봄", "passages": ["무기가 아닌 다른 방법으로도 싸울 수 있어요. 장기적으로 보면 비무장 방법이 인권과 민주주의를 수호하고 생명을 구하는 데 더 효과적일 수 있습니다. 미래에 평화로운 관계를 만들기도 더 수월할 거고요. 매일같이 전쟁이 계속되고 총성이 울리고 로켓이 발사되고 집이 파괴되고 인명이 손실될수록 재건과 화해는 더 오래 걸릴 겁니다. 이것이 제가 평화주의자이며 전쟁을 비인도적 범죄로 보는 이유입니다.", "중요한 점은 점령세력이 정상적인 기능과 통제력에 관한 대외적인 이미지를 유지하는 게 전적으로 현지 주민들의 협조에 달려 있다는 사실입니다.", "점령세력은 어느 정도의 정당성을 보여주고 싶어 합니다. 그래서 단순히 누군가를 임명하기보다는 제한된 후보들로라도 선거를 치르려고 하는 경우가 많죠. 러시아는 독재국가이지만 여전히 민주주의국가처럼 보이고 싶어 합니다. 이런 상황에서는 선거에 참여하지 않는 것이 비교적 안전한 저항 방법이 될 수 있습니다. 그냥 멀리 떨어져서 참여를 거부하면 되니까요.", "저항운동은 여러 차례 2분 파업을 선언했고 그 짧은 시간 동안 덴마크는 거의 완전히 멈춰 섰습니다. 시간이 아주 짧았기 때문에 비교적 안전한 형태의 저항이었고 저항을 지지하는 거의 모든 사람이 쉽게 참여할 수 있었죠. 동시에 이는 나치에게 저항운동의 영향력을 보여주는 강력한 메시지가 됐습니다. '얼마나 많은 덴마크인이 저항운동의 말에 귀 기울이는지 보라. 다음번에 우리가 요청하면 이들이 어떤 행동을 할까?'라고 말하는 것과 같았죠. 전쟁이 끝난 후 독일 장교들은 폭력적인 저항은 쉽게 진압할 수 있었지만 비폭력 저항에는 어떻게 대응해야 할지 몰라 당혹감을 감추지 못했다고 털어놓았습니다.", "저는 비무장 투쟁을 인간이 시행착오를 통해 배워가는 현재진행형 실험이라고 봅니다. 인류는 수 세기 동안 전쟁을 실험해왔지만 그 모든 전쟁이 지구상의 대다수 사람들에게 번영과 행복을 가져다주지 못했잖아요. 그러니 저는 제안하고 싶습니다. 전쟁과 불의에 맞서는 비무장 투쟁에도 몇 세기 동안 기회를 줘보자고요. 그리고 장기적으로 어느 쪽이 더 나은 결과를 가져오는지 평가해보자는 거죠.", "평화주의에 대한 가장 흔한 오해는 평화주의를 수동성과 연관짓는 것입니다. 하지만 제가 말씀드린 것처럼 비폭력은 오히려 갈등에 적극적으로 개입하는 방식이에요.", "저항의 가능성을 제대로 이해하려면 푸틴에게 복종하는 사람들만이 아닌 러시아 사회의 복잡성을 이해할 필요가 있어요. 러시아는 흔히 생각하듯 푸틴의 꼭두각시처럼 순종적인 사람들만 사는 곳이 아닙니다. 푸틴이 권자에서 물러나길 바라는 우크라이나 국민과 이들을 지지하는 서구사회는 러시아의 민주세력을 어떻게 도울 수 있을지 신중하게 고민해봐야 합니다. 지금처럼 러시아와 관련된 모든 것을 무조건 보이콧하는 건 우리가 할 수 있는 가장 어리석은 선택일 거예요.", "이 책은 전쟁이나 점령과 같은 상황에서 우리가 선택할 수 있는 비폭력 대안에 관해 서술한다. 이러한 대안들은 기본적으로 당시의 정세, 억압받는 사람들이 가지고 있는 자원 등에 따라 무엇이 효과적일지를 고심해서 선택하는 문제이다. 폭력이 도덕적으로 나쁘기 때문이라기보다는(물론 그것도 있지만) 폭력이 저쪽의 수단이기 때문에 비폭력을 선택해 승리의 가능성을 높이는 것이다. 그렇기 때문에 그 논리는 꼭 전쟁이나 점령 같은 극단적인 상황이 아니더라도 소위 평화 시기 사회운동에도 적용될 수 있다. 돈이든 사람이든 무너뜨리려고 하는 상대에 비해 가진 자원이 턱없이 부족한 사회운동은 어떤 캠페인과 행동을 기획할 때 무엇이 더 효과적일지 혹은 무엇이 더 우리가 실행하기 쉬울지 등을 늘 고려하고, 그 계획이 실행되는 과정에서 끊임없이 평가하며 승리의 가능성을 높이려 하기 때문이다.", "비폭력행동의 가장 효과적인 목표는 활동가 등 선구자들이 모범을 보임으로써 더 많은 사람들이 기존 질서에 대한 지지를 철회하도록 만드는 것이다. 이는 적극적인 동의 철회나 수동적 순응의 거부를 통해 이루어질 수 있다. 물론 이는 쉬운 과제가 아니지만 불가능한 것도 아니다. 더 나은 대안을 제시하고 그것이 어떻게 작동하는지 보여줄 수 있다면, 많은 사람이 그것을 받아들이고 현상 유지를 포기할 것이다.", "전쟁없는세상이 '캠페인 전략'이라는 주제로 트레이닝을 진행할 때 강조하는 부분이 있는데 바로 전략의 중요성이다. 사회부정의를 실행하는 집단은 이러한 기술과 행위성의 중요성을 인지하고 있으며, 막대한 자금을 투입해 구체적인 전략을 수립한다. 가용 자원이 제한된 사회운동단체들은 이에 맞서기 위해 더 치밀한 고민과 전략 수립이 필요하다. 전략적 접근을 통해 불리한 조건을 극복하거나 우회할 수 있는 방안을 모색할 수 있기 때문이다. 그렇다면 효과적인 캠페인 전략 수립을 위해서는 무엇이 필요할까? 우리는 다음과 같은 요소들을 종합적으로 고려해야 한다. 첫째, 전술의 선택과 배치. 즉 어떤 전술을 사용할 것인지, 그리고 이를 어떤 순서로 배치할 것인지를 고려해야 한다. 둘째, 대상의 선정. 전술의 대상이 될 개인과 집단을 명확히 한다. 셋째, 목표 설정. 단기, 중기, 장기 목표를 구체적으로 수립한다. 넷째, 소통 경로 확보. 연대 구축에 필요한 소통 채널을 마련한다.", "저항운동의 전략을 모색하는 과정에서 조직 구조의 타당성을 함께 살펴보는 단체야말로 건강한 조직이라 할 수 있다. 건강한 운동에는 집단의 목표 달성을 뒷받침하는 실효성 있는 구조와 함께, 구성원들이 소속감을 느끼고 성장할 수 있는 문화가 요구된다. 활동가들은 자신의 성취를 인지하고 영향력을 행사하는 데서 보람을 느낀다. 또한 업무와 목표 간 연결고리를 확인함으로써 자신이 지향하는 세상을 만드는 데 기여하고 있음을 자각하고 싶어 한다. 조직 구조와 문화를 성찰하고 발전시키기 위한 노력은 결코 과소평가되어서는 안 된다. 운동의 구조와 전략은 저변 확대와 구성원들의 헌신을 이끌어내는 데 모두 중요한 역할을 한다.", "전쟁없는세상은 반전운동의 기반이 우리의 일상에서 출발해야 한다고 믿는다. 전쟁을 가능케 하는 일상의 기둥들을 식별하고 이를 해체하는 작업이 필요하다."]}, {"title": "젊은 근희의 행진", "author": "이서수", "genre": "소설", "publisher": "은행나무", "passages": ["경영 악화로 퇴사를 권고받았습니다. 대답을 마치고 곧바로 짤막한 손톱만 내려다보았다. 그러고 있는 동안 내가 누군지, 이곳은 어디인지 헷갈렸다. 순간적으로 현재를 상실했다. 이게 말로만 듣던 압박 면접인 걸까? 그건 구시대의 유물이 되어 사라졌다고 들었는데 눈앞의 저 남자는 그런 소식을 혼자서만 듣지 못한 것 같았다.", "차장은 긴 한숨을 내쉬었다. 그의 얼굴은 여긴 왜 왔냐고 묻고 있었고, 나의 얼굴은 나를 왜 불렀냐고 묻고 있었다. 우리는 서로가 원하는 답을 듣지 못한 채 헤어졌다. 두 번 다시 만날 일이 없을 거라는 강렬하고도 반가운 예감이 들었다.", "우리의 낙이 네 캔의 맥주를 기막히게 잘 조합해 골라오는 것뿐일지라도 함께 있는 자리에선 자주 웃었다. 마주 보고 웃다 보면 더 많이 웃게 되었다. 그런 밤이면 언니는 취한 목소리로 말했다. 너만 있으면 괜찮을 거 같아. 외딴 섬이어도, 와이파이가 없어도.", "침해하지 말라고. 이게 어렵나? 각자 그 자리에서 독립적으로. 이게 어렵나? 머리 차일 일 없이. 네가 먹는 반찬 내가 알 일도 없이. 이게 어렵나? 고작 한 군데를 보았을 뿐인데 피로감이 엄습했다. 남자의 차를 타고 두 번째 집으로 향했다. 남자는 룸미러로 내 표정을 살피며 말했다. 여긴 반지하는 아니에요. 그는 나에게 집을 소개해주며 점차 자신을 장물아비로 느끼는 것 같았다. 떳떳하지 못한 물건을 보여주며 사라고 권유하는.", "집으로 돌아오는 내내 우리는 말이 없었다. 엄마는 지친 듯 눈을 내리깔았고 나는 그제야 엄마의 속눈썹에 맺힌 감정을 보았다. 우리는 가난해도 너무 가난했다. 하지만 둘 다 그걸 인정할 수 없었는데 자존심 때문만은 아니었다. 서울에서 우리가 함께 살 집을 구하기에 턱없이 부족한 5천만 원은 아버지가 평생 동안 모은 재산이었다. 우리는 그걸 너무나 잘 알았기에 절대로 기죽지 않겠다고 다짐했는지도 모른다. 하지만 서울의 집값은 아버지의 유산을 하찮은 것으로 만들어버렸다. 어느새 아버지는 6평 남짓한 반지하방의 전세금만 남겨준 사람이 되어 있었다.", "언니가 우리 집에 처음 놀러왔을 때 계속 방바닥에 누워 있었잖아. 왜 그러냐고 물었더니 언니가 뭐라고 했는지 알아? 언니는 안다고 고개를 끄덕였다. 기억하고 있다고. 그때 언니는 이렇게 말했다. 나는 친해지고 싶은 사람이 있으면 그 사람 집에 가서 가만히 누워 있어봐. 그러는 동안에도 마음이 계속 편하면 그 사람과 마음 놓고 친해질 준비를 해. 그러나 그때 언니에게 하지 않은 말이 있었다. 별로 친하지도 않은 사이인데 자꾸 방바닥에 눕는 언니가 마음에 들지 않았다고. 많이 불편했다고. 이제 와 그런 말을 하니, 언니는 가려던 술집으로 가지 말고 만원의행복 실내포차로 가자고 말했다. 우리가 가장 우울할 때 가는 술집이었다. 언니는 소주를 연거푸 두 잔 마시더니 잔을 내려놓으며 말했다. 미조야, 너 그거 아니? 인간을 육체적으로 학살하는 것은 시간이지만, 정신적으로 학살하는 것은 시대야. 뭐라고? 나는 내가 무슨 말을 들은 건가 되짚어보았다. 나의 정신을 죽이고 있는 건 시대라고. 이 시대. 사람들이 좋은 웹툰보다 나쁜 웹툰에 더 많은 돈을 쓰는 이 시대가 내 머리카락을 빠지게 하고 있어.", "집으로 돌아가는 열차를 타고 나서야 언니에게 미안한 마음이 들었다. 그러나 전화를 걸어도 받지 않았고, 톡을 남겨도 확인하지 않았다. 미안한데 언니, 그 얘긴 진짜 듣기 싫었어. 마지막으로 그런 톡을 남기고 핸드폰을 주머니에 넣었다. 빈손으로 멍하니 앉아 있으면서, 핸드폰을 보지 않으면 열차 안에선 할 게 아무것도 없다는 걸 깨달았다. 하도 심심해 핸드폰을 들여다보고 있는 다른 사람들의 정수리를 보며 언니처럼 원형탈모증에 걸린 사람이 있나 찾아보았지만 그런 사람은 없었고, 그렇다면 저들은 무슨 일을 해서 돈을 벌고 있는지 새삼 궁금했다. 저토록 풍성한 머리숱을 유지하고도 돈을 벌 수 있는 일은 무엇인지 어깨를 흔들며 묻고 싶을 정도로 궁금했다.", "충조는 완전히 돌았다. 낙성대 반지하방 창문에 머리통을 내밀게 한 뒤 지나가는 행인의 발길에 차이게 하면 정신을 좀 차릴까. 나는 충조에게 말했다. 이런 공단이 어떤 의미인지 알고나 좋아하라고. 그런 곳에서 일하는 노동자들은 힘들 거 아니야. 오빠보다 훨씬 힘들게 일할 거 아니야. 멋지다니. 그냥 멋져서 구경만 하고 온다니. 그게 말이나 되는 소리야? 오빠는 그런 말도 못 들어봤어? 그 쇳물 쓰지 마라. 충조는 두 눈을 크게 떴다. 처음 들어본다는 표정이었다. 정말이지 지성을 찾아보려야 찾을 수 없는 남성이다, 충조는. 헤어지기 전 충조는 한참 동안 머뭇거리더니 내게 돈을 빌려달라고 말했고, 나는 충조의 정강이를 걷어찼다. 이제부터 내 전화 받지 마. 씩씩거리며 횡단보도를 건너고 난 뒤에야 그 말이 이상하다는 걸 깨달았다. 이제부터 연락 안 해,라고 말해야 할 것을 내 전화 받지 말라고 하다니. 그건 다시 전화를 걸겠다는 의미인데. 머리가 아팠다. 터질 듯이 아파서 횡단보도를 다 건너면 나오는 타코야키 트럭 앞에 멈추어 섰다. 타코야키를 굽고 있던 아저씨가 무심히 나를 쳐다보았다. 타코야키를 사려는 건가. 아저씨의 눈빛에 떠오른 질문이 훤히 보였다. 나는 일부러 타코야키 트럭 옆 호두과자 리어카로 걸어가서 호두과자를 샀다. 그렇게 엉뚱한 사람을 실망시켰다.", "손편지를 써주면 뭐 하나. 아이들은 이미 이 시대의 충실한 구독자가 되어버렸는데. 어른들을 훨씬 앞질러 가버렸는데. 구독자 수가 권력이 된다는 걸 알고 있고, 그 권력을 어떻게 이용해야 하는지도 어른보다 잘 아는데.", "근희야, 사람들이 뭐라고 하든 너는 너대로 살아. 떳떳하게 하고 싶은 거 다 하면서 살아. 인생은 짧지 않아. 인생은 길어. 엄마는 평생 일만 하며 살았는데 아직 환갑밖에 안 됐어. 얼마나 긴지 몰라. 그러니까 하고 싶은 거 다 해보고 살 수 있어. 사기당한 일은 지나고 보면 아주 작은 일이야. 웃으면서 말할 수 있는 일이야. 엄마도 사기당한 적 있어. 그래도 툭툭 털고 다시 돈 벌러 나갔어. (\"엄마, 사기당한 적 있어?\") 그러니까 너도 그렇게 해. 범인 잡겠다고 설치면 화병 걸려 죽어. 그냥 기도해. 대대손손 삼대를 멸하게 해달라고 기도해. 엄마는 자기 전에 아직도 기도하고 자. 명성식당 집안 삼대를 멸하게 해달라고. 너도 알다시피 그 여편네가 곗돈 들고 날랐잖니. (\"계도 했었어?\") 우리 나이에 그런 일은 너무 흔해. 같이 계 들었던 다른 언니는 그 일 때문에 위암, 자궁암 세트로 걸려서 일찍 죽었어. 그러니까 근희야, 너도 엄마처럼 기도하며 평온하게 잊어. 그게 어떻게 되나 싶을 거야. 근데 해보면 돼. 추우니까 따뜻하게 입고, 밥 굶지 말고, 적당히 바람 쐬다가 언니한테 연락해. 문희가 니 연락 기다리느라 눈이 벌겋게 충혈됐어. 불쌍해서 못 보겠다.", "언니, 어쩌면 이 세계에선 진짜와 가짜의 구별이 의미 없는지도 몰라. 순간만 존재하고, 모두가 비트 위를 가볍게 흘러다니는 건지도 몰라. 그게 좋은 걸까? 나도 종이 신문을 보던 시절에는 내가 신문 한 면을 차지하는 유명인이 될 거란 상상은 안 했어. 나는 누구나 유명해질 수 있는 시대에 나도 같이 유명해지고 싶었던 것뿐이야. 특별한 사람만 유명해질 수 있다고 하면 나는 진즉에 포기했을 거야. 그러니까 언니, 내 인생이 이렇게 된 것은 내 탓이 아니야. 누구나 유명해질 수 있는 시대 탓이야. 사소한 나를 구독해주는 구독자 탓이야.", "언니는 툭하면 내게 찌라시를 믿지 말라고 했다. 사상 없는 글은 솜씨 없는 저격수의 총알 같다고 했다. 무엇을 겨냥할지 생각하지 않고 쓴 글은 종이 낭비라고 했다. 언니는 지루한 각본을 쓰고, 온종일 걷고, 알바를 잘리고, 술을 마시고, 주사를 부리고, 숙취에 시달리고, 은단 씨의 인스타를 엿보고, 은단씨의 드라마 작가로서의 일상과 자신의 일상을 비교하고, 은단 씨를 연모하고, 짝사랑은 인풋만 있고 아웃풋이 없으니 미치고 팔짝 뛰겠다고 나를 만나 하소연했다. 나는 언니의 사랑이 언니가 쓰는 각본 속 인물들의 사랑보다 가볍고 내향적이며 때로는 망상적이기까지 하다는 걸 알았기에 잠자코 내버려두었다. 그리고 지금 소주를 연거푸 세 잔이나 마시고 은단 씨를 빤히 쳐다보는 언니의 두 눈엔 또다시 깊은 연심이 깃들어 있었다. 나는 그런 언니를 보며 인간의 오만 가지 감정을 두 가지로 정리했다. 사랑받고 싶은 마음과 사랑하고 싶은 마음.", "뭐든 그렇잖아. 마음속에서 꺼내어 사람들 앞에 내보이는 순간 갑자기 초라해 보이잖아. 분명히 그보단 아름다웠는데. 그래서 나는 사람들 앞에 소중한 걸 꺼내놓지 않아. 그러자 언니는 그게 좋은 건 아니라고 하더니, 내게 마음을 좀 열고 살라고 했다. 나는 언니가 그렇게 말할 자격이 있나 싶었지만 잠자코 있었다. 우리는 종종 서로가 자기보다 못하다고 생각하는데, 그런 마음이 서로를 무시하는 결과로 이어지는 게 아니라 서로를 보살피는 상황을 이어지는 게 신기했다. 언니는 알코올램프를 살짝살짝 흔들며 심지에 붙은 불꽃을 바라보았다. 가끔 드라마 속 인물이 부러워. 모두가 기억해주는 삶을 살잖아. 가짜인데 그런 삶을 살아. 나는 진짜인데도 그런 삶을 살지 못하는데.", "너는 일이 안 힘들어? 힘들지. 근데 안 힘들어 보여. 내색을 안 하니까. 왜? 몰랐어? 내색하면 더 힘들어지는 거.", "어쩌면 그의 가게에만 투명 망토가 씌어져 있는 건지도 모른다. 그러지 않고서야 저렇게 환희 빛나는 가게를 모른 척 지나칠 수가 없다. 층고를 높이고 사면에 타일을 붙이느라 심한 고생을 했다. 조명을 달고, 간판을 올리고, 카운터를 수없이 물걸레질했다. 금전함에 지폐를 차곡차곡 채워넣고 문을 연 뒤, 기다렸다. 다음날도 그다음 날도 그리고 지금까지도. 기다리는 그의 행위는 올곧이 지속되고 있다. 오로지 기다리기 위해 기다리는 날들이 계속되었다.", "서울에선 무슨 일을 하든 치열했고, 매번 많은 사람들이 경쟁에서 도태되었으며 그들 가운데 항상 나도 있었다. 이런 상황에서 사촌동생을 상담하고 조언해줄 정도의 여유는 갖기 힘들었으나 숙모의 간곡한 부탁을 거절할 수 없었다.", "10여 년 전에 나는 나의 젊음과 부모님의 젊음이 다를 수도 있겠다는 생각을 처음으로 했다. 부모님의 젊음을 떠올릴 때마다 마음이 먹먹해졌고, 나의 젊음을 떠올릴 때면 어딘가로 도망치고만 싶었다. 지금은 나이를 떠나 생애를 관통하는 젊음이 있다는 생각이 든다. 나는 내가 외계인일지도 모른다는 공상을 자주 한다. 생득적으로 지니게 된 것이더라도 아무런 의심 없이 받아들이는 게 어렵기 때문이다. 내가 속하고 싶은 범주가 없다면 새로운 범주를 만들면 된다는 생각으로 살아가는 동안 외계인이 된 기분이 든 적도 많았다. 어쨌든 나는 여전히 지구에 살고 있지만.", "소설을 쓰지 않을 때의 나는 답답한 현실과 불명확한 자아 때문에 자주 고민에 빠지지만, 소설을 쓰고 있을 때의 나는 이야기를 통해 제법 명확한 메시지를 얻는다. 지금 내가 할 수 있는 최선의 일은 소설 쓰기라는 것이다.", "'젊은 근희의 행진' 이라는 제목을 처음 지었을 때 '행진'이라는 단어에 무척 끌렸다. 이제까지 살아오며 말할 일이 거의 없었던 단어를 이 책의 출간과 함께 마음 깊이 새기게 될 것이 무엇보다 기쁘다. 우리 모두의 행진이 길이길이 이어지길 소망한다."]}, {"title": "젊치인을 키우고 있습니다", "author": "뉴웨이즈", "genre": "사회정치", "publisher": "위즈덤하우스", "passages": ["진짜 재밌는 건 공감하는 사람을 더 많이 만들어 대화하고 토론해서 더 나은 방향을 찾는 것이고, 합의한 결과를 '약속'으로 만드는 일이다. 그렇게 고등학교 학칙을 바꾸고, 대학교 학과 문화를 만들고, 직장 내 일하는 방식을 정의했다. 다양한 개인이 함께 만드는 시스템은 각자의 해석이 담긴 고유한 경험, 자기 자신과 공동체에 대한 자부심이라는 감정을 공유한다. 그런 만큼 훨씬 크고 지속 가능하고 확장적인 변화라 믿었다. ​", "단어 하나 만드는 게 무슨 대단한 일이냐고 할 수도 있다. 하지만 말은 대상을 보는 '태도'를 완전히 바꾸어놓는다. ​", "우리 구독자는 뉴스에 나오는 정당 정치에는 관심 없을지 몰라도 한국 사회에서 꼭 바뀌어야 한다고 생각하는 문제가 하나씩 있다. 가족의 문제를 해결해주고 싶어서, 가까운 친구가 더 나은 세상에서 살기를 바라기 때문에 사회에서 바꾸고 싶은 '장면'이 있다. 국회의 어느 부처나 상임위원회가 관련 정책을 관장하는지는 몰라도 말이다. 이들을 정치에 무관심하다고 말할 수 있을까? ​", "킴은 페르소나를 구체화하면 우리의 코어 그룹이 듣고자 하는 메시지를 더 뾰족하게 다듬을 수 있다고 했다. 이 그룹을 충분히 모으고 나면 다음으로 가는 다리가 자연스럽게 보일 거라고도. 처음부터 모든 사람을 만족시키려고 하거나 공급자 입장에서 정치가 변해야 하는 당위를 이해시키지 말고, 같은 문제의식을 공유하는 사람들이 동의할 수 있는 '느슨한 하나의 지점'을 더 구체적으로 만든 뒤, 이들을 위해서 이야깃거리를 만드는 일부터 시작해보라고 설명했다. ​", "가장 좋은 설득은 설득하고자 하는 대상을 정확히 아는 데서 시작된다는 것 ​", "사람들은 정보를 정확히 안다고 해서 행동을 바꾸지는 않는다. 사람들을 행동하게 하려면 그들을 가장 쉽게 움직이는 방식에 우리가 올라타야 한다. 즉 처음부터 어려운 제도를 이해시켜서 당위를 설득해야 한다는 욕심을 내려놓을 필요가 있었다. 우리의 첫 번째 기획은 참여자가 머리를 써가며 어려운 공천 구조를 모두 이해하고 설득까지 되어야만 변화에 참여할 수 있었다. 물론 서명은 의미 있는 행동이지만 상대적으로 정치권에 요구하고 기다려야 한다는 수동적인 역할이 되기도 한다. ​", "초반에는 어떻게 하면 사람들이 화를 낼지 고민했다. 분노하게 만들고 싶었다. 하루는 지금 한국 정치가 얼마나 늙었는지 보여주는 콘텐츠를 만들었다. 기성 정치의 무능을 문제 삼는 뉘앙스가 가득했다. 혜민 님이 이 콘텐츠에 제동을 걸었다. 콘텐츠를 보고 기대가 생겨야 하는데 오히려 낙담하게 되고, 바뀌지 않겠다는 생각이 더 강해진다는 의견이었다. 이때 우리는 커뮤니케이션의 DO % DON'T 목록을 만들었다. DO 정치를 더 기대하게 만드는 장면이 무엇일지 끝까지 고민해본다. 초당적인 정체성을 살리는 방향이 무엇일지 끝까지 고민해본다. 우리가 하고 싶은 말보다 사람들에게 어떤 변화를 가져다줄지 집중해서 이야기한다. DON'T 기존 정당이나 정치인에게서 보이는 동원의 문법을 피할 것. 재미있고 유익해서 보고 싶게! 누군가를 적대시하거나 협오하는 방식을 피할 것. 정치를 기대할 수 있어야 뉴웨이즈를 기대한다! ​", "사람들을 움직이게 하는 것은 단순한 분노가 아니라 변화를 만들 수 있는 잠재력이 자신에게 있다는 연결감과 효능감이라는 것. 정치인들이 뉴웨이즈에게 브랜딩을 알려달라고 하는 이유는 우리가 새롭고 역동적인 네트워크처럼 보이기 때문일 것이다. 뉴웨이즈가 이런 장면을 만들 수 있었던 건 우리가 늘 달라질 수 있다고 말한 덕분이라고 단언해본다. ​", "사회 문제를 해결하는 데는 오랜 시간이 걸린다. 문제가 있는 부품만 갈아 끼우는 방식으로 접근할 수가 없다. 이런 상황에서 뉴웨이즈는 한 방에 문제를 해결해서 '짠' 하고 결과를 알리는 방식이 아니라 복잡한 방정식 가운데 지금 우리가 어떤 단계부터 집중하고 있는지를 알리고, 작은 일이라도 그 의미를 전달하려고 노력했다. 사람들이 문제에 공감할 수 있도록 필요한 정보를 주고, 이번에는 어디까지 목표를 이루었고 실패했는지, 다음에는 어디까지 나아가고 싶은지 과정을 잘 만듦으로써 '지금 당장은 아니더라도 언젠가는 해낼 것 같은 팀'이 되고 싶었다. ​", "현재의 개인은 변화에 참여하는 순간의 감정, 이를 통해 나를 어떻게 성장시킬 수 있는지가 중요하다. 참여가 소비의 형태와 비슷해진 면도 있다. 참여하는 이유나 욕구도 제각기 다르다. 이럴수록 개인들을 바꿔서 단일한 지향을 갖게 하는 것보다 다름을 공유하고 상호작용이 가능한 공간이 필요하다. ​", "그는 누군가와 대화가 안 되면 정의, 맥락, 의도 3가지를 점검해보라고 조언했다. 서로 같은 단어를 쓴다 해도 그 뜻이 다를 수 있고, 상황에 대한 이해가 달라 사실을 다르게 인지한다는 얘기였다. ​", "바른말로만 설득 가능한 사람의 수는 제한적이다. '하면 좋은 일'이 아니라 '진짜 필요한 일'이면서 개인과 공동체에 모두 유리한 전략을 찾고자 했다. 자신에게 좋은 결정을 하고 싶은 인간 본성의 '욕구'와 더 나은 사회에 기여하고 싶다는 '시민성'을 연결하는 기획이 필요했다. 우리는 이를 우스갯소리로 '낭만적'으로 이기는 방법이라고 했다. ​", "지금 '문제'라는 단어를 얼마나 많이 말했는지 알아요? '문제'라는 단어를 빼고 뉴웨이즈가 뭘 하려는지 이야기할 수 있어요? 한국 정치에 어떤 문제가 있는지, 그것을 뉴웨이즈가 어떻게 해결할지 설득해야 하지 않을까요? 문제를 해결하겠다고 설득하지 말고 무언가를 같이 믿자고 설득해야죠. 사람들은 부정적인 이야기를 싫어해요. 기대할 수 있는 이야기에 관심이 생기죠. 믿음을 세우고 그 믿음에 더 많은 사람이 모이도록 해야 해요. 사람들이 얼마나 문제인지 알도록 하는 게 아니라 모두가 미친 일이라고 해도 뉴웨이즈와 같이 꿈꾸고 싶게 만들어야 해요. ​", "사랑은 기대를 만들고, 기대는 질문을 만들고, 질문은 변화를 만듭니다. 뉴웨이즈는 정치가 사랑으로 해야 하는 일이라고 믿습니다. 빠르게 변하지 않을 수 있다는 것을 알고도 더 나아질 가능성을 포기하지 않을 분을 찾습니다. 뉴웨이즈와 정치를 사랑해보아요! ​", "프리모템은 프로젝트를 시작하기 전, 망했다고 가정하고 그 이유를 찾는 과정이다. 긍정회로를 멈추고 될 만한 기획으로 수정하는 데 도움이 된다. ​", "더 다양한 의사결정권자가 등장하려면 훌륭한 인재가 많은 것만으로는 부족하다. 이들이 후보가 되고 당선될 수 있는 환경이 동반되지 않으면 소용 없다. 선거제도를 정하는 건 현역 국회의원이다. 선거가 스포츠 경기라면 경기의 룰을 선수들이 모여서 경정하는 것이다. 모든 정당이 동등하게 논의에 참여할 수도 없다. 각 정당의 입장이 첨예하면 국회는 의석 수에 따라 양당의 대표를 뽑아서 조율하게 한다. 자연스럽게 선거제도 개편 논의가 양당이 어떻게 이길지 고민하는 선거 전략 논의로 바뀌어 버린다. ​", "지방선거 때처럼 하면 젊치인을 배출할 수 었으리란 예상은 보기 좋게 빗나갔다. 서로에 대한 심판론이 우세한 선거에서 공천 과정의 투명성이나 인물의 다양성에 대한 요구는 끼어들 틈이 없었다. 양당은 누가 봐도 자기편을 끌어주는 공천을 하면서도 상대가 더 나쁜 공천을 한다고 공격했다. 정말이지 '징글징글'했다. \"공천권 가지려고 기를 써서 당 대표 하는 건데 공천을 바꿀 수 있겠어?\"라는 말을 안 들었던 것도 아닌데 우리가 순수했던 걸까? 그렇다고 하더라도 솔직히 정치가 너무한 건 맞다. ​", "퓨쳐 보터. 미래를 제대로 책임질 정치가 무엇인지 묻는 유권자다. 이번 총선에서 각 정당이 더 다양한 미래 문제를 논의하게 만들고, 이 문제를 해결할 수 있는 다양한 적임자를 세우고, 문제 해결을 약속한 후보자들이 당선될 수 있게 만들면 어떨까? ​", "잘 싸웠다는 결론을 내리는 데는 2가지가 필요하다. 어떻게 싸웠냐, 무엇과 싸웠냐. 우리는 모든 과정에 유권자를 주인공으로 남기기 위해서 노력했다. 드래프트 2024 후보자의 기준을 세우는 것부터 퓨쳐 보터를 모으고 역공약을 제안하는 데까지. 이 과정에서 정치에는 늘 크게 실망했고, 우리가 만나는 유권자에게서 늘 새로운 가능성을 발견했다. 뉴웨이즈가 말하는 새로운 정치가 틀리지 않았음을 확인했다. 개인의 영향력으로 정치의 얼굴을 바꿀 수 있을까? '그렇다'라는 답을 내는 건 뉴웨이즈가 혼자서 해낼 수 있는 일은 아닌 것 같다. ​", "어쩌면 지금 정치에서 한자리하는 분들이 정치의 가능성을 가장 덜 믿는지도 모른다. 너무 오랫동안 정치는 원래 그런 거라고 믿어버려서 기존의 방식만 되풀이하고 있는 것은 아닐까? 젊은 세대는 정치에 관심이 없다는 생각, 자신에게 중요한 게 무엇인지 모른다는 생각, 경험이 없어서 정치를 잘할 수 없다는 생각을 하나씩 깨뜨릴 시간이다. 얼마나 오래 걸릴지는 모르지만 이 관성이 깨지는 날까지 어쨌든 통쾌한 반격의 시간이 남아 있다. 원래 그런 정치는 없다. ​", "정보 전체를 공개한다는 것은 조직의 신뢰를 만드는 일이다. 의문이 생기면 곧바로 해소할 수 있도록 열려 있다는 뜻이기도 하고, 반대로 동료들에게 보여줄 수 없고 설명할 수 없는 일이라면 하지 말아야 한다는 의지기도 하다. ​", "우리는 숫자의 성장이 전부라고 생각하지 않는다. 뉴웨이즈가 만들려는 장면을 구체적으로 상상하고 그 장면과 가까워지고 있는지 항상 질문한다. 아무리 제품을 성장시키고 고객을 늘리는 방법이라고 해도 \"이것이 우리가 만들고 싶은 장면에 가까울까?\" \"이것이 잘 성장하는 방법일까?\" 하고 물을 수 있어야 한다. ​", "동시에 단번에 바뀌지 않는 기득권에 의해 좌절되는 부분은 '정확'하게 실패할 수 있도록 노력한다. 최선을 다하지 않고는 어떻게, 왜 실패했는지 알 수가 없다. 어디까지 무엇을 해볼 것인가? 이렇게까지 해서 무엇을 남길 것인가? 방향을 세우고 실패를 향해 달린다. 실패를 염두에 두고 아무것도 하지 않거나 적당히만 한다면, 사람들의 기대는 금세 소진되고 돌이킬 수 없는 변화의 시기도 놓쳐버린다. 이 또한 미래의 우리에게, 혹은 우리 다음의 사람들에게 자산이 될 수 있다는 마음으로 기꺼이 실패한다. ​", "오늘날 전문성이라는 건 '특정 기술을 능숙하게 다루느냐'보다는 '특정 문제를 자기만의 방법으로 해결할 수 있느냐'에 달렸다. 아무리 문제가 크고 어렵더라도 자기만의 방식으로 해결해낼 수 있는 사람은 그 일에 대한 전문성이 있는 것이다. ​", "정치에 사랑을 쏘세요. 친구들은 말한다. 앞에서는 유권자를 위하는 척하지만 뒤에서는 자신의 잇속을 챙기는 정치, 중요한 문제는 해결하지 않고 권력 경쟁을 하느라 싸우는 정치에 지쳐서 정치에 관심을 갖지 않게 됐다고. 유권자를 냉소하고 비관하고 정치를 외면하게 만드는 장본인이 바로 정치다. 하지만 그런 정치를 그대로 두고 볼 수만은 없기에 우리는 정치를 '사랑'해야 한다. 사랑은 기대를 만들고, 기대는 질문을 만들고, 질문은 변화를 만들기 때문이다."]}, {"title": "제사를 부탁해", "author": "박서련, 정영롱", "genre": "소설", "publisher": "문학동네", "passages": ["\"그래도 모른 체하자니 마음이 참 그래서요.\" 그렇지, 마음. 그것이 참 어렵지요. 내게 일을 의뢰하는 고객 대부분이 비슷한 말을 한다. 제사를 잘 몰라서. 안 모실 수 없는데 모실 수도 없어서. 무엇보다도, 마음이 편치 않아서. 그러니까 나의 직업은 마음을 대신해주는 일이다. 산 사람들이 죽은 사람들의 노여움을 이토록 두려워하기 때문에.", "밥 먹는 정서는 한순간이라도 입을 쉬면 큰일이 날 것처럼 빈틈없이 떠들어대곤 했는데, 그중 시다, 달다, 맵다, 짜다 등 맛에 대한 평을 빼면 전부 다 거짓말이었다. 특별히 상황을 모면하려는 변명이나 괜히 잘나 보이려 꾸미는 허풍이 아니어서인지 정서의 거짓말에는 고민이나 생각이란 것이 전혀 필요하지 않은 듯했고, 그래서 정서는 밥먹듯이 거짓말을 할 수 있었다.", "정서는 내 직업에 대해 왈가왈부한 적이 별로 없었다. 내가 굿하러 다니는 무당이나 사이비 종교인 같은 것이 된 줄 알고 나를 멀리한 지인들과 달라 좋았는데, 지내다보니 정서에게 없는 것은 편견이 아니라 그냥 관심인 것 같았다. 내 직업에 대해 으레 가질 만한 관심조차 없어 보이던 애가 집에서 딸내미에게는 곧잘 내 얘기를 했다니. 좀, 울컥한다. \"엄마가 뭐라고 하디?\" \"아줌마 참 고생 많다고요.\" \"그랬구나.\" \"네. 세상에 참 직업도 재수없는 걸 택했다고.\" 앞니까지 달려나온 쌍욕을 간신히 삼킨다. 참자, 참자. 정서는 가고 없는 고인인데 내가 참아야지. 그랬니, 하고 넘기려는데 아이가 한마디 더한다. \"잘해봐야 본전이고 가만히만 있어도 욕먹는 직업이라고 걱정한 거예요.\" 내 생각에 그건 정서가 직접 한 말이 아니라 아이가 덧붙인 의견이지만, 틀린 말도 아닌 듯하다.", "둘이 먹다 하나가 죽어도 모른다는 속담. 한국 사람이라면 누구나 다 알 만한, 설령 간첩이어도 모를 리 없는 옛말이다. 나는 가끔 속담 속의 산 사람 입장을 생각한다. 정말 몰랐을까? 나와 같은 것을 먹고 있던 옆 사람이 죽어버린 것을 모를 수가 있을까. 그렇게 황망한 일이 일어나도 알아차리지 못할 만큼 맛있는 음식을 표현할 때 쓰는 말이긴 하지만, 그래도, 정말 모를 수가 있을까. 같은 음식을 나누어 먹던 사람이 갑자기 쓰러지면 무엇이 잘못되었나, 설마 나랑 먹던 이 음식이 원흉인가, 독이라도 들었나 불안한 마음이 드는 것이 인지상정 아닌가. 아니면 혹시, 오히려, 안도하는 것은 아닐까. 입이 하나 줄어 내 몫이 늘었다고 기뻐하는 것이 그 속담 속 산 사람의 본심 아닐까", "\"아줌마. 이게 무슨 냄새예요?\" \"쥐포. 너희 엄마가 어릴 때 좋아했어.\" \"뭔 소리예요. 우리 엄마 이런 거 안 먹었는데. 그런 거 비리다고 손도 안 대고 다 버렸어요.\" \"\" \"냄새도 냄새고 이빨에도 다 끼고. 하여간 세상 품위 없는 음식이 다 있다고.\" 정서 이 계집애, 싸모님 됐다고 딸 앞에서까지 고상을 떨었구나. 웃음을 참느라 쥐포가 오그라드는 것도 모르고 있다가 겨우 한마디를 던진다. \"그래, 너네 엄마 이런 거 못 먹었어.\" \"역시 그렇죠?\" \"없어서 못 먹었어.\"", "\"아줌마, 우리 엄마 거짓말 많이 했어요?\" 어느새 곁으로 돌아온 아이가 묻는다. 나는 쟁반에 부침가루를 부으며 고개를 젓는다. \"별로?\" \"아줌마는 거짓말을 잘 못하네요. 맞으면 맞고 아니면 아닌거지, 뭐가 별로래.\" 꿰뚫어 보는 감이 좋은 것도 유전인가. 헛기침을 하자 부침가루가 풀썩풀썩 일어난다. \"할머니가 맨날 엄마 거짓말쟁이라고 욕했는데요, 뭐. 저 집안 말아먹을 요망한 것이 자기한텐 까불고 아들 앞에서는 내숭 떤다고.\" 아이 앞에서 서슴없이 며느리를, 그러니까 아이의 엄마를 욕했단 말인가. 웃으며 자기가 얼마나 예쁨받는 며느리인지 자랑하던 정서였다. 시어머니가 자기더러 며느리 말고 진짜 딸 삼게 입양을 했어야 한다고 노래를 부른다더니. 쇼핑하다 정서 생각이 났다며 자꾸 선물을 사 오셔서 부담스럽다더니. 당연히 그 말들이 다 참은 아닐 거라 짐작은 했지만 이렇게까지 완전히 반대였을 줄은. 넉넉한 집안에 시집가 사모님 소리를 들으며 행복만 누리는 듯 보이던 정서에게도 사실은, 역시나, 안팎으로 거짓말을 해가며 견뎌야 했던 현실이 있었다.", "혹시 형제 있으세요? 장녀시죠? 성격 때문인지 인상 때문인지 어디를 가나 그런 이야기를 듣기도 했다. 그러면 나는 맞아요, 어떻게 아셨죠 하고 하하 웃는다. 어쩌겠는가, 재미없게도 장녀 성격이고 장녀 인상인데 실제로 장녀가 맞는 것을.", "시집가면 실컷 할 요리, 뭐하러 대학까지 가서 배우냐. 그냥 대학 보내는 것도 아까운데. 요리는 집에서 엄마한테 배우고, 장학금 받을 만한 학교랑 과에 맞춰 들어가 선생님 될 공부나 해라. 고등학교 2학년 첫 모의고사 성적이 뜬 후에 진학 상담표에 적어갈 부모님 의견을 여쭤보자 아버지는 딱 그렇게 말했다. 나는 네, 아버지 하고 지망 대학교와 학과명을 적는 칸에 지역 국립대 사학과를 집에서 가까운 순으로 썼다. 그리고 학교에 가서는 반장이 진학 상담표를 걷어가자마자 책상에 엎드려 울음을 터트렸다. 그때보다 나이를 곱절은 먹은 지금 와 생각해보면 인생이 거기에 써넣은 대로 결정되지 않는다는 것을 몰라서 그랬던 것이지만, 어쨌든 그때는 세상이 무너진 것처럼 서럽고 억울했으니까. 나 스스로 오랫동안 진지하게 생각한 진로 대신 아버지 말씀을 받아 적어 내버린 게, 내 인생을 완전히 결정해버린 것처럼 느껴졌으니까. 어떻게, 권수현 울어. 왜 운대? 몰라. 그런 수군거림이 주변에서 들썩거렸고 나는 창피하단 생각도 못 하고 계속 엎드려 울었다. 교복 소매가 축축해져 팔목에 다 들러붙도록. \"야. 적당히 하고.\" \"\" \"나가자. 너한테 할말도 있어.\"", "지어낸 이야기인 디자인으로 대하면 우리는 많은 조형적 가치들을 얻을 수 있다. 우리나라 산들은 능선으로 연결되어 있어서 수직적이지 않고 수평적으로 보인다. 산의 능선들이 이루는 수평적인 흐름은 빠르게 혹은 느리게 이어지며 말 달리듯 마구 달린다. 그래서 산은 육중한 덩어리이기보다는 진공 상태를 흐르는 선으로 보이고 리듬으로 느껴진다. 여기에 근경과 원경에서 마구 달리는 산의 흐름이 겹겹이 겹치기라도 한다면 천지는 그대로 장중한 교향굑이 된다. 칸딘스키는 음악을 그림으로 표현하느라 애를 좀 먹었지만, 우리의 산은 이미 보이는 소리였다. 우리나라 조형 문화의 특징을 대게 우아한 곡선미라고 하는데, 이는 우리나라 산의 모양 때문이라고 봐도 무리가 없다.", "장엄한 저녁노을 자연은 항상 움직인다. 계절이 변하고 생명이 탄생했다 사라지며, 구름과 강은 흘러가고 바람이 분다. 삭막한 회색 도시 속에서 그래도 자연의 변화를 느낄 수 있는 것은 하늘의 움직임 때문이다. 하늘은 대단히 역동적인 자연이다. 낮에는 구름이 움직이고 밤에는 별들이 움직인다. 움직이는 하늘, 변하는 하늘은 이미 훌륭한 조형적 대상이다. 가장 드라마틱한 퍼포먼스는 낮을 마감하고 밤이 시작되는 저녁 무렵의 노을일 것이다. 저녁노을이 사람들에게 감동을 불러일으키는 시각적인 이유는 바로 강한 명도 대비와 색상 대비 때문이다. 대낮의 밝음과 밤의 어둠은 해질녘이 되어 서로 만나는데, 이때 하늘은 밝음과 어둠이 강력하게 대비된다. 그리고 밝고 푸른 하늘은 가장 대비가 심한 붉은 색조로 물들어가면서 어둠으로 침잠한다. 밝음과 어둠의 대비인 명도 대비는 명시성에서 색상 대비에 비해 시각적으로 강력하다. 강한 명도 대비는 시각을 자극하고 드라마틱한 감성을 만든다. 저녁노을은 명도 대비뿐만 아니라, 푸른 하늘이 붉은색으로 물들면서부터 강한 색상 대비를 보여준다. 노을이 서서히 들 무렵에는 파란색 하늘에 오렌지색이 스며든다. 파란색이 점점 짙어짐에 따라 오렌지색도 어두운 마젠타 계열의 색으로 바뀌어서 태극기의 파란색과 빨간색처럼 강력하게 대비된다. 이 같은 강력한 대비가 지속되다가 빛이 점점 약해지면 붉은색은 짙은 고동색 계통으로, 파란색은 짙은 보라색으로 마감한다. 우리는 저녁노을이 아름답다고 말하는 데 그치지만, 그 과정에서 대단히 많은 색이 등장하는 것이다. **2장 생명체의 아름다움**", "식물의 논리적 규칙성과 형태의 아름다움 꽃은 대부분 노란색, 빨간색 등 따뜻한 색이 많아서 화려하고 아름답다는 느낌을 준다. 반면에 꽃의 배경을 이루는 줄기나 잎 등은 모두 어두운 녹색이어서 꽃의 색과 명도 대비와 보색 대비를 이룬다. 이런 이중의 대비를 통해 꽃은 잎이나 줄기보다도 시각적으로 튀고 예뻐 보인다. 식물에서는 색뿐만 아니라 구조나 형태의 수학적인 질서도 배울 수 있다. 수 많은 나눔와 풀들의 모양새를 자세히 살펴보면 어떤 질서가 숨어 있음을 알 수 있다.", "새로운 구조를 디자인해야 하는 디자이너들에게 식물이 지닌 논리적 규칙성은 형태를 풀어나가는 영감을 불러일으킨다. 그래서 많은 디자이너들은 식물의 구조에서 얻은 영감으로 자신에게 직면한 디자인 문제를 풀어나가기도 한다.", "곤충의 수학적 비례와 기능적 구조 식물뿐만 아니라 살아 있는 대부분의 생명체는 일정한 수학적 비례에 의해 디자인되어 있다. 곤충을 자세히 살펴보면 색이나 비례, 기능적인 구조 등에서 모두 흠잡을 수 없을 정도로 완벽한 디자인을 보여준다.", "그림 2-21의 잠자리는 일반 고추잠자리와 달리 유난히 가늘고 긴 꼬리를 가지고 있다. 몸의 가늘고 긴 이미지는 약해 보이지만 가볍고 날렵하고 세련된 느낌을 준다. 형태로만 본다면 음속을 돌파하고도 남을 것 같다. 크고 둥근 눈이 달린 머리와 몸통은 가늘고 긴 꼬리의 직선적 흐름을 방해하지 않으면서도 선으로만 흐를 수 있는 형태를 한 번 묶어주는 역할을 한다. 그리고 바늘처럼 생긴 꼬리에 비해 둥근 눈과 볼륨감 있는 몸통은 서로 대비를 이루어 전체적인 조형을 풍부하게 만든다. 몸통과 머리가 조금만 크거나 둥글거나 길었어도 짜임새 있는 형태를 이루지 못했을 것이다. 투명한 날개는 잘 보이지 않는 것 같아도 전체 형태를 감각적으로 마무리한다. 상체와 꼬리에 비해 날개의 면적이 가장 넓은데, 만약 날개가 나비처럼 불투명하고 색이 화려했다면 시각적인 무게가 날개에 쏠려서 전체 균형이 깨졌을 것이다. 또한 투명하더라도 날개의 길이가 꼬리 끝까지 갔거나 지금보다 짧았더라면 비례가 이상했을 것이다. 그리고 날개가 꼬리와 몸통의 방향과 비스듬한 각도로써 몸통에 결합된 것도 상당히 세련된 조형성을 보여준다. 전체의 동세는 머리에서 꼬리까지 강한 직선으로 두드러지지만, 투명한 날개가 약간의 각도를 가지고 몸통쪽으로 결합되기 때문에 변화가 있으면서도 전체 균형이 유지되는 안정된 조형을 이루었다. 몸통의 검은색 무늬는 날개와 방향이 똑같아 형태와 질감이 다른 투명한 날개와 몸통을 자연스럽게 하나의 조형으로 연결시켜 주는 역할을 한다. 그리고 꼬리 쪽의 검은색 선과 대조를 이루어 전체 조형의 균형을 잡앚ㄴ다. 정말 놀라운 것은 꼬리 끝에 들어가 있는 하늘색 점이다. 이 점은 대단히 감각적이며 시원한 느낌을 준다. 잠자리의 긴 꼬리와 하늘색 점은 짧고 굵은 연두색 몸통과 시소처럼 팽팽하게 조형적 균형을 이룬다. 조그마한 점 하나의 색이 꼬리에 천 근 같은 무게를 실어주기 때문이다. 색의 조화나 형태의 조형성 어느 쪽에서 보아도 군더더기 없이 완벽한 디자인을 보여준다. **3장 인체의 아름다움**", "인체는 부분적으로도 재미있는 비례나 구조를 많이 갖고 있다. 우리가 주먹을 쥐는 단순한 움직임도 엄밀히 말하면 손가락 마디의 길이가 일정한 비례로 배열되어 있기 때문에 가능한 것이다.", "조르지오 아르마니의 디자인을 살 수 있는 사람은 많겠지만, 제대로 감상할 수 있는 사람은 그리 많지 않을 것이다. 하지만 사람 몸매의 선을 논한다면 너나할 것 없이 모두 일류 디자이너가 조각가 못지 않게 전문가적 식견을 지니고 있음을 발견할 수 있다. 그렇다면 전문적인 조형작가도 아닌 일반 사람들이 어떻게 이 같은 안목을 자기도 모르는 사이에 가질 수 있는 것일까? 이것은 우리가 하루도 빠짐없이 사람들을 보면서 살아가기 때문이다.", "이는 우리도 모르는 사이에 사람의 모습을 통해 조형적 학습을 하고 있었음을 증명해 준다. 따라서 전문적인 조형예술가가 아니더라도 모든 사람들은 조형적인 안목을 이미 상당한 수준 가지고 있다고 볼 수 있으며, 몸매나 각선미의 미세한 곡률을 볼 수 있는 안목을 좀 더 보편적인 조형성 차원으로 승화 시킨다면 누구나 뛰어난 디자이너가 될 수 있는 자질을 이미 가지고 있다고도 말 할 수 있다. 남자보다는 여자의 몸매에서 조형적인 매력을 훨씬 더 느끼게 되는 데는 이유가 있다. 여자의 몸매는 남자의 몸매보다 선의 율동감이 심해서 시각적으로 더 두드러지기 때문이다.", "몸매의 조형적 아름다움이 좌우로 움직이는 다이내믹한 선의 동세에서 온다면, 각선미는 날렵한 선의 속도감에서 온다. 각선미의 핵심은 힘과 속도다. 속도를 위해서는 날렵해야 하지만, 너무 날렵하다 보면 힘이 없어지고 밋밋해진다. 그렇다고 힘을 추구하다 보면 저항이 늘어 속도감이 떨어진다. 미세한 선의 흐름 속에서 속도와 힘이 서로 균형을 이루어야 아름다운 형태를 빚어낼 수 있다. 굵지도 가늘지도 않은 발목으로 모인 선은 다리 전체의 움직임을 시워하게 마무리 짓고 다시 발쪽으로 퍼지게 한다. **4장 예술 작품의 아름다움** 예술 작품에는 그것을 만든 사람의 열정과 피나는 노력의 성취가 고스란히 담겨 있다. 따라서 예술 작품을 공부하면 앞선 선배들이 피땀 흘려 연구한 결과들을 배울 수 있기 때문에 이로운 점이 한두 가지가 아니다. 디자이너들은 고전회화를 비롯한 다양한 조형 예술을 등한시 하기 쉬운데, 정리된 조형 이론을 기계적으로 공부하는 것에 비교할 수 없는 효과를 얻을 수 있는 것이 바로 예술 작품에 대한 분석임을 잊지 말아야 할 것이다.", "연극 무대처럼 시선을 사로잡는 고전주의 회화", "전체 화면은 마치 조명을 비추고 있는 연극 무대처럼 밝고 어두운 부분의 대비가 심하고, 가운데의 인물들이 두드러진다. 인물들은 대게 밝은 색이나 따뜻한 색조로 되어 있고 배경 건물이나 중요하지 않은 사람들은 어두운 녹색으로 표현되기 때문에, 빨간색이나 노란색 계통의 따뜻한 색으로 이루어진 인물들은 배경의 어두운 녹색과 서로 보색 대비를 이루고 가운데 밝은 부분은 어두운 배경과 강한 명도 대비를 이룬다. 따라서 밝고 따뜻한 색의 인물들은 앞으로 진출하고 어두운 녹색의 배경은 뒤로 빠지면서 밝은 조명을 받는 듯 인물 중심으로 관객의 시선을 끌어당긴다. 사람들이 고전주의 그림에 쉽게 몰입하는 이유는 마치 연극 무대처럼 색의 대비와 강한 명도 대비를 통해 시선을 강하게 흡수하기 때문이다.", "구도가 엄격한 고전주의 회화 눈에 보이는 그림이 아름다운 형상을 갖게 되는 이유는 눈에 보이지 않는 그림의 뼈대, 즉 구도가 있기 때문이다. 그래서 구도가 부실하면 그림은 전체적으로 짜임새가 없어 보이며, 약간의 충격에도 쉽게 무너질 듯 약해 보인다.", "동양화는 비례나 구도와 같은 현대 조형 원리로 설명하기 어렵다는 선입견을 가지기 쉽지만, 잘 그려진 동양화는 동양화이기 이전에 역시 하나의 조형으로서 근본적인 조형 원리에 빈틈이 없다. 자연의 모습을 그대로 그렸을 것 같은 산수화지만 사실은 나무 한 그루, 나뭇가지 하나도 전체 구도에 따라 논리적으로 그려졌다.", "서예의 엄밀한 구성 서예는 모든 조형적인 본질, 나아가 우주의 본질을 검은색과 선으로만 압축하는 고도의 추상 조형이다. 본질은 항상 복잡한 현상 속에 잠재해 있다. 따라서 본질을 드러내기 위해서는 필요 없는 것을 제거하고 필요한 것들을 가능한 한 압축해야 한다.", "서예는 선의 예술이다. 서예에서는 형태의 모든 상태(점, 선, 면, 입체)가 선으로 압축된다. 선의 다이내믹한 율동과 변화는 점이 되었다가, 면이 되었다가, 입체가 되면서 선을 단순한 조형적 압축의 차원에서 벗어나 살아 움직이게 만든다. 그래서 서예에서는 무엇보다 살아 있음, 즉 힘이 최우선으로 중요한 가치가 된다. **5장 디자인의 아름다움**", "눈에 보이는 사물들이 조형적으로 분석될 수 있는 것처럼, 디자인도 조형적인 안목으로 분석될 수 있다. 조형적인 측면에서 볼 때, 인터넷상에 있는 홈페이지 디자인과 종이로 인쇄된 표스터 디자인은 다르지 않다. 홈페이지 디자인이 인터넷이라는 공간적인 특징과 기술적인 조건으로부터 자유로울 수 없다 하더라도, 조형성이나 창조성과 같은 영역에서 디자인의 가장 기본적인 가치들을 넘어서지는 않는다. 디자인이 잘 된 홈페이지는 미술 작품들처럼 조형적으로 짜임새가 있다.", "사진은 사실성이 강하기 때문에 글자, 도형, 그림과 함께 배치하면 다른 조형 요소들을 압도하는 경우가 많다. 따라서 그래픽 디자인에서 사진은 신중하게 사용해야 한다. 디자이너는 색과 형태의 비중을 미세한 부분까지 감지해야 하고 조형적 균형에 민감해야 한다.", "전체적인 조형관계를 읽지 못하면 이런 점이나 선들을 그저 장식적인 요소로만 보아 넘기기가 쉽다. 하지만 어떠한 경우에도 디자이너는 이유 없이 형태나 색을 남용해서는 안 된다."]}, {"title": "좋아 보이는 것들의 비밀, Good Design (3장, 형태)", "author": "최경원", "genre": "디자인, 미술, 예술", "publisher": "길벗", "passages": ["3. 아름다움을 구체화하는 원리 ​ 1장 정리만 잘해도 형태의 절반은 성공 ​", "디자이너가 처음부터 근사한 모양을 만들려는 욕심을 부리면 쉽게 지치고 맥을 못 잡게 된다. 차분하고 편한 마음으로 쉬운 것부터 차근차근 풀어나가는 것이 좋다. 그 중에서 가장 먼저 공부하고 연습해야 하는 것은 형태를 보기 좋게 정리하는 일이다. ​", "정리된 풍경은 사람의 시선을 집중시키며 마음을 쾌적하게 해준다. ​", "디자인은 아름답기 이전에 조형적으로 안정되어야 한다. 아름다운지 추한지의 판단은 그 다음 문제다. 먼저 사람들이 알아보기 쉽도록 형태를 정리정돈할 줄 알아야 한다. 청소는 알고보면 매우 수준 높은 조형작업에 속한다. 청소는 누가 가르쳐 주지 않더라도 어지러운 상태가 견디기 힘들 정도가 되면 자연스럽게 하게 되는 본능적인 행위이지만, 그 결과는 조형적 규범에 그대로 들어맞는다. 시각적인 어지러움을 제거하는 것은 조형적 무질서를 회피하려는 조형적 욕구와 동일하기 때문이다. 그래서 청소만 잘해도 조형 능력의 절반은 갖추었다고 보아도 좋다. 청소는 필요 없는 것을 버리는 작업과 서로 관계되는 형태끼리 모아 질서 정연하게 만드는 과정, 이렇게 두 단계로 나눌 수가 있다. 청소할 때는 가장 먼저 깨끗하지 못한 것, 필요 없는 것들을 골라서 버리는 작업부터 한다. 그런 다음 남아 있는 쓸 만한 것들을 시각적으로 어지럽지 않게 간추린다. 조형 작업도 청소하는 과정과 다르지 않다. 먼저 필요 없는 것들을 모두 제거해서 눈으로 보기에 문제가 없을 정도로 정리한 다음, 사람들이 보았을 때 좋은 감정을 가질 수 있도록 조형 요소들을 조정해 주어야 한다. ​", "구성 요소가 적은 형태는 작은 실수도 한눈에 드러나고, 디자이너의 조형 능력은 선 하나, 색 하나에 그대로 나타난다. 게다가 조형적으로 주목할 만한 요소들이 적기 때문에 시각적 재미를 주기도 쉽지 않다. 일반적으로 단순한 형태는 디자이너의 노력이 별로 들어가지 않은 것처럼 보이지만, 이런 형태일수록 디자인하기가 더 까다롭다. ​", "조형적 성격이 뚜렷이 정리되지 않고 모양만 단순하면 조형적으로 빈곤해진다. 단순한 형태는 디자이너가 좋아하는 이미지 성향의 하나라기보다는, 디자이너가 형태를 다루는 능력의 소산이라 할 수 있다. ​", "형태의 군더더기를 없애는 일은 단지 형태가 눈에 잘 들어오도록 하기 위한 것일 뿐만 아니라, 형태의 조형적 질을 높이는 중요한 일이다. 핵심만을 압축해서 표현한다는 것은 조형 공부를 하는 사람들이 언젠가는 도달해야 할 경지다. ​", "형태 요소가 단일하게 정리되면 형태가 더욱 명료해질 뿐만 아니라 강력한 이미지로 통일된다. 단일한 요소로만 이루어진 형태는 명료하게 정리된 느낌을 주며 이미지가 아주 강해지는 반면, 단조로워서 볼거리가 적다는 단점이 있다. 볼거리가 적다는 것은 디자인에서 약점으로 작용한다. ​", "같은 모양의 형태를 디자인하다 보면 형태를 단순하면서 강하게 보여줘야 할 상황이 있다. 이런 경우에는 앞에서 살펴본 것처럼 여러 가지 형태 요소 가운데 하나를 정한 다음, 그 요소를 반복함으로써 인상이 강한 디자인을 구현하면 된다. 한편 서로 속성을 공유하지 않는 다양한 조형 요소들이 뭉쳐 있을 때는 전체를 잘 살펴서 조형적 관계가 밀접한 것들을 남기고, 전체 구조에 도움을 주지 못하는 것들을 솎아내면 전체 구조가 선명히 드러나면서 형태가 정리된다. 이때 중심이 되는 구도나 형태 요소들을 가능한 한 단순하게 잡아주는 것이 바람직하며, 불필요한 것들을 과감하게 없애는 것이 좋다. ​", "소묘는 궁극적으로 사물의 조형적 상태를 객관적으로 이해하기 위한 과정이다. 소묘를 많이 하다 보면 사물의 구조나 이미지를 세밀하게 보지 않을 수가 없다. 그러다 보면 자연히 사물의 외형보다는 조형적 본질을 꿰뚫게 되고, 궁극적으로는 사물을 관통하는 속성 그 자체를 그리게 된다. 조형적으로 뛰어난 디자인을 하고 싶다면 소묘 능력부터 충분히 갖춰두는 것이 유리하다. ​", "성질이 유사한 것들끼리 구분해서 정리해 주는 것은 디자이너의 개성을 적극적으로 표현하는 것이기보다는, 형태가 무리 없이 보일 수 있도록 조정해 주는 일이다. 그러나 이러한 조정도 경우에 따라서는 적극적인 조형 작업이 될 수 있다. 특히 단순함을 지향하는 디자인에서는 형태가 어떻게 정리되는가에 따라 형태의 표정과 조형성이 크게 달라진다. ​", "두가지 조형 요소 연결하기 모든 형태는 방향성과 크기를 지니고 있다. 형태들을 서로 연결해 줄 때는 형태마다 가지는 동세와 크기를 잘 살펴보아야 한다. ​", "형태에 대한 경험이 많지 않아서 이해하기가 어렵다면, 여러 형태들이 만나 이루어지는 전체 실루엣을 살펴보라고 권하고 싶다. 복잡한 형태가 어울릴 때는 더욱 세심하게 접근해야 한다. 차분하게 동세의 연결이나 실루엣의 단순화 등을 생각하면서 형태를 하나씩 정리해가면 그다지 어렵지 않게 해결할 수 있다. ​", "형태 연습을 많이 하더라도 형태의 어울림에 대한 기본을 알아두는 것이 중요하다. 모든 형태는 둥글거나 뾰족하거나 각이 지는 등의 조형적인 인상을 가지고 있다. 형태가 서로 어울리게 하기 위해서는 형태의 인상을 먼저 이해하고 접근하는 것이 좋다. 원, 삼각형, 사각형은 형태가 단순해서 다루기 쉽다. 또한 각각 둥글고, 뾰족하고, 각이 진 이미지를 가지고 있어서 세상의 모든 형태가 가질 수 있는 이미지를 함축한 대표성을 갖는다. ​", "훌륭한 디자이너는 남이 흉내낼 수 없는 열정을 가져야 하지만, 동시에 그것을 흐트러지지 않는 형태로 집약할 수 있는 능력 또한 갖추고 있어야 할 것이다. 디자이너가 형태를 시각적으로 정리정돈할 수 있게 되면 그 다음으로는 형태 요소들의 관계, 즉 형태의 구조에 관심을 기울이게 된다. 구조는 눈에 보이는 대상이 아니라 조형 상태를 제어하는 질서다. 지금까지 눈에 보이는 것을 중심으로 형태를 설명했다면, 이제는 눈에 보이지 않는 질서를 다루는 단계로 넘어갈 차례다. ​ **2장 조형적 뼈대를 구축하는 형태 구조** ​", "조형적 뼈대란 형태의 구도나 구조를 말한다. 구조는 조형 요소들이 모여서 만든 질서 체계이기 때문에 눈이 보이지 않는다. 눈에 보이지 않는 질서가 눈에 보이는 형태 요소들보다 우선시되면 추상 형태의 결과물을 얻을 수 있다. 디자인은 거의 대부분 추상형으로 완성되기 때문에, 눈에 보이지 않더라도 조형 질서는 대단히 중요하다. ​", "필요 없는 것을 제거하는 데에도 한계가 있다. 모든 것이 다 필요할 때는 어떻게 할 것인가? 형태를 이루는 조형 요소들이 복잡하고, 조형적 비중이 서로 비슷해서 어느 것 하나 버릴 수 없을 때는, 필요한 것과 필요 없는 것의 단순한 이분법만으로 형태를 구성해 나갈 수가 없다. 그러니 이제는 눈앞에 보이는 형태 그 자체보다는 그러한 형태 속에 들어있는 뼈대, 즉 구조를 중심에 놓고 조형의 문제를 풀어나가야 한다. 형태 요소가 많아지면 각 요소들은 조형적 뼈대를 중심으로 체계화되어야 한다. ​", "형태 요소들을 질서 짓는 가장 원초적인 접근은 '반복'이다. 반복은 같거나 비슷한 형태들을 일정한 원칙에 따라 되풀이해 주는 것으로 형태가 반복되면 강한 일체감이 생겨 시각적으로 안정감을 줄 수 있다. ​", "반복된 형태들은 형태의 안정감은 있으나 변화가 없다. 따라서 형태의 반복은 조형적으로 변화를 주지 않아야 하거나, 형태의 안정감을 견고하게 구축해야 할 경우에 주로 행해진다. 크기가 작은 형태일 경우는 복잡하거나 강하더라도 별로 부담스럽지 않지만, 규모가 큰 빌딩일 경우 형태가 너무 두드러지면 보는 사람들에게 큰 부담을 안겨줄 수 있다. 곁에 두고 오랫동안 사용하는 물건들은 장식이 너무 강하면 금방 싫증이 난다. ​", "많은 형태 요소들을 하나로 구조화할 수 있는 가장 쉬우면서도 강력한 방법은 **대칭**이다. 대칭 형태는 어떤 형태보다도 조형적인 안정감이 뛰어나다. ​", "하지만 대칭형의 시각적인 안정성을 지나치게 표현하면 엄숙하면서도 권위 있게 보인다. 이 같은 이유 때문에 예전부터 대칭형은 종교계나 비정상적인 정치권으로부터 많은 사랑을 받아왔다. ​", "대칭 형태는 반복 형태와 마찬가지로 안정성은 강하지만 변화의 요소가 적기 때문에 지루하거나 답답하게 느껴지기가 쉽다. 잘못 이용할 경우에는 사람들의 감성을 오히려 억압하는 작용을 할 수도 있다. ​", "구조가 단조로우면 형태는 안정된다. 하지만 시각적인 볼거리가 적기 때문에 심심하고 재미가 없다. 우리의 눈은 시각적으로 안정감도 원하지만, 그에 못잖게 변화에서 오는 재미도 원한다. 조형이 어려운 것은 바로 이 때문이다. 안정되면 재미가 없으니 재미를 주기 위해서는 안정감을 다시 깨야 하는 것이다. 예상에서 벗어나고 안정감이 깨지는 데서 오는 조형적 긴장감은 심미적 쾌감, 즉 조형적 재미를 가져다준다. 그런데 형태가 견고하면 단조롭지만 안정이 깨지면 불안해진다. 형태의 재미도 중요하지만 안정감이 깨져서는 형태 자체가 성립되지 않는다. 조형 예술을 하는 사람들이 직면하게 되는 딜레마가 이것이다. 안정되게 하면서도 재미를 위해서 불안정함을 같이 꾀해야 하는 것이다. ​", "변화와 통일이라는 조형의 기본 원리는 어느 한 쪽에도 기울어지지 않는 균형을 갖추는 것이 가장 중요하다. 어느 한 쪽으로 기울어지면 변화와 통일을 모두 잃는다. 이것은 마치 무게가 다른 물체가 중심점이 다른 저울 위에서 수평 균형을 잡는 것과 비슷하다. 비대칭 구조는 고도의 섬세한 감각을 필요로 한다. ​", "전체 형태를 구조적으로 짜임새 있게 하면서 부분적으로 조형적인 포인트를 주면, 안정적인 형태를 유지하면서도 시선을 끄는 효과를 얻을 수 있다. ​", "형태의 구조나 구도에는 안정된 느낌을 주는 것도 있고 불안함을 주는 것도 있다. 소통이 원활한 도로보다는 교통사고의 현장이 더 자극적인 것처럼, 사람의 눈은 안정된 것보다는 불안정한 것에 강하게 집중하는 경향이 있다. 말하자면 사람들은 편안함보다는 불안함에 더 집중한다고 볼 수가 있는데, 시각적 인상이 강한 형태들은 대부분 이러한 시각적 불안함을 통해 사람들의 시선을 끌어들인다. ​", "삼각 구도는 앞에서 살펴보았듯이 대단히 안정된 느낌을 주는 구도다. 그러나 삼각 구도를 거꾸로 놓으면 분위기는 완전히 바뀌어 버린다. 좁은 꼭짓점이 아래로 가면서 구도는 언제 넘어질지 모르는 불안함으로 가득 찬다. 이러한 불안감은 보는 사람의 시선을 단번에 사로잡아 버린다. 형태의 인상을 강하게, 표현을 극대화하고 싶을 때는 의도적으로 조형을 불안정한 구도나 구조로 만들어 준다. 불안한 느낌을 주는 형태와 형태 자체의 불완전함은 반드시 구별해야 한다. 화면에 비스듬한 흐름이 생기면 화면의 수평, 수직 방향과 다른 동세가 생기기 때문에 상대적으로 강한 운동감이 느껴진다. ​", "형태의 역동성은 모두 형태를 관통하는 구조가 어떠한가에 따라 다양한 정도로 나타난다. 디자이너는 조형적 인상의 강도는 구조에서 나온다는 사실을 명심하고, 내면의 의도와 표현되는 구조를 잘 매치시킬 줄 알아야 한다. ​ **3장 나눔의 미학, 비례** ​", "비례는 반드시 전체에 대한 부분의 관계 속에서 결정되며, 이 관계는 형태의 아름다움을 결정하는 대단히 중요한 질서가 된다. 일반적으로 형태의 아름다움은 색이 화려하거나 눈길을 끌 수 있는 재료 또는 특이한 형태가 들어감으로써 만들어진다고 생각하기 쉽다. 하지만 같은 모양이라도 몸 전체의 길이에 비해 롱다리고 짧으면 숏다리인 것처럼, 조형적 상황이 같더라도 조형 요소들의 관계에 따라서 보기 좋을 수도 있고 그렇지 않을 수도 있다. 형태를 정리하고 구조를 만들어 주는 이유가 시각이나 지각에 무리 없이 받아들여질 수 있게 하기 위한 것이었다면, 비례의 원리에서는 조형미를 적극적으로 강화하는 것과 관련이 있다. 같은 조형 상황에 처해 있더라도 비례가 어떻게 조정되는가에 따라서 형태의 아름다움은 크게 달라진다. 이 단계부터는 디자이너의 개인기가 중요하다. ​", "비례 감각은 수학적 논리가 아니라 주로 경험을 통해 터득된다. 좋은 비례를 보고 평가하기는 쉽지만, 좋은 비례를 만들어내는 일은 쉽지 않다. 그러므로 좋은 비례를 만들기 위해서는 많은 사례를 경험하고 거기서 보편적이면서도 자기만의 비례감을 찾아내는 것이 가장 바람직하다. 좋은 비례를 많이 보고 좋은 비례를 많이 구현해 보는 것 이상의 비례 공부는 없다고 보는 것이 옳다. ​", "비례에 대한 공부는 단지 좋은 조형 작품이나 디자인뿐만 아니라 펜이나 건물, 옷, 심지어 하수구 뚜껑에 이르기까지 우리 주변의 어떠한 형태를 통해서도 할 수 있다. 디자이너에게 관찰력이 필요한 이유는 주변 사물이 모두 배울 것들이기 때문이다. 아무리 하찮은 사물이라도 자신만의 고유한 비례 체계를 가지고 있고, 그러한 비례 중에서 참고할 만한 것이 많으므로 평소에 사물들을 눈여겨보는 습관을 가지는 것이 좋다. 또한 좋은 비례를 많이 경험하고 기억하는 것도 비례 감각을 키우는 데 큰 도움이 된다. ​", "비례는 관계에서 비롯된다. 그런데 이 관계가 일정할 때는 법칙화될 수 있다. 일단 법칙화될 수 있다면 비례는 막연한 개인기에 의존하기 보다는 분명한 논리에 의해 좌우될 수 있으므로, 누구에 의해서나 보편적으로 행해질 수 있다. 황금비례는 법칙화된 비례의 전형이라고 할 수 있다. ​", "눈, 코, 입의 모양이 같더라도 약간의 비례 차이에 의해 전혀 다른 인상이 만들어 진다. 단순한 형태에서도 이렇게 다양한 표정이나 심미감이 나올 수 있다는 것은, 형태를 다룰 때 대단히 정밀한 비례감이 필요함을 말해준다. 그리고 디자이너가 비례를 미세하게 조정할 수 있는 능력을 갖춘다면 어떤 상황에서도 높은 수준의 조형을 만들어낼 수 있음을 강조하는 것이다. ​", "각 형태에는 거기에 어울리는 적당한 비례가 있으므로 경험이 많은 디자이너라면 형태의 속성을 빨리 간파하고 거기에 걸맞는 비례를 찾아낸다. 디자이너는 수많은 형태들을 순식간에 가장 적절한 비례로 조절할 수 있어야 한다. 그러기 위해서는 먼저 비례에 대해 꾸준히 공부해야 하며, 그런 노력을 통해 뛰어난 비례를 본능적으로 기억해 표현할 줄 알아야 한다. 구조와 마찬가지로 비례에서 가장 중요한 것은 변화를 주면서도 통일감을 유지하는 일이다. ​", "세밀한 비례 감각을 키우기 위해서는 평면의 면 분할부터 시작하는 것이 좋다. ​", "원은 포용적이고, 삼각형은 뾰족하고, 사각형은 각이 진 형태이기 때문에 성격이 극단적으로 다르다. ​", "보통 단순한 형태를 그저 장식적인 형태와 구분되는 하나의 스타일로 생각하는 경우가 많다. 하지만 심플하다는 것은 이처럼 스타일의 문제가 아니라 비례 관계에 의해 아름다움이 좌우되는 형태적 특징을 가진다. 그래서 아무리 심플한 형태라 하더라도 비례가 정교하게 조율되지 않으면 과도한 장식 못지않게 좋지 않은 결과를 만들게 된다. ​", "비례를 잡을 때는 먼저 형태에 대한 큰 구도를 정한 다음, 형태 요소들을 하나씩 조절하는 과정을 거친다. 그렇게 하면 아무리 복잡한 조형 요소라 하더라도 수월하게 비례를 만들어 나갈 수 있다. ​", "4장 조형의 변증법, 대비 ​ 시각적으로 안정된 형태는 대비감에 따라 시선을 끌어들이는 정도가 달라진다. 대비감이 약하면 안정은 되지만 눈에 띄기는 어려운 형태가 되고, 대비감이 심하면 한눈에 들어오는 디자인이 되기는 한다. 일반적인 생각으로는 무조건 눈에 확 들어오는 디자인이 좋을 것 같지만, 디자이너는 어느 상황에서든 자기가 원하는 정도의 형태 대비를 자유롭게 구사할 줄 알아야 한다. 늘 눈에 튀는 디자인만을 만들수는 없기 때문이다. 때로 무난하면서도 매력적인 디자인을 해야 할 상황들이 디자이너에게는 무수히 일어난다. ​", "대비는 성격이 다른 형태들을 가까이 배치해서 그 반발력으로써 조형적인 인상을 강하게 만들어 주는 조형 원리이다. 디자이너가 형태를 시각적으로 받아들이기에 무리가 없을 정도로 정리할 수 있고, 구조적으로 안정감을 줄 수 있고, 비례를 세밀하게 조정할 수 있다면, 이제 좀 더 높은 수준의 조형적 테크닉으로 넘어가야 한다. 대비가 심해지면 형태의 주목성이 강해지고 조형적 개성이 강하게 전달될 수 있기 때문이다. 그러나 주목성이 강하다고 해서 조형성이 좋아지는 것은 아니다. 이것은 단지 형태의 특징일 뿐이다. 대비에 있어서 디자이너가 정말 갖추어야 할 능력은 대비를 강하게 해주는 것이 아니라, 대비의 정도를 상황에 따라 적절하게 조절하는 것이다. 대비는 색상 대비를 제외하면 서로 다른 형태의 속성을 대비시키는 '형태 대비'와 크기나 면적 등이 서로 다른 것들을 대비시키는 '면적 대비'로 크게 나눌 수 있다. ​ 187- 요소가 서로 모양이 비슷하면 조화시키기는 쉬우나 대비시키기는 어렵다. 같은 형태라도 비례를 가로와 세로로 서로 상반되게 조절해 주면 대비감이 심해져서 시각적인 인지도를 높일 수 있다. 삼각형은 각도를 다양하게 해줄 수 있다. 따라서 마치 전혀 다른 형태를 대비시키는 것만큼이나 대비감을 강하게 만들 수 있어 대비 효과를 크게 낼 수 있다는 장점이 있다. 이와 달리 원은 커도 원이고 작아도 원이기 때문에 크기 이외에는 변화를 줄 수 있는 여지가 별로 없는 형태라고 할 수 있다. ​", "서로 다른 형태의 대비 형태의 속성이 다를수록 대비가 심해진다. 형태들의 결합도가 깨지지 않을 정도로 형태 대비를 시켜주는 것이 무엇보다 중요하다. 기하학 형태의 단순한 형태와 불규칙한 형태는 강하게 대비되지만, 전체적인 결합도는 그다지 좋지 않아서 조화를 이루기가 어렵다는 문제점이 있다. ​", "면적대비 변화와 통일을 위한 방법, 면적 대비 ​ 면적 대비는 '조화'와 '대립'이라는 두 마리 토끼를 동시에 잡을 수 있는 유용한 조형의 원리이다. 형태 대비가 서로 다른 인상을 가진 조형 요소들의 기 싸움이라고 한다면, 면적 대비는 형태의 크기에 따른 주도권 싸움이라고 볼 수 있다. 면적이 큰 것은 면적이 작은 것과 동등하게 만나지 않는다. 면적이 큰 것이 주가 되고 작은 것은 보조 역할을 하며, 강한 것이 약한 것을 흡수하면서 전체를 안정시킨다. ​", "면적 대비는 안정된 조형적 상태에서 형태의 재미를 줄 수 있는 가장 쉽고도 효과적인 방법이다. 면적 대비는 특히 편집 디자인에서 중요하다. 편집 디자인에서 면적 대비는 크기가 다른 채워진 면끼리 대비되기보다는, 비워진 면과 채워진 면이 대비되는 경우가 많다. 넓게 비워진 면은 글에 시선을 집중시키며 가독성을 높인다. 그래서 편집 디자인에서는 이 비워진 면을 '화이트 스페이스'라고 부르며 대단히 중요한 편집 요소로 대접한다. 비워진 면을 중요하게 생각하는 태도는 마치 동양화에서 여백을 중시하는 것과 비슷하다. 이처럼 비워진 면은 실체는 없으나 모든 조형 요소들을 하나로 소통시키는 중요한 역할을 한다. ​", "건축물은 규모가 크기 때문에 다른 디자인에 비해서 형태에 변화를 주기가 어렵다. 따라서 많은 건물들은 건물의 외벽에 면적 비례를 구사하여 품위를 유지하면서도 개성을 꾀하는 경우가 많다."]}, {"title": "좋아 보이는 것들의 비밀, Good Design (4장, 색)", "author": "최경원", "genre": "디자인, 미술, 예술", "publisher": "길벗", "passages": ["생전 듣도 보도 못한 형태는 있어도, 생전 듣도 보도 못한 색은 없다. 색은 가시광선 안으로 그 범위가 제한되기 때문이다. 따라서 색에 대한 디자이너의 태도는 창조적이기보다는 선택적이다. 어떤 색을 만들 것인가의 문제가 아니라, 어떤 색을 선택하고 조화시켜 줄 것인가가 디자이너로서 풀어야 할 색의 문제인 것이다.", "무한한 색들의 세계를 한 줄로 꿸 수 있는 어떤 체계와 원리들을 이해하는 것이 중요하다. 어떠한 기준에 의해 색을 체계화·조직화할 수만 있다면, 수많은 색들을 모두 경험하지 않더라도 색의 문제를 어렵지 않게 풀어나갈 수 있다. 그래서 색은 색 그 자체를 공부하기 전에 색들을 체계화하는 질서를 먼저 공부하는 것이 필요한 것이다.", "색을 처음 공부하는 디자이너라면, 색상환만큼은 반드시 머릿속에 넣어두는 것이 좋다. 색에서 중요한 것은 관계다. 색은 항상 다른 색과의 관계를 통해 드러나고, 어떤 색과 어울리는가에 따라 같은 색이라도 전혀 다른 인상을 가지게 된다. 따라서 빨간색이 좋은지, 노란색이 좋은지를 논의한다는 것은 별로 의미가 없다. 색상환은 바로 이러한 색의 어울림을 하나로 체계화해서 모아 놓은 것이다.", "인접색은 색의 재미는 덜하지만 서로 무리 없이 조화를 이루는 반면, 보색은 대비가 강해서 눈에 잘 띈다. 그러므로 색에 대한 경험이 적은 디자이너들은 조화시키기 어려운 보색보다는 인접색을 다루기가 쉽다. 2장 인접색", "형태에서 정리를 먼저 공부해야 하는 것처럼, 색에서는 통일된 이미지로 정리해 보는 공부가 우선이다. 색을 단일한 인상으로 정리하는 가장 쉬운 방법은 인접색으로만 조화시켜 주는 것이다. 같은 계통의 색으로 배색이 되면 그렇게 강한 인상을 주기는 어렵지만 안정된 색의 조화를 꾀할 수 있다. 초보 디자이너들은", "빨간색을 중심으로 왼쪽의 색들을 보면 정열적이고 따뜻한 느낌이 강한 반면, 오른쪽의 색들은 우아하면서도 약간 차가운 느낌을 준다. 이렇게 느낌이 다른 색을 잘 조화시켜 주면 인접색 내에서도 풍부한 표현을 할 수 있다.", "노란색의 인접색은 녹색과 오렌지색이다. 노란색 계통의 인접색 배치는 숲이나 나무, 새싹과 같은 자연의 느낌을 준다. 따라서 이런 인접색의 대비는 사무실이나 아이들 방과 같은 인테리어나 봄철의 의류 등에 많이 사용된다. 실내가 자연스럽고 온화한 색체로 이루어져 있으면 오래도록 질리지 않으며, 사람들의 마음을 편안하게 해준다. 그런데 노란색을 중심으로 좌우에 인접색만 배치해 주면 따분해지기 쉬우므로, 색의 미세한 차이점들을 잘 살려주면서 좀 더 변화 있는 조화를 구현할 수 있다.", "색을 조화시킬 때는 색을 접하는 시간을 잘 고려해야 한다. 순간적으로 강하게 압도해야 할 부분에는 가능한 한 대비를 많이 주어서 눈에 띄게 해야 하고, 오랫동안 은은하게 지속해야 할 부분에는 대비 효과가 많이 나지 않도록 해야 한다. 녹색은 안정된 느낌이, 오렌지색은 발랄한 느낌이 더 강하다. 녹색과 오렌지색은 같은 노란색의 인접색이라고 하기 어려울 정도로 색상의 차이가 많이 난다. 하지만 차이점과 공통점들을 구별해서 잘 조화시켜 주면, 색의 조화와 변화를 능수능란하게 조절할 수가 있다. 비슷한 것들 속에서 차이를 만들어내고, 다른 것들 속에서 연속성을 만들어내는 능력은 색채를 다루는 데 있어 가장 중요한 자질이다.", "파란색 계통의 인접색은 다른 인접색에 비해서는 색상 간의 차이가 좀 많이 나는 편이다. 보라-파랑-초록 보라와 초록은 인접색이지만 색과 색의 거리가 다소 넓은 편이기 때문에 연속적이기보다는 대비가 강해 보인다. 이런 색의 배치는 홈페이지나 패션에서 주로 많이 활용하는데, 시원하면서도 안정된 느낌을 준다. 색상 간의 차이가 많이 나는 편이기 때문에 차분하기보다는 변화가 많이 느껴진다.", "파란색으로 통일된 디자인은 전체적으로 색 이미지가 강하다. 그래서 자칫하면 색감이 단조로워질 위험이 있다. 그럴 때 각각의 파란색들을 명도차이나 채도 차이가 많이 나게 배색하면 통일된 가운데에서도 풍성한 느낌이 난다. 3장 보색대비", "사람들 사이에 궁합이 있는 것처럼 색에도 궁합이 있다. 보색은 서로의 성격이 극과 극으로 다른 색들을 말한다. 보색은 서로의 시각적 반발력이 심하기 때문에 오히려 서로를 돋보이게 만든다. 그래서 디자이너가 자기의 개성을 마음껏 표출시키고자 할 때 대단히 유용하게 사용되는 것이 바로 보색이다. **221** 보색 대비를 이루는 색들은 자석처럼 서로의 색을 튀게 하면서도 하나의 덩어리로 응집된다. 반발하는 만큼 서로 견고하게 결합되는 것이다. 이것이 보색 대비의 묘미요, 힘이다. 그래서 색의 조화를 깨뜨리지 않으면서 시각적으로 강한 이미지를 주려고 할 때 보색 대비를 많이 쓴다.", "노란색과 보라색은 보색 대비 가운데서도 가장 세련된 느낌을 준다. 생상 대비와 명도 대비가 동시에 이루어지기 때문에 그렇다. 노란색은 유채색 중에서 가장 명도가 높아서 앞으로 강하게 진출하고, 보라색은 명도가 낮아서 차분하게 안으로 침잠한다. 노란색과 보라색은 대비가 심한 색이지만 각각 특성이 다르기 때문에 서로 반발하면서도 보완한다.", "파란색과 오렌지색의 대비는 산뜻한 느낌을 준다. 오렌지색은 명도는 높으나 인접색인 노란색이나 빨간색에 비해 적극적으로 진출하는 색은 아니며, 강하기보다는 따뜻하면서도 귀여운 느낌을 준다. 반면에 파란색은 명도는 상대적으로 낮으나 앞으로 진출하려는 힘이 있는 색이다. 밝은 색은 차분하고 어두운 색은 활발한 느낌을 주는 것이 이 보색 대비의 특징이다. 파란색과 오렌지색의 대비는 젊고 활동적인 느낌을 준다.", "자연에서 가장 많이 볼 수 있는 색은 파란색이다. 그래서 파란색은 녹색 다음으로 자연을 느끼게 해주는 색이다. 파란색과 오렌지색은 다른 색에 비해 기능적으로 많이 쓰이는 색으로, 주로 바다와 관련된 물건이나 시설에서 많이 발견할 수 있다. 구명조끼나 우주선 조정사의 옷이 오렌지색인 것은 바다에 빠졌을 때 눈에 가장 잘 띄기 때문이다.", "빨간색과 녹색은 대비가 심한 보색이지만 명도 차이가 많이 나지 않기 때문에 같은 면에 대비되었을 때 눈을 번쩍거리게 하는 불편함을 주기 쉽다. 게다가 빨간색이나 녹색의 조합은 왠지 답답한 느낌을 준다. 이것은 생상의 조화가 가져다주는 인상에 관한 문제인데, 빨간색은 화려하게 피려고 하는 반면에 녹색은 그 화려함을 촌스러운 쪽으로 유도하는 경향이 있다. 이 보색 대비는 아주 가정적이고 따뜻한 느낌으로 마음을 사로잡는 특징이 있다.", "사진의 색과 다른 그래픽 요소의 색이 서로 조화를 이루면 강한 인상을 줄 수 있다. 따라서 현실감이 강한 사진으로 디자인할 때는 사진 그 자체에 빠져들지 말고, 전체적인 색의 톤을 잘 파악해서 디자인 요소의 색을 조화시켜 주면 훌륭한 디자인을 만들어낼 수 있다. 4장 명도", "명도는 색을 드러나게도 하고 색을 규정하기도 하면서 색의 본질을 담당한다. 특히 복잡한 색들을 조화시킬 때 대단히 중요한 역할을 하는데, 명도를 배색의 기준으로 잡으면 아무리 혼란스러운 색들이라도 쉽게 조화시킬 수 있다.", "색을 조화시키는 열쇠, 명도 흑백 사진이나 흑백 영화, 연필 소묘를 보면 모든 색의 세계는 밝음과 어두움으로 환원할 수 있다는 것을 알 수 있다. 색이 없는 세계는 가능하지만 명암이 없는 세계는 있을 수 없다. 따라서 색보다는 명암이 좀 더 본질적인 것이라고 말 할 수 있다. 이런 이유에서 그림 공부를 처음 시잘할 때, 검은색 연필이나 목탄을 사용하여 명암 세계를 표현하는 석고 데생부터 배운다. 명암의 세계를 먼저 익혀야 그 위에 색의 세계를 펼쳐나갈 수 있기 때문이다. 고차원의 조형 세계에서 정신적 가치를 가장 극대화하기 위해 색을 일부러 피하는 경우가 있다. 동양의 산수화나 서예는 가장 정제된 정신성을 구현하기 위해 검은색 먹만 사용한다. 심오한 본질을 드러내기 위해서는 아무래도 형형색색의 풍부한 색보다는 절제된 색이 더 적합하기 때문이다.", "명암에서는 말 그대로 밝고 어두운 정도, 즉 명도가 중요한 기준이 된다. 명도는 밝고 어두운 것에만 관계할 것 같지만, 사실 색을 조화시키는 중요한 역할을 한다. 노련한 색 감각을 가진 디자이너들은 미세한 명도 차이를 이용해 다양한 색들을 수월하게 다룬다. 색은 음악의 음색처럼 파란색이나 빨간색 등으로 개성을 보여주는 반면, 명도는 음악에서 음높이처럼 색의 위계질서를 분명히 하여 밝기의 기반을 닦는다. 빨간색과 녹색이 보색으로서 강하게 대비될 때, 두 색의 명도 차이가 거의 없으면 색의 대비감이나 그에 따른 조화의 정도가 약해져 안정된 조화를 이룰 수 없다. 반면에 남색과 오렌지색 같이 명도를 적절히 조절해 주면 보색의 강한 대비와 더불어 명도 대비가 이루어지기 때문에 전체적으로는 강하면서도 안정된 색의 조화를 이룰 수 있다. 아무리 좋은 색을 쓰더라도 명도가 한쪽으로 치우치거나 밝기의 단계가 일정하지 않다면 색은 잘 어울리지 못한다. 명도는 색의 조화를 이루게 해주는 중요한 관점이자 방법이다.", "디자이너가 색의 명도를 미세한 단계로 나누어 파악할 수 있다면, 색을 더욱 정밀하게 다를 수 있을 뿐만 아니라 색들을 쉽게 조화시킬 수 있다.", "색의 명도 단계를 잘 다루기 위해서는 먼저 흑백의 명도 단계를 미세하게 다룰 수 있어야 한다.", "명도의 단계가 두드러지는 것이 좋은 것만은 아니다. 때로는 명도 차이를 일부러 적게 해서 은은하고 신비로운 느낌을 표현해야 할 때도 있다. 만약 부분의 명도차를 분명하게 구분해버리면 명료하기는 하지만 신비로운 느낌은 감소된다. 이런 점에서 디자인은 항상 상대적이므로 디자이너는 분위기 파악을 잘해야 한다.", "색상, 채도, 명도의 세 가지 변수는 색을 체계화하는 가장 중요한 기둥이다. 그러므로 디자이너는 반드시 이 세 가지 기준을 확립하여 다양한 색의 세계를 다룰 줄 알아야 한다.", "색의 조화에서 밝기의 역할 화려한 색이 눈을 더 자극할 것 같지만, 사실 우리 눈에는 명도가 우선이다. 색과 색이 만날 때 명도 차이가 뚜렷하면 조형적으로 혼란스럽지 않고 색이 서로 잘 어울린다. 색상 대비는 심하지만 명도 차이가 나지 않으면 색은 조화를 이루지 못한다. 색상 대비가 심한 경우 명도 차이가 많이 나지 않으면 번쩍거리는 현상이 생겨 눈이 피로하고 불쾌해진다.", "검은색과 흰색 그리고 어울림 흰색이 주는 맑고 깨끗한 느낌은 색이 결핍되어 있다기보다는 하나의 색으로서 모자람이 없다. 그래서 디자인에서 흰색은 디자이너의 감각을 구현하는 중요한 색의 표현으로 애용된다. 흰색은 색이 들어가지 않은 상태를 의미하지만, 여기서 흰색은 아무런 느낌을 주지 않는 것이 아니라 매우 청결하고 우아한 분위기를 조성한다. 흰색으로 비워져 있는 것이 아니라 우아하고 멋있는 흰색으로 가득 채워져 있는 것이다.", "물이나 공기처럼 흰색은 아무리 오래 보아도 질리지 않는다. 그래서 대개 내구성이 좋아서 오래 쓰고 많은 사람들에게 노출되는 디자인에 흰색을 많이 사용한다. 흰색을 옷에 사용하면 상징성을 갖게 된다. 우리 민족은 백의민족으로서 성스러운 이미지를 스스로 부여하고 있으며, 결혼식과 같은 특별한 경우에도 흰색을 사용한다. 또한 성직자나 초월적인 힘을 가진 존재, 종교적 절대자, 학자 등 뭔가 현실을 넘어서 있는 사람들은 대개 흰색 옷을 입는다.", "검은색은 독립적이라는 점과 오래 봐도 질리지 않는다는 점 그리고 초월적이라는 점에서 흰색과 많은 부분 일치하지만, 색의 인상은 반대되는 점이 많다. 검은색은 차분하고 무거운 느낌이 있지만 어떻게 사용하는가에 따라 현대적이고 세련된 느낌을 가진다.", "영화에 나오는 드라큘라나 저승사자 등은 모두 검은색 옷을 입고 있다. 이처럼 검은색은 삶보다는 죽음을 연상시키므로 옷에서는 부정적인 성격을 갖는다. 하지만 샤넬의 패션 디자인에서는 그러한 무거움보다는 부유함, 여성스러움, 나아가서는 섹시한 관능미가 느껴진다. 색으로써 검은색의 이미지는 이처럼 이중적이고 복합적이다. 한마디로 정의할 수 없는 다양한 인상을 함축하고 있는 것이 검은색의 매력이다.", "흰색과 검은색의 어울림 이 세상에서 가장 강한 대비를 이루는 색은 무엇일까? 그것은 바로 흰색과 검은색이다. 앞서 살펴본 바와 같이 우리 눈에는 색체보다는 명도가 더 강하게 들어온다. 따라서 색체 대비보다는 명도 대비가 더 강하며, 명도 대비 중에서도 가장 밝은 흰색과 가장 어두운 검은색의 대비가 가장 강하다. 5장 채도", "밝고 경쾌하고 분명한 원색에 비했을 때, 이 색도 아니고 저 색도 아닌 혼탁한 색이 좋은 느낌을 주지 않는 것은 사실이다. 하지만 기쁜 듯 슬픈 듯 애매한 모나리자의 미소가 신비스러워 보이는 것처럼, 이 색인 것 같으면서도 저 색인 것 같은 묘한 느낌의 색들은 원색이 품지 못한 은근한 매력을 갖는다. 색을 오래 대하다 보면 눈을 향해 자극적으로 달려드는 원색보다는 은근한 매력을 풍기는 이런 색들이 더 좋아 보인다. 그래서 대부분의 명품들에는 맑고 투명한 원색보다는 색의 계보가 애매해 보이는 색들이 많이 사용된다.", "색을 맑고 탁한 정도에 따라 체계화하면 원색 중심의 색채 구조에서는 정리되지 못했던 색들을 모두 하나의 체계로 묶어낼 수 있다. 따라서 색상환의 체계가 색의 뼈대에 해당한다면, 채도는 이 뼈대에 붙은 근육이나 살에 해당한다고 볼 수 있다. 뼈와 살이 체계화되면서 색은 비로소 완전한 몸을 이룬다. 즉 채도는 색을 조화시키는 중요한 역할을 하며, 색을 체계화시키는 중요한 기준이 된다. 세상에는 원색이 드물다. 사람들이 보는 색은 대부분 섞인 색들이다. 따라서 원색은 관념적이고 비현실적이다. 그러므로 디자이너는 채도가 낮은 색들을 이 색 저 색이 섞인 주체적이지 못한 탁한 색으로 볼 것이 아니라, 빨간색이나 파란색과 같이 자신만의 분명한 가치를 가진 색으로 대접해 주어야 한다.", "RGB를 CMYK로 전환하면 채도가 크게 떨어진다. 왜냐하면 감산혼합은 색이 섞여서 만들어지므로, 같은 색이라도 빛이 섞여서 만들어지는 색과는 비교할 수 없을 정도로 탁해지기 때문이다. 인쇄에서는 아무리 복잡하고 화려한 색이라도 이처럼 삼원색과 검은색의 조합으로 만들어진다.", "감산혼합의 단점은 색들이 서로 섞일수록 탁해진다는 것이다. 특히 선명한 인쇄를 해야 할 때는 검은색처럼 원색 중에 일부를 별색으로 첨가하여 맑은 색의 느낌이 들도록 하는 경우가 많다.", "채도를 기준으로 해서 탁한 정도의 질서를 잡으면 채도의 단계는 보색이나 인접색처럼 색을 조화시키는 데 중요한 변수가 된다. 즉 채도가 낮은 색들은 채도가 높은 색에 대비되기 때문에 색의 어울림을 조절하는 중요한 요인이 된다.", "채도를 습관적으로 조율하기 위해서는 감각적으로 색의 좌표를 머릿속에 그릴 줄 알아야 한다. 이때 좌표란 색의 탁한 정도와 어떤 색가에 가까운지를 뜻한다. 예를 들어 어떤 색을 보는 순간 이 색은 빨간색이 가장 많이 들어 있고 파란색과 노란색이 거의 비슷한 양으로 조금 들어 있다. 또 색이 섞인 것에 비해서는 그렇게 탁하지는 않지만 어두운 것을 보면 채도를 떨어뜨리기 위해서 보색보다는 검은색을 섞어 주었다. 는 식으로 채도와 색의 성분을 파악할 수 있어야 한다.", "색채 대비에서 채도가 중요한 변수가 된다면, 디자이너들은 여러 가지 색을 자유롭게 조화시키기 위해 자기가 원하는 만큼 채도를 떨어뜨릴 수 있어야 한다. 채도가 낮은 색은 칙칙해서 좋지 않은 색으로만 생각하기 쉽다. 그러나 매력적인 중채도나 저채도 색을 주조색으로 한 명품을 보면 알 수 있듯이, 채도가 낮은 색은 오래 보아도 질리지 않으며 보면 볼수록 깊은 매력이 있다.", "검은색이나 흰색, 회색 등을 섞어주면 원래 색의 색가를 유지하면서 어두워지거나 밝아진다. 이렇게 색을 섞어주면 다른 색가가 들어가지 않기 때문에 미묘한 색의 조화를 꾀하기는 어렵지만, 채도가 낮더라도 색이 덜 탁해지고 깔끔한 느낌이 든다.", "채도에 따른 색체 공부를 제대로 하기 위해서는 수많은 색을 보고 계보를 추적해나가서 그 위치를 확인하는 노력이 필요하다. 귀찮더라도 포스터컬러를 이리저리 섞으면서 공부하는 방법은, 하나의 색이 어떠한 색의 조합으로 나온 것인지를 몸으로 확인하고 익히는 데 가장 효과적이다.", "색체 훈련이 부족한 사람은 원색을 선호하는 경우가 많다. 눈을 자극하는 색이 좋은 색인 줄 알기 때문이다. 그러나 원색은 조화되는 데 한계가 많다. 반면에 중채도나 저채도의 색은 원색에 비해 칙칙해 보이지만 다른 색과 조화가 잘 되고, 어떻게 조화되는가에 따라 세상에 둘도 없는 명품의 색이 되기도 한다. 채도가 낮은 색들도 서로 인접하는 색끼리 배치하면 원색의 경우와 마찬가지로 크게 두드러지지는 않지만 오래 보아도 질리지 않는 우아한 맛이 난다.", "보색 대비는 가장 강렬한 색의 대비이지만, 그만큼 시각을 점유하는 시간이 짧다. 처음에는 강하지만 오래 보면 질리기 쉽기 때문이다. 그러나 색의 채도를 떨어뜨려서 보색 대비를 해주면 색의 대비가 두드러지면서도 우아하고 차분한 느낌을 주기 때문에 오래 봐도 질리지 않는다. 6장 다양한 색의 어울림", "빨간색과 노란색은 따뜻한 느낌의 원색이지만 서로 대비가 심하지는 않아 자주 같이 쓰인다. 빨간색과 노란색만을 사용할 경우 색의 채도가 너무 강해서 튀기도 하지만 두 색이 자연스럽게 하나의 덩어리가 되기 어려우므로, 면적이 가장 넓은 곳에 빨간색과 노란색의 중간쯤 되는 황토색을 넣어줌으로써 전체적으로 인접색처럼 자연스럽게 연결했다.", "색을 안정되게 조화시킬 때는 무난한 색의 연결 속에서 변화를 꾀하는 것이 중요한 것처럼, 대비가 심한 색을 조화시킬 때도 변화 속에서 안정감을 구축하는 것이 중요하다.", "보색은 아니더라도 색의 채도가 원색에 가깝게 높으면, 색의 개성이 강해서 모든 색들이 두드러진다. 이런 색들이 서로 안정되지 않으면 그야말로 유치하게 튀므로 채도를 유지하면서 원색을 안정시켜 주는 것이 중요하다. 원색은 나름대로 고유한 밝기가 있다. 예를 들어 노란색은 원색들 중에서 가장 명도가 높으며, 보라색이나 파란색은 상대적으로 어두운 색이다. 이런 원색의 명도를 잘만 이용하면 명도나 채도를 각각 다르게 낮추어 주거나 높이지 않아도 안정되게 할 수가 있으며, 그 결과 강한 색의 조화를 얻을 수 있다.", "색이란 상대적이어서 주변에 어떤 색이 오는가에 따라 부각될 수도 있고, 묻힐 수도 있다. 따라서 색을 조화시킬 때는 색의 관계를 잘 따져서 적절한 대비를 이룰 수 있도록 조절해 주어야 한다. 전체적으로 안정되면서 부분적으로 두드러지게 하고 싶을 때는 중명도, 중채도의 색을 저명도와 저채도의 색에 대비시키는 것이 좋다. 차분하면서도 명료한 색의 조화를 얻을 수가 있기 때문이다. 반대로 전체적으로 부각되면서 부분을 두드러지게 하고 싶을 때는 고명도, 고채도의 색에 중명도와 중채도의 색을 조화시키면 된다."]}, {"title": "좋아 보이는 것들의 비밀, Good Design (5장)", "author": "최경원", "genre": "디자인, 미술, 예술", "publisher": "길벗", "passages": ["형태나 비례나 면적, 색의 채도와 명도에 관한 논리들은 하나의 디자인에 따로따로 구현되는 것이 아니다. 어떤 디자인이라도 하나의 원리만으로 디자인되는 경우는 없으며, 여러 가지 조형 원리가 함께 섞이게 마련이다. 디자인의 가치를 여러 가지 조형 원리에 근거해 세밀하게 드러내는 것은 디자이너에게 있어서 사례 분석의 차원을 뛰어넘는 중요한 학습 방법이다. 앞에서 배운 조형 논리가 기본기에 해당된다면 디자인에 대한 종합적인 분석은 현실에 기반을 두고 디자인을 풀어나가는 구체적인 방법론이 될 것이다. 뛰어난 디자인 사례들을 중심으로 조형 공부를 귀납적으로 하는 방법도 디자이너에게는 매우 효과적이다.", "필립 스탁은 아름다움과 기능성을 통일시켜야 한다는 구태의원한 슬로건에 입각하기보다는, 자신만의 특별한 디자인 세계로 대중성을 폭넓게 확보한 디자이너다. 등받이와 다리 부분의 곡선은 단순하지만 대단히 아름답게 휘어 있다. 완만한 흐름을 유지하면서 보일 듯 말 듯한 곡률의 변화는 마치 우리나라 도자기 선의 아름다운 율동을 보는 듯하다. 아름다운 곡선만으로도 조형적으로 큰 성취를 이루어 낸 디자인이라고 할 수 있다.", "성질이 다른 조형 요소들이 크게 대비를 이루기 때문에 의자는 단순해 보이지만 결코 단순한 형태가 아니다. 몸체의 넓은 면은 전체적으로 완만한 흐름을 가지고 있으나, 바닥 부분에 양쪽으로 오목하게 들어간 작은 구멍은 시각적인 포인트가 되어 전체 형태를 적잖이 긴장시킨다.", "필립 스탁의 디자인은 대부분 명도가 아주 높고 채도가 떨어지는 색으로 이루어지는 경우가 많다. 이 의자도 아주 밝은 저채도 크림색으로 되어 있다. 형태의 우아함을 위해서 완만한 곡선과 곡면을 사용한 것과 마찬가지로, 우아한 색감을 위해서 명도가 높고 채도가 낮은 색을 사용하고 있다. 명도가 높으면 색의 느낌이 경쾌해지고, 채도가 낮으면 오래 보아도 질리지 않고 고급스러워진다. 높은 명도와 낮은 채도로 인하여 의자는 경쾌하면서도 우아한 느낌을 주는 것이다. 필립 스탁의 디자인이 유머러스하면서도 결코 저속하지 않고 우아함을 끝까지 유지할 수 있는 것은 색의 역할이 크다. 필립 스탁의 디자인에서 배워야 할 점은 단순한 형태 안에 많은 의도들을 압축해서 넣는 능력도 능력이지만, 무엇보다 자신의 의도를 살짝 감춤으로써 오히려 오래도록 사람의 마음을 사로잡는 것이다. 과하지도 모자라지도 않는 선의 흐름이나 연한 색상 등은 모두 그러한 태도에 따른 결과들이다. 유머와 우아함은 유행에 관계되는 것이 아니라 사람들의 보편적인 정서와 관계된다. 그래서 그의 디자인은 성별과 국경, 시간을 넘어서 광범위한 인기를 획득하는지 모른다.", "루이지 꼴라니의 천재성은 '순수미술과 디자인', '표현의 자유와 기능성에 따른 제약', '기능과 형태'처럼 서로 모순되는 것을 탁월한 조형 능력으로 조화시키는 데 있다. 기능성과 형태미 중에서 한쪽을 선택해야 했던 1980년대에 루이지 꼴라니는 이러한 기괴한 이분법을 가뿐히 뛰어넘었고, 그 모습은 전 세계의 산업 디자이너들에게 매우 충격적이었다.", "가느다란 파이프로 된 손잡이 가드 부분 또한 눈길을 끈다. 운전하는 사람이 차에 오르내릴 때 안전을 고려하여 만들어진 이 부분은 기능적이기도 하지만 조형적인 면에서도 뛰어나다. 우선 선적 구조여서 입체의 느낌이 강한 트럭 전체 형태를 압도하지 않으며, 또한 한 편에만 있기 때문에 좌우대칭의 균형을 조용하게 깨고 있다. 이러한 비대칭성은 조형적인 답답함을 해소해 주는 중요한 역할을 한다.", "전체 몸체는 흰색과 검은색으로 강한 대비를 이룬다. 맨 위의 역삼각형 부분과 아래의 헤드라이트 부분은 좁은 어두운 면과 넓은 흰색 면이 대비를 이루고, 앞창과 그 주변은 어두운 색을 주조로 하여 아주 좁은 흰색 면과 대비를 이룬다. 하나의 덩어리에서 이렇게 대비관계가 번갈아 들어가 있기 때문에 조형적으로 강한 인상을 준다. 루이지 꼴라니의 디자인이 시간을 초월해서 항상 신선함을 유지하는 이유는 형태의 독창성을 바탕으로 구조가 짜임새 있게 구축되어 있기 때문이다.", "그는 항공역학을 공부한 엔지니어 출신이다. 그는 어떤 디자인이든지 현실적인 근거를 바탕으로 시작한다고 한다. 겉으로 보기에는 무척 파격적인 모양이지만, 그 파격의 바탕에는 튼튼한 공학적 지식과 의도가 자리를 잡고 있는 것이다. 바로 이런 이유 때문에 루이지 꼴라니의 디자인은 단지 기괴하고 신기한 모양이 아니라 현실적인 문제에 대한 권위 있는 해결책으로서 그 존재 의미를 가진다.", "홈페이지 디자인을 새로운 매체가 아닌 하나의 조형물로 본다면, 일반적인 조형논리가 통용되는 지극히 보편적인 조형적 대상이라는 것을 느낄 수 있을 것이다. 에프터랩 홈페이지 디자인은 비례나 대비, 색채의 조화가 잘 이루어진 좋은 디자인이다. 전체 조형의 첫인상은 자로 잰 듯이 정리되었다기보다는 여러 가지 형태 요소가 자유롭게 배치되어 있어서 역동적이다. 형태가 역동적일 경우 자칫 통일감이 떨어져서 조형의 조직력이 약해지고 산만해지기 쉽지 화면을 관통하는 뼈대, 즉 구조나 구도가 튼튼하게 자리를 잡고 있으면 각 요소들은 서로 밀접하게 조직화되어 시각적으로 혼란스럽지 않게 된다.", "일반적으로 디자인에서 주요한 조형 요소는 두드러지게 하고 그렇지 않은 부분은 차분하게 해주는 것이 상식이다. 그런데 여기서는 화면의 주인공이라고 할 수 있는 사람은 검은색에 가까울 정도로 어둡게 처리하고, 바탕은 일반적인 배색 방법과는 반대로 노란색과 흰색으로 처리했다. 색 때문에 두드러져야 할 부분은 가라앉고 가라앉아야 할 부분은 두드러짐으로써, 형태가 역동적인 부분은 오히려 색의 의해 차분해진다. 이 같은 중화작용에 의해서 전체 화면의 구성은 파격적이지만 안정감을 유지한다.", "스기우라 고헤이의 편집디자인 우선 색체를 보면 노란색과 빨간색이 주조를 이루고 있음을 알 수 있다. 중간에 파란색이 사진이나 글자에 부분적으로 들어가 있어서 전체적인 포인트가 되기도 하고 전체 색상을 풍부하게 만들고 있기도 하다.", "이 디자인에서 비례는 색체와는 달리 대비가 심한 비례를 기본으로 채택하고 있다. 크게 위, 아래 여백과 본문이 들어가 있는 가운데 부분으로 나누었고, 가로로도 비슷한 구조로 나누고 있다. 여기서 각각의 공간들은 대체로 3:1이나 4:1 정도의 비례로 나뉘어져 있어서 상대적으로 대비가 심하다. 그래서 색채의 안정된 조화와는 달리 전체 레이아웃은 시각적으로 강한 인상을 만들고 있다. 물론 본문이나 사진이 들어가 있기 때문에 2:3이나 3:4와 같은 황금비례를 구사하기는 좀 어려웠을 것이다.", "결과적으로 가독성이 최대한 확보된 시원한 공간을 두면서 본문의 내용이 사진 이미지와 더불어서 내용 전달이 잘 될 뿐만 아니라 시각적으로도 매우 보기 좋은 상태를 연출하고 있다. 변화를 준답시고 디자인한 것이 전체의 균형을 깨버리면 모든 것을 잃게 된다. 변화가 없으면 그것도 문제이지만, 이처럼 변화를 주더라도 전체의 구성을 고려하여 꾀해야 한다. 그리고 그 결과 또한 목적하는 바를 충분히 얻는 것이어야 한다. 그 외에도 글자꼴이나 크기, 배열 등이 개성적이면서도 기본을 충실히 지키고 있다. 이 디자인에서 배워야 할 점은 기본의 중요성이다. 아무리 개성이나 기교 등이 중요하다고 하더라도 탄탄한 기본기 위에 실현되었을 때 의미가 있다는 사실이다.", "다나카 이코의 포스터 제한된 공간에 모든 것을 표현해야 하는 것은 어떤 면에서는 제약이지만 어떤 면에서는 자유일 수도 있다. 소설에 비해 시가 훨씬 더 함축적 이미지로 감동을 주는 것을 보면 표현의 공간은 그리 중요한 것이 아님을 알 수 있다. 디자인에서도 책표지나 포스터와 같이 한 면에 모든 것을 표현해야 하는 분야가 있다. 조형적으로 보더라도 이런 분야는 많은 것을 단순한 형태와 색으로 표현해야 하기 때문에 어렵긴 하지만 재미있다.", "전체 비례는 윗부분과 아랫부분이 가로선에 의해 약 2:3.5 정도로 나누어져 있어서 황금비례에 가까운 구성을 하고 있다. 윗면이 상대적으로 좀 더 넓은 데, 그것은 제목과 그 위에 있는 검은색 윤곽이 들어가기 때문에 정확한 황금비례보다는 좀 더 위를 넓게 한 것이다. 가로로는 좀 더 대비가 심한 비례를 이루면서 구성되어있다. 특히 왼쪽 측면을 좁게 하고 청록색을 배치하여 오른쪽의 검은색 윤곽과 흰색면의 조형적 무게감을 대응시키고 있다. 결과적으로는 왼쪽과 오른쪽의 이미지들이 부딪히면서 강렬한 이미지를 만들게 되었다. 아무튼 비례미를 통해 조형적인 아름다움을 꾀하려는 의도는 충분히 읽을 수 있다. 이 디자인에서 좀 눈여겨 보아야 할 부분이 있다. 기하학적이거나 정형적인 조형요소들과 붓글씨 제목이나 먹의 윤곽같이 비정형적인 조형요소들이 서로 대비를 이루고 있다는 사실이다. 시적 표현이란 것은 바로 이런 것을 말한다. 나머지 글자나 보조선들은 대체로 기하학적이거나 정형적인 형태들로 디자인하여 비정형적인 형태들을 돋보이게 하기도 하고 자칫 무질서해질 수도 있는 구조를 전체적으로 안정시키고 있다. 다나카 이코의 포스터는 단순한 포스터처럼 보이지만 그 안에는 형태의 구조나 색체 그리고 화면의 비례에 대한 다양한 시도가 녹아 있다.", "안나G 우선 색깔부터 살펴보자. 이 디자인이 단순한 것 같아도 눈에 잘 띄는 것은 색 대비가 강하기 때문이다. 얇은 목의 오렌지색, 그 아래쪽으로 넓은 파란색이 강하게 대비되고 있다. 저녁노을에서 볼 수 있는 교과서적인 보색 대비이다. 전체적으로 오렌지색의 비중이 미미하긴 하지만 보색 대비의 효과는 이 정도로도 충분하다. 게다가 오렌지색의 목 위로는 은색의 금속 색깔이 대비되고 있다.", "질감을 살펴보면 금속과 플라스틱의 소재도 적절하게 대비시켜 심미감을 극대화시키고 있다. 번쩍이는 금속을 얼굴과 팔에 두고, 나머지 플라스틱 부분은 일부러 광택이 나지 않게 표면처리를 해서 대비시키고 있다. 단순한 것 같지만 이런 대비감은 우아한 분위기와 편안한 분위기, 어쩌면 서로 모순되는 분위기를 만드는 데에 크게 일조하고 있다.", "전체비례 즉, 머리와 목 부분과 그 아래 부분은 약 2:3정도의 황금비례로 나뉘어 있다. 길이들이 그냥 나누어진 게 아니라 시각적으로 아름답게 보이도록 철저히 계산된 결과인 것이다. 이런 비례 값들을 가지고 있기 때문에 단순하지만 아름다워 보이는 것이다. 부분의 비례들도 같은 원리로 나누어져 있다. 대체로 2:3이나 3:4의 황금비례가 적용되고 있다.", "두바이 오페라 하우스, 자하 하디드 건물 표면을 감싸고 흐르는 유연한 곡면들이 가장 먼저 눈에 들어온다. 기하학적 형태로 이루어진 건축물들과는 달리, 이렇게 곡면들로 이루어진 형태들은 구조나 비례보다는 곡면의 운동감을 중심으로 디자인된다. 그래서 건물을 이루고 있는 다양한 곡면들이 어떤 유기적 관계들을 가지고 있는가를 먼저 잘 살펴보아야 한다. 특히, 여러 가지 방향에서 곡면의 구조적 관계를 입체적으로 살펴볼 필요가 있다.", "이 건축물 위로는 다양한 흐름을 가진 곡면들이 서로 역동적인 관계를 이루고 있다. 건물의 중심 동세를 이루고 있는 곡면과 부분적인 동세를 이루고 있는 곡면들을 따로 구분해서 살펴보면 그 관계를 좀 더 쉽게 이해할 수 있다. 자하 하디드의 뛰어난 점은 강하면서도 무질서해 보이는 이미지 속에 견고한 질서를 심어놓는 것이다. 결코 카오스적 이미지에 형태를 방치하지 않는다. 수학전공자답게 그녀는 자신의 디자인을 철저히 계산한다. 그 증거가 바로 건물의 조형적 중심을 잡는 곡면의 동세들이다.", "부분적인 곡면들의 자유로운 움직임들은 전체 형태에 매우 강렬한 이미지를 심고 있으며, 부분적인 곡면들의 동세가 중심 동세로 수렴되는 조화로움은 전체 형태에 견고함을 가져다주고 있다. 막 만든 것 같지만 따지고 보면 이렇게 전체와 부분의 관계가 고도의 조형논리로 구성되어 있는 것이다. 아무리 개성이 강하고 자유로운 형태를 지향한다고 하더라도 형태의 구조적 완성도는 결코 무시할 수 없으며 과격한 감정마저도 철저히 계산된 구조로 표현해야 한다는 교훈을 자하 하디드의 건축은 잘 들려주고 있다.", "네빌 브로디의 나이키 광고 일반적으로 그래픽 디자인에서 문자는 의미를 담는 그릇으로서, 사람들에게 제대로 전달하는 것을 중요한 목표로 한다. 그런데 이 광고에서는 문자가 마치 말을 하는 것처럼 배치되어 있어서 글의 뜻보다는 리듬이 먼저 느껴진다. 문자가 읽혀지는 것보다는 소리의 톤과 뉘앙스가 전달되는 데 초점을 맞춘 듯하다.", "양쪽 페이지를 가로지르는 커다란 글자들은 전체 디자인의 가장 중심을 이룬다. 이 글자가 전체 디자인의 중심을 잡으면서 나머지 중간 크기나 작은 글자들이 하부 구조를 형성한다. 여기서는 주로 세로 글자들이 하부 구조를 이룬다. 복잡한 것 같아도 거의 모든 글자들은 씨줄과 날줄처럼 수평과 수직으로 직교하면서 짜임새 있는 구조를 형성한다.", "색을 보면 왼쪽 페이지는 검은색 바탕에 흰색 글자가 명도 대비를 이루고, 오른쪽 페이지는 흰색 바탕에 검은색 글자로 디자인되어 있다. 문자와 바탕의 명도 대비가 서로 교차되어 있기 때문에 두 페이지를 동시에 보면 양쪽 면이 강한 명도 대비를 이룬다. 이런 무채색의 대비 속에서 빨간색 나이키 마크와 'zap'이라는 단어는 크기가 작지만 디자인에 활력을 불어넣는다.", "복잡한 조형 요소들은 리듬에 의해 하나의 덩어리로 통일된다. 비례도 빨간색 선을 보면 알 수 있듯이 가로 면이나 세로 면 모두 단조롭지 않고 적절하게 나뉘어 있다. 왼쪽 페이지에서 면의 넓고 좁은 정도는 거의 황금비례와 유사한 반면, 오른쪽 페이지에서는 심한 대비를 보여준다. 위아래의 비례도 넓없다 좁았다 하면서 활발한 리듬을 만든다. 실험적일수록 기본에 더 충실해야 실패하지 않는다는 값진 교훈을 배울 수 있다. 디자이너가 조형적 실험을 하지 않으면 새로운 것이 나올 수 없고, 새로운 것에 치중하다 보면 기본을 놓치기가 쉽다. 이런 모순 속에서 네빌 브로디는 디자이너가 갖추어야 할 태도나 실력에 대한 많은 시사점을 던져준다.", "드리스 반 노튼 패션디자인 전자제품일 경우에는 비례와 대비같은 원리가 주가 되지만 색의 원리는 그다지 큰 비중을 차지하지 못하는 반면, 패션 디자인에서는 형태보다 색의 원리가 차지하는 비중이 더 크다. 그래서 색의 원리를 설명할 때는 패션 디자인을 사례로 많이 인용한다. 그래픽 디자인에서는 비례, 정리, 대비, 색 등의 조형 원리가 비교적 골고루 중요하게 다루어진다. 형태부터 간단하게 살펴보면 상의의 구조는 좌우 비대칭을 이룬다. 오른쪽 부분은 길고 좁은 검은색 면으로 나뉘어 불균형을 이루지만 상의 아랫단의 파란색 면에 의해 기우뚱하게 균형을 잡는다. 목 부분도 비대칭으로 파여 있고 안쪽에 받쳐 입은 파란색 부분이 좁은 면으로 나뉘어서 조형적 포인트가 된다. 검은색 허리띠는 넓은 면의 상의와 하의에 비해 좁은 면으로 대비를 이룸으로써 전체적인 비례를 조형성 있게 만들어 준다. 이 패션 디자인은 상의와 하의가 명도 대비, 채도 대비로 크게 대비를 이룬다. 상의는 비교적 채도와 명도가 높은 녹색과 파란색으로, 하의는 명도가 아주 낮고 채도도 어떤 색인지 알아차리기가 힘들 정도로 낮은 색으로 되어 있다. 명도와 채도가 낮은 색은 무겁고 후퇴해 보이므로 하의에 이런 색상을 사용함으로써 전체 형태는 안정감을 갖는다.", "상의에는 명도 대비, 채도 대비, 보색 대비 등이 골고루 중층적으로 이루어져 색의 역동성을 느끼게 해준다. 하의는 저명도와 저채도 색의 가장 넓은 면적으로 이루어져 있어서 상의 색들의 변화를 안정감 있게 받쳐주는 역할을 한다. 다이내믹한 색의 조화에도 불구하고 차분하고 안정된 느낌을 주는 것은 하의의 역할 때문이다. 이처럼 겉보기에는 색과 형태가 복잡해 보이지 않은 디자인일지라도 그 내용을 자세히 분석해 보면 매우 복잡하게 구성되어 있다. 디자인이란 이 같은 복잡한 내용을 단순하게 소화해내는 능력이라고도 할 수 있다.", "조르지오 아르마니 패션 디자인 아르마니 패션 디자인의 특징은 형태가 뿜어내는 강력한 인상보다는 형태를 빌어 발휘되는 우아하고 기품 있는 분위기에 있다. 아르마니 디자인의 조형적 특징은 조형 요소가 많지 않고 장식적인 부분이 별로 없으며, 중 저채도의 색을 많이 쓴다는 점이다. 형태가 단순해지면 조형적인 재미를 주기가 어렵고 디자이너의 개성이 표출될 수 있는 여지도 적어진다. 이런 단순한 형태를 디자인할 때 디자이너들은 단지 몇 안되는 조형 요소와 비례, 실루엣만으로 모든 표현을 함축해내야 한다. 아르마니 디자인의 핵심은 선에 있다. 아르마니 정장에서는 단순하고 단아하면서 우아한 곡선의 아름다움이 강하게 느껴진다. 형태가 단순해지면 변화를 줄 수 있는 부분은 비례나 선 밖에는 없다. 선의 인상이 디자인 전체의 인상을 규정하게 되고, 디자인의 묘미도 선에 함축된다.", "종묘 재래복 우리의 한복이 그렇듯이 종묘제례복의 실루엣도 위에서 아래로 내려올수록 넓어지기 때문에 우아한 느낌을 주고 조형적으로 안정감을 준다. 머리에 쓴 관은 수직적인 느낌이 강해서 상체의 조형적 느낌을 좁고 길게 유도한다. 목 뒤에서 어깨를 거쳐 손으로 내려오는 부드러운 선은 팔꿈치 근처로 내려올수록 넓어지고 긴 소매를 따라 하의까지 연결된다. 모든 변화의 요소들이 다리 근처로 모아져서 하체 부분의 조형적 비중을 무겁게 한다. 무게가 아래에 모여 있기 때문에 시각적으로 역시 안정되어 보인다. 소매와 하의의 흰색 선은 가늘지만 강한 면적 대비를 이루므로 조형적으로 숨통을 틔어준다. 하의에서는 반대로 넓은 흰색 면에 좁은 검은색 면을 사용하여 반전된 면적 대비를 이룬다. 그 결과 전체 조형적 인상은 제례복으로서의 엄숙함과 구름처럼 가벼운 느낌을 동시에 준다.", "빨간색은 검은색과 흰색을 오가면서 색의 분위기를 화사하고 발랄하게 해준다. 보통 빨간색이 들어가면 모든 분위기가 빨간색을 중심으로 수렴되는 경우가 많은데, 여기서는 검은색과 흰색을 뒷받침하면서 귀족적 품위를 구현하고 있다. 검은색 가죽신은 전체적인 색의 조화를 깔끔하게 마무리 짓는다. 면적이 넓지는 않지만 아랫부분의 흰색 톤과 강한 면적 대비를 이루면서 윗부분의 검은색과 함께 어울리며 전체 색 조화를 마무리하는 역할을 한다. 종묘제례복은 빨간색에 대한 일반적인 정의, 즉 정열적이고 섹시하고 뜨겁다는 느낌에서 완전히 벗어났다. 단일한 색에 대한 사전적 정의가 얼마나 허술한지 이런 색 조화를 통해 확인할 수 있다.", "태극기의 조형성 분석 태극기의 중심에서 정열적인 빨간색과 시원한 파란색이 모여 원을 이룬다. 삼원색에 속하는 파란색과 빨간색은 시선을 끌기에는 충분히 강하지만, 보색관계는 아니기 때문에 긴장감을 유발하지 않고 우아한 대비를 이룬다. 게다가 전체 형태가 곡선으로 이루어졌기 때문에 조형적인 인상이 부드럽다.", "태극기에서 흰색은 상당히 중요한 역할을 한다. 특히 빨간색 셔츠와 매치될 때는 강한 빨간색이 가지는 답답한 느낌을 상쇄해 주어서 전체적으로 세련된 이미지가 구축될 수 있도록 해준다.", "어디 태극기뿐이겠는가? 아직도 우리 주위에는 선입견에 묻혀서 빛을 발하지 못하는 디자인들이 얼마나 많은지 모른다. 이런 것들을 하나 하나 따져서 가능성 있는 조형으로 등재시키는 일도 디자인 공부를 하는 사람들이 해야 할 의무다. 그러므로 평소에 사물의 조형성을 잘 살펴 관찰하는 노력이 무엇보다 필요하다.", "우리나라 디자인의 다소 소극적인 모습은 디자인 교육에서도 비슷한 양상을 보인다. 디자인 교육은 대부분 '산업'이라는 주어진 상황에 얼마나 무리 없이 적응하는가에 맞춰져 있었다. 그러다 보니 디자이너의 개인 역량을 바탕으로 새로운 영역을 개척하는 돌파력은 오히려 제한되는 경우가 많고, 항상 외부 상황의 변화에만 민감한 그런 모습을 자주 보여왔다. 디자인 자체의 경쟁력이나 전망을 만들어내려는 의지가 없이 모든 교육의 실마리를 외부에 둔다면, 디자인은 항상 시대에 수동적으로 반응할 수밖에 없다. 그것은 결국 유행이나 사회적 추세를 빙자한 모방으로 귀결될 뿐이며 효율성이 없는 노력만을 투여하게 되어 결국 디자인의 경쟁력을 제대로 갖추기 어렵게 된다.", "따라서 지금부터 디자이너들은 정신을 바짝 차리고 남이 도저히 따라올 수 없을 정도의 디자인 능력을 쌓는 데 모든 노력을 기울여야 할 것이다. 앞서 말한 것처럼 디자이너 자신의 경쟁력을 먼저 확보해 놓지 않고서는 어떠한 외부적 상황을 탓할 수가 없다. 디자인 능력만 뛰어나다면 모든 상황적 변화는 디자이너를 규정하는 변수가 아니라, 디자이너를 둘러싸고 있는 특수한 상황에 지나지 않을 것이다. 이렇게 되면 디자이너는 항상 상황을 제어할 수 있고, 모든 상황을 자신에게 유리하도록 이끌어낼 수 있을 것이다. 디자이너의 능력을 구성하는 가장 중요한 요소들은 조형 능력이나 창의력이다. 그러나 디자이너에게 요구되는 가장 중요한 덕목이라고 한다면, 자기가 하는 일을 사랑하고 즐기는 것이라고 하겠다. 자기가 하는 디자인에서 무한한 즐거움을 얻을 수 있는 사람만큼 디자인을 잘할 수 있는 사람은 없을 것이다. 즐거운 일이기에 자신의 모든 시간과 노력을 아낌없이 쏟아 부을 것이기 때문이다. 아무쪼록 즐겁게 디자인을 하는 사람들에게 밝은 영광이 함께 하기를 기대한다. 어두운 먹구름이 또한 그들의 앞길에 같이 하기를 기대한다. 어두운 먹구름이야말로 디자이너를 강하게 만들 것이고, 뒤이어 찾아올 밝은 영광을 더욱더 밝게 해줄 것이기 때문이다."]}, {"title": "좋아 보이는 것들의 비밀, Good Design (서론과 1장)", "author": "최경원", "genre": "디자인, 미술, 예술", "publisher": "길벗", "passages": ["**저자의말** 학교교과과정이나 사회활동에서도 컴퓨터는 도구가 아니라 중심이고 목적이 된 듯하다. 디자이너는 컴퓨터를 자유자재로 다룰 수 있게 된 바로 그 순간부터 커다란 벽에 부딪히게 된다. 컴퓨터를 잘 다룬다고 해서 좋은 디자인이 나오는 것이 아님을 서서히 절감하기 때문이다. 사람들의 시선을 사로잡을 멋진 디자인을 만들기 위해서는 조형적인 능력이 우선 뛰어나야 한다. 컴퓨터를 다루는 능력이 아니라 조형능력이다. 구체적으로 말하면 형태와 색을 다루는 능력이다. 형태와 색이 뛰어난 디자인은 일단 사람들의 눈을 즐겁게 하고 호감을 불러일으킨다. 따라서 디자이너는 형태와 색을 그저 적절히 다루는 것이 아니라 뛰어나게 잘 다룰 수 있어야 한다. 사람들이 좋다고 느끼는 형태와 색이란 어떤 법칙으로 묶을 수 없을 정도로 다양하며, 디자이너가 직면하는 상황 역시 메뉴얼화할 수 없을 정도로 다양하기 때문이다. 조형공부는 형태와 색에 관해 많이 아는 것이 중요한 게 아니라 그것들을 능숙하게 다루는 것이 중요하다. '형태와 색의 공부는 반드시 실천으로 귀결되어야 한다.' 그러기 위해서는 논리를 중심으로 하는 연역적 방법과 실천을 중심으로 하는 귀납적 방법을 적절히 사용해야 한다. 일상속에서 조형공부하기 어떤 사물이든 조형적으로 모두 가치가 있는 것이기 때문에 배우는 자세로 겸손하게 대해야 한다는 것을 자연스럽게 배우게 될 것이다. 디자이너는 언제 어떤 상황에서 디자인을 할 지 모르며, 언제나 자신의 조형적 역량을 최대한 발휘해야 한다. 그러자면 특정 형태나 색에 편견을 가져서는 안 되며, 조형적인 융통성이 뛰어나야 한다. 디자이너들 눈을 자극하는 화려한 형태에만 치중하는 오류를 범하기 쉬운데, 그렇게 되면 디자이너의 조형적 역량은 편협하고 정형화되기 쉽다. **1. 좋은 디자인을 위한 기본, 형태와 색** **1장 디자인과 기초 조형 능력과의 관계**", "디자인은 반드시 디자인을 받아들이는 사람과 만남으로써 마무리 된다. 따라서 디자인에서는 생산자인 디자이너의 입장만이 절대적일 수 없다. 어쩌면 가장 중요한 것이 디자인을 수용하는 사람들의 입장일지도 모른다. 디자인을 수용하는 사람들은 디자인을 결코 나누어서 보지 않는다. 게대가 디자이너들과는 다르게 디자인이 어떻게 만들어졌는지를 중요하게 생각하지 않는다. 디자이너의 입장에서 보면 디자인은 그렇게 다양하고 복잡하지만, 디자인을 수용하는 사람의 입장에서 보면 이처럼 간단해진다. 32-34 색과 형태 같은 조형성에 집중하는 것은 디자인을 수용하는 사람들의 관점이라고 할 수 있다. 디자인 분야별로 필요한 기술적인 내용들과 분야를 초월한 디자인의 조형성은 수평적 관계가 아니다. 디자인을 만들기 위해 동원되는 모든 것은 조형성, 즉 형태와 색으로 수렴된다. 디자인을 수용하는 사람들은 형태와 색을 통해 아름다움만 느끼는 게 아니라 그 속에 담긴 기술적 혜택과 가치들을 감상하고 디자인을 판단한다. 그러니 모든 디자인 활동들의 중심에는 형태와 색이 있다고 말해도 지나치지 않다. 형태와 색은 디자인의 가치를 생산하는 근원이다. 색과 형태는 디자인의 기초가 아니라 기본으로 받아들여져야 한다.", "처음부터 사람들과 일대일로 단독 대면하는 디자인은 없다. 일단 사람들의 관심에 들어야만 다른 디자인을 제치고 주인공이 될 수 있다. 디자인은 어떻게 해서든지 사람들의 시선을 많이 확보해야 한다. 경쟁에서 밀리면 바로 퇴출된다. 이 때 색과 형태는 시각적 경쟁에서 우위를 차지하기 위한 가장 중요한 전략이자 무기가 된다.", "기초와 기본은 구별될 필요가 있다. 기본은 항상 갈고 다듬어야 한다는 점에서 분명히 다르다. 어떤 한 분야에서 오랫동안 일할 경우 오히려 전문성을 해칠 수가 있다. 그 분야에 대한 일의 처리는 능숙할지 몰라도 새로운 조형에 대한 시도나 상상력 면에서는 매너리즘에 빠질 가능성이 높아진다. **2장 조형 감각을 키우기 위한 방법론** 조형 공부의 중심에는 디자인을 보는 사람들의 마음 작용, 즉 시각적 경험 과정을 반드시 설정해야 한다. **조형 감각은 이론이 아니라 경험의 축척이다.**", "디자이너가 처한 상황은 그리 단순하지 않다. 상황에 따라 우아한 디자인을 해야 할 때도 있고 발랄한 디자인을 해야 할 때도 있다. 어떤 조건이나 요구 사항에 대해 충분히 대처할 수 있는 팔색조 같은 표현능력을 갖추어야 한다. 42-43 디자이너는 궁극적으로 자신의 디자인을 통해 시각적으로 대중을 설득해야 한다. 엄격한 논리적 조형도 추구해야 하겠지만, 그렇지 않은 조형에 대해서도 디자이너들은 충분히 공부해야 하는 것이다. 형태와 색으로 만들어진 디자인은 최종적으로 사람들에게 받아들여져야 한다. 따라서 가장 중요한 것은 디자인을 받아들이는 사람이라는 존재다. 조형공부란 조형 이론을 공부하는 것이 아니라, 디자인을 보는 사람의 시각적 인식 과정에 관한 공부라고 하는 것이 더 정확한 말일 수도 있다. 44-45 시각적 감각이나 지각은 한 번 봄으로써 마무리되는 순간의 작용이 아니라, 보는 작용과 이해하는 작용이 순차적으로 일어나는 일련의 과정이라는 것을 알 수 있다. 시각이 이렇게 과정적인 작용이라는 사실은 조형에 근접하는 데 있어 대단히 중요한 실마리를 제공한다. 사람이 하나의 사물을 보고 인식하는 과정은 매우 복잡하고 거기에 따르는 이론도 분방하다. 그러나 이 과정을 크게 살펴보면 대체로 감각, 지각, 미적 판단의 세단계로 나눌 수 있다. 모든 사물들이 자연스럽게 감각의 재료가 되는 것은 아니다. 형태의 구조가 부실하거나 그 범위가 모호할 때는 아예 우리 눈에 들어오지 않는다. 따라서 디자이너는 멋지기만 한 형태를 만들려고 하기 전에 자신의 디자인이 사람들 눈에 혼란을 초래하지는 않는지, 구조의 윤곽은 명확한지를 먼저 살펴야 한다. 지각 과정에서 디자인이 사람들에게 잘 받아들여지기 위해서는 시각적인 인상이 좋아야 하고, 비례가 뛰어나야 하며, 색의 조화가 잘 이루어져 있어야 한다. 말하자면 지각 단계에서는 조형적으로 보기에 좋아야 하는 것이 필수 요건인 것이다. 미적 판단의 단계에서는 눈에 보이는 형상보다는 형상 내면에 담긴 내용이나 가치가 중요해진다. 따라서 이것은 형상의 기계적 감각이기보다는 이념의 독해에 가깝다. 미적 판단의 단계는 단지 눈에 보이는 형상에 국한되지 않고 철학이나 인문학, 취미 수준과 같은 다양한 가치들이 개입하기 때문에 그 과정이 매우 어렵고 복잡하다.", "주변 사물들에 녹아 있는 조형성 조형 공부를 통해서 가장 먼저 갖추어야 할 능력은 무엇일까? 심오한 조형 이론체계를 습득하는 것일까? 아니면 색과 형태를 능숙하게 다루는 기술일까? 둘 다 틀렸다. 보통은 그림을 잘 그리고 색을 잘 쓰는 게 중요한 것이라고 생각하겠지만 좋은 형태와 좋은 색을 볼 줄 아는 안목을 갖추는 것이 먼저이다. 그러나 좋은 안목은 하루아침에 만들어 지지 않는다. 형태와 색을 많이 보는 것보다 좋은 공부는 없다. 진정 좋은 안목은 아주 사소한 사물이나 현상들에서부터 수준 높은 예술 작품에 이르기까지 세밀하게 관찰하는 노력을 통해서 만들어진다."]}, {"title": "좋아하는 일로 지구를 지킬 수 있다면", "author": "김주온", "genre": "인터뷰", "publisher": "휴머니스트", "passages": ["건축은 그저 건물을 짓는 것만을 의미하지 않아요. 건축은 사람들이 살아가는 장소를 만드는 행위이자, 시대의 문화를 반영하는 역사적 기록이면서 그 자체로 감상할 거리가 충분한 예술 작품이기도 해요. 이렇게 종합적 성격을 가진 학문이기 때문에 한국과 일본처럼 건축과를 공과대학으로 분류하는 경우는 흔치 않아요. 건축 대학은 대부분 별도로 있거나 예술대학 안에 있는 경우가 훨씬 많답니다. ​", "저희는 주로 사회적 가치를 구현하는 장소를 만들고 그런 가치가 작동하게 하겠다는 클라이언트를 많이 만났어요. 그럼에도 건물을 계속 짓는 것 자체가 갖는 딜레마를 깨닫게 됐어요. 이제 더는 건축이 필수적이지 않아요. 특히 도시에 뭔가를 새로 짓는다는 건 이윤 창출이나 경제 활성화가 주된 목적이지, 주거나 사무 공간이 부족해서가 아니에요. 아무리 좋은 취지라도 적정한 선을 넘어선다면 과한 것이 돼요. 공모를 통한 공공 프로젝트도 마찬가지예요. 공모라는 경쟁을 거치다 보면 적정한 수준을 넘어가기 마련이에요. 건축이 높은 곳을 더 높게 만드는 게 아니라, 삶의 최전선을 높이는 데 기여해야 할 텐데 그렇지 않아서 반성도 했어요. ​", "전문성이란 결국 자기만이 볼 수 있는 영역이 있다는 뜻이잖아요. 도시 공간을 어떻게 다시 볼 것인지 비판적으로 질문하고, 생산적인 논의를 끌어내는 것이 건축가가 할 수 있는 일일 거예요. 이미 있는 것 중에 지켜야 할 것들도 있고, 때로는 지은 것을 잘 없애는 것도 필요하고, 인공적인 건축물 때문에 사라졌던 환경과 생태계를 되살리는 기술과 예술도 절실하고요. 그렇지 않고 관성적으로 새로운 공간을 짓기만 한다면 무슨 의미가 있을까요? ​", "예를 들어 화학비료를 쓰지 않은 유기농 면과 같은 식물 섬유라고 해도 생산량을 늘리려고 숲을 베어 내는 등 환경에 안 좋은 영향을 끼치는 경우도 많아요. 생산 효율성까지 총체적으로 고려하면 폴리에스테르와 같은 합성섬유가 더 나을 수 있어요. 그러니 지속 가능한 패션이란 게 단순히 소재 선택의 문제가 아닌 거죠. 어떤 소재를 쓰든 다 지구에 영향을 끼친다는 사실을 인식하는 것, 내가 그 모든 결과를 다 알 수는 없음을 인정하는 것이 중요하겠더라고요. 그런데 오히려 불완전함을 인정하고 나니 뭔가 시작할 수 있지 않을까 하는 생각이 들었어요. 아주 작은 것부터 바꾸기 시작하면서 원단도, 염색 방법도, 제작 공정도 조금씩 더 좋은 선택을 해 나가는 식으로 바꾸어 왔네요. ​", "거대한 노동문제를 곧바로 해결하지는 못하더라도 우리 주변에 옷을 만드는 사람이 있다는 사실, 그 사람이 나와 상관없는 사람이 아니라 옆집 사람 혹은 내 삼촌이나 이모일 수 있다는 것을 알게 해야겠더라고요. 거기서부터 시작해야 다른 나라의 열악한 노동환경과 그 속에서 옷을 만드는 사람까지 관심이 이어지겠구나 싶어요. ​", "저는 뭔가를 가정한 채 움직이지 않아요. 제가 일하며 배운 것 중 하나는 '계획은 틀어진다', 특히 '장기 계획은 무조건 뜻대로 안 된다'라는 거예요. 그래서 장기 계획을 잘 세우지 않는 편이고요. 길어야 1, 2년 계획 정도 세워요. 그보다는 변화하는 환경에 잘 적응할 수 있는 능력을 키우는 게 중요하다고 생각합니다. ​", "단점도 극대화하면 장점이 될 수 있어요. 누구나 콤플렉스도 있고 단점도 있죠. 제가 입이 튀어나온 게 큼플렉스라서 수염으로 가렸는데 지금은 그게 캐릭터가 됐어요. 그리고 저는 하루가 똑같은 루틴으로 돌아가는 걸 못 견뎌서 아이스크림 메뉴를 바꾸기 시작했거든요. 마케팅 수단이 아니었어요. 그게 또 캐릭터가 됐죠. 그때 깨달았어요. 장점은 내가 아무리 잘해봤자 나보다 뛰어난 사람이 있을 테니 오히려 콤플렉스가 변화를 만들 가능성이 크다. 단점을 창의적으로 승화하면 전에 없던 새로운 게 된다. 즉 단점은 그 사람만의 고유성이죠. ​", "동네에서 가게를 하면 손님들과 오랜 관계를 맺고 살아가게 돼요. 가게에 오는 분들이 건강해야 '즐거운 아이스크림 생활'을 팔 수 있겠죠. 그러려면 '터전'이 중요해요. 이 세상에 하나 밖에 없는 터전이 지구고 서울이고 마포구잖아요. 이곳이 유지되려면 훨씬 긴 단위에서 시간을 생각하고 상상하는 능력이 필요해요. 그런데 사람들은 쇼츠나 릴스처럼 점점 더 짧은 콘텐츠에 민감해지고 있죠. 설령 '틱톡'의 리듬감으로 살더라도 자연의 시간을 인지하고 있어야 한다고 생각해요. '그럼 긴 시간에 대한 감각을 어떻게 키울 수 있지? 지금 하듯이 뭔가를 보여줄 수 없을까?' 고민했는데 노고시모가 있더라고요. 나무 한 그루를 심으면 우리 키만큼 자라는 데 10년 정도 걸려요. 10년 전 쓰레기 산 위에 심은 도토리나무가 얼마나 컸는지 보이잖아요. 시간의 힘이라는 게 이런 거구나, 감탄했죠. 그래서 사람들과 나무를 심고 10년 뒤에 같이 보고 싶어요. 그러면 눈앞의 이익보다 긴 시간에 대해서 사고하는 능력을 키울 수 있을 것 같아요. ​", "욕망을 줄인다는 건, 싫은데 꾸역꾸역 줄이는 게 아니라 내 삶의 근간과 즐거움을 어디에 둘 것인가를 성찰하는 문제예요. 상업적인 공간에서 소비를 해야만 즐거운지, 아니면 집에서 책을 읽고 자연을 감상하면 즐거운지 생각해 보는 거예요. 나의 한계와 내가 가진 감각기관으로 언제 기쁨을 느끼는지, 좀 더 아름다운 방식은 무엇인지 찾는다면 자연스레 소비도 파괴도 덜 하게 될 거라고 생각해요. ​", "기자들마다 자신이 생각하는 좋은 기자의 모습이나 좋은 기사가 달라요. 저는 방송을 기획하거나 기사를 쓸 때 사회적 소수자들의 권리를 계속해서 말하고 기록하고 싶다는 마음이 커요. 사회 최전선에 있는 이들의 삶이 달라져야 공동체 전체의 삶이 나아지니까요. 모두가 연결되어 있다는 '사회적 감각'에 관심이 많아요. 이런 이야기에 관심이 있는 언론인이 한 명이라도 더 있으면 좋지 않을까 하는 생각으로 언론계에 들어왔습니다. ​", "인권 관련 인터뷰 코너를 오래 맡았었어요. 한번은 그날 아침에 철도 노동자가 사망한 사건이 있었어요. 저녁 방송이니까 전화 인터뷰를 섭외하려고 같이 일하시는 분과 인터뷰를 잡았어요. \"질문지 보내 놓겠습니다\" 하고 전화를 드렸는데 우왕좌왕하고 소란스러운 분위기 때문에 빈소라는 게 느껴졌어요. 빈소는 정신없고 슬픈 곳이잖아요. '이분이 지금 동료를 보내는 빈소에 있구나' 하는 생각이 드는데 저는 안전한 스튜디오에서 전화해서 \"당신의 슬픔을 얘기해 보세요\" 하는 게 예의가 아닌 것 같았어요. 이 기억이 저한텐 너무 생생하게, 여전히 가슴 깊은 곳에 남아 있어요. 그 이후부터 '누군가의 죽음에 대해 말하려면 적어도 내가 좀 더 불편해지는 게 맞지 않나', '이렇게 편해서는 안 되는 거 아닌가' 하는 생각을 많이 하게 됐어요. 돌아가신 분은 철도 노동자의 안전을 위해 작업 환경을 개선해야 한다고 오랫동안 주장해 왔고, 그런 투쟁 때문에 해고를 당한 뒤 계약직으로 근무하던 분이었어요. 그분이 주장했던 2인 1조 근무 의무화 같은 기본적인 작업 환경 개선이 이루어지지 않아서 그분도 돌아가신 것이었고요. 우리 사회 모두에게 책임이 있는 거잖아요? ​", "\"이게 옳으니까 이렇게 하세요\"라고 하는 게 아니라 새로운 세계를 보여 주면서 이런 삶이 앞으로 우리한테 익숙해질 거라고 소개하는 거예요. 그런 변화들을 상상하면 기분이 좋길 바라요. 시민들에게 이와 같은 기사를 계속 보여 줘야 한다고
