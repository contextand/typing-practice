let bookLocked = false;
let lockedBook  = null;

const pcBookLock = document.getElementById('pcBookLock');
pcBookLock.addEventListener('click', () => {
  bookLocked = !bookLocked;
  lockedBook = bookLocked ? (current ? current.book : null) : null;
  pcBookLock.classList.toggle('locked', bookLocked);
});

function pick() {
  if (bookLocked && lockedBook) {
    const pool = ALL.filter(p => p.book === lockedBook);
    return pool[Math.floor(Math.random() * pool.length)];
  }
  return ALL[Math.floor(Math.random() * ALL.length)];
}

function escAttr(s) {
  return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
}

function buildPassageHtml(target) {
  let html = '';
  const lastIsSpace = !isComposing && typed.length > 0 && typed[typed.length - 1] === ' ';
  for (let i = 0; i < target.length; i++) {
    const ch = target[i];
    let cls = 'pending', extra = '';
    if (i < typed.length) {
      const ok = typed[i] === target[i];
      cls = ok ? 'correct' : 'wrong';
      if (!ok) extra = ` data-typed="${escAttr(typed[i])}"`;
      if (i === typed.length - 1 && !isComposing && !lastIsSpace) cls += ' cursor-after';
    } else if (isComposing && i === typed.length) {
      cls = 'composing cursor-after';
      extra = ` data-composing="${escAttr(composingChar)}"`;
    } else if (i === typed.length && (typed.length === 0 || lastIsSpace)) {
      cls += ' cursor-before';
    }
    html += `<span class="char ${cls}"${extra}>${ch.replace(/&/g,'&amp;').replace(/</g,'&lt;')}</span>`;
  }
  return html;
}

function render() {
  const target = current.text;
  const html = buildPassageHtml(target);

  if (isPc()) {
    passageText.innerHTML = html;
  } else {
    mPassageText.innerHTML = html;
    mProgress.textContent = `${Math.min(typed.length, target.length)} / ${target.length}`;
  }

  if (!isComposing && typed.length >= target.length && typed === target) {
    setTimeout(loadNext, 500);
  }
}

function resetState() {
  typed = "";
  isComposing = false;
  composingChar = "";
  inputArea.value = "";
  mInputArea.value = "";
}

function setPassageFont(font) {
  passageText.style.fontFamily = `'${font}', sans-serif`;
  passageText.style.fontWeight = font === 'A2z' ? '800' : '900';
}

function applyFont(font) {
  currentFont = font;
  if (fontLocked) lockedFont = font;
  setPassageFont(font);
  const url = FONT_LINKS[font] || 'https://fonts.google.com/specimen/' + font.replace(/ /g, '+');
  pcFontLink.href = url;
  pcFontLink.textContent = font;
}

function applyPassage() {
  resetState();
  if (current.book === quotesBook) {
    const alreadyInQuotes = document.body.classList.contains('left-yellow') || document.body.classList.contains('left-green');
    if (!alreadyInQuotes) {
      preQuotesLeftDark = document.body.classList.contains('left-dark');
      preQuotesRightDark = document.body.classList.contains('right-dark');
      document.body.classList.remove('left-dark', 'right-dark');
      document.body.classList.add(preQuotesLeftDark ? 'left-green' : 'left-yellow');
      document.body.classList.add(preQuotesRightDark ? 'right-green' : 'right-yellow');
      pcDarkBtn.textContent = preQuotesLeftDark ? 'Yellow' : 'Green';
      pcRightDarkBtn.textContent = preQuotesRightDark ? 'Yellow' : 'Green';
    }
  } else {
    document.body.classList.remove('left-yellow', 'left-green', 'right-yellow', 'right-green');
    if (preQuotesLeftDark) document.body.classList.add('left-dark');
    if (preQuotesRightDark) document.body.classList.add('right-dark');
    preQuotesLeftDark = false;
    preQuotesRightDark = false;
    pcDarkBtn.textContent = document.body.classList.contains('left-dark') ? 'Light' : 'Dark';
    pcRightDarkBtn.textContent = document.body.classList.contains('right-dark') ? 'Light' : 'Dark';
  }
  updateSliderBg(pcSliderFS);
  updateSliderBg(pcSliderLH);
  updateSliderBg(pcSliderLS);

  if (isPc()) {
    const font = fontLocked ? lockedFont : FONTS[Math.floor(Math.random() * FONTS.length)];
    applyFont(font);
    pcBookTitle.textContent = current.book.title;
    pcBookMeta.textContent = [current.book.author, current.book.genre, current.book.publisher].filter(Boolean).join(' · ');
    render();
    inputArea.focus();
  } else {
    mPassageText.style.fontFamily = "'Asta Sans', sans-serif";
    mBookTitle.textContent = current.book.title;
    mBookMeta.textContent = [current.book.author, current.book.genre, current.book.publisher].filter(Boolean).join(' · ');
    render();
  }
}

let isAnimating = false;
const pcTrack = document.getElementById('pcPassagesTrack');

function pageSlide(dir, callback) {
  if (!isPc()) { callback(); return; }
  if (isAnimating) return;
  isAnimating = true;

  const outClass = dir === 'next' ? 'slide-out-up'   : 'slide-out-down';
  const inClass  = dir === 'next' ? 'slide-in-up'    : 'slide-in-down';

  pcTrack.classList.add(outClass);

  pcTrack.addEventListener('animationend', function onOut() {
    pcTrack.classList.remove(outClass);
    callback();
    pcTrack.classList.add(inClass);
    pcTrack.addEventListener('animationend', function onIn() {
      pcTrack.classList.remove(inClass);
      isAnimating = false;
    }, { once: true });
  }, { once: true });
}

function loadNext() {
  function go() {
    if (historyIdx < passageHistory.length - 1) {
      let targetIdx = historyIdx + 1;
      while (targetIdx < passageHistory.length - 1 && bookLocked && lockedBook && passageHistory[targetIdx].book !== lockedBook) {
        targetIdx++;
      }
      if (bookLocked && lockedBook && passageHistory[targetIdx].book !== lockedBook) {
        current = pick();
        passageHistory.push(current);
        historyIdx = passageHistory.length - 1;
      } else {
        historyIdx = targetIdx;
        current = passageHistory[historyIdx];
      }
    } else {
      current = pick();
      passageHistory.push(current);
      historyIdx = passageHistory.length - 1;
    }
    applyPassage();
  }
  pageSlide('next', go);
}

function loadPrev() {
  if (historyIdx <= 0) return;
  // When book is locked, skip history entries from other books
  let targetIdx = historyIdx - 1;
  while (targetIdx > 0 && bookLocked && lockedBook && passageHistory[targetIdx].book !== lockedBook) {
    targetIdx--;
  }
  if (bookLocked && lockedBook && passageHistory[targetIdx].book !== lockedBook) return;
  pageSlide('prev', () => {
    historyIdx = targetIdx;
    current = passageHistory[historyIdx];
    applyPassage();
  });
}

// ── IME & input handling (attached to both textareas) ──
function addInputListeners(el) {
  el.addEventListener('compositionstart', () => { isComposing = true; });
  el.addEventListener('compositionupdate', (e) => {
    const d = e.data || '';
    composingChar = d[d.length - 1] || '';
    render();
  });
  el.addEventListener('compositionend', () => {
    isComposing = false; composingChar = '';
    const raw = el.value;
    const target = current.text;
    typed = raw.length > target.length ? raw.slice(0, target.length) : raw;
    el.value = typed;
    render();
  });
  el.addEventListener('input', () => {
    const raw = el.value;
    const target = current.text;
    const completed = isComposing ? raw.slice(0, raw.length - 1) : raw;
    if (!isComposing && completed.length > target.length) {
      typed = completed.slice(0, target.length);
      el.value = typed;
    } else {
      typed = completed;
    }
    render();
  });
  el.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowDown' || e.key === 'ArrowRight' || e.key === 'Tab' || e.key === 'Enter') {
      e.preventDefault(); loadNext();
    } else if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') {
      e.preventDefault(); loadPrev();
    }
  });
}

// ── PC: document-level keydown so arrows always work regardless of focus ──
document.addEventListener('keydown', (e) => {
  if (!isPc()) return;
  if (typePage.classList.contains('open')) return;
  if (document.activeElement === inputArea) return; // handled by textarea listener
  if (e.key === 'ArrowDown' || e.key === 'ArrowRight' || e.key === 'Tab' || e.key === 'Enter') {
    e.preventDefault(); loadNext();
  } else if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') {
    e.preventDefault(); loadPrev();
  }
});

. 내가 받은 일은 반드시 기록하고, 해결하고, 공유하자.", "내 업무의 맥락은 내가 가장 잘 알아야 한다.", "질문할 땐 의도도 함께 말하자. 서로를 시험하지 말고 빠르게 커뮤니케이션 하자.", "말이 바뀌어야 한다. 언어가 전부다. 아이의 행동을 바꾸고 싶으면 쉽고 정확한 사랑의 언어를 써야 한다. 회화는 실천이고 실전이다.", "소모적인 대화말고 그 상황에 필요한 말만 하라.", "하고 싶은 일에는 방법이 보이고 하기 싫은 일에는 핑계가 보인다.", "작은 변화를 미리 감지하는 사람, 더 크게 확장하여 느끼는 사람들이 책을 읽고 글을 쓴다.", "내가 내 것을 지키자고, 남을 다치게 했다. 나는 정당한데, 정당함이 죄책감을 지워주진 못했다.", "이 일을 이제 하고 싶지 않다기 보다는 이 일을 건강하게 잘하고 싶다는 마음", "조금 비참한 게 영혼에는 좋아요", "효과적으로 일하는 사람들은 '계획'이 아닌 '시간'에서 출발한다. 어떤 일을 할 때 절대적으로 모자라고, 대체제가 없으며, 모든 것에 소요되는 자원은 시간이다.", "개는 왜 사람 따위를 이토록 사랑하는 걸까? 개의 중심은 제 안에 있지 않고 자기가 바라보는 사람 안에 있는 것 같다.", "그를 제대로 아는 게 존중이 아니라 그가 나를 제대로 알도록 해주는 게 존중이라는 것을 최근에 깨달았다.", "사람을 먼저 챙기면 일은 전부 다 잘 풀리게 돼있어", "내가 하는 일의 가장 첫번째 고객은 함께 일하는 사람들이다.", "회의가 막힐 때 1) 용어 정의 2) 맥락 3) 히든 인터레스트", "프로는 회복력이 있는 아마추어", "우리의 현재 상황과 화해할지 결정하는 것은 결과가 아닌 태도다.", "할 수 있어서 하는 게 아니고, 해봤는데 할 수 있었다 라는 결론", "작가란 오늘 아침 글을 쓴 사람이다.", "바쁜 건 나쁘다. 정말 그렇게 생각한다. 시간의 여유가 없으면 마음의 여유도 없으니까", "좋은 표준을 만들려면 끊임없이 자기 생각을 의심하고 조사하고 확인해야 해요. 성실성이 없으면 불가능하죠.", "뭐 하는 곳인지 한 번에 잡혀야죠. 이어서 어떤 근본으로 자랐는지 (히스토리) 함께 할 수 있는 건 뭔지 (체험) 디테일이 꼬리를 물고 죽죽 나와야 해요.", "내가 나로 사는 것이 왜 누군가에겐 상처일까요?", "좋아하는 일을 오래 하려면, 조금 덜 좋아하는 마음이 필요하다.", "옛날은 가는 게 아니고 이렇게 자꾸 오는 것이었다.", "다정함은 자세다. 뭔가 필요하다고 생각할 때 '내가 도와줄게'라고 몸으로 말하는 것", "시간이 지나도 내 마음이 편한 쪽을 선택해요.", "자기가 행복해지는 순간을 잘 알고 그 시간을 만들기 위해 애쓰는 사람", "파는 일이라고 생각하면 내 상품에 집중하게 되지만, 사게 하는 일이라고 생각하면 소비자의 상황에 집중하게 됩니다.", "상대방이 왜 그런 피드백을 했는지 문장 뒤의 의미를 생각해봅니다. 피드백은 결론보다 이유가 핵심입니다.", "같은 일을 같은 곳에서 같은 시간 같은 마음으로", "소중한 건 꿈이 아니라 매일의 생활", "고객의 지시 때문이 아니라 내 눈에 보이기 때문에 전력을 다한다.", "가장 큰 리스크는 클라이언트의 기대를 파악하지 못하는 것. 추구하는 건 클라이언트의 기대를 넘어서는 것.", "내 의견을 관철하는 건 중요하지 않아요. 우리의 해결책이 나아지는 것이 더 중요합니다.", "사람은 나를 믿어주는 사람을 믿어요. 나를 좋아하는 사람은 어쩐지 나도 좋아하게 되잖아요. 함께 일하는 사람을 저는 좋아합니다. 좋아하는 것까지 일이라고 생각해요.", "뭐가 됐든 '일단 해본다'는 노선", "누구보다도 그것에 대해 많이 생각할 것, 누구보다도 그것을 더 많이 좋아할 것", "형식만 남고 마음이 사라지면 고생일 뿐", "어찌되었건 피곤하면 열심히 산거야", "중요한 건 내 편을 만드는 거지. 나를 믿지 않고 인정하지 않는 사람들의 마음을 바꾸려 애쓰는 게 아니라는 것. 언제나 오직 나를 위해 사랑하는 사람들을 믿고 앞으로 나아가야 한다는 것.", "내가 나로 사는 것이 왜 누군가에겐 상처일까요?", "결정했으면 설명할 수 있어야 한다.", "오늘도 모두가 치사량까진 아닌 밤을 넘기고 있습니다. 견딜 만큼은 불행해도 괜찮나봐.", "당신이 매일 하는 일을 바꾸기 전까지는 당신의 삶에는 그 어떤 변화도 생기지 않을 겁니다.", "NOW OR NEVER", "하루 5분만 집 안 어딘가를 청소하면 깨끗한 집에서 살 수 있다.", "인생이란게 원래 엉터리야. 알겠냐?", "마음에 없는 말을 찾으려고 허리까지 다녀왔다.", "커뮤니케이션은 아름답지 않다. 같은 것을 반복해서 말하는 시간을 아까워 말자.", "모든 생각을 하나로 모아주는 능력이 밤에 있다.", "큰 질문이나 주제를 찾고 그것을 계속 지니고 살아가는 게 삶을 살아가는 한가지 방법으로 유효할 것", "모방하고 싶은 대상이 있는 순간은 그렇지 않은 순간보다 덜 밋밋하니까. 무언가를 따라하는 순간에는 애씀 없이 그 무언가를 하게 된다.", "YOU DO YOU I'LL DO ME", "중요한 건, 실망하지 않는 거", "업무 커뮤니케이션의 원칙, 상대방의 시간을 덜 뺏는 방식을 택할 것", "우리 삶에 생존만 있는 게 아니라 사치와 허영과 아름다움이 깃드는 게 좋았다.", "친절은 마인드의 문제가 아니라 몸의 문제다.", "말을 많이 한 날에는 책을 더 열심히 읽는다.", "당신은 잘하고 있다고 전부터 말해주고 싶었어요. 삶을 대하는 태도가 참 멋있다고.", "분위기 있는 사람과 탄탄한 브랜딩을 가진 회사", "온 힘을 다해 일하면 자기 주위의 풍경이 변한다.", "모든 사물에 대해 냉정함을 유지하는 태도", "다정한 것이 살아남는다.", "무엇을 해야 하는지 분명하게 전달한다면 상대는 행동하기를 두려워하지 않는다.", "스스로를 비난하지 않고 계속 걸어가는 법", "우리는 서로의 진심을 모른다. 태도로 읽을 뿐", "상황을 통제하는 우아함", "비가 오면 손가락을 벌려요. 그 사이로 비가 지나가게", "서로의 존재를 확인하는 꾸준한 가시성", "운동은 나를 버티는 일이자 몰랐던 나를 발견하는 일", "면접은 유도와 같다. 처음엔 영문도 모른채 필사적이라 주변이 보이지 않지만 익숙해지면 보인다. 상대방의 마음의 움직임. 숨결", "실패란 했다는 것의 증거, 실패가 쌓이면 그게 경력", "정신력이 강하면 만성질환에 걸린다.", "실패가 무슨 뜻인지 아니? 다시 한 번 하라는 거야.", "'나는 무엇인가'가 아닌 '어떻게 움직이고 어떻게 멈출 것인가'에 집중한다.", "진심으로 성장하고 싶은 신인은 똑바로 응시하지, 그런 녀석은 반드시 성장해", "다수가 마침표를 찍고 멈춰있을 때 그는 그 위에 갈고리를 걸어 물음표를 만든다.", "오늘은 그냥 오늘이야", "기억은 기록이 아니라 해석이니까. 엄청나게 많은 메모를 했지만 활용하진 못했다. 제대로 된 체계가 있어야 한다.", "수평으로 함께 잠겨보려고", "결코 절망하지 않을 나의 친구들과 가족들에게", "우리에게 무슨 일이 있고, 또 있었더라도 우린 앞으로 잘 달릴 수 있다.", "필연적으로 비거니즘은 실패와 용서의 장르", "무엇이 우리를 인간으로 만드는 가 말이 우리를 인간으로 만든다. 목소리나 소리가 아니고 뜻을 이해하고자 시도하고 어떤 생각이나 감정을 전달하고자 애쓰는 언어로서의 말. 기억과 의미를 주고 받는 대화로서의 말. 애써 말하는 것이 사랑의 조건이라면 그 말을 애써 듣는 것 역시 사랑의 조건이라고 생각했다.", "어떤 상황에서도 결코 가난해질 수 없는 풍요로운 마음", "품위있고 건강하며 유능하고 재미있는 사람", "오늘도 일을 하며 배운다. 일 자체를 배우며, 일 바깥세상의 흐름도 알게 된다. 나를 견디고 다루는 법을 익히는 한편으로 다른 이들을 존중하는 법을 배운다. 동료들과 부딪치고 협력하는 동안 내 안에만 고여 있지 않고 변화한다. 일 하는 사람으로 살기에 조금씩 나아질 기회를 얻는다고 나는 믿는다.", "업무는 일을 마칠 때가 아니라 내가 한 일을 알릴 때 끝나는 거였다. 널리 알릴수록 비슷한 일의 기회를 물고 오는 게 일의 속성이기 때문이다.", "취향보다는 행위가 그 사람에 대해 말해준다고 믿게 된다. 행동이 그 주체에 대해 들려주는 이야기에 흥미를 느낀다. 무엇을 좋아하는가 보다는 매일 무엇을 하며 살아가는가 말이다.", "때론 나의 주장보다 중요한 것은 사람들의 수용이다.", "오른 손이 하는 일을 왼손이 꾸준히 기록해야 한다. 기록하는 왼손의 모습조차 기록되어야 한다.", "타자에 눈 뜨고 거듭 깨어나는 삶", "그럼에도 불구하고,\n그들에게 구멍을 빠져나올 수 있는 용기를 주고 싶었다.\n그들이 덜 외로울 수 있도록 돕고 싶었다.\n그들에게 괜찮다고 말하고 싶었다.\n그들에게 다정해지고 싶었다.", "아무리 작은 일이라도 매일 해내면 불안감이 사라진다.", "누군가의 마음을 사로잡기 위해 할 수 있는 가장 쉬운 연습은 '내 마음이 사로잡혔던 순간'을 찾는 게 아닐까요.", "매일 기록하는 사람은 하루도 자신을 잊지 않습니다.", "불교의 법은 모든 것이 나로부터 나아가 나에게로 돌아온다고 믿는다.", "우리는 자기만의 성공을 정의해야 한다. 추상적으로 그저 행복하게 살고 싶다고 말하는 것은 도움이 되지 않는다. 가능한 한 구체적이고, 명확하게 성공을 정의해야 한다. 어떤 일을 할 때 내가 가장 행복한지, 어떻게 살아야 내 삶의 의미를 찾을 수 있을지, 어떤 것을 통해 내가 이 사회에서 제 역할을 할 수 있을지 등 내가 근본적으로 어떤 사람이고, 어떤 이상을 가진 사람인지를 먼저 고민해야 한다. 그래야 성공에 가까워 질 수 있다.", "함께 일하는 서로를 대하는 방식이 일의 전부다.", "고요하고 담담하게 문제의 한복판을 지나갈 줄 알아야 한다. 상대를 넘어뜨리려고 생각하는 순간, 내 자신의 마음도 더러워지기 때문이다.", "좋은 질문을 가진 사람, 좋은 대화를 나눌 수 있는 동료", "상투적이라서 해로운 말", "뭔가가 누군가가 즉시 싫고 밉고 무서울 때 나는 그것이 어느 정도로 상상된 것인지 혐오는 아닌지를 생각한다.", "그만두지 않고 엉성하게 같이 했으면 좋겠어요.", "어떻게든 소비자가 '여기서 내 얘기를 하고 있구나, 내 고민을 말하고 있구나'하고 느끼게 해야 한다.", "혐오는 우리 모두 안에 있다. 외적 혹은 내적 법으로 적절히 막아내지 못한다면 자신도 모르게 그 순간 약자를 찾아 난폭성을 발휘한다.", "문장을 써. 문장, 이라고 쓰지 말고 문장을 써. 그게 내가 하고 싶은 일이니까.", "잘 만들고 싶어 하면 잘 만드는 사람이 되어 있을 줄 알았는데, 그냥 안 만드는 사람이 되어 있더라.", "누구의 잘못도 아니라고 말하는 사람은 믿음이 안 간다.", "세상에 지지 않는 방법은 나 스스로 작다고 생각하지 않는 것", "사람이 가장 절대적인 권력을 갖는 건 다른 사람들의 시선으로 부터 자유로워질 때", "남들의 평가보다 자신의 노력에 더 높은 점수를 주는 사람.", "좋아하는 것을 이야기하는 사람이 좋아 보인다.", "눈 앞에 보이는 것들을 하나씩 하다보면 방향이 생겨", "어떤 말도 허투루 뱉지 않는, 잠시라도 무기력과 혼란에 빠져 삶을 낭비하지 않을 것 같은 태도", "오래 고통에 단련된 사람들이 특유하게 갖는 침통한 침착성", "오래 혼자 있으면 혼자말을 하게 된다.", "해내야죠. 어려울 건 없습니다.", "보고 싶은 것만 보고 좁게 살아간다. 비밀 첩보원 처럼, 들키지 않으려고", "나는 아주아주 행복한 사람으로 죽을거야. 아무도 그걸 못 막을 거야.", "마음의 긴장도", "나에게 주어진 맥락과 상황속에서 할 수 있는 일을 탐색하고 실천합니다.", "모든 질문은 유효하고 반드시 누군가에게는 도움이 됩니다.", "상대방과 내가 동의하는 곳에서부터 이야기를 시작할 것. 수많은 근거보다는 적은 수의 강력한 근거를 제시할 것. 강력하게 주장하는 것이 아니라 진심을 다해 질문할 것.", "조심하는 마음", "요즘 사람들은 행복할 여유는 없어서 일단 상처받지 않는 걸 목표로 한다.", "아이는 죽는다. 어떻게 해도.. 하지만 우리는 덜 죽는 방법을 알고 있다. 쉽게 완벽을 이야기하는 게 아니라 포기하지 않는 게 중요하다.", "내일을 위해 오늘을 희생하지 않는다.", "인생은 레벨업이 아니라 스펙트럼을 넓히는 것", "위궤양은 당신이 먹는 것 때문에 생기지 않는다. 당신을 갉아먹고 있는 것이 위궤양을 낳는다.", "오늘 하루만은 두려워하지 않겠다. 행복하지 않을까봐, 아름다움을 누리지 못할까봐, 사랑하지 못할까봐, 내가 사랑하는 사람이 나를 사랑하지 않을까봐 두려워하지 않겠다.", "내가 보고 싶지 않은 나를 보게 한다.", "딴짓하지 않고 미루지 않겠다. 지금 여기에 충실하겠다. 지나간 일에 집착하느라 평정심을 잃지 않겠다. 내면의 고통을 마음근육을 키울 좋은 기회로 삼겠다. 상대의 감정을 멋대로 판단하지 않고 있는 그대로 바라보겠다. 삶은 내게 꼭 필요한 것만 경험하게 한다는 것을 잊지 않겠다.", "오늘도 요동치는 마음, 그럼에도 계속 해보려는 마음.", "기대해라, 기대가 안 되면 자기 손해다.", "대답을 기다리는 순간을 대면할 용기", "언제나 좋은 디자인으로 보답하겠습니다.", "풀 수 있는 문제는 풀 수 있고, 풀 수 없는 문제는 풀 수 없다.", "타인의 말이나 시선에 휘둘리지 않고 나 자신과 평화롭게 있을 수 있는 상태", "부담감도 경험이야", "노력하는 만큼 삶에 대한 애정이 많이 늘고 자존감도 높아진다. 그리고 해보면 알겠지만 일찍 자는게 더 힘들다. 그걸 해내면 누구든. 아무도 방해하지 않는 고요한 오전 시간을 마련할 수 있다.", "생각이란 안간힘 같은 것. 어떤 생각이 든다고 그 생각을 말이나 행동으로 행하는 것이 아니고 버텨보는 것. 말하고 싶고 하고 싶다고 바로 말하거나 하지 않고 버텨 보는 것.", "무언가를 읽을 때는 구체적인 질문이나 목적을 가진다.", "타당성과 피드백이 없는 환경에 있다면 전문가가 되기 어렵다. 단순 반복으로는 달인이 될 수 없다. 구체적인 피드백을 적절한 시기에 받아야 한다.", "결국 결정은 사람이 하는 것. '누구'의 객관인지가 중요하다.", "신기한 것에 한 눈 팔지 말고 당연한 것에 질문하자.", "나쁜 일이 나쁜 일로 끝나지 않도록 애썼다. 우리가 모든 것으로부터 배우고 어떤 일에서든 고마운 점을 찾아내는 이들임을 기억했다. 사랑은 불행을 막지 못하지만 회복의 자리에서 우리를 기다린다.", "0.5%, 1% 씩 조금 더 낳은 시도를 아주 여러번에 걸쳐서 여러번 실행하기", "책과 글을 통해 관계를 맺는 일은 비교적 고상한 방식이다. 그것은 안전했고 대부분 예측가능한 범위 안에 있다.", "도망치는 건 부끄럽지만 도움이 된다.", "괴로워도 주기적으로 시작과 끝이 있는게 끝없이 펼쳐지는 자유보다 나은 것 같다.", "자신감을 가지고 싶다면 자신과의 약속을 꾸준히 잘 지켜야 합니다 .", "무리하지 않는 어른이 되는 일", "저는 기다리는 걸 좋아합니다. 걸어오십시오.", "기쁨과 슬픔은 사실 하나니까. 행복과 불행은 언제나 맞닿아 있으니까.", "마지막은 소중하다.", "서운하다는 감정에는 폭력적인 데가 있어. 넌 내 뜻대로 반응해야 해 하는 마음", "나는 불안하지 않았던 시간을 기억하지 못한다.", "마음이, 당신과 아무런 관계도 없는 사람들의 마음에 붙을 수 있다는 것을 당신은 그때 알았다.", "골똘이 한 생각을 써내려간 글 속에서 당신은 당신 나름의 힘을 느낄 수 있었다.", "사랑하는 것을 더 잘 사랑하는 방법은 글쓰기다.", "말하는 사람이 찌르기 보다는 듣는 사람이 찔려야 한다.", "당신은 생각하는 것이 아닙니다. 당신은 그저 논리적일 뿐입니다.", "그날의 이야기에 그날이 감금되는 게 좋았다. 그 날을 여기에 데려다 놓느라 오늘이 한없이 보류되고 내일이 한 없이 도래하지 않는 게 너무나도 좋았다.", "자잘한 요소를 바라보지 말고 공간에서 가장 큰 선을 찾으세요.", "협력을 낳는 오염과 불확정성을 두려워하지 말자.", "막내는 중요한 존재도 아니면서 모두의 사랑을 받는 존재였다. 가족 구성원의 아량과 사랑을 모자처럼 쓰고 다니는 존재. 그 모자를 썼다는 것만으로 특별해지는 존재. 기대는 덜 받고 용서는 더 받는 존재가 막내였다.", "이토록 미련하게 쓰기를 멈추지 않는", "사람들이 착각하는 게 있다. 유년이 시절이라는 것. 유년은 '시절'이 아니다. 어느 곳에서 멈추거나 끝나지 않는다. 돌아온다. 지나갔다고 생각하는 순간. 다 컸다고 착각하는 틈을 비집고 들어와 현재를 헤집어 놓는다.", "연말이라고 해서 꼭 따뜻하고 행복하란 법은 없습니다. 정확하게는 그런 법이 없기를 바랍니다.", "필요한 것은 전달하려는 욕구와 배우려고 하는 의지와 볼 수 있는 능력 뿐입니다.", "나의 힘듦을 어떻게 언어화 할 것인가"];
const quotesBook = {
  title: '발췌의 발췌',
  author: '한 번 더 발췌한 문장들, 출처 정리 못함 ㅈㅅ',
  genre: '', publisher: ''
};
QUOTES.forEach(text => ALL.push({ text, book: quotesBook }));
let PLACEHOLDER = QUOTES[Math.floor(Math.random() * QUOTES.length)];

function buildTypeList() {
  typeList.innerHTML = '';
  FONTS.forEach(font => {
    const row = document.createElement('div');
    row.className = 'type-row';

    const name = document.createElement('div');
    name.className = 'type-row-name';
    const fontUrl = FONT_LINKS[font] || 'https://fonts.google.com/specimen/' + font.replace(/ /g, '+');
    name.innerHTML = `<a href="${fontUrl}" target="_blank" rel="noopener">${font}&nbsp;↗</a>`;

    const text = document.createElement('div');
    text.className = 'type-row-text';
    text.style.fontFamily = `'${font}', sans-serif`;
    text.style.fontWeight = font === 'A2z' ? '800' : '900';
    text.textContent = PLACEHOLDER;
    text.dataset.font = font;

    row.appendChild(name);
    row.appendChild(text);
    typeList.appendChild(row);
  });
}

function updateTypeRows() {
  const val = typeInput.value;
  const isDark = document.body.classList.contains('left-dark');
  const isQuotes = document.body.classList.contains('left-yellow') || document.body.classList.contains('left-green');
  typeList.querySelectorAll('.type-row-text').forEach(el => {
    el.textContent = val || PLACEHOLDER;
    if (isQuotes) {
      el.style.color = val ? '#1a1a1a' : 'rgba(0,0,0,0.25)';
    } else {
      el.style.color = val ? (isDark ? '#ddd' : '#1a1a1a') : (isDark ? '#444' : '#ddd');
    }
  });
}

function openTypePage() {
  PLACEHOLDER = QUOTES[Math.floor(Math.random() * QUOTES.length)];
  typeInput.placeholder = PLACEHOLDER;
  buildTypeList();
  updateTypeRows();
  typePage.classList.add('open');
  typeInput.focus();
  if (location.hash !== '#type') location.hash = 'type';
}

function closeTypePage() {
  typePage.classList.remove('open');
  typeInput.value = '';
  updateTypeRows();
  if (location.hash === '#type') location.hash = '';
}

window.addEventListener('hashchange', () => {
  if (location.hash === '#type') {
    if (!typePage.classList.contains('open')) openTypePage();
  } else {
    if (typePage.classList.contains('open')) closeTypePage();
  }
});

document.getElementById('pcTypeBtn').addEventListener('click', openTypePage);
document.getElementById('typeClose').addEventListener('click', closeTypePage);
typeInput.addEventListener('input', updateTypeRows);
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && typePage.classList.contains('open')) closeTypePage();
});

if (location.hash === '#type') openTypePage();

// ── Dark mode ─────────────────────────────────────────
const pcDarkBtn = document.getElementById('pcDarkBtn');
const pcRightDarkBtn = document.getElementById('pcRightDarkBtn');

pcDarkBtn.addEventListener('click', () => {
  if (document.body.classList.contains('left-yellow')) {
    document.body.classList.replace('left-yellow', 'left-green');
    pcDarkBtn.textContent = 'Yellow';
    updateSliderBg(pcSliderFS); updateSliderBg(pcSliderLH); updateSliderBg(pcSliderLS);
  } else if (document.body.classList.contains('left-green')) {
    document.body.classList.replace('left-green', 'left-yellow');
    pcDarkBtn.textContent = 'Green';
    updateSliderBg(pcSliderFS); updateSliderBg(pcSliderLH); updateSliderBg(pcSliderLS);
  } else {
    const isLeftDark = document.body.classList.toggle('left-dark');
    pcDarkBtn.textContent = isLeftDark ? 'Light' : 'Dark';
    updateTypeRows();
    updateSliderBg(pcSliderFS);
    updateSliderBg(pcSliderLH);
    updateSliderBg(pcSliderLS);
  }
});

pcRightDarkBtn.addEventListener('click', () => {
  if (document.body.classList.contains('right-yellow')) {
    document.body.classList.replace('right-yellow', 'right-green');
    pcRightDarkBtn.textContent = 'Yellow';
  } else if (document.body.classList.contains('right-green')) {
    document.body.classList.replace('right-green', 'right-yellow');
    pcRightDarkBtn.textContent = 'Green';
  } else {
    const isRightDark = document.body.classList.toggle('right-dark');
    pcRightDarkBtn.textContent = isRightDark ? 'Light' : 'Dark';
  }
});

// Sliders — line-height & letter-spacing
const pcSliderFS = document.getElementById('pcSliderFS');
const pcSliderLH = document.getElementById('pcSliderLH');
const pcSliderLS = document.getElementById('pcSliderLS');

function updateSliderBg(slider) {
  if (!slider) return;
  const pct = slider.value;
  const dark = document.body.classList.contains('left-dark');
  const quotes = document.body.classList.contains('left-yellow') || document.body.classList.contains('left-green');
  const filled = dark ? '#ccc' : '#222';
  const empty  = dark ? '#444' : quotes ? 'rgba(0,0,0,0.2)' : '#ddd';
  slider.style.background = `linear-gradient(to right, ${filled} ${pct}%, ${empty} ${pct}%)`;
}

const pcSliderFSVal = document.getElementById('pcSliderFSVal');
const pcSliderLHVal = document.getElementById('pcSliderLHVal');
const pcSliderLSVal = document.getElementById('pcSliderLSVal');
function applySliders() {
  const fs = 16 + (pcSliderFS.value / 100) * 28;
  const lh = 1.0 + (pcSliderLH.value / 100) * 2.0;
  const ls = -0.08 + (pcSliderLS.value / 100) * 0.20;
  passageText.style.fontSize = fs + 'px';
  passageText.style.lineHeight = lh;
  passageText.style.letterSpacing = ls + 'em';
  pcSliderFSVal.textContent = Math.round(fs) + 'px';
  pcSliderLHVal.textContent = lh.toFixed(1);
  pcSliderLSVal.textContent = ls.toFixed(2) + 'em';
}

pcSliderFS.addEventListener('input', () => { updateSliderBg(pcSliderFS); applySliders(); });
pcSliderLH.addEventListener('input', () => { updateSliderBg(pcSliderLH); applySliders(); });
pcSliderLS.addEventListener('input', () => { updateSliderBg(pcSliderLS); applySliders(); });
updateSliderBg(pcSliderFS);
updateSliderBg(pcSliderLH);
updateSliderBg(pcSliderLS);

// ── Init ──────────────────────────────────────────────
current = pick();
passageHistory.push(current);
historyIdx = 0;
applyPassage();
</script>
