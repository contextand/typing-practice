었던 것 같아요. 모두가 조금씩 이상합니다. 특히 제가 사랑하는 사람들은 죄다 이상합니다. 저는 그 사람을 아주 먼 곳에서도 단번에 구분할 수 있어요. 그 사람은 저에게 절대로 대체될 수 없는 사람입니다.", "처음으로 말해본 이야기는 실패했을 수도 있지만, 그럼에도 한번 입으로 복기해본 것만으로 이야기는 조금 더 선명한 이미지로 머릿속에 기억됩니다.", "글은 어떤 것을 자신의 언어로 단단하게 직조하는 일 같습니다. 내가 정말 그것을 잘 알고 있는지, 내가 정말 그 이야기로부터 분리되어 있는지 글을 쓰면서 알게 됩니다. 그것이 무엇이든 한번 글로 쓴 것은 잘 잊을 수가 없어요. 듣고 읽는 것이 먹는 행위라면 말하고 쓰는 것은 소화의 단계이죠. 쓰면 쓸수록 더 많이 말하게 되고, 더 많은 언어가 필요하게 됩니다. 그렇게 쓸 수 있는 언어가 넓어지는 만큼 보이는 세계가 더 넓어진다면 그것은 저만의 착각일까요. 때로 어쩌면 언어가 모든 것이 아닐까 생각합니다. 우리는 언어 안에서 스스로를 옥죄일 수도, 자유롭게 할 수도 있어요. 그러니 글로 쓰기 어렵다면 한번 말을 해보세요. 같은 이야기를 열 번 말할 수 있다면 한 편의 글이 될 수 있을 겁니다. 말로 잘 할 수 없는 이야기를 글로 쓸 수 있을 리가 만무하니까요. 말이 술술 풀려간다면, 그대로 말하듯이 문장을 써나가보셔도 좋아요. 이야기가 술술 이어지게 되면, 거기에 더해 신나게까지 말할 수 있게 되면 나머지 일은 손과 엉덩이가 하게 됩니다. 글은 오늘이 처음일지라도, 우리는 평생 말하고 살아왔잖아요. 나의 말투는 오랜 시간 만들어진 나만의 쪼, 분위기, 뉘앙스가 있습니다. 어쩌면 말하듯 쓰는 것이 나만의 개성과 매력을 가장 잘 살리는 길이죠. 문장을 쓴다는 생각으로 딱딱해지지 말고, 평소 나의 어투와 습관, 버릇을 한껏 살려 그대로 써보세요. 혼잣말이어도 좋습니다. 때로 내 말을 가장 잘 들어주는 사람은 나잖아요.", "결국 누구도 대신 살아줄 수 없고, 누구도 대신 써줄 수 없고, 누구도 대신 아파해줄 수 없습니다. 그것이 사실이고, 때로 무척 다행이고 또 비극적이기도 합니다. 그리고 그래서, 우리가 계속 쓸 수 있는 것 같습니다. 비비언 고닉도 쓰고 양다솔도 쓰고 여러분도 쓰는 것이죠. 우리는 저마다 다르니까요. 혼자니까요. 좌우지간, 너무 많은 것을 바라지 마십시오. 무엇보다도, 누군가를 닯겠다는 생각은 과감히 버리세요. 그럴듯한 누군가를 따라하지 마세요. 그건 우리가 다르다는 유일한 점마저도 사라지게 하니까요.", "쓰기로 마음먹었다면 가장 먼저 무얼 해야 할까요? 바로 쓰는 것입니다. 지지 않고 쓰는 것이에요. 일단 마음을 먹은 순간 세상 모든 것이 달라 보이기 시작할 것입니다. 가만히 있던 다리가 저려오고, 배는 주려오고, 세상 모든 것이 재미있어 보이기 시작할 겁니다. 하지만 마음먹은 이상 지지맙시다. 핸드폰이 울려도, 한파가 내려도, 역병이 돌아도 지금 당장 앞에 있는 한 글자를 노려봅시다. 여러분은 쓰기로 마음먹었으니까요.", "여러분의 삶은 전과 같지 않습니다. 여러분은 일주일에 한 번, 귀한 이야기를 건져 올려야 하는 엄청난 사명이 있어요. 그런 사람은 어디에 있어도 조금은 다른 모습입니다. 조금 더 살금살금 걷는달지, 시선이 더 오래 머문달지, 나지막이 혼잣말을 하는 식으로요. 우리는 그런 서로를 알아볼 수도 있겠지요. 당신은 살고 있지만 동시에 쓰고 있군요, 하면서요.", "한 주 동안 데굴데굴 구르며 생각해봅시다. 지금의 나를 가장 잘 설명하는 상태, 내가 가장 자주 '하는' 것, 나를 가장 잘 설명하는 입장은 무엇일까. 내 표정이 가장 선명해지는 순간, 내 눈이 반짝 하고 빛나는 때는 언제일까. 그것을 찾게 된다면 이야기는 자연스럽게 샘속을 거예요. 이번 주에는 내가 마구 대변하고 싶은 '00씨'의 입장을 들려주세요. 혹시 입장이 아주 없으신가요? 그렇다면 무엇이든 손가락의 입장을 들어봅시다.", "하고 싶은 이야기를 찾는 방법은 바로 하고 싶지 않은 이야기도 많이 해보는 것입니다. 이것 저것 가리지 말고 많이 써보자는 이야기죠. 막상 써보면 어떤 것이 정작 재밌을지 쓰기 전에는 정말 알 수 없거든요. 하고 싶은 말을 찾았다면 이미 초고의 절반은 쓴 것이나 다름 없습니다.", "글을 쓰는 것도 시동을 거는 것이 필요합니다. 해도 해도 다시 새롭고, 누구에게나 어려운 일입니다. 앞서 알려드린 비법대로 초고를 입으로 쓰거나, 손가락을 달구며 아무 이야기를 꺼내보세요. 30분 아무거나 써보았다면, 그중 쓸만한 건 한두 문장 일 거예요. 그러면 숨을 한번 크게 들이쉬고 다시 첫 문장을 써봅시다. 오늘은 그것도 잘 안 된다 하면 특효약이 있습니다. 바로 문제적 글을 읽는 것이지요.", "작가라는 말은 글을 잘 쓰는 사람을 뜻하지 않는다는 것, 혹시 아실까요? 만약 잘 써야만 작가라면 작가의 자격을 부여받기 위해 모두가 평생을 써야 할지도 모릅니다. 잘 쓴다는 개념은 추상적이고 모든 사람의 입장에서 제각각이기 때문이죠. 작가는 그저 쓰기로 마음 먹은 사람에 가깝습니다. 태도죠. 쓰기라는 공간 안에서 오랜 시간을 보낸 사람을 뜻하기도 합니다. 빈 문서에 글자 몇자가 내리기를 오래 기다려온 사람. 왁자지껄 놀다가도 집에 돌아가 기꺼이 혼자가 된 사람. 자꾸만 찾아오는 고독을 값 싼 어떤 것과 맞바꾸지 않은 사람이죠.", "저자는 '철학은 슬픔과 사건으로 가 그 옆에서 그것을 해석하고 증언하는, 친구가 되어야 한다'고 말합니다. 내 하루에는 얼마나 많은 타자의 시간이 있을까. 나의 삶을 스스로 살기 위해 나는 얼마나 용기 있게 방황해왔을까 질문하게 됐어요. 기분 좋은 두통이 찾아오는 것 같았습니다. 문장들은 별다른 꾸밈이 없는데도 시처럼 아름답고, 한 글자 한 글자가 저를 구원으로, 더 나은 방향으로 인도하는 듯 했습니다.", "얼마 전에 넘어져서 무릎을 살짝 다쳤습니다. 그 순간 다쳤다는 슬픔과 고통의 감각보다 먼저 닥친 것은 내가 무릎을 갖고 있었구나 하는 자각이었어요. 너무 명백한 사실임에도 그걸 잊고 있었던 것이죠. 그전까지 저는 제가 아무것도 가진 것이 없는 사람이라는 생각에 완전히 빠져 있었는데, 그 순간 내가 건강한 무릎을 가진 사람이었다는 것을 알았습니다. 잃은 뒤에야 알게 된 것이죠. 어쩌면 수많은 상실을 다양한 깊이로 겪어본 사람만이 자신이 무엇을 가졌는지 감각할 수 있지 않을까요. 삶을 통째로 빼앗겨본 사람만이 삶이 무엇인지 알지도 모릅니다. 우리가 얼마나 가졌는지 안다는 것은, 얼마나 잃어봤는지와 같은 질문일지도 모릅니다.", "가진 게 많은 사람은, 가진 게 없는 사람을 도와줄 수 있지 않을까. 은연중에 그런 생각을 해왔던 것 같습니다. 행복하고 부유하고 여유로우니까. 힘이 넘치고 건강하니까. 불행하고 힘에 부치는 이를 끌어주고 부축해줄 사람은 더 많이 가진 사람이 아닐까 생각했어요. 그런데 한 친구가 전혀 다른 말을 했어요. \"행복한 사람은 너의 마음을 절대 알 수 없어. 너만큼 불행한 사람, 혹은 너만큼 불행했던 사람만이 너를 도울 뿐이야.\" 그 말을 듣고 나니 선명해지는 장면들이 있었습니다. 그의 말이 맞다는 걸 알 수 있었어요. 가진 이들이 가지지 못한 이들을 살펴 도울 줄 알았다면 일단 지구가 이 모양이 아닐 것 같았거든요.", "사랑한다는 말 대신, 나의 떨리는 입술을 그려보세요. 입을 옷을 한참 동안 고르고, 잠을 이루지 못하고, 길가를 서성이는 것을 그려보세요. 속이 울렁거리고, 가끔은 화가 나고, 별안간 배가 마구 고파진다는 이야기를 해보세요. 사랑할 때 내 몸은 어떤 상태가 되는지요. 어쩌면 그것이 사랑한다는 말 한 마디보다 상대에게 더 와닿을지도 모릅니다. '네 마음이 이 정도였어?\" 하고요. 꼭 사랑이라는 감정이 아니어도 좋습니다. 이번 쓰기에서 중요한 것은, 가장 중요한 한 마디를 생략해보는 것이에요. 사랑이라는 말 대신 다른 모든 것을 써보는 것이죠. \"사랑해\"라는 말 대신 \"너를 보면 파란 하늘이 생각 나\"라고 말해보는 것입니다. 독자는 금방 알아볼 것입니다. 때로는 눈빛만 봐도 모든 것을 알 수 있듯, 말하지 않아도 알 것만 같다고요.", "귀스타브 플로베르는 '마담 보바리'를 낭송하며 고쳤습니다. 5년 동안 지금 원전에 두 배를 쓰고, 그것을 실제로 노래처럼 불러가며 입에 걸리지 않을 때까지 고쳤다고 해요. 읽는 것만으로 운율이 느껴지도록요. 플로베르는 입이 가장 훌륭한 쓰기 선생님이라는 것을 알았던 것 같습니다. 우리는 이 언어를 평생 익히고 사용해왔습니다. 하루에도 수십 마디의 말을 듣고 쓰고 나누지요. 그 과정에서 익힌 어감과 단어의 조화, 리듬에 대한 직감을 믿어봅시다. 우리는 어쩌면 가장 좋은 퇴고법을 이미 알고 있는 것입니다. 썼다면 그것을 계속 소리내어 읽어보시기를 바랍니다. 우리가 만나게 되는 훌륭한 작품들은 그렇게 닦이는 과정을 수없이 반복한 결과입니다. 초고가 너덜너덜해져서 원래 어떤 모양이었는지 기억조차 나지 않을 때까지 고치고 또 고친 이야기예요. 그러니까 훌륭한 작품들도 초고만큼은 우리와 별반 다르지 않다는 뜻이기도 합니다. 작가라는 것은 그저 글에 다른 사람들보다 오랜 시간을 쏟는 사람에 지나지 않습니다. 그저 다른 사람들보다 시간과 정성을 들여 글을 세공하는 것이죠. 어떤 것에 시간과 정성을 오래 쏟은 사람만이 그 분야의 전문가가 되는 것이니까요.", "내가 될 수 있는 최고의 나는 지금의 내가 아닐까요? 이런저런 성공과 이런저런 실패를 두루 겪은 나. 훌륭하고 또 한심한 나. 이러니저러니 해도 계속 살기로 결정한 나요. 퇴고의 과정에서 우리는 어쨌든 어제보다는 조금 더 나은 내가 과거의 나를 힘차게 도와줍니다. 나를 지나온, 나를 가장 잘 아는, 나를 가장 사랑하는 내가요. 이렇게 훌륭한 조력자가 또 있을라고요. 당장에 버겁다면 일단 최선을 다해보고, 또 미래의 나에게 다음을 부탁해봐도 좋을 겁니다. 더 나아진 내가, 더 더 나아진 내가 계속해서 글 안에 쌓여가겠지요. 레이어를 더해갈수록 이야기는 더욱 선명해지고, 입체적이어지고, 깊어질 거예요. 이렇게 시간이라는 매개를 두고 여러 개의 내가 만나 함께할 수 있는 일이 글 말고 또 있을까 싶습니다.", "읽으면서 어디에도 걸림 없이, 의문 없이, 모순 없이 읽히면 이미 그 글은 전달에 있어 왜곡과 오해를 절반 이상 줄인 것입니다. 퇴고 과정에서 무엇보다 중요하게 여겨야 하는 것은 재미있기 이전에, 아름답기 이전에 정확해야 한다는 점입니다.", "내가 진정으로 원하는 것을 찾지 못하면, 다른 사람이 원하는 것을 따라가게 된다는 말이 있죠. 내가 내 이야기를 하지 않으면 누군가 내 이야기를 대신합니다. 어떤 역사가가, 기자가, 사회학자가, 교수가 이토록 다른 우리를 하나로 묶어 단어로 만들어버리겠지요? 혹은 없었다고 규정할지도 모릅니다. 우리는 매시간 사라지고 있으니까요. '아' 다르고 '어' 다르다는 걸 이토록 잘 아는 사람들이, 그걸 그냥 놔둘 수는 없는 일입니다.", "언젠가 세상이 다 끝난 것처럼 살던 시절이 있었습니다. 제 마음이 그랬어요. 스스로가 구제불능처럼 느껴졌고 인생은 좀처럼 나아질 것 같지 않았죠. 늘 지금 끝나도 좋다는 마음으로 살았고, 남은 힘으로는 저 스스로를 싫어하는 데 썼습니다. 그러던 어느 날 뒷짐을 지고 가벼운 산보를 나서던 비구니 스님이 저를 굽어보시더니 그러시더라고요. \"그때는 안 돼. 나도 안 되더라.\" 그러더니 빙글 웃으며 말씀하셨어요. \"마흔까지만 살아봐. 나도 마흔 되니까 좀 된다.\" 그 밝은 미소가 여전히 눈에 선합니다. \"너는 참 밝다. 그건 귀한 거다. 어디 안 가.\" 그 순간 제 인생이 마흔까지 밝아지는 것 같은 느낌이 들었어요. 아마 스님은 지금 그런 말씀을 했다는 것조차 잊으셨을 겁니다. 정말이지 지나가듯 해주신 말이었거든요. 어쩔 수 없다는, 기다려보라는, 힘을 풀어보라는 그 말씀이 진리의 말씀보다도 크게 느껴졌습니다. 그 말이 아니었다면 저는 여전히 삶을 싫어했을지도 모릅니다. 저는 지금도 마흔을 기다리고 있어요.", "여러분, 문학의 고전들을 보세요. 언어의 대가가 어떤 글을 몇 년에서 몇십 년 퇴고하니 100년이 지나도 살아 있는 고전이 됐죠. 자, 그러면 인류가 달려들어 1000년을 퇴고한 글은 어떻게 될까요. 네, 세상을 장악합니다. 제가 보기에 성경이 논리적이거나 창의적이어서 힘이 있는 게 아니고요. 내가 판단하기 이전에 머릿속에 박히도록 언어를 설계했기 때문에, 입에 완전 붙어버리기 때문에, 재밌고 충격적이기 때문에, 그냥 문장이 너무 웅장하고 멋지기 때문에 세계를 장악하는 서사가 된 것입니다.", "'언어란 권력이다'라는 말을 곱씹어 생각해봅니다. 그렇게 내가 써낸 언어들은, 적어도 나의 인생에서 권력을 갖는 것 같습니다. 쓰는 언어는 나를 멈춰서게 합니다. 내가 정말 그랬나? 내가 봤던 것이 정말 그것이 맞나? 내가 맡았던 냄새가, 내가 느꼈던 감각이 그것이 맞나. 나를 계속 내 몸에 머무르게 합니다. 세상은 무엇이었고, 그 속에서 나는 무엇이었는지 구분해보게 합니다. 자꾸만 나와 주변을 마주보게 합니다. 나조차도 눈치채지 못했던 나의 뒤통수를 바라보게 합니다. 그리하여 쓰는 사람의 눈은 다르게 됩니다. 다르게 걷고, 다르게 보고, 다르게 호흡하게 됩니다. 지금 이 순간이 단순히 이 순간으로 흘러가 사라지지 않을 것을 아는 이가 어떻게 죽어 있을 수 있을까요."]}, {"title": "쓰는 사람의 문장 필사", "author": "고수리", "genre": "인문", "publisher": "유유히", "passages": ["글과 삶은 연결되어 있습니다. 글쓰기는 내가 사는 세상의 해상도를 높이는 일. 이해할 수 없었던 사람과 삶을 가만히 들여다보고 이해해보는 일입니다. 글은 손으로 머리로 쓰는 게 아니에요. 살아온 온몸으로, 내 삶 전체로 부딪치고 통과하며 쓰는 거예요. 그 때문입니다. 쓸수록 나를 둘러싼 모든 것이 달라지고 나아지는 것은. 저는 쓰면서 조금 더 나다운 내가 되었습니다. 쓰는 사람은 현재를 삽니다. 매일 무언가를 발견하고 감탄하고 글로 쓰니까요. 경험을 꺼내 쓰면서도 과거로부터 날마다 달라져요. 매일 다시 태어나는 사람처럼, 현재에 충실하고 미래를 희망합니다. 언제나 마음속엔 '그럼에도 불구하고'라는 의지의 말을 품고 있지요. 그처럼 오늘도 내일도 나답게 살 수 있는 방법이자 의미. 그게 저의 글쓰기의 이유입니다.", "좋은 글을 쓰고 싶지만, 글쓰기가 두려울 때마다 제 마음을 추동시키는 문장들을 찾아 읽었어요. 닮고 싶은 작가의 글을 읽으며 글쓴이의 시선과 사유와 질문과 문장을 따라 읽었습니다. 글쓴이의 마음이 되어 나를 위로하는 문장, 나를 격려하는 문장, 나를 감응시킨 문장들을 옮겨 적었습니다. 좋은 글의 글쓴이가 되어 문장을 읽고 쓰는 시간이 좋았습니다. 손가락을 움직이며 고요히 문장들을 따라 쓰면서 글쓴이의 마음속으로 걸어 들어갔습니다. 글을 쓴 마음을 짐작해보았습니다. 글쓴이의 질문과 시선, 경험과 사유, 의도와 맥락, 어휘와 리듬을 생각해보았어요. 단어와 단어, 문장과 문장을 할 수 있는 한 가장 느리게 곱씹어보았어요. 세상의 스위치를 쓰고 손가락을 움직이며 글쓰기의 감각을 온전히 경험해보았습니다. 나는 이래서 글쓰기를 좋아했지, 당장 이런 글 쓰고 싶다 깨닫게 되는, 힘이 되는 시간이었습니다.", "독서는 인간의 운명에 대하여 어떠한 명쾌한 설명도 제시하지 않는다. 다만 삶과 인간 사이에 촘촘한 그물망 하나를 은밀히 공모하여 얽어놓을 뿐이다. 그 작고 은밀한 얼개는 삶의 비극적인 부조리를 드러내면서도 살아간다는 것의 역설적인 행복을 말해준다. 그러므로 우리가 책을 읽는 이유도 우리가 살아가는 이유만큼이나 불가사의하다. (다니엘 페나크, 소설처럼)", "우리는 출발해야 합니다. 이것이 글쓰기의 정체입니다. 시작하기죠. 행동과 인내와 관련이 있습니다. 꼭 목적지에 닿는다는 뜻은 아닙니다. 글쓰기는 도착하기가 아니니까요. 대체로는 도착하지 않기입니다. 우리는 몸으로, 걸어서 가야 합니다. 우리는 자아를 떠나가 버려야 합니다. 글을 쓰려면 우리는 얼마나 도착하지 않아야 할까요, 얼마나 멀리 방랑하며 신발을 닳게 하고 즐거워해야 할까요? 우리는 밤만큼 멀리 걸어야 합니다. 각자의 밤만큼 멀리요. 자아를 뚫고 어둠을 향해 걸어야 합니다. (엘렌 식수, 글쓰기 사다리의 세 칸)", "글은 하나의 장소이죠. 비물질적인 장소. 제가 상상의 글을 쓰지 않는다고 해도, 기억과 현실의 글쓰기 역시 하나의 도피 방식이에요. 다른 곳에 있는 거죠. 항상 글쓰기를 생각하면 떠오르는 이미지가 있는데, 바로 침수하는 장면이에요. 내가 아닌, 그러나 나를 거친 현실 속으로의 침수. 저의 경험은 통과의 경험 그리고 사회 세계의 분리의 경험이죠. (아니 에르노, 미셸 포르트, 진정한 장소)", "그는 결여가 어떻게 지금의 자신을 만들었는지 이야기했다. 인생에서 한 선택들 그가 자기 이야기를 들려주고 자기를 진정으로 이해해가는 과정은 나에게도 위로를 주었다. 자신의 삶이, 그 안에서 한 선택들이 왜 그런 것이었는지 돌이켜 생각해본 사람들이 자기에 대해 이야기하는 방식은 그래보지 않은 사람의 '자기 얘기'와 전혀 다른 것이었다. (서한나, 드라마)", "기초생활수급자였던 나는 제도권 안에 있었기에 제도권 밖, 즉 수급 밖의 가난이 어떠한지는 멀리서 보고 들었으되 그 사정에 훤하지 못하다. 그래서 '가난'을 주어로 문장을 쓸 때는 심히 망설였지만, 그래도 썼다. 다른 누군가가 이어서 일인칭의 가난을 쓸 테니까. 세상에는 빈곤 계측 모델로는 잡히지 않는 일인칭의 쟁쟁한 목소리들이 필요하다. 부자가 되려는 사람들은 그토록 많은 책을 쓰고 팔고 사는데, 가난이라고 못 팔아먹을까. 더 쓰이고 팔려야 할 것은 가난이다. (안온, 일인칭 가난)", "누구에게나 하고 싶은 이야기를 아무에게도 말할 수 없는 사람이 먼저 글을 쓰기 시작합니다. 계속 쓰다 보면 어느샌가 내가 한 시절을 지나왔음을 돌아볼 수 있게 됩니다. 그제야 깨닫게 될 거예요. 내 글쓰기는 자기연민이 아니라 자기이해였구나. 나는 내가 싫었던 게 아니라, 나를 이해해보고 싶었던 거구나. 나다운 나를 마주 볼 때, 냉소를 품고 있던 내가 이제는 다정하고 너그럽게 웃고 있다는 걸 알게 될 거예요. 세상에서 내 마음을 아는 단 한 사람은 나여야만 합니다.", "내가 느껴본 마음들을 오랫동안 관찰해온 사람은 어떨까요? 우리가 일기예보를 확인하고 밖을 나서듯이, 마음을 확인하고 삶을 살아간다면 예고 없는 마음이 다가와도 \"또 왔구나. 하지만 지나갈 거야\"라는 걸 아는 사람이 됩니다. 매일 일기예보를 확인하듯이 매일 내 마음을 기록해보길 권합니다. 그러다 보면 세상 밖으로 나가는 게 덜 두려워집니다. 나와 비슷한 사람을 보면 챙겨주고도 싶어지고, 끝내 내가 느끼는 모든 마음이 좋은 것만도 나쁜 것만도 아니라는 걸 알게 됩니다. 저는 더 많은 사람이 자신의 이야기를 썼으면 좋겠습니다. 단지 책이 되는 글이 아니어도 괜찮아요. 내 마음을 모르겠다는 사람, 내 인생 나답게 살아보고 싶은 사람들이 글을 썼으면 좋겠습니다. 글쓰기는 자기 자신과 만나보는 일이에요. 나는 어떤 사람인지, 어떤 생각을 하고 어떤 마음을 느끼며 사는지, 어떤 취향과 어떤 소망을 품고 사는지. 쓰면 쓸수록 내가 됩니다. 내가 어떤 사람인지 알면 내 삶을 구체적이고 주체적으로 살 수 있어요. 자기 자신이라는 세계의 전문가가 되기에 글쓰기만큼 탁월한 도구는 없답니다.", "누군가 내 글을 읽어준다고 생각하면 문장과 표현 하나라도 더 고치고, 맞춤법 한 번이라도 더 확인하게 됩니다. 독자의 눈높이에 맞춰서 잘 이해할 수 있을지 한번이라도 더 구성을 살펴보게 되죠. 누군가 읽어줄 걸 생각하면 저절로 충실하게 글을 쓰게 됩니다.", "말은 사람의 입에서 태어났다가 사람의 귀에서 죽는다. 하지만 어떤 말들은 죽지 않고 사람의 마음속으로 들어가 살아남는다. 꼭 나처럼 습관적으로 타인의 말을 기억해두는 버릇이 없다 하더라도 대부분의 사람들은 저마다의 마음에 꽤나 많은 말을 쌓아두고 지낸다. 어떤 말은 두렵고 어떤 말은 반갑고 어떤 말은 여전히 아플 것이며 또 어떤 말은 설렘으로 남아 있을 것이다. 검은 글자가 빼곡하게 적힌 유서처럼 그 수많은 유언들을 가득 담고 있을 당신의 마음을 생각하는 밤이다. (박준, 운다고 달라지는 일은 아무것도 없겠지만)", "집을 찾기 시작하면 집만 보이고, 나무를 찾기 시작하면 나무만 보이는 것처럼. 집을 찾는 사람이 나무를 찾는 사람을 만날 때 세계는 조금 낯설어지고, 꼭 그만큼 넓어진다. 나는 앞으로 집 말고 또 무엇을 찾게 될까? 무엇을 원하고 무엇을 모으는 사람이 될까? 이 질문은 내가 나에게 어떤 세계를 보여줄 것인지 묻는 말이기도 하다. 혼자서는 아주 좁고 얕은 세계밖에 볼 수 없어서 내 곁에 있는 사람들이 무엇을 찾고 모으는지 곁눈질로 열심히 힐끔거린다. 그렇게 서로를 기웃거리며 우리는 어제보다 조금 더 먼 곳을 본다. (하현, 어느 맑은 날 약속이 취소되는 기쁨에 대하여)", "매일 쓰는 사람이 그렇지 않은 사람에 비해 조금이라도 더 나은 사람이 될 가능성이 있다면, 그건 훗날 돌아볼 기록이 과거를 반성하게 해주어서가 아니라 현재에서 나와 마주 앉은 시간을 꾸준히 보내기 때문일 거예요. 그리고 그 시간은 인생에서 내게 그리 중요하지 않은 것들에 쓸데없이 힘을 빼지 않도록, 반대로 내게 중요한 것들을 지키며 살 수 있도록 도와줄 것입니다. (김신지, 기록하기로 했습니다)", "읽는 사람은 자신을 멈추게 한 지점에서 출발해 쓰는 사람이 되는 게 아닐까. 내가 기대온 언어 중 상당수가 여성의 것이었다는 점에서, 여성 서사란 이어달리기일지도 모른다. 바통을 받고, 그걸 또 다른 누군가에게 넘겨주려 빈 종이 위를 달려보는 것. 이어받고 또 이어가는 것. (임지은, 헤아림의 조각들)", "이제껏 해보지 못한 생각을 하면 좋고 이제껏 느껴보지 못한 것을 느낄 수 있으면 좋다. 꼭 시원한 바람이 얼굴을 스치는 것 같다. 그리고 '아! 이거구나'하는 깨달음은 반드시 침묵을 데리고 온다. 시간은 잠시 정지된다. 삶은 흘러가는 시간이 아니라 정지된 시간 속에서 자기 모습을 만든다. 삶은 구불구불 흘러가다가 잠깐 멈추고 정지된 시간 속에서 단단해진다. (정혜윤, 아무튼, 메모)", "만일 제가 그때로 돌아간다면 어린 제게 이런 말을 해주고 싶습니다. 지금 네가 있는 공간을, 그리고 네 앞에 있는 사람을 잘 봐두라고. 조금 더 오래 보고, 조금 더 자세히 봐두라고. 그 풍경은 앞으로 다시 못 볼 풍경이고, 곧 사라질 모습이니 눈과 마음에 잘 담아두라 얘기해주고 싶습니다. 같은 공간에서 같은 사람을 만난대도 복원할 수 없는 당대의 공기와 감촉이 있다는 걸 알려주고 싶습니다. (김애란, 잊기 좋은 이름)", "몇 시간이고 책을 읽다 보면 영혼에 살며시 물이 든다. 당신 안에 존재하는 비가시적인 것에 작은 변화가 닥친다. 당신의 목소리와 눈빛이, 걸음걸이와 행동거지가 달라진다. (크리스티앙 보뱅, 작은 파티 드레스)", "글은 많이 써보고 많이 고쳐볼수록 좋아집니다. 많이 실수해보고 많이 반성해볼수록 나아지는 인생과 꼭 닮았지요. 완벽하지 않은 자신도 좋아해주세요. 완벽하지 않은 나의 글쓰기도 좋아해주세요. 잘하려는 마음보다 좋아하는 마음이 우선입니다.", "저는 여러분이 계속 자신의 인생을 쓰면서 살았으면 좋겠어요. 인생을 돌아보고 쓸 이야기를 찾고 책을 읽고 글을 쓰고 고쳐보고, 다시 또다시 무언가를 써보려는 여러분은 이미 이전과는 다른 사람이 되었을 테니까요. 그 변화는 나만이 알 수 있습니다.", "글쓰기의 첫 단어가 '용기'라면 마지막 단어는 '계속'이라고 생각합니다. 용기와 계속을 연결하는 제가 아는 유일한 단어는 '다시'. 몇 번이고 다시, 글을 쓰면 됩니다. 자기 자신이 될 때까지, 다른 삶을 이해할 때까지."]}, {"title": "씩씩한 포크와 계획적인 나이프", "author": "이영하, 안서영", "genre": "에세이", "publisher": "세미콜론", "passages": ["고민이 있다면 함께 생각해보자고, 그리고 앞으로 나아가자고 제안하는 '스튜디오 고민'이지만, 돈가스만큼은 로스가스냐 히레가스냐 고민할 필요가 없습니다. 사이좋게 각각 하나씩 주문한 후 서로 앞에 놓인 접시 위로 슬쩍 침범해 오는 포크를 모른 척하는 다정함을 발휘하면 되죠. 그렇게 평화롭게 배를 든든히 채우고 행복을 충전한 힘으로 오늘도 마우스를 딸깍거리며 멋진 작업물을 만들어내고 있을 두 사람. 어쩌면 이 책은 '인생의 반려자'이자 '동료'이자 '돈가스 메이트'가 돈가스를 먹으며 써내려간 '작업 일지'에 가까울지도 모르겠습니다. ​", "미야 상(미야자키 하야오를 이렇게 부른다.)은 오전 11시에 딱 맞춰 출근해 오후 9시에 연필을 내려놓는다. 하루 일과는 매일 정확히 같다. 정해진 시간에 모든 직원들과 함께 라디오 체조를 한다. 마사지를 하고, 체조를 하고, 샤워를 하고, 쓰레기를 줍고, 커피를 마시러 가고, 그리고 돌아와서 밥을 먹는다. \"그게 제 생활의 기초예요. 거기서 보는 범위 안에서 세계를 판단하고 있어요. 거기에서 마을의 모습이 점점 변하고 있다든가, 그 사람이 어떻게 되었나 하고 보고 있어요.\" 미야 상은 그렇게 무려 50년을 일했다. 그림이 잘 그려지지 않는 날은 무거운 발걸음으로 터덜터덜 집에 돌아가며 \"기운 차려야지. 내일은 더 잘 그릴 수 있겠지.\" 다짐하면서. 과정은 늘 괴롭지만, 이상하게 다음 날엔 또 그리고 싶어진다고도 했다. 그런 무수한 좌절과 불면의 밤들을 거쳐 드디어 영화가 완성된다. ​", "항상 멋진 디자인만 해낼 수 없겠지만, 함께 일한 이들에게 좋은 시간과 과정을 함께했다는 인상만큼은 남기고 싶다. 그렇게 살다 보면 시간이 꽤 흐른 뒤, 누군가 어딘가에서 우리가 만든 결과물을 발견하고는 그 당시를 꽤 괜찮은 시절이었다고 떠올려주지 않을까. ​", "용건을 파악하고 생각을 정리하여 회신할 수 있는 메일과는 달리 메시지는 보통 구체적인 설명 없이 다짜고짜 말부터 걸어오는 경우가 대부분이다. 문자는 그나마 조금은 나은가. 수신인의 확인 여부를 알려주지 않으니까. 카톡에는 화면을 열어 '1'이 사라지는 순간 바로 답해야 할 것 같은 압박이 늘 묻어 있다. 업무 시간을 한참 벗어나 울리는 알림음 소리, 화면에 떠 있는 부재중 전화 n통은 21세기의 노동자들을 고문하는 방법이었다고 먼 훗날 역사에 기록될 것이다 ​", "지난밤 내 뇌가 원한 야식은 퇴근한 위장에게 갑자기 걸려온 업무 연락이었던 거야. 그리고 그 용건이 돈가스였다면 분명 가혹한 철야 작업이었겠지 어제의 위장에게 우리는 악덕한 클라이언트였던 것이다. 늦은 밤의 과식과 수면 부족으로 머리와 배가 아팠다. 그날은 내내 각자의 '갑'에게 시달린 머리와 배와 함께 깊은 반성과 후회의 시간을 강제로 보내야 했다. ​", "함께 일하는 '서로'의 삶과 휴식에 대한 배려보다 '나'의 사정과 의견만을 내세우는 상황이 이어질 때가 있다. 당장 한쪽은 원하는 것을 조금이나마 얻을지도 모른다. 그렇지만 협력하는 마음이 조금씩 어긋나기 시작하면, 정작 일이 끝날 때쯤엔 그 누구도 결과물에 만족하지 못하게 되는 경우가 많았다. 서로가 들인 시간과 노력이 아까운 경우다. 설령 가장 좋아하는 음식인 돈가스일지라도 잘 소화할 수 없을 때 먹는 것은 안 먹느니만 못한 것이다. ​", "든든한 배를 두드리며 문득 J언니를 떠올렸다. 그녀는 늘 보통 주문하지 않을 것 같은 음식을 골라 사람들에게 깊은 인상을 남기곤 했다. 예를 들면 순대 전문점에서 모두가 순대국밥을 외칠 때 혼자 고구마 돈가스를 주문하는 사람이었다. 그녀는 내가 아는 이들 중 회복탄력성이 가장 뛰어난 사람이다. 설령 오늘 고른 김치말이 국수에 실패하더라도, 좋은 경험이었다며 시원하게 웃는다. 그리고 내일은 내일의 이상한 메뉴를 고를 것이다. \"나는 추천이라고 크게 쓰여 있는 메뉴는 왠지 안 끌리더라고. 궁금한 거 먹어보는 게 더 재밌잖아.\" ​", "요즘은 많은 것을 알고 있다고 안주하는 마음이 오히려 새로운 가능성을 막고 있는 것 아닐까 생각한다. 내가 아는 것들이 전부라고 느껴져 일상이 지루해질 때, 살짝 경로를 바꾸어 늘 가던 길의 옆길로 가본다. 생소한 음식을 맛보거나 낯선 분야의 책을 읽으며 작은 새로움을 만난다. 실패한 메뉴의 기분은 잊어버리고, 오늘도 가보자고! 해보자고! ​", "디자인은 대외적인 이미지와는 달리 몽상보다는 현실과 맞닿아 있는 부분이 많아 타협할 지점이 많은 분야다. 아이디어가 '뿅'하고 떠올라서 '촤라락' 그림을 그리고 멋진 타이포그래피와 레이아웃이 '착착착' 붙어가는 과정은 운이 좋으면 1년에 한 번이나 ​", "소개한 네 가지 컵은 주로 1970년대에 만들어졌다. 중고가 아니면 더 이상 구매할 수 없다. 유구하게 양도되어온 거다. 어느 개인의 역사가 만난 적 없는 타인에게로, 어느 테이블의 역사가 다른 테이블로 이어져왔다는 사실이 좋다. 그곳에 담겼을 수많은 이야기는 우리가 할 수 없지만. 경험과 시간이 제한된 세계에서 물건은 우리에게 중요한 매개가 된다. 엎질러진 시절을 다시 통과하게 되고 먼 타인과 나의 생활이 포개어진다. 아주 작은 물건을 손에 쥐면서. 우리는 그렇게 만날 수도 있다. ​", "자신의 세계를 움직여 먼 곳까지 와 준 한 사람 한 사람을 환대하는 그의 얼굴이 그려졌다. 시장의 수요보다 백 배만큼 내어줄 준비가 된 시인이. 실로 그는 웃으며 낭독회를 잘했을 것이다. 그것은 시장이 기억하지 않을 공급 방식이었다. 이후에도 그날의 대화를 자주 생각한다. 삶 앞에서 꼿꼿한 고개를, 스스로의 일을 존중해주고 자신을 작게 만들지 않는 자세까지 전부. ​", "나에게 더는 필요하지 않은 소유가 누군가에게는 기다려온 바로 그 물건일 수 있다. 꼭 팔아야 하는 사정과 마침 그걸 찾던 손이 만날 수도 있다. 고맙잖나, 서로의 필요를 채워줄 수 있다는 감각은. 비슷하게 간절한 사람들이 만나는 순간을 좋아한다. ​", "이름을 모르고 만났지만 어떤 정체성은 들킬 수밖에 없다. 말과 태도는 그 사람의 지문 같아서 잘 감춰지지 않는다. 다행스럽고 무서운 일이다. 우리가 서로를 알아볼 수 있다는 건, 알아차릴 수밖에 없다는 건. ​", "이연실은 자신이 만들었거나 만들고 있거나 앞으로 만들게 될 책에 미쳐있다. 원고를 아낀다는 말로는 모자란다. 그의 SNS에는 매일 이 책을 왜 사야 하는지에 대한 글이 원고지 10매 분량으로 올라온다. 자신이 만드는 책의 훌륭함을 알리고 싶어 마감이 어려운 신문 기고도 마다 않는다. 어떤 화두가 나오든 자신이 만든 책과 연결 지어 생각하고, 책을 통해 세계를 보고, 책을 만들면서 감탄한다. 그렇게 완성된 책이 세상에 나오면 널리 알리고 전하다가 또 감탄하고 감탄한 걸 자랑하고 그것에 대해 인터뷰하거나 칼럼으로 쓰기도 하면서 책 사랑하는 일을 성실하게 반복한다. 책에 모든 것을 건 사람처럼 한다. ​", "판매 실적도 보너스도 최고의 편집자라는 영예도 중요하겠지만, 무엇보다 그는 이야기를 아낀다. 찬탈할 줄 안다. 이 이야기가 왜 소중하고 꼭 필요한지 휩쓸리듯 설득된 사람이 이야기를 가장 잘 팔 수 있는 것이다. 모든 장수가 그렇겠지만 이야기 장수는 특히 그렇다. 부지런히 발품을 팔면서 다음 이야기를 찾아다니는 애정, 계속해서 반하는 능력, 시간이 지나도 기억하는 재능, 그리고 나만 알지 않기로 하는 너그러움까지, 이런 자질을 가진 사람들은 필연적으로 이야기 장수로 산다."]}, {"title": "아무튼, 친구", "author": "양다솔", "genre": "에세이", "publisher": "위고", "passages": ["그는 인생의 무작위성에 대해 알고 있었다. 삶은 개연성 없는 소설 같았다. 논리적이지 않았고 설명할 수도 없었다. 의도치 않은 결과들의 합, 우연의 연속, 무맥락적인 장면들 같았다. 차라리 주사위를 던지는 행위와 비슷해 보였다. 그렇다면 그는 온 마음을 다해 주사위를 던지는 사람이었다. 어떤 것은 뜻대로 되었고 어떤 것은 되지 않았다. 원하던 결과가 나오지 않는 것이 그의 마음을 무겁게 할 수는 없었다. 깊이 생각하지 않았다. 우리가 할 수 있는 것은 다시 던지는 일이라는 걸 그는 알았다. 그는 자주 기도하는 모습이었다. 그의 얼굴이 갈망으로 가득 찼다가 이내 의연해지는 것을 나는 자주 목격했다. 원하는 것을 향해 그토록 가볍고 올곧게 나아가는 사람을 본 적이 없었다. 그런 그를 정말시킬 수 있는 것은 세상에 그리 많지 않을 것이었다.", "그들은 눈에 저항하는 법이 없었다. 가게 주인들은 쌓이는 눈을 바라보다가 무릎 위를 넘어가기 시작하면 하나둘 가게 문을 닫았다. 눈발이 거세지면 가던 길을 멈췄고 전화를 끊었고 일정을 취소했다. 눈이 허락하는 일들을 했다. 그 얼굴에 어떤 아쉬움도 보이지 않았다. 당연한 일이었다. 눈과 싸우려고 드는 게 오히려 이상했다. 그곳에서는 \"눈이 와서요\"라는 한마디로 모든 설명을 대신할 수 있었다.", "어느 날 아침, 나는 내가 37도가 넘는 꽤나 높은 열에 시달리고 있다는 걸 알고 매우 화가 났다. 점심때 친구를 만나기로 했기 때문이었다. 눈치도 없이 아프기 시작한 몸이 짜증스러웠지만 친구와 만날 수 없다고는 생각하지 않았다. 친구와의 약속을 취소하는 것은 있어선 안 되는 일이었다. 나는 무슨 일이 있냐는 듯 벌개진 얼굴로 약속 장소에 나갔다. 친구는 \"어디 아픈 거 아니야?\"라고 물었고 나는 전혀 신경 쓸 것 없다고 말하며 덧붙였다. \"어서 놀자.\"", "친구와 있는 순간에만 입을 열고 웃는 일이 많았다. 마치 독방에서 옥살이하는 사람이 따사로운 바깥 햇살을 쬐는 것처럼. 그 순간만이 나와 멀어지는 유일한 시간이었다. 대부분의 사람은 이런 나의 짙은 외로움을 쉽게 눈치 채지 못했다. 너무 밝고 유쾌한 나머지 이렇게 어두운 사람인지 몰랐어요, 하고 말했다. 그럴 때면 나는 조명 감독이 된 듯한 기분이 들었다. 아주 밝은 빛을 누군가에게 쏘고 있지만, 가장 어두운 곳에 서 있는 사람. 누군가를 사랑하는 환한 마음은 늘 나를 앞서 있었다. 어쩌면 나는 나를 그 뒤에 숨겼는지도 모르겠다.", "친구들은 마치 한글을 처음 배우는 아이를 가르치듯 나를 앉혀놓고 말했다. 우리가 우정을 오래 이어가려면 편하게 약속을 미룰 수 있어야 하지 않을까? 앞으로도 볼 날은 많으니까 말이야. 더 편하게 거절을 말할 수 있어야 하지 않을까? 서로를 사랑한다는 믿음이 있으니까 말이야. 몸이 조금이라도 안 좋으면 쉴 수 있어야 하지 않을까? 가장 최선의 컨디션으로 서로를 보고 싶으니까 말이야. 그 말들이 한 귀로 들어와 한 귀로 흘러 나가지 않기 시작한 것은 강산도 변한다는 10년이 흐른 뒤였다. 누군가를 진정으로 믿는 데에 10년이나 필요하다는 사실은, 친구를 그렇게 사랑한다는 사람이 할 일이라고는 믿기지 않는다.", "잘 지내고 있다가도 와르르 무너졌다. 잠깐의 부재와 두절, 순간의 불친절, 한 번의 무심한 답변, 가벼운 거절에 벌벌 떨었다. 그런 것들의 그림자만 비쳐도 줄행랑을 쳤다. 좋은 추억들이 순식간에 뒤집혔다. 행복했을수록 끔찍해졌다. 언제 어디서 잃어버렸는지 모르는 실핀 하나를 찾듯이 과거로 되돌아갔다. 끝을 알 수 없는 되새김질을 시작했다. 왜 나는 늘 이렇게 쉽게 혼자가 되어 있나 생각했다. 친구들은 내 생각을 증명이라도 하듯 곁을 떠나갔다. 그들은 내게 싫다고 말하는 대신, 상처받았다고 말하는 대신, 부담스럽고 이해할 수 없다고 말하는 대신 말없이 자리를 털고 일어섰다. 무슨 말인가 하려고 옆을 보면 나 혼자 남아 있었다.", "지쳐 있는 것은 나도 마찬가지였다. 나는 그즈음 집에서 대부분의 시간을 누워 보냈다. 아무런 생각도 하고 싶지 않았고 아무런 행동도 하고 싶지 않았다. 할 수 있는 일이 아무것도 없다고 느꼈다. 나의 몸은 매일 일정 시간 회사를 왕래했던 것 같다. 그 시간에 영혼이 어디에 가 있었는지는 모르겠다. 해가 뜨면 지하철을 타고 해가 지면 또 지하철을 탔던 기억만이 희미하게 남아 있다. 그 사이의 기억은 텅 비어 있었다. 그것만으로 힘을 다했다는 듯 나머지 기억들은 소각되었다. 어떤 눈빛으로 누구와 어떤 말을 했는지, 하루하루가 어떻게 흘러가는지 기억하지 못했다. 어느 순간부터 삶은 내가 바란 적 없는 거대한 흐름에 그저 쓸려 가고 있었다. 그때 스투키가 나에게 말했다. \"오늘 밥 한끼도 못 먹었어.\" 마음이 폴짝 뛰어 올랐다. \"바보야, 밥을 굶으면 어떡해!\" 나는 벌떡 일어났다. 벌컥 냉장고 문을 열었다. 온갖 재료를 꺼냈다. 씻고 썰고 볶고 삶아 따듯하고 푸짐한 한 상을 차려냈다. 그즈음 나는 스투키를 기다리며 세수를 하고 집 안 곳곳을 청소하고 이불을 털고 낡은 보일러를 최대한으로 올렸다. 휑한 집 안에 온기가 감돌았다. 스투기에게 밥을 차려주는 것이 내가 할 수 있는 유일한 일이라는 생각이 들었다. 나는 열 일을 제쳐두고 나섰다. 마치 부름을 기다려왔던 사람처럼 일어섰다. 멀리서 두팔을 벌리고 있는 누군가의 품으로 질주를 하듯 달려 갔다. 스투키가 뭔가를 말하는 순간, 나는 그걸 할 수 있는 사람이 되었다. 그러고 보면 그녀에게서 한 번이라도 미안하다거나 고맙다는 인사를 들은 적이 없었다. 돌아보면 그런 말을 바랐던 적조차 없다. 무엇이든 그저 기꺼이 하고 싶었다.", "\"개미가 서로 춤추면서 얘기하는 거 알아?\" 그녀는 손가락을 휘휘 돌리다가 엉덩이를 덩실덩실 흔들었다. 당연히 몰랐고 몰라도 되는 줄 알았다. 그가 개미에 대해 얘기할 때의 얼굴을 '환희'라는 단어의 사전적 정의에 넣고 싶다. 그를 만나고부터 나에게 개미라는 단어가 가지는 의미는 완전히 달라졌다. 나는 다른 종에 대해 그토록 오래 말하는 사람을 본 적이 없었다. 인간사, 인간 세상을 벗어난 이야기를 그토록 열정적으로 설명하는 사람을 처음 보았다. 마치 먼 옛날부터 대대로 친구였던 가문에 대해 말하는 것 같았다. 그가 개미에 대해 말하면 말할수록 지구에서 개미란 존재가 선명해져가는 느낌이었다. 길에서 개미를 마주치면 반갑기까지 했다. \"안녕, 공주한테 얘기 많이 들었어\" 하고 말을 걸고 싶어졌다. 내가 사랑하는 친구가 사랑하는 친구였기 때문이다.", "숲의 인간이란 빛이 있으면 움직이고, 거둬지면 멈추어야 한다. 칠흑 같은 어둠 속에서 글자를 읽기 위해 밤마다 호롱불을 밝히던 옛날 사람들을 상상한다. 무언가 배우고자 하는 마음으로 이 짙은 어둠을 밝히는 마음이란 어떤 것이었을까. 그것은 불 꺼진 방에 누워 휴대폰 빛을 밝히는 마음과 왜 그토록 다르게 다가오는가.", "나는 어쩌다 내 전화를 받지 않는 친구들만 사귀게 되었을까. 내가 그들의 전화를 받지 않은 적은 없었다. 벨소리가 울린다 싶으면 득달같이 받았다. 그들은 몇 년이 되도록 나의 컬러링이 뭔지조차 몰랐다(고심해서 고른 것이었다). 마치 위키토키 같았을 것이다. 창공에 대고 \"다솔아\" 하고 부르면 바로 \"응?\" 하고 답하는 수준. 그들은 두세 달에 한 번, 그러니까 나한테 그 존재가 거의 잊힐 즈음 뜬금없이 전화를 걸어왔다. \"그냥 한번 걸어봤어.\" 그 말을 들을 때마다 벅차고 놀라웠다. 그냥이라는 마음으로 나를 떠올려줬다는 것이 감동스럽고 벅찼다.", "생각날 때마다 집 앞에 찾아가서 목 놓아 놀자고 외쳐 부르는 친구와, 생각나면 가끔 엽서나 부치겠다고 하는 친구 사이의 우정 생활은 결코 쉬운 것이 아니었다. 폭포수와 낡은 수도꼭지를 나란히 상상하면 될 것이다. 친구라는 존재의 크기가 각자에게 잔인하리만치 다를 수 있다는 사실을 인정한 순간에야 우리의 관계는 성장할 수 있었다."]}, {"title": "아주 오랜만에 행복하다는 느낌", "author": "백수린", "genre": "에세이", "publisher": "창비", "passages": ["나보다 먼저 이 동네에 살았던 이가 다른 주민들과 더불어 살면서 만들어온 질서와 생태계를 존중하며 천천히 변화를 만드는 것. 이 동네에 살기 시작한 이래 나는 그런 일들에 관심이 생겼다.", "\"사는 건 자기 집을 찾는 여정 같아.\" 언니가 그렇게 말한 건 케이크를 먹던 중이었다. \"타인의 말이나 시선에 휘둘리지 않고, 나 자신과 평화롭게 있을 수 있는 상태를 찾아가는 여정 말이야.\" 그 말이 내 마음을 움직였다. 미술을 전공한 후 말도 통하지 않는 나라에 수녀가 되겠다고 갔다가 10년 만에 다시 한국에 돌아와 육체노동을 하며 살고 있는 언니도, 글을 쓰고 읽으며 나누는 게 삶의 대부분인 나도, 방식은 다르지만 같은 목적지를 향해 묵묵히 걷는 여행자들처럼 느껴졌다.", "유리병이 아름다운 것은 섬세하고 연약한 물성을 지녔으면서도 그렇지 않은 것처럼 견고한 표정을 짓기 때문이다. 그것은 구겨졌다 펴지는 대신 차라리 산산이 부서지는 성질을 지녔고, 차감고 매끄러운 표면을 가지고 있다는 점에서 도도하고 관능적이다. 참기름이나 후추처럼 일상적인 식재료를 품은 병들조차 찬장 구석에 박혀 있을지언정 빛을 받는 순간 언제고 보석처럼 영롱히 반짝일 만반의 준비를 하고 있다. 무겁고 쉽게 깨진다는 점에서 플라스틱 용기보다 실용성은 뒤지지만, 유리병들을 바라보고 있으면 '나는 용기지만 그것이 나의 전부는 아니야'라는 비밀스러운 속삭임이 들려오는 것만 같다.", "완벽이란 말은 얼마나 폭력적인지. 완벽하지 않아도 된다는 말이 게으름의 면죄부가 되어선 안 되겠지만 완벽한 것만 의미가 있다는 생각은 결국 그 누구도 행동할 수 없게 만드는 나쁜 속삭임이다. 이 세상 그 누구도 완벽할 수는 없으니까. 인간은 원래 그렇게 생겨먹은 존재들이니까. 아무것도 하지 않은 채 팔짱 끼고 앉아 '당신은 이런저런 잘못을 저질렀으니, 당신의 행동들은 결국 무의미해'라고 먼 곳에서 지적만 하는 건 언제나 너무도 쉽다.", "마스크를 쓰지 않고 외출한 적이 없어 밖에 나가고 싶을 때는 '신발'이라고 말하는 대신 '마스크'라고 말하는 아이가 커서 살아갈 세상은 내가 알던 세상과는 아주 다를 것이다. 태어나자마자 타인이 내 생명에 위해를 끼칠 수 있는 존재일지 모르니 경계해야 한다고 배운 세대에게 연대의 중요성에 대해 가르치는 일은 그 이전 세대와 완전히 다른 방식이 되어야 할 것이다. 그 아이가 살아갈 세상에선 내가 가진 가치관이 더이상 유효하지 않고, 그런 가치관에 대해 말하는 게 그 아이를 더욱 피곤하게 만드는 일이 될지도 모른다고 생각하면 마음이 심란해진다. 하지만 나는 여전히 조카에게 더 나은 세상을 주고 싶고, 조카가 사랑과 생명이 가득한 세상을 꿈꿀 수 있기 바란다. 쉽게 허무에 지고 비관주의에 빠지는 내게 생긴, 그래도 아직 무언가 해야 할 일이 있고 할 수 있다고 믿으려 애쓰는 마음. 이 마음은 조카가 내게 준 선물인지도 모르겠다.", "무엇이 되었든 생명을 가진 존재는 한없는 사랑을 필요로 한다. 그리고 무한한 사랑을 받으며 성장한 존재는 사랑을 줄 줄 안다. 봉봉은 차갑고 이기적이기만 하다고 생각한 내 안에도 사랑이 이렇게나 많이 숨어 있었다는 것을 처음으로 알려준 존재다.", "사람들이 그토록 서투른 말들을 건네는 이유는 죽음에 대해서 말하는 법을 알지 못하기 때문이다. 나는 오르빌뢰르의 문장을 읽으며 사랑하는 이를 잃는 사람 앞에서 제대로 된 위로의 말을 건넬 수 있는 사람은 이 세상에 존재하지 않는다는 걸 이해하게 됐다 죽음은 너무나도 커다란 상실이자 슬픔이고, 그것을 담기에 언어라는 그릇은 언제나 너무나도 작다.", "나는 편리함이나 쾌적함이 주는 선명한 기쁨만큼이나 낡고 오래된 것이 주는 은은한 기쁨을 아낀다. 오래된 것이 아름다운 건 시간을 품었기 때문이다. 나에게는 사람이나 동식물처럼 생명을 지닌 것이든 공간처럼 그러지 않은 것이든, 무언가가 품위와 존엄을 가질 수 있는 건 수많은 상실과 슬픔을 견디며 쌓아올린 세월의 무게가 있기 때문이라는 믿음이 있다. 시간을 견뎌낸 것들은 그것만으로도 존중받을 만한 가치가 있다.", "봉봉을 사랑하게 된 이후 나는 세상의 모든 동식물을 조금 더 애틋한 눈으로 바라보게 됐다. 나의 개가 소중한 만큼, 다른 모든 존재들 또한 그러할 것이므로. 사랑은 고이는 것이 아니라 더 넓은 곳을 향해 흐르는 강물일 것이므로. 끝내 모두를 살게 하는 것이므로", "하지만 대부분의 날에 나는 그럼에도 불구하고 내 몫의 수고로움을 스스로 감당하며 살아내는 것이 값진 일이라는 걸 안다. 그것들은 내가 지금 누리고 있는 글을 쓸 자유, 사랑하는 사람과 다른 형태의 공동체를 꿈꿀 자유, 타인의 기대나 시선에 부합하는 내가 아니라 오롯한 나 자신으로 존재할 자유를 쟁취하기 위해 내가 기꺼이 지불해야 하는 비용이라는 걸 알고 있기 때문에."]}, {"title": "아주 희미한 빛으로도", "author": "최은영", "genre": "소설", "publisher": "문학동네", "passages": ["어떻게 말해야 할까. 나는 그 수업의 모든 부분이 마음에 들었다. 시멘트에 밴 습기가 오래도록 머물던 지하 강의실의 서늘한 냄새, 천원짜리 무선 스프링 노트 위에 까만 플러스펜으로 글자를 쓸 때의 느낌. 그녀의 낮은 목소리가 작은 강의실에 퍼져나가던 울림도 모두 마음에 들었다. 그녀가 고른 에세이들도 좋았고, 혼자 읽을 때는 별 뜻 없이 지나갔던 문장들을 그녀가 그녀만의 관점으로 해석할 때, 머릿속에서 불이 켜지는 순간도 좋았다. 나도 마음 깊은 곳에서는 알고 있었지만 언어로 표현할 수 없었던 것이 언어화 될 때 행복했고, 그 행복이야말로 내가 오랫동안 찾던 종류의 감정이라는 걸 가만히 그곳에 앉아 깨닫곤 했다. 가끔은 뜻도 없이 눈물이 나기도 했다. 너무 오래 해매었다는 생각 때문이었다.", "'그곳은 용산에서 갈 수 있는 가장 먼 곳이었다.' 그녀는 이어서 그렇게 썼다. 페이퍼백 영어 소설들을 읽으며 그녀는 용산으로부터도, 자신의 언어로부터도 멀어질 수 있었다. '영어는 나와 관계없는 말이었다. 나와 가까운 사람들이 쓰던 말이 아니었다. 내게 상처를 줬던 말이 아니었다.'", "\"무슨 언론을 보셨는데요. 해외 기사도 보셨나요? 그게 경찰특공대에 철거 용역까지 투입할 상황이었나요. 시위대가 폭력적이라고요? 고작 이천오백만원 던져주면서 나가라고 하면 저항도 못하고 끌려나가야 하나요? 정말 그렇게 믿어요? 그 정도의 잔인함이 옳다고?\" 나는 아직도 그 말을 하던 사람의 얼굴을 기억한다. 그가 잔인함을 잔인함이라고 말하고, 저항을 저항이라고 소리 내어 말할 때 내 마음도 떨리고 있었다. 누군가가 내가 느꼈던 감정과 생각을 날것 그대로 말하는 모습을 보며 한편으로는 덜 외로워졌지만, 한편으로는 지금까지 그럴 수 없었던, 그러지 않았던 내 비겁함을 동시에 응시할 수 있었기 때문이다.", "\"지금 이 발표자의 글이 그렇다는 건 아니지만\" 그녀가 입을 열었다. 그녀는 어떤 사안에 대한 자기 입장이 없다는 건, 그것이 자기 일이 아니라고 고백하는 것밖에는 되지 않는다고 말했다. 그건 그저 무관심일 뿐이고, 더 나쁘게 말해서 기득권에 대한 능동적인 순종일 뿐이라고, 글쓰기는 의심하지 않는 순응주의와는 반대되는 행위라고 말했다. 나는 그녀의 말을 들으면서 고개를 들 수 없었다. 순응주의, 능동적인 순종. 그런 말들에서 나의 글이, 삶에 대한 나의 태도가 자유롭지 않다는 것을 누구보다도 내가 잘 알고 있었기 때문이다. '지금 이 발표자의 글이 그렇다는 건 아니지만'이라는 말은 나를 모욕하지 않으려는 배려였을 뿐, 그녀가 속으로는 분명 다른 판단을 내렸으리라고 짐작했다. 나는 그때 강의실을 둘러싼 이상한 열기를 기억한다. 그녀의 발언에 대한 지지와, 한편으로는 분명한 반감이 뒤섞인 공기를. 그 학기 내내, 그녀의 수업시간에는 그런 긴장감이 돌곤 했다.", "\"난 편향되지 않아 좋다는 말 자체를 이야기하고 싶었지, 희원씨 글이 자기 입장 없는 글이라고는 생각 안 했어. 그건 그 친구가 잘못 읽은 거지. 혹시 오해할까봐 얘기해요.\" 그러면서 그녀는 그간 내가 제출한 에세이들에 대해 좋은 평을 했다. 명료하게 자기 생각을 보여주는 글도 있지만, 한쪽으로 비켜서서 응시하는 글도 있으며, 어떤 방식이 더 좋은 것인지는 분명히 이야기할 수 없다고 했다. 사람들이 하는 말에 휘둘리느라 자기 목소리를 잃어서는 안 된다고 그녀는 내게 넌지시 말했다. 하나의 글을 놓고 여러 명이 부족한 부분을 중심으로 지적하는 식의 수업이 얼마나 도움이 되는지 모르겠다고 혼자말처럼 이야기하기도 했다. 나는 그런 말을 하며 책 모서리를 만지막거리는 그녀의 기다란 손가락을 바라봤다.", "\"나도 모르는 거 아니야. 난 희원씨가\" 그녀는 거기까지 말하고 망설이다가 긴 숨을 뱉었다. 흰 입김이 찬 공기 안으로 퍼져나갔다. 그녀가 기다리던 버스가 정류장에 도착했다. 나는 그때 그녀가 무슨 말을 하려던 것인지 종종 상상해보곤 했다. 나도 모르는 거 아니야. 난 희원씨가 세상 탓하면서 해소되지도 않을 억울함 느끼는 것 바라지 않아. 나도 모르는 거 아니야. 난 희원씨가 어린 여자라는 이유로 무례하게 대하는 사람들, 그냥 무시해버렸으면 좋겠어. 나도 모르는 거 아니야. 난 희원씨가 상처의 원인을 헤집으면서 스스로를 더 괴롭게 하지 않았으면 좋겠어. 하지만 시간이 지날수록, 그다음 문장이 어떻게 완성되었을지는 그렇게 중요한 일이 아니라는 생각이 들었다. 그것이 어떤 문장이든, 그녀는 내가 자신보다는 나은 경험을 하기를, 자신이 겪었던 일을 겪지 않기를 바랐을 것이다. 그리고 그것이 그녀의 자존심이자 힘이었으리라는 생각도 한다. 자신의 조건을 탓하지 않고, 자신이 겪는 부당함을 인지하면서도 인정은 하지 않으려는 마음 같은 것 말이다. 그 마음이 그녀를 지켜주었는지도 모른다. 비록 동의할 수 없지만, 이해할 수는 있는 마음이라고 지금의 나는 생각한다.", "어느 순간부터 나는 그녀의 이름으로 나온 글이나 번역서를 찾을 수 없었다. 구 년 전의 내 눈에는 누구보다도 똑똑하고 강해 보였던 그녀가 어디에도 자리잡지 못하고, 글이나 공부와 무관한 사람으로 살아간다는 사실이 때로는 나를 얼어붙게 한다. 나는 나아갈 수 있을까. 사라지지 않을 수 있을까. 머물렀던 흔적조차 남기지 않고 떠난, 떠나게 된 숱한 사람들처럼 나 또한 그렇게 사라질까. 이 질문에 나는 온전한 긍정도, 온전한 부정도 할 수 없다. 나는 불안하지 않았던 시간을 기억하지 못한다.", "당신은 지나가는 말로라도 희영에게 칭찬을 한 적이 없었다. 희영의 통찰력, 글쓰기 능력, 절제력을 갖고 자기 삶을 운영하는 능력에 대해서. 희영이 얼마나 특별한 사람인지, 어떤 의미에서 강한 사람인지 이야기해야 했던 사람은 당신이었는데도. 당신에게 그럴 자격이 없다는 생각 때문이었을까. 입을 열면 말을 하는 순간 당신의 초라함이 더 분명해지리라는 두려움 때문이었을까. 그러나 돌이켜보면, 희영은 언제나 당신의 인정을 바랐는지도 모른다. 함께 글쓰기를 시작한 친구의 인정을. 모두가 느끼고 있었던 희영의 재능에 대해서 희영 자신은 한 번도 확신한 적이 없었다. 분명한 논리로 자기 의견을 관철시켜가던 희영의 강한 얼굴 뒤로 자신은 글을 쓸 자격도 재주도 없다는 괴로움이 자리하고 있는 줄 그때의 당신은 알지 못했다. 나는 말했어야 했어. 당신은 그 생각으로부터 벗어날 수가 없다. 조금의 의심도 없이 자기 확신으로 가득찬 인터뷰이들을 만날 때마다 당신은 희영을 생각했다.", "당신은 1991년부터 시작된 가정폭력방지법 제정 운동의 역사를 정리하는 일을 맡았다. 그건 공론화된, 맞아 죽은 여자들의 역사를 정리하는 일에서부터 시작됐다. 장기간 폭행이 지속되어 살기 위해 남편을 죽여야 했던 여자들도 있었다. 당신은 그 여자들의 이야기를 종이에 적다가 땀처럼 솟는 눈물을 몇 번이나 닦아내야 했다. 당신은 울면서 글을 썼다. 마음이, 당신과 아무런 관계도 없는 사람들의 마음에 붙을 수 있다는 것을 당신은 그때 알았다. 글을 다 쓰고 회의에 들어간 당신은 소리 내어 글을 읽다가 몇 번이나 목이 메어 낭독을 중단해야 했다.", "선배들은 우리가 책임감이 있어야 한다고 말하지만, 난 해진이 네 행복이 더 중요하다고 생각해. 자길 괴롭히면서까지 해야 할 일 같은 건 없는 것 같아. 그래도 희영은 잠시 침묵하다 말을 이었다. 난 이번에 너랑 같이 작업하면서 좋았어. 너한테 의지도 많이 했고. 난 네 글 좋아하니까, 계속 읽고 싶어. 점점 더 잘 쓰잖아. 한 학기만 더 해보는 건 어때. 그때 당신은 어떤 대답을 했을까. 어떤 이유로 당신은 그곳을 떠나지 못했을까. 당신은 남는 것을 선택했다. 계속 남아 새로운 글을 쓰기로 결심했다. 그때의 선택이 당신의 삶을 여기까지 이끌고 올 줄 모른 채로.", "이 년 가까이 편집부 일을 하면서 당신은 예전처럼 더디게 글을 쓰지 않았다. 덩어리 같은 막연한 생각을 언어로 풀어낼 때, 어렴풋하게 떠오른 문장들을 당신의 목소리로 종이 위에 적어나갈 때. 당신은 더이상 사람들 앞에서 우물쭈물하는 겁쟁이가 아니었다. 골똘히 한 생각을 써내려간 글 속에서 당신은 당신 나름의 힘을 느낄 수 있었다. 당신은 그런 순간들이 당신에게 준 경이와 행복을 계속해서 경험하고 싶었다. 그토록 나약해 보이는 당신 안에도 누군가의 마음을 건드리고 흔들 수 있는 힘이 있다는 것을 글로 보여주고 싶었다. 당신도, 아무것도 아닌 사람처럼 보이는 당신도, 감정이 있고 생각이 있는 사람이라는 것을 그런 식으로라도 증명하고 싶었다. 글쓰는 일이 쉬웠다면, 타고난 재주가 있어 공들이지 않고도 잘 할 수 있는 일이었다면 당신은 쉽게 흥미를 잃어버렸을지도 모른다. 어렵고, 괴롭고, 지치고, 부끄러워 때때로 스스로에 대한 모멸감밖에 느낄 수 없는 일, 그러나 그것을 극복하게 하는 것 또한 글쓰기라는 사실에 당신은 마음을 빼앗겼다. 글쓰기로 자기 한계를 인지하면서도 다시 글을 써 그 한계를 조금이나마 넘을 수 있다는 행복, 당신은 그것을 알기 전의 사람으로 돌아갈 수 없었다.", "직원들에게 소리치거나 반말을 섞어 쓰는 사람들을 그녀는 자주 보았다. 그러나 그만큼이나 그녀를 피로하게 한 건 그런 사람들의 입에서 나오는 무의미하고 진부한 말들이었다. 현재 자신이 얼마나 중요한 위치에 있는지 자랑하는 말들. 자기가 느끼는 감정을 다 드러낼 수 있고 자기가 하고 싶은 말은 생각나는 대로 다 할 수 있는, 자기 특권을 과시하는 사람들.", "대수롭지 않게 말하고 웃으며 사무실을 나왔지만 씁쓸한 마음을 숨길 수가 없었다. 그녀는 다희에게 서운함을 느끼지 않기 위해 노력했다. 서운하다는 감정에는 폭력적인 데가 있었으니까. 넌 내 뜻대로 반응해야 해, 라는 마음. 서운함은 원망보다는 옅고 미움보다는 직접적이지 않지만, 그런 감정들과 아주 가까이 붙어 있었다. 그녀는 다희에게 그런 마음을 품고 싶지 않았다.", "네 나이 때는 하루에 꼭 한 쪽이나 두 쪽의 일기를 써야 잠들 수 있었어. 그러다 나이가 들면서 길이가 점점 줄어들었고 요즘에는 그날 어떤 음식을 먹었는지, 어떤 손님을 만났는지 같은 내용을 짧게 메모하는 수준이야. 오늘이 어제와 다르고 또 내일과도 다를거라는 근거를 적어두는 거지. 기록하지 않으면 하루하루가 같은 날이, 하나의 덩어리가 되어 한꺼번에 사라져버릴 것 같은 두려움이 있거든. 아마 수감 생활을 하면서부터 그런 마음이 들었던 것 같아. 나는 그때 그 어느 때보다도 많은 글을 썼어.", "내가 일하던 레스토랑은 호텔 맨 꼭대기 층에 있었어. 일을 마치고 복도로 나와서 서울의 야경을 멍하니 바라보던 날들이 떠올라. 그럴 때면 내가 아직 스물두 해밖에 살지 않았다는 사실이 믿기지 않았어. 벌써 백 년은 산 것 같은데, 이미 너무 오래 산 것처럼 지쳐버렸는데 아직도 스물둘이래. 밤하늘 아래의 불빛들이 반짝이면서 너는 앞으로도 살아야 해, 살아가야 해, 하고 낮게 합창하는 것 같았어. 더 알고 싶은 것도, 더 해보고 싶은 것도 없는데, 이젠 아무것도 궁금하지 않는데, 그런데도 살아야 한다고 자꾸만 누가 내 등을 떠미는 것 같았지.", "언니는 아주 어린 나이부터 내게 어른처럼 보이고 싶어했지. 어리고 약한 나를 보호하는 역할을 자처했어. 그건 책임감이 크기 때문이기도 했지만, 자신이 강하고 독립적인 사람이라는 걸 확인하는 방법이기도 했을 거야. 그게 언니 자신이 믿는 스스로의 모습이었고 언니를 언니로 살아가게 하는 힘이었을 거야. 하지만 나는 그날 언니의 믿음을 완전히 부정했지. 언니의 삶을 다른 사람에 의해 이미 망가진 것으로 취급했어. 내가 언니보다 나은 사람이라고 굳게 믿고 언니를 가르치려 했어. 언니의 삶이 망했다고 판결했어. 그것이 나를 어린 시절부터 돌봐준 언니에게 내가 한 보답이었다.", "\"내가 어떻게 널 비겁하다고 생각해.\" 그가 웃음기 없는 얼굴로 그녀를 응시했다. \"내가 많이 실망스러웠을 거야.\" 그는 고개를 저었다. \"민주 넌 지금 살아 있잖아.\" 그녀를 똑바로 바라보면서 그가 말했다. \"그거면 돼.\" 시선을 피하는 그녀에게 그가 다시 말했다. \"그거면 돼, 민주야.\"", "사랑하는 사람이 사라져도, 그 몸이 잿가루가 된다고 하더라도 여전히 그 사람이 다른 방식으로 존재하리라고 믿는 그 낙관이 부러웠다. 아무리 노력해도 그녀는 그와 같은 사고를 할 수 없었으니까. 그런 비과학적인 믿음은 자기기만과 다를 바 없다고 생각했다.", "\"민주야\" \"응.\" \"너 힘든 거, 나 줘 가지고 갈게.\" 그녀는 그를 바라보기만 했다. \"여기.\" 그는 그녀의 마음이 무슨 물건이라도 되는 것처럼 그녀에게 손을 뻗었다. 자기 손 위에 그녀의 이야기를 올려달라는 듯이.", "나는 더는 돌봄을 받아야 할 존재도 아니었지만, 온전히 자기 힘으로 설 수 있는 능력도 없었다. 아무도, 나를 포함한 누구도 나를 좋아한다는 느낌을 받지 못했다. 지금과는 달라져야 한다고, 달라지고 싶다고 생각하면서도 어떻게 달라져야 하는지 알지 못했고, 무엇을 하든 어설프고 우스꽝스러울 거라는 확신만 들었다. 나는 일평생 이모의 짐이자 장애물이었다. 그런 생각을 하면 나도 모르게 눈물이 고였다.", "나이가 들고 성숙해진다는 건 그저 자신의 환경에 점점 더 익숙해진다는 뜻인지도 몰랐다.", "읽고 쓰는 사람들의 몫은 지금 사회가 듣지 않으려는 목소리가 잘 들릴 수 있도록 만드는 것 못지않게 그 목소리가 저 혼자만의 역량으로 울릴 수 있다는 착각에서 빠져나오게 하는 것, 한 사람의 목소리에는 이미 많은 이들의 삶이 담겨 있어 그러한 연결을 통해 그 자신으로 존재할 수 있음을 알리는 것으로까지 나아간다.", "누군가의 돌봄 없이 살아갈 수 있는 사람은 세상에 아무도 없다. 인간은 태어나면서부터 죽을 때까지 다른 이를 필요로 하고 동시에 다른 이에게 필요한 역할을 하면서 살아가는 존재다. 돌봄은 이를 인식하기 위해 하는 활동이자, 실제로 사람을 사람답게 살려내는 행위이다.", "최은영의 인물들이 특별히 더 작고 연약하게 느껴진다고 할 게 아니라 우리 모두에게 있는 작고 연약한 면을 최은영의 소설이 기민하게 포착할 줄 안다고 해야 할 것이다. 작아지고 연약해진 덕분에 연결된 타인을 통해 영향을 받고, 변화할 용기를 내는 사람들에 관한 이야기를 하는 것이라고. 최은영의 화자들 중 결말에 이르러 바뀌지 않는 인물은 거의 없다. 최은영의 인물들은 약자로서의 자기 자신을 재확인하는 자리가 아닌 스스로를 성찰하기를 망설이지 않음으로써 회복하는 자리에 있고자 한다. 소란으로 가득한 침묵 속에서, 각각의 존재가 품고 있던 목소리의 빛깔을 찾아주는 방식으로 최은영은 회복하는 이야기를 쓴다.", "사람들이 각자 독백을 하고 마는 게 아니라 대화다운 대화를 나눈다면 무슨 일이 벌어질까. 상대에게서 지금까지 알던 것과는 전혀 다른 면모를 발견하기도 하고, 짐작조차 하지 못했던 상대의 모습을 알게 되기도 할 것이다. 소설 속 그녀가 생각하듯, 이는 두려운 일일 수 있다. 그만큼 상대에게 바라는 게 많아질 수도 있기 때문이다.", "책을 낼 때면 원고를 썼던 시간을 다정한 눈길로 바라보게 된다. 무엇을 얼마나 잘했는지 못했는지, 성공했는지 실패했는지 같은 시선으로 나의 지나간 시간을 정의할 수 없게 된다. 잃었다고 생각하는 것들의 목록을 만드는 일도, 내 힘으로 차마 어쩌지 못했던 순간들을 복기하는 일도 하지 않는다. 그저 그리운 마음으로 놓아준다. 원고를 쓴 시간을, 내가 통과해온 모든 순간을 이글들을 묶어 책으로 내놓으면서 나는 지난 오 년의 시간과 이별하고자 한다."]}, {"title": "아파도 미안하지 않습니다", "author": "조한진희", "genre": "사회정치", "publisher": "동녘", "passages": ["아픈 몸이 되고서야 비로소 우리 사회가 건강 중심 사회임을 알게 되었다. 질병이 내 몸의 일부일 수 있음을 인정하자, 세상이 다르게 읽혔다. 비장애인 중심 사회가 장애인들을 배제하듯이, 건강 중심 사회는 아픈 몸들을 배제하고 있었다. 아픈 몸들을 자책감의 나락으로 밀어내고 있었다.", "몸은 사회로부터 독립되어 개인에게 속한 것처럼 느껴진다. 그러나 몸과 질병은 사회와 유기체처럼 밀접하게 연결되어 있고, 사회의 변화는 몸과 질병에 민감하게 영향을 미친다. 마치 안팎을 구별할 수 없는 도형 '뫼비우스의 띠'처럼 말이다. 여성운동에서 오랫동안 지적해왔듯, 마른 몸이 아름다운 여성 몸의 기준으로 등장하면서 개인들은 과도한 다이어트에 도전하게 되었다. 실제로 그런 사회적 기준은 여성 개인의 바디라인과 지방세포의 수치를 변화시켰다. 이는 인간의 몸이 사회로부터 분리되어 존재하지 않음을 선명히 보여준다.", "질병은 개인의 몸에서 발생하는 사건이지만, 더 가난하고 더 차별받을수록 발병률이 높아진다는 사실을 수많은 통계가 말해준다. 이런 통계 앞에서 대부분의 사람들이 깊이 고개를 끄덕이는 것을 본다. 그럼에도 동시에, 누군가 폐암에 걸렸다고 하면 담배를 많이 피우는 나쁜 습관이 문제였다고 비난한다. 위암에 걸렸다고 하면 짜게 먹고 빠르게 먹는 습관 때문이었다고 책망한다. 가난할수록, 그리고 삶이 제한적일수록 스트레스를 해소하기 위해 시도할 수 있는 방식이 많지 않아서 담배에 의존하게 되는 현실은 갑자기 사라진다. 먹고살자고 하는 일인데도 정작 일하다 보면 밥 먹을 시간이 부족해서 빠르게 먹고, 그러다 보니 짜게 먹게 된다는 현실 또한 사라진다. 이런 사회적 조건들은 삭제된 채 오로지 개인의 생활습관만 지적된다. 결국 아픈 몸은 자신이 잘못 살아서 질병이 왔다는 지독한 자책감에 빠진다. 나는 그렇게 질병의 사회적 책임을 지워버리고, 개인의 책임만을 강조하는 '질병의 개인화' 현실을 목결할 때마다 답답했다.", "의학으로 죽음을 삭제할 수 없듯이 질병을 삭제할 수 없다. 누구나 아프게 되고 죽게 된다. 질병이나 죽음 자체가 비극이 아니라, 그것을 온전히 자신의 삶으로 겪어낼 수 없을 때 비극이 된다. 우리에게 필요한 것은 고된 노동을 반복해도 결코 아프지 않은, 무한히 노동할 수 있는 몸이 아니다. 자연이 생명체에 부여한 생로병사를 낙인이나 차별 없이 겪을 수 있는 몸, 잘 아플 수 있는 사회가 필요하다.", "아픈 몸도 행복한 삶은 질병을 '극복'하지 않아도, 자신의 몸을 '정상'으로 교정하지 않아도 자책감에 시달리지 않고 존중받는 사회에서 가능하다.", "식이요법을 지도해준 분은 '질병은 몸에 찾아온 손님'이라며, 극진히 대접해서 떠날 수 있게 해주라고 했다. 질병은 죽음으로 쉽게 미끄러지지 않도록 몸에서 신호를 보내는 것이라며, 몸을 쉴 수 있게 해주니 얼마나 고마운 일이냐고 덧붙였다. 엄격히 생활을 관리하며 사는 게 재미있는 일은 아니었다. 하지만 내 몸을 이토록 극진히 돌봐준 적이 단 한 번도 없었음을 떠올리며, 소중한 시간으로 여기려 했다.", "질병을 경험한다는 것은 몸에 대한 통제권을 상실하는 일이다.", "질병이 왔을 때 스스로 어떤 선택과 대처를 할 수 있는지 알아가는 시간이 필요하다. 질병을 관통해나가는 과정도 내 삶의 일부임을 인정할 수 있어야 한다. 질병이 삶을 모두 점유해버리지 않도록 하려면 어떻게 일상을 살아야 하는지에 대한 지혜도 필요하다.", "우리의 질병 이야기가 고립되지 않고 만날 수 있기를 바란다. 그래서 사회에서 일상적이고 소소한 더 많은 질병 이야기가 돌아다니는 것을 보고 싶다. 그럼으로써 누구든 질병 앞에서 외로움과 혼돈을 조금 덜 겪게 되기를 바란다.", "내가 시간 빈곤에 시달리면서도 왜 시간과 에너지를 들여 질병에 관한 글을 쓰는지 묻는 사람들이 있다. 소중한 의미가 너무나 많지만, 그중 하나는 내 몸이 질병을 소유하는 게 아니라 내 몸을 질병과 공유하고 있음을 받아들이는 과정이기 때문이다. 또한 질병과 함께 사는 방법을 익히고, 그 과정에서 발생하는 고민과 감정을 언어화해보는 과정이 나뿐 아니라 같은 처지의 사람들에게 위안이 된다는 점을 깨달아서다. 앞으로도 아픈 몸을 설명한 언어를 꾸준히 길어 올리고 싶다. '건강한 삶'이나 '정상의 몸'에 가려진 다양한 이야기가 얼마나 많은지 더 많은 주제로 말하고 싶은 충동을 느낀다. 그 충동을 나와 같은 처지의 '동료'들이 함께 느끼길 바란다.", "사회가 아픈 사람을 대하는 태도에는 공통점이 있었다. 아픈 사람에게 질병이나 건강관리에 대해 한마디씩 할 수 있고, 해도 된다는 믿음 같은 것 말이다. 잘 알지도 못하는 이들 조차 간섭하고 통제하려 드는 것, 누가 그들에게 그런 권위를 승인해주었을까?", "노력한 만큼 얻는 게 아니라 이기는 만큼 얻는 게 '정의'가 된 사회다. 이런 사회에서 효율성 떨어지는 아픈 몸은 부정의한 것으로 취급되기 쉽다. 심지어 비효율적인 것은 모조리 제거해야 한다고 보는 문화에서 아픈 몸은 스스로에게도 얼마나 걸리적거리는 존재인지! 가까운 이들은 물론, 잘 모르는 이들조차 최선을 다해 '건강한 올바른 몸'을 쟁취하라고 강요하는 것 같다.", "아픈 몸들이 질병으로 인한 차별과 낙인을 겪지 않을 것이라는 신뢰를 가질 수 있을 때, 비로소 사회적 예방이 가능해진다. 더 이상 낙인으로 인한 좌절감 때문에 치료를 포기하지 않을 것이고, 두려움으로 인해 질병을 숨기지도 않을 것이다. 즉, 질병 때문에 사회가 위험해지는 게 아니라 낙인과 차별 때문에 사회가 위험해지는 것임을 분명히 해야 한다.", "건강하지 않으면 모든 걸 잃는 사회가 되어서는 안 된다. 건강하지 않아도 함께 살 수 있는 사회를 만들어야 한다. 그런 사회를 만들기 위해 무엇이 필요한지 고민하는 것은 우리 몫이다. 설령 건강 격차가 해소되어서 소득이나 성별과 상관없이 모두에게 건강할 권리가 보장된다고 해도 아픈 몸은 늘 존재한다. 그게 생의 법칙이다. 건강이 선이고 질병이 악인 건 아니다. 생로병사는 생명의 순환 과정이다. 태어남만이 축복이고 죽음은 언제나 좌절인 것도 아니다. 이러한 순환을 분절하고 위계화하기 때문에 태어남만 기쁨이 되고 노화와 질병은 불행으로만 여겨지는 것이다. 이때 죽음은 삶의 완성이 아니라 의학적 실패가 된다. 따라서 건강만을 중심에 두는 것은 아픈 몸이 평등하게 함께 사는 과정을 방해한다. 아픈 몸이 동정과 시혜에 의존하지 않고 하나의 주체로 온전히 살아가려면 건강한 몸이 중심이고, 아픈 몸이 주변이어서는 안 된다. 건강을 선으로 규정하고, 질병을 절망과 악으로 규정해서도 안 된다. 건강한 몸과 아픈 몸 사이에 발생하는 위계가 해체될 때, 아픈 몸도 차별과 배제 없는 삶을 누릴 수 있다.", "문제는 우리의 아픈 몸이 아니다. 질병을 삶의 일부가 아닌 배타적 대상으로 만든 사회다. 지배 권력의 필요에 맞춘 정상과 효율의 기준을 만들고, 거기서 벗어난 몸들을 모조리 차별하는 몹쓸 사회다. 오히려 자신의 쓸모를 입증하려는 노력을 그만둘 때, 아픈 몸을 극복해서 정상이나 표준이 되려는 흉내를 그만둘 때, 그리고 아픈 몸과 불협화음을 만드는 이 사회를 자책 없이 성찰할 때, 바로 그때 아픈 몸의 '쓸모'가 빛을 발한다. 건강과 효율이 정의가 된 사회에서 아픈 몸은 질문을 발생시킬 수밖에 없다. 중심과 정상에서 밀려난 아픈 사람은 이러한 현실을 조망하며 새로운 정의를 질문할 수 있는 더없이 좋은 위치에 있다. 나는 계속 질문을 쏟아내는 내 몸을 조금씩 긍정해가는 중이다.", "병을 진단받기 전에는 허상일지 모르는 증세에 불과했는데, 의사에게 병명을 부여받자 실재하는 질병이 되면서 비로소 환자의 경험(증세)이 사회적으로 존중받는 느낌은 개운치 않다. 이는 자신의 몸에서 벌어지는 일로부터 소외되는 것이다. 내 몸은 어제와 똑같은데, 오늘 의사가 어떤 의학적 명명을 붙이느냐에 따라 그 순간부터 완전히 다른 몸이 된다. 환자의 경험이 의학적 언어로 설명될 때만 실재하는 것으로 존중받을 수 있다니, 얼마나 불행한 일인가? 게다가 병명을 찾지 못할 때 의사가 흔히 내리는 '심인성'이라는 진단은 또 어떤가? 자신의 증세가 의학적 병명을 부여받지 못할 때, 환자는 스스로 감각과 경험을 의심하게 된다. 이 정도 통증은 다들 견디며 사는데, 자신이 너무 나약하고 까다로운 건 아닌지 자책한다. 자기 몸의 통증이 '정당'한 것인지 자문하기도 한다. 사실 통증이란 감각이므로 옭고 그름이 아니라 그 자체로 존재하는 것이다. 그럼에도 통증을 느끼는 자신이 정당한지에 대한 검열을 반복하고, 자기 몸의 소리와 감각이 부적절하다고 느낀다. 이는 자기 부정의 경험으로 이어지기도 한다.", "의료 민영화를 주장하는 이들은 개인의 잘못으로 병에 걸렸으니 그 비용을 사회가 함께 책임지는 게 부당하다고 말할 수 있다. 질병 예방 차원에서도 바람직하지 않고, 재원의 낭비이며, 자본주의 원리에도 맞지 않는다고 항변할 수도 있다. 결국 필요한 이들이 필요한 만큼 소비하는 자본주의 시장에 의료를 내맡기는 게 합리적인 방법이라고 근엄하게 말할지도 모른다. 아프기 싫고 높은 의료비를 지출하기 싫으면, 좋은 생활습관을 가지고 건강관리를 잘하면 되는 것이며, 그게 곧 질병 예방에 순기능으로 작용할 것이라고 태연하게 외칠지도 모른다. 그렇다면 정부의 입장에서는 질병의 개인화가 어떻게 다가올까? 관리되지 않은 위험물질로 시민 건강이 위협받는다거나, 중산이 빈곤층으로 이동하게 되는 주요 원인이 병원비라는 뉴스가 나올 때, 사실 정부는 가시방석이다. 건강권은 기본권이니 의료 공공성을 강화하라는 주장을 마주칠 때마다 정부는 대기업이나 의료자본, 그리고 복지 예산의 관점을 오가며 눈치를 본다. 따라서 질병의 개인화는, 시민이 건강하게 살아갈 만한 환경과 권리를 보장해야 할 의무가 있는 정부에게도 반가운 주장일 것이다.", "질병의 개인화 논리에 익숙해진 시민들은 질병을 자기 관리의 실패로 여기게 된다. 이 경우 사회적으로 질병을 예방하라거나, 의료 공공성을 확대해 시민 건강을 증진하라는 요구에 관심을 갖기 어렵다. 그 시간에 더 좋은 음식과 더 효율적인 운동에 대한 정보를 찾고 실천하게 된다. 심지어 중증 질환으로 경제적 위험이 닥쳤을 때도 화살의 방향은 엉뚱한 곳을 향한다. 보장성이 적은 국민의료보험을 비판하기보다는 암보험이나 실손보험 같은 민간보험을 하나라도 더 들지 않은 것을 개탄하는 식이다.", "현대사회에서는 여성의 몸 자체를 이유로 교육이나 노동에 제한을 두는 일이 줄었지만, 나약함은 여전히 여성의 매력 요소로 평가된다. 따라서 여성이 아프다는 것은 남성의 경우에 비하면 사회적으로 더 잘 수용된다.", "남성들은 아프다는 사실, 즉 나약함을 인정하기 어려워한다. 어디가 불편하다고 세세히 말하는 것이나 일상적으로 약을 챙겨 먹고 몸을 돌보는 것이 '남자답지 않다'고 여기는 경향이 있다. 한편으로는 스스로 통제할 수 없는 몸을 상당히 수치스러워 한다.", "나는 여성으로 호명되는 존재라서 아프다는 사실이 사회적으로 더 잘 수용된다. 그 배경에는 여성의 몸이란 원래 나약하고 열등하다는 전제가 깔려 있다. 이 사회에서 나약함은 보호가 필요하며 통제가 가능하다고 본다. 평등이 불가능한 관계를 전제하는 것이다. 우리 삶 구석구석에 젠더가 공기와 물처럼 스며 있음을 새삼 깨닫게 된다.", "우리 사회는 여성의 몸을 스펙과 자본으로 여기며, 인구 대비 성형수술 건수 세계 1위를 차지한 기록에서 알 수 있듯, 몸을 평가하고 통제하며 서열화하는 데 익숙하다. 따라서 여성들은 몸에 대한 수치심을 더 쉽게 내면화한다. 질병은 성별과 상관없이 몸이 겪는 사건이다. 그러나 여기에 들러붙는 몸 이미지는 여성 환자에게 더 많이 영향을 끼칠 가능성이 높다.", "'여성이 몸'으로 환원되는 현실과 '동물이 고기'로 환원되는 현실의 연결 고리를 발견했을 때 마주한 감정, 더 많은 새끼를 생산하기 위해 평생에 걸쳐 임신하고 그 임신한 새끼를 평생 빼앗기는 암소, 암퇘지, 암탉의 현실에 내가 연루되어 있다는 사실은 충격이었다. 여성을 '소유'하는 행위에 대해 '먹었다'라고 표현하는 것의 직접성과, 성폭력과 가정폭력의 피해자들이 '고기가 된 기분이었다.'라고 말할 때의 의미를 다시금 확인하게 되었다.", "그나마 요즘은 돌봄의 가치를 이해하고 노력하는 남성들이 늘어가는 것으로 보인다. 하지만 여성성의 일부로 돌봄을 훈육 받은 여성들과 달리, 그럴 기회가 별로 없었던 남성들은 돌봄을 어떻게 수행하는지 모르는 경우가 많다. 그러다 보니 남성들의 돌봄 손길에는 '더 걸리적거릴 뿐'이라는 평가가 붙기 쉽다. 아픈 와중에도 여성들이 돌봄을 받기는커녕 타인에 대한 돌봄노동을 멈출 수 없는 것은 돌봄노동을 할 줄 모르는 대부분의 남성들 때문만은 아니다. 돌봄노동이 여전히 가족의 몫으로만 남아 있고, 충분히 사회화 되지 못한 현실도 한몫한다.", "수술동의서의 본래 의미를 생각해보자. 수술 내용을 포함해 합병증과 후유증에 대한 설명을 들었으며, 그런 위험에도 불구하고 수술에 동의한다는 뜻이다. 만에 하나 그런 위험이 현실로 닥쳤을 때 환자의 합병증이나 후유증을 함께 돌보고 책임지며 살아갈 존재는 누구일까? 법이 그것을 '정상가족'으로 보고 있기 때문에 병원에서도 그들에게만 보호자 서명을 허용한다.", "비혼과 1인 가구의 증가는 기존의 가족 안에 묶어둔 돌봄노동을 사회하하는 좋은 촉진제다. 특히 1인 가구를 전제로 보건의료 관련 제도가 만들어지고 시행될 경우, 이는 1인 가구에게만 유용한 것이 아니다. 1인 가구를 전제로 한 정책은 가족을 1차적 복지 담당자로 놓던 문화를 해체시킨다. 비로소 사회의 구성단위가 가족이 아닌 개인으로 '현대화'된다는 의미다. 이로써 혈연가족이나 다인 가구 안에서 '복지 담당자'이기만 했던 여성들도 돌봄을 받을 수 있는 기회가 주어질 것이다.", "건강은 고용, 임금, 관계, 학력, 주거, 돌봄, 지역 등의 영향에 매우 민감하다. 특히 돈을 벌어야 생존이 가능한 자본주의 사회에서 '해고'는 건강에 매우 집접적으로 영향을 미치는 요소다. 해고 가능성이 높아지는 것만으로도 고혈압이나 심혈관계 질환 유병률이 증가한다는 보고도 있다. 비정규직일수록, 저임금일수록 건강이 나쁘다. 그리고 삶에 대한 통제권이 적을수록, 차별을 받을수록 건강이 나쁘다.", "어쨌거나 우리는 사실상 아플 수밖에 없는 구조에서 살아간다. 그런데도 높은 건강 기준을 요구받는 것을 당연시하거나, 질병이 없는 완벽한 무균질의 몸이 가능하다고 상정하는 것은 아닐까? 그리고 그 기준에 부합하지 못하는 것을 자신의 게이름과 관리 부족 때문이라고 자책하며 살고 있지 않은가?", "소아마비나 뇌병변 같은 전통적 개념의 장애를 지닌 가까운 지인들은 장애는 질병이 아니며 그 둘은 명확히 구분되어야 한다고 강조한다. 이들은 지하철을 탈 때 흔히 겪는 장애인에 대한 차별과 멸시의 시선도 싫지만, '어디가 아픈 거냐'라는 질문이 짜증난다고 한다. 그런 이야기를 들을 때마다 장애가 있으나 건강한 자신이 아픈 몸이 되는 것 같아 우울해진다고 말한다. 게다가 장애를 '치료'하기 위해 가족들 손에 이끌려 전국 방방곡곡 용하다는 곳을 다녔던 기억이 떠올라 끔찍하다는 이야기도 들려준다. 소아마비나 뇌병변 같은 장애는 의학적으로 치료되지 않는다. 자신의 장애는 치료될 수 있는 게 아닌데도 끊없이 치료를 시도하는 것은, 자신의 몸을 그대로 인정하고 수용하지 못하는 태도의 반영이라고 말한다.", "장애인 인권운동에서도 그동안 장애와 질병은 구분되어야 하며, 장애는 질병이 아니라고 외쳐왔다. 질병은 치료나 죽음을 통해 종료되는 일시적인 것이지만, 장애는 치료되는 영역이 아니라 평생에 걸쳐 지속되는 특성이라고 규정한다. 재활을 통해 약간의 변화가 나타날 수는 있어도 치료되는 영역은 아님을 분명히 한 것이다. 이는 장애가 있는 몸을 '치료와 교정'으로 최대한 '비장애인의 몸에 가깝게' 만들어야 차별을 해소할 수 있다는 태도를 전면적으로 거부한다는 뜻이다.", "중증 질병은 인생에서 큰 사건인 동시에, 매우 빠르게 많은 것을 결정해 나가야 하는 과정이기도 하다. 우리는 인생을 살아가면서 수많은 갈림길에 놓인다. 특히 빠른 선택이 필요할 때, 인생에 대한 가치관이 명확하게 형성되어 있으면 더없이 유용한 나침판으로 쓸 수 있다. 우리가 질병을 겪을 때도 마찬가지다. 미리 의료 가치관을 세워두면 큰 도움이 된다. 이는 아플 때도 삶에 대한 결정권을 놓치고 싶지 않은 사람에게 꼭 필요하다. 우리 모두 질병을 피할 수 없다면, 잘 아플 수 있기를 바란다.", "누구나 최선을 다해 질병으로부터 도망치고 싶어 한다. 질병을 둘러싼 막연한 두려움의 한쪽 끝자락에는 죽음이 있다. 당장 죽음에 이르게 하는 심각한 증세가 아닐지라도, 질병은 한없이 멀리 있는 듯한 죽음과의 거리를 줄여준다. 죽음에 대한 두려움은 생명체에게 자연스러운 일이지만, 인간은 생각의 동물인지라 막연한 두려움은 실체 없는 불안을 한없이 부추긴다. 이따금 죽음을 둘러싼 나의 감정이나 기억, 이상적 죽음을 떠올려본다. 이는 질병과 함께 살아가는 내 삶을 좀 더 안정감 있게 만들어준다.", "직종이나 업무별로 질병 형태가 조금씩 다를 수 있지만, 일하느라 몸이 아프게 되는 현실은 흔하다. 세계적으로 높은 노동시간과 강도를 자랑하는 한국에서, 직장을 오래 다닐 수록 몸이 더 많이 아픈 것은 필연으로 봐야 한다. 살려고 직장에 다니고 있건만, 일하면서 오히려 질병에 걸리거나 사망에 이르는 것이다. 이러한 현실이 이토록 광범위한 직종에서 자주 발생하는 사회가 또 있을까.", "다인 가구로 살아가는 여성들 대다수는 가족 구성원들에게 인스턴트 음식이나 외식이 아닌, 집밥을 먹이기 위해 장을 보고 음식을 조리한다. 또한 식사 이후에도 설거지와 음식 관리 등의 노동을 수행할 때가 많다. 그 덕분에 신선한 음식이 식탁에 오르고, 누군가는 여유롭게 대화를 나누며 그 식사를 즐길 수 있다. 또한 가족 구성원의 건강에 이상이 없는지 일상적으로 상태를 살피고 적절한 영양제를 챙겨주는 노동도 여성의 성역할에 포함된다. 이외에도 가족이라는 집단 자체를 유지하기 위해서 다양한 정서적 물리적 노동이 필요한데, 그 대부분도 엄마나 아내의 이름으로 여성이 수행한다. 뒤집어 말하면, 1인 가구가 건강에 취약한 주요한 이유 중 하나는 집에 '엄마'나 '아내'가 없기 때문이다. 역사적으로 지금과 같은 '임금노동' 자체가 출근은 노동, 귀가는 쉼을 전제로 한 형태다. 그리고 집이 쉼의 공간일 수 있었던 것은 돌봄노동이나 가사노동 같은 재생산 노동을 무료로 수행하는 '여성'이 있었기 때문이다. 그런데 유사 이래로 1인 가구가 대거 출현했고, 그들은 재생산 노동을 무료로 수행해줄 '여성'이 '집'에 없다. 현재 1인 가구는 임금노동부터 돌봄 노동과 가사노동까지 모두 혼자 수행해야 한다.", "1인 가구가 취약계층이라면 그것은 1인 가구라는 형태 때문이 아니다. 다인 가구를 전제로 한 사회복지 시스템과 1인 가구의 삶을 반영한 정책의 부재가 1인 가구를 취약계층으로 내몰고 있다. 건강이나 질병은 개인이 어떤 사회적 조건 아래 사느냐에 따라 큰 영향을 받는다. 특히 1인 가구처럼 사회복지 서비스의 영향에 민감할 수밖에 없는 집단은 더더욱 그렇다. 1인 가구의 건강과 안녕을 지킬 수 있도록 1인 가구의 경험과 언어를 반영한 사회정책과 복지를 애타게 기다리고 있다.", "최선을 다해 일하지 않으면 자책한다. 일이 곧 인생이 되어버렸다. 최선을 다해 일하지 않는 것은 인생에 최선을 다하지 않는 것과 같은 의미가 되어버렸다. 그래서 노동에 최적화 된 몸을 만들지 못하고 아프게 된 것을 자책한다. 자책하는 이유가 회사에 미안해서인지, 아픈 몸에 미안해서인지 혼란스럽다.", "아픈 몸에 관한 글을 쓰기 시작하면서 매뉴얼 형태의 글은 가능한 한 쓰지 않으려 했다. 아픈 몸을 둘러싼 이야기는 사회적으로 아직 턱없이 부족하며, 지금은 매뉴얼을 만들기보다 질문을 풍부하게 던질 때라고 생각했기 때문이다. 또한 매뉴얼 같은 것은 실제 상황에 도움이 되기는 하지만, 질문을 휘발시키며 무언가를 고정시켜 버리기도 한다. 성급하게 이것이 더 옳고 저런 말은 부적절하다고 규정해버리면, 질문과 상상력은 생명력을 잃고 박제된 답만 얻기 쉽다.", "사람은 언어가 있어야 의지대로 살 수 있다. 언어를 통해 자신의 삶을 이해하고 해석할 수 있으며, 여러 현실에 대응할 수 있다. 그런데 질병과 함께 사는 몸을 설명할 언어가 없으니, 무력할 수밖에 없었다. 알다시피 동일한 사건도 누구의 시선과 언어로 접근하느냐에 따라 완전히 다른 관점과 결론에 다다르게 된다.", "나는 의료인이나 건강한 사람들의 언어가 아니라 철저히 아픈 몸의 관점에서 질병을 다시 읽고, 건강을 새롭게 사유해보려 했다. 건강한 몸이 윤리이자 스펙인 사회에서 아픈 몸의 경험과 의미를 해석해보고자 했다. 의료로서의 질병이 아니라 삶으로서의 질병을 말하고 싶었다. 우선은 아픈 몸들의 경험을 가시화하는 것에서 출발했다. 아픈 몸들의 경험이 잘 보이지 않는 것은 사회가 아픈 몸의 경험에 대해 무지해서기도 하겠지만, 아픈 몸의 경험은 애초에 쓸모없는 경험, 듣기 피곤한 이야기로 치부되기 때문이다. 나는 이러한 현실을 넘어서 보고자 했다. 아픈 몸의 경험이 이 사회의 모순을 읽는 데 얼마나 유용한지 보여주고 싶었다. 실제로 질병은 사회의 여러 구조가 압축적으로 작동하는 장이다. 빈곤이나 젠더는 물론이고, 개인의 다양한 정체성이 질병의 발병이나 치료 양상에 상당한 영향을 미치기 때문이다.", "여성운동에서 누가 여성인가는 논쟁적 주제다. 장애인운동에서도 무엇이 장애인가는 지속적으로 논의되는 주제다. 각각은 고정된 하나의 정답만 있는 게 아니며, 그것을 질문하는 행위 자체가 운동의 좌표를 계속 질문하는 주요 과정이기도 하다. 건강권 운동에서도 마찬가지로 건강이 무엇인지에 대해 다양한 논쟁이 펼쳐지는 것을 보고 싶다. 더 풍부한 논쟁이 다양한 소수자의 경험을 바탕으로 진행되었으면 한다."]}, {"title": "액세스가 거부되었습니다", "author": "조경숙", "genre": "사회정치", "publisher": "휴머니스트", "passages": ["테크 기업들은 혁신적인 서비스만이 아니라 어처구니 없는 사건사고로도 사람들을 깜짝 놀라게 한다. 진보적인 메시지와 보수적인 경영방침이, 혁신적인 기술과 구시대적인 관행이 공존하는 곳. 세상을 변화시키는 것이 구성원 모두의 미션이라고 자부하지만, 업계 전반의 모습만큼은 결코 바꾸려 하지 않는 곳. 그곳이 바로 테크 업계다.", "서비스를 제대로 만들기 위해서는 만드는 사람도 자기가 다루는 콘텐츠가 무엇인지 알아야 한다. 서비스는 사용자와 만나 무언가를 함께하는 일이다. 이때 만남은 만나는 순간만으로 이뤄져 있지 않다. 만나서 대화하고 함께 무언가를 하다가 헤어지는 모든 순간이 만남을 구성한다. 우리는 이렇게 만들어진 관계를 어떻게 책임질 것인가? 어떤 서비스든 이 물음에 답해야 할 때가 온다.", "불친절하고 날선 말투에 개인의 책임이 없다는 게 아니다. 다만 이런 현상이 특정 직군에게서 자주 발견된다면 한번쯤 그 너머를 바라볼 필요가 있다. 퉁명스럽게 단답으로 일관하는 그 사람은 사실 설명하기에 너무 지쳤을 수 있다. 기술력부터 정신력까지 모든 걸 혼자 감내해야 하는 노동환경에서 소통에 힘쓸 여력이 부족해서일 수 있기 때문이다.", "중요한 건 서비스 장애 그 자체가 아니라 이에 대응하는 태도다. 기업이 자신의 잘못을 사과하고 수습하는 태도에서 그들이 사회를 바라보는 태도와 가치관이 드러난다. 남궁훈 전 대표는 한결같이 '공동 성장'을 말했지만, 기실 그의 포스트에서 가시화된 공동 성장의 대상은 테크 업계에 한정됐다. 카카오가 뿌리 내리고 있는 수많은 산업과 생태계에 대한 이야기는 누락되어 있다. 택시기사, 대리기사, 자영업자 등 카카오 서비스가 실질적으로 관계를 맺고 있는 이들에 대한 논의가 배제된 것이다. 이토록 소란스러웠던 대규모 장애 이후 카카오가 만든 회고의 자리가 고작 if kakao 였다는 사실은 솔직히 말해 실망스럽다. 남궁훈 전 대표는 잘못된 서비스 설계, 제대로 작동하지 않은 다중화 시스템을 '치부'라 말했지만, 사실 이는 테크 업계에서 언제든 발생할 수 있는 (물론 가장 최악의) 시나리오다. 그보다 4,290원과 7,550원이라는, 제대로 책정되지 않은 보상책이 카카오가 말할 수 없는 진짜 치부다. 지금 우리 사회는 다른 if 를 묻고 있다. '만약 카카오가 다중화를 제대로 설계했다면'이 아니라 '만약 카카오가 독식하지 않았더라면'이라고 말이다.", "젠더데이터 공백은 신당역 역무원 살인 사건과도 관련이 있다. 살인 사건의 피해자는 스토킹 범죄의 피해자이기도 했다. 그가 가해자를 고소하자 검찰은 즉각 법원에 구속영장을 신청했지만 기각됐다. 구속영장은 왜 기각됐을까? 물론 여기에는 데이터 공백뿐만 아니라 사회문화적인 편견도 개입되어 있을 가능성이 높다. 지난 판례를 참조했을 때, 스토킹 범죄를 실패한 짝사랑이나 이성관계 문제로 축소하는 관행이 존재했기 때문이다. 그러나 관행에 의거하지 않더라도 법원은 스토킹 범죄가 무엇인지, 왜 피해자들이 두려움에 떠는지, 가해자를 구속시키는 것이 왜 필요한지 '증명'하지 못한다. 여성 대상 스토킹 범죄의 특수성을 가늠할 만한 데이터가 사실상 공백에 가깝기 때문이다. 젠더데이터는 존재하지 않아 비어 있는 것이 아니라 수없이 보고되었지만 수집하지 않았기에 없는 영역이다.", "겉보기에는 문제 없어 보이는 일러스트라도 특정한 주제에 대한 편견을 강화할 수 있다. 가족을 대상으로 하는 지원사업에 언제나 부부와 남매 한 쌍으로 구성된 4인 가족을 그려넣거나, 가사노동과 관련한 삽화에 늘 여성만을 그려넣는 것도 편견을 부추기는 이미지다. 서울시는 대안으로 2017년부터 홍보물에 대한 성별영향평가를 시행했다. 남성은 직장인으로, 여성은 가정주부로만 그리고 있지 않은지, 외모지상주의나 외모차별을 조장하지는 않는지 등을 폭넓게 점검하는 사전 점검 프로세스다.", "여성은 가정주부로, 남성은 직장인으로 표현하는 홍보물이나 길거리라는 키워드에 여성의 불법촬영 사진을 노출시키는 포털은 이 사회에서 성차별이나 편견, 불법촬영과 같은 것이 충분히 통용될 수 있다고 여기게 만든다. 포털이 고스란히 노출하는 이미지가 이용자들이 여성을, 나아가 사회를 인식하는 '일종의 참조점'이 되는 것이다.", "우리는 인공지능 챗봇으로부터 예의 바른 대답이 오기를 기대한다. 그러나 챗봇이 생성하는 안전한 답변은 다른 사용자나 노동자가 겪는 폭력적 상호작용에 대한 대가다. 제 3세계 데이터 레이블러뿐만 아니라 폭력과 소수자성에 민감한 이들이 앞서 상처받았기 때문에 비로소 안전한 챗봇이 가능해진다. 그렇다면 다시 물을 수밖에 없다. 지금 우리의 안전은 무엇을 기반으로 가능한 것인지. 그리고 그 과정이 과연 윤리적인지.", "사회 변화에 관련해 내가 좋아하는 문구 중 하나는 멕시코 치아파스의 원주민 여성 활동가가 한 말이다. \"당신이 나를 도우러 여기에 오셨다면, 당신은 시간을 낭비하고 있는 겁니다. 그러나 당신이 여기에 온 이유가 당신의 해방이 나의 해방과 긴밀하게 결합되어 있기 때문이라면, 그렇다면 함께 일해봅시다.\" 나와 타인의 해방이 맞닿아 있다는 건, 나와 타인의 고통도 연결되어 있다는 뜻이다. 접근성은 바로 이 지점에 있다. 어떤 이는 접근성을 기존 기획에 더해야만 하는 플러스 알파처럼 여긴다. '그들'을 위해 할 도리를 했다는 식으로. 그러나 접근성은 특정한 소수 그룹을 향해 시혜적으로 주어지는 것이 아니라, 아직 이름 붙이지 못한 경계에 선 고통까지도 포괄한다. 시각장애인을 위한 작업은 노안이나 약사를 가진 이를 위한 것이 되고, 청각장애인을 위한 자막은 청력이 약한 이에게도 도움이 된다. 장애인들이 이동권 투쟁을 벌여 지하철 엘리베이터와 저상버스가 생겼기에 유아를 데리고 이동해야 하는 사람도, 나이가 많아 계단을 오르내리기 힘든 사람도 대중교통을 편리하게 이용할 수 있다. 접근성은 장애인만이 아니라 사회구성원 모두를 위한 것이다.", "많은 서비스가 데이터와 콘텐츠를 다룬다. 서비스가 문 닫으면 길을 잃는 건 그저 콘텐츠일 뿐이겠지만, 그 안에 담긴 의미는 사용자마다 다를 것이다. 서비스를 제대로 만들기 위해서는 만드는 사람도 자기가 다루는 콘텐츠가 무엇인지 알아야 한다. 데이터나 콘텐츠라는 이름 안에 소거되는 개별성을 직시할 때, 서비스가 사용자와 어떤 관계를 맺는지 오롯이 이해할 수 있다. 서비스는 사용자와 만나 무언가를 함께하는 일이다. 이때 만남은 만나는 순간만으로 이뤄져 있지 않다. 만나서 대화하고 함께 무언가를 하다가 헤어지는 모든 순간이 만남을 구성한다. 우리는 이렇게 만들어진 관계를 어떻게 책임질 것인가? 어떤 서비스든 이 물음에 답해야 할 때가 온다.", "서비스를 만들어내는 건 개발자만이 아니라 기획자, 디자이너, 프로젝트 매니저 등 다양한 직군이 포함된 '개발진'이다. 서비스가 빛나는 성공을 거뒀든 처참하게 실패했든 제작에 참여한 이들이 다함께 호명되어야 한다. 그러나 지금은 수많은 직군이 종사하는 테크 산업 안에서도 유독 성비가 불균형한 개발자 직군만이 과잉대표되어 있다. 개발자 윤리라는 명칭이 보여주는 것처럼 말이다. IT 서비스에 개발자 윤리를 묻고 싶다면 이제부터는 '개발진 윤리'라고 바꿔 말해야 한다. 심지어 그게 소스코드와 직접적인 관련이 있는 일이라 해도. 코드 안에 혐오 표현이 삽입되어 있다면 그건 개발자 개인의 문제가 아니라 그의 소스 반영을 방치한 팀의 잘못이기 때문이다. 개발자가 아니라 개발진으로 인식의 범위를 확대할 때, 개발진의 성비는 어떻게 달라질까? 정확히 알 수는 없지만, 지금의 처참한 개발자 성비보다는 훨씬 나아질 것이다. 이는 단순히 숫자만 다르게 셈하는 것이 아니라 인식의 확장을 꾀하는 일이다. 우리는 테크 산업 안의 여성들을 더 다채롭게 바라볼 필요가 있다. 이미 일터에 있는 여성들을 지워 내지 않고 그들의 성공과 실패를 있는 그대로 직시할 수 있도록.", "연중무휴 누구든 서비스를 편리하게 이용할 수 있어야 한다는 서비스 연속성은 정말 최종사용자를 위한 것일까? 적어도 손실의 측면에서 봤을 때 서비스 연속성은 기업의 이익을 보장하기 위해 존재하는 것 같다. 노동자가 이를 위해 휴일을 반납해야 할 의무는 당연히 없다. 무엇보다 그렇게 반납한 휴일이 제대로 된 보상으로 돌아오는 경우도 흔치 않다. 야근을 밥 먹듯 하고 명절에도 일하지만 야근 수당이나 휴일근무수당을 받지 못하는 경우가 허다하기 때문이다. 서비스 연속성은 유지보수 노동자에게 어겨서는 안될 가장 중요한 가치처럼 여겨진다. 정작 서비스 연속성을 보장하는 노동자의 권리를 뒷전이면서도.", "나는 가끔 우리 사회의 편리함이 너무 매끈하다고 생각한다. 저녁에 상품을 주문하면 다음 날 아침 문 앞에 택배가 도착하고, 언제 어디서든 핸드폰으로 연락을 주고받는다. 디지털을 매개하기 때문에 이 모든 게 자동으로 이뤄진다고 생각하기 쉽지만, 이 모든 편리함은 수동이고 누군가의 노동이다. 아침에 일어났을 때 세상이 멀쩡하다면, 자는 동안 우린 그만큼 다른 이의 노동에 빚진 것이다.", "실제로 테크 업계는 서비스를 개발하는 데 있어 낙관적인 태도를 우선시한다. 지금 당장 명확한 수익구조를 만들기보다, 일단 사용자를 끌어모아 시장에서 서비스가 성공할 수 있다는 가능성을 입증하는 데 주력해야 한다는 것이 일반적인 인식이다. 실제로 많은 테크 기업이 '최소한의 기능을 가진 서비스'를 빠르게 출시하고 이를 토대로 또 다른 가설을 세워 기능을 구현하는 프로세스를 갖고 있다. 이런 방식은 실패를 용인하고 도전을 두려워하지 않는 태도를 높이 평가하는 문화를 반영한다. 그러나 동시에 방향성을 깊이 고민하지 않고 단 하나라도 시장성에 들어맞는 길을 찾아보는 데 주력한다는 의미이기도 하다. 한마디로 하나의 문을 열기 위해 백 개, 천 개의 열쇠를 만들어내는 것이다. 그 가운데 단 하나라도 구멍에 들어맞아 잭팟이 터지기를 기대하면서. 테크 업계가 가진 낙관주의의 이면에는 '뭐든 하나만 대박 나면 된다'는 한탕주의가 숨어 있다. 서비스가 작동하는 산업이나 생태계가 어떤지, 이 문을 열었을 때 생태계에 어떤 영향을 미칠지, 그 가운데에서 어디로 방향을 잡을지 깊이 있게 토론하는 것은 구식의 것으로 여겨진다. 지금 당장 할 수 있는 일부터 빠르게 시작하고 제품을 낸 다음 피드백 받는 것을 우선한다.", "테크 업계에 있어서만큼은 프로젝트가 결과물을 만들어 내는 것이 아니라, 결과물이 매순간 다음 프로젝트를 결정한다. 주기를 정해놓고 반복적으로 수행되는 과정 속에서 생태계에 대한 진지한 성찰이나 서비스를 만들어내는 노동자에 대한 책임감 같은 건 배제되어 있다. 딱 하나만 터지기를 기대하는 마음이 시장에 가득하고, 저마다 로켓을 타고 치솟아오르듯 상향하는 주식가치만을 욕망한다.", "기술이 사회를 변화시킨다는 말에는 좀 더 복잡한 속내가 들어 있다. 테크 업계는 사회가 기술에 더 많이 의존하기를 바란다. 사람들이 항상 접속해주기를, 무언가 올려주기를, 그리고 이 모든 것을 통해 더 많은 돈을 벌 수 있기를. 방향성은 나중에 결정해도 된다는, 일단 서비스가 성공 가능성을 입증하기만 하면 된다는 낙관주의에 맹목적인 한, 우리는 서비스가 불러일으키는 영향력에 무감해지고 무책임해진다. 서비스를 만들어내는 테크 업계 노동자들조차 마찬가지다.", "연사들의 발표가 끝난 뒤 한 사람이 \"IT 기업에 입사하기 위해 어떤 자세가 필요할까요?\" 라고 물었다. 그러자 이번에도 연사들은 입을 모아 이렇게 대답했다. \"항상 트렌드를 놓치지 않고 새로운 것을 기꺼이 받아들이고 배우려는 자세요.\" 사실 이런 태도는 어느 업종의 누구에게라도 도움이 된다. 그러나 테크 업계에서 유난히 이런 성향이 강조되는 맥락은 조금 다르다. 공부를 하면 더 나은 능력을 얻어낼 수 있어서가 아니라 공부를 하지 않으면 커리어 전선에서 순식간에 미끄러지기 때문이다. 테크 업계에서는 너무나 많은 것이 순식간에 바뀐다.", "여기에서 하나의 아이러니가 발생한다. 뒤쫓아가야 하는 기술은 하루가 멀다 하고 저만치 앞서 나가는데, 정작 업무 시간에 대면하는 코드는 10년도 더 이전의 것이라는 점에서다. 이건 개인의 역량으로 극복할 수 있는 게 아니다. 신기술을 학습하고 이를 곧바로 업무 환경에 적용할 수 있는 분야가 있는 반면, 그렇지 않은 영역도 있는 것이다. 전자라면 학습과 업무가 시너지를 일으켜 빠르게 성장할 수 있겠지만, 후자는 쉽지 않다. 오래된 레거시 코드와 씨름해야 하는 개발자들에게는 업무 환경과 신기술 사이의 간극이 너무 크기 때문이다. 신기술을 다루는 이는 가속도가 붙어 더 빠르게 치고 나가고, 그렇지 않은 사람은 점차 이직 시장에서 소외된다. 신기술의 빈익빈 부익부 현상이다.", "테크 업계에 만연한 학습문화를 지배하는 건 불안감이다. 어딘가 재직 중이거나 프로젝트에 투입된 상태로 계속 개발을 하고 있는 사람도, 휴직했거나 잠시 일을 쉬고 있는 사람도 정도에 따라 약간씩 다를 뿐 모두 자신의 업무역량이 하락한다고 여긴다. 새로운 기술은 계속해서 등장하고 트렌드는 쉼 없이 변화하니까. 개발자들은 특별히 학습을 하거나 사이드 프로젝트를 하지 않는 이상, 스스로 성장한다고 여기지 않는다. 개발자라면 기술학습을 즐기는 게 당연하다 여기는 문화 속에서, 개발자들은 일상을 소모하며 개발에 더 많은 시간을 쏟는다. 끊임없이 발전하는 기술은 곧잘 로켓이나 우주선에 비유되지만, 노동자 입장에서 이는 결코 멈추지 않는 트래드밀과 같다. 아무리 달려도 나아가기는커녕 현상유지나 다름 없고, 잠깐 쉬자니 금세 저만치 밀려나 버리는 무한 달리기의 장. 그러나 이곳에선 달리는 게 지극히 당연한 일이라며 서로를 강력하게 추동한다.", "커뮤니티는 내게 다른 이를 만나 나를 확장시킬 수 있는 좋은 기회를 제공해준다. 작게는 새로운 책을 소개해주거나 사람을 만나게 해주고, 때로는 직장을 선택하는 경로에 도움을 주며, 나아가 세계를 보다 깊이 이해할 수 있도록 시야를 트이게 한다. 물론 그렇다고 커뮤니티가 확장의 왕도라거나 정답이라는 말은 아니다. 저마다 맞는 방법이 있을 테니 그것을 찾아 나가면 좋겠다. 중요한 건 그 모든 게 성장으로 나아갈 필요는 없다는 사실이다. 인생은 소년만화가 아니고, 우리의 장르에 성장물만 있는 건 아니니까.", "우리 사회에서 유지보수 노동이란 그런 것일까. 잘 보이지 않는 곳에 사람을 밀어넣고 기계를 그저 돌아가게 만드는 것. 뭔가를 새로 설계하는, 창의력이 빛나는 일감이 아니라 누구로 대체되어도 그만인 노동이라고. 나는 개발자보다 유지보수 노동자라는 직함을 더 편안하게 여긴다. 기술을 경유할 뿐, 시스템을 유지보수하는 것이 내 업무의 핵심이기 때문이다. 그러나 사람들이 모두 선망하는 테크 업계와 모두 기피한다는 전산실 사이의 격차는 언제나 멀미 나듯 어지러웠다.", "새로운 걸 만드는 일이 정말로 더 가치 있는 걸까? 그런 것 같기도, 아닌 것 같기도 하다. 다만 확실한 건 모두가 새로운 서비스만 기를 쓰고 출시한다면 인류는 지금보다 더 빠른 속도로 멸망하리라는 사실이다. 누군가가 서비스를 만들었다면 다른 누군가는 반드시 유지보수를 해야 한다. 유지보수 노동이 이뤄지는 곳, 설국열차의 마룻바닥 밑, 거기가 바로 전산실이다."]}, {"title": "엄살원", "author": "안담, 한유리, 곽예인", "genre": "교양, 인문, 인터뷰", "publisher": "위고", "passages": ["실은 엄살원이 무엇이라고 단언하는 일만큼은 하고 싶지 않았다. 내게 소중한 이곳을 가능한 한 근사하게 정의하고 싶었고, 그러지 못할 바에는 설명을 영영 보류하고 싶었다. 급기야는 엄살원에 관해서 아무 말도 할 수 없을 것 같았다. 잘 말하고 싶은 욕심이 턱끝까지 차오른 나머지 늘 숨이 모자란다고 느꼈기 때문이다.", "엄살원은 '우리' '모두'를 위한 이야기가 아니다. 엄살원은 우리로부터 쫓겨난 모두를 위한 시공간이다. 일찍이 우리에서 탈락된 우리에게 바치는 만찬이 열리는 곳이다. 기존의 '우리'를 구성하는 조건에 의문을 제시하지 않을 수 없었던 사람들, 약하다는 이유로 우리가 될 수 없었으며, 그런 협소한 우리를 받아들이길 거부하면서 우리의 삼엄한 경계를 쪼아대는 우리가 오가는 식당이다. 엄살원의 손님들은 활동가들이다. 사람에 따라서는 너무 특수한 인간들의 집합이라고 느낄 수도 있을 것이다. 자기 일도 아닌 문제에 자기 일처럼 화를 내는 게 직업인 사람들. 여성, 장애인, 성노동자, 퀴어, 빈민, 홈리스, 청소년, 동물의 이야기가 곧 나의 이야기이기도 하다고 굳게 믿는 감각이상자들. 비관할 구석이 가득한 세상에서 냉소를 통해 똑똑해 보이기를 선택하지 않은 사람들. 너무 순진한 게 아니냐는 의심의 눈초리를 감수하면서 굳이 어떤 희망을 가져보기로 한 사람들.", "손더스의 표현을 빌려 엄살원의 손님들에게 나는 묻고 싶었다. 당신들은 어떻게 '자기 자신의 일부'이기를 그만두겠다는 놀라운 선택을 내릴 수 있었느냐고. 어떤 계기로 우리는 자신이기만 했던 자신의 투명도를 낮추어 마침내 나 아닌 존재들과 하나로 포개질까? 나는 고작 나에서 그치지 않는다는 진실을 추구하는 데는 어떤 기쁨과 슬픔이 따를까? 활동가들의 대답은 다양했지만, 그들이 모두 밥을 먹고 산다는 점만은 같았다. 그들처럼 나의 일부이길 그친 나, 나만은 아닌 나, 시끄럽고 커다랗고 무수한 나로 살아보려는 일은 많은 열량을 소모한다. 그래서 이들에게 밥을 든든히 먹여야겠다고 생각했다. 밥상 앞에 앉은 손님들의 얼굴은 유순하기 그지없다. 농성에 도가 튼 사람이건 국회를 드나드는 사람이건, 수저를 쥐는 손만큼은 다들 조그맣다. 한 명의 인간은 누구든 이렇게 작다는 사실, 그 사실 때문에 때로는 기가 막히고 때로는 가슴이 미어졌다.", "저는 주변에 같이 비건 실천하자고 권하려다가도, 제일 걸리는 게 그거거든요. 이건 진짜 부지런하게 살라는 얘기로 들리기도 할 거 같은 거예요. 직접 음식을 하고, 냉장고 속 음식을 신선하게 관리하고, 영양 밸런스를 고려하고. 근데 이건 비건이 아니어도 잘하는 사람 별로 없잖아요. 우리가 지나치게 육식 중심적인 사회에서 살고 있기 때문에, 비건 지향인이 되려면 자기돌봄 능력이 더 필요해지는 상황이 좀 억울한 거예요.", "이제 파스타가 가지고 있었던 고급 음식의 이미지는 거의 사라지지 않았나 싶어요. 모두가 파스타란 그냥 서양 라면임을 간파한 것 같습니다. 바깥에서 사 먹기는 좀 아깝다는 인상이 있을 정도지요. 파스타의 주성분인 듀럼밀에는 일반 밀보다 식이섬유와 단백질이 풍부하게 들어있어서 탄수화물에 의지하게 되는 비건들이 주식으로 선택하기도 좋습니다. 백미밥보다 영양적으로 더 나아요. 가지, 토마토, 시금치, 마늘종, 쌈 채소 등 갖가지 채소를 파스타에 부재료로 넣고 구운 두부 몇 조각을 곁들이면 탄수화물, 단백질, 지방, 식이섬유가 조화로운 식단을 꾸릴 수 있습니다.", "매일매일 새로 태어나는 활동가들이 한 치 앞도 보이지 않는 어둠 속을 걸어간다. 아무도 아무것도 모르는 순간에도 서로 만나고 헤어지면서. 그 치열했던 시간이 훗날 식탁에서 밥을 삼키며 소화 가능한 이야기가 될 거라고 누가 상상이라도 했겠는가.", "사실 나는 그 강의 전에도, 후에도 많이 아팠다. 민간 지원자로서 하루 종일 범죄의 증거물을 찾아 포르노 사이트를 헤매던 시간은 내 마음 깊이 병을 심었다. 평생 욕 한번 해본 적 없던 사람도 3개월만 지나면 욕설과 저주를 마스터하게 되는 곳이 삭제 지원 현장이다. 나는 가해자를 향한 분노 때문에 식사와 수면 같은 일상생활 유지가 힘들었다. 담당하는 피해자 영상 조회수가 몇백만을 상회하는 숫자로 뜰 때면 퇴근길에 마주치는 평범한 시민의 얼굴을 똑바로 쳐다볼 수가 없었다. 용기 있게 엄살을 부려준 쪼이에게 고맙다. 아프다고 말해줘서 고맙다. 쪼이의 아픔을 돌아본 엄살원에서의 시간이 내게도 큰 위로가 되었다. 이런 건 어차피 못 잡는다는 말을 반드시 잡아야 한다는 말로 바꾸고, 그러게 왜 찍었냐며 피해자를 탓하는 말을 가해자에게 추궁하는 말로 바꾸고, 조심하라는 말을 찍지 말라는 말로 바꾸는 역사를 쓰는 동안 각자의 자리에서 아픔을 견뎌온 동료들에게 이 자리를 빌려 존경과 사랑을 보낸다.", "왜 상담을 선택하지 않았어요? 저는 상담할 자신이 없었어요. 거리두기를 진짜 못해서, 저는 정말, 막말로 내 앞에서 이명박이 울어도 함께 울 사람이라서. (폭소)", "동물을 안 먹는 게 그걸 먹어서 나한테 나쁘기 때문은 아니잖아요. 가령 함께 식당에 가서 시킨 음식에 고기가 들어 있을 때, 주변에서 \"어, 담이 어떡해, 담이가 먹을 게 없네\" 하거든요? 물론 끼니를 못 챙길까 봐 걱정해주는 마음이지만, 그럴 때 기분이 이상해요. 사실 죽은 건 제가 아니잖아요. 비거니즘 운동에서 저는 당사자가 아니고.", "비건 옵션을 요청하는 게 '내가 어떤 종류의 취약성을 가지고 있으니까 나를 다른 방식으로 대접해달라'는 요구로 받아들여지는 것 같아요. 초점이 거기 있는 게 아닌데도요. 이 공동체 안에서 발생하는 착취의 양을 함께 줄여보자, 그런 요청인 거잖아요?", "소진 방지라고, 활동가들이 상담 같은 심리적 도움을 받을 수 있는 제도가 있어요. 저희 기관 안에 소진 방지 제도를 만들기 위해서 제가 애를 많이 썼어요. 처음에 일 시작할 때부터 '나의 힘듦을 어떻게 언어화할 것인가'라는 고민이 많았어요. 디지털성폭력이, 이렇게 말하기 짜증 나지만, 주목받는 분야란 말이에요. 소위 말하는 높으신 분들도 저희 센터에 많이 찾아왔어요. 장관도 오고 국회의원도 오고, 그때마다 그 사람들한테 계속 말했거든요. 소진 방지가 필요하다고, 그리고 우리 정규직 만들어달라, 이런 얘기를 필터 없이 다 했어요.", "그런 얘기 하잖아, 담이. \"넝마주의 윤리의 시대가 올거다.\" 응 그러니까 어떤 방식으로든 살아 있어야 돼. 모두가 가난한 이들한테 배워야 하는 시대가 올 거야.", "이미지나 글자로 하는 표현에 탄탄한 기본기를 가진 사람이 다른 풍경까지 보게 되면 준짱처럼 말하게 된다. 나는 동물권 운동으로 얻게 되는 언어가 세상을 새로 구획하고 재명명하는 여러 운동의 언어 중에서도 가장 대자대비한 힘을 가졌다고 생각하는데, 동물을 착취당하거나 죽임당하지 않을 권리가 있는 존재로 설명하는 말은 반드시 비천하고 약하고 가난한 모든 인간 동물을 구하기 때문이다.", "삶이 팍팍해질수록 싸우는 건 좀 그만 보고 싶죠. 그래서 어느 정도는 지지자분들에게 긍정적인 감정을 드릴 필요가 있더라고요. 이 정치인을 지지해서 얻는 장점, 이 정치인이 안겨줄 수 있는 어떤 따뜻한 경험, 위로나 잠시나마 웃을 수 있는 순간 이런 걸 드리는 것도 일이더라고요, 알고 보니까.", "페미니즘을 설득시키는 것과 비거니즘을 설득시키는 방식에도 차이가 있어 보여요. 가령 성차별주의적 시각을 지적받은 데에 대한 반발은 '나는 성차별주의자가 아니다'라는 항변의 형태로 돌아오잖아요. 그러니까 성차별을 근절해야 한다는 데까지는 사회적 합의가 이루어져 있다고 볼 수도 있죠. 그런데 종차별의 경우에는 종차별을 근절하자고 말하는 일이 곧바로 어떤 이들의 생업, 산업 전체를 공격하는 일로 받아들여지기 때문에 어려운 것 같아요.", "근데 그 중도적인 입장, 타협안이라는 게 사실은 가장 변화하고 싶지 않은 사람과 가장 변화하고 싶은 사람이 열심히 싸워서 찾아진 선이잖아요. 그런데도 결과만 보고 \"그것 봐라, 극단은 안 먹히지?\" 이런 말 들으면 좀 서운하죠. 누가 싸워서 여기까지 온 건데.", "저는 실은 그런 제품을 대체로 인터넷에서 따로 주문해야 하는 게 귀찮아서 안 먹는데요. 응원은 해요. 그런데 확신이 없어요. 그편이 조금이라도 착취가 덜한 게 맞는지가요. 대체품을 개발하는 데 드는 자원, 생산과 유통 라인을 짜고 사람들이 그걸 소비하는 데에 드는 유무형의 자원이 육가공품보다 덜하다, 이런 걸 확실히 알고 싶죠. 그냥 제품으로 보기엔 되게 의심스러운 거야. 그리고 비건으로 추정되는 새로운 제품 봉지 뒷면을 보면서 내가 이걸 먹을 수 있나 없나 그런 고민을 하는 시간을 더 안 늘리고 싶기도 해요. 왜냐면 그러다 보니 점점 동물이 아니라 나한테 초점이 맞추더라고요. 내가 고기를 먹었는지 안 먹었는지에 초점을 좀 맞춰서 생각하게 되더라고요.", "예전에 어떤 분이, 내가 처음에 비건이라고 하니까 이런 질문을 했어요. \"그러면 준짱 씨는 몽골 꼭대기에 가서 먹을 게 없으면, 어떻게 뭐, 굶어요?\" 아니 대뜸 날 몽골로 보내. (웃음) 여행 보내주고 싶나 보다.(웃음) 그런 가정이 나를 난감하게 하는 데만 목적이 있잖아요. 내가 먼저 가겠다고 선언을 한 것도 아니고. 그리고 실제 몽골 사람들이 뭘 먹는지 그분이 어떻게 알아요. 몽골 사회에도 나름대로의 실천들이 또 있을 텐데, 그건 알아보지 않고 하는 소리인 거잖아요.", "내가 물론 모든 운동의 당사자일 수는 없겠지만 당사자가 아니기 때문에 더욱 양보해서는 안 되는 일도 분명 있는데요. 그런 원칙을 삶이랑 어떻게 좀 어우러지게 해볼까, 고민하다가 정신이 고통스러워서 정신과에 가면 선생님이 그래요. \"준짱. 너무 기운이 없어 보여요. 집에 가는 길에 육개장 한 그릇 사 드세요.\" (웃음)", "당사자가 아니기 때문에 더욱 양보해서는 안 되는 일이 있다는 말이 사무쳐요. 내가 언제는 당사자이고 언제는 연대자인지 무 자르듯 경계를 그을 수 있는 것은 아니죠. 그렇기 때문에 저는 오히려 우리가 대부분의 상황에 피해 당사자가 아니라 연대자이고, 심지어는 가해자에 더 가까울 거라는 사실을 상기하려고 노력해요. 연대자의 위치에 선 사람은 '나는 내 일도 아닌데요 대의에 복무하고 있어'라는 알량한 자기 만족감이나 시혜적인 태도를 경계하고 운동에 방해나 되지 않을 수 있을지 끊임없이 고민해야 하죠. 어떤 차원에서 구조적 폭력의 피해자였다 하더라도 그 위치가 영속적인 것도 아니고, 한 차원의 피해자이면서 동시에 다른 차원에서는 얼마든지 가해자일 수도 있고요. 그래서 그런 날이 있는 것 같아요. 도저히 참아지지 않는 날. 언제까지 피해자의 자리에만 머무를 건데? 대체 어디까지 스스로의 사정을 봐줄 건데? 언제까지 우리가 힘을 가지지 못했음을 연민하기만 하고, 우리가 이미 가지고 있는 힘에 대해서는 성찰하지 않을 작정인데? 그런 질문이 끓어오르는 날이요.", "(웃음)아까부터 말씀하시는 게 한결같아요. 한 치의 문제도 없는 발언. 어디에서 누가 바로 받아써도 괜찮은, 마침표까지 찍혀 있는 문장으로 말하기 위해 노력하는 습관이 있어요.", "저는 가끔 혜영 님이 얼마나 무대 체질인가에 대해서 생각해요. 갑자기 최근에 올리신 트윗도 생각나요. \"무슨 말을 해도 일단 비웃음부터 사고 시작하는 것이 가끔 참 피로합니다. 그렇다고 해야 할 일 안 하지는 않을 것입니다. 그러기엔 할 일이 너무 많으니까요.\" 이런 트윗이었어요. 제가 저번에 장혜영 의원 후원회장인 이슬아 작가하고 통화를 하다가 혜영 님 근환을 들었는데요, 갑자기 스탠드 코미디 워크숍을 들으신다는 거예요. 그런 결정을 하신 이유가 너무 흥미롭고 마음 아팠어요. '야, 이렇게까지 많이 비웃음을 살 거라면, 그냥 웃음을 주는 게 낫지 않을까?' 이런 이유였다면서요.", "대중을 만나기 위한 다른 캐릭터가 필요하다는 생각이 들었어요. 그래서 코미디 워크숍도 가본 거예요. 이상적인 세상에서는, 정치인은 그냥 만들어야 하는 법 만들기만 하면 되고, 사람들은 그걸 알아주겠죠. 그런데 현실에서는 어떤 정치인이 청년이고, 여성이고, 소수 정당 소속이고, 게다가 약자 관련 이슈를 다룬다고 하면 그 자체로 놀잇감이 되기 쉬워요. 무슨 말을 하더라도 진지하게 받아들이지 않거나, 무시할 준비가 되어 있거나, 모욕할 준비가 되어 있거나. 아주 극소수의 청중들만 모이게 되죠.", "예전에는 좋아하는 사람들한테만, 제 얘기를 알아듣는 사람들한테만 말해도 됐어요. 근데 국회의원이라면 나 좋아하는 사람만 대변하겠다는 생각을 가져서는 안 되죠. 물론 제가 메인으로 대변하는 그룹들이 있기는 하지만요. 제 활동이 거센 반대에 부딪혀도, 반대하는 사람들을 마음 깊이 미워하면 안 된다고 생각해요. 전혀 다른 방식의 듣기를 해야 하는 것 같아요.", "예전에는 자유라든가 동의라든가 하는 개념이 정말 경계선이 딱 그어지는 개념이라고 생각했거든요. 근데 그 경계로 다가가면 다가갈수록 흔들리는 거예요. 언어가 그 자체로 의미가 다 전달되는 게 아니잖아요. 말 안에 뭔가를 심어서 전할 수도 있죠. '예스'지만 사실은 '노' 인 경우도 있고요. 같은 사람에게 수없이 동의를 구하고 수락받고 거절당하다 보면 어느 순간 그 사람의 진짜 '예스'와 진짜 '노'를 읽게 돼요.", "그때 혜영 님이 라디오에 나와서 이런 발언을 했어요. '완벽한 n번방 방지법을 만들고 싶어 한다면 대한민국은 아마 그런 법을 만들 수는 없을 것이다. 우리가 마주하는 기술적이고 물리적인 환경이 끊임없이 달라지기 때문에 계속해서 새로운 성범죄가 등장하고 있고, 그런 현실을 조금이라도 따라잡기 위해 입법부가 노력하는 것이다. 피해자의 관점에서 이 법이 입법됐을 때 얼마나 안심할 수 있을지를 조금 생각해봐주시면 좋겠다. 이 법이 모든 인터넷에서의 성착취 피해 영상을 막아주지는 못한다 할지라도, 적어도 특정한 규모의 온라인 공간에서는 나의 피해 영상이 올라가지 않겠구나, 라고 하는 데서 얼마나 안심을 할 수 있을지 생각해봐주시면 좋겠다.'", "어떤 일이 되도록 만든다는 건 또 일을 규격화하는 것이기도 하기 때문에 잘라내는 역할이 중요한 것 같아요. 맞아요. 안 되는 걸 엄청 구체적으로 말씀해주시거든요. 저는 보는 것도 많고 하고 싶은 것도 많고 하면 또 잘해야 되고 그리고 남들이 했던 걸 반복하는 걸 매우 싫어하고 또 새롭게 해야 하고 이런 피곤한 사람인 것 같아요. 일이 많아지게 만드는 사람. 그런 기획을 실행 가능한 관점에서, 기재부 장관처럼, 곳간지기처럼 끊어내지 않으면 나중에 팀이 힘들어져요. 실제로 초기에 좀 그랬고요. 이제는 그럴 때마다 보좌관님이 저한테 말씀하시죠. \"의원님, 안됩니다. 이것 안됩니다. 저것도 안 됩니다\"", "저는 만약에 국회의원 당선이 안 됐으면 혜정이 주인공으로 나오는 영화를 할 생각이었어요. 발달장애인은 다큐멘터리는 할 수 있지, 하지만 연기는 할 수 없어, 이런 생각이 짜증이 났어요. 그건 창작자의 상상력, 창의력의 부재로 생각해야지 발달장애인의 무능이라고 해석하면 안 된다고 봤기 때문에, 그래서 혜정이 연기를 하는 작업을 하나 해야겠다, 혜정이 혜정인 상태로 뭘 하더라도 이야기의 일부가 될 수 있게 플롯을 짜고 카메라를 배치하는 작업이라면 가능하지 않을까, 하고 생각했던 거죠. 지금도 한 번쯤 해보고 싶어요.", "거기서 신형철 평론가가 그러시더라고요. '사람들에게 필요한 건 최대 애도다. 말하자면 끝날 때까지 끝나지 않는 애도, 할 수 있는 걸 다 하는 애도가 필요하다. 그런데 지금 국가는 최소 애도를 하라는 것처럼 보인다.' 그런 이야기를 듣고 끄덕이는 사람들을 보면서 알게 됐어요. 사람들은 지금 애도하고 싶구나. 너무 당연한 얘기인데, 사람들이 참사와 관련된 어떤 사실을 알고 싶어 한다면 애도의 일부로서 알고 싶은 거죠. 그런데 대체 무슨 일이 일어났던 건지, 사람마다 스토리를 다 다르게 기억하면 결국 같은 사건에 대해서 말을 할 수가 없잖아요. 그러니까, 우리가 공유할 수 있는 스토리가 필요한 거고, 나는 증거에 기반해서 그 이야기를 써 내려가는 작업을 하는 거구나. 비로소 제가 뭘 하고 있는지 알겠더라고요.", "언젠가 이 일을 실제로 경험한 사람들이 다 사라진다고 하더라도, 여전히 이야기로는 남아서 그 의미가 전해지길 바라요. 그 이야기의 끝은 그래서 그 문제가 어떻게 보완이 되었는지, 세상이 조금은 더 나아졌는지에 관한 내용으로 맺어지길 바라고요.", "연말다운 따뜻하고 넉넉한 냄새와 분위기는 노릇한 감자구이로 내보겠습니다. 감자를 굽는다는 건 오늘은 절대로 아쉽게는 안 먹이겠다는 말이지요. 든든하고 따뜻할 거라는 약속이에요. 일식집 에피타이저로 나오는 계란찜처럼 딱 두입만 먹을 때 제일 맛있는 음식이 있는가 하면, 감자처럼 입안 가득 채울 때 맛있는 음식도 있는 거죠. 사이드메뉴로서는 과하다고 할 수도 있겠지만, 사람이 많이 모이는 파티에서 감자는 굉장히 유용합니다. 감자 요리가 하나 있으면 웬만해서는 누구도 음식이 모자라다고 하진 않을 거예요. 언말이라고 해서 꼭 따뜻하고 행복하란 법은 없습니다. 정확하게는 그런 법이 없기를 바랍니다. 그런 법이 있어서 연말이 어두워지는 사람이 많은 게 아닌지 의심스러워요. 행복이나 감사, 유종의 미 따위의 개념은 손에 잘 잡히지 않지요. 이런 추상 앞에서 고통스러울 바에야 차라리 구체적인 감자를 손에 꼭 쥐어보겠습니다. 여러 상태의 감자. 단단했다가 부드러워지는 감자, 미끄러웠다가 끈적해지는 감자, 차가웠다가 뜨거워지는 감자. 이 모든 감자의 변화를 통과하다 보면 반드시 시간이 가고 반드시 배가 부르지요. 연말에는 유독 '-겠다'라고 많이 말하는데요. 읽겠다, 쓰겠다, 보겠다, 사겠다, 가겠다, 하겠다 차마 다 지키지 못할 약속들 가운데 감자만이 굳건하고 확실합니다.", "편하면서도 중립적인 그림체라는 생각이 들었어요. 손으로 그린 듯한 감성이 있지만 감상적이지는 않고, 생추어리를 친근하게 느끼게 하면서도 너무 낭만화하지도 않는, 좋은 중립성을 가진 그림들이다 보리가 나름의 철학을 가지고 이런 그림체를 만든 거더라고요! 아까도 말했지만 동물을 대상화하는 시선을 경게해야 하잖아요. 그렇기 때문에 엄청 아기자기하고 귀여운 캐릭터로 만들지 않고 초상화처럼 사실적으로, 있는 그대로의 새벽이, 잔디를 그려보려고 했대요. 인간들은 대충 그리고요.", "그리고 생추어리가 앞에서 끌어주고 뒤에서 밀어주고 하는 운동이 아니잖아요. 먼저 해본 선배나 선생님이 있어서 뭔가 막힐 때 어떻게 해야 되는지 물어볼 수 있는 것도 아니고요. 가끔은 그 안에 또래밖에 없다는 게 좀 답답할 것도 같아요. 그러니까, 지금 같이 헤쳐나가는 것들이 지금 여기 모인 사람들을 얼마나 강하게 연결시키는지 느낄 때, 그런 과정을 미리 다 겪어봐서 사람이든 사안이든 좀 거리를 두고 볼 수 있게 된 사람도 만나고 싶을 것 같아요. 어떨 때는 서로 지금 상황을 너무 잘 알아서, 너무 가까이에 있어서 상대방의 어려움, 고통을 볼 때 오히려 위로하기가 더 어려워지는 것 같아요. 이걸 완충해줄 거리가 우리 사이에 조금도 없을 때, 정말 모두가 동시에 고통받고 있을 때.", "'동물 보호'나, '동물 애호'라는 단어에는 이미 인간과 동물을 동등하지 않게 여기는 시각이 들어가 있어요. 동물권 운동은 동물을 일방적인 보살핌이나 돌봄이 필요한 약한 존재로만 간주하지 않아요. 우리가 돌봄을 하는 이유는 그들의 해방과 나의 해방이 연결되어 있기 때문에, 같이 종차별주의를 철폐하는 세상으로 나아가기 위해서죠. 똑같이 현재의 축산업에 반대한다고 해도, 동물권 운동가라면 동물복지축산 같은 '타협점'을 용납할 수 없을 거예요. 그들이 살아 있는 동안의 고통을 경감시키는 게 다가 아니기 때문이죠. 이들의 고통이 우리가 느끼는 것과 다르지 않음을 인식한다면, 아예 먹힘당하기 위해서 살아가는 존재가 없게 해야죠. 그러니까 동물권 운동은 동물의 고통을 끝내기 위한, 그러니까 경감시키기 위한 것이 아니라, 그 고통을 끝내기 위한 움직임이에요.", "저는 우리가 매일 그런 식으로 살고 있다는 사실을 인정하게 되었으면 좋겠어요. 새벽이뿐만 아니라 너무 많은 존재에게 매일, 매순간 참깨 한 톨을 먹어도 남을 때리게 된다는 걸. 서로를 비난하고 단죄하기 위해서가 아니라, 그렇다면 이제 대체 어떻게 할건지 같이 고민하고 싶어서요. 음식이 폭력이라는 사실을 맞닥뜨렸을 때 '그럼 어쩌라고. 폭력이면 어쩌라고. 나는 폭력이 좋아. 폭력을 하고 싶어. 폭력적일수록 더 맛있어. 더 많은 폭력을 원해. 폭력 안에서 평안해' 그렇게 되받아칠 수 있는 수많은 우리들을, 아니 나를 어떻게 할지", "네이버든 구글이든 어느 곳에서도 돼지의 입맛을 돋우는 컵케이크 레시피를 찾을 수는 없었어요. 생추어리 활동가께서 새벽이와 잔디가 좋아하는 채소들을 미리 알려주셔서 레시피를 구상할 수 있었습니다. 누군가 몸으로 부딪쳐 찾아낸 정보를 편하게 받아서 케이크를 구웠습니다. 돼지들의 영험한 눈을 떠올리면서, 나름의 미를 갖추어 만들었어요. 레시피도 잊지 않고 적어놓았습니다. 언젠가 돼지가 아름다워하는 모양과 색을 알게 되면 이 레시피를 고쳐야지요. 그때에 레시피를 고치는 건 제가 아닌 다른 사람일 수도 있겠습니다. 레시피는 변화에 거리낌이 없는 종류의 글이니까요. 부디 이 레시피가 크고 작은 변화를 계속해서 겪기를 바랍니다.", "제가 2015년에 반성폭력 활동을 시작했는데요. 한 해 한 해 시간이 흘러가면서 느끼는 건 디지털성폭력 영역에서는 조금씩이나마 계속 승리하는 부분이 있다는 거예요. 어떤 여성도 불법 촬영 및 유포 문제에서 자유롭지 않다는 건 모든 여성이 디지털성폭력 근절을 위한 움직임에 한표를 던져준다는 뜻이기도 하죠. 대다수 여성들이 현실을 알게 된 이상, 강하게 결집될 수밖에 없는 여건이 마련된 거죠. 근데 그 영역 밖으로 나와서 다른 여성운동 섹션, 다른 활동 쪽에 갔을 때 저는 처음에 좀 놀랐어요. 계속 패배하는 거예요. 계속 지고 계속 뺏기고 입법 계속 안 되고. 예를 들어서 전국장애인차별철폐연대가 장애인 이동권 시위를 20년 넘게 하고 있는 것처럼요. 그런 걸 보면서 처음에는 어떤 감정이 들었나면, '뭔가 방법에 문제가 있나?' 싶었어요. 이게 올바른데 패배한다는 것을 믿고 싶지 않아서. 근데 아닌 거야. 이게 진짜 옳은 일인데, 맞는 말만 하는데도 그냥 계속 패배해. 그랬을 때 운동이 실패한다는 것에 대한 괴로움, 무기력함이 있었어요.", "뭐가 좋냐면요. (웃음) 상대방을 설득하는 수완도 성별화되어 있는데, 여성들이 터득한 설득의 기술은 무시당할 때가 많잖아요. 훈련해서 얻은 기술로 인정되기보다는 기질이나 천성으로 생각하고요. 나긋하고 부드러운 태도를 가지는 건 모욕적인 일이라고 여기는 사람도 있죠. 실제로 그런 태도가 여자들한테 강요되는 경우도 허다하니까요. 그래서 같이 싸우는 여자들한테도 전문가로 보이려면, 무시당하지 않으려면, 예쁘게 말하지 말라고 얘기하게 되죠. 무슨 뜻인지는 알지만 저는 이것도 기술로, 힘으로 인정됐으면 좋겠어요. 예쁘게 말하는 건 약자의 습속이고 수치스러운 거라고 하고 싶지 않은 거죠. 예쁘게 말할 줄 안다는 게 얼마나 유용할 때가 많은데요. 그리고 아무나 못해요. \"같이 놀아요~\" 수준의 너스레를 어떻게 아무나 하겠어요. 근데 나는 그분이 분명 나중에 생각났을 것 같아. \"뭐? 같이 놀아?\" 주민분 입장에서는 토론회 오라는 말을 들을 때는 화는 나지만 예측 가능한 반응이라고 생각했을 것 같거든. 근데 활동가가 같이 놀자고 할 줄은 (웃음)", "\"왜 넌 달라?\" 이러면서 평균이나 규격을 정하거나, 정상과 비정상을 나누고 구별하는 것이 깔끔하게 하자는 말에서 시작되는 거라고도 생각해요. 서로 좀 달라도, 그대로도 괜찮다는 걸 받아들이는 사회가 좋지 않나 하고요.", "비건 지향적 삶이든 제로 웨이스트를 추구하는 삶이든, 더 '에코' 하다고 여겨지는 삶이 정갈함, 단정함, 깨끗함 같은 가치와 연결되는 게 점점 더 거부감이 들어요. 왜냐면 이건 더 많은 더러움에 직접 참여하는 삶이어야 한다는 생각이 들기 때문에. 쓰레기를 줄이는 삶이 쓰레기를 보지 않아도 되는 삶은 아니잖아요?", "손님들에게 좋은 것만을 대접한다는 책임을 다하려면 우선 내 안에 달고 값진 것이 있음을, 내게 그것을 만들어낼 힘이 있음을 믿어야만 했다. 그건 아주 가혹하고 어려운 가르침이었다. 자기혐오의 달콤한 낮잠에 빠져 있을 때마다 손님들과 엄살원 식구들이 나를 흔들어 깨웠다. 타인을 천대하고 멸시하지 말아야 한다는 원칙을 끝까지 고수하기 위해서는 결국 스스로를 천대하고 멸시할 자유를 포기해야 한다고, 그들은 따뜻하고 엄정하게 알려주었다.", "새로운 설득의 형식에 대한 경험이다. 이 책은. 비건-페미니스트-컬렉티브 엄살원은 도덕적 분노나 죄의식을 이용하지 않고도 근거리의 활동가들, 더 실패하는 쪽에 포진한 여성 활동가들의 목소리-현장을 기록했다. 밥상머리 대화 형식의, 자기-고백(나르시시즘)과 자기-의심(성찰), 자기-희화화(유머)가 동시에 작동하는 이 글쓰기는 구술이면서 대화이고, 리서치이면서 시적 텍스트이다. \"만병의 근원이 채식\"이라는 엄살원의 자조는 눈과 혀로 음미할 수 있는 레시피를 발명하면서 중화되고 근거리 어정쩡한 구경꾼-독자-우리는 곧-투입될 신참 활동가로 이미 예정된 듯하다. 너무나 맛있는 식탁이고 너무나 탐나는 활동들인 것이다. 채식의 쾌락과 현장이 사랑을 각인한 이 글쓰기, 웃기고 슬프고 아름다운 사람들이 나오는 이 녹취록이 포기 불가능한 욕망을 위해 발명한 새로운 형식의 범례임을 나는 결코 번복할 수 없을 것이다."]}, {"title": "에디토리얼 씽킹", "author": "최혜진", "genre": "예술", "publisher": "터틀넥프레스", "passages": ["편집은 결국 의미의 밀도를 높여가는 과정이다. 데이터를 이야기로 바꾸고, 사실에서 통찰을 끌어내는 행위이다. 에디토리얼 씽킹에는 우리를 더 높은 차원의 의미로 데려가는 힘이 있다.", "나는 생각이 조금 달랐다. 잡지가 망해가는 게 아니고, 세상이 온통 잡지화하는 걸로 보였기 때문이다. 잡지에서 보던 편집 문법 - 에디터 추천 목록, 큐레이션, 단계별 하우투 정보, 리얼 후기 등 - 이 디지털 서비스 전반으로 퍼져나가고 있었다. 예감했다. 설사 종이 잡지가 사라진다 해도 정보와 맥락을 다루는 에디터라는 직업은 절대 사라지지 않을 것이며, 시간이 지날수록 오히려 에디터가 하는 일은 다이내믹해지고 넓어질 거라고.", "선택과 주목이 점점 더 어려워지고, 정보를 비교하고 검증하는 일도 벅차다. 자신의 취향, 호기심, 판단력을 알고리즘에 외주 주거나 타인에 대한 모방으로 때우는 일이 빈번해진 이유다. 모든 것이 이미 이렇게 많은 세상이라면 그 안에서 어떻게 자기다움이나 새로운 차이를 만들어낼 수 있을까?", "홈비디오로 기록한 무편집 영상을 영화라고 부르지 않듯 살아온 모든 순간을 누락 없이 축적한 데이터가 있다고 해도 그것이 삶이 될 순 없다. 중요한 건 자기 서사고, 의미 부여다. 테드 창이 '숨'에서 쓴 아래 문장처럼. \"기억이란 우리가 살아온 모든 순간을 공평하게 축적해놓은 결과가 아니라, 우리가 애써 선별한 순간들을 조합해 만들어낸 서사이다. 설령 다른 사람들과 똑같은 사건들을 경험하더라도 우리가 똑같은 이야기를 만들어내지 않는 것은 바로 그 때문이다.\"", "지난 20년간 에디터로 일하며 얻은 가장 소중한 삶의 자산을 딱 하나만 꼽으라면 '의미의 최종 편집권이 나에게 있다'는 감각이다. 삶은 언제나 예측 불가하고, 뒤죽박죽 난장판 같은 사건과 사실이 끊임없이 들이닥친다. 그것을 소음이라고 생각하면서 괴로워하는 선택지도 있고, 의미로 승화해서 다른 현실을 사는 선택지도 있다.", "책은 보통 단일 저자의 목소리를 선형적으로 따라가지만, 잡지는 여러 화자가 갖가지 방향으로 등장하며 독자의 주의를 빼앗는다. 지면에 올라가는 재료의 다양성 측면에서도 차이가 크다. 단행본과 달리 잡지에서는 서로 다른 크기의 텍스트 덩어리와 이미지, 다채롭게 변하는 레이아웃이 시선 경쟁을 한다. 독자는 덩어리 사이를 자유롭게 이동한다. 눈이 가는 대로 띄엄띄엄 훑다가 관심이 가는 내용을 발견하면 그제야 '읽기 모드'를 활성화한다. 단행본은 읽기에, 잡지는 훑기에 어울린다. 텍스트와 이미지의 융합 가능성을 최전선에서 실험해온 잡지 지면은 이미 오래전부터 멀티미디어, 터치 버튼, 하이퍼링크가 주의력 뺏기 경쟁을 하는 디지털 환경과 흡사한 모습을 하고 있었다.", "2021년 겨울, '아장스망'이라는 에디토리얼 컨설턴시를 만들었다. 아장스망 agencement 은 프랑스어로 '배치, 배열, 조합'이란 뜻으로, 철학자 질 들뢰즈가 '존재를 규정하는 것은 배치'라는 의미로 정립한 철학 용어이기도 하다. 처음 이 개념을 알게 되었을 때, 동공이 커지면서 초점이 또렷해지는 느낌이었다. 사람의 개성 부터 사물의 속성까지, 주체성이 원래 내재된 것이 아니라 배치의 결과로 드러나는 것이라니! 배치를 바꾸면 존재가 바뀌다니! 시대의 지성이 부드럽게 등을 밀어주며 응원하는 기분을 느꼈다.", "크게는 브랜드명과 슬로건을 짓고 브랜드 아키텍쳐를 정리하는 일부터 작게는 상사나 고객사에 보낼 보고서의 스토리라인을 짜는 일까지, 의미를 다룬다는 것은 타인과의 소통을 전제로 하는 활동이다. 누가 계산해도 동일한 답이 나와야 하는 과학 언어와는 성격이 다르다. 상대에 따라 구사하는 전략이 달라진다. 맞춤형으로 재료의 가능성을 두루 살피면서 다듬고 풍미를 살리는 조리 과정을 거쳐 플레이팅까지 예쁘게 해내는 과정이 필요하다.", "의미로 거듭날 가능성을 품고 있는 재료를 알아보는 힘은 저절로 생기지 않는다. \"야, 저런 게 예술이면 나도 하겠다\"라고 비아냥거려서는 아무것도 배우지 못한다. \"사소한 재료에 숨어 있던 메시지를 어떻게 발견했을까? 어떤 맥락으로 의미를 빚어갔을까?\"라고 질문하는 편이 에디터적 사고력을 키우는 데에 보탬이 된다. 사물, 뉴스, 정보, 데이터가 넘쳐나는 세상이지만, 어떤 관점의 이야기는 여전히 드물고, 여전히 귀하다. 그런 이야기를 품은 재료를 발견하는 눈을 갖고 싶다면 훈련해야 한다.", "질문은 특정 부분에 주의를 기울이게 만들고, 기억 창고에서 관련된 정보를 끌어모으는 역할을 한다. 질문이 자석이라면 정보는 철가루다. 의미를 가시화하고 언어로 붙잡아두려면 일단 질문부터 해야 한다.", "철학자 에릭 호퍼는 '길 위의 철학자'에서 이렇게 썼다. \"언어는 질문하기 위해 창안되었다. 대답은 투덜대거나 제스처로 할 수 있지만 질문은 반드시 말로 해야 한다. 사람이 사람다운 것은 첫 질문을 던졌을 때부터였다. 사회적 정체는 답이 없어서가 아니라 질문을 할 충동이 없는 데에서 비롯된다.\" 나는 이 아름다운 문장을 내 식으로 변형해 마음에 품고 있다. \"에디터가 에디터다운 것은 질문을 던졌을 때부터다. 에디터의 커리어적 정체는 답이 없어서가 아니라 질문할 충동이 없는 데에서 비롯된다.\"", "손 안에 든 재료를 특정 기준을 세워 정리하고, 그로부터 도출할 수 있는 의미나 시사점을 찾아내기 위해 습관처럼 질문한다. \"이걸 뭐랑 묶지?\" \"묶어서 어떤 이름을 붙이지?\" 이 두 문장은 설득력 있는 목차나 보고서 개요를 짤 때도 유용하다. 먼저 짚고 넘어갈 점은 설득력이 감정이입과 상상력에서 나온다는 사실이다. 에디터라면 콘텐츠를 볼 상대방-클라이언트, 상사, 독자-입장에서 궁금한 점이 무엇일지 상상할 줄 알아야 한다.", "에디팅은 무엇과 무엇을 어떻게 붙일지 선택하는 일, 다시 말해 재료들 사이에 존재하는 미적, 심리적, 논리적 거리와 간격을 다루는 일이다. 글만 다루는 편집자도, 이미지만 다루는 편집자도, 글과 이미지를 동시에 다루는 편집자도 정보 사이의 거리를 다룬다는 측면에서는 동일한 행위를 한다. 다수와 무난하게 소통하기 위해 정리하는 편집도 있고, 전에 없던 새로운 의미나 심상을 만들어내기 위한 편집도 있다. 무엇이 설득력이 낮다 높다 함부로 판단할 수 없다. 중요한 건 개별 프로젝트의 목적과 수용자의 성향이다. 자신이 수행하는 선택과 배치가 어떤 결과를 만들어냈으면 하는지 정확한 목적지를 찍고, 상황에 맞춰 정보 사이의 거리를 조정하는 것이다. 익숙함과 명확함, 낯섦과 모호함이라는 두 원소를 손에 쥐고 목적에 맞춰 적정 배합 비율을 찾아내는 일. 나는 그것이 에디팅의 본질이라고 생각한다.", "여러 차례 말하지만, 나는 설득력이 수용자에 대한 상상력에서 나온다고 믿는다. '이걸 본 그의 입장에서 메시지에 동의가 될까? 이해가 될까? 더 궁금한 점은 없을까? 신선하게 느껴질까?' 자문하면서 재료와 재료 사이의 거리를 조절한다.", "글을 다룰 때든 이미지를 다룰 때든 정보 사이의 간격이 너무 좁으면 신선한 재미가 없고, 너무 멀면 소통이 어려워진다는 사실을 기억하면서 자신이 사용할 재료 사이의 거리를 감각할 줄 아는 사람이 되어야 한다는 것.", "이미 존재하는 고전 예술 작품에서 '제스처'에 주목하겠다고 결정했고, 이 결정이 '회화는 당대의 몸짓을 기록하는 장'이라는 작가만의 정의로 이어졌다. 그렇다면 우리 시대의 몸짓은? 몸을 잔뜩 웅크리고 스마트폰 액정과 노트북, TV 화면 등으로 빨려 들어갈 것 같은 인물을 그려야 하는 이유가 풍성해지고 설득력이 생겼다. 레퍼런스였던 고전 예술 작품 속 몸짓을 곧장 차용한 게 아니라 화가들이 제스처를 그린 이유에서 영감을 받은 것이다. 다시 말해 겉으로 드러난 스타일이나 현상만 취한 것이 아니라 이면에 흐르는 의도, 구조, 상징, 패턴을 읽음으로써 레퍼런스를 자기화했다고 볼 수 있다.", "레퍼런스가 하나일 때는 표절이 되기 쉽지만, 여러 레퍼런스를 관통하는 하나의 키워드나 아이디어를 찾으면 고유한 탐색이 된다. 이에 대해선 만화가 게리 팬터가 아래와 같이 간단명료하게 피력한 바 있다. \"영향을 받은 사람이 딱 한 사람뿐이라면 세상은 당신을 제2의 누구누구라고 칭할 것이다. 하지만 수백 명을 베낀다면 세상은 당신을 오리지널로 떠받들 것이다!\" - 오스틴 클레온, '훔쳐라, 아티스트처럼' 에서 재인용 단, 레퍼런스가 많이 필요하다는 핑계로 생각하기를 지연시켜선 안 된다. 인터넷 세상에서 시간을 보내며 자료의 양을 늘린다고 아이디어가 만들어지는 건 아니니까. 생각보다 레퍼런스를 찾으면서 '내가 뭔가 하고 있다'는 기분에 속는 사람이 많다. 정보를 자기화하려면 외부 자극을 차단하고 홀로 소화하는(생각하는) 시간을 가져야 한다.", "'야마'는 잡지계에서 쓰는 일본식 은어로 '뾰족한 무언가'를 뜻한다. 한때 잡지계를 휩쓸었던 '엣지'와 비슷한 뉘앙스다. 콘티에 야마가 없다는 편집장의 피드백은 콘텐츠가 한 방향으로 정렬되지 않아 메시지가 흩어진다는 뜻이고, 독자에게 각인될 만한 개성이 부족하다는 뜻이다. 글의 야마가 무엇이냐는 질문은 \"글쓴이로서 네가 제일 하고 싶은 말이 뭐니?\"란 되물음이다.", "책상 전문 브랜드 데스커의 브랜드 미디어 디퍼의 컨셉을 잡을 때는 \"책상이란 무엇인가?\", \"한샘도 아니고, 일룸도 아닌 데스커의 미디어가 어떤 이야기를 건네야 자연스럽고 납득이 될까?\"라는 질문을 거듭했다. 도대체 책상이란 뭘까, 가구 시장에서 데스커는 어떤 이미지인가, 무엇을 책상의 본질이라고 정의해야 데스커다울까 무엇 하나 답하기 쉽지 않았지만, 설득력있는 컨셉을 손에 쥐기 위해 반드시 거쳐야 하는 과정이었다. 유레카 모먼트는 책상을 '채워지길 기다리는 네모난 빈 공간'으로 정의한 순간 찾아왔다. 머릿속에서 개념화 과정은 다음처럼 진행됐다. - 침대나 식탁과 다른 책상의 행위유도성=쓴다, 그린다, 만든다, 계획한다, 배운다, 듣는다, 읽는다, 발견한다, 구체화한다, 도모한다, 생각한다, 실현한다 - 책상=가능성으로 존재하는 생각이나 잠재력을 현실로 바꾸는 장소=채워지길 기다리는 네모난 빈 공간 - 데스커=고객이 자기 고유의 콘텐츠를 채워나갈 수 있도록 공간, 여백, 기회의 장을 선물하는 브랜드 - 미디어 컨셉=이미 완결된 타인의 인터뷰를 읽는 미디어가 아니라 독자가 스스로 답을 채울 수 있도록 툴킷형 콘텐츠를 제공하는 미디어 - 디자인 컨셉=빈칸", "나는 핵심을 알아보고 구조를 조직하는 능력이 결국 타인에 대한 상상력에서 나온다고 생각한다. 내 이야길 들은 상대방 입장에서 중요하다고 느낄 만한 재료가 무엇인지, 신선하다고 느낄 만한 내용이 무엇인지 상상할 줄 모른다면 핵심을 골라내기도 힘들 것이다. 수용자에게 어떤 첫인상으로 다가갈지, 그들은 어느 순간에 어떤 마음으로 이 콘텐츠를 선택할지, 보고 난 뒤에 무엇이 마음에 남을지 상상한 만큼 콘텐츠에 힘이 생긴다. 이야기를 듣는 입장일 때도 마찬가지다. 표면에 드러나지 않더라도 상대가 진짜로 하고 싶은 이야기가 뭔지 의도를 읽어내려 애쓰며 듣는 적극적 경청을 해야 핵심을 알아차릴 수 있다.", "어린 연차 때 바이라인은 자기표현의 일종이었다. '내가 이런 걸 했어요', '저에겐 이런 능력이 있답니다' 하고 알리는 공간이라고 생각했다. 하지만 일을 하면 할수록 에디터 업의 아름다움은 나 아닌 다른 사람에게로 건너가보는 순간에 있다는 생각을 하게 된다. 이제 나에게 잡지 바이라인은 '제 이름을 걸고 당신 생각을 참 많이 법칙이었다. 규율과 법칙, 그 사이에 얼굴을 들이밀고 숨거나 죽은 척하기. 아이에겐 퍽 어려운 일이었다. 나는 누군가에 의해 자주 들어올려지고, 불려다녔다. 얼굴이 다 닳은 이파리처럼, 일찍이 시들어 있었다. 주로 고모가 불렀다. 여름! 여름! 이름이 불릴 때마다 아무때고 불리는 여름은 물론, 여름이 아닌 계절까지도 긴장했으리라. 나는 녹지 않는 여름이었다. 녹을 기회가 없었다.", "처음 피아노를 배우던 날, 나는 긴장했다. 고모는 무엇이든 해내지 못하는 걸 싫어했다. 잘 못하는 것은 더 싫어했다. 고모가 미간을 찌푸린 채 하나로 높이 묶은 머리를 풀어 찬찬히 다시 묶거나 피아노 앞에 앉은 아이의 손목을 째려보면 화가 났다는 뜻이었다. 소리 없이 말이 오가는 현장. 고모는 말하지 않음으로 말하는 법을 알았다. 아이들은 그런 식의 말을 어른들보다 더 잘 알아듣는다. 고모가 내 앞에서 머리를 풀고 다시 묶는 것을 보고 싶지 않았으므로 정신을 바짝 차렸다.", "오늘도 유치원에 가지 않았다. 나는 깜빡인다, 세상에서, 아주 작은 점처럼 깜빡이며 존재한다. 늘 존재할 수는 없다. 욕심쟁이들만 늘 존재한다. 나는 존재하는 것을 깜빡 잊는다. 잊는 다는 것을 또 잊는다. 자주 울고, 웃는 것을 잊었다고 생각할 때만, 잠깐 웃는다. 사람들은 나를 고장 난 신호등을 보듯 바라본다.", "사람들은 뻥튀기가 아니라 소리를, 소리가 나기 전 긴장을, 소리와 함께 해소되는 그 무엇을 기다렸다. 그 앞에 서면 누구나 발걸음을 쉬 옮기지 못했다. 어린 사람, 늙은 사람, 덜 늙은 사람이 빙 둘러섰다. 누군가는 귀를 막고, 누군가는 미간을 찡그리며, 누군가는 짐짓 태연한 듯 무표정을 짓고, 누군가는 턱 아래를 만지며 기다렸다. 소리가 태어나기를. 태어나 어서 죽기를. 사라지기를. 심장이 조여들지 않기를. 그리하여 고소한 냄새와 침묵의 그림자를 뒤집어쓰고 잠시 안도하기를.", "다시 루비가 왔을 때 나는 엎드려서 글씨를 쓰고 있었다. 동시집 27쪽에서 50쪽까지 배껴 쓰고 있었다. 고모는 이제 다른 집에서 사니까 시키는 사람이 없는데도 베껴 썼다. 습관이 되었기 때문이다. 동시에 아름다움이 담겨 있을 수도 있지만 그런 건 몰랐다. 운율이나 음악이 담겨 있을 수도 있지만 그런 건 몰랐다. 그냥 썼다. 그리고 나는 점점 시가 되었다. 왜냐고? 누구라도 어릴 때부터 베껴 쓰다 보면 그렇게 된다는 걸 알 것이다.", "빛이 일렁이고 뜨거운 고요가 흘렀다. 담벼락엔 줄장미가 늘어져 있고 나무들은 초록으로 맹렬히 무장했다. 그늘이 보이면 누구든 그늘을 향해 기어갔다. 부채와 선풍기만으로 여름의 열기를 견디어야 했다 .해가 지면 땅은 순해졌다. 불꽃의 손아귀에서 놓여난 짐승의 등처럼 땅이 서서히 식었다. 어디선가 딱, 딱, 손바닥을 쳐 모기를 잡는 소리가 들렸다. 나는 어릴 때에도 더 어린 날을 회상했다. 옛날과 더 옛날을 구분했다. 미래는 막막했다. 미래에게선 자주 등을 돌렸다.", "거룻배에 올라타듯 어른의 신을 신어보았다. 커다란 신을 신고 마당을 몇 바퀴 돌고 나면 한꺼번에 몇 년씩 나이를 먹은 것 같았다. 그땐 나이가 내 최대의 약점이라고 생각했다. 나는 늘 너무 어렸다. 늙어서도, 너무 어렸다.", "아빠의 어린 시절 이야기는 내가 퍽 좋아하는 얘기였다. 아빠가 사랑받은 막내라는 사실에 대리만족을 느꼈다. 막내는 중요한 존재도 아니면서 (그렇기에) 모두의 사랑을 받는 존재였다. 가족 구성원의 아량과 사랑을 모자처럼 쓰고 다니는 존재. 그 모자를 썼다는 것만으로 특별해지는 존재. 기대는 덜 받고 용서는 더 받는 존재가 막내였다.", "사람들이 착각하는 게 있다. 유년이 시절이라는 것. 유년은 '시절'이 아니다. 어느 곳에서 멈추거나 끝나지 않는다. 돌아온다. 지나갔다고 생각하는 순간, 다 컸다고 착각하는 틈을 비집고 돌아와 현재를 헤집어놓는다. 사랑에, 이별에, 지속되는 모든 생활에, 지리멸렬한 환멸로 치환되는 그 모든 숨에 유년이 박혀 있다. 붉음과 빛남을 흉내낸 인조보석처럼. 박혀 있다. 어른의 행동? 그건 유년의 그림자, 유년의 오장육부에 지나지 않는다. 그 시절의 루비를 만난다면 물어보고 싶다. 루비, 깨끗해져야 하는 게 정말 우리였을까?", "그때 나는 가진 게 없는 빈털터리 영혼에 지나지 않았지만 할머니만은 내 것이라 믿었다. 바보 같은 믿음이었지. 아는가? 믿음은 바보에게만 허락된다는 걸. 바보들만이 믿고, 바보들만이 운다. 나는 생각을 실 삼아 눈물을 방울방울을 꿰어보려 했다. 말하자면 생각으로 슬픔을 정돈해보려던 거다. 말을 고르느라 지쳐갈 무렵 슬픔으로 인해 내가 타격받았음을 깨달았다.", "당시 개는 그런 존재였다. 귀엽고 꼬리를 흔들고 가족에게 호의적이지만, 접촉하면 손을 씻어야 하는 존재. 가족 가까이에 있지만 가족과 같은 위치에 있을 순 없는 존재. 가족이란 울타리 안과 밖, 경계에 서서 '위험(더러운 것에 덮여 씌워질)'을 살피며 서성이는 존재였다. 위험한 일이 생기면 최전선에서 수비수 역할을 해야 하는 존재. 위험에 가장 먼저 노출되어 있는 존재가 우리를 지켜야 했다.", "무언가를 들키는 순간 어른들은 쉽게 무너진다. 화를 내거나 고개를 파묻고 싶어 하고, 어느 때는 울기도 한다. 그런 모습은 보고 싶지 않았다. 어른들을 바로 세우기 위해, 그들을 돌보기 위해 내가 할 수 있는 일은 모르는 척하기뿐이었다.", "겁이 많은 사람이 대부분 나쁜 건 아니지만 나쁜 사람들은 대부분 겁이 많다. 그들의 나쁨을 파헤쳐보면, 그러니까 그 끝의 끝까지 추적해보면 결국 겁이 나타난다. 돈 때문에 나빠진 사람은 가난을 겁내고, 사랑 때문에 나빠진 사람은 이별을 겁내고, 권력을 손에 쥐고 나빠진 사람은 자신이 아무것도 아닌 존재가 되는 걸 겁낸다. 그리고 누군가를 미워하다 나빠진 사람은 누군가에게 자신도 미움을 당할까봐 겁낸다.", "아이들에겐 지혜가 있다. 아이들은 지혜를 갖고 태어난다. 지혜를 잃어버리는 건 늘 어른들 쪽이다. 고모부는 우리보다 지혜가 없었고, 그게 늘 문제가 되었다. 고모부는 세상 돌아가는 이치나 집안 분위기, 특히 고모의 기분을 알아채지 못했다.", "\"학교에서 선생님이 너를 때리려고 하면 그냥 돌아서서 나와. 절대로 맞지 마. 집으로 와. 아빠가 책임질게.\"", "학교에서 지각을 하거나 떠들었다는 이유로 손바닥을 맞아야 할 때, 아빠의 말이 떠오르는 게 문제였다. '맞으면 아플까'란 생각보다 '맞는 게 옳을까'하는 의심이 들기 시작했다. 나는 '고민'의 여파로 매를 든 선생님 앞에서 자꾸 손바닥을 숨겼다. 내려치려는 선생님의 손과 피하려는 내 손이 교탁 앞에서 대치했다. 널뛰기 한 판처럼. 회초리가 올라갈 때 내밀었던 손바닥이 회초리가 내려올 땐 사라지는 놀이. 약이 오른 선생님은 눈으로 레이저를 쏘지만, 나는 작용반작용 법칙에 따랐을 뿐이다. 때리려는 힘이 있으면 맞지 않으려는 힘도 생겨나는 법. 정당방위였다.", "한번은 교실 앞문으로 나가 - 차마 집으로 가진 못하고 - 뒷문으로 다시 들어와 엉거주춤한 자세로 선생님을 바라본 적도 있다. '정말 나를 때리고 싶은가' 내 눈은 그렇게 묻고 있었을 게다. 교실 안에서 이리저리 도망다니다 결국 선생님에게 잡힌 나는 다른 애들보다 더 세게, 두 배로 맞았다. 엄살, 그게 내 보호책이자 보호색이었다. 만약 선생님이 손바닥을 때리는 데 그치지 않고 좀 더 심각한 폭력을 행사하려 했다면 나는 맞지 않고 도망쳐나왔을지 모른다.", "학자가 태어나기 전 새엄마는 내게 말했다. 네가 내 새끼였다면 벌써 반은 죽였어. 네가 내 새끼였다면 가만 안 두었다고. 나는 그 말을 못 들은 척했지만, 완전히 죽이지 않고 반만 죽이는 일에 대해 상상한 건 사실이다. 학자가 태어났을 때 새엄마를 유심히 관찰할 수밖에 없었다. 자기 새끼라면 죽이겠다고 여러 번 선언하지 않았던가. 학자가 떼를 쓰며 길게 울던 날 나는 새엄마를 향해 물었다. \"학자를 죽이고 싶어?\" 새엄마는 살기 띈 눈으로 덤덤벼들 듯 말했다. \"그게 무슨 개 같은 말이야?\" 어른들은 자기가 한 말의 앞뒤 맥락을 생각해보지 않는다. 특히 아이들에게 한 말에 대해서는 생각하지 않는다. 거짓과 진실이 따로 없으며, 한 말을 잊고 안 한 말을 했다고 믿는다. 어른들과 논리적인 대화를 하는 일은 정말로 어렵다.", "모든 걸 괜찮게 보이려고 노력하는 사람은 피로해진다. 괜찮지 않은 것도 괜찮게 보여야 하고 괜찮은 것은 더 괜찮게 보이려 하다 보면 거짓이 침투하고 외로움이 스며든다. 루비는 오랫동안 자기 삶을 괜찮게 보이려고 안간힘을 쓰다 아이들의 적이 되었다. 루비의 거짓말은 견고해지고 아이들의 적의는 깊어졌다.", "'여름과 루비'는 소설이면서 시이기도 하고 다시 소설이다. 시이자 소설이자 목소리이자, 노래다. 이야기다. 시인에게 언어는 음표와 같거나 혹은 훨씬 먼저 배운 모어다.", "'여름과 루비'는 서술자 '나'인 여름이가 루비를 어떻게 만났고 (루비가 어떻게 여름이의 인생에 나타났고) 둘은 어떤 사랑을 했고, 서로의 무엇을 지켜주었고 혹은 지켜주지 못했으며, 그래서 여름이가 결국 루비를 잃어'버렸고' 그래서 이렇게 찾는다고, 내가 너늘 찾고 있다고 외치는 그런 소설이자 시, 그리고 목소리, 노래다."]}, {"title": "여자 둘이 살고 있습니다", "author": "김하나, 황선우", "genre": "에세이", "publisher": "이야기장수", "passages": ["비슷한 점이 사람을 서로 끌어당긴다면, 다른 점은 둘 사이의 빈 곳을 채워준다. 나와 똑같은 사람이 존재한다면 과연 함께 살기 좋은 대상이었을까? 아마 가슴속 깊이 이해하면서 진절머리를 내고 도망쳤을 것 같다. 참 다른 김하나와 함께 살면서 나는 조금은 욕심이 줄고, 얼마간 정돈되었고, 약간은 느긋해졌다(고 믿고 싶다). ​", "큰 대출을 얻고 또 갚아보면서 내 배짱은 아주 조금 도톰해졌다. 또하나 배운 교훈은, 자신이 두려워하는 뭔가를 영원히 피해다닐 수 없다면 제대로 부딪쳐볼 필요도 있다는 거다. 늘 머물던 안전지대 밖으로 한 걸음을 내딛어보면 세상에 생각해온 것만큼 큰 위험이 없다는 걸 알게 된다. 어쩌면 겁쟁이일수록, 위험한 상황을 좀처럼 만들지 않는 자신의 본능적 감각을 믿어봐도 좋을지 모른다. 조금 대담해진 쫄보는 오늘도 라니스터에게서 배운다. 빚은, 지지 않는 게 아니라 잘 갚는 게 중요하다. ​", "삶의 진짜 궤도 같은 것은 없다. 어떤 사람들은 학창 시절을 대입을 준비하는 기간으로만 생각한다. 하지만 내 친구 황영주의 말마따나 학창 시절은 하나의 엄연한 '시절'이다. 마찬가지로, 많은 사람들이 싱글로 사는 기간을 결혼을 준비하는 기간으로 생각한다. 결혼을 점점 늦게 하는 추세인 요즘은 그 기간이 아주 길어져 인생의 많은 부분을 차지하기도 하는데, 그래도 그 기간을 '진짜 인생'의 서막처럼 여긴다면 긴 기간 동안 인생을 유예하며 사는 셈이 된다. 결혼을 하게 될지 어떨지 몰랐던 황선우는 유예 기간이 길었고, 이제는 삶을 새로이 재정비해야겠다 싶었을 때 마침 나와 의기투합하게 되었다. ​", "공격적으로 말하기보다 부드럽게 둘러서 얘기하고, 마찰이 생길라치면 상황을 외면해버리기에 독립적이고 쿨해 보이는 이런 사람들은 실은 비겁한 부류다. 실망하기 싫어서 기대하지 않은 척하고, 부딪치기 싫어서 크게 중요하지 않은 척하는. 인격이 성숙해서 잘 안 싸우는 사람이 전혀 아니라, 오히려 미숙해서 잘 못 싸우는 사람에 가까웠던 거다. 다투더라도 기분이 상했을 때 내 집으로 돌아와 동굴 같은 그곳에서 휴식을 취하면 되었으니까. 하지만 이번에는 통하지 않았다. 함께 사는 사람과 싸운다는 건 도망갈 곳이 없어진 거다. 지금까진 누구와의 갈등도 이렇게까지 깊게 제대로 해결할 필요까진 없었다면 이제 절벽을 뒤에 둔 느낌으로 최선을 다해 임해야 한다. 제대로 잘 싸워야 한다. 내가 이제야 배운 싸움의 기술은 이런 것이다. 진심을 담아 빠르게 사과하기, 내가 무엇을 잘못했는지 내 입으로 확인해서 정확하게 말하기, 상대방의 기분을 헤아려 어떨지 언급하고 공감하기. ​", "\"둘만 같이 살아도 단체 생활이다.\" 동거인에게 가장 중요한 자질은 서로 라이프 스타일이 맞느냐 안 맞느냐보다, 공동 생활을 위해 노력할 마음이 있느냐 없느냐에 달렸을 것 같다. ​", "잘 모르는, 멀리에 있는, 애정이 없는 대상일수록 일반화하기 쉽다. 뭉뚱그리고 퉁쳐도 상관없다. 하지만 사랑하는 존재에 대해서는 아주 작은 차이가 특별함을 만든다. 그 개별성이 소중하고 의미 있다. 네 마리와 함께 생활하면서 '고양이는 이렇지'라고 특정할 수 있는 이해도 생겼지만, 또 한편 '고양이는 다 이래'라고 말하기 힘든 개성의 영역도 알게 되었다. ​", "인간은 자신을 위해서보다 다른 사람을 위해 더 부지런할 수 있는 존재다. 누군가와 함께 먹을 식사를 차린다면, 무슨 힘에선지 국이라도 하나 끓이고 더운 찬이라도 한 가지 볶게 되는 것이다. 엄마에게 음식이란 단지 가족을 위한 희생만이 아니다. 상대에 대한 애정과 관심을 표현하는 방식이자 자신의 능력을 발휘하는 즐거움이고, 부엌을 관리하고 다스리는 고도의 경영이자, 무뚝뚝한 자식과 대화하는 매개이기도 하다. 음식을 싸주고 먹이는 대상이 늘어날수록 엄마의 세계도 함께 넓어져왔다. 그리고 이제 그 세계에는 나의 동거인도 포함된다. ​", "누구나 반드시 필요한 이야기만 나누는 사이가 아니라 쓸모없고 시시한 말을 서로 털어놓을 수 있는 상대를 한 사람쯤은 갖고 싶은 것이다."]}, {"title": "연년세세", "author": "황정은", "genre": "소설", "publisher": "창비", "passages": ["한세진은 이순일의 얼굴이 상심, 그리고 티 내지 못할 짜증으로 일그러지는 것을 보았다. 아니 아저씨들, 나 우리 할아버지한테 제사 먼저 드리려고 했는데. 이순일이 명량한 어조로 탓하자 흙더미 곁에 웅크리고 앉아 구덩이 속의 작업을 지켜보던 인부가 말했다. 우리가 술 한잔 올렸어.", "너무 효도하려고 무리할 필요는 없어. 효? 그것은 아니라고 한세진은 답했다. 그것은 아니라고 한세진은 생각했다. 할아버지한테 이제 인사하라고, 마지막으로 인사하라고 권하는 엄마의 웃는 얼굴을 보았다면 누구라도 마음이 아팠을 거라고, 언제나 다만 그거였다고 말하지는 않았다.", "한영진은 예컨대 수험생의 숙면과 집중력, 활력 조성에 도움이 되는 침구를 찾는 엄마들에게 시간을 들여 이불을 보여주며 원단과 배색을 설명하고, 결정되었다 싶은 순간에 더 품질이 좋은 이불쪽으로 엄마들을 이끌었다. 한번 만져보라고 권한 뒤 그들이 이불을 쓸어보고 귀퉁이를 뒤집어보고 겉감을 비벼 속감을 알아보는 동안 한발짝 떨어져 서 있다가 낮은 목소리로 말을 걸었다. 좋죠? 좋네. 이거 엄마가 써요. 아유, 난 됐어. 좋잖아요. 좋지. 좋은 거 엄마가 써요. 왜 애들만 좋은 거 써. 엄마들이 좋은 거 써야 해.", "돈이 사라졌다는 당혹감보다는 시치미를 떼는 동생들이 괘씸해 한영진은 분노했다. 하지만 이제 봐라, 아버지가 판단할 것이다. 그가 도둑을 밝혀내 망신을 주고 벌을 줄 것이다. 그런 생각을 하며 동생들을 노려보고 있을 때 한중언이 말했다. 너희 중에 누군가는 더러운 거짓말을 하고 있어. 너희 중에 누군가. 라고 한중언은 말했으나 그 말을 하면서 그는 한영진을 보고 있었다. 술을 마신 상태였고 어디서 뭘 먹었는지 뭔가를 태운 냄새가 났으며 눈은 충혈되어 있었다. 그 눈으로 한영진을 노려보며 한중언은 말했고 그 일을 한영진은 잊지 못했다. 당시의 공포와 무력감, 자기 몫이 아닌 것 같은 창피를 한영진은 전부 기억했다. 한영진의 아이들이 뭔가를 혹은 누군가를 원망하느라고 악쓰며 울어댈 때, 서로의 잘못을 엄마에게 일러바치려고 안간 힘을 쓰고는 할 때, 한영진은 아이들의 얼굴을 바라보며 그 말을 생각했다. 더러운 거짓말. 불식간에 그렇게 말하는 일이 없도록 눈을 동그랗게 뜨고 그 말과 그 어조를 생각했다.", "한영진은 한세진을 데리고 직원 식당으로 내려갔다. 백화점 근처에 더 좋은 식당이 몇군데 있었지만 한영진은 그런 곳으로 한세진을 데려가지 않았고 한세진도 굳이 바깥으로 나가자고 말하지 않았다. 그게 룰이었다. 일터로 가장을 보러 오는 사람은 그가 어떤 장소에서 어떻게 일하고 먹고 마시며 돈을 버는지를 봐야했다. 그렇게 버는 돈으로 그들이 먹고살았고, 살고 있으니까. 한영진은 그렇게 배웠다. 누가 가르쳐준 것도 아닌데 시장에서 부모에게, 직장에서 동료들에게 그걸 배웠다.", "그 말을 하지 않았다면 좋았을 거라고 한영진은 생각했다. 엄마 이야기는 꺼내지 않는 게 나았을 텐데. 한세진과 대화하면 자주 이렇게 되었다. 언짢고 불편해졌다. 하지 않았다면 좋았을 말과 하고 싶지도 않았는데 해버린 말들 때문에.", "이순일은 위로 더 올라가보고 싶어했는데 무릎 상태가 좋지 않아 억새를 바라보며 서성이기만 했다. 김원상이 이순일에게 등을 내밀었고 이순일이 그 등에 업혔다. 그 순간을 한영진은 보았다. 찰나에 일어난 일이었고 조금만 더 늦게 그쪽으로 고개를 돌렸다면 보지 못했을 광경이었다. 저 사람은 참 크고, 우리 엄마는 참 작구나. 작은 충격 속에서 그들을 보며 한영진은 생각했다. 김원상이 이순일을 업은 채 오름을 오르기 시작했다. 김원상은 그런 걸 아무렇지 않게 할 수 있는 사람이었다. 의식하지도 과시하지도 않은 채 그런 걸 할 수 있는 사람. 실망스럽고 두려운 순간도 더러 있었지만 한영진은 김원상에게 특별한 악의가 있다고 믿지는 않았다. 그는 그냥 그 사람은 그냥, 생각을 덜 하는 것뿐이라고 한영진은 믿었다. 한영진이 생각하기에 생각이란 안간힘 같은 것이었다. 어떤 생각이 든다고 그 생각을 말이나 행동으로 행하는 것이 아니고 버텨보는 것. 말하고 싶고 하고 싶다고 바로 말하거나 하지 않고 버텨보는 것. 그는 그것을 덜 할 뿐이었고 그게 평범한 사람들이 하는 일이었다. 평범한 사람들이 매일 하는 일.", "한영진은 갓난아이와의 간격이 조금 벌어진 뒤에야 아이와 관계를 맺을 수 있었다. 아이를 유심히 보고 싶은 마음, 다음 표정과 다음 행동을 신기하고 궁금하게 여기는 마음, 찡그린 얼굴을 가엾고 사랑스럽게 바라볼 수 있는 마음, 관대하게 대하고 싶은 마음, 인내심 모든 게 그 간격 이후에야 왔다. 한영진의 모성은, 그걸 부르는 더 적절한 이름이 필요하다고 언젠가 한영진은 생각한 적이 있었는데, 타고난 것이 아니고 그 간격과 관계에서 학습되고 형성되었다. 그건 만들어졌다. 그걸 알았기 때문에 한영진은 둘째를 낳을 수 있었고 첫번째보다는 여유 있게 아이를 받아들일 수 있었다. 아이들을 지금은 좋아했다. 이순일이 그걸 가능하게 했다는 것을 한영진은 알고 있었다. 이순일의 노동이 그것을 가능하게 했다.", "한영진에게도 하고 싶은 말이 있었다. 이순일에게 묻고 싶은 오랜 질문이. 왜 나를 당신의 밥상 앞에 붙들어두었는가. 한영진은 그러나 그걸 말할 자신이 없었다. 그 질문을 들은 이순일의 얼굴을 볼 엄두가 나지 않았다. 대답을 기다리는 순간을 대면할 용기가 없었다. 이순일은 이제 칠십대였고 일생 아이들을 돌보느라 여기저기 아픈 데가 많았다. 아마도 끝까지, 그걸 묻는 순간은 오지 않을거라고 한영진은 생각했다. 그런 걸 물으면 엄마는 울지도 몰랐고 한영진은 엄마가 우는 걸 보고 싶지 않았다.", "1970년 봄이었는데 그땐 시장에서 과일을 팔았다. 건어물 가게 옆에 함지를 두고 장사했는데 잘 팔렸다. 시장이 잘 될 때였다. 너무 바빠 손 닿는 곳에 있는 먹거리를 집어 입에 넣는 것으로 속을 채우는 날도 많았다. 이순일은 그때부터 토마토를 먹었다. 일하다 말고 허기나 갈증, 현기증을 느끼면 토마토를 집어 그 자리에서 먹었다. 한알이면 배가 불렀고 갈증이 사라졌다. 이순일은 감기며 잔병에 잘 걸리지 않았고 나이를 먹어서도 비교적 좋은 시력을 유지하고 있었다. 토마토를 꾸준히 먹었기 때문이라고 이순일은 믿었다. 아이들에게도 토마토를 먹으라고 입버릇처럼 일렀는데 애들은 그걸 잘 먹지 않았다. 입이 붓는다고 질색했다. 토마토에 독이 있다는 걸 이순일은 알고 있었다. 당연하지 않은가. 그 정도로 힘센 열매에 독이 없을 리가.", "어렸을 때에는, 하고 이순일은 생각했다. 이 아이들이 어렸을 때에는 다투거나 하면 즉시 개입할 수 있었는데, 한쪽을 혼내거나 둘 다 혼내거나 달래거나 중재할 수 있었는데, 지금은 그게 가능하지 않았다. 아이들은 어릴 때만큼 자주 다투지는 않았지만 훨씬 신랄하고 내밀한 것을 두고 다투었다. 그게 무엇이든 이순일은 가책을 느꼈다. 그게 무엇이든, 자기 손으로 건넨 것이 그 아이들의 손으로 넘어가 쪼개졌고 그 파편을 쥐고 있느라 아이들이 피를 흘리는 거라고 이순일은 생각했다.", "순자는 선생이 되고 싶다고 했다. 선생이 되고도 공부를 더 많이 해서, 교감이나 교장이 되고 싶다. 될 거라고 이순일은 감탄에 잠긴 채 생각했다. 순자는 공부를 열심히 하니까. 뭐든 맵시 있게 잘 만들고, 특히 글씨를 잘 쓰니까. 순자가 작문 노트에 필기할 때나 유니언 잉글리시 교재를 펼치고 거기 인쇄된 영문이나 문제를 노트에 옮겨 적을 때, 그럴 때 이순일은 편물거리를 담은 바구니를 한쪽에 밀어두고 순자의 글씨들을 바라보았다. 글씨일 뿐인데, 심성 같다고 생각했다. 침착하고 힘 있고 이상한 유머를 숨기고 있는 순자의 마음. 이순일은 다 쓴 노트를 받아 방에 두고 틈틈이 순자의 글씨를 베끼며 글을 배웠다.", "말로든 기록이로든 사람은 무언가를 세상에 남길 수 있고, 남기는 데 성공하는 사람들이 있다는 것을 이순일은 알고 있었지만 그것을 하고 싶지 않았다. 그 숱하고 징그러운 이야기를 그것을 내가 다시 생각하며 말해야 하는가. 이순일은 아이들이, 한영진과 한세진과 한만수가 그 일을 이야기로도 겪지 않기를 바랐다.", "1986년에 서울아시안게임이 한창일 때 이순일은 국제전화를 한통 받았다. 다소 높고 거친 목소리로 어떤 여성이 이순일의 어린 시절 이름을 말했다. 순자냐? 네? 순자야. 누구세요. 철원 살던 윤옥영이, 윤옥영이 딸 순자 아니에요? 누구세요. 철원 살던 윤옥영이, 윤옥영이 딸 순자 아니에요? 누구세요. 누구신데요. 정체도 밝히지 않고 어릴 때 이름을 대는 여성에게 이순일이 분노와 공포를 느끼면서 누구시냐고 거듭 묻자 그는 본인이 이모라고 밝혔다. 네 엄마 동생 부경이, 옥영 언니 동생 부경이. 윤부경은 가난과 무식이 끔찍해 해방 이후 시골집을 떠나 미군정 치하 서울에서 지내다가 전쟁 직후 거제도까지 피란 내려간 뒤 거기서 만난 미군과 결혼했다고 말했다. 전쟁이 끝나고 이 사람 따라 미국으로 왔어. 고향집이 백마고지이며 접전지에 가까워 어차피 다 죽었다 생각했고 본인도 영어 한마디 못해 남편 나라에 적응해 사는 것이 힘겨워 그동안 여기서 살기만 했다고, 끼룩끼룩 살기만 했어. 이제 자식들 다 크고 고향 생각을 점점 하던 차에 동향 사람을 만날 기회가 있었는데 그가 하나 남았다는 말을 전하더라고 윤부경은 말했다. 하나 남았어. 하나 살았어.", "이모를 알아볼 수 있을까, 그 사람 많은 데서 얼굴도 모르는 사람과 엇갈리면 그 사람을 어떻게 찾나, 걱정하며 덕수궁 돌담을 따라 걸어가는데 이모가 얼굴을 찡그린 채 맞은편에서 다가왔다. 당신이 그 사람이냐고 서로 물을 것도 없이 닮은 얼굴이었다. 그러니까 순자야 내가 어머니를 닮았다는 걸 나 그때 비로소", "이 아이도 시장에서 자랐다. 자기 형제자매들과는 곧잘 말하다가도 어른들 앞에서는 입을 닫고 얼굴을 숨기느라 고개를 푹 숙이곤 해 시장 상인들이 이 아이를 수쿠리, 수쿠리, 하고 불렀지. 이순일은 한세진이 잘 살기를 바랐다. 하지만 이 아이는 살림을 몰랐다. 스테인리스 찜기 속 물이 다 증발하도록 가스 불에 내버려두었고 내열컵도 아닌 유리컵에 금속 스품을 넣지도 않은 채 갓 끓인 물을 따랐다. 유리병이든 컵이든 생각에 잠긴 채로 뭘 쥐고 있다가 손에서 그걸 놓치는 일도 잦았다. 그런데 그건 다른 아이들도 마찬가지였다. 손아귀에 힘이 하나도 없는 아이들. 뭘 움켜질 줄을 몰라 바깥에서 무슨 일을 당하면 속수무책으로 휩쓸려 사라질 것 같은 아이들. 잘 살기. 그런데 그건 대체 뭐였을까, 하고 이순일은 생각했다. 나는 내 아이들이 잘 살기를 바랐다. 끔찍한 일을 겪지 않고 무사히 어른이 되기를, 모두가 행복하기를 바랐어. 잘 모르면서 내가 그 꿈을 꾸었다. 잘 모르면서.", "그 무렵 하미영은 뭔가를 중도에 자주 포기했다. 책을 읽다 말았고 영화를 보다 말았다.", "공항에서는 어땠냐고 하미영은 물었다. 한세진은 공항에서 사람들이 영어로 씨팔이라고 말하는 것을 들었는데 그게
