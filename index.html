 생각해요. 기후위기와 관련해서 절망적인 기사가 너무 많으니까, 지금 어떻게 준비하느냐에 따라 우리가 긍정적인 변화를 누릴 수도 있다는 걸 증언하는 기사를 쓰고 있어요. ​", "이런 시기를 지나 AI 시대가 본격적으로 열리면 또 정말 많은 것이 달라지겠죠. 하지만 설사 그런 변화가 닥친다고 해도 지금 저 사람이 어떤 표정을 짓고 있는지, 그 공간에 어떤 냄새가 나고 날씨는 어떤지는 직접 가서 봐야만 알 수 있어요. 나에게 그런 탐구심과 호기심이 있거나 조금 더 나은 방향으로 세상에 질문을 던지고 싶다면 기자에 도전해 봐도 좋아요. ​", "환경 사건에서 소송이라는 도구를 꺼낼 때는 청구인들의 의지가 큰지, 그리고 그 시점의 운동에 전략적으로 필요한지를 기준으로 판단합니다. 소송이 주요한 캠페인 수단이 될 수도 있고 청구인들을 뭉치게 하는 계기가 될 수도 있거든요. 그런데 소송에서 지게 되면 상대방이 더 기고만장할 수도 있고 적법한 사업이라는 명분을 줄 위험이 있어요. 패소 비용이 발생하면 청구인들한테 재무적인 부담까지 가중되어 공동체가 와해될 수도 있고요. 그래서 저는 조심스럽게 접근해야 한다고 봐요. ​", "기후위기에 대응하는 실천과 활동을 지속하는 데 필요한 것은 무엇일까요? 꺽이지 않는 마음? 마음이 통하는 동료? 모두 중요한 요소인 것 같아요. 그중에서도 내가 지치지 않고 거듭 새로이 마음먹을 수 있게 하는 중요한 요소는 '커뮤니티'가 아닐까요. 내 주변에 그런 사람들이 없다고 외로워만 하기보다 사람들이 모일 수 있는 공간을 만들고 계속해서 그 공간에 활기를 불어넣는 강경민 대표는 자신도 모르게 '커뮤니티 디자이너'의 일을 하고 있었어요. 물건을 어떻게 진열해야 판매량을 늘릴 수 있는지 고민하던 강경민 대표가 눈에 보이지 않는 것에 집중하자고 이야기하게 되기까지 변화 과정을 들어 보았어요. '나의 것'을 만들고 싶어 시작한 더 커먼에서 사람들과 함께 기억과 역사를 쌓으며 '모두의 것'을 만들어 가는 이야기이기도 했지요."]}, {"title": "즐거운 어른", "author": "이옥선", "genre": "에세이", "publisher": "이야기장수", "passages": ["내가 왜 이렇게 과감하게 굴 수 있었으냐 하면 그동안 여러 케이스를 봤기 때문이다. 문중의 여자가 유방암에 걸려서 입원하고 나니까 그동안 제사는 정성이라는 말을 입에 달고 살던 양반이 제사를 지낼 엄두도 못 내고 대책 없이 있는 집도 봤고, 부인이 먼저 죽고 나니 며느리 없는 집은 자기 부인 제사조차 못 지내는 케이스도 봤다. 결국 이 모든 전통이니 가풍이니 하는 것들이 남의 집 딸들 데려다가 자기네 조상 섬긴 것밖에 안 된다는 걸 너무나 실감나게 느낀 덕분이다. ​", "한국의 여자들은 너무 똑똑하고 교육도 다 잘 받았다. 사태 파악이 빨라 비혼자도 늘었다(남자 잘못 만나 인생 망한 여자는 있어도 안 만나서 망한 여자는 없단다). 더러 남자들도 비혼을 선호하고, 결혼하고도 아이 없이 사는 풍조도 늘어간다. 출생률이 세계에서 제일 낮다는 것이 나쁘기만 한 것은 아니다. 지구의 부담을 줄여주는 일이니까. 인구 정책을 논의하는 사람들은 안 봐도 알 것 같은데, 50대 중반을 넘은 고위직 남자거나 남성적 돌파력으로 그 자리까지 올라간 여성일 것 같다. 아이 하나 낳는 데 돈 얼마를 지급하겠다는 얄팍한 정책 가지곤 먹혀들지 않는다. 제도적 결혼 안에서만 인구를 늘리려는 생각으로는 절대로 인구가 늘지 않는다에 500원 건다. 아니 5천 원 건다. ​", "많은 돈을 쌓아놓은 것은 아니지만 어쨌든 굶어죽을 걱정은 안 해도 된다. 돈을 아껴 모아서 집을 사야 할 일도 없다. 꼴 보기 싫은 상사가 있는 직장에 다니지 않아도 된다. 앉으나 서나 자식 걱정 같은 것도 안 해도 된다. 자식들은 이미 성인이 되어 오히려 나를 걱정할지도 모르는데, 자식들이 걱정한다는 것은 엄마로서 명예롭지 못하다고 생각하기 때문에 꼭 필요한 일이 아니라면 전화도 잘 안 한다. 엄마는 항상 씩씩하게 잘산다는 메시지를 준다. 남편 저녁밥상에 뭘 올릴지 메뉴 때문에 골치를 썩이지 않아도 된다. 그렇다. 지금 나는 팔자가 늘어진 최고의 인생 한 시절을 보내고 있는 것이다. ​", "사람들이 할머니가 되면 할일이 없어 주리를 틀어댈 거라고 자기들 멋대로 생각한다. 그러니까 자식들은 지 자식을 갖다 맡기고도 별로 미안한 기색도 없고(오히려 소일거리를 줘서 다행이지? 하는 태도다), 손주는 봐주는 게 당연하다고 저희 편할 대로 생각하지만 천만의 말씀이다. 요즘 할머니들은 다 자기 나름의 루틴이 있고, 나이들어도 새로 배우고 싶은 것은 얼마든지 있다. ​", "호스피스 운동의 선구자 엘리자베스 퀴블러 로스는 '인생 수업'에서 죽음을 눈앞에 두고 있는 사람이야말로 바로 우리 삶의 교사라고 했다. 삶은 \"기회이며, 아름다움이고, 놀이\"이므로, \"그것을 붙잡고, 감상하고, 누리\"라는 것이다. 죽기 전 아무도 더 많은 돈을 벌지 못한 것을 후회하거나 더 많은 권력을 쥐지 못한 것을 후회하거나 하지는 않는다. 더 많이 사랑하지 못했고 더 행복한 상태로 살지 못했음을 후회할 뿐이다. 삶의 마지막 순간에 간절히 원하게 될 것이 있다면 지금 당장 그것을 해야 한다고 엘리자베스 퀴블러 로스는 말한다. 글쎄? 마지막 순간에 내가 뭘 원하게 될까? 나는 간절히 원하는 것도 없을 것 같다. 그냥 아이스크림이나 먹을까? 아니면 커피 한잔? ​", "예수님도 그러셨지, 서로 사랑하라고. 예수님은 아셨던 것이다, 인간이란 종이 전혀 사랑스럽지 않다는 것을. 그러니 그렇게나 서로 사랑하라고 신신당부를 하신 것이다. ​", "\"나는 아무것도 바라지 않는다, 나는 아무것도 두려워하지 않는다, 나는 자유다.\" 나도 니코스 카잔차키스의 이 묘비명처럼 말하고 싶지만 이미 선점당한 상태고, 마르크스처럼 \"평소에 하고 싶은 말을 못 한 바보들이나 유언을 하는 거지\" 할 수도 없고, 그냥 나도 생각난 김에 한마디하자면, 나는 내가 인생에서 해야 할 숙제는 다 했고(남편의 장례식을 끝낸 것, 뒷정리를 다한 것이 나의 제일 큰 숙제였다) 이제까지 대충 즐겁게 잘살아왔다고 생각한다. 너희도 너무 애쓰지 말고 대충(이것이 중요하다) 살고, 쾌락을 좇는다고 행복해지지는 않는다. 뭔가 불편한 것이 있으면 이것부터 해결하는 방법으로 살면 소소하게 행복할 것이다. 건강을 유지하기 위해서(건강을 잃으면 행복하기 어렵다) 한 종목의 운동을 늙어서까지 꾸준히 할 것이며 너무 복잡한 건 생각하지 말고 단순하게 살도록 해라. 다행히도 재산이 많지 않아 문제될 것이 없다고 본다. 아들딸 며느리 손자 손녀 너희들이 있어서 행복했고, 너희는 내가 지금도 씩씩하고 즐겁게 살아갈 수 있는 원천이다. 나의 장례는 그 시기의 일반적인 방법으로 할 것이며 화장해서 유골은 너희 아빠를 장사 지낸 것처럼 하고, 제사는 지내지 말고 그날 시간이 나면 너희끼리 좋은 장소에 모여서 맛있는 밥을 먹도록 해라. 또하나 바라는 게 있다면 너희 아빠는 꽃 피는 봄에 돌아가셨으니 나는 단풍 드는 가을에 떠나면 좋겠네. 그러면 너희는 봄가을 좋은 계절에 만날 수 있을 테니. 끝. ​", "저는 바람이 있다면 심근경색으로 고독사하기를 바랍니다. 죽는 순간 누군가의 눈에 띄기라도 하면 119에 실려 병원 갑니다. 그러면 중환자실에서 며칠 보내다가 겨우 회복되어도 결국은 요양병원행입니다. 그러니 즉는 순간에 들키지 않는 게 최곱니다. 이것이 여기 오는 젊은 사람의 시각이 아닌 죽어도 아깝지 않을 나이인 제가 생각한 마지막입니다. ​", "젊은 사람들이 몰라서 그렇지 금수저로 태어나면 거기에 상응하는 뭔가가 되어 보여야 하기 때문에 인생이 피곤해진다. 그렇게 좋은 환경과 뒷받침에도 별 볼 일 없는 존재에 머무른다면 그 또한 얼마나 스트레스를 받겠는가. 누구나 자기가 짊어져야 할 생의 무게가 있는 법이다. ​", "부부가 다 80대 중반을 넘기면 둘 다 건강하고 활기차게 살기보다 한쪽이 한쪽을 케어해야 하는 사태가 시작된다. 문제는 다른 한쪽도 다른 사람을 돌볼 만한 체력이 못 된다는 것이다. 이렇게 사는 것 자체가 불안정하고 불확실하다. 병석에 있는 배우자를 돌보다가 지쳐서 다른 쪽이 먼저 죽는 경우도 더러 있어 인생이란 변수가 너무 많다. 부부간에 금슬이 좋아 평생 만족하며 잘살아왔더라도 한쪽이 오래 투병 생활을 하면 그게 어느 쪽이든 간에 지쳐서 이제 이쯤에서 끝났으면 좋겠다는 생각을 하게 된다. 무조건 오래 사는 것이 능사는 아니다. 죽음이 어차피 부부의 문제라면 한쪽이 아직 건강을 유지하고 있을 때, 그가 여자든지 남자든지 상대방을 케어해서 잘 떠나 보낼 수 있다면 오히려 행운이다. ​", "사실은 남자 종족과 여자 종족은 전혀 다른 종이라고 본다. 그런데 외형이 같은 인간 형태라고 이 둘을 한집에 몰아넣고 같이 살아라 하는 것이 문제다. 이 문제를 인식하고 상호 간에 이해하려고 하는 자세를 가지고 미리미리 교육을 받았더라면 좋았겠지만, 아무도 이런 인식이 없다. 학교 교육 커리큘럼에 부부간의 예의나 남녀 간 생각의 차이 등을 넣어야 한다고 생각한다. ​", "얼마 동안은 정리하면서 시간을 보냈다. 남편이 친애하던 제자들을 불러서 책이나 그림, 기념할 만한 것들은 가져가게 하고, 재직했던 학교에 성의도 표시하고, 나머지는 버리고 또 버리고 정리 정리 정리, 한 트럭분의 책을 정리했다. 그리고 남편은 몇 권의 시집으로 남았다. 사는 동안 한 때 나는 저 남자가 술과 축제의 나날을 보내는 데 들러리나 서는 인생인 것 같아 부부싸움을 많이도 했다. 마지막 부부싸움을 한 이후 나는 이 싸움에서 승자가 된 것이다. 모든 것은 승자의 몫이다. 전리품으로 남은, 남편이 못 버리게 하던 것들을 모조리 다 버렸다. 당신이 평소에 옳다고 주장하고 끝까지 소장한 것들을 내 손으로 다 정리했다. 그러게 오래 살아남아서 천년만년 지키고 살지, 쌤통이다. ​", "요즘 미니멀라이프에 관한 책들이 더러 나오고, 일 년 이상 한 번도 끄집어낸 적이 없는 물건은 버린다는 원칙으로 집 정리를 하라는, 또는 설레지 않는 물건이나 옷은 버린다는 요령도 적어놓은 모양인데, 뭐 그런 얼척없는 원칙들을 가르쳐준단 말인가 싶은 세대가 우리 세대다. 물론 여기서 버린다는 것이 진짜 쓰레기로 버리는 게 아님도 안다(기부하거나 공익재단에 보내거나 필요한 사람에게 줄 수도 있다). 주로 일본 사람들이 쓴 책에 이런 내용이 많은데, 이들은 집이 우리나라보다 작아서 그런 게 아닐까 짐작한다. 하여간 쪼잔하기는, 옷이나 물건을 보고 설레면 그게 심장병이지 정상이냐? ​", "침대 옆에 둘 협탁을 살 때는 비싸고 번듯한 것을 살 뻔 하다가 이제부터 사는 살림살이는 내가 죽고 난 후 아이들이 망설임 없이 버릴 수 있는 것이어야 한다는 생각에 싸고 가벼운 것을 선택했다. 어머니가 돌아가시고 어머니의 자랑이었던 자개장롱을 버릴 수밖에 없었을 때 마음이 오래 안 좋았던 기억이 있기 때문이다. 이래서 노인이 되면 구매력이 줄어들 수밖에 없겠구나 싶다. 어느 영업사원이 집에 할머니만 있는 것을 보고 어, 아무도 없네, 이러고 갔다는 전설적인 이야기가 생각난다. ​", "요즘은 나이든 엄마들이 더 스트레스를 받는 것 같다. 며느리 부려먹었다는 말 들을까봐 모든 것을 완벽히 준비하려고 하기 때문이며, 자식들이 와 있는 바람에 목욕도 못 왔다며 불평을 한다. \"아이고, 이것들이 VIP잖아.\" 손주들이 오면 엄청 반갑지만, 얼마 지나지 않아 저것들이 언제 가나 싶단다. 어떤 엄마는 딸이 와서 오랜만에 고향 친구들 만나러 간다면서 손자 둘을 맡기고 나가는데, TV는 틀지 말라고 했단다. (요즘 TV를 없애고 육아하는 게 유행이라네.) 이 3살 5살 되는 애들을 데리고 놀아주려면 도저히 체력이 남아나질 않아서 지쳐 쓰러질 지경이라 에라, 모르겠다 싶어 투니버스를 7700원 주고 구독해서 만화영화를 보여주며 한숨 돌리고 있는데, 딸이 들어와서 애들을 그런 걸 보여주고 있다고 엄마를 나무랐다는 거다. 화가 나서 한소리 해주고 목욕탕에 와서 푸념이다. ​", "십수 년 전부터 친구들이랑 일주일에 한 번씩 가까운 산에 다닌다. 하루는 산 입구 모이는 장소에서 친구 하나가 오자마자 열불을 내며, 아니 그 기사가 내가 할머닌 줄 어찌 알아본 건지 모자도 쓰고 선글라스도 쓰고 마스크까지 했는데 \"할머니, 그렇게 앞에 서 있으면 위험하니까 뒤 쪽으로 가세요\" 했다고 분개를 하는 것이었다. 그러니 이제 우리는 얼굴이 문제가 아니라 딱 서 있는 자세만 봐도 누구라도 할머니로 봐주는 나이가 됐다는 말이다. ​", "나는 인류에 공헌하겠다거나 다른 인간의 발전을 위하여 노력하겠다는 인간을 신뢰하지 않는다. 뭔가 더 발전해 봐야 지구만 망가진다. 모두 다 저 잘난 맛에 자기의 이익이 되는 방향으로 살아왔고, 부수적으로 인류에게 도움이 되었거나 또 감당할 만큼만 살아왔다고 본다. 흔히들 야망을 가져라, 또 꿈꾸는 자가 성공한다 기타 등등, 요즘 애들 말로는 '갓생을 살겠어'라며 자신의 인생을 화려하게 장식해줄 이력을 만드느라 분주하다. 무라카미 하루키는 '바람의 노래를 들어라'를 쓸 무렵 자신의 주인공들이 반드시 지녀야 할 세 가지 요소로 유머, 친절함, 자기 억제를 들었다. 이 세 가지는 인간 존재의 본질에 속하는 것이 아니라 인공적인 것이라는 거다. 인간이 본질적으로 지니는 모순, 자아, 공포 따위는 쓰지 않아도 이미 존재하기 때문에 구태여 쓸 필요가 없으며, 자신의 주인공들에게 모든 것을 너무 심각하게 생각하지 말 것, 모든 사물과 나 사이에 적당한 거리를 둘 것을 요구한다. 인간으로서 가지는 부정적인 요소는 잠시 접어두고, 유머와 친절함, 자기 억제라는 덕목으로 가볍게 날아올라보는 건 어떨까? 심각한 모든 것들도 다 지나가기 마련이다."]}, {"title": "참사는 골목에 머물지 않는다", "author": "10.29 이태원 참사 작가기록단", "genre": "에세이", "publisher": "창비", "passages": ["이번 책은 부모세대 유가족의 목소리에 집중했다. 희생자가 발생한 사건에서 '부모'는 가장 큰 슬픔의 주체로 여겨진다. 틀린 말은 아니지만, 우리가 유가족협의회의 투쟁을 기록하려는 가장 큰 이유가 그것이어야 할까. 무엇이 더 큰 슬픔인지를 가르는 일은 우리의 관심사도 아니며 가능한 일도 아니다. 물론 소중한 생명이 희생된 자리에서 슬픔의 주체가 누구인지 묻는 일은 중요하다. 그런데 그 일은 그 질문이 왜 필요한가를 함께 고민할 때 의미가 있다. 우리는 왜 이 참사를 둘러싼 고통의 이야기를 듣는가. 그곳에 존엄이 훼손당한 사람이 있어서다. 부당한 일을 겪은 이의 곁에 서는 것은 공동체를 함께 이루는 시민의 의무다. 더구나 사회재난은 사회의 문제로 벌어지는 일이지 않은가. 재난으로 삶이 부서진 이들이 사회를 향해 외치는 목소리에 잘 응답하기 위해서는 재난이 끼친 피해가 무엇인지 이해해야 한다. 그래야 회복을 이해할 실마리가 손에 쥐어진다. 우리는 통념 속의 피해자가 아닌, 현실의 피해자가 지닌 여러 얼굴을 마주해야 한다. ​", "재난의 진실을 밝히는 일과 안전한 사회를 만드는 일은 서로 앞서거니 뒤서거니 하며 이루어진다. 진실을 밝힌다는 것이 무엇인지 이해하는 시각도 재난참사에 대응하는 역사 속에서 확장과 재구성을 거듭했다. 참사가 안전불감증이거나 부정부패로 인해 발생한다고 보았을 때는 직업윤리를 저버렸거나 태만한 공무원, 돈만 아는 사업자를 처벌하는 것으로 해결된다고 여겼다. 그러나 참사가 특정 누군가의 잘못을 넘어 구조적 문제가 누적된 결과로 일어난다는 걸 인식했을 때 그 대응과 해결은 차원이 달라질 수밖에 없다. 재판을 통한 법적 처벌은 그 입증책임을 구성하기 매우 까다롭고, 늘 사고에 직접 관련된 말단만 처벌하는 결과를 낳았다. 세월호 참사를 통해 한국 사회는 처음으로 재난조사위원회를 경험했다. 시민사회는 거듭된 재난 대응을 통해 참사의 구조적 원인을 밝힌다는 것이 무엇인지 구체적으로 배워가고 있다. 법적 처벌을 넘어서 구조적 책임을 어떻게 물을 것인지, 구조적 책임을 법의 테두리 안에서 어떻게 다룰 것인지 등으로 질문이 확장되고 있다. 이러한 변화의 중심에는 권리의 주체로 일어선 피해자들의 분투와 성장이 있었다. ​", "책임이 사라진 세상에서 스스로 책임을 걸머진 사람들이 그린 궤적을 따라 걸어본다면 우리는 뜻밖의 삶을 만나게 된다. 서로의 얼굴조차 모르던 이들이 유가족이 되어 함께 싸우는 일을 지켜보는 건 매번 경이로운 경험이다. 어떻게 그 두터운 시간을 한권의 책에 담을까. 그러니, 이 책에 적힌 까만 글자 사이에 존재할 그 무한한 시간을 당신이 기꺼이 상상해보길 바란다. ​", "유가족들이 주말마다 행진을 했었어요. 행진할 때는 제가 신이 났어요. 저 행진은 다 했어요. 오체투지도 하고 삼보일배도 하고 삭발도 하고. 그런 거 할 때는 몸이 가라앉았다가도 나도 모르게 갑자기 힘이 나는 것 같아. 이렇게 해야지 내가 수빈이에게 일어난 일이 뭔지 알 수 있게 될 것 같은 생각에. 어떤 분들은 오체투지며 삼보일배가 얼마나 힘든데 그걸 했느냐고 놀라는데 우리한테 그런 건 아무것도 아니었어. 겨울에 살이 얼 정도로 추울 때도 아무렇지 않았어요. 그거는 그냥 아무것도 아닌 거야. 더한 것도 할 수 있었어. 우리 딸이, 이태원 그 골목에 있던 애들이 다 힘들게 갔을 거라고 생각하니까 힘든 투쟁일수록 더 많이 힘이 났어요. ​", "유가족끼리 만나 매일 투쟁만 하는 건 아니에요. 부산 유가족끼리는 두달에 한번씩 모여 서로 잘 지내는지 안부나 묻고 얼굴 보고 웃으면서 이야기해요. 별 얘기는 안 해요. 그냥 이웃 만나듯 수다 떨다가 와요. 참사 유가족에게는 이런 관계가 가장 중요한 것 같아요. 우리가 겪은 일은 다른 누구한테 털어놓기에는 너무 무거운 얘기거든요. 웃으면서 얘기해도 결국 눈물이 맺히거든요. 우리끼리는 누가 울어도 울든가 말든가 \"또 우네?\" 이러면서 막 놀리고 말아요. ​", "그 사람이 그랬어요. \"이태원 참사 유가족들도 더 노력을 하셔야 됩니다.\" 그 비슷한 말을 기자들한테도 들었어요. \"세월호 엄마들하고는 다른 것 같아요. 덜 억울한가 봐요.\" 시민들도 세월호 참사랑 비교해서 이야기할 때가 있어요. \"세월호 때처럼 해봐요\" 하고요. 우리와 연대하는 시민들도 답답하니까 그런 말을 하는 거겠죠. 나쁜 의도로 하는 말이 아니라는 건 알아요. 그런데 세월호 참사와는 상황이 다르잖아요. 세월호 참사는 처음부터 온 국민의 관심 속에 있었지만 이태원 참사는 참사 당일부터 정부가 국민들이 참사에 대해 알 수 없게 만들었어요. 변명처럼 들리겠지만 우리는 세월호 참사 때처럼 할 수가 없어요. 우리는 외부에 알려지지 못했어요. 참사가 일어나자마자 정부는 참사가 아니라 사고라면서 책임을 회피하고 희생자들을 '놀러가서 죽었다'는 비난 속에 방치했잖아요. 유가족협의회를 꾸릴 즈음엔 정부의 방치와 방해, 거짓말로 유가족이 할 수 있는 일이 많지 않았어요. 바깥에서 우리를 보는 시민들은 유가족이 아무것도 안 하고 있다고 생각하실 수 있어요. 우리끼리는 이태원 엄마 아빠들이 세월호 엄마 아빠들이 투쟁할 당시보다 나이가 많아서 힘이 부족한 거라고 농담 반 진담 반으로 얘기하기도 해요. 하지만 우리는 할 수 있는 모든 최선을 다 하고 있어요. 우리나라는 참사마저 비교를 해요. 국회의원이라는 사람이 유가족에게 좀더 열심히 투쟁하세요, 아이들을 위해 노력하세요, 이런 뉘앙스로 얘기하는데 미치겠더라고요. 당사자들만 이렇게 괴롭고 막막하고 아픈 거구나라는 생각도 들고요. 시간이 갈수록 우리끼리 더 단단히 뭉쳐야만 한다는 걸 깨달았어요. ​", "이렇게 말하고 싶지 않지만, 참사는 또 일어나겠죠. 그때 반드시 우리가 쓰일 거예요. 지금 우리가 하는 노력이 훗날 누군가에게 길잡이가 될 거라고 믿어요. 우리가 세월호 참사 유가족을 보고 배우는 것처럼요. 물론 그런 참사가 다시 일어나지 않는다면 가장 좋겠지만요. ​", "참사 유가족들이 어떠한 정보도 제공받지 못하고 함께 모이지도 못한 상황에서 행해진 정부 합동분향소 설치와 국가애도기간 선포는 그 명목과는 반대로 유가족은 물론 대형 참사를 마주한 시민들의 추모와 애도의 걸림돌로 작용했다. 더욱 중요한 것은 이러한 절차에 따라 희생자 유가족들이 분리되고 고립됨으로써 이들에게 주어진 사건에 대해 알 권리, 참사의 진실에 접근할 권리를 정부가 애초부터 가로막았다는 점이다. ​", "1년 뒤 아직도 이 나라에서 적당한 이름을 갖지 못하고 있는 '제주 4.3 사건'을 다룬 한강의 소설 '작별하지 않는다'를 읽던 중 나는 \"그렇게 끝없이 연기되고 있는 바로 그 상태가 그 일의 성격이 되어가고 있는 거라고 생각한 적도 있었다\"라는 문장에서 묘한 위로를 받았다. 또한 이런 질문이 떠올랐다. 어떤 상태가 그 일의 성격이 될 수 있다면 과정 그 자체가 진실이 될 수도 있지 않을까? ​", "기억이란 한가지 변하지 않는 사실을 그냥 쭉 가져가는 게 아니에요. 사람들이 계속해서 이야기 나누고 다양한 이해와 해석을 모아내면서 기억이 이어져 가는 거죠. 그 과정이 너무 무거워도 안 될 것 같고, 너무 슬퍼도 안될 것 같아요. 한 개인의 일로만 고립되거나 폐쇄적이어도 안 될 것 같고. ​", "이 싸움이 쉽게 안 끝날 것 같아. 어차피 유가족이 된 건 내 운명이고 인생에서 지워질 수 있는 것도 아니고, 답도 없고 희망도 없는데 그냥 이렇게 살면 어때. 모여서 울고, 싸우고, 비판하면서. 살 만해요. 이 안에서도 너무 좋은 사람들 많이 만나고, 우정도 있고 사랑도 있고 즐거움도 있어요. 그냥 이렇게 살아도 돼요. '빨리 해결하고 유가족 아닌 삶을 살아야지?' 우리 마음에 이만큼이면 됐다 하는 순간은 없을지도 몰라요. 유가족들이 갈라질 수도 있고 유가협을 나갈 수도 있지만 그래도 할 사람은 하는 거지. ​", "결국 \"재난에 직접 연관된 사람들의 수는 시작점으로만 봐야 한다. 재난에 영향을 받는 사람들의 수는 고요한 연못에 조약돌을 떨어뜨렸을 때의 효과에 비유될 수 있다. 연못에 생긴 파장은 중앙에서 동심원 모양으로 퍼져 나간다.\" 따라서 이러한 동심원으로서의 피해와 연관을 이해할 때, 우리는 우리 앞에 당도한 재난을 제대로 이해하고 직접적 피해자만이 아닌 '우리'의 일로 재난 이후의 길을 모색해 나갈 수 있다. ​", "분향소가 만들어진 초기에는 거의 매일 분향소에 모였어요. 우리는 부모니까 아이 이야기를 너무 하고 싶었거든요. 원래 죽은 사람 이야기는 잘 안 하잖아요. 분향소는 아이들을 기억하기 위한 장소이기 때문에 아이들 이야기를 계속할 수 있었어요. 집에 가면 밥이 안 들어가는데 분향소에서 다른 유가족들과 이야기하면서 밥을 먹으면 들어가요. 분향소는 유가족들이 말을 하게 하고 밥을 먹게 한 장소였어요. 추모공간은 죽은 이들을 위한 장소가 아니라 살아 있는 사람들을 위한 곳이에요. ​", "세상의 시선이 닿지 않는 곳을 응시하는 것이 필요하다. 지금까지 바라보던 고정적인 프레임을 넘어 새로운 방향으로, 일부가 아닌 전체 맥락을 살펴야 한다. 어째서 피해자들이 거리로 나설 수밖에 없었는지, 왜 목소리를 내게 되었는지, 무엇이 달라지길 바라는지, 그리고 당신이 겪어내고 있는 오늘이 안녕한지. 재난참사에서의 회복은 피해를 경험한 사람들의 목소리를 경청하는 것에서 시작되어야 한다. 재난을 겪고 있는 당사자의 목소리와 고민이 반영되어야 실효성 있는 대안이 마련될 수 있기 때문이다. 그 목소리를 중심으로 변화를 만들어갈 때 우리는 '안전한 사회'에 조금 더 가까워질 수 있을 것이다. ​", "사랑하는 사람이 사라졌는데 진실을 밝혀주는 곳이 없었다. 위패도 영정도 없는 분향소가 차려지고, 슬퍼할 기한을 정해주는 꽉 막힌 정부의 독선 속에서 목소리를 내고 싶었다. 여기 사람이 있었다고, 그 사람들이 사라져간 흔적이 우리라고 알리기 위해 거리로 나섰다. 슬픔에만 머무르지 않고 진실을 밝혀내는 것, 재난참사가 반복되지 않는 안전한 세상을 만드는 것은 남겨진 사람들의 숙제가 되었다. 언제 다 끝날지 모를 숙제를 묵묵히 수행하고 있는 사람들은 바로 이태원 참사 유가족, 재난참사의 피해자들이다. 상실의 고통에 머무르지 않고 모두의 안전을 위해 길을 내는 사람들, 재난참사 피해자들은 우리 사회를 안전한 방향으로 이끌어 가는 나침반이 되어주고 있다."]}, {"title": "첫 여름, 완주", "author": "김금희", "genre": "소설", "publisher": "무제", "passages": ["지하철에서는 새 소식이 없는 이메일함을 하릴없이 새로고침 했다. 프리랜서들은 하루의 긴 침묵을 깨고 자기를 찾아 줄 누군가를 기다린다. 일거리는 드물게 하루에 여러 건 들어오기도 하지만 메일함도 휴대전화도 침묵을 지키는 날이 많았다. 연락이 없다는 건 이번 달 수입이 생활비를 충당하기에 적당하지 않다는 전조였고 일상에 살얼음이 끼리라는 예보였다. 보령에서 올라와 오랫동안, 대학을 졸업하면, 서른이 되면, 경력이 차면, 듬직한 안전으로 나아가리라 믿었지만 이상하게 삶은 매번 흔들렸다. 마치 우는 사람의 어깨처럼.", "완평에는 어디든 물이 있었다. 물을 보며 전철을 타고 오는 동안 손열매는 고향 보령의 바닷물을 떠올렸다. 바다가 누군가의 세찬 몸짓이라면 강물은 누군가의 여린 손짓 같았다. 바다가 힘껏 껴안는 포옹이라면 강물은 부드러운 악수 같았다. 버스가 달리는 들판에도 천이 가느다란 띠처럼 흐르고 있었다.", "왜 학교를 안 가겠다는 거야? 야, 나 피곤하니까 니들이나 가서 공부 존나게 해, 그냥. 같이 가자, 왜 자꾸 학교를 빠져? 양미 너 혹시 슬프니? 그러자 집 안에서 들리던 귀찮아 죽겠다는 식의 대거리가 뚝 끊겼다. 정말 슬픔이 정답인 건가. 슬퍼서 학교에 안 가면 대한민국에 등교 가능한 애들이 얼마나 있을까? 열매가 듣기에는 뜬금없었지만 한참 뒤 철제 대문이 벌컥 열리는 소리가 들리더니 \"안 슬프니까, 그만해\"하며 양미라는 애가 나왔다. 그 실랑이에 잠이 달아나 버린 열매도 이불을 갰다.", "저기, 갈 곳이 저기하면 여기 있어도 돼 내가 내줄 수 있는 게 지금은 수미 방밖에 없네. 그렇게 수미 엄마가 말할 때 손열매는 아주 익숙한 얼굴, 고수미의 얼굴을 보는 듯했다. 순하게 처진 눈과 상대를 부드럽게 응시하는 눈동자가 둘은 꼭 닮아 있었다. 갑작스러운 말에 열매 마음이 먹먹해지려는 순간, 그런 낭만적 몽상에 곧 찬물이 끼얹어졌다. 월세는 육십만 원으로 하고 수미가 갚아야 하는 돈에서 제해 줘. 세상이 만만치 않다는 걸 모녀가 합세해서 손열매에게 가르쳐 주고 있었다.", "산 다닐 때는요, 일부러라도 인기척을 내야 합니다. 네? 무슨 멧돼지랑 하이파이브 할 일 있어요? 그렇게 조용히 다니다 큰일 난다고요. 지금 해발 육백 미터에서 혼자 뭐 합니까?", "열매 씨, 지금 열매 씨가 설명한 게 '관계'이고 '소속감'이에요. 소속감은 가족만 줄 수 있는 게 아니에요. 어느 한 사람과만 나눠야 하는 것도 아니고요. 열매씨 마음속 상처는 그 맥락에서 풀어야 해요. 감정은 관계의 잔존물이니까요.", "어디서 왔냐고 하면 그쪽은 답할 수 있어요? 본인도 중간 부분만 기억하잖아요. 최초의 시점에 관한 기억은 없고 들은 말뿐이고 그렇게 살다 보면 최종 순간도 남이 기억해 주는 거잖아요. 그러니까 그짝 얘기는 대가리도 꽁지도 없이 생선 가운데 토막이다, 그게 외계인의 삶이다, 이건가? 또 외계인 그리고 나는 삶이라는 말도 별로 안 좋아해요. 너무 덩어리 같고 물질적이고 그냥 그거보다 '유효'쯤이 살아 있는 상태를 설명하는 데 적당하지 않나? 인간, 나무 잎사귀, 물방울, 별 먼지까지 은은히 있다가 사라지는 모양을 다 담을 수 있잖아요.", "니네 이 학교 없어지는 거 싫으냐? 나는 여기가 좋아, 우리 같은 애들이 대부분이고. 나 너무 맞다가 이 시골까지 온 거야. 어떤 새끼들이 그런 짓을 해? 수가 많아지면 애들은 이유 없이 변하더라. 근데 우리 이런 얘기는 하지 말자. 그래, 하지 말자. 그래, 그런 슬픈 얘기는 이제 하지 말자.", "저는 FM음악도시의 신해철입니다.(시그널 음악 아웃) 오늘도 시민들의 생활점검을 하며 전화질을 해 볼 텐데요, 날이 날이니만큼 첫 연결은 어린이이십니다.(웃으며) 지난달부터 천리안을 통해 본인 학교의 외계인 소식을 전해 주고 있는, 정확한 주거지는 신변 보호 상 밝힐 수 없다, 확실하게 거절할 줄 아는 천리안 아이디 할미새 님인데요. 예, 그럼 한번 얘기를 들어 보겠습니다. 여보세요? 네. 안녕하세요. 네. (어색한 침묵) 원래 인사가 가면 인사가 오게 되어있는데 꽤 과묵한 어린이입니다. 긴장하셨나요. 지금? 아뇨. 네, 단답형을 좋아하는 어린이, 멋있습니다. FM음악도시 청취자 연령대가 대략 삼십 대 중반 정도일 거라고 저희는 생각하고 있거든요. 그래서 사연을 보냈을 때 의외였어요. 이렇게 늦은 시간까지 안 자도 부모님이 뭐라고 안 하십니까? 밤에 일하러 나가니까 제가 뭘 하는지 모르죠. 그럼 혼자 있어요? 집에, 지금? 네. 아, 문단속 잘 하고 있지요? 오늘 어린이날인데 할미새 님은 뭐 했어요? 별로. 별로 별로를 했다. (웃으며) 별거 안 하는 것도 하는 거죠. 지난달부터 같은 반 외계인 친구 얘기를 들려주어서 우리 음도 시민들 사이에서 난리가 났어요. 왜 사연을 보내려고 생각했을까요? 마왕이라서. 외계인 대장 같아서. 그렇구나. 지난 사연을 못 들은 분들을 위해 다시 한번 말씀드리자면 이 외계인으로 추정되는 반 친구가 가진 능력이 아주 예사롭지 않습니다. (약간 웃으며) 수위 아저씨보다 더 많은 장작을 패서 (하하하) 학교 창고에 쌓아 놓는다, 소풍 때 보물찾기 쪽지를 혼자 다 찾는다, 운동회 때 박이 안 열려서 낑낑대고 있는데 오재미 하나를 냅다 던져 한 방에 박을 터뜨렸다. (웃는다) 나무랑 대화한다. 이건 좀 동심이 느껴지는데? 수업 시간에 항상 조는데 일등을 한다. 자면서 듣나? 어떻게 그러지? 저번 가을에 산불이 났는데 발화 지점으로 소방관들을 정확히 안내했다. 오, 요건 뭔가 초인적 존재일 가능성이 농후하네요. 국민학생이면 산불 나면 도망가기 바쁠 텐데, 그게 안전을 위해서도 낫고요. 아무튼 그런데 그 친구 정체를 알게 된 계기가 있다고요? 네, 그런데 저 물어보고 싶은 게 있어서 사연 보냈어요. 드디어 질문이 나옵니다. 저는 외계인인 건 괜찮거든요. 그런데요? 정정당당하지 않은 게 문제예요. 제가 아무리 공부해도 일등을 못 해요. (웃으며) 응, 그렇지.", "얼라리요, (단호하게) 안 되야! 그 모냥으로 남을 쥐 새끼마냥 궁지에 몰아넣는 건 사램의 짓이 아니여. 그러믄 그깟 사램 나 안 할라네. 원래 체질에도 안 맞았은께. 그렇게 야짓잖게 굴지 말어. 모처럼 맴에 훈풍이 불던디 우째 그걸 모른 척하는 겨? 아이고매, 곧 여름인데 훈풍이 무신 소용이유. 지금 필요한 건 차갑디차가운 에어컨 바람이지. 이성이라 이 말이여. 여름을 왜 식히넌 겨, 여름이 여름다워야 곡식도 익고 가을, 겨울이 넉넉해지지. 순리를 거스르믄 좋을 거 읎어. 털도 내리쓸어야 빛이 나는 겨. 할부지는 시상 편한 말 마유. 어릴 때 생각허믄 우리 가족덜 꼭 마네킨모냥 웃음도 표정도 읎어. 식구덜 웃기고 싶어서 일부러 까불고 애쓰는 어린 내 헷지랄만 생각나지. 다덜 깔꼬장한 얼굴로 있다 싸워만 대구 그게 다 뭣 때문이었겠어? 돈 아니여?", "마치 정지 화면 버튼을 누른 것처럼 한동안 양미네 집 풍경은 불행하게 멈췄다. 이윽고 율리아와 파드마가 들어와 시디와 가사집과 포스터 들을 줍기 시작했다. 양미는 자전거 옆에 서 있었고 표정은 그림자처럼 텅 비어 있었다. 감당하기 어려운 현실 앞에서 스위치를 꺼 버리는 건 상처받은 아이들이 어려서부터 배우는 방어 기제였다. 하지만 그렇게 쳐내 버린 감정은 반드시 돌아오게 마련이었다. 일렁이는 물결처럼.", "저도 목소리 낼 수 없음병에 걸렸거든요. 곧 오디션이 있는데 너무 기다렸던 작품인데 1차도 어쨌든 통과했는데 오디션장에는 못 갈 것 같아요. 오디션장에 못 가는 게 어딨어? 송장 된 거 아니면 가는 게 오디션장 아니니?", "천지는 인자하지 않아서 만물을 짚으로 만든 개로 여긴다는 노자 말이 있어요. 천재지변을 어떻게 할 거야, 매년 봄가을마다 산불로 여름에는 물난리에 고생 말고 땅들 팔아요. 노자가 뭐 하는 사람인지는 모르겠지만은 나를 개 새끼로 보든 닭 새끼로 보든 땅을 팔 날은 없을 것이여. 애고, 지 할머니가 길하라고 대길이라고 이름 붙여 키웠더니 어디서 다 말아먹고 사라졌다 나타나서 요사스럽게 이 사달을 일으켜? 이놈아, 니 할머니 눈곱만큼이라도 생각하면 마을에 이 헷지랄은 못 헐 것이다. 계란 던지기도 아까운 놈아.", "빚은 그대로이지만 잊고 있을게. 난 날 살려 준 누군가에게는 원망보다는 고마움을 표해야 한다고 생각하니까.", "나는 최근에 진실을 좇는 일은 끝없는 공회전 속으로 들어가는 것이며 그보다는 진리를 찾아야 한다는 충고를 책에서 읽었다. 거짓 없는 사실, 완전한 올바름, 그것은 때로 삶을 수렴하기에 너무 옹색하다. 그보다는 더 수용적이고 오래고 성긴 것이 필요하다. 이를테면 우리가 알아채기도 전에 서로의 어깨 위로 내려앉는 여름의 방문 같은 것."]}, {"title": "청(소)년 정치 참여 길라잡이", "author": "하승우, 김범일", "genre": "사회정치", "publisher": "한티재", "passages": ["귀찮게 왜 정치에 관심을 가져야 하냐고요? 정치에서 결정되는 일들이 우리 삶에 많은 영향을 미치기 때문이죠. 공공교통이나 임대주택, 사회복지처럼 사회의 중요한 지원을 배분하는 방식, 노동시간과 노동조건, 최저임금처럼 일하고 생활하는 조건, 대학입시나 교육과정과 관련된 정책들도 대부분 정치에서 결정되니까요. 물가가 치솟을 때 가난한 사람들도 함께 살아갈 방법을 찾고, 감염병이나 자연재해가 확산될 때 시민의 건강과 안전을 보장하는 것도 정치의 몫이니까요. 정치에 관심을 가지고 참여하는 만큼 나와 우리의 삶이 달라질 수 있어요.", "정치의 가장 기본은 여론을 만드는 겁니다. 여기저기 알려서 소문을 내는 거지요. 가장 객관적이라고 할 수 있는 교육부의 자료이니 잘 활용해야죠. 어떻게 소문을 내면 좋을까요? 사람들은 비교를 해 주면 쉽게 이해합니다. 학교급식 단가가 가장 높은 곳과 우리 지역을 비교해서 공개하면 사람들이 관심을 가지겠죠.", "학교와 관련된 에너지 통계 찾기 지역의 구체적인 통계는 어떻게 알 수 있을까요? 에너지경제연구원이 운영하는 국가에너지통계종합정보시스템(www.kesis.net)이라는 홈페이지가 있어요. 그곳에 가면 지역별 에너지 통계를 확인할 수 있어요. 또 교육과 관련된 국가통계를 제공하는 교육통계서비스(kess.kedi.re.kr)에 들어가면, 매년 발간되는 교육통계연보에서 학교의 에너지 사용량을 확인할 수 있어요.", "데이터는 중요한 정보이지만 맥락이 지워져 있습니다. 그 맥락을 찾아내는 것이 중요합니다.", "법에 따라 학교운영위원회의 구성과 회의 결과는 해당 학교 홈페이지에 공개하도록 되어 있어요(학교알리미 www.schoolinfo.go.kr에서도 확인할 수 있어요). 학부모위원과 지역위원, 교원위원의 이름과 성별, 이메일 등이 공개되어 있으니, 학교에 문제가 있을 경우 연락을 할 수도 있겠지요.", "정보공개청구는 투명한 사회를 만들기 위한 시민의 활동이에요. 그러니 공공기관의 운영이나 사업에 관해 궁금한 점이 생기면 참지 말고 정보공개제도를 활용해 보아요. '정보공개센터'가 발간한 '어렵지 않으려고 애 쓴 정보공개청구 가이드북'을 인터넷에 검색하면 나와요. 그 책자를 참조하면 더 잘 할 수 있어요.", "통계청 [kostat.go.kr](http:kostat.go.kr/) - '이런 것도 조사한다고?'하는 생각이 들 만큰 여러 통계를 만날 수 있어요. 유치원알리미 [e-childschoolinfo.moe.go.kr](http:e-childschoolinfo.moe.go.kr/) - 대표자와 원장, 건물 현황과 운영 규칙, 교육 비용 등 유치원 전반의 주요 정보를 확인할 수 있습니다. 학교알리미 [www.schoolinfo.go.kr](http:www.schoolinfo.go.kr/) - 학사 일정가 학생 현황, 급식 정보, 학교운영위원회 구성 현황, 위반 내용 및 조치 결과 등 전국 초중고등학교 주요 정보를 확인할 수 있습니다. 대학알리미 [www.academyinfo.go.kr/index.do](http:www.academyinfo.go.kr/index.do) - 신입생 경쟁률, 취업률, 학생 1인당 장학금, 연평균 등록금, 학과 현황과 예산, 교원의 연구 실적 등 모든 대학의 주요 정보를 제공합니다. 내고장 알리미 [www.laiis.go.kr](http:www.laiis.go.kr/) - 지방자치단체의 예산과 결산, 행정조직 현황과 주요 업무계획 등을 쉽게 알아볼 수 있는 사이트입니다. 국가법령정보센터 [www.law.go.kr](http:www.law.go.kr/) - 궁금한 내용이 법에 어떻게 적혀 있는지 알고 싶다면 검색해 보세요.", "민원은 해당 기관에 전화로 요청할 수도 있고 홈페이지에 제기할 수도 있고 앱을 설치해서 활용할 수도 있어요. 온라인으로 신청하는 민원은 국민권익위원회가 관리하는 국민신문고(www.epeople.go.kr)라는 사이트로 통합되어 있어요.", "생활정치는 단순히 주거나 교육, 먹거리와 같은 생활상의 이슈를 정치적인 의제로 다루는 것만을 가리키지 않습니다. 왜냐하면 생활정치는 기성 정치가 끊어 놓은 사회적 관계망을 복원하고 '많은 타자 속의 나', '사회적 관계 속의 개인', '사회적 개인' 임을 자각하는 과정이기 때문입니다.", "정책 찾아보기 정부 정책과 관련해 참고할 수 있는 좋은 사이트는 중앙정부와 지자체의 정책 연구 정보를 모아 놓은 '정책연구관리시스템 프리즘'(www.prism.go.kr)과 국무총리 산하 경제, 인문사회연구회와 정부 출연 연구기관들의 연구 성과물을 모아 놓은 국가정책연구포털([www.nkis.re.kr](http:www.nkis.re.kr/)) 이에요. 이 두 사이트에 들어가서 검색하면 정말 많은 정보들을 확인할 수 있어요.", "우리가 직접 싸우는 것도 중요하지만 다른 사람들이 우리 편에 서도록 만드는 것이 더욱더 중요해요. 압력을 가하고 싸우는 목적은 단순히 정치인이나 공무원을 이기는 게 아니라 다른 사람들이 이 사실을 알고 함께 분노하도록 만드는 것이니까요. 강한 여론을 만들어서 그 힘으로 세상을 바꾸는 것이죠. 따라서 싸움이 지나치게 극단적으로 치닫지 않도록 강약 조절을 해야 합니다."]}, {"title": "최소한의 시민", "author": "강남규, 박권일, 신혜림, 이재훈, 장혜영, 정주식", "genre": "사회정치", "publisher": "디플롯", "passages": ["이 책에는 싸우기 위한 말이 아니라 연결하려는 말이 담겨 있다. 적대와 심판이 아닌, 존중과 평등을 회복시키는 말이다. 이 독서가 소비자주의에 갖힌 개인에게 정치적 주체로서의 자신을 맑게 비춰볼 하나의 거울이 되어주리라 확신한다. 이런 '최소한'을 발판 삼아 우리가 토론할 수 있다면 '다른 세상, 더 나은 세상, 몫 없는 자들의 몫을 찾는 세상'이 한 뼘 더 가까워질 것이다. 폐허가 된 공론장에서 제대로 된 언어를 찾아 헤매온 모든 동료 시민에게 권한다. ​", "이 책을 어떤 사람들이 읽게 될까. 나 같은 사람이 읽었으면 좋겠다. '자기 결정'을 쓴 페터 비에리의 표현을 빌리자면, 갖가지 사회문제를 마주하면서 내 안에 소용돌이가 맴돌고 있음을 느끼는 사람, 삶의 내적 연출권을 놓치고 싶지 않은 사람이다. 나는 매주 토론을 관찰하며 머릿속 생각들을 펼치고 뭉쳐보고 있다. 그 과정에서 내 생각은 강화되기도 하고, 충돌하기도 하며, 수정되기도 하고, 때때로 반기를 든 덕분에 발명되기도 하다. 이전까지 토론은 내게 그저 '무서운 것'이엇는데, 멤버들의 이야기를 듣다보면 나도 모르게 '최소한 이 의견만큼은 꼭 말하고 싶다'는 생각에 입이 씰룩거렸다. 그런 변화를 보며 멤버들도 즐거워했다. 최소한의 시민이 탄생하는 순간이다. 아무리 기술이 진보하고 있다 하여도, AI가 절대 대신해줄 수 없는 한 가지가 바로 다른 의견을 발명하고 밝히는 일이다. 복잡한 시대에도 흔들리지 않을 '나의 의견'을 획득하고 싶다면 이 책이 도움을 줄 수 있을 것이다. ​", "문동은을 위한 세상은 그가 힘내지 않아도 되는 세상이다. 피해자 대신 공동체가 힘을 내는 세상이다. 하지만 그가 사는 공동체는 무기력하다. 이런 조건에서 복수에 성공할 수 있었던 문동은의 무기는 무엇이었을까? 교원 자격증, 괜찮은 외모, 바둑 실력? 아니다. 역설적이지만 인생을 건 복수에서 그가 정말로 기대고 있던 힘은 공공의 도덕이다. 그래도 세상 사람들이 선을 추구하고 악을 미워할 것이라는 믿음. 모든 진실이 드러났을 때 대중의 분노가 가해자들을 파멸시킬 것이라는 기대. 교사에게 외면받고 부모에게마저 버림받았지만, 끝까지 세상 사람들이 자신의 편이 될 것이라고 믿었다. 삶의 밑바닥에서도 놓지 않았던, 선한 사람들이 더 많다는 순진한 믿음. 이 믿음은 가해자들도 공유한다. '그날의 일'이 널리 알려질수록 문동은의 편은 늘어나며 가해자는 궁지에 몰린다. 이것이 그의 복수가 성립되는 조건이다. 우리가 매일 인터넷 세계에서 마주하는 폭로자들의 기대이기도 하다. 이상하다. 많은 사람이 그토록 선을 추구하고 악을 미워한다면 문동은의 인생은 왜 그 모양이었단 말인가? 왜 다수의 선한 사람은 더 나은 세상을 만들지 못하는가? 이것이 복수를 응원하기 전에 먼저 마주해야 할 질문이 아닐까. ​", "모두가 다른 사람의 입과 귀를 막고 옳은 나로만 존재하려는 세상. 이곳에서 사회가 추구해야 할 옳은 가치를 찾기 위해 성찰하고, 반성하고, 흔들리면서도 그 가치를 꿋꿋하게 세워나가려는 사람들이 설 자리는 없다. 배움이 없는 자리에는 가르침도 없다. 고정된 입장에만 우뚝 깃발을 꽂은 채 서로 자기만 옳다고 뇌까렸던 결과가 바로, 자신의 생각과 대척점에 있는 이들을 무조건 적대하면서 극단으로 달려가는 이분법적 정치만 추종하는 지금의 한국 사회가 아닐까. 우리가 고민해야 할 지점은 꼰대, 역꼰대라는 두 단어에 함축된 이런 현실이다. ​", "요즘 시대에 공평하다고 여겨지는 건 시간이 유일한 것 같아요. 시간이 곧 돈인 거고 그래서 시간을 가장 효율적으로 써야 되고, 효율에 계속 집착하게 되고 그러는 거 같아요. 저는 소비자가 아니라 생산자 입장에서 생각을 하는데, 모두가 콘텐츠 생산자가 될 수 있는 시대에는 인생을 콘텐츠화하는 일이 일어나기도 해요. 내 인생을 조회수와 지속 시간으로 치환하고 자꾸만 내가 소중하게 쓸 시간을 콘텐츠화해서 팔아요. ​", "미디어 환경은 여러 치명적인 문제가 있지만 순기능을 영리하게 이용한다면 성숙한 시민들이 모이는 새로운 장을 만들 수 있을 것이라고 낙관했다. 널리 퍼지지 않는 콘텐츠를 보면 '더 잘 만들면 되지'라는 오만한 생각도 했다. 그러나 지금 나의 피드는 무엇으로 이루어져 있나. 죄다 어쩌다 클릭한 것들의 연장선이다. 비교적 최근에 화제가 된 이슈 아니면 썸네일이 자극적이어서 클릭하지 않을 수 없는 이야기. 혹은 흔한 말로 '꿀팁'이라 불리며 일상생활에 실제저인 도움을 주는 것들. 그것도 아니면 홍보비를 써서 인위적으로 확산한 콘텐츠. 자연스러운 콘텐츠 도달은 지금의 미디어 환경에서 불가능한 수준에 다다랐다. 정성을 들여 질 좋은 결과물을 만들어도 기존 구독자의 알고리즘에서 사라지는 주기는 날이 갈수록 빨라지고, 새로운 구독자 눈에 들기는 더더욱 어렵다. ​", "애초에 콘텐츠 풀부터 편협해질 수밖에 없는 구조다. 개인의 검색, 시청 기록을 토대로 수익을 창출하는 감시자본주의 세계에서는 수익이 되는 쪽, 즉 광고를 붙일 수 있는 주제만 살아남을 수 있다. 콘텐츠 생산자는 결국 '알아서' 돈이 되는 주제로 콘텐츠를 구성하는 자발적 검열을 거친다. 당연하게도 소비자에게는 오로지 돈과 연결될 수 있는 콘텐츠만 보이게 되는 것이다. 나의 피드는 맞춤형이기는커녕 처음부터 조작된 취향인 셈이다. ​", "우리는 최대한 적은 시간 안에 더 많은 일을 해내려는 욕망, 가장 똑똑한 선택을 하고 싶은 욕망, 도파민을 터뜨리고 싶은 욕망에 완전히 사로잡혀 있다. 악랄한 독재자가 없어도 자발적으로 시성비의 노예가 된다. 이것이 속도의 독재가 지닌 가장 무서운 점이다. ​", "모든 것이 불평등한 듯한 사회에서 형식적으로나마 유일하게 공평한 시간을 우리는 어떻게든 잘 활용하고 싶어서 안달이 나 있다. 바로 이 지점에서부터 속도의 독재가 시작된다. ​", "시간을 뺏는 말하기가 아니라 시간을 되찾는 말하기가 필요하다. 그 말을 전하는 일이 내가 정의한 가속 사회에서의 진짜 저널리즘이다. 모든 것이 빨라지는 시대에 오직 재분배의 속도만 느려지고 있는 게 맞느냐고, 끝자락에 가서 보니까 모든 이가 자율성을 박탈당하는 사회가 옳으냐고, 최대한 적은 시간 안에 많은 일을 해내야만 살아남고 그렇지 않으면 도태되는 사회를 놔둘 것이냐고 물어야 한다. 시대의 속도를 맞출 수 없는 이들을 배제하지 말자고, 이동권조차 보장되지 않는 장애인과 집에서 누군가를 돌봐야만 하는 노동자의 시간에 사회가 시계를 맞춰야 한다고 말해야 한다. '용돈 없는 청소년'이 같은 시간을 살아가는 또래보다 뒤처질 수밖에 없었던 이유, 대형 병원 간호사들이 힘든 근본적 이유, 기후위기가 심각하다고 말하지만 탄소 배출이 줄어들지 않는 이유는 같다. 사회가 가속되고 있기 때문이다. 곳곳에서 분투 중인 저널리스트들의 결과물이 알고리즘의 수혜에서 점차 멀어지는 이유는 빨라져야만 살아남는 세상에서 감속을 말하고 있기 때문이라는 생각이 든다. 느리게 가자고 요청하는 목소리는 돈이 안 된다. 광고 따위는 없다. 그래도, 오늘도, 어떤 이는 시간을 되찾는 말을 부르짖다가 퇴근할 것이다. 소외에서 벗어나기 위해서는 현실을 인지하는 것부터 시작하라고들 말한다. 묻고 싶다. 여러 억압에서 비교적 자유로워졌다고 자평하는 우리는 왜 여전히 무언가에 옭아매인 채로 사냐고. 우리들의 알고리즘은 정말로 진짜냐고. ​", "황우석 사태는 단순히 타락한 과학자의 예외적 일탈로 환원될 수 없다. 국뽕 앞에서 진보와 보수도, 좌파도 우파도 없었다. 지식인도 대중도 별 차이가 없었다. 우리나라의 힘이 더 강해지고, 그 힘이 닿는 곳은 더 많아지고 더 커져야 한다는 무분별한 욕망 앞에서 비판적 이성과 윤리적 성찰을 요구하던 목소리는 납작하게 짜부라졌다. 이 사건은 국뽕이 얼마나 거대한 해악이 될 수 있는지를 보여줬다. ​", "이야기를 만드는 사람에게 늘 어려운 것은 메시지가 이야기를 넘어서지 않도록 절제하는 일이다. 이야기는 메시지를 담기 마련이지만 아무리 좋은 메시지도 이야기 그 자체보다 목소리가 커지는 순간 역효과가 난다. '우영우'는 장애라는 소재를 중심에 다루고 여러 사회적 메시지를 품으면서도 끝까지 대중이 공감할 수 있는 하나의 이야기를 창조해내는 데 성공한 멋진 작품이다. '우영우'를 둘러싼 공론장은 기본적으로 좋은 이야기에서 비롯된, 사람들의 폭넓은 관심 위에 성립한다. 그렇기에 작품에 대한 비평에 앞서 좋은 이야기를 만들어내기 위해 노고를 아끼지 않았을 감독과 작가, 배우, 모든 스태프 들에게 진심으로 고마움과 축하를 전하고 싶다. ​", "장애 당사자의 가족들이 '우영우'에 대해 종종 표출하는 분노는 작품 자체라기보다 이야기에만 관심을 쏟고 장애인과 그 가족의 현실에는 무관심한 사회에 대한 분노다. '우영우'라는 판타지는 이를 판타지로 소비할 수 있는 누군가에게는 장애라는 세계로 들어오는 문이지만, 그 세계를 살아가고 있는 많은 이에게는 한없이 높은 문턱이다. 이러한 역설을 알고 있는 작가는 작품 곳곳에서 다른 인물들의 대사를 통해 모든 장애인이 우영우 변호사 같을 수는 없다며, 어떻게든 문과 문턱 사이의 괴리를 좁혀보기 위해 노력한다. 하지만 그런 장치들은 일종의 각주일 뿐 우영우라는 판타지 자체를 상대화하기에는 역부족이다. 한 온라인 커뮤니티에서 \"우영우는 지하철을 교통수단으로 이용하지만 전장연은 사익 수단으로 이용한다\"며 우영우를 기준으로 전장연을 역공하는 만평이 올라왔다. 예쁘고 똑똑하고 착한 자폐인 변호사 우영우 이야기에 대한 열광은 동정과 시혜를 넘어 동등한 권리를 쟁취하기 위해 세상과 싸우는 장애인들의 현실적인 투쟁에 대한 이해로 이어지지 않았다. 오히려 누군가에게 우영우는 전장연의 투쟁 방식을 부정하기 위한 도구로서 사회적으로 받아들여질 수 있는 장애인의 새로운 상징으로 활용되기까지 하고 있다. 참 기가 막힐 노릇이다. ​", "'우영우'라는 문을 통해 장애라는 세계를 발견한 많은 사람이 드라마에 나오는 동그라미와 '봄날의 햇살' 최수연이 그랬던 것처럼 지금 이곳에서 부당한 차별에 맞서 싸우고 있는 낯선 장애인들의 삶을 정면으로 마주하며 자신의 방식으로 함께 연대하는 모습을 꿈꿔본다. 그렇게 된다면 우리는 날아다니는 고래를 볼 수는 없겠지만 그만큼, 아니 그보다 훨씬 멋지고 눈부신 공존의 이야기를 우리 손으로 만들어낼 수 있을 것이다. ​", "신상 공개는 가해자 서사의 완성이다. 사람들은 언제나 흥미로운 이야깃거리를 원하고 범죄자의 신상 공개는 정확하게 그것을 제공한다. 대중의 관음증을 만족시키는 데 있어 신상 공개는 확실히 성공적이다. 하지만 그 이상의 공익을 찾아내기란 쉽지 않다. ​", "'어떻게 그런 일이 일어났는가'에 관한 관심은 '조주빈은 누구인가'에 관한 호기심으로 대체되었다. 신상 공개는 범죄의 온상을 제거하는 데는 무능하고, 특별한 개인을 만들어내는 데는 탁월하다. 가해자의 특성이 돌출될수록 피해자의 고통은 은폐되고, 공동의 의무로서 사회적 성찰은 증발한다. ​", "누군가를 적대하면서 그의 말을 온전히 이해하기란 불가능하죠. 문해력 논란의 이면에는 단절된 개인들의 배타성이 있는 것 같아요. 마음의 문제를 문자의 문제로 해석하는 것이야말로 문해력 부족의 문제 아닌가요. ​", "정확히 알지 못하는 단어를 마주했을 때, 그 뜻을 찾아보기보다 자신의 상식과 감정에 근거해 지레짐작하는 것. 이런 양상은 오늘 날 한국 사회에 만연한 진영논리 정치관과도 닮아 있다. 같은 사건을 각 진영의 이해관계에 따라 전혀 다른 방식으로 해석하고 수용하는 것이 정치 세계의 진영논리라면, 문해력 논란의 격발 장치들은 개인화된 진영논리라고 볼 수 있다. 또 다른 단면은 불신사회다. '심심한 사과 논란'을 자세히 들여다보자. 이는 사회적 신뢰가 있었다면 커지지 않았을 논란이다. 상대의 의도를 선의로 해석하거나 있는 그대로 받아들이지 않고, 상상할 수 있는 최대의 악의로 해석한다. 어떤 정치인이 다른 정치인에게 공개적으로 말하는데 운이 없기를 빌면서 저주할 수도 있다고 여기는 것은 분명 사회적 신뢰가 부족한 탓이다. 조금 과장하면, '사흘 논란'도 언론사가 적확한 표현을 썼을 것이라는 믿음이 없다는 점에서 보면 불신사회의 한 단면이다. ​", "오늘날 국가범죄나 사회적 참사에 대한 공론이 공론에 그치는 경우가 많은 데는 납작한 이분법 외에도 또 하나의 이유가 있다. 윤리의 도구화는 윤리가 규범적 목표로 기능하지 못하고 정치적 수단으로서만 호출되는 현상을 가리킨다. 서두에서 언급한 한국군의 베트남 민간인 학살 사건 판결을 예로 들면, 많은 언론과 시민이 이번 판결을 논하면서 베트남의 피해자에게 배상해야 일본에 할 말이 생긴다고 지적한다. 일본군 성노예, 강제징용 등의 국가범죄에 대한 배상 책임을 계속 부정해온 일본에 대해 우위를 확보할 수 있다는 주장이다. 충분히 나올 수 있는 이야기지만, 문제는 극소수를 제외하면 언론이 피해자나 유가족의 육성을 부각하는 경우가 거의 없다는 점이다. 그저 판결이 가져올 효과만 이야기하고 있을 뿐이다. 하지만 이번 판결에 대한 공론에서 가장 필요한 것은 실제로 발생한 비참과 고통에 대한 윤리적 태도가 아닐까? 국가 대 국가로서, 한국 또는 추상화된 한국 민족이라는 입장에서 일본에 책임을 묻기 위해서가 아니라 베트남 피해자의 고통에 공감하기 위해서 움직여야 하는 게 아닐까? 베트남 민간인 학살 사건의 피해자에 대한 배상이 확정되면, 결과적으로 보다 떳떳하게 일본 정부에 윤리적으로든 법적으로든 책임을 물을 수 있을 것이다. 하지만 그것은 부수적 효과여야지 행위의 목표라면 곤란하다. 그것이 우선된다면 윤리는 그 자체로 옳은 것이 아니라 어떤 이익을 위한 도구가 되고 만다. ​", "어느 순간 나는 그들에게 \"동성애자만을 위한 법이 아니다\"라고 말하는 대신 \"동성애법이면 어때서요\"라고 말해야 한다는 것을 깨달았다. 규범으로서 포괄적 차별금지는 '장애인을 차별하면 안 되지만, 동성애자는 차별해도 된다'는 바로 그 발상을 방치하는 곳에서 모든 차별이 자라난다는 통찰에서 비롯되었다. 어떤 약자는 차별하면 안 되지만 다른 어떤 약자는 차별해도 된다는 생각 때문에 차별이 존속된다. 우리나라에는 남녀고용평등법이나 장애인차별금지법이 있지만, 여성들은 여전히 직장 내 성폭력가 성차별에 고통받고 장애인들은 일상에서 차별을 겪는다. 밴드 U2가 내한했을 당시, 퍼포먼스에서 선보인 \"모두가 평등할 때까지 누구도 평등하지 않다\"는 말에는 우리나라의 현실이 고스란히 녹아들어 있다. 성소수자가 부당한 차별에 놓여있는 한, 장애인도 여성도 노동자도 어느 누구도 차별로부터 자유롭지 않다. 차별금지법 입법 투쟁은 이 사실을 분명히 일깨워주었다. ​", "세대론은 등장의 기록이 아니라 낙후의 기록이다. 어느날 세상에 '00세대'가 등장했다면 주목해야 할 것은 '00세대'가 아니라, 그걸 보고 놀라워하는 세대의 낙후성이다. ​", "소비자 정체성은 피해자 정체성과 짝패를 이루어 소비자-피해자가 정체성이 된다. 그것은 살벌한 각자도생의 세계에서 개인을 보호하는 최선의 보호막으로 기능할 수 있다. 비용을 지불했다는 사실은 나의 권리를 보장하고(소비자), 피해를 입었다는 사실은 나의 도덕을 보증한다(피해자). 여기서 내 억울함을 보증해줄 가장 유력한 힘은 여론인데, 이들을 내 편으로 만들기 위해서는 어디까지나 순수한 피해자일 필요가 있다. 특히 성폭력과 젠더, 인권 등의 이슈에서 이러한 경향이 두드러진다. 절대다수가 여성인 성폭력 피해자들은 폭로 이후에 평소 행실과 처신이 입방아에 올랐다. 정숙하고 조신하며 순종적인 여성이어야 완벽한 성폭력 피해자가 될 수 있었다. 순수성 강박은 세월호 유가족들의 집회에서, 성주 주민들의 사드 반대 집회에서, 박근혜 전 대통령 탄핵 촛불집회에서, 이화여자대학교의 미래라이프대학 철회 시위에서, 스타벅스 트럭 시위에서 공통적으로 나타난 현상이다. 약자들끼리의 연대는 피해자의 '불순함'을 증명하는 '외부 세력'의 개입으로 규정되고, 순수성 강박은 모든 투쟁의 내부 검열 기제가 되었다."]}, {"title": "친구의 표정", "author": "안담", "genre": "에세이", "publisher": "위즈덤 하우스", "passages": ["우스운 것은 무대에서, 슬픈 것은 글에서 다룬다. 그러나 우스운 것은 대게 슬프다고 생각한다. 정상성의 틈새, 제도의 사각지대로 숨어드는 섹슈얼리티 이야기에 이끌린다. 존재보다는 존재 아닌 것들의, 주체보다는 비체의, 말보다는 소리를 내는 것들의 연대를 독학하는 데 시간을 쓴다. 주력 상품은 우정과 관점. ​", "이 책의 발원지는 친구들이다. 그리고 이 책은 넘어지기를 반복하는 사람의 이야기다. 잘 넘어지는 사람이 친구들에게 기대어 쓴 글을 모았다. 그 일이 가능하도록 이름과 말과 사유를 빌려준 친구들에게 감사하다. 걔한테 밥 한번 해주고 싶은데, 그런 생각을 하다 보면 한 달도 가고 한 해도 간다. 인복이 있다는 말을 자주 듣는다. 우정은 희소한 자원이다. 복이나 운으로 갈무리하기엔 흥미롭고 문제적인 관계다. 귀한 자원을 배부르게 독식하는 것이 이 우정의 결말이라면 친구들에게 실례라는 생각이 든다. 그만큼 우정을 새로 만들고 나누는 일에도 힘쓰겠다. ​", "이렇게 묶을 수 있기를 열렬히 바랐음에도 이따금 걱정이 앞섰다. 뭔가를 시도했는데 잘 안 됐다는 이야기로 일축할 수도 있지 않을까. 신념과 욕망과 실천 사이의 틈이 없는 민첩하고 건강한 사람들에게는 정성스러운 우는소리로 들리는 게 아닐까. 그런 독해가 슬프게도 꽤 정확하다는 생각이 드는 날에는 한 자도 더 쓰기가 어려웠다. 자주 의기소침해지는 작가의 등을 두드려 다시 쓰게 한 사람은 곽선희 편집자다. 그는 누가 어디서 나에 관해 좋은 말을 하면 내게 보여주러 온다. 나도 나에게 잘 안 해주는 번거로운 짓을. ​", "나는 우리가 자신에게 더 너그러워야 한다는 입장에 선뜻 동의하기가 어렵고, 종 단위에서 인간이 인간의 사정만을 지나치게 이해했기 때문에 생겨난 문제들 앞에 심각한 두려움을 느낀다. 어떻게 하면 우리가 우리에게 덜 너그러울 수 있을지를 고민하며 썼다. 죄책감과 수치심의 그늘에서 나와서, 억울함도 박탈감도 없이, 다만 그렇게 해야 하므로 그렇게 할 수 있기를 바라면서. ​", "고기 맛이 실제로는 별거 없다고 해도, 추억의 강력함 앞에서만은 약간 전의를 상실하게 된다. 착취를 바탕으로 노련해진 일을 처음부터 다시 배우고, 폭력을 매개로 능숙해진 관계를 새로 쓰려면, 우리는 비건 음식에 대체 얼마나 진하고 맛 좋은 추억을 묻혀야 한단 말인가? \"유년기와 맞짱 뜨려면 굉장해야 할 듯.\" 이것은 같은 질문에 대한 유리의 명대답이다. ​", "살림만큼 혼자서는 긍지를 가지기 어려운 일도 드물다. 이것 봐, 깨끗하지? 저것 봐, 감쪽같지? 어때, 맛있지? 그런 말을 누구에게 해보는 재미라도 없으면 살림은 참 지루한 일이다. 발표도 하고 남들의 인정도 받을 수 있는 창작의 과정, 그 재미난 일을 하는 동안에 집에는 쓰레기와 설거지 거리가 쌓인다. 말과 글에 질서를 부여하는 동안 집은 무질서가 장악한다. 살림은 그 무질서를 질서로 되돌리는 일이다. 엔트로피를 증가시키는 일이 아니라 엔트로피를 감소시키는 일. 흔적을 없애는 일이므로 보람도 누리기 어려운 일. ​", "나는 오히려 아무도 상처 입지 않는 공동체가 가능하다는 기대가 미숙한 타인을 향한 폄하와 멸시로, 지금 여기에 주어진 공동체를 변화시킬 책임을 포기하는 결과로 이어지는 현상을 경계하는 것이다. 아무리 좋은 규칙 위에 수립된 공간이라 할지라도, 타인과의 부대낌을 견디는 비위와 면역력이 필요하지 않은 곳은 없다. 우주적 관점에서 우리는 서로를 이해하지 않으면 제명에 살 수 없는 동그란 방에 갇혀 있다. 그러니 글방은 창작자에게 '안전한' 공간이 아니다. 글방은 '위험한' 공간이다. 적을 만날 위험, 오래된 병이 돌아올 위험, 수치스러울 위험, 실패할 위험, 자기혐오와 자기 연민에 사로잡힐 위험, 질투로 고생할 위험, 글 너머의 사람을 연모할 위험, 내 것을 빼앗길 위험, 우습게 여겨질 위험, 아무에게도 이해받지 못할 거라는 두려움에 갇힐 위험, 누군가는 나를 이해할 거라는 희망에 시달릴 위험. 글방은 그 모든 위험을 차단할 수 없거나 차단하지 않으며, 다만 그 위험들로부터도, 그 결과로부터도 도망치지 않는다. 우리가 서로를 못 견뎌한다는 사실, 우리가 서로를 상처 입혔다는 사실을 떠나 깨끗한 곳에서 새로 시작하지 않는다. 우리는 오래되고 얼룩진 바로 거기에 머문다. ​", "처음 눈뜨기 연습의 신청서를 만들면서 나는 이런 문구를 썼다. 못 와도 괜찮다, 늦어도 괜찮다, 다 '괜찮다'고 말할 때부터 낯이 간지러웠는데, '의지'라는 말을 이어 적던 순간에는 망연자실해졌다. '괜찮다'와 '의지'가 치가 떨리게 진부한 위로 및 응원의 카피들에 자주 등장한다는 점이야 슬몃 잊어본다고 하더라도(\"못해도 괜찮습니다\", \"하겠다는 의지가 중요합니다!\"), 아침을 혼자 보낼 의지가 박약하야 바로 이런 모임을 기획하고 있는 사람이 할 말로는 너무 기만적인 게 아닌가. 잠시 고민하다가, '의지' 뒤에 '의리'를 더해 적고 나서야 마음이 한결 가벼워졌다. 의지가 우리 각자의 내면에서 운 좋게 피어난다면, 의리는 우리가 서로의 얼굴을 외면하지 못할 때 생겨난다. 난 의리가 좋다. 6년 전 관악구의 한 양꼬치 집에서 진한 벗들과 함께 지삼선과 온면과 컵술을 마시던 어느 날, 한 친구가 이렇게 말했던 게 기억난다. 난 윤리보다는 의리야. 의리는 그 순간부터 내가 가장 좋아하는 단어 목록의 상단에 들어가게 되었다. ​", "새 아침에 누군가 다시 눈을 뜬다는 것 자체를 진정한 기적으로 여겨야 할 정도로 많은 사람이 매일 같이 죽는다. 그 죽음들 사이에서 눈이 번쩍번쩍 떠지고 힘이 솟는다면 그것 또한 의심스러운 일이다. 여성, 장애인, 퀴어, 청소년, 어린이, 노인, 빈민, 홈리스, 아픈 사람, 동물에 대한 불평등과 차별이 파다한 나라에서 우리가 출근도 잘하고 승진도 잘하고 결혼도 잘하고 생애주기에 따른 단계를 착실히 밟아나갈 수 있다면 그것은 무슨 의미인가? 누군가는 철저하고 집요하게 따돌려지고 있다는 의미다. 실제로 우리는 이동하고 싶을 뿐인 장애인들이 탑승한 열차에서 비장애인들을 다 빼낸 뒤 그 열차를 차고지로 밀어 넣어버리는 따돌림이 서울시 차원에서 자행되는 것을 똑똑히 보았다. 정부란 누가 국민인가에 대한 가장 넓은 정의를 가지고 있어야 하는 기구임을 잊어버린 사람들이 이 나라를 통치하고 있다. 내가 궁금한 것은 그 열차에서 내린 사람들의 마음이다. 내리지 않을 수 있었을까? 내리지 않을 수는 없었을까? 아무도 내리지 않았다면 어떤 일이 발생했을까? 한 명도 남김없이 차고지로 가버린다면, 열차는 이번에는 어디로 움직였을까? 장애인들이 그 열차에서 내리지 않겠다고 버틴 것이 아니라, 비장애인들이 그 열차에서 달려나간 것은 아닌가? 달리지 말아야 하는 순간에 달리지 않겠다고 결정하기 위해서, 우리에게는 무엇이 필요한가? ​", "우리는 대부분 어떤 일을 혼자 하는 것과 같이 하는 것이 이분법적으로 나뉘는 개념이라고 여긴다. 고독과 피로 사이의 양자택일만이 가능하다고. 그러나 나는 눈뜨기 연습을 하면서 혼자와 같이가 다만 스펙트럼의 양 끝이라고 생각하게 되었다. 그렇다면 질문을 이렇게 바꾸어볼 수 있다. 우리는 어느 정도로 혼자 있거나 어느 정도로 같이 있고 싶은가? 그 적절한 점도와 정도를 찾아낼 수 있다면, 어쩌면 우리는 어두운 고독과 불타는 피로 사이에서 반음지 정도의 그늘을 찾아 쉴 수도 있을 것이다. ​", "스스로 긍지를 가지는 일은 당신을 위한 일이 아니라 타인을 위한 일입니다, 남들이 당신을 어르고 달래는 수고를 들이도록 만들지 마세요, 라고 속삭이는 소리가 있는가 하면, 긍지란 스스로 가지려고 한다고 가질 수 있는 게 아니며, 우리는 언제나 타인에게 의존하고 민폐를 끼치면서만 살아갈 수 있고 당신도 예외가 아닙니다, 라고 속삭이는 소리가 있다. 둘 다 아주 다그치는 투라는 게 웃기다. 그 점에서 내 머릿속의 목소리들은 오만을 떠는 것 말고는 나와 이야기하는 법을 잘 모른다. 당신과 이야기하지 않으면 나 혼자서는 영영 알아낼 수 없을 것이다. 당신을 돌보는 것이 안주인의 운명인지, 당신으로부터 기꺼이 돌봄 받는 것이 안주인의 운명인지를 말이다. 그게 내가 당신에게 말을 걸고 싶은 이유다. 밤새 긴 이야기를 나누자. 다시 눈을 뜰 시간이 돌아올 때까지. 먹는 사람이 차리는 사람을, 손님이 주인을, 받는 사람이 주는 사람을, 죽으려는 사람이 살리려는 사람을 살리는 이상한 이야기를. ​", "신념과 윤리에도 계급이 있다. 더 도덕적인, 덜 착취적인 삶을 구축할 수 있는 물적 자본, 인적 자본, 지적 자본을 소유한 사람이 있고, 그렇지 못한 사람이 있다. '그럼에도 불구하고'를 품고 사는 사람들, 그러니까 그런 자본 없이도 자신의 신념과 삶을 일치시키기 위해 노력했던 사람들은 그래서 대단하지만, 그런 인내와 끈기 또한 지상에서 가장 무작위로 배분되는 자원인 재능의 영역일 수 있다. ​", "비건이 된다는 선언은 이제껏 나와 능숙한 사랑을 주고받은 사람들에게는 비보이기도 하다. 그것은 기존의 사랑을 확장하는 일이 아니라 분해하고 해체하겠다는 결심이기도 하기 때문이다. 비거니즘은 개별 개체에 적용했던 사랑의 방법론을 더 많은 개체에 확대 적용하기만 하면 해결되는 간단한 문제가 아니다. 우리는 한 존재와 다른 존재의 관계를 아예 처음부터 다시 배워야 할지도 모른다. 우리는 누구에게 빼앗은 무엇을 바탕으로 이토록 풍요롭게 사랑할 수 있었나? 어쩌면 너에게 주기 위해 남에게서 빼앗았다는 사실 자체가 그토록 달았던 것은 아닐까? 차별과 폭력이 사랑의 근본이라면, 이런 사랑의 습속을 퍼뜨리지는 말아야 하는 게 아닐까? 사랑은 인간종과 함께 쇠락하도록 두는 편이 낫지 않을까? 능란한 사랑을 심판대에 올리고 심문해야 할지도 모르는 일이다. 그간 사랑에 뛰어났다는 사실이 자랑은 아니게 되는 시점까지. ​", "툭하면 나와 개를 둘러싼 세상과 사람들을 흉보다가도 누군가 나를 보고 동물과 같이 살까 생각하게 됐다고 하면 선생님에게 배운 대로 얼른 그러라고 해버리곤 한다. 아무것도 모르면서. 아무것도 책임질 수 없으면서. 하지만 그런 질문을 해오는 친구들 모두가 이 일을 훌륭히 해낼 것만 같다. 그들의 표정에 묻어 있는 절박함, 그리고 아직 만나본 적도 없는 동물을 향해 이미 생겨난 그리움이 그 증거라고 말하고 싶다. 혹은 내가 나도 모르게 아주 고약한 성미를 부리는 걸지도 모른다. 나하고 같은 고생을 하는 사람들이 세상에 많아지도록 다들 부추겨서 나를 이해하게 해버려? 내가 덜 외롭도록? 전혀 모르겠다. 나는 그저 그들이 어떤 전력을 다한 만류에도 불구하고 일을 저질러버리고 난 다음에, 그냥 동물과 함께 살게 되어버린 다음에, 이젠 돌이킬 수도 없어진 다음에, 그들을 응원했던 사람이 한 명쯤은 있었다고 기억하길 바란다. ​", "다시 친구는 내게 묻는다. 나 입양 생각 중인데 넌 어떤 것 같애? 어떠냐면 있잖아. '다 하게 돼'와 '아니, 절대로 다시는'의 사이를 영원처럼 진동하는 찰나. 나는 둘을 동시에 말하려는 중이다. 선형적 시간의 세계에 사는 인간의 발성기관으로는 불가능한 일. 누군가에게는 내가 지금 말을 더듬는 것처럼 보일지도 모른다. 친구의 표정이 초조해진다. 너에게 그냥 이 진동이 들린다면 좋을 텐데. 너에게 이 이야기를 다 들려줄 수 있다면 좋을 텐데. ​", "새 나라에서 나는 이런 사람이 되고 싶었다. 매일 하는 일이 있는 사람. 밥 먹듯이 하루도 빼놓지 않고, 기분과 날씨에 상관없이 지켜내는 약속이 있는 사람. ​", "무늬가 오기 일주일 전부터는 거의 조금도 잠을 자지 못하면서 지냈다. 설레어서, 그리고 무서워서. 무엇이 무서웠지? 이렇게 매일 무서울 것이 무서웠지. 정신의 두 뺨을 세차게 때려 눈을 뜨게 하면 저 앞에서 새어 나오는 조그만 빛이 보인다. 빛은 이 중 네가 각오하지 않은 것은 없었다고, 울더라도 내일의 일과는 조금도 바뀌지 않을 거라고, 찾아야 할 도움과 해결해야 할 문제가 명확하며 슬픔과 공포가 무엇을 지체할 이유가 되었던 시절은 끝이 났다고 엄정하게 말한다. 이 가혹한 희망. 내게는 행복하고 건강해야 할 책임이 있다. 그건 내가 한 번도 제대로 져본 적이 없는 책임이다. 이번에는 실패해서는 안 된다. ​", "오늘은 산책을 네 번 나갔다. 무늬는 느낌표보다는 말줄임표로 행복을 표현하는 타입이다. 이를테면 내가 산책을 나가자고 했을 때, 내가 목줄을 들고 이거 할까 물었을 때, 목줄을 했으므로 산책을 나가는 것이 확실할 때, 세 번도 아니고 네 번째로 산책을 나가는 것이 확실할 때. 그럴 때 무늬는 기쁨에 겨워 짖거나 뛰지 않는다. 대신 내 가랑이나 가슴팍에 얼굴을 와락 박고 고개를 들고서는 감당하기가 어렵다는 듯이. 그 모습은 첫눈에는 슬픔이나 좌절감의 실루엣처럼 보이기도 한다. 그럴 때 나는 무늬와 내가 동류라고 느낀다. 좋은 건 좀 슬프지. 네가 맞아. 나도 알아. 나는 무늬의 등 위로 몸을 드리우고 천천히 무늬의 몸을 앞에서 뒤로 쓸어준다. 여린 배와 탄탄한 가슴통도 부드럽게 두드린다. 슬픔에 일가견이 있었던 사람은 나중에 어떤 개를 잘 다독일 수도 있다. 고통의 쓸모나 시련의 의미를 논하려는 건 아니다. 삶을 곧 고통으로 감각하는 모든 사람들이 개를 잘 키울 거란 말도 아니다. 다만 슬픔에 능숙했던 나머지 다른 동물에게 선뜻 침착함을 줄 수 있을 때가 오면 그 순간은 실로 놀라울 거라고 말하고 싶을 뿐이다. ​", "페미니즘을 처음 배웠을 때 찾아왔던 그 명징한 깨달음의 순간을 기억하고 있다. 갑자기 모든 것이 분명해진다. 문자 그대로 모든 것이. 개인적인 상처와 어려움일 뿐이라고 생각했던 사건들은 유구한 역사와 전통을 지닌 차별과 착취의 구조 안에서 이해되기 시작한다. 거대하고 견고한 성을 이루는 작은 못으로서의 나를 본다. 그리고 그 옆에 있는 못, 그리고 그 옆에 있는 못의 끝나지 않는 연쇄를 직시한다. 우리는 기여하지 말고 균열이 되자. 우리는 이 성을 무너뜨리자. ​", "육식에 대한 애호나 육식의 뛰어난 접근성이 경제적으로 사실이든 심리적으로 사실이든, 그런 저항을 뛰어넘어 비건을 지향하기 위해서는 최소한 자기를 돌보려는 의지가 있어야 한다. 그런데 의지에는 계급이 없나? 의지는 누구에게나 평등한가? 의지가 없더라도 시장에 또는 가정 내 돌봄 노동자에게 비건 실천을 외주로 맡길 수 있는 비건이 있는가 하면 그렇지 못하기 때문에 맨두부만 먹는 비건도 있다. ​", "위장이 편안하며 아랫배에 탄력이 생기는 생활 ​", "비거니즘 이전에도 '먹지 말 것'이라는 명령은 집요하게 여자애들을 쫓아다녔다. 무엇을 원해야 하는지는 아무도 가르쳐주지 않았지만, 무엇을 원하지 말아야 하는지는 명확했다. ​", "윤리적 삶을 산다는 것은 몸이 가벼워진다는 것을 의미하지 않는다. 타인과 상호의존관계를 맺는데서 오는 온갖 지리멸렬함, 가령 비굴함이나 빚을 졌다는 느낌, 홀로 서는 데에 실패했다는 이 모든 마음의 짐을 내려놓고 홀가분한 결백의 상태에 놓임을 의미하지 않는다. 윤리적 삶을 산다는 것은 도리어 그 지리멸렬의 소용돌이로 기꺼이 뛰어드는 일, 타인과 나를 잇는 끈을 더 촘촘하게 인지하는 일이다. 그렇다면 나는 용기를 내어, 혼자서 말끔한 비건이 되려고 노력하는 대신 아무것도 혼자서는 못 하는 사람이기를 자처하고 싶다. 어떤 깨끗함과 홀가분하다는 느낌을 '잘' 살고 있음의 징표로 간주하는 일을 멈추어야만 보이기 시작하는 관계들, 마치 빠르게 저은 낫또를 한 스푼 떠올릴 때 생겨나는 끈적하고 무수한 실타래와 같은, 존재들 사이사이에서 찰랑이는 섬세하고 연약하며 복잡한 냄새가 나는 관계들을 더 많이 감각하고 싶다. ​", "언제부턴가 좋아하는 작가를 물으면 친구들의 얼굴이 떠오른다. 그들의 뛰어난 문장과 생각을 모셔와 내 글의 부족함을 만회한 적이 수도 없이 많다. 그 대가로 나도 내 말을 그들에게 헤프게 준다. 이제는 친구들이 나를 어디서 어떻게 인용하든 크게 상관하지 않는다. 공교롭게도 '나는'이라고 너무 많이 쓰다가 그렇게 되었다. 원없이 '나'라고 써놓고 보니 그 많은 '나'가 다 나일 리가 없는 것처럼 느껴졌다. 나는 무엇이라고 쓰는 순간 나는 무엇으로부터 멀어진다. 나는 무엇도 아니다. 그러므로 내 말은 너의 말도, 그의 말도 될 수 있다. ​", "한동안은 한 명의 독자를 향해 글을 썼다. 정확하게는 적어도 한 명은 읽어줄 것임을 알면서 썼다. 쓰는 자기 자신을 제외한 최초의 독자를 가지는 행운을 아무나 누릴 수 없다는 점을 잘 알고 있다. 그건 매번 글을 쓸 때마다 소정의 감사 기도를 올려야 할 만큼의 복이다. 글쓰기가 아무리 외롭고 괴롭다 하여도. ​", "이끼와 나는 언젠가 각자의 잘못이 밝혀져서 공론화를 당하게 되면 서로의 증인이 되어주기로 약속했다. 상상 속에서 우리의 잘못은 여럿이다. 사랑하지 말아야 할 사람을 사랑한다. 사랑해야 할 사람을 사랑하지 않는다. 먹지 않기로 한 것을 먹는다. 이를테면 뼈가 붙은 고기같이. 글을 쓴다. 그것도 남이 나오는 글. 남이 나오는 글을 쓰고 허락도 구하지 않는다. 관점과 언어를 훔치고 출처를 잊어버린다. 자격도 안 되면서 감히 춤을 잘 추고 싶어 한다. 그런 소망을 비밀에 부친다. 겉과 속이 다르다. 겉이 너무 여러 개다. 그닥 살고 싶어 하지 않는다. 그러면서 계속 산다. 그냥 살지 않고 뭔가를 생산한다. 생산하느라 착취한다. 옹호하지 말아야 할 인물의 마음을 이해한다. 인간과 동식물을 상처 입히는 사람들과 연을 끊지 못한다. 동료 시민에게 해를 끼친 사람의 사정을 헤아린다. 잘못한 사람의 친구로 남는다. 이제 뭐라고 증언해야 할까? \"걔가 모르고 그러진 않았을 거라고 할 것 같아요. 다 알면서, 그럼에도 불구하고 너무 사랑해서 그랬을 거라고요.\" ​", "중요한 건 잘못의 내용이 아니다. 실은 무엇을 잘못했는지도 오래전에 잊어버렸다. 언제나 잘못한 기분으로 산다는 게 중요하다. 머지않아 들킬 것 같은, 탄로 날 것 같은, 적발될 것 같은 이 기분. 그게 곧 내 삶의 태도다. 나는 기분이 태도가 되지 않게 하라는 조의 모든 격언을 참을 수가 없다."]}, {"title": "크리미(널)러브", "author": "이희주", "genre": "소설", "publisher": "문학동네", "passages": ["\"그러니까 후회 안 해.\" \"대단하네.\" 은정은 얼음을 건져 씹으며 자신의 일상을 떠올렸다. 남편과 둘이 영혼까지 끌어모아 마련한 전셋집, 나란히 누우면 꽉 차는 거실, 가끔 엄마라고 불리는 상상을 하지만 인간 하나를 더할 여력이 없는 빠듯한 생활을 떠올렸다. 대단하네, 라니. 부러움과 비아냥이 섞인 자신의 말을 곱씹으며 은정은 웃었다. 현실의 다양한 갈래에서 최선의 선택을 하며 살아왔다고 자부했지만 우미는 아예 경우가 달랐다. 장애물이 나오면 우회 루트를 찾는 게 아니라 그걸 직선으로 뚫고 갔다. 세상은 욕심 있는 사람에게 다 주는구나. 나는 부러워. 네가 미친년이라서. 기필코 원하는 남자의 애를 낳겠다고 그 지랄 한 것도, 그 돈 버는 것도 부러워.", "아무리 쥐어짜도 노고가 많으십니다 외엔 무슨 말을 해야 할지 몰랐다. 그게 초면인 인간에게 우미가 갖출 수 있는 최대치의 예의였다. 물론 인간 대 인간이 아닌, 남자와 여자로 접근하면 좀 달랐다. 다른 멤버는 몰라도 최애 앞에선 남녀의 역학이 작동되기 마련이었다. 열 살만 어렸으면 저 몇 살처럼 보여요? 라거나 저 무슨 일 할 거 같아요?라고 묻고 승무원이나 필라테스 강사 같은 답을 바랐을지도 모른다. 하지만 우미는 여자로서 자신감이 없었고, 자신이 남자로서 사랑하는 상대 앞에서 여자로 보이려고 애쓰다가 패배하는 걸 감당할 만큼 맷집이 좋지도 않았다. 정말, 정말 운이 좋아서 최애가 나를 여자로 봐준다 해도 그건 미친 여자가 되는 지름길이었을 것이다. 붕괴! 파괴! 그런 앞날밖에 상상할 수 없었는데, 이게 참, 나이 덕이라고 해야 할까. 세월이 우미를 미개봉 중고로 만들어준 탓에 용기를 낼 수 있었다. 미남 공포증은 여전했지만 어쨌든 아이에게 아빠 얼굴 한 번은 보여줄 필요도 있었다.", "\"그래도 사람들 반응 좋지 않았어? 변화를 줘도 괜찮을 거 같아. 약간 이중적인 면을 넣는 거지. 지나치게 일관성이 있으면 사람들이 물린다고 해야 하나, 그렇잖아. 우리가 원하는 건 사람들을 미치게 하는 거지, 떠나게 하는 게 아니니까.\"", "크리스마스이브에 미도는 서른이 되었다. 만 나이로 그랬고 1월 1일이 되면 한국식으로 서른둘이 된다. 그때도 세계적으로는 서른이고, 또 새해부터는 만 나이를 도입한다고 하니 변함없이 서른인 건 맞는데 그렇게 말하면 정직하지 않은 사람 같다. 어려 보이려고 발광하는 것 같다. 발광 맞지만.", "특히 희도가 선우의 이야기를 꺼낼 때면 미도는 웃기지 않아도 ㅋㅋ을 찍어 보내고 슬프지 않아도 ㅠㅠ를 보낼 수 있는 문자언어의 세계에 감사했다. 서로의 웃는 얼굴을, 우는 얼굴을 보지 못하면서 그렇다고 믿는 약속이란 얼마나 소중한가?", "\"네가 보는 내가 어떤 사람인진 몰라도 지금 이건 내가 아니야.\"", "푸른 어둠 속을 걸으며 미도는 가장 넓은 땅을 가진 독재자도 그가 가진 땅에서 벗어날 수 없다는 사실에 대해 생각했다. 다리에 느껴지는 피로가 어제 발이 푹푹 빠지는 모래사장을 걸은 탓이라는 걸 깨달았다. 지난 일은 전부 과거가 된다고 해도 어제의 몸은 오늘의 몸에 영향을 준다. 오늘의 몸은 내일의 몸을, 내일의 몸은 그다음날의 몸을 변화시킬 것이다.", "짧은 명상을 마치자 호흡이 가라앉았다. 분노도, 무엇도 없는 무심한 표정으로 사라는 점심밥을 바라보았다. 담는 순간 식는 식판 위의 만찬. 메뉴는 쌀밥, 떡국, 맛살과 미역 초무침, 매운 닭볶음, 배추김치. '만찬'이라는 말에 어울리지 않을지 몰라도, 사라는 정말 그렇게 생각했다. 남이 영양 밸런스까지 맞춰 차려주고 마음껏 떠먹을 수 있는 밥이 흔한가? 누군가는 찐쌀이라 퍽퍽하다느니 뭘 먹어도 같은 맛이라느니 배부른 소리를 했지만 사라는 지겹지 않았다. 질릴 줄 몰랐다. 원래 그랬다. 인내심이 강한 게 아니라 아무 생각이 안 들었다. 한없이 연장만 되는 비정규직에 머무는 것도 이 성격 때문이다. 그걸 알아도 바꿀 수 없었다. 바꿀 의욕이 안 났다. 그런 건 타고 난 거니까. 잡곡밥이 나왔다면 더 좋았겠지만.", "사라는 관자놀이를 문질렀다. 잠시 메신저의 발명에, 구겨진 얼굴을 숨길 수 있는 것에 감사했다. 눈치보는 엄마에게 똑같이 괜찮은 척 웃어줄 기력이 없었다. 좆되면 좆된 대로 그냥 좆됐구나, 하고 사는 것이 편했다. 1500만원을 수챗구멍에 부었는데 15000원짜리 삼겹살을 먹는다고 괜찮아지나? 아니잖아. 그러니까 그냥 살자, 엄마. 어? 서로 애쓰지 말고. 나 그럴 기력 없어. 진짜 피곤해", "도대체 왜? 뭐가 문제지? 화가 날 때도 있었다. 나도 안다고. 나도 너희가 아는 것을 알고, 너희가 아름답다고 느끼는 것을 아름답다고 느낀다고. 감각적으로 구분 가능하다고. 그런데 정말 알까? 나는 정말 민감한 게 맞는 걸까? 내가 정말 그 사람들처럼 아름답지 않은 걸 못 견딘다면 오늘 옆에 앉은 여자 같은 옷을 입어야 하는 게 아닐까? 첫인상으로 많은 게 판단단되면 자신은 어딜 가나 탈락이다. 지오다노에서 산 폴로셔츠와 슬랙스 세 벌을 번갈아 입고 다니는 사라의 내면에 예술을 향한 열정이 있다는 걸 알아줄 사람은 없었다. 사라도 거리의 통유리창에 비친 자신을 보면 흠칫 놀라곤 했으니까.", "\"정말이지, 불공정한 사랑엔 이골이 났다!\"(44쪽) 가난하게 태어났기에 성실하게 빌어먹어도 구차를 면치 못하는 빈자들, 생애주기의 각종 순위 경쟁에서 가뿐히 밀린 하급자들, 관심과 돌봄 경제의 낙오자들. 그러니까 못생긴데다 잘못 부착된 느낌을 주는 알몸과 그 거죽에 길들여진 사고 회로들. 이희주 소설의 여자, 청소년, 퀴어, 빈민들은 절대 이 불평등을 용납할 수 없다. 그래서 그들은 지금 우리를 기울이고 구부리는 중력만이 전부가 아니라고 가정한다. 상상력을 더하고 곱해 그 이면의 다른 세계가 있다고 믿고자 한다. 그러나 철저하게 계급화, 젠더화된 권력의 구조 내에서 약자에게 개혁의 힘과 기회가 쉽게 주어질 리 없다. 치솟은 불평등, 바닥난 인내심, 무엇이 가능할까? 어떤 자원이든 이용해야만 하는 처지에 허용된 것이라곤 억눌린 힘뿐일 때, 그 약함을 연극적으로 강조함으로써 주체화의 발판으로 삼는다면 구도는 역전될 수 있다. 가령 약자의 지나친 복종은 당황스러운 일이다. 억압을 통해 마땅히 가려져야 할 폭력의 구조가 드러나기 때문이다. 고통의 한가운데에서 잠시 전능해져본 적 있는가. 그 전복의 탄성력을 통해 새로운 주체화가 가능하다면 마조히즘은 여성주의의 문법이 될 수 있다. 사랑에 절절매며 안달복달 시난고난 앓는 이희주의 인물들이 차별적인 성 역할 모델만을 심화시킨다는 비판은 적절하지 않다. 오히려 무력한 약자라는 기표를 이용하여 금기시 되어 있는 여성의 다양한 성적 욕망을 표현하고, 그것을 스스로 즐기며 자유롭게 유희함으로써 고정된 의미를 변화시키기 때문이다.", "사랑은 보통 견디기 어려운 것이다. 대개 그 마음들의 짝이 맞지 않기 때문이다. 아니, 평형을 이루지 못하기에 사랑인 거라고 해야 할까. 인생을 살뜰하게 털리면서도 굳건히 자신의 사랑을 실천하는 뭇 여자들을 향한 존경의 연서. 러브 오브 마이 라이프는 답 없는 '러브'에 '라이프'(삶)를 걸어 결국 라이프(생명)를 보존해내는 아찔하고 기가 막힌 러브 스토리다.", "이 소설집에서 묘사되는 폭력이 감히 탐스러울 수 있다면, 그것은 약자가 그 고통을 다스리는 법을 배우며 새로운 주체성을 탄생시키고 있기 때문이다. 우리는 자신이 시작되는 곳의 중력을 결정할 수 없지만, 자신이 지속되거나 종결될 곳의 좌표는 조금씩 바꾸어나갈 수 있다. 아니, 그 수행의 과정 자체가 삶의 거의 유일한 가능성이자 몫이다."]}, {"title": "탁월하게 서글픈 자의식", "author": "박참새", "genre": "에세이", "publisher": "마음산책", "passages": ["나는 가끔 내 안의 어떤 부품이 완전히 고장 나서, 뭔가를 전혀 할 수 없거나 느낄 수 없는 것 같다고 생각했다, 오래도록. 이런 생각을 오래 하면 이어서 또 이런 생각을 하게 된다. 혹시 내가 잘못 태어났나, 그 흠결이란 것이 너무나도 미세해서 알아차릴 수도 없을 만큼, 그리하여 긴 세월을 조금 부서진 채로 견디다가 끝에 다다라서야 한계를 느낀 나머지 스스로의 모든 것을 점검해야 하는 정도의, 가느다란 결함. 그리고 이것을 영원히 수선할 수 없을 것 같단 생각이 들면 이제는 정말 아무것도 할 수 없을 거라고 생각한다. 너무 많이 자거나 아예 자지 않거나, 지나치도록 먹거나 완전히 먹지 않거나, 심하게 울거나 일절 울지 않으면서 나는 내 안의 빗금이 서서히 맞아가기를 진심으로 바랐다. 나는 슬픈 사람이다. 이유 없이 슬픈 사람이다. 그 어떤 시절도 사람도 내가 슬픈 이유가 될 수는 없었다. 그렇지만 모든 슬픔에 이유가 필요한 것은 아니며 아주 많은 슬픔이 이유가 없는 채로 우리 사이를 배회하고 있다. 갈 곳 잃은 슬픔들이 매일매일 산책한다.", "서글픈 여자의 손바닥에는 갈 곳 잃은 이야기의 초고들이 한가득이었다. 얼마나 많은 비밀을 쥐고 있었는지, 그 무게 때문에 서글픈 여자는 울 때에도 손을 들어 올려 얼굴의 눈물을 닦아낼 수도 없었다. 혹 누가 듣게 된다면 알게 된다면 참혹할 정도로 부끄러운 이야기들 역시 많았기 때문에 조금이라도 새어 나갈까 싶어 손은 항상 주먹을 꽉 쥐고 있었다. 주먹 쥔 손을 길게 늘어뜨린, 서글픈 여자는 떨어지는 눈물을 닦지도 않고 뚝뚝 흘리며 걷다가 제 풀이 먼저 죽는 바람에 낯선 산책로 한가운데에서 중심을 잃고 그대로 쓰러졌고, 죽었다. 물론 이것은 사실이 아니다. 넘어질 때 손으로 땅을 짚었으므로 큰 상처도 충돌도 없었다. 이것은 그저 이 슬퍼하는 여자가 자주 죽고 싶어 하기 때문에, 그것에 대한 생각을 너무 자주 한 나머지 이상적이라고 느끼는 몇몇 죽음을 자신의 그것과 동일시하여 일어난 사건이다. 걷다가 죽은 사람은 슬픈 여자가 아니라 로베르트 발저다. 슬픈 여자는 아직 살아 있다. 살아 있는 여자는 슬프다.", "'ㅁ'을 출력하는 키보드가 조금 먹통이다. 평소보다 새끼손가락에 힘을 더 많이 준 채로 눌러야 한다. 정말 귀찮군, 지금까지는 빽빽해진 키보드가 빚어낸 실수를 일일이 고쳤는데 지금ㅁ부터는 그러지 말아야겠다고 생각한다. 왜? 너무 사소한 일이다. 틀려도 상관없다. 오타 하나 없이 매끈한 글에서도 빚어지는 게 그런 거다. 많다. 너무 ㅏㅏㄴㅎ고 다 그런 식이다. 다 내가 한다는 식, 내가 읽었다는 식, 내가 안다는 식. 다들 ㅝ 이렇게 아는 게 많은지. 나는 책을 사방으로 쌓아두고 기도하듯 지낸다. 이 책들이 막아줄 것이다. 이 장치는 두텁다. 내가 쌓아올린 장치-책 그것이 나를 지켜줄 것이다. ㅜ엇으로부터. 무엇으로부터?", "나는 살아 있는 사람의 일기는 조금 징그럽다. 왜냐하면 그가 살이 있기 때문이다. 살아 있으니 그의 일기를 읽는 것보다 그가 어떻게 살아가는지를 보는 게 더 쉬울 테다. 게다가 글을 쓴다는 건 가식적인 일이기도 해서 대부분의 일기인들이 일기에 모든 것을 다 적지 않는다. 그러다 보면 실상의 사람과 일기 안의 사람의 차이가 더욱 심해질 텐데, 그 이격을, 자꾸만 벌어지는 이격을 계속해 확인하면서 다시 깨닫게 되겠지 쟤는 살아 있었던 거야, 안 죽었다고. 그래서 나는 산 사람들은 산 채로 보고 싶고 읽고 싶고 그렇다.", "버지니아 울프의 일기를 읽고 있다. 수년 전에 사둔 책이지만 읽기 싫었다. 나는 사람들이 읽었을 것이라고 예측하는 대부분의 책을 안 읽었다. 잠에 들기 전 몇 페이지씩 얌체처럼 읽다가 스르륵 하고 눕는다. 버지니아 웃기다. 누가 구리고 누가 못 쓰고 누가 별로고 하는 거 다 적어놨네. 그러면서도 저 평론가가 한 말이 이 출판사가 한 말 다 맘에 담아뒀네, 그것도 다 적어두었네. 나는 그런 걸 읽을 때마다 키득키득한다. 바보 너도 똑같이 살았었구나, 그래서, 그렇다면 궁금한 게 생겨서 책을 잠깐 덮으면 그때 생각이 난다. 얘 죽었지. 다 죽었었지. 버지니아가 (일기에서) 말하길, 누군가가 보는 것에 염두에 둔 일기와 그렇지 않은 일기가 별반 차이 없다 한다. 동의. 버지니아가 (일기에서) 말하길, 누군가의 가장 위대하고 아름다운 순간은 일기 오로지 일기에서만 발현된다 한다. 동의. 버지니아가 (일기에서) 말하길, 오십 세의 그가 지금 삼십대 중반의 일기를 읽다가 웃겨죽겠어서 배를 잡고 뒹굴기도 할 것이고 대충 감 떨어진 중년의 버지니아에게 기똥찬 글감을 줄 것이라고 한다. 그러니 오십 세의 버지니아더러 눈 크게 뜨고 일기를 다시 읽으라 한다. 동의, 하지만 육십 세의 버지니아는 왜 호명해주지 않았어? 왜?", "정치에 대해 말할 수 없다. 젠더와 페미니즘에 대해서도. 교육권과 인권에 대해서도 환경과 윤리에 대해서도 그리고 전쟁에 대해서도. 그 이상의, 나를 압도하는 무언가에 대해 말하는 것이 불가능하게 느껴진다. 그것을 는다. 미아 아닌 그 사람의 삶은 미아와 너무 다르다. 왜냐하면 그는 미아가 아니니까. 듣고 있는 미아의 눈동자가 점점 비어간다. 시선이 내던져진다. 왜냐하면 미아는 지금 혼자 있고 싶기 때문이다. 모국어에 능숙한 미아는 모든 곳의 소리가 너무 잘 들린다. 듣지 않아도 될 이야기 혹은 들어서는 안 될 이야기까지도. 그런 것들이 미아의 의도와 상관없이 미아의 귀를 때려 박는다. 2년 만에 만난 미아 아닌 그 사람의 말보다 그렇게 주워듣게 되는 말들이 머릿속을 가득 채운다. 돌아오면 그것만이 기억난다. 미아는 잠시 눈을 감는다. 빠르게 한 번 더 감는다.", "내가 몰랐던 건 잘하기 위해서까지 필요한 온갖 유무형의 노력과 자산이었고, 내가 알았던 건 못할 때는 정말 티가 많이 난다는 것이었다. 억울할 정도로 티가 많이 난다. 노력하다 피 좀 흘려도 그건 아무도 모른다. 웬만해서 피는 잘 안 나기 때문이다. 눈물은 순간을 무마시키려고 한다는 억측을 야기하기 십상이므로 모두가 목젖이 따갑도록 울음을 참는다. 못 참고 울면 그건 그거대로 못난 인간 되는 거다. 이렇게 좀 별로고, 좀 아니고, 좀 못한 것 같은 것들을 다 제외하면 결국 남는 건 엄청 잘한 것들의 모음이 된다. 굉장히 멋져 보이고, 어떻게 했나 싶고, 그냥 한 것 같기도 싶고, 아무튼 그렇다. 우리는 매일 무언가를 너무 잘하는 사람들에게 둘러싸여서 나도 뭔가를 잘해야 한다는 조급함에 시달린다. 하루 단위로 열리는 전문가의 수업들, 불티나게 팔리는 명강의들, 세계적인 석학들의 비법을 담은 책들 이런 우리는 뭔가를 조금 못하는 순간에 도저히 익숙하지가 않아서 그런 모습을 볼 때마다 온 감각이 쏠리고 뇌 속의 모든 기억 세포가 발동되는 느낌이 든다. 쟤, 잘하는 줄 알았더니만, 아니었구만, 이제 밑천 드러나는구만. 그 전의 성과는 죄다 어쩌다 한번 잘한 게 되고, 그다음의 잘함을 증명하기 전까지는 단 한 번의 잘 못함으로 기억된다. 사실 따져보면 크게 잘 못한 것도 아닐 텐데도.", "다 바뀐다. 심지어 나도 바뀐다. 그래서 바뀌는 게 싫었다. 하루 멀다 하고. 사람 마음이라는 게 기분이라는 게 관계라는 게 세상이라는 게 날씨라는 게 젠장할 세상 모든 게 그냥 순식간이라. 도저히 못 살겠어서. 계절도 바뀌고 나무도 바뀌고 꽃도 강아지도 고양이도 다 바뀐다. 바뀌어서 다 떠나버린다. 진짜인 줄 알았던 것도 어느 순간엔 가짜가 되어버리고, 가짜인 줄 알았던 건 나도 모르게 진짜가 되어서 나를 바보로 만들었다. 도대체가 마음 놓고 살 수가 없었다. 언제 뭐가 바뀔지 몰라서. 바뀌면 내가 어떻게 될지, 어떻게 해야 할지 모르게 되니까. 거기서 내가 제일 빨리 바뀌어버리니까. 내가 괴물 같아지는 순간도 있으니까. 돌도 부서지고 산도 깎인다. 태양도 저물고 달도 매일 모습 다르다. 물은 계속 흐르고 흙도 썩는다. 망할 세상에 안 망할 것처럼 그대로인 게 아무것도 없었다. 무덤도 파낸다. 죽은 뼈도 썩어 사라진다. 아무것도 아닐 거라고 생각한 모든 영혼도 다 바뀐다. 오독하고 오해한다. 그러다가 시간이 지나면 또 다르게 읽히는 영혼들. 그러면 나더러 뭐 어쩌란 말인가. 어디에다가 믿음이라는 것을 두고 살아야 하는가. 마음이라는 거, 별것도 아닌 이 마음이라는 거, 하나 두고 바깥에 나가서 인간 구실을 할 수가 없었다. 마음 두고 온 곳이 또 바뀔까 봐, 바뀌어서 돌아오는 길 영영 모르게 될까 봐. 그런데 마음은 너무 무겁다. 매일 들고 다닐 수가 없었다. 나는 바뀌는 모든 것을 피해 다니는 심정으로 살았다. 제발 제발. 어디 한구석에는 있겠지. 내가 바뀐다 한들 절대 바뀌지 않을, 손바닥만 한 쥐구멍이라도 좋으니 하나 정도는 있겠지. 제발 제발. 없는 종교를 만드는 심정으로 빌면서 찾아다녔다. 징그럽게 무거운 마음을 이고 지고서. 제발 이 망할 것 잠시라도 좋으니 놓고 떠날 수 있게 해달라고. 영원은 바라지도 않을게요. 잠깐만 쉬게, 잠깐만 도망가게 해주세요. 그러면 저 조금 강해질지도 몰라요. 짐 같은 마음 신경 쓰느라 아무것도 못 했는데. 사람 구실 할 수 있게요.", "그런데 도무지 책밖에 없었다. 미덥잖은 책밖에, 글자밖에 없었다. 베어진 나무와 갖가지 원료로 만든 종이에 까맣게 인쇄된 글자들밖에는. 마치 죄를 고백하는 것처럼 한번 새겨지면 절대 되돌릴 수도 되돌릴 일도 없는 글자. 글자밖에 없었다. 그렇게 도피하는 마음으로 읽었다. 다 아니니까. 책 말고는 다 아니고 다 변하니까. 책은 나의 최선이자 차악이었다. 나를 가두기도 하고 방생하기도 했으며, 침묵하게도 했다가 오만하게 만들기도 하고. 그러니까 나를 자꾸 바뀌게 했다. 그런데 종이 위 글자들은, 풀 먹은 그 종이 더미들은 도통 바뀔 생각을 하지 않았다. 가끔은 책이 틀린 것 같은 때도 있었지만 그래도 바뀔 생각은 하지 않았다. 버림 받는 일이야말로 가장 간편한 사건이라는 듯이. 변화. 그건 책의 속성이 아니었다. 책이 가지지 않은 기질이었다. 나는 책이 바뀌지 않는다고 생각했고 바뀌지 않는 것은 책뿐이라고 착각했으며 바뀌지 않아 다행이라고 생각했다. 그래서 욕지거리가 나와도 계속 책으로 돌아왔다. 때문에 오래 걸렸다. 조금 일찍 알았으면 일찍 그리로 도망가 있었을 텐데 도망가서 아무것도 듣지 않고 아무것도 보지 않는 바보가 되었을 텐데. 낡아진 마음을 들고 책에게 갔다. 그리고 책 안으로 숨었다. 진짜인 것들은 모두 책에다 쏟거나 말했다. 말해도 괜찮은 것들만 골라서 말하거나 말하지 않았다. 그러다가 나는 오해를 사거나 미움을 받거나 사랑을 느끼기 일쑤였지만 책은 그대로였다. 걔는 말도 없었다. 말을 안 한다. 그냥 있다. 내가 있어달라고 한 바로 그곳에. 내가 한참 찢어지고 온 날에는 그곳에 그냥 그렇게 있는 책, 을 보면서 다행이라고 생각했다. 얘는 종이고 나는 사람인데 찢기는 쪽은 나구나. 너는 나를 안 버리겠구나. 내가 너를 버리기 전까지는 내 옆에 계속 있겠구나. 너는 계속 책이겠구나.", "\"생각 좀 그만하라\"는 말을 합평에서 들은 적이 있는데, 그것은 칭찬이기도 하면서 약간은 저주 같은 말이기도 하다. 그리고 약간 무책임하기까지도 하다 방법을 알려주지 않고 하는 권유는 명령에 다름 아니며 듣는 사람으로 하여금 일방적인 답답함만을 유발시킬 뿐이다. 하지만 그렇다고 해서 유효하지 않은가, 라고 물으면 또 그건 아니다. 명령을 듣고 생각을 하게 된다는 점에서 그렇다. 생각이 많으면 나쁜가? 나쁘면 어떤 것이 어떻게 악화되는가? 아니라면 어떤 식으로 개선이 되는가? 뭐 그런 생각을 하게 되는 것이고 이렇게까지 하다 보면 나는 또 그 망할 생각이라는 걸 이렇게까지 한다는 것을 깨달으며 나는 정말 생각이 징그럽게 많긴 하구나 약간 인정을 하게 되면서도 아니 이 정도로 생각하지 않고 산다면 무슨 재미로 산단 말인가 남들이 궁금해지는 지경이 되는 것이다.", "얼마 전 했던 인터뷰가 너무 싫었다. 일일이 답하고 싶지도 않았다. 하지만 나는 해야만 하는 사람이었고 여기서 내가 답하지 않고 모른다고 넘어간다면 내가 나를 배반하는 셈이 된다. 하지만 난 말하고 싶지 않다. 내가 말하고 싶은 건 이미 거의 다 말했다. 이제 없다. 쌓이면 다시 말할 것이다. 그리고 그것은 공간이 될 것이다. 내가 아무리 자세히, 오해 없이, 곡해 않게 구구절절 말해도 어차피 와해될 파동의 모습이 아니라 누가 발로 짓이기고 뭉개도 여전하고 멀쩡한, 배반의 시간도 사랑의 순간도 없는, 백지의 공간이 전부인 그곳에서 나는 다시 혼자 서서 말할 것이다. 그리고 또 말하겠지. 읽으라고. 여기 이게 전부니까. 묻지 말고 읽어달라고. 당신이 느낀 그것이 전부이며 동시에 나머지를 필연적으로 포함하지 않고 있겠지만 그것이 절대로 맞다. 나는 정정할 생각이 없다. 내가 맞고, 무조건 네가 맞다. 누구 하나 틀린 적 없고 틀리지도 않을 것이다. 나는 싸우고 싶지 않다. 잠을 잘 자고 싶다. 혼자 있는 시간을 시간이라고 생각하지 않으면서 비참해하지 않으면서 잘 있고 잘 자고 싶다. 내가 바라는 것은 그게 전부이고 그게 잘되다면 나는 말도 안 하고 대답도 안 하면서 쓰기는커녕 그냥 죽기 전까지 읽기만 하면서 살 것이다. 나는 내가 꼭 그랬으면 좋겠다. 반드시 언젠가는"]}, {"title": "터틀넥프레스 사업일기 : BEGINS", "author": "김보희", "genre": "인문", "publisher": "터틀넥프레스", "passages": ["자꾸 실패할 것을 먼저 생각한다. 아니, 실패할 것이라기보다 '이 브랜드가 멋진 게 아니면 어쩌지?'라고 생각하는 것 같다. 그런데 말이지, 그런 걸 만들고 싶었던 거야? 멋져 보이는 거? 세상에 없는 거? 그런 거 아니었잖아. 대단한 브랜드를 만든다기보다, 이 과정에서 내가 더 주체적으로 움직이면 좋겠다. 회사 시스템 밖에서 움직여본 적이 없어서 어떻게 해야 하는지 어리둥절하고 있는 듯하다. 아주 작게 한 발, 한 발, 겨우 움직이는 듯하다. 직선으로 척척 걸어갈 수는 없어도, 비록 나선으로 빙글빙글 돌더라도, 계속 움직이면 좋겠다. 뭐라도 하자, 그런 마음으로.", "브랜드 세계관 책 때문에 거북목이 된 사람들(의 모임). 바다를 잃고 떠도는 유랑민들. 바다로 돌아가기를 꿈꾼다. 거북목을 숨기고 살기 때문에 안전한 곳이 아니면 자신을 드러내기를 꺼린다. 조용한 카페에 주로 출몰하며, 책을 읽는 동족을 마주치면 마음속으로만 인사하는 습관이 있다. 스스로 창조적이라고 생각하진 않지만 남들의 눈에는 창의적이고 재주가 많은 종족이며, 그 증거로 무엇이든 쓰거나 그려서 표현하는 습성이 있다. 마음이 맞는 사람들과 함께 배우는 일을 좋아하지만 어딘가에 소속되는 것은 싫은 그들이 책이라는 프로젝트를 통해 만나고 헤어지는 유랑 마을이 터틀넥 클럽.", "작가님 저, 깊이 다녀왔는데, 아주 홀가분하게 왔어요. 어딜요. 바닥? 아. 또 가게 될 거예요. 작가님이 요즘 읽는 책들이 다 같은 말을 한다고 하셨다. \"실패의 횟수가 늘어날수록 성공의 확률은 높아진다. 그것이 당연하다. 그러니까 계속 걸어야 한다.\"", "떠나는 사람은 그 순간 무얼 가지고 갈까. 어떤 순간을 기억할까. 무얼 후회할까. 나는, 어떨까. 서울에 두고 온 일들이 작게 느껴졌다.", "나물을 다듬으며 생각했다. 이 회사를 내 속도에 맞춰 운영하고 싶다고. 기준을 외부에 두지 않고, 외부의 흐름에 흔들리지 않고 하고자 했던 것들을 느리더라도 하나씩 해보자고. 책 앞에서 솔직하고 성실하자고. 확실히 답이 떠오르진 않지만 마음이 좀 안정되었다. 덜 불안하고, 나 자신이 자랑스러웠다.", "조직을 떠나 스스로 결정해야 할 상황에 놓이면 '결정'보다 '결정할 결심'부터 해야 하더라고요. 선택한 모든 걸 내가 책임져야 한다는 것이 목이 굽고 등이 굽을 만큼 무겁게 느껴질 때면 두 글자를 외칩니다. \"기세!\" 진짜 소리 내서 기세! 외치고 나면, 두려움이 두근거림으로 변하곤 해요. 오늘은 기억하고 싶은 날이고, 또 응원이 필요한 날이어서 슬쩍 예고편처럼 말을 건넵니다. 천천히 준비하고 있으니, 계속 소식 전할게요. 기세!", "같으면서 새로워지는 것, 같은 채로 깊어지는 것을 생각하고 있습니다.", "\"저희 원래 작업하던 것처럼 간편하게 작업을 진행하고 싶은 마음이에요!\" 간편하게, 간편하게. 맞다. 우리 그렇게 작업해 왔는데. 경쾌한 바람이 부는 것처럼. 그렇다고 가볍게 '대충 이쯤이면'이 아니라, 나 자신은 물론이고 서로의 직관과 실력을 믿고. 기세 있게 진행해왔던 게 우리 작업의 고유한 호흡이었는데, 페이스를 잃었다.", "작년에 밑미와 리추얼메이커 계약을 하던 때, 계약서를 보고 밑미를 더 좋아하게 되었다. 계약서에는 보통 날인하는 입장의 사람이 지켜야 할 일, 하면 안 되는 일이 잔뜩 적혀 있기 마련인데 밑미 계약서에는 서로의 약속이 적혀 있었다. 당신은 리추얼메이커로서 이걸 약속해주세요. 우리 밑미는 이런 걸 약속하겠습니다, 하고. 터틀넥프레스도 작가님들과 약속을 하고 싶다. 계약서를 준비하다 말고 우리 브랜드만의 약속은 무엇일까, 고민했다.", "\"창업한다\" \"출판사를 차린다\"라는 표현을 쓰지 않고 \"출판 브랜드를 만든다\"라고 했던 건, 창업이나 사업이라는 단어가 낯설고 두려웠던 이유도 있지만, 준비하는 마음가짐이 달라서이기도 했다. 정말 브랜드를 만들고 싶었다. 내가 바라는 모양의 작지만 새로운 세계를 구축하고, 좋아하는 사람들과 그 세계를 가꾸며 더 많은 사람들과 세상을 만나고 싶었다 이제는 창업한다, 사업한다, 출판사를 차린다, 라는 표현도 자연스럽게 쓰려고 한다. 그 말들에 담긴 무게와 거기에 따라오는 해야 할 일들을 마음과 머릿속에서 더 또렷이 하기 위해서다. 문득 출판사를 '만든다'보다 '차린다'라는 표현을 더 자주 쓴다는 게 신기했는데, 사전을 찾아보니 \"(사람이 가게나 살림을) 필요한 것들을 갖추어 벌이다\"라는 뜻이었다. 그런데, 저는 필요한 것들을 갖추지 않고 벌여버렸어요. 어쩌죠.", "지금도 잠들기 전에 종종 죽음을 떠올리곤 한다. 특히 마음이 어지러운 일이 있을 때면 '이 일을 내가 죽기 전에도 떠올릴까? 기억조차 할까? 묻곤 한다. 답은 늘 '기억할 리 없다'다. 그러곤 쿨쿨 잠든다.", "내가 일을 놓으면, 이 책을 놓으면, 아무도 이 책을 돌볼 사람이 없다. 오직, 나밖에 없는 거다. 림이 했던 말이 떠올랐다. 딸을 보고 있으면 이 아이를 지켜줄 사람, 말 그대로 보호자는 나밖에 없다는 것에 엄청난 책임감을 느낀다고. 비슷한 마음이다. 내가 이 책을 놓으면, 아무도 이 책을 책임질 사람이 없다. 무거운 책임감을 느끼면서 또 그 지점에서 묘미도 느낀다. 내게 달렸다는 것. 내가 하면 된다는 것.", "미지근한 인생을 살고 싶다. 오래 지치지 않고 계속할 수 있을 것 같아서다. 너무 뜨거워지면 번아웃이 오고, 차가워지면 의욕을 잃는다. 잔잔하게 매일을 살아가는 것. 지속 가능한 것. 오래 계속하려면 어떻게 해야 하는 걸까?", "책이 나온다고 세상이 변하지 않는다고, 그대로라고 말하곤 했는데 오늘 알았다. 단 한 번뿐인 소중한 순간을 쌓게 된다는 것. 그것 또한 책 출간의 중요한 부분이라는 걸 깨달았다. 그리고 그런 순간을 더 쌓으려면, 건강해야 한다.", "'코시라에루'야 말로 디자인에 가장 걸맞는 일본어야. 설계가 아니라, 차리는 거잖아. 누군가를 위해 하는 행위니까. 만드는 건 내가 하지만, 타인 없이는 성립이 안 돼. '밥 차려줄게'란 말에 이미 타인이 있는거지. 디자인도 타인을 위한 거야 - 다큐멘터리<책 종이 가위>"]}, {"title": "퇴근길의 마음", "author": "이다혜", "genre": "에세이", "publisher": "빅피시", "passages": ["사람의 마음이야말로 일의 가장 어려운 부분이다. 우리는 곧잘 '나의 마음'에 비추어 상대의 수를 읽어내려 하지만 사람 수만큼 많은 마음이 있기 마련이라, 내가 타인의 마음에 고스란히 포착되지 않듯 타인 역시 그렇다. 일이 많은 건 견딘다. 사람을 상대하는 일은 아무래도 오래 해도 매번 새롭게 어렵다. 커뮤니케이션 방식이 20년 전 다르고 10년 전 다르고 지금 다르다. 세상도 바뀌지만 나 자신의 위치도 바뀐다. ​", "재미있다고 느낀 순간을 지속하기 위해서는 노력이 필요하고, 지루하다고 생각하는 나날을 이어가기 위해서는 그 배의 끈기가 준비되어 있어야 한다. 이런 나를 달래가며 다른 사람과 함께 일해야 한다. 목표를 달성하고 고비를 넘게 하려고 온갖 재주를 부린다. 일이 지긋지긋하다고 말하면서도 사실은 일이 나를 떠나지 않았으면 하는 바람을 가지고 있다. 이 모든 것이 나 혼자만의 마음이 아니라는 사실을 알아서, 일을 맞대고 마음을 나눌 사람들을 늘 찾고 있다. 나는 아주 오랫동안 혼자 잘 일하는 사람이 되고 싶었다. 그 마음은 지금도 변함없지만, 요 몇 년 새 나는 가능하다면 오랫동안 '함께' 일하기 좋은 사람이고 싶다. 조직에 소속되어 있든 아니든 그 누구도 혼자서만 일하지 않으며, '함께'일 수 있는 신뢰 역시 조직이 거저 주는 것은 아니다. 내가 할 수 있는 일의 한계를 받아들이고 다른 사람들과 머리를 합쳐 만들어낼 수 있는 시너지가 무엇일지를 더 고민하게 됐다. ​", "어떤 일이 좋아지는 조건 중 하나는 어느정도의 능숙함을 갖추는지인데 능숙해질 기회 없이 좋아하는지 아닌지로 일을 결정하려면 피상적인 재능과 미지의 경험을 바탕으로 할 수밖에 없다. 하고 싶다, 하고 싶지 않다를 제대로 정하려면 어느 정도의 경험을 바탕으로 해야 판단이 선명해지는데, 경험하지 않고 정하다 보면 하지 않을 핑계를 만들기 위해 '(지금은) 하고 싶지 않다'는 쪽으로 자꾸 마음이 기울곤 한다. 혹은 '하고 싶다'는 마음마저 무모함의 산물일 수 있다. ​", "지금의 나는 그냥 '한다'는 쪽에 무게를 두려고 애쓴다. 하기로 한 일을 그냥 한다. 기분을 앞세워서도 안 되고, 억지로 나를 강제해서도 안 된다. 나야, 하기로 했으니까 이건 하기로 하자. 그래서 계획 세우기가 중요해진다. 하기로 한 일은 할 요량이면 무리한 계획을 세워서는 안 되고, 자잘한 일을 너무 많이 채워도 안 된다. 날마다 성취감을 느끼면서도 환멸을 느끼지 않을 정도로 다음날 계획을 세우려 노력한다. ​", "지금껏 여러 번 실패한 운동 하나를 다시 시작했다. 재능이 없고 노력해도 더디게 성장하는 운동이 내게는 수영이다. 이 새로운 시도를 포기하지 않고 이어가기가 첫 번째 목표였다. 수영 선생님의 설명에 따르면, 힘센 발차기도 빠른 발차기도 아닌 꾸준한 발차기가 가장 좋다고 하더라. 멋진 설명이지만, 물 안에서는 잘 되지 않는다. 나는 수영이 아니라 포기하지 않는 법을 배우는 중인지도 모르겠다. ​", "나이를 먹고 경력이 쌓이니 늘 결과가 훤히 보인다는 착각 속에 살게 된다.(예상은 늘 비관으로 향한다.) 관심 가는 일을 찾고 노력하기. 세상에는 아직 내가 좋아하는, 내게 좋은 일들이 더 있다는 믿음 속에 살기. 재미있어 보이는 일이 있는 쪽으로 가까이 가기. 잘될지 안될지 미리 걱정하지 말기. 힘들다고 생각하는 순간이 나중에 즐거웠던 나날로 기억되는 일이 적지 않다. 경험 도중에는 최종적 평가를 할 수 없다. 경험을 대하는 태도가 좋고 나쁨을 바꾸기도 한다. 시야를 먼 곳에서 가까운 곳으로 옮긴다. 오늘 할 일과 오늘 만날 사람들, 오늘 읽을 책과 오늘 볼 영화. 잃어버린 것과 갖지 못할 것을 생각하는 시간을 줄이고 할 수 있는 일부터 하기. 하루아침에 세상이 내게만 좋은 쪽으로 달라지거나, 외부에서 구원이 찾아오리라는 기대 대신에, 내가 만들 수 있는 하루를 성실히 살아내기. 그러다 보면 문득, 만족과 행복이 마음에 가득 찬다. 드라마틱하지는 않지만, 든든한 해결책이다. ​", "일로 얽힌 사람들과 대화하는 태도, 자신의 일에 집중하는 방식 등이 그를 매력적으로 만든다. 그 사람과 일하면 어쩐지 재미있을 것 같은 느낌이 드는 것이다. ​", "우리에게는 언제나 다음 기회가 있다. 거절을 받아들일 때, 다음 기회를 약속하는 간단한 메일이나 문자를 보내도 좋다. 우리는 언젠가 다시 만나게 되어있다. ​", "내가 배워야 할 것은 믿는 연습, 의지하기의 기술이었다. 나에게 중요한 사람들, 내가 사랑하는 사람들과 서로의 이야기를 듣고 들려주는 관계가 되기. 내 생각 속의 '혼자'에 시달리지 않기. 그들이 기댈 때 힘이 되고 내가 기댈 수 있도록 그들에게 기회를 주기. 뛰어난 '혼자'이기보다 가능성 있는 '우리'에 더 기회를 주려고 노력하는 일은, 착실하게 자신을 키워온 사람이 보여줄 수 있는 여유가 아닐까. ​", "무엇을 원하는지 정확하게 전달하는 사람. 일의 가부를 판단할 수 있게 전달하는 사람. B안이 필요하다면 그것이 존재하는지, 있다면 무엇인지 제때 제시하는 사람. 내가 상대의 커뮤니케이션 방식에서 행간을 읽느라 복잡하게 생각을 하지 않아도 되는, 투명한 방식으로 커뮤니케이션하는 사람. ​", "일을 못할 때는 아무리 좋아하는 일이라고 해도 몸도 마음도 힘들다. 계속 실수가 이어지기만 한다면, 박한 평가가 이어진다면 그 자리에서 버티기가 힘들어진다. 그래서 처음 일을 배울 때 1년은 참고 해보라고들 조언하는 것이다. 일이 맞는지를 알기 위해 필요한 최소한의 숙련도가 있다. ​", "내가 그 일을 해야 하는 이유가 설득되면 하고, 꼭 나일 필요가 없어 보이면 하지 않게 된다. 나는 일로 만나는 사람들에게 어떻게 제안을 받을 때 승낙하는지 그 기준에 대해 자주 묻는데, 거의 대동소이한 답을 들었다. 꼭 나일 필요가 없는 일을 '아님 말고' 식으로 던지듯 연락해온 상대에게 굳이 응할 이유가 없다. ​", "메일의 대원칙은 읽는 사람의 수고 줄여주기다. 글량과 내용을 그에 맞춰 작성하자. ​", "피드백은 위에서 아래로 내려가는 게 아니라, 위와 아래가 없이 오가는 것이어야 한다. 그래야 실수를 사전에 발견하거나, 적어도 너무 늦지 않게 발견할 수 있다. ​", "안된 일의 이유 중에는 나와 상대의 불명확한 커뮤니케이션, 과장된 성공에 대한 예언적 확신 등이 포함된다. 분명한 사실은 이 '촉'을 키우는 유일한 방법은 여러 번 망해보는 것이다. 실패할 때마다, 이 실패가 언제부터 예측되었는지를 돌아보는 리뷰를 혼자서라도 해보는 습관을 갖자. 실수를 반복하고 싶지 않다면 계획 세우기보다 결과 리뷰가 중요하다. ​", "피드백을 구할 때는 상대의 조언을 믿겠다는 각오를 했을 때다. 기껏 조언을 구한 뒤 칭찬이면 듣고 비판이면 무시하는 패턴을 반복하고 있지는 않은가? 그 정도 느슨한 생각으로 다른 사람이 판단하고 숙고하는 말을 고를 시간을 빼앗아서는 안 된다. 그렇기 때문에 나 역시 다른 사람에게 피드백을 요청할 때 심사숙고한다. 어떤 비판이든 제대로 들을 각오부터 하는 것이다. 피드백을 할 때도 신중하기 위해 노력한다. 의미있는 말을 하기 위해서. 당신이 피드백을 필요로 하는 어떤 일을 하고 있다면 당신에게 도움을 줄 수 있는 신뢰하는 이들의 풀을 만들어라. 해당 분야의 전문가라면 가장 좋겠다. 그게 아니라 해도 당신이 의견을 구하는 자료를 신중하게 읽을 사람, 설명을 진지하게 들을 사람이어야 한다. 그가 답을 주지 않는다 해도, 당신은 신뢰하는 이에게 차근차근 설명하는 과정에서 이미 답을 얻게 될 가능성도 높다. ​", "내가 일을 해야 할 때 남 탓만 하거나, 남이 일을 해야 할 때 불안해한다면 심력 낭비다. 협업할 때는 특히, 맡은 일을 각자 잘하는 것으로 충분하다. ​", "경력이 쌓이면 나쁜 경험도 쌓인다. 좋은 경험보다 나쁜 경험은 끈질기게 달라붙어서, 같은 일을 안 겪으려고 자꾸 머릿속에 불쾌한 감정을 소환한다. 하지만 새로 만난 사람이 당신이 과거에 얽혔던 사람의 연장선에 존재하지는 않는다. 믿고 말고의 문제를 떠나, 새 사람은 새롭게 알아가면 된다. 사람과의 어울림에서 가장 중요한 원칙이라면 '마음이 편한 대로'. 돌아보면 꼬여버린 관계보다 원만한 관계가 언제나 더 많기 마련이다. 실패에 매몰되어 한 발도 떼지 못하고 가라앉아서는 살아있는 일이 너무 원통하지 않은가. ​", "나를 해치면서까지 해야 할 일은 없다. 이것은 건강에 대한 이야기이기도 하고, 또한 자존감에 대한 이야기이기도 하다. 문제는 당신이 젋고 건강하다면, '나 자신을 해친다'라는 감각을 갖기가 어렵다는 사실에 있다. 버티는 일이 가능해서다. ​", "최소한, 협업 제안을 하는 사람이 나를 '어떻게 쓰고자 하는지'에 대해서 분명한 이유가 있으면 좋다. 가끔은 내가 무슨 일을 하는지도 잘 모르는 사람이 건너 건너 '괜찮더라'는 말을 듣고 막연한 내용으로 연락할 때가 있다. 이런 일이 대표적으로 꼭 내가 하지 않아도 되는 일이다. 제안받은 내용을 요약하면 \"누구신지는 잘 모르지만 잘 하신다니 그냥 알아서 해주세요~\"일 때, 굳이 내가 하지 않아도 되는 일이라고 판단한다. 나에게 왜 연락을 했는지, 내가 어떤 일을 하기를 기대하는지에 대해 선명하게 설명하는 담당자의 연락이라면, 나 역시 한 번은 더 고민하게 된다. ​", "'부탁하기'는 관계를 시작하는 좋은 방법이기도 하다. 나는 '신세를 지운다'라고도 말을 하는데, 적당히 부탁하고 부탁을 들어주는 일은 고마움을 표현할 '다음'을 기약한다는 점에서 관계의 시작점으로 좋은 일이 된다. 즉, 부탁하는 일 자체가 나쁜 게 아니라, 일방적으로 부탁만 하거나 원하는 걸 얻은 뒤 일방적으로 관계를 끊는 게 문제다. ​", "새로운 조직이나 업계에서 오는 일이라면 한번 해본다. 이 일로 알게 된 사람들이 다른 일로 연결될 가능성이 있을까? 역으로, 지금 하는 일을 주는 클라이언트는 언제 어떻게 나에 대해 알게 되었는가를 한번 물어보자. 내 연락처가 어떤 사람들 사이에서 돌아다니는지를 알 수 있는 기회다. 내가 포지셔닝한 나 자신과 실제로 내가 받아들여지는 방식이 다를 수 있기 때문에 한 번쯤 점검하기를 권한다. ​", "지금의 당신은 숙련도가 높아졌을 수 있지만 집중력과 체력은 더 나빠졌을 수 있다. 한부로 '예전의 나'를 기준으로 일을 받아서는 안 된다."]}, {"title": "퉤퉤퉤", "author": "황국영", "genre": "에세이", "publisher": "책사람집", "passages": ["오늘도 책임질 수 있을 만큼만 나쁘도록, 되돌릴 수 있을 정도만 약하도록. 자신 없는 일도 하며 사는 것이 어른이니까 소심한 내가 도망치지 않을 만큼 단단해지기를. 완벽하지 않은 날에도 어찌어찌 정신머리를 붙들고 조금만 더 괜찮은 생각과 포근한 마음, 근사한 태도로 살아보자는 주문. 퉤퉤퉤.", "'책상 앞 심부름센터, 괄호 열고 출장 가능'이 내 현재 직업이었다. 의뢰가 들어오면 이것저것 하는 사람. 젠체한 표현을 써봤지만 실상은 그냥 잡상인이다. 사전에는 '자질구레한 물건을 파는 장사꾼'이라고 되어 있어 언뜻 달라 보이지만 '물건'을 빼고 '노동력'을 넣었더니 거짓말처럼 딱 들어맞았다.", "'칼국수 전문점. 단일 메뉴. 재료 소진 시 영업 종료합니다.' 나도 이렇게 한마디로 끝낼 수 있는 장인이 되었으면 좋았을 텐데. 난 그런 사람들이 진짜 멋있던데. 하지만 메뉴를 결정해 간판을 고민할 새도 없이 내 인생은 이렇게 흘러와버렸다. 애석하게도 내가 장인이 될 깜냥과 기질이 아님을 인정할 수밖에 없는 경험을 여러 차례 했다. 이제는 뭘 팔든지 간에 셔터만 안 내리고 박리다매로 어떻게든 오래 버티는 것이 내 사업장의 갈 길이다.", "꿈을 좇는 사람들에게 경험치와 발전이 있듯, 꿈이 없는 사람에게도 나름대로 나아가는 방향이 있다는 희망을 이제야 조금씩 발견한다.", "끌어주는 것이 없어 막연하기는 하지만 종용하는 것이 없으니 초조하지도 않다. 오히려 야망 없는 사람이 어디까지 잘 살 수 있나 슬슬 궁금해지기 시작했다. 어디로든 가겠지. 아무튼 살고는 있잖아. 일단 오늘부터 살고 나서 생각해 보자. 그리고 또 다음 날이 되면 새로운 하루가 왔으니 일단 오늘을 살아내고 생각하자, 하고 반복하는 거다. 이렇게 하면 자는 사이에 또 새로운 오늘이 오기 때문에 평생 생각을 안 할 수 있다. 진짜 꿀팁.", "나의 대외적 꿈은 그냥 '같이 술 한 잔 마셔보고 싶은 할머니'가 되는 것이다. 언뜻 만만해 보일지 몰라도 온갖 욕망을 다 꾹꾹 눌러담은 비현실적인 꿈이다. 원할 때 술을 마실 수 있을 정도로 건강해야 하고, 괜찮은 술과 안주를 나눌 만큼 여유도 있어야 하고, 세대와 편견을 뛰어넘을 정도로 대화의 폭도 넓어야 한다.", "언제든 포기할 수 있다는 마음이, 오히려 당장 포기하지 않아도 되는 이유가 되어주는 순간을 여러 차례 경험했다. 회사라는 조직 속에서 온전히 자의대로 할 수 있는 몇 안 되는 일이 그만두는 건데 '굳이 지금?'이라는 오기를 닮은 용기가 나를 출근시키는 날들도 있었기 때문이다.", "입사 후 얼마 지나지 않아 '뭔가 잘못됐다'라는 확신이 들었지만 당장 실행할 수가 없었다. 졌다고 생각했던 것이겠지. 앞의 두 회사는 더 즐거운 무언가를 위한 도전의 시작이었지만, 이번에는 대안도 두근거림도 없이 오직 벗어나기 위해 도망치는 거라는 걸 스스로 잘 알았으니까. 그야말로 엄청난 열패감과 불안감 속에 사표를 냈다. 넌 하고 싶은 일만 할 줄 아는 인간이었어, 라는 불편한 발견을 인정하기가 그렇게나 힘들었다.", "아니 뭐라도 해야지. 직업이 없다고, 당장 돈 좀 못 번다고 모든 생활을 포기해 버리면 그럼 나란 존재는 노동자일때만 가치가 있단 뜻이야? 그러면 안 되는 거지. 훌륭한 사람들이 그랬잖아, 인간은 존엄하다고. '수입이 있는 노동자는 존엄하다'가 아니라 인간은 존엄하다잖아. 난 진즉에 인간으로 태어났고 내 딴에는 그렇게 엉망으로 살지도 않았는걸. 아무튼 나는 억지로라도 좀 존엄해야겠어. 왜.  보는 것이 먼저가 아닐까. 하지만 이 인과 관계를 기억하는 사람은 많지 않을 것 같다.", "\"프리 포스터들은 마치 육아 서적을 열심히 읽은 후에 자, 이만하면 아기를 낳아도 되겠어, 생각하는 사람 같지 않나요?\" \"세상 어떤 부모도 미리 완벽하게 준비할 수는 없잖아요.\" \"부모와 아이와의 관계, 그건 만들어 가는 거니까요.\"", "때로는 부모이기에 나약하고, 부모이기에 무너져 내릴 때가 있겠지. 거짓말도 하고, 잘못된 판단도 하겠지. 노아의 전 부모님이 그랬던 것처럼 말이다. 우리가 부모에게 길을 안내해야 할 때도 있을 것이고 어깨를 빌려줘야 하는 상황도 생기겠지. 이 모든 가르침은 바로 가디에게서 비롯되었다. \"저는 쫙 빼입은 정장에 준비된 인사를 외듯이 내뱉는 사람들을 원하는 게 아니에요. 제가 말할 때 아, 그래? 그럼 다른 걸 해 볼까? 말할 수 있는 부모를 원한다고요.\"", "제 말이 그 말이에요. 아이는 절대 실험 대상도 연구 대상도 아닌데, 많은 부모들이 아이를 자신에게 맞추려고 끊임없이 연구하고 실험하잖아요. 여자아이 중에서 프릴 달린 원피스에 반짝이는 애나멜 구두를 싫어하는 아이도 있지 않겠어요? 고작 열살짜리가 억지로 간 발레 학원에서 발끝으로 온몸을 지탱한다고 생각해보세요. 너무 끔찍한 일 아니에요? 덕분에 그 아이는 어른이 되어서도 구두를 신지 못하게 됐죠.", "모두들 얼마나 훌륭한 부모 밑에서 성장했는지 자랑하기에 바빴다. 자신들도 뒤늦게나마 그런 부모가 되는 것이 꿈이라고 말했다. 가족이 없다는 건 불행한 일이니 우리가 따뜻한 가족이 되어 주겠다. 선심 쓰듯이 말했다. 자신이 부모에게 상처받았다는 말은 누구도 하지 않았다. 내 앞에 있는 이 두 사람을 제외하면 말이다.", "노아의 말처럼 우리는 모두 가젤이나 얼룩말, 기린인지도 몰랐다. 부모를 만남과 동시에 뛰고 걷고 말하고 생각할 수 있는 아이들. 그럼에도 오롯이 혼자만의 힘으로 살아가기 버거운, 누군가의 보호가 필요한 아이들. 만약 진짜 인간이 그렇게 태어날 수만 있다면 잠재의식 속에 남아 있는, 그러나 기억할 수 없는 어릴 적 상처나 아픔이 조금은 덜하지 않을까.", "독립이란 성인이 된 자녀가 부모를 떠나 자기 힘으로 살아가는 것이라고 생각했다. 그러나 하나의 말처럼, 어쩌면 부모 역시 자녀로부터 독립할 필요가 있는 건지도 몰랐다. 자녀가 오롯이 자신의 모습으로 살아가는 걸 부모에 대한 배신이 아닌 기쁨으로 여기는 것, 자녀로부터의 진정한 부모 독립 말이다.", "재능은 얼마나 잘하는가에 달려 있는 게 아닌 것 같았다. 절대 멈추지 않는 것, 그게 재능 같았다. 싸우고 다투고 매일같이 상처를 입어도, 그럼에도 불구하고 헤어지지 않는 가족처럼 말이다. 아니, 그건 가족이라는 울타리를 넘어서는 무엇 아닐까.", "하나와 해오름은 명령이 아닌 질문과 반성을 할 수 있는 부모였다. 마음과 마음 사이에 일어나는 마찰로 어려움을 겪게 할 사람들이 아니었다. 하나와 해오름은 자신들의 부모에게서 받은 상처와 문제들을 반복하지 않으려고 노력했다. 그것으로 되었다. 두 사람은 부모 준비가 끝난 사람이었다."]}, {"title": "편집자를 위한 북디자인", "author": "정민영", "genre": "디자인, 미술, 예술", "publisher": "아트북스", "passages": ["책을 읽기란 쉽지 않다. 사람은 한곳에 오래 집중하지 못한다. 내용이 재미없거나 편집에 변화가 없으면 집중력은 현저히 떨어진다. 변덕스런 심리상태에 제동을 걸면서 끝까지 책을 읽게 만들도록 설계된 것이 책의 형식이다. ​", "독서는 정보 입수만을 의미하지 않는다. 그것은 보다 확장된 경험이고, 고유한 경험이며, 따라서 무엇으로도 바꿀 수 없는 경험이다. 책의 물질성을 오감으로 느끼는 독서는 디지털 기술에 의해 대체할 수 없는 또 다른 즐거움을 준다. 서점을 찾고, 다양한 표정의 책들을 살피고, 시선을 사로잡는 책을 만나며, 그 책의 무게와 질감을 느끼고, 보다 깊은 만남에 대한 기대와 함께 책을 사서 나오는 길은 결코 무의미한 수고이거나 고통이 아니다. 지하철이나 카페에 앉아 책을 한 장 한 장 넘기는 일, 인상적인 글귀에 밑줄을 긋거나 페이지를 접는 행위, 다 읽은 책을 뿌듯함과 함께 책장에 꽂아 놓는 일, 그리고 꼽힌 책 등을 보며 간간이 내용을 떠올리는 일이 어떻게 무의미한 낭비일 수 있겠는가? ​", "독자는 '좋은 책'을 구매하기보다 '좋아 보이는 책'을 구매한다. 실제로 책을 읽어보기 전까지는 그것이 좋은 책인지 아닌지는 알 수 없다. 그래서 독자는 '좋아 보이는 책'을 통해 '좋은 책'으로 들어갈 수밖에 없다. '좋은 책'은 '좋아 보이는 책'에 있(을 가능성이 크)다. '좋아 보이는 책'이란 '이 책에는 이러이러한 정보가 담겨 있습니다'가 아니라 '이 책에는 진짜 맛있고 알찬 정보가 담겨 있습니다'라는 점을 화사한 문안과 세련된 디자인으로 암시하는 책을 말한다. 편집자와 디자이너는 더 많은 독자를 포섭하기 위해 매혹적인 구매 단서를 만드는 사람들이다. ​", "관심을 끌어서 그 상품을 안 사고는 못 배길 만큼 가치를 만들고 상점의 진열대에서 다른 제품을 쫓아버리는 것이 제품 디자인의 목표다. 책 한 권의 가치를 돋보이게 해서 판매하는 행위나 콘플레이크 한 봉지를 판매하는 행위나 다를 게 없다. 우리는 되도록 모든 기교와 판매에 관련된 통찰력을 동원해야 한다. 그 모든 것을 우리 쪽에 유리하게 사용해 독자의 구매 습관에 적절히 반응해야 한다. ​", "어떤 책이든 문안 작성이나 디자인은 단순한 내용 소개나 시각화 작업에 그치기보다 한걸음 더 나아가야 한다. 독자의 취향에 맞춰 문안을 작성하고, 디자인해야 하는 것이다. 표지는 책을 위한 공간이 아니라 철저하게 독자를 위한 공간인 탓이다. 편집자는 이를 명심해야 한다. ​", "균형이 결여되면 우리는 시각적·심리적으로 불안하고 초조하게 된다. 그래서 저울추로 균형을 잡듯이 부분과 부분, 부분과 전체 사이를 조율하며 시각상의 균형을 이룬다. 이때 심리적인 안정감과 심미적인 쾌감이 발생한다. 균형은 질서와 안정, 통일감을 갖게 한다. 균형이 잡혀 있다는 것은 자연스럽다는 것을 의미한다. 표지에서도 균형은 기본이다. 내지에서도 안정을 추구하기는 마찬가지다. 균형 잡힌 디자인은 독자에게 심리적인 편안함은 물론 긍정적인 효과를 내게 한다. ​", "독자는 책을 쓴 저자가 궁금하면, 앞날개에 위치한 저자 사진과 약력을 찾아보게 된다. 독자가 약력을 본다는 것은 관심이 있다는 뜻이다. 독자를 잡을 수 있는 또 한 번의 기회다. 이런 기회를 놓치면 안 된다. ​", "뒤표지에도 균형을 잡아주는 저울추가 있다. 바로 한 덩어리로 편집되는 국제표준도서번호(ISBN)와 바코드가 그것이다. 책의 가격도 이들 근처에 함께 배치한다. 이 ISBN과 바코드가 뒤표지의 조형적인 완성도에 적잖이 영향력을 행사한다. 그 존재감을 확인하고 싶다면, 상상으로 ISBN과 바코드를 빼거나 움직여보면 된다. 절대로 생략할 수 없는 아이콘이 ISBN과 바코드인 탓에, 디자이너는 이를 북디자인 요소로 적극 활용한다. 표지에서 ISBN과 바코드, 출판사 로고는 어쩔 수 없이 덧붙여야 하는 무익한 존재가 아니다. 표지의 완성도에 결정적인 영향을 끼치는 '주연급 조연'이다. ​", "표지는 '한방'에 승부를 거는 지면이다. 한 공간에 모든 것이 표현되고 감지되는 그림처럼, 표지는 갖가지 디자인 요소가 보이는 순간 인지되고 읽혀야 한다. 이런 표지는 이중적인 공간이다. 공간적이면서 시간적이다. 공간적이라 함은 '보기'와 관련되고, 시간적이라 함은 '읽기'와 관련된다. 표지는 보면서 읽는 기능이 극대화된 공간이다. 독자는 전체적인 이미지를 파악하면서 세부를 읽는다. ​", "인간은 좌우대칭에서 편안함과 안정감을 느낀다. 그림의 구도 중에서 '삼각형구도'가 안정감을 상징하는 것도 이 때문이다. 세상 만물은 좌우대칭이 기본이다. 좌우대칭은 균형 잡힌 상태, 고요하고 정적인, 안정된 분위기와 통한다. 고풍스럽거나 질서정연하고 세련된 우아함을 연상시킨다. ​", "인간의 지각 과정은 순차적이기 때문에 너무 많은 정보가 한꺼번에 주어지면 판단력이 정지되거나 그 상황을 기피해버린다. 따라서 지면 디자인은 피라미드처럼 관리되고 조절된 하나의 큰 계급구조 속에서 각각의 요소들은 다른 요소들을 지배하거나 다른 요소들에 종속되면서 서로간의 위계적 관계가 아무 갈등 없이 차등적으로 설정되어야 한다. ​", "표지는 선형적인 공간이자 비선형적인 공간이기도 하다. 선형적이란 독자가 글을 읽을 때처럼 순서대로 읽는 것을 말하고, 비선형적이란 공간예술인 그림처럼 이미지가 한꺼번에 인지되는 것을 뜻한다. 표지는 전체가 한꺼번에 인지되는 가운데, 문안을 읽게 만든다. ​", "타이포그래피는 원래 활자를 의미하는 '타입 type'과 그래픽적 형태로 무엇인가를 표현하거나 기록하는 방법을 의미하는 '그래프 graphy'의 합성어다. 표지의 실세는 서체다. 표지는 서체로 시작해서 서체로 끝난다고 해도 과언이 아니다. 내용이 서체로 이미지화 한 타이포그래피의 무대가 표지다. 이미지는 생략할 수 있지만 서체는 생략할 수 없다. ​", "서체에는 두 가지 기능이 있다. 읽는 것과 보는 것, 즉 정보성과 장식성이다. 정보성은 내용을 전하는, 읽는 대상으로서의 서체를 말하고, 장식성은 보는 대상으로서의 서체를 말한다. 일반적으로 표지의 제목 서체에는 이 두 기능이 적절히 균형을 취하고 있다. ​", "디자이너는 표지 그림을 사용했을 때, 제목을 배치할 만한 여백이 있는지, 그림의 이미지가 어떤 방향을 취하고 있는지 여부를 판단하게 된다. 만약 제목을 배치할 여백이 없다면, 어떻게 그림의 이미지를 비집고 들어가서 서체를 배치할 것인가를 고민해야 한다. 그림은 이미 구현된 이미지인 만큼 디자인할 때 운신의 폭이 좁아진다. ​", "책은 독자의 행동을 통제하기 위해 심리적으로 가장 적합하게 설계된 물건이다. 사람들이 밝은 곳에서 어두운 곳으로 들어갈 때 적응시간이 필요한 것처럼 독자는 본문에 진입하기 전에 마음의 준비를 한다. 내지의 첫페이지부터 본문 전까지의 요소를 일컫는 권두는 본격적인 독서에 들어가기 전에 마음의 준비를 하는 곳이다. 그래서 앞 면지와 본문 사이에 위치한다. ​", "책은 읽는 매체라기보다 경험하는 매체다. 독자는 저자가 완성한 원고를 내용에 맞게 편집 디자인한 책을 만지고, 보고, 느끼면서 읽는다. 그런데 '읽기'만 강조되다 보니 독서 과정에 동원되는 다른 감각은 무시된다. 읽기를 통한 내용 전달은 책의 중요한 기능이지만 내용 전달이 책의 전부는 아니다. 의식적으로든 무의식적으로든 책은 보고 만지면서 느끼게 된다. 모든 감각이 동원되는 것이다. 그런 의미에서 북디자인은 원고를 미적으로 체험하게 만드는 조형 활동이기도 하다. ​", "독서를 할 때 우리의 시선은 왼쪽에서 오른쪽으로 움직인다. 펼침면 상태로 보면, 자연스럽게 시선이 닿는 '지면의 양지'는 오른쪽이 되고, 시선이 스쳐가는 '지면의 음지'는 왼쪽이 된다. 이는 책을 펼치는 모습에서도 알 수 있다. 그러니까 오른쪽 지면이 평편한 꼴로 바닥에 놓여 있는데 비해, 왼쪽 지면은 책을 펼치는 과정에서 약간 둥글게 접힐 수밖에 없어서, 시선이 스쳐간다. 새로운 '장'이 시작될 때, 첫 페이지를 왼쪽에 두지 않는 것은 지면의 이 같은 체형 때문이다. 따라서 왼쪽을 첫 페이지로 삼는 것은 자칫 뜨내기 손님이 많은 곳에 가게를 차리는 것처럼 어리석은 일이다. 설령 왼쪽이 백면으로 남을지라도, 시선이 머무는 오른쪽에 새로운 장의 속표제면을 설치하는 것이 현명하다. ​", "디자이너는 새 원고를 디자인할 때, 형식을 통일해야 하는 시리즈가 아니라면 이전 디자인을 반복하지 않는다. 주어진 소스를 조합해서 미묘한 차이로 수많은 표정의 판면을 연출한다. ​", "흔히 발문은 본문에서 독자의 호기심을 끌만한 내용을 발췌해서 큰 서체로 두드러지게 배치한 문구를 말한다. 책을 다 읽지 않더라도 발문만으로 내용을 예상할 수 있다. 발문은 본래 '발췌문'의 줄임말로서, 책이나 글 등에서 필요하거나 중요한 부분만을 가려서 뽑은 글을 일컫는다. 이는 본래 잡지의 편집 기법이었다. 잡지에서 특정 기사로 독자의 관심을 유도하기 위해, 기억될 만한 문장을 일부 발췌하여 크게 배치한 것이다. 이것을 단행본이 벤치마킹한 셈이다. ​", "여백은 형태에 대응하는 또 하나의 형태다. ​", "어쩌면 본문 디자인은 텍스트와의 싸움이 아니라 텍스트 주변에 여백을 어떻게 확보하느냐와의 싸움일 수 있다. 텍스트는 여백의 크기와 체형에 따라 시원한 느낌을 줄 수도 있고, 답답한 느낌을 줄 수도 있다. 음식물이 접시의 여백으로 미적인 쾌감을 주거나 접시의 실용성으로 무감동을 줄 수 있듯이. 그동안 텍스트를 중심으로 지면을 봤다면, 한 번쯤 여백을 중심으로 텍스트와 지면을 볼 일이다. ​", "판면은 '대체로' 지면의 안쪽 여백을 바깥쪽보다 넓게 잡고, 위쪽보다는 아래쪽의 여백을 넓게 잡는 편이다. 아래쪽에 쪽표제와 쪽수가 있다고는 하나 여백을 넓게 잡아서 지면을 시원하게 연출한다. 만약 위쪽과 아래쪽, 바깥쪽과 안쪽에 조성된 여백의 크기가 비슷하다면 지면은 어떨까? 십중팔구는 변화가 없어서 답답한 느낌을 줄 것이다. ​", "도판은 지면의 어느 쪽에 배치하는 것이 좋을까? 지면을 상하로 나눈다면, 위쪽이다. 이미 다른 꼭지에서 말했듯이 시선의 흐름 때문이다. 독자는 무의식중에 지면의 위쪽부터 본다. 시선은 위쪽에서 아래쪽으로 흐른다. 도판이 위쪽에 배치되어 있으면 안정감을 준다. 반대로 도판이 아래쪽에 있으면 어떨까? 전체 하중이 아래쪽으로 실리게 되고 지면은 무거워진다. 아래쪽에 시선이 머무는 시간은 노루 꼬리처럼 짧다. 자세히 보기보다 슬쩍 보고 다음 페이지로 넘어간다. 그러므로 아래쪽에 배치된 도판은 주목도 면에서 위쪽보다 불리하다. 펼침면 상태에서 왼쪽 페이지의 아래쪽에 배치된 도판은 왼쪽과 오른쪽 페이지 사이에 끼어 있는 꼴이 된다. 오른쪽 페이지 아래 쪽에 배치된 도판 역시 위쪽의 텍스트와 다음 페이지 사이에 끼어 있는 꼴이 된다. 마치 도판이 텍스트 아래 매달린 형식이다. 이럴 경우 독자는 텍스트의 흐름을 끊지 않으려고 도판을 스쳐지나 다음 페이지로 서둘러 넘긴다. 반면에 지면 위쪽에 도판이 놓이면 주목성이 높아지고 텍스트와의 관계도 끈끈하게 유지된다. 이처럼 도판의 위치가 위쪽이냐 아래쪽이냐에 따라 독자의 심리에는 미묘하지만 큰 차이가 생긴다. 이런 심리를 염두에 두고 도판 디자인을 살펴보면 도움이 된다. ​", "인쇄발이 잘 받는 아트지는 원본에 도판의 색상을 맞추면 되지만 잉크 흡수율이 큰 모조지는 조금 진하게 인쇄하는 게 낫다. 모조지는 잉크가 건조되며 인쇄할 때보다 색감이 약간 떨어지는 탓이다. 색이 연해서 빛바랜 듯한 도판보다는 약간 진한 게 좋은 인상을 준다. ​", "도판의 중요성은 독자가 서점에서 책을 접하는 순서를 보면 알 수 있다. 독자는 책을 볼 때, 텍스트보다는 도판을 중심으로 책의 전체 표정을 살핀다. 그리고 텍스트를 검토한다. 반면에 편집자는 도판보다 텍스트를 중심으로 작업한다. 독자와 편집자가 책을 대하는 순서는 정반대다. 문제는 여기서 발생한다. 텍스트 중심주의에 빠진 편집자는 자칫 도판을 가볍게 대할 수 있다. 중요한 것은 내용이므로, 시각적인 정보에 소홀해지는 것이다. 그래서는 안 된다. 부단히 독자의 입장에서 책을 보고 편집하는 자세가 필요하다. ​", "디자인의 질을 좌우하는 것은 아주 작은 차이들이다. 여백과 간기면의 폭, 쪽표제와 본문의 간격, 도판의 위치와 도판 설명의 범위 등 미묘한 차이가 본문을 아름답게 하거나 평범하게 만든다. 책의 표정은 독자의 마음을 디자인한다. 원고는 저마다의 표정이 있어서, 내용과 더불어 기분 좋은 지면 디자인이 있는가 하면, 내용에 비해 불편한 지면 디자인이 있다. 작은 차이가 조화롭게 어우러지는 가운데 지면은 조형적으로 단단해지고, 크고 작은 차이를 만드는 디테일을 놓치면 디자인은 허술해진다. 좋은 디자인은 디테일이 살아 있다. 디테일은 판면과 여백의 폭, 판면과 쪽 표제의 간격 등 다른 요소와의 관계에서 조율된다. 무엇보다도 전체적인 조화가 중요하다. 편집자는 디테일에 주목하고 전체 디자인과의 조화를 살필 필요가 있다. ​", "약표제-표제-머리말-차례는 스냅사진처럼 각 지면이 완결된 형태로 연결된다. 따라서 독자는 순간순간 멈춰서 각 지면의 짜임새 있는 조형미를 감상하게 된다. (권두는 읽는 기능보다 상대적으로, 보는 기능이 크다) 반면에 본문은 동영상처럼 텍스트가 계속 이어지는 탓에 스냅사진처럼 감상하기에는 무리가 있다. 하나의 연속된 이미지로 다가오고 일정한 내용으로 각인된다."]}, {"title": "하필 책이 좋아서", "author": "김동신, 신연선, 정세랑", "genre": "에세이", "publisher": "북노마드", "passages": ["꾸준히 걸어왔지만 남은 길도 많은 상태에서 방향을 가늠하는 이야기를, 그다지 무겁지 않게 해보고 싶었다. 하필 책을 지나치게 사랑하여, 직업으로 삼게 된 이들의 여전한 애정과 가끔 찾아오는 머뭇거림에 대해서 드문드문 나누는 말들을 담아보았다. 분석이라기보다는 빠른 미디어의 시대에 가장 느린 미디어를 만들고 있는 사람들의 마음 표면에 천천히 떠오른 질문들을 모은 것에 가까운 것이다. 그 말들은 출판계 안쪽을 향하기도, 바깥쪽을 향하기도 한다.", "책은 느린 매체이지만, 그럼에도 가장 첨예한 생각들을 담는다. 첨예함은 때로 폭력적인 이들의 주의를 끌고 만다. 상상하기 싫은 사람들이 상상하기 싫은 일들을 저지르려 할 때, 더 준비되어 있어야 하지 않을까?", "언어를 다루는 업계에서 폭언은 변명의 여지가 없고 환경을 개선해야 할 때 감정만 폭발시키는 것은 부끄러운 일이다. 사수가 단계별로 경험을 전수할 수 없다면 명확한 메뉴얼이라도 정리되어 있어야 하는데 매뉴얼이 갖춰진 곳보다 갖춰지지 않은 곳이 훨씬 많을 것이다. 메뉴얼의 부재는 잦은 구성원 교체의 결과일 수도 있고 원인일 수도 있겠다는 생각이 든다.", "누구든 표현의 욕구가 있다면 자기 삶에 대해, 일에 대해, 현실에서 가깝고 먼 허구에 대해 마음껏 쓰는 쪽이 좋지 않은가? 매일매일 책에 대해서 생각하는 사람들이 결국 자신만의 책을 쓰게 되는 것은 자연스러운 일이다.", "디자인 일을 해온 동안 사람들 앞에서 디자이너로서 말을 할 기회가 몇 번 있었다. 그런 자리를 제안해주신 분도 들으러 와주신 분들도 내가 하는 말을 듣기 위해 시간을 내보겠다고 생각해준 것이니 무척 감사한 일이다. 그래도 언제나 쉽지 않은 자리다. 생각만 해오던 것을 사람들이 들음 직하게 표현하려면 글을 쓰고 적절한 이미지를 만들고 평소보다 목소리를 키워서 말도 해야 하니까. 힘들지만 평소 머릿속에 흐릿하게 있던 것을 읽히고 보이는 또렷한 형태로 꺼낼 수 있다는 점에서 생각을 정리하는 좋은 계기이기도 하다.", "클래식 음악은 몇 백 년 전에 결정된 곡을 반복해서 해석해온 장르이기 때문에 다른 음악 장르보다 \"감상의 단위가 매우 세밀\"하다. 그 단위에는 소리의 속도와 음량, 질감 등 미세한 부분까지 포함되는데, 때문에 모든 곡은 연주라는 행위에 의해 해석되고 표현되어 이 모든 변수가 실제화한 다음에야 비로소 '음악'이 된다는 듯했다. 이런한 음악을 북디자인과 비슷하다고 느꼈던 것은 둘다 오래전에 결정된 형식의 반복과 변주를 지속해왔다는 부분 때문이었다. 물론 책의 역사에도 기술의 발명과 시간의 흐름에 따라 많은 변화가 있었고, 때로는 변주라는 말만으로 설명하기에는 부족한 혁신과 비약의 순간들도 있었지만 그 결과로 빚어진 차이는 관심을 기울여 살펴보지 않는 이상 좀처럼 감지하기 힘들다. 그리고 이 점 또한 두 분야가 비슷하게 느껴졌다. 그러나 한 분야를 들여다보는 시간이 쌓이면 재능이나 감식안의 유무와 상관없이 누구든 전에는 보이지 않던 부분을 볼 수 있게 되는 법이다. 이 글에서는 북디자이너로서 나에게 흥미롭게 느껴지는 디테일과 거기서 최근에 일어나고 있는 작은 변화에 대해 이야기하려고 한다.", "특별한 의도가 있는 것이 아닌 이상 잘 디자인된 지면 위에는 글자들을 반듯하게 정리할 기준이 되는 보이지 않는 축이 존재하게 된다. 이 축의 위치에 따라 왼끝맞춤, 가운데맞춤, 오른끝맞춤, 양끝맞춤 등으로 정렬의 종류가 나뉜다.", "왼끝맞춤과 양끝맞춤 간이 논쟁은 20세기 초 유럽에서 시작되었다. 둘의 관계에서 '대세'이자 표준의 자리에 있었던 것은 양끝맞춤으로, 왼끝맞춤은 양끝맞춤의 단점이 극복된 새로운 시대에 어울리는 합리적 형태로서 제시되었다. 왼쪽맞춤 지지자들이 주장한 왼쪽맞춤의 장점은 다음과 같다. 첫째, 양끝맞춤은 동일한 글줄 길이를 달성해야 한다는 목적으로 단어들을 양쪽 축에 붙이기 위해 억지로 잡아 늘려서 글자 사이 간격이 고르지 않다. 그러나 왼끝맞춤은 한 줄에 속한 단어들의 길이에 따라 문장의 길이가 자연스럽게 달라지므로 글자 사이 간격이 고르다. 둘째, 단어를 중간에서 끊지 않아 글의 의미를 손상시키지 않는다", "표지 타이포그래피에서도 정렬은 기본적인 작업이긴 하지만 본문에서처럼 호불호가 첨예한 안건은 아니다. 일종의 광고 역할을 겸하는 지면으로서 조형적 실험이 권장되기도 하고, 단 한 페이지이기 때문에 가독성에 대한 요구가 본문에 비해 상대적으로 적기 때문일 것이다. 여기에 더해 표지 타이포그래피에서는 애초에 본문만큼 '정렬되었음'이 드러나기 쉽지 않다는 점을 들고 싶다. 본문에서는 페이지당 적게는 17행, 많으면 28행 정도의 글줄이 하나의 축을 기준으로 도열해 있지만 표지의 글줄 수는 짧으면 2행, 많아도 10행을 넘지 않는 것이 보통이다. 마치 지지자가 적은 정치인은 권위를 갖기 어려운 것처럼 따르는 글줄이 적은 기준선은 하나의 축으로서 확고하게 인지되기 힘들 수밖에 없다. 물론 여기에도 경향성이라고 부를 만한 것은 있다. 일단 이제까지 언급되지 않았던 가운데맞춤이 이 영역의 전통적 강자다. 가운데맞춤은 다음과 같이 정의된다. \"글줄 가운데에 맞추어 글줄을 배열하는 문자 정렬 방식. 글줄의 가운데를 중심으로 양쪽 끝이 대칭을 이루어 위엄 있고 우아한 느낌을 준다.\" 이러한 예는 라틴 알파벳 문화권 도서 표지에서 흔히 찾아볼 수 있는데, 글자들을 가운데 축을 기준으로 행을 바꿔가며 배치한 결과 글상자의 윤곽이 유려한 곡선을 그리며 우아한 분위기를 만든다. 축은 이 모든 요소를 중심에서 지지하는 뼈대로서 지면 전체에 수직적 구도를 형성하며 그 존재감을 뽐낸다. 그러나 모든 가운데맞춤이 위엄과 우아함의 장식적 효과를 의도하고 선택되는 것은 아니다. 표지 요소 배치의 관습적 원칙 - 중요한 건 크게, 덜 중요한 건 작게 - 을 따를 때 가장 손쉽게 정리되어 보일 수 있는 방식이기 때문에 결과적으로 가운데맞춤이 되어버린 경우도 많다. 이런 상황에서는 축의 존재는 물론이고 심지어 같은 이유로 왼끝맞춤이 되어버렸다 한들 누구도 그런 선택의 당위를 묻지 않는다. 그 선택이 표지 전체의 미적 완성도를 좌우할 핵심적 사안이 아니기 때문이다.", "그림 3은 왼끝맞춤 다단정렬을 여러 세부 조절을 통해서 흥미롭게 만든 예시다. 제목과 저자 사이에 극단적인 크기 차를 두는 대신 한글 제목, 영어 제목, 저자명으로 구성된 세 가지 덩어리에 비교적 균등한 위상을 부여함으로써 관습적인 느낌을 피했다. 또한 글자가 화면 위쪽에서 위에서 아래로 흐르는 일반적인 진행과는 반대로 아래에서 위로 세 개의 축을 따라 계단을 올라가듯 배치되었으며, 전체적인 무게중심도 지면 아래쪽에 있다. 정렬축이 가시적으로 드러나 시각 요소로 활용되고 있는데, 표지 전체에 강렬한 수직적 긴장감을 자아내는 한편 '수용소'라는 작품 제목을 직관적으로 표현하고 있다. 그림 4의 표지도 그림 3처럼 축이 시각적 요소로서 직접적으로 사용되고 있다. 눈에 잘 띄는 것이 중요한 한글 텍스트는 지면 상단에 왼끝맞춤으로 안정적으로 배치했다면, 영어 원제는 부제와 함께 지면 중간 아래쪽에 가운데맞춤으로 배치되어 장식적인 효과를 더한다. 파란색 직사각형으로 표시된 축이 바탕의 그림을 가로지르면서 지면에 경쾌한 강조점을 만들어낸다.", "복수의 축을 기준으로 하는 가운데맞춤도 흥미로운 레이아웃 방식이다. 앞서 말했다시피 가운데맞춤이 장엄한 우아함을 풍길 수 있는 것은 중앙의 수직축이 지면의 유일한 축으로서 권위를 갖기 때문이기도 하다. 그러한 가운데 맞춤의 축이 한 지면에 둘 이상 동시에 존재하게 되면 변칙적인 느낌이 든다.", "신체와 관련된 책의 세부 명칭 가운데 가장 절묘하다고 생각하는 것은 책등이다. 등에는 인체를 지탱하는 기둥인 척추가 있기 때문이다. 코덱스의 구조적 정수가 종이를 엮었다는 점인 만큼 엮인 부분들이 모여 만들어진 면을 등이라고 일컫는 것이 퍽 적절하게 들린다. 영어권에서는 직접적으로 spine이라고 부르는데, 실제로 노출 바인딩으로 제작한 책에서 표지를 입히지 않은 책등을 보면 종이 묶음을 실로 엮은 모습이 뼈마디와 닮아 보이기도 한다.", "로고를 미워하던 시절이 있었다. 그것은 통제할 수 없는 대상이었기 때문이다. 디자인의 실행은 내가 만든 형태, 내가 고른 색깔, 내가 선택한 글자가 내가 세운 질서에 따라 비어 있던 지면을 채우면서 존재하지 않았던 하나의 이미지를 있도록 하는 과정이기도 하고, 이 순간 느껴지는 감정 가운데 모종의 전능감이 없다고 한다면 거짓말이다. 그러나 로고는 디자이너의 개입 이전에 이 책에 태생적으로 주어져 있는 것이다. 내가 만들지도 선택하지도 않은 이 조그만 아이콘은 디자이너의 얄팍한 뿌듯함에 쉽게 균열을 냈다. 로고가 표지 안으로 들어오면 요소들 사이에 흐르던 긴장감이 맥없이 풀리면서 아까까지는 썩 괜찮았던 표지가 순식간에 진부하게 바뀌어버리는 것만 같았다. 그렇다고 넣지 않을 수 없었다. 자본이 자신에 기반하여 만들어진 사물에 지울 수 없는 인을 찍어 넣는 것이 로고의 본질이니까 이 위력에 반항해보겠다며 이런저런 시도를 했던 몇 년이 있었다.", "로고는 기업이나 상표를 상징하는 이미지인 심벌마크, 기업과 상표를 나타내는 글자를 디자인한 로고타입, 로고타입처럼 글자만으로 구성됐으나 심벌 역할을 겸할 수 있도록 이미지 성격이 강하게 디자인된 워드마크를 포괄하는 개념이다.", "이 시기 탈네모틀 담론을 추동한 것은 합리성, 경제성, 추상성으로 상징되는 근대화를 향한 열망과 한국 고유의 시각 문화를 만들겠다는 민족주의적 의지였다. 전자를 뒷받침하는 근거는 다음과 같았다. 첫째, 네모틀 폰트를 만들려면 최소 2,350자를 그려야 하지만 탈네모틀에서는 최소 67개의 자모만 그려도 폰트 한 벌을 만들 수 있다. 둘째, 파일 용량이 적고 기술적 대응에 용이하다. 셋째, 글자별 형태 차이가 커서 판독성이 좋다. 후자에 대해서는 탈네모틀이야말로 초성, 중성, 종성을 모아서 한 글자를 구성하는 위대한 한글 창제의 원리를 온전히 살린 것이라는 점이 강조되는데, 이때 네모틀은 일종의 안타고니스트로서 중국 문화의 잔재이자 한글의 본성을 억압하는 질곡으로 규정된다. 이처럼 선명한 의도를 갖고 디자인된 탈네모틀 글꼴은 당시에는 낯설고 읽기 힘든 서체로 받아들여졌다. 그러나 동시에 바로 그 점이 어떤 층에서는 새롭고 전위적인 디자인의 증거로 여겨질 수 있는바, 1980, 90년대 막 시작하는 지적 야심이 넘치는 출판사라면 자신들의 시각적 상징으로 탈네모틀 글꼴을 선택했으리라고 상상해볼 법하다.", "이제까지 말한 로고타입들이 여전히 텍스트성이 강했다면, 아래의 사례들은 좀 더 워드마크에 더 가까워졌다. 자모들을 원소적 도형의 형태로 환원시켜 다양한 기준선에 맞춰 정렬하거나 모아쓰기 원리를 자유롭게 변주해서 율동감과 주목성을 얻고자 한 디자인들이다. 하나 이상의 기준선을 갖는 로고타입들. 중성 윗선이나 초성 중심선을 기준으로 하되 중성의 밑선이나 중심선을 함께 기준선으로 쓰기도 한다. 정렬을 맞추면서도 한 두 글자는 기준선에서 어긋나도록 상하로 크게 움직여 리듬감을 살렸다. 기로쓰기 정렬에서 벗어나 글자를 상하좌우로 자유롭게 조합했다. 낱자의 기하학적 특성이 더 강해진다.", "이 유형에서는 위의 사례에서 보이던 이미지성이 보다 극대화되었다. 한글 자모를 기하학적 원소로 추상화하는 데에서 더 나아가 쓰기의 원칙과 무관한 조형적 의지로 획과 낱자의 형태를 과감하게 변형한다. 바탕체와 손멋글꼴을 사용한 로고의 비중은 낮은 편이었다. 이 중에서도 기성 폰트에 기반한 바탕체 로고타입은 더욱 적었다. 가는 획과 섬세한 부리가 특징인 바탕체는 회사를 대표하는 이미지로 삼기에 다소 약하게 보일 수 있다고 생각한 것이 아닐까 추측한다. 로고타입을 영문으로 만드는 경우는 많지 않았으나 조금씩 늘어나는 추세다. 한글에 비해 낱자의 구조가 단순해서 그래픽적 변형을 가하기 유리하다는 장점이 있다. 조사 결과 200개 출판사 중 과반수 이상이 탈네모틀 돋움체를 로고타입으로 사용하고 있었다. 부리가 있는 바탕체보다 조형적으로 해석하기에 더 간편한 데다 또렷하고 합릭적인 인상이 강한 주목도를 지향하는 로고타입의 특성에 잘 부합하기 때문일 것이다. 그러나 로고의 목적 가운데에는 다른 회사와는 차별된 자신만의 이미지를 시장에 각인시키는 것도 있다. 명백한 주류 디자인의 존재를 가늠할 수 있는 지금과 같은 상황은 어찌 보면 역설적이라고도 할 수 있겠다.", "많은 출판인들이 독자가 무엇을 좋아하는지 궁금해하고 어떻게 해야 그들이 좋아할지 고민하는 모습을 보아왔지만, 개인적으로는 독자에 대해 불가지론에 가까운 입장을 갖고 있었다. 디자인에 대한 호오라는 것이 사람마다 너무나 다르기 때문에 특정한 경향을 예상하고 따라간다는 것이 가능하지 않게 느껴졌기 때문이다.", "북디자인은 텍스트나 이미지를 책이라는 매체로 구축하는 일이다. 특수한 경우가 아닌 이상 책으로 만들 내용은 디자인보다 먼저 존재하며 내용을 만든 사람과 디자이너는 별개의 인물이다. 이와 같은 선후 관계의 존재는 북디자인을 작가/내용 대 디자이너/형식이라는 이분법적 대립 구도로 설명하기 쉽게 한다. 현장에서 이 디자인이 좋은 디자인인지 나쁜 디자인인지, 형식이 내용에 얼마나 잘 부합하는지 판가름할 수 있는 누구나 동의할 수 있는 하나의 기준을 만들기는 어렵다. 지금 눈앞에 있는, 혹은 메일창 너머에 존재하는 편집자와 그의 상급자, 출판사의 대표, 그리고 작가라는 구체적인 개인들이 제각기 지닌 잣대의 충돌이 있을 뿐이다. 이러한 다양한 입장들이 디자이너가 만들어낸 시안을 두고 경합한 끝에 최종 디자인에 다다른다. 이것이 어떠한 디자인도 가치를 판단할 수 없으며 오직 취향의 다름만 있을 뿐이라는 뜻은 아니다. 한 권의 책을 만드는 낱낱의 사건들 속에서 기준이 적용되는 방식을 말한 것이다. 디자인의 판단은 사람들 간의 관계라는 형태로 작동하므로 관계 속에 존재하는 권력의 문제가 개입될 수 밖에 없다. 그리고 이 관계에서 더 많은 힘을 지닌 사람은 자본과 텍스트를 소유한 사람, 남성들일 때가 많다. 이들의 의견은 개인의 호불호를 넘어 객관적이고 보편적인 가치, 이를테면 내용에의 적합성과 가독성, 그리고 시장 트렌드와 자주 동일시된다.", "책표지는 자주 얼굴에 비유된다. 만약 이 얼굴에 성별이 있다면 그것은 여성일 것이다. 요즘 표지 디자인의 스타일이나 유행이 '여성적'이라는 게 아니다. 표지-얼굴이 처한 상황이 여성의 그것과 닮았다. 호감이 가야 하고, 항상 웃어야 하고, 예쁘면 가장 좋은, 손쉬운 평가의 대상이 되는 얼굴. 꾸미면 화장이 너무 진하다고 훈계를 듣고 때로는 얼굴보단 마음이 고운 게 진짜 예쁜 거라며 칭찬을 듣는 존재. 너무나 익숙한 말들이다.", "가장 아름다운 것을 고르는 일은 정치적인 행위이기도 하다. 인간 사회에서 강한 영향력을 지닌 아름다움이라는 가치의 분배에 적극적으로 개입하는 일이기 때문이다. 예컨대 우리 집에서 가장 아름다운 식물을 정하는 일이라면 즐거운 대화로 결론에 이를 수 있겠지만 국가 정도로 규모가 커지면 갑론을박을 피하기 어렵다. 선택의 결과가 어떤 식으로든 구성원의 삶에 영향을 미치게 되니 당연하다. 한편으로 다양한 의견이 나온다는 것은 사회의 건강함을 드러내는 지표이기도 하다. 조용한 조직, 한 가지 목소리만 크게 들리는 사회는 위험하다.", "이제까지 책 디자인은 텍스트를 기준 삼아 가치를 평가받는 경향 - 내용을 얼마나 잘 반영하는가, 가독성이 얼마나 좋은가 등 - 이 강했고, 이것은 텍스트와 디자인의 관계에 대한 심도 있는 논의로 확장되기보다는 결과적으로 디자인을 가장 관습적인 형태로 수렴시키려는 힘으로 작용해왔다. 그렇기에 북디자인을 하나의 독자적 장르로 자리매김하려는 이 행사가 '내용'이라는 강력한 극점으로부터 멀리 달아나 새로운 극이 존재함을 선언하는 것은 필연적인 선택이었으리라 생각한다.", "그러고 보면 을로 일해야 한다는 말을 하던 사람들은 정작 그럴 수 있을 때에는 언제든 자신이 아니라 상대를 을로 만들어버리곤 했던 것 같다. 어째서 일터에서 위계를 나누고, 상대를 낮은 곳 혹은 높은 곳에 두어야 한단 말인가.", "우리는 필요 이상으로 친절을 베풀어야만 합니다.", "예의바른 태도, 상대를 존중하는 태도, 상대의 인격을 나의 인격과 같은 것으로 여기는 지극한 태도는 어디 소속의 누구, 어떤 경력의 누구같은 라벨보다 훨씬 더 상대를 고유한 한 명의 사람으로 만날 수 있게 한다.", "더 잘 살고 싶어지게 하는 사람, 내가 안전하다고 느낄 수 있게 해주는 사람들을 나는 모두 출판계에서 만났다. 지금 함께 일하고 있는 팟캐스트 책읽아웃의 동료들은 각자가 아주 능력 있는 사람들인 동시에 '저 사람이 뻘소리를 하면 어떡하지' 같은 걱정은 거의 하지 않고 대화를 나눌 수 있는 드문 사람들이다. 출판계 동료들과는 페미니즘, 비거니즘, 노동권과 환경 문제 등의 주제를 기본적인 공감대 아래에서 편하게 의견 나눌 수 있다. 이건 원래 엄청나게 어렵고, 놀라운 일이다. 오래 알고 지낸 친구나 심지어 가족과도 이런 이야기를 할 때면 어딘지 덜컹거리는 것을 느끼지 않나. 아니, 이 주제를 꺼낼 수조차 없을 때가 훨씬 더 많다. 그러니 번번이 놀라게 되는 것이다. 나는 이타심과 공감능력도 키워나가야 할 능력이라고 굳게 믿고 있고, 출판계에는 그런 능력자들이 아주 많아서 자주 기쁘다. 사회에서 일어나는, 출판계에서 일어나는 많은 사건들을 마주하며 느끼는 환멸들로 모든 게 지긋지긋해질 때조차 내가 만난 이 멋진 친구들이 다 내가 책을 사랑하고, 출판을 사랑했기 때문에 만날 수 있었던 존재들이라는 사실을 떠올리면 한없이 안심이 된다.", "공부하는 사람들, 작은 목소리를 들으려는 사람들, 자신의 이야기를 용기 내어 하려는 사람들, 그렇게 서로를 성장시키는 사람들이 여기에 있다. 그런 이유로, 나는 그런 사람들이 모여 있는 곳이라면 이곳이야말로 내가 있어야 할 곳이라고 확신하지 않을 수 없었다.", "도서관이 존재하는 이유는 책의 '공공성'을 사회적으로 공감해서가 아닌가. 돈이 없어도 책을 읽을 수 있는 공간이 시민 모두에게 필요하다는 것을 이해한 사회라면 출판 사업을 보호하기 위한 장치들도 훨씬 다양하게 두어야 한다.", "일에서 가장 중요한 것은 무엇일까. 나는 '자기효능감'이라고 생각한다. 나에게 일을 할 능력이 있다고 믿는 마음. 타인의 기대에 부응할 수 있다는 확신. 이때 자기효능감은 많은 사람의 관심이 집중되는 유명하고 커다란 프로젝트를 해야만 만들어지는 것은 아닌 것 같다. 아무리 하찮게 느껴지는 일도 그 일이 필요한 맥락을 충분히 이해하고 수행한 뒤 끝내 완수하고 나면 차곡차곡 쌓이는 것이 자기효능감이다. 동료와 함께 일할 때 일의 목표와 각자의 역할에 대한 대화를 정확하게 나누는 것이 그래서 중요하다. 그 과정에서 그 일에 참여하는 모든 사람들이 일의 큰 그림을 조망하게 되고, 그 속에 선 자신의 위치를 확인하면서 나만의 목표를 설정할 수 있으니까. 나는 그것이 자기효능감의 첫 발이라고 생각한다.", "'알면 사랑한다'는 말을 늘 좋아하는데 나로 말하자면 책이 가져다준 다양한 세계 덕분에 사랑과 용기를 가진 사람이 되었다고 믿는다. 책과 저자에게서 알게 된 새로운 세계를 '잘' 알고자 하면 그 세계를 이내 사랑하게 되었고, 그 사랑 덕분에 세상에 대한 환멸이 닥쳐올 때도 그것을 물리칠 용기를 갖게 되었다. 나에게 그런 용기를 준 책이 몇 권쯤 있다는 사실이야말로 언제나 가장 큰 용기이고."]}, {"title": "함께 자라기, 애자일로 가는 길", "author": "김창준", "genre": "경제경영", "publisher": "인사이트", "passages": ["무엇이건 실제 바깥세상에 임팩트를 남기려면 혼자 힘으로만 되는 게 없는 것 같습니다. 함께 해야 합니다. 내 주변 사람들과 함께. 내가 매일 부대끼는 동료들과 함께. 하지만 안타깝게도 우리는 함께 보다 각자 하는 것에 익숙하고, 또 그렇게 강요받아 왔습니다. 세상은 함께 해야 뭔가 이룰 수 있는데 왜 우리는 혼자 하는 것만 배울까요. 이번에 잘하냐 못 하냐 하는 것은 그렇게 중요하지 않습니다. 앞으로 기회가 수백, 수천 번 더 있다면 말입니다. 그런 경우 더 중요한 것은 지금 잘하냐가 아니라 지금 자라냐는 것입니다. 실제 바깥세상에서는 한 번의 판가름으로 나의 미래가, 우리의 미래가 갈리는 경우보다는 수백, 수천 번의 누적 위에 서서히 정해지는 경우가 더 많습니다. 하지만 우리는 왜 자라는 것을 훈련할 기회가 별로 없을까요. 그리고 무엇보다 이런 '함께', 그리고 '자라기'를 매일매일 해야 한다는 생각을 별로 하지 못하는 것 같습니다. 한다고 해도 '계속 혼자서 해왔는데 가끔은 한번쯤 함께 해보자', '지금은 바쁘니까 자라기는 나중으로 미루자' 같은 인식 수준에만 머무르는 경우가 많습니다. 하지만 우리가 날마다 함께 자라기를 할 수 있다면 어떨까요?", "사실 저는 경력이 성과와 별 상관이 없다는 것을 넘어서서 오히려 경력이 편향을 주는 잘못된 지표가 될 수 있다고 봅니다. 최소한도의 경력 수준만 넘겼으면 오히려 몇 년 일했는지는 모르는 것이 더 낫다고 생각하고요. 경력은 오히려 경계해야 할 대상 중 하나인 셈이지요.", "1만 시간 법칙을 만든 주인공, 안데쉬 에릭손은 이에 대해 다음과 같이 딱 잘라 말합니다. \"55년 동안 걸었다고 걷는 게 점점 나아지고 있는 건 아닙니다. 자신이 즐기는 걸 한다고 해서 더 뛰어나게 될 것이라고 믿는 것은 미신입니다.\" 그가 말하는 1만 시간 법칙에서 1만 시간은 '자신의 기량을 향상시킬 목적으로 반복적으로 하는 수련'을 한 시간을 일컫습니다. 그런 수련을 의도적 수련이라고 합니다. 그냥 경험이 아니고 매우 특수한 형태의 수련 방법입니다. 애자일 프로젝트에서는 지금 내가 한 행동의 피드백을 10분 후, 한 시간 후, 일주일 후 등 여러 주기를 통해 지속적으로 얻을 수 있습니다. 그리고 그때 저지른 실수는 바로 다음 주기에서 교정할 수 있습니다.", "새로운 것을 유입시키는 데에만 집중하다 보면 새로 들어온 것들이 이미 있는 것들을 덮어버릴 수 있다. 자신이 올해 몇 권을 읽었다고 자랑하지 말고, 내가 그 지식을 얼마나 어떻게 활용했는지 반성하라.", "피드백을 자주 받아라. 사이클 타임을 줄여라. 새로운 정보를 얻었다면 1년 후에 크고 완벽한 실험을 하려고 준비하기보다는 1달, 혹은 1주 후에 작게라도 실험해 보는 것이 좋다. 순환율을 높여라. 일찍, 그리고 자주 실패하라. 실패에서 학습하라.", "동일한 자극/조건이 주어졌을 때 어떤 사람은 더 많은 학습과 성장의 기회를 찾고 오히려 그 조건을 자신에게 유리한 조건으로 생각하기도 하더군요. 지금 자신의 상황 때문에 학습 프레임을 갖는 것이 힘들다는 생각이 든다면, 이 우주 어딘가의 누구는 비슷한 상황 '덕분에' 학습 프레임을 가질 수 있었다고 생각하고 있다고 상상해 보면 어떨까요?", "우리가 주목해야 할 것은 내가 하는 일의 명칭이 뭐냐가 아니라, 내가 실제로 매일 하는 일이 어떤 성격인가 하는 점입니다. 명함에 선임 개발자라고 되어 있다고 안심하면 안 될 것입니다. 자신이 주로 하는 일이 남이 시킨 대로 혼자 프로그램을 만드는 것이라면 그런 스킬과 경력만 계속 쌓일 것입니다. 반면, 컴퓨터화하기 어려운 부분은 크게 성장하지 못하겠죠.", "실력을 개선하려는 동기가 있어야 하고 구체적인 피드백을 적절한 시기에 받아야 한다 단순히 반복만 한다고 해서 달인이 될 수 없습니다.", "타당성 조건이 필요하다는 의미는 직관이 적용되는 영역에 어느 정도 인과관계와 규칙성이 존재해야 한다는 겁니다. 예측가능성이라고 말할 수도 있습니다. 이는 불확실성과는 의미가 다른데, 예컨대 포커 게임 자체는 운이 작용하기 때문에 불확실한 면이 있지만 타당성이 높아서 전문성이 형성될 수 있습니다. 수십 년 동안 한 가지 일을 하면서 전문가가 안 되는 비결이 있다면 이 타당성과 피드백이 부족한 환경에서 일하는 겁니다. 예컨대 복잡한 상황에서 뒤죽박죽으로 일하거나 오늘 실수한 것을 몇 달 뒤에 알거나 혹은 영영 모르거나 하는 환경이겠죠. 따라서 이 두 가지가 전문성의 요체라고 할 수 있겠습니다.", "타당성을 높이려면 변수를 제한하고 실험을 하면서 규칙성과 인과관계를 찾으려는 노력을 하면 됩니다. 피드백을 높이려면 동료나 상사, 고객에게서, 혹은 내가 개발하는 프로그램에서 직접 피드백을 적극적으로 구하면 됩니다. 여러분은 이 두 가지를 높이기 위해 평소에 어떤 노력을 하고 계신가요?", "자신이 업무 시간 중에 불안함이나 지루함을 느끼는 때가 대부분이라면 실력이 도무지 늘지 않는 환경에 있는 겁니다. 더 무서운 건 점차 이런 환경에 익숙해지고 행동이 습관화된다는 점이죠. 그때는 자기 인식도 잘 되지 않습니다.", "튜토리얼을 읽다가도 이 정도면 그 프로그램을 작성할 수 있겠다는 생각이 들면 그 자리에서 읽기를 멈추고 코딩을 시작합니다. 프로그램을 완성하면 잠시 멈췄던 자리로 돌아와서 읽기를 계속합니다. 이 때에는 다음 프로그램을 목표로 두면서 말이죠. 이런 것을 적극적 읽기 라고 합니다. 무언가를 읽을 때 구체적인 질문이나 목적을 가지고 있는 방법을 말합니다.", "유용하면서도 작고 간단한 걸 생각해 내는 것이 앞서의 몰입을 위한 난이도 조절이라고 볼 수 있습니다. 이런 바익을 통해 자신이 튜토리얼을 읽으며 이해한 내용을, 실제로 살아 있는 코드를 수정하고 돌려보고 하는 등 실험하면서 피드백 받을 수 있습니다.", "교육 쪽에는 실수 훈련이라는 개념이 있습니다. 보통 교육에서는 학생들이 실수를 최소화 할 수 있도록 설계합니다. 교육 중에 실수를 적게 해야 실전에서 실수가 적을 거 아니겠냐는 논리죠. 하지만 연구 결과는 반대입니다. 교육 중에 실수를 더 유도해야 오히려 학습 전이가 더 잘 일어납니다. 다양한 실수를 경험하는 걸 격려하고, 실수 사례를 배우고, 실수 시에 어떻게 대처하는가를 가르치는 교육이 더 효과적이라는 연구 결과가 많습니다. 그래서 전문가에게 실수 대처법을 배우는 것이 중요합니다. 불확실한 상황에서 실수는 피할 수 없습니다. 아니 그 상황에서 학습을 잘 하려면 실수를 격려해야 하기도 합니다. 여러분 자신의 실수 문화는 어떤가요? 자신의 실수 문화를 예방해서 관리로 옮겨가려면 어떻게 해야 할까요? 스스로에게 이 질문을 묻는 것이 불확실한 상황에서 학습을 높이기 위한 첫걸음이 될 것입니다.", "아무리 기술적 실천법이라고 해도 그 기술은 사회적 맥락속에서 실천되어야 하며 그 기술의 성공을 위해서는 사회적 자본과 사회적 기술이 함께 필요하다. 하지만 안타깝게도 현실에서는 팀원들이 맘에 안 들고, 그들도 나를 맘에 들어 하지 않는 상황, 즉 사회적 맥락이 나쁜 상황에서 타개책으로 TDD의 기술적 측면에만 매몰되는 경우가 있습니다. 사실 그런 상황에서는 무엇을 골라도 실패가 보장되어 있습니다.", "사회적 기술을 훈련한다는 게 막막하게 느껴지기도 합니다. 그렇다면 지금 당장 개인이 실천할 수 있는 게 있을까요? 간단한 방법은 주변 사람들과 매일 주고받는 마이크로 인터랙션에 신경을 쓰는 겁니다. 그걸 기록하고, 복기하고, 다르게 인터랙션한다고 하면 어떻게 했으면 좋았을까를 생각해 보는 것만으로도 훈련이 될 수 있습니다.", "서로 같은 목표로 일을 하는 팀이 만드는 소음은 그들 사이에서는 더 이상 소음이 아니라고 합니다. 무엇보다도, 조용한 작업환경을 강조하다 보면 자칫 면대면 의사소통을 나쁜 것으로 생각하게 될 수도 있고, 혹은 면대면 의사소통을 귀찮아하는 사람들에게 좋은 핑곗거리를 주는 것일 수도 있습니다. 협력에서 면대면 의사소통의 중요성은 이미 널리 알려져 있지요.", "저는 때로 가독성을 손해보면서까지 중복을 줄이기도 합니다. 객체지향에서 그걸 하다 보면 흥미로운 객체들을 발견합니다. 함수형에서 그렇게 하다 보면 흥미로운 함수와 함수의 함수를 발견합니다. 이 \"흥미로운 무엇\"은 강력합니다. 내가 전에 모르던 것을 배우게 됩니다. 그리고 종종 이것은 프로그래머의 울타리를 넘어서 영향력을 끼치기도 합니다. 고객들의 대화가 바뀔 수도 있습니다. 객체지향을 하면서 흥미로운 객체들을 발견하지 합니다. 애자일이 불확실성을 다루는 방식은 좀 더 짧은 주기로 더 일찍부터 피드백을 받고, 더 다양한 사람으로부터 더 자주 그리고 더 일찍 피드백을 받는 것으로 정리할 수 있습니다.", "우리가 애자일을 도입한 지 얼마 안 되었다. 잘 못 한다. 그런데 어떻게든 프로젝트가 성공적이 되었으면 좋겠다라는 입장이라면 답은? 고객 참여뿐입니다. 이게 안 되면서 다른 것들이랑 씨름하는 것은 두렵고 중요한 것에 대한 회피일 수 있습니다.", "고객 참여란 고객 혹은 고객을 대표하는 사람의 참여입니다. 진정 중요한 것은 프로젝트의 성패를 좌우하는 사람과 최대한 가까운 사람을 참여시키려고 우리가 계속 노력하는 것입니다.", "새 프로젝트를 진행할 때에 우리가 어떤 방법론을 쓰느냐는 문제보다도 누가 참여하는가가 훨씬 더 압도적으로 중요한 문제가 아닐까요? 예를 들어 애자일 방법론 도입을 원하는 팀장이라면 '나는 어떤 팀장인가'를 먼저 자문해봐야 하지 않을까 싶습니다. 내가 어떤 팀장인지가 전혀 바귀지 않으면서 새 방법론만 도입한다고 무슨 효과가 있을까요.", "애자일 방법론을 도입할 때 뭘 해야 할지 명확하게 알려달라고 합니다. 근데 그 모습은 전혀 애자일적이지 않습니다. 찾아가는 모습이 애자일입니다. 어차피 방법론 도입이라는 것이 매우 불확실한 것이기 때문에 정답이 있을 수 없습니다. 이전 경험이 이번에도 정확히 들어 맞는다고 말할 수도 없습니다. 이것은 거의 모든 종류의 방법론 도입에 적용됩니다. 왜냐하면 방법론 도입은 태생적으로 불확실성이 높기 때문입니다. 그럴 대 현명한 전략은 정해진 수순을 따르는 것이 아니라 곁에 있는 사람들과 함께 주변을 탐색하고 조금 나아가고 확인하고를 반복하면서 우리의 현 맥락에 맞는 좋은 전략들을 스스로 만들어 나가는 것이 아닐까 합니다."]}];

  book.passages.forEach(p => {
    ALL.push({ text: p, book });
  });
});
