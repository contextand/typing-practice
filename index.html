", "결정적으로 그 사람이 좋은 게 아니라 그 사람 눈에 비친 내 모습이 참 좋은 사람이라는 사실을 느끼는 거죠. 그때 느끼는 벅참이 있잖아요. 저도 그럴 때 벅참을 느끼는 거 같아요. 함께있기만 해도 나를 좋은 사람으로 느끼게 해주는 사람이 있어요. 그 순간 비로소 '이 사람은 나를 사랑하는 사람이구나' 또는 '나에게 좋은 사람이구나' 하는 감정이 느껴지더라고요.", "야무지고 똑부러지는 모습만 보이게 되는 상대가 있는가 하면 허술하고 실수투성이의 모습만 꺼내게 되는 상대가 있다. 사랑하기에 좋은 사람은, 이 사람과 함께할 때 나의 가장 성숙하고 괜찮은 모습이 나오는 사람이다. 나는 어차피 누구에게도 완벽하거나 객관적으로 설명이 가능한 사람으로 존재할 수 없다. 대상과 상황에 따라 미세하게 달라지기 때문이다. 그러니, 나의 부족한 모습을 끊임없이 비춰주는 사람에게 혹여 '이런 사람이 그래도 나를 발전시켜주겠지'라는 마음에 매여 있지 않았으면 좋겠다.", "사과를 하는 쪽에서는 '미안하다'는 말을 하는 순간 주도권을 갖는 착각을 한다. 물론 사과하는 일은 어렵다. 그렇기 때문인지 '사과한다는 게 얼마나 대단한 건지'에 심취해서 포커스를 상대가 내 사과를 어떻게 받는지에 맞추기 시작한다. '미안하다고 했잖아'라는 말. 이 문장만 봐도 이유도 생각나지 않는 짜증이 밀려오지 않는가?", "나는 '사랑은 마주보는 일이 아니라 같은 곳을 바라보는 일'이라는 말을 좋아한다. 더 정확히는, 마주보며 시작해서 같은 곳을 바라보는 일이라고 생각한다.", "공감은 기억이 아닌 감정에서 나온다. 즉 상황의 싱크로율이 같지 않더라도, 심지어 전혀 겪지 않은 일이라 해도 디테일한 설명이 사람들의 내밀한 기억을 자극해 같은 종류의 감정을 이끌어내는 것이 바로 공감을 사는 일인 것이다. 사람들에게는 저마다의 감정서랍이 있다. 상황에 대한 기억은 흐릿해질지라도, 그때 느낀 감정들은 어딘가에 저장이 된다. 공감에 대한 생각이 바뀐 이후, 내가 겪지 않은 일에도 조금 더 적극적인 위로를 할 수 있을 것 같은 용기가 생겼다.", "사람의 장점보다는 단점을 기가 막히게 캐치해내는 사람들이 있다. 그런 사람들을 보면 쉴 새 없이 자기의 단점을 고백하는 것처럼 보인다. 가급적이면 좋은 걸 더 많이 보는 사람은, 아마도 안에 좋은 게 더 많은 사람일 테다.", "아쉬운 건 다정한 사람들은 말수가 적다는 거다. 말을 하기보다는 듣는 게 익숙한 사람, 누군가를 향한 마음을 풀어헤치기보다는 품어 버릇하는 사람들. 이는 다정한 이들이 가진 특성이다. 굳이, 어딘가에, 나의 마음을 글자로 쓰는 것이 익숙하지 않은 사람들이다. 혹시 악플에 상처받는 이들을 보고 마음이 아파본 적이 있다면, 좀 더 요란스럽게 그들을 보호할 수 있는 말들을 써보기를 부탁한다. 그 한마디가 어쩌면 소중한 그 누군가를 지킬 수 있을 것이라는 희망을 갖고.", "주는 자가 받는 이를 오랫동안 세심히 지켜봐온 시간이 선물 받는 이의 만족도를 좌지우지하듯, 조언도 그렇다. 듣는 이의 성향과 아픈 곳을 헤아려 가장 고운 말이 되어 나올 때야 '조언'이지. 뱉어야 시원한 말은 조언이 아니다. 하물며 몸에 좋다는 쓴 약도 캡슐에 담아 삼키는 마당에, 말에도 그만한 정성은 들여야 할 것이다.", "나는 가끔 세상의 모든 형용사들이 가진 기가 막힌 표현력에 감탄하게 되는데, 이는 주로 발음에서 온다. '반-짝' 하고 말할 때 ㄴ 받침을 부드럽게 도움닫기 삼아 '짝' 하고 내뱉는 발음은 무언가에 빛이 닿아서 튕겨 나오는 모습 그 자체인 것 같고, 찬란하다는 말의 실제 발음인 '찰-란'은 '찰'의 받침 ㄹ과 '란'의 자음 ㄹ이 파도 능선처럼 이어지는 기분이 들어 앞서 비유했던 것처럼 햇살이 닿은 물결의 느낌인 것이다. 게다가 '차-' 하면서 시작되는 첫 음절은 퍼져나가는 빛이 혀에서 구현되는 착각이 들지 않는가.", "우리는 가슴에 잊어야 하지만 도저히 그리 되지 않는 것들을 묻고, 키우고 싶지만 지금은 그럴 수 없는 것들을 품는다.", "명상을 할 때 호흡에 집중하는 것을 초보에게 권하는 이유는, 지금 이 순간, 즉 완벽히 '현재'에 일어나고 있는 일 중에 호흡이 대표적이기 때문이란다. 명상의 목적은 늘 부유하는 잡다한 생각들을 멈추는 데 있다. 이런 생각들 중 대부분은 미세하게라도 과거나 미래에 있다. 다가올 일들에 대한 걱정, 또는 지난 일들에 대한 후회. 참 아이러니하다. 오직 현재로서만 존재할 수 있는 우리인데 정작 생각은 주로 미래나 과거에 갇혀 있으니 말이다. 겪어온 것들(과거)로 인해 생긴 두려움으로 피어오르는 다가올 일(미래)에 대한 걱정. 티벳 승려들처럼 명상의 고수가 아닌 이상, 보통의 사람이라면 떠오르는 생각들을 막을 순 없다. 그럴 땐 가만히 숨을 쉬며 그 생각들을 바라 보라고 한다. 신기한 것은 '걱정을 하고 있는 나'를 인지하는 것만으로 실제로 스트레스가 반은 넘게 사라진다는 거였다. 현재의 나를 객관적으로 바라보는 시간을 갖는 것, 어쩌면 명상은 그걸 위해 하는 걸지도 모른다.", "제가 많은 사람들에게 사랑을 하라고 이야기하는 건 달콤하고 좋아서가 아니라, 자기도 모르는 자기의 내면을, 방치되어 있던 모습들을 다 끄집어낼 수 있는 행위가 바로 사랑이기 때문이에요. 어떤 형태로의 사랑이든 마찬가지예요. 로맨스이든 아니든 사랑은 자기 자신을 누구보다 똑바로 볼 수 있게 하는 행동이라고 생각해요."]}, {"title": "복미영 팬클럽 흥망사", "author": "박지영", "genre": "소설", "publisher": "현대문학", "passages": ["사람에게는 살면서 다른 사람에게 쏟아야 하는 애정의 양이 정해져 있고, 살면서 마주치는 사람들과 최소한의 관계만 맺으며 감정이 깊어지지 않도록 늘 조심하는 복미영에게는 그렇게 사용되지 않은 사람에 대한 애정을 누군가의 팬이 되는 것으로 쏟아내야 할 필요가 있는 건지도 몰랐다.", "복미영은 생각했다. 만들자, 복미영 팬클럽. 내가 복미영의 팬이 되어주자. 까짓것, 팬질 경력만 40년이 넘었다. 그동안 안 해본 팬질이 없었다. 나까짓 것의 팬이라고 못할 게 없었다. 나까짓 것에서 나만 빼면 까짓것이 된다는 것도 좋았다. 까짓것, 나도 팬클럽 하나 가져보자. 그 생각을 하자 갑자기 움츠러든 어깨가 활짝 펴지는 기분이었다. 등을 꼿꼿하게 세우고 턱도 살짝 들어 올리니 시야도 넓어졌다. 시선이 마주친 모든 사람에게 안녕하세요, 좋은 하루 되세요, 감사합니다, 행복하세요, 같은 인사를 당당하게 건네고 싶어졌다. 팬이 생긴다는 건 이런 거구나. 복미영은 다시금 깨달았다. 이렇게 좋은 기운을 남들에게만 퍼주며 살고 있었네. 이제부터는 내가 내 팬이 되어보자.", "나중에 알고 보니 복미영은 늘 그런 식이었다. 경솔하게 제멋대로 행동하고는 제 경솔함에 대해 또 경솔하게 사과를 했는데, 늘 핵심을 빗나갔다. 그 핵심을 빗나간 것, 핵심이 아닌 것, 그것만이 진짜 사과를 주고받을 가치가 있다는 듯이. 혹은 진심으로 사과가 가능한 유일한 영역이란 핵심을 둘러싼 주변적인 것뿐이며 사실 진짜 핵심은 사과를 주고받는 것 자체라는 듯이.", "팬클럽이라니. 하긴 김지은도 연예인을 좋아하던 때가 있었다. 그러나 엄밀히 말하면 그 연예인이 좋다기보다는, 친구들과 무언가를 좋아하고 싫어하는 감정을 공유하는 게 좋았다. 남들이 좋아하는 것을 함께 좋아하고 남들이 싫어하는 것을 함께 싫어하면 또래집단과의 삶이 훨씬 수월해진다는 경험을 통한 깨달음을 실천할 뿐이었다. 김지은에게는 아무 관계없는 누군가를 열정적으로 좋아하거나 일방적인 애정을 쏟는 재능이 부족했다. 그런 건 확실히 재능이었다. 그렇다고 해서 그 재능 없음을 아쉬워해본 적은 없었다. 대신 김지은에게는 좋아하지 않아도 좋아하는 척하는 재능이 있었으니 그것으로 충분했다.", "\"아니, 팬클럽이 있다고 하시니까 궁금해서요. 팬이 있다는 건 어떻든 대단하신 분이라는 건데.\" \"그건 아니고요.\" 복미영이 민망해하며 웃더니 바닥에 떨어진 종이를 주워 추스러며 중얼거렸다. \"제가 실은 좀, 그래요.\" \"좀 그렇다니, 뭐가요?\" \"그게, 유명하지도 않고 대단치도 않아요. 그래서요.\" 한 번에 알아듣게 말을 좀 논리정연하게 하면 안 되나, 답답했으나 김지은은 차분히 기다렸다. 저런 면이 복미영을 그래도 되는 사람으로 만들어주면 그것으로 좋다고 생각하면서. 복미영이 말을 할 듯 말 듯 입술을 달싹거리거나 침이 고인 끈적한 말투로 마저 말했다. \"그러니까 팬클럽이 있으면 좋겠다고 생각했어요.\" 복미영이 들고 있던 종이를 내려놓고 주섬주섬 한쪽에 놓인 땅콩 껍질을 까서 올려놓았다. 모임 전 분홍씨가 직접 볶았다며 가져와 나눠준 거였다. \"위대하지 않으니까요. 그러니까 더 필요하잖아요, 팬클럽 같은 게. 그래서 제가 만들었어요, 복미영 팬클럽.\" 그러더니 껍찔을 깐 땅콩을 그대로 종이에 싸서 건네주고는 가면서 먹어요, 집까지 한참 가야 된다면서요, 하고 덧붙였다. \"팬 서비스예요.\"", "인생이 망하는 건 쉽다. 누군가를 좋아하면 된다. 그냥 좋아하면 안 되고 미친 듯이 좋아하면 된다. 싫어하는 거? 그것도 망하는 지름길이긴 한데, 그래도 좋아하는 것만큼은 아니다. 미움이나 증오, 분노같이 사람을 싫어하는 데 드는 에너지도 만만치 않긴 하지만 사람 좋아하는 데 소모되는 에너지만큼은 아니다. 그러니 인생 빨리 망하고 싶으면 누군가를 죽도록 좋아하면 된다. 그리고 어차피 망할 인생이라면 가장 좋은 건 누군가를 미치도록 좋아해서 망하는 것이다. 그것이 복미영의 생각이었다. 복수는 그런 식으로 진행되어야 한다고. 본인도 모르는 새 좋아하는 것을 좋아하다가 망해버리도록.", "사람들이 선호하지 않는, 기피하는 고된 업무가 있다는 건 좋았다. 그래야 고용 가능성이 높아지는 사람에게는 확실히 그랬다.", "\"그래, 그거 좋다. 그런 말이 있던데. 헤맨 자리 만큼 자신의 땅이 된다고.\" 사실 김지은은 이런 말들에 거부감을 갖는 편이었다. 뭐랄까, 위로하기 위한 명백히 다정한 말들. 이런 말들은 확실히 목적을 가지고 만들어진 분명히 좋은 말들이라 어쩐지 마냥 좋아하면 지는 것 같아서 순순히 받아들이기가 힘들었다. 그토록 꼬여 있었다. 그럼에도 그 말이 주는 위로를 완전히 거부하지는 못했다.", "그것은 부당하다. 아니, 부당하지 않지만 내게는 나쁘다. 내게 나쁜 것은 모두 부당한 것이다. 김지은은 생각했다. 세상이 공평하지 않을 때 이득을 보는 사람인 내게는. 김지은도 한다. 자신이 얼마나 은혜를 모르는 인간인지. 그러나 은혜는 까치나 갚는 것. 자신은 까치가 될 생각이 없다. 화장실 들어갈 때 마음 다르고 나올 때 마음 다르다는 말이 있는 건, 대부분의 사람들이 제 잇속 앞에서 대체로 그렇게 되기 때문이다. 비열하게. 은혜도 모르고.", "처음 은수 이모가 자신에게서 엄마를 분리해줬을 때의 감사 같은 건 이미 잊었다. 감사를 잊는 건 쉬웠다. 평생 그 모든 감사를 안고 산다면 김지은은 한 발자국도 앞으로 나아갈 수 없을 것이다. 감사 안에 머무는 삶과 배은망덕한 채 앞으로 나아가는 삶. 둘 중 선택해야 한다면 김지은은 거듭해서 후자를 선택할 거였다.", "김지은은 그 말, '당사자들은 그런 영화를 찾아보지 않을 텐데요'라는 말을 여러 번 곱씹었다. 곱씹을수록 시고 떫은맛이 났다. ''당사자'라는 말이 그렇게 편협하고 한정적으로 쓰여도 되나. 이 빽빽한 시간과 좁아터진 공간을 공유하는 건 너나 나나 다 마찬가지인데 어떤 사건이나 상황 앞에서 당사자가 아닐 수 있는 사람이 있나, 새삼 궁금해졌고 당사자는 특정한 한 집단만을 가리킨다고 생각하는 어떤 구분과 경계의 바깥에 있는 입장들에 대해서도 골똘히 생각했다.", "사실 김지은은 알고 있었다. 이모, 혹은 더 큰 덩어리로서의 쓸모를 다한 노인 가족 - 혈육의 정이나 돌볼 의무가 상대적으로 가벼운 -, 이제 아무도 쓰지 않는 방 안의 냄새 나는 요강 같은 애물단지를 제때에 제대로 버리려면 무엇이 필요한가. 올바른 정책 수립, 공공의료 시스템, 지역사회의 공동체 의식, 안정된 커뮤니티 케어, 노인과 약자 혐오를 벗어난 포용적 사회 인식, 그런 그럴듯한 말들은 다 필요 없었다. 아니, 정치적이고 사회적인 논의들, 분명 필요하지. 중요하지. 김지은도 안다. 그러나 결국 그 논의가 언제쯤 실효성을 발휘할 수 있을 것인가는 의문이었다. 그리고 모두를 위한 평균화된 정책이 개개인의 필요를 합리적으로 만족시킬 가능성은 거의 없었다. 그러니 그 모든 거대한 논의보다 더 효과적인 건, 언제나 단 한 사람이었다. 단 한 사람의 희생. 선의와 책임 의식, 혹은 부채 의식과 정의감, 아니면 연민과 내가 더러워서, 라고 말하면서도 내치지 못하고 외면하지 못하는 정에 이끌리는 유약함을 지닌 단 한 사람, 남에게 용감하고 자신에게 비겁한 사람. 그래도 되는 사람.", "성해윤의 태도에는 엄마 장은수를 엄마가 아닌 독립된 한 인간 장은수로 보기 위해 아주 오래 노력해온 사람만의, 두 사람 사이에 어떤 과거와 현재와 미래의 사정이 있는지는 몰라도 그것으로부터 자신의 삶이 기울어지지 않도록 지키겠다고 결심하고 그것을 실천해온 사람만이 도달한 어떤 성숙한 균형과 존중이 있었다. 그것은 김지은이 엄마 베로니카와의 관계 형성에서 결코 이뤄보지 못한 사적인 거리감과 동등함이었다.", "주는 사람은 알고 받는 사람은 눈치채지 못할 작고 보잘것없는 상냥함을 지속적으로 꾸준히 반복해서 오래 하는 것. 그게 팬을 대하는 복미영의 팬 서비스 원칙이었다.", "\"진짜가 아니니까 더 진짜처럼 굴어야지. 굳이 이런 걸 입는 것만으로도 꼭 진짜 하와이에 가는 기분이 된다니까?\" \"진짜 하와이에 가는 기분을 알긴 하고요?\" 방해진이 묻자 복미영이 웃었다. \"아니. 나야 모르지. 근데 그래서 좋잖아. 난 진짜 하와이 가는 기분을 모르니까 지금 이 기분이 내가 아는 '진짜 하와이에 가는 기분'이 될 수 있는 거거든.\""]}, {"title": "봄 밤의 모든 것", "author": "백수린", "genre": "소설", "publisher": "문학과지성사", "passages": ["우리는 사진을 찍었고, 해변을 조금 거닐었다. 나는 조금 감상적인 마음이 되었는데, 더 이상 낮이 아니지만 아직 밤도 아닌 미확정의 시간대가, 육지와 바다의 경계선을 그었다 지우는 파도의 철썩이는 소리가 그렇게 만든 것이 틀림없었다.", "막이 내리면 사라져버리는 일회적인 것이라 연극을 좋아한다던 유타와 달리 그녀는 미래에도 영원히 남는 것이기 때문에 연극이 좋았고, 같은 이유에서 길을 걷다 골목이나 다리의 이름으로 남아 영속하는 빛나는 이름들을 마주치면 마음이 일렁였다.", "\"할머니를 위해 모든 걸 포기하고 돌아가는 건 너무 아깝지 않아?\" 유타는 그녀의 질문을 이해할 수 없다는 듯한 표정을 하며 대답했다. \"아깝긴. 그렇게라도 할 수 있다는 게 얼마나 다행스러운 일인데. 할머니는 이 세상에 남은 내 유일한 가족이고, 국숫집 하느라 늘 바빴던 엄마 아빠 대신 내가 좋아하는 돼지고기생강구이를 도시락에 싸주고, 감기에 걸리면 계란을 풀어 넣은 유부우동을 끓여준 사람인걸.\" 그녀는 유타가 살아가는 태도가 걱정됐고, 마흔이 넘은 나이에 여전히 미래에 대한 준비 없이 자신의 인생을 남의 것처럼 아무렇게나 흘려보내듯 사는 그가 못마땅했다. 하지만 그렇게 말하는 유타의 표정이 너무 아늑하고 고요해 보여 아무 말도 할 수 없었다.", "그의 인생에서 가장 좋았던 일은 집세를 내지 못하고 쫓겨나 몇 년간 묶었던 여인숙에서 그곳을 청소하던 여자를 만나 함께 살았던 것이다. 여자는 오래오래 가난했고, 늘 남은 밥을 얻어먹어 갓 지은 밥을 먹어본 적이 단 한 번도 없다고 했다. 그래서 그들이 같이 살기 시작했을 때 그는 밥솥을 샀다. 김이 나는 하얀 밥을 보고 여자가 울었다. 노인은 힘들게 자리에서 일어나 장롱 다리 밑에 접어 괴어둔 종이를 꺼냈다. 내년에 심을 꽃 목록 맨 아래에 여자가 좋아했던 금잔화를 적었고, 다시 접어 원래 자리에 두었다.", "마음 깊은 곳에서 다혜는 학과 내에서 주류를 이루는 무리에 섞일 수 있기를, 다른 동기들보다 매사에 조금이라도 더 앞설 수 있기를 은밀히 원했다. 중고등학교 시절 내내 부모에게 받았던 기대의 힘이란 놀라운 것이어서, 주변부로 조금씩 밀려나고 있는 듯한 느낌을 받을 때조차 다혜의 마음속에는 어쩌면 사실은 대단한 사람이 될 수 있을지도 모른다는 희망이 끈질기게 살아남아 있었다. 그즈음, 스스로에 대한 자부심과 열등감은 번갈아가며 얼굴을 바꾸고 다혜 앞에 나타났다.", "강철은 순수할수록 단단해진다. 단단한 강철을 제련하기 위해서는 불순물을 제거해야 한다는 것이 일반적인 상식이다. 하지만 너무 순수하면 깨지기도 쉽다. 인생에 대해서도 마찬가지로 말할 수 있다. 불순물이 없는 삶은 순수하고 단단한 삶일 수 있지만 깨지기 쉽다. 단번에 깨지지 않는 인생을 살기 위해서는 불순물이 필요하다. 적재적소에 배치된 불순물은 인생의 질을 높여준다.", "분명 아무 일도 없는데, 심지어 모든 것이 괜찮은데, 도통 좋은 것이 없다. 그러다 평화로운 겉모습과 공허한 속마음이 충돌하는 순간이 온다. 그 순간 돌출되는 어긋남은 안정된 허무 속에서 목격되는 기이함의 정체다. 백수린의 소설은 별일 없이 산다는 말의 장막을 살며시 들춘다. 그런 뒤 사소해 보이지만 결국엔 중요해지고마는 결핍들과 가만히 눈 맞춘다.", "미래는 끌어오지 않고 과거는 흘려보내지 않는 유타는 시간의 문법을 거슬러 사랑한다. 답답한 모범생처럼 입력과 출력을 중심에 두고 살아가던 그녀는 그제야 유타의 사랑속에서 알게 된다. 사랑한다는 것은 그 순간에 모든 것이 다 있음을 깨닫는 것임을. 슬픔과 아름다움은 사랑의 양면이다. 사랑이 슬프고도 아름다운 것은 슬픔과 아름다움이 서로 다르지 않기 때문이다. 사랑 뒤에 슬픔이, 슬픔 뒤에 아름다움이 오는 것이 아니라 사랑과 슬픔과 아름다움은 동시에 존재한다. 과거 뒤에 현재가, 그 위에 미래가 오는 것이 아니라 세 시제는 동시에. 사랑은 그 동시성과 현재성을 믿는 행위다.", "우리의 삶이, 이 세계가, 겨울의 한복판이라도 우리는 봄을 기다리기로 선택할 수 있다고. 봄이 온다고 믿기로 선택할 수 있다고. 그런 마음으로 이 소설들을 썼다. 소설을 쓰는 사람인 한, 계속 그런 마음으로 써나가고 싶다. **[출처]** [봄 밤의 모든 것 _ 백수린](https:blog.naver.com/skdyds/223847372019)|**작성자** [라용](https:blog.naver.com/skdyds)"]}, {"title": "불안의 밤에 고하는 밤", "author": "메트 헤이그", "genre": "에세이, 인문", "publisher": "위즈덤하우스", "passages": ["한 번씩 이런 의구심이 든다. 과거에 사람들을 괴롭혔던 결핍의 문제들은 오늘날 과잉의 문제로 대체되어버린 게 아닐까. 그 때문인지 요즘은 너 나 할 것 없이 무언가를 떼어버리는 방법으로 라이프 스타일을 바꿔보려고 한다.", "미니멀리즘 신봉자인 사사키 후미로의 표현에 따르면 '덜 소유하는 데에 행복이 있다'고 하지 않았던가. 처음 발작이 찾아왔던 초기에 내가 치워버린 건 술, 담배, 독한 커피 정도뿐이었지만, 그 후로 몇 년이 지난 지금 나는 그런 것들보다 좀 더 '전반적인 과잉'이 진짜 문제라는 걸 안다.", "나는 이 책에서 우리의 '감정'도 우리의 '소유물'만큼이나 중요하다는 사실을 규명하고 싶다. 정신 건강이 신체 건강 못지않게 중요하며, 그런 점에서 지금 세상은 단단히 잘못 돌아가고 있다는 점을 밝혀내고 싶다.", "말하기는, 내면의 고통을 밖으로 표출하는 과정과 다른 사람들도 나와 비슷한 감정을 느낀다는 사실을 인식하는 과정을 통해 화자와 청자 모두를 치유한다. 말하는 것을 멈추지 마라. 혹시라도 당신에게 정신 건강 문제가 있다면, 다른 사람들이 하는 말에 휘둘려 그런 문제를 당신 자신의 내면적 결함 또는 나약함으로 여겨선 절대 안 된다.", "마음의 병을 앓으면서 내가 배운 한가지 교훈은, '회복'이 '받아들임'에 달려 있다는 점이다. 일단 상황을 있는 그대로 받아들여야 변화를 시도해볼 수 있다.", "철학자 쇠렌 키르케고르의 말대로, 불안은 어쩌면 '자유의 결과로 생긴 현기증'일 수 있지만 그럼에도 불구하고 이 모든 '선택의 자유'는 진정 기적이다. 그런데 선택은 무한한 반면 우리 인생은 그 시간의 범위가 제한적이다. 우리는 인생을 다 살아볼 수 없다. 모든 영화를 볼 수도, 세상의 모든 책을 읽을 수도, 이 사랑스러운 지구상의 모든 장소를 다 가볼 수도 없다. 하지만 우리는 이런 상황에 굴복하기보다는 우리 앞에 놓인 선택지를 개조해야 한다. 우리에게 도움이 되는 선택을 골라내고 나머지는 버려야 한다. 우리에게 필요한 것은 또 다른 세상이 아니다. 내가 원하는 그 모든 것이 전부 내게 필요한 것이라는 생각만 버리면, 우리에게 진짜로 필요한 모든 것은 바로 여기, 이 세상에 있다.", "미국 사회학자 세리 터클의 말을 인용하자면 \"기술에 대한 기대는 점점 커지고, 같은 인간에 대한 기대는 점점 줄어드는\" 공간이며, 자신의 존재 증명을 위해 남들에게 자신을 공유해야 하는 그런 세상이다. 물론 이런 변화에 좋은 측면도 있었다.", "소비지상주의는 처음부터 끝까지 우리가 이미 갖고 있는 현재의 것이 아니라 그다음의 것을 원하는 심리에 바탕을 두고 있다. 이것은 실패할 확률이 거의 없는 불행 레시피인 셈이다.", "우리는 불행을 영업당하고 있다. 왜냐, 불행이야말로 돈이 몰리는 곳이니까. 현대인들에게 가장 장사가 잘되는 것들의 핵심은 결국 '다른 무언가가 되려고 노력하면 지금보다 더 나은 존재가 될 수 있다'는 생각이다.", "사람들 모두가 자신이 그렇게 괜찮은 수준은 아니라고 느끼게 만드는 것이야말로 세계 거의 모든 곳에서 비즈니스 업계가 이용해먹으려는 핵심이다.", "사람들이 자기 외모나 신체에 만족하면, 그들은 자기 몸을 타도해야 할 적이나 심하게는 '물건'으로 취급하는 경향이 줄어들고 오히려 자기 관리에 더 노력을 기울이게 됩니다.", "그 사람이 걸린 '병'을 기준으로 사람을 판단하지 않는 것은 쉽다. 하지만 그 병이 유발하는 '행동'을 기준으로 그 사람을 판단하지 않기란 훨씬 어려운 일이다. 왜냐하면 사람들의 눈에는 그 이유가 보이지 않기 때문이다.", "쇼핑센터에서 걸었던 사람 중 44퍼센트는 그곳에서 자존감이 낮아지는 것 같았다고 대답했다. 반면 숲속을 걸었던 90퍼센트의 사람은 자존감이 높아지는 걸 느꼈다고 대답했다.", "확신하건대, 스마트폰을 한 번이라도 써봤거나 트위터나 인스타에 가입한 적 있는 사람이라면 누구나 피프스가 보여준 것과 같은 강박적 행동에 공감할 것이다. 확인하고 또 확인하고, 한 번 더 확인하고, 마지막으로 한 번만 더 확인하고, 그리고 그냥 한 번 더 보기만 하고 무언가를 '확인할 수 있는 능력'이 무언가를 '하지 않고 못 배기는 강박'으로 바뀌고 나면, 우리는 자꾸만 그 옛날, 애초에 그런 '능력'이 아예 존재하지도 필요하지도 않았던 그 시절을 애타게 그리워하게 되는 것 같다.", "우리는 하루가 24시간보다 길면 좋겠다는 타령을 자주 늘어놓지만, 실제로 그렇게 된다 해도 별 소용은 없을 것이다. 딱 봐도 문제는 시간 부족이 아니다. 우리가 가진 것 중 시간을 제외한 모든 것이 과잉이기 때문이다.", "앞으로 우리는 나와 생각이 다른 사람을 무조건 미워하게 될지도 모른다. 정치인들은 상대편에 손을 내밀려는 시도조차 하지 않게 될 수 있다. '다름'은 찬양의 대상이 아니라 두려움과 조롱의 대상이 된다. 비슷한 관점을 가진 사람들조차 아주 미미한 의견 차이도 서로 용납하지 못하여 결국 흩어지게 되고, 사람들은 한가지 관점만 존재하는 아주 작은 세계에 갇혀버린다. 그리고 그 안에서 똑같은 내용에 대한 백만 가지 버전의 책을 읽고, 똑같은 노래를 듣고, 자신들의 의견만 서로 리트윗하며 살아가게 될지도 모른다. 이 세상 끝나는 날까지.", "나에게는 독서가 비사교적 활동이 전혀 아니었다. 오히려 지극히 사회적인 활동이었다. 내가 경험할 수 있는 가장 진정성 있는 어울림이었고, 나는 다른 사람들의 상상에 깊이 연결되었다고 느꼈다. 사회가 흔히 요구하는 수많은 여과막 없이 다른 이들과 이어질 수 있는 방법이었다.", "(바다거북) \"아무튼, 네가 진심으로 알고 싶다면 내가 해주고 싶은 충고는, 그만 좀 하라는 거야.\" \"뭘 그만하라는 거야?\" (바다거북)\"무의미한 일들 꽁무늬만 정신없이 쫒아다니는 거. 인간들은 왜 그렇게 자기가 있는 곳에서 한시라도 못 벗어나서 안달인지 모르겠어. 왜 그런거야? 공기 때문이야? 공기가 너희를 충분히 잘 지탱해주지 못하는 거야? 어쩌면 너희들은 바다에서 좀 더 있어봐야 하는 건지도 모르겠다. 충고할게, 그냥 그만해. 여유를 가지고 천천히 한다는 생각조차 버려. 그냥 시간을 네 것으로 만들어. 빠르게도 가보고, 천천히 움직여보기도 하는 거야. 네가 어딜 가든 언제나 너 자신을 잃지 않을 거라는 것만 알고 있으면 돼. 인생이라는 물속에서 기분 좋게 물장구를 쳐봐.\"", "느껴지지 않을 감정을 애써 느끼려 하지 말자. 내가 되지 못할 누군가 또는 무언가가 되려고 애쓰지 말자. 그렇게 안간힘을 쓰다가는 결국 지쳐 쓰러지고 말 것이다."]}, {"title": "비폭력대화", "author": "마셜 B. 로젠버그", "genre": "인문", "publisher": "한국NVC센터", "passages": ["당신이 하는 다음 말이 당신의 세상을 바꾼다.", "할아버지께서는 \"우리 스스로 우리가 이 세상에서 원하는 변화가 되지 않는 한 진정한 변화는 결코 일어나지 않는다.\"라고 말씀하셨다. 그러나 불행하게도 우리 모두는 다른 사람이 먼저 변하기를 기다린다.", "한 어머니가 10대인 아들에게 관찰, 느낌, 욕구를 넣어서 이렇게 표현할 수 있을 것이다. \"펠릭스야, 신었던 양말 두 켤레가 똘똘 말려서 탁자 밑에 있고, 또 TV 옆에도 있는 걸 보면(관찰) 엄마는 짜증이 난다(느낌). 왜냐하면 여럿이 함께 쓰는 공간은 좀 깨끗하고 정돈되어 있었으면 하기 때문이야(욕구).\" 그리고 그녀는 바로 네 번째 요소인 구체적인 부탁을 한다. \"그 양말들을 네 방으로 가져가거나, 세탁기에 넣어 둘 수 있겠니(부탁)?\" 이 네 번째 요소는 내 삶을 더 풍요롭게 하기 위해서 다른 사람이 해 주기 바라는 것을 표현하는 것이다. NVC의 다른 한 측면은 상대방에게서 똑같이 이 네 가지 정보를 듣는 것이다. 먼저 상대방이 무엇을 관찰하고 느끼고 원하는지 이해하여 그와 연결한 다음, 네 번째 요소인 그의 부탁을 통해 무엇이 거의 삶을 풍요롭게 할 수 있을지를 발견하는 것이다.", "NVC의 정수는 네 가지 요소를 의식하는 우리 마음에 있는 것이지, 실제로 주고받는 말에 있는 것이 아니다.", "우리 대부분은 자신이 무엇을 느끼고 원하는가를 알아차리기보다는 꼬리표를 붙이고, 비교하고, 강요하고, 판단하는 말을 배우면서 자랐다. 인간을 보는 어떤 특수한 관점에 뿌리를 두고 있는 이런 대화 방법은 수백 년 동안 우리에게 영향을 끼쳐 왔다.", "NVC의 첫 번째 요소는 관찰과 평가를 분리하는 것이다. 우리 삶에 영향을 미치는 것을 보고 듣고 접촉할 때 그것들을 평가와 섞지 않으면서 명확하게 관찰할 필요가 있다.", "크리슈나무르티는 \"평가가 들어가지 않은 관찰은 인간 지성의 최고 형태\"라고 말한 적이 있다. 그 글을 처음 읽었을 때 '말도 안 되는 소리!'라는 생각이 내 머릿속을 스치고 지나갔다. 그리고 나서 곧 나 자신이 평가를 내렸다는 사실을 깨달았다. 이처럼 우리 대부분은 판단이나 비판, 또는 다른 형태로 분석하지 않으면서 다른 사람이나 그들의 행동을 관찰하기가 쉽지 않다.", "NVC의 첫 번째 요소는 평가와 관찰을 분리하는 것이다. 관찰에 평가를 섞으면 듣는 사람은 그것을 비판으로 받아들이고 우리가 하는 말에 저항감을 느끼기 쉽다. NVC는 고정적인 일반화를 피하고 진행 중인 변화를 반영하는 언어이다. 관찰을 표현하는 말은 때와 맥락에 맞게 구체적이어야 한다. 예컨대 \"그는 시간 개념이 없다.\"가 아니라, \"그는 지난 세 번의 약속에서 모두 30분이나 지난 후에 왔다.\"라고 하면 관찰에 따른 표현이 된다.", "\"흑인들이랑 같이 있는 게 싫으신 거죠?\" 나는 머리를 한 대 맞은 것 같았다. 그리고 거북한 느낌을 숨기려고 애쓴 것이 그 학생으로 하여금 나를 그렇게 보게 만들었다는 점을 바로 깨달았다. \"거북하게 느껴지는 것은 사실입니다.\" 하고 인정했다. \"하지만 내가 그렇게 느끼는 것은 여러분이 흑인이라서가 아니라 여기에 내가 아는 사람이 하나도 없고, 내가 교실에 들어왔을 때 여러분이 나를 받아 주기를 바랐기 때문이지요.\" 내가 내 느낌을 솔직하게 표현하자 학생들에게 눈에 보이는 변화가 나타났다.", "다른 사람을 비판하고, 비난하고, 분석하고, 해석하는 것은 자신의 욕구를 돌려서 표현하는 것이다. 어떤 사람이 \"넌 나를 이해한 적이 없어!\"라고 했다면, 실제로는 이해받고 싶은 자신의 욕구가 충족되고 있지 않다는 말을 하고 있는 것이다. 또 아내가 \"당신은 이번 주 내내 밤 늦게 까지 일만 했어요. 당신은 나보다 일을 더 사랑하는 것 같아요\"라고 했다면, 남편과 친밀한 관계를 맺고 싶은 자신의 욕구가 충족되지 않다는 말을 하고 있는 것이다. 자신에게 필요한 것을 표현하면 그 욕구가 충족될 가능성이 커진다. 우리가 이렇게 자신의 욕구를 평가, 해석, 이미지 등을 사용해서 간접적으로 표현하면 상대는 그 말들을 비판으로 듣기 쉽다. 대체로 사람들은 비난처럼 들리는 말을 들으면 자기 방어에 나서거나 반격을 하게 된다.", "나는 캘리포니아 남부에서 농장주들과 계절 노동자 사이의 갈등을 중재해 달라는 부탁을 받은 적이 있다. 그들 사이의 갈등은 점점 더 적대적이고 폭력적으로 변하고 있었다. 나는 두 가지 질문으로 중재를 시작했다. \"각자 원하는 것이 무엇입니까? 그리고 그와 관련해 서로에게 부탁하고 싶은 것이 무엇입니까?\" 이 질문에 한 노동자가 이렇게 외쳤다. \"문제는 저 사람들이 인종차별을 하고 있다는 겁니다!\" 그러자 농장주 중 한 명이 더 큰 소리로 말했다. \"문제는 이 사람들이 법과 질서를 지키지 않는다는 거요!\" 흔히 그렇듯이, 두 집단은 자신들의 욕구를 명확하게 표현하기보다는 상대의 잘못으로 보이는 것을 분석하는 데 더 능숙했다.", "\"머리 좀 자르지 그러니?\"와 같은 말을 할 때, 부모가 자신의 느낌과 욕구를 먼저 말하지 않으면, 자녀들에게 명령이나 공격적인 말로 들리기 쉽다. \"네 머리가 너무 길어서 혹시나 앞이 안 보일까 봐 걱정된다. 특히 자전거 탈 때 말이야. 머리를 좀 자르는 게 어떻겠니?\"", "우리가 이전에 우리 부탁을 들어주지 않는 사람을 비난하고, 벌주고, 죄책감을 심어 주었을수록 그 사람이 지금 우리의 부탁을 강요로 들을 가능성이 크다. 다른 사람들이 그렇게 했는데 우리가 그 대가를 치를 때도 있다. 왜냐하면 우리 주위에 있는 사람들이 이전에 다른 사람의 부탁을 들어주지 않았을 때 얼마나 책망을 듣고 벌을 받고 죄책감을 품게 되었나에 따라, 그 후로 다른 사람들과의 관계에서도 그때의 기억대로 부탁을 강요로 듣게 될 가능성은 그만큼 커지기 때문이다.", "부탁에 응하지 않은 상대방에게 죄의식을 느끼게 하는 것은 강요다.", "우리가 아무리 목적을 인식하면서 주의 깊게 부탁했다 하더라도, 어떤 사람은 그것을 여전히 강요로 받아들일 수 있다. 특히 우리가 권력을 가진 자리에 있고, 또 상대방이 과거에 억압적이고 권위적인 사람을 경험했다면 더욱 그렇다.", "인간관계에서 공감은 우리가 다른 사람에 대해 가진 선입견과 판단에서 벗어난 후에야 비로소 가능해진다. 철학자 마르틴 부버는 삶이 우리에게 요구하는 이러한 '현존'에 대해서 이렇게 설명한다. \"서로 비슷한 점이 많은데도 불구하고 삶의 매 순간은 항상 새로 태어난 아기와 같이 이전에도 없었고, 절대로 다시 올 수도 없는 새로운 얼굴을 가진다. 그래서 삶이 당신에게 요구하는 순간 순간의 반응은 미리 준비할 수 있는 것이 아니다. 삶은 과거의 그 어떤 것도 요구하지 않는다. 지금 이 순간에 반응할 수 있는 능력, 바로 당신의 존재 그 자체를 요구한다.\" 공감은 상대방이 하는 말에 우리의 모든 관심을 집중하는 것이다. 그리고 상대방이 자신을 충분히 표현하고 이해받았다고 느낄 수 있는 시간과 공간을 주는 것이다. 불교의 가르침에는 이러한 능력을 적절히 표현하는 말이 있다. \"무언가를 하려고 하지 말고 그곳에 그대로 있어라.\" 상대가 위로나 조언을 받고 싶어 하리라고 추측하면서 공감이 필요한 사람에게 \"이렇게 해 봐.\"라고 해결책을 말해 주는 것은 그 사람에게 좌절감을 안겨 줄 수 있다.", "내담자의 이야기를 들을 때 그 사람의 이야기가 우리 머릿속에 있는 어느 이론과 어떻게 맞는지를 생각하고 있다면, 우리는 그 사람을 쳐다보고 있는 것이지 그와 함께 있는 것이 아니다.", "다른 사람이 어떤 말을 하든 우리는 이들이 무엇을 (1) 관찰하고, (2) 느끼고, (3) 필요로 하고, (4) 부탁하는가에만 귀를 기울인다.", "질문을 하게 된 우리 자신의 느낌과 욕구를 먼저 표현하면 듣는 사람이 어느 정도 편안함을 느낄 수 있다. \"내가 뭘 했는데?\"라고 묻는 대신 \"네가 무엇에 관해서 그렇게 이야기하는지 좀 더 분명하게 알고 싶은데 그렇지 못해 난감해. 나의 어떤 행동 때문에 네가 나를 그렇게 보게 됐는지 말해 줄래?\"라고 말할 수 있다.", "사람들이 처음에 한 말들은 종종 빙산의 일각과 같다. 그 말들 다음에는 아직 표현되지 않았지만 그와 연결된 더 강한 느낌이 따라 나올 수 있다. 상대방의 마음속에서 일어나는 일에 계속 관심을 둠으로써, 우리는 상대방이 자신의 마음속을 좀 더 깊이 관찰하고 표현할 수 있는 기회를 주게 된다. 만약 우리가 관심의 초점을 너무 성급하게 그들의 부탁이나 우리 자신을 표현하는 것으로 옮기면, 상대방이 자신의 내면 세계를 좀 더 깊이 들여다보고 표현할 흐름을 막게 될 것이다.", "NVC에서는 다른 사람이 자신을 어떤 말로 표현하든 상관없이 그들이 무엇을 관찰하고, 느끼고, 필요로 하고, 부탁하고 있는가를 듣는다. 그리고 우리가 이해한 것을 상대에게 되풀이해서 들려줌으로써 상대의 뜻을 확인할 수 있다. 상대를 도와주기 위해 우리의 관심을 해결 방안이나 부탁으로 돌리기 전에, 상대가 자신을 충분히 표현할 수 있는 기회를 주면서 계속해서 공감에 머무른다.", "어떤 사람이 나를 판단하지 않고, 나를 책임지려 하거나 나에게 영향을 미치려 하지 않으면서 내 말을 진지하게 귀 기울여 들어 줄 때에는 정말 기분이 좋다.", "상하관계가 있는 조직에서 일할 때에는 자신보다 높은 지위에 있는 사람의 말을 명령이나 판단으로 받아들이는 경향이 있다. 동료나 자신보다 지위가 낮은 사람들과는 비교적 쉽게 공감할 수 있는 반면에, 우리가 '윗사람'으로 보는 사람들 앞에서는 공감하기보다 자신을 방어하거나 변명하는 자세를 취할 때가 많다.", "우리가 화가 나는 것은 결코 다른 사람의 행동 때문이 아니다. 다른 사람의 행동은 자극일 뿐이다. 자극과 원인을 분명히 구별하는 것이 중요하다.", "어떤 사람이 약속 시간에 늦었을 때 그 사람이 우리와 한 약속을 중요하게 여겨 주기를 바랐다면 우리는 마음에 상처를 입거나 섭섭했을 것이다. 그러나 만약 시간을 유용하게 보내는 것이 당시의 욕구였다면 우리는 아마 짜증이 났을 것이다. 그 반면에 30분 정도 혼자 조용히 시간을 보내고 싶었다면, 그 사람이 늦은 것에 대해 오히려 고마움을 느꼈을 것이다. 그러므로 우리 느낌의 원인은 다른 사람의 행동이 아니라 그 순간의 우리 욕구이다. 상대방의 관심이든 효율성이든 혹은 혼자만의 시간이든 간에, 자신의 욕구와 연결될 때 우리는 삶의 활력을 느낄 수 있다. 그렇게 되면 우리는 강한 느낌을 가질 수는 있어도 분노하지 않는다. 분노란 자신의 욕구에서 단절된, 삶을 소외시키는 사고방식의 결과이다. 분노는 우리가 마음 안에서 충족되지 않은 자신의 욕구에 초점을 맞추는 대신 머리로 올라가 다른 사람을 비판하고 분석하고 있음을 보여 준다.", "분노를 일으키는 것은 다른 사람의 행동이 아니라 바로 내 머릿속에 있는, 상대에 대한 생각과 그의 행동에 대한 나의 해석이다.", "모든 폭력은 자신의 고통이 다른 사람 때문이라고 착각하면서 상대가 당연히 벌을 받아야 한다고 믿을 때 오는 결과이다.", "우리가 사회에서 받은 교육은 서로 비난하고 모욕하는, 서로 멀어지게 만드는 잘못된 소통 방법이다. 갈등 상황에서는, 보통 양쪽 당사자들이 자기 자신의 욕구와 상대의 욕구에 주의를 기울이기보다는, 자신이 옳고 상대가 틀렸다는 것을 증명하려는 데 많은 시간을 쓴다. 이런 언어적 갈등은 너무 쉽게 폭력으로 이어지고, 심지어는 전쟁으로까지 단계적으로 확대될 수 있다.", "현재형 언어로 말하는 것은 지금 이 순간에 필요하다고 여겨지는 것을 표현하는 것이다. 예를 들자면, 한쪽 당사자가 \"당신이 기꺼이 할 의향이 있는지 나한테 말해 주면 좋겠어요.\"라고 상대방이 해 주었으면 하는 행동을 말하는 것이다. \" 할 의향이 있으세요?\"로 끝나는 현재형 언어로 부탁을 하면 존중하는 마음으로 이야기 나누는 데 도움이 된다. 상대편이 그럴 마음이 없다고 대답한다면, 무엇이 그들이 기꺼이 하는 것을 막는지를 이해하는, 다음 단계로 나아간다. 한편, 현재형 언어가 들어가지 않은 다음과 같은 부탁, \"토요일 밤에 나랑 같이 쇼를 보러 갔으면 좋겠어.\"는 말하는 사람이 듣는 사람에게 그 순간에 무엇을 원하고 있는지를 전해 주지 않는다. 현재형 언어를 써서 \"이번 토요일 밤에 나랑 쇼를 보러 갈 의향이 있는지 말해 줄래?\"라고 부탁하면 대화가 명료해지고 연결이 지속되는 데 도움이 된다.", "\"아니요\" 뒤에 있는 메시지를 주의 깊게 잘 들으면 상대의 욕구를 이해할 수 있다. 그들이 \"아니요\"할 때, 그들은 우리가 부탁하는 것에 \"예!\" 하지 못하게 하는 어떤 욕구가 있다고 말하고 있는 것이다. \"아니요\" 뒤에 있는 욕구를 들을 수 있을 때에는, 상대가 우리가 제시하는 특정한 방법에 \"아니요\" 한다 해도, 우리는 갈등 해결 과정에, 즉 모두의 욕구를 충족하기 위한 방법을 찾는 데에 계속해서 우리의 초점을 들 수 있다.", "우리가 제일 먼저 할 일은 우리가 좋아하지 않는 방식으로 행동하는 사람의 욕구에 공감하는 것이다.", "그녀는 \"내 인생에서 무엇인가를 더 해야만 해. 나는 내가 받은 교육과 재능을 썩히고 있어.\"를 다음과 같이 바꾸어 말했다. \"전공을 살리지 못하고 집에서 아이들을 돌보느라 이렇게 많은 시간을 보낼 때면(관찰), 나는 우울하고 실망스럽다(느낌). 왜냐하면 나는 예전에 일하면서 느꼈던 성취와 보람(욕구)을 경험하고 싶기 때문이다. 그러므로 이제 나는 시간제로 라도 예전에 하던 일을 다시 했으면 한다(부탁).\"", "우리는 마음속의 부정적 메시지를 느낌과 욕구로 바꿈으로써 자신과 소통을 더 잘하게 된다. 우리 자신의 느낌과 욕구를 인식하고, 그 느낌과 욕구에 공감함으로써 우리는 우울증에서 벗어날 수 있다. 그러면 우리는 모든 상황에서 선택의 여지가 있음을 인식하게 된다. 우리 자신이나 다른 사람들에게서 잘못을 찾으려 하는 대신 진정으로 원하는 것에 관심을 집중함으로써, NVC는 좀 더 평화로운 내면 상태를 유지할 수 있는 방법과 이해력을 보여준다.", "\"보고서를 참 잘 쓰셨습니다.\" 정말 세심한 분이시군요. \"다른 사람에게 얼마나 호의적으로 들리든 간에, 칭찬은 종종 판단과 같을 수 있다. \"어제 저녁에 저를 집까지 태워다 주신 것을 보니 참 친절한 분이세요.\" 이러한 말은 삶을 소외시키는 대화에서 전형적으로 쓰이는 감사 표현이다. 말하는 사람이 자기 내면에서 일어나는 것은 드러내지 않으면서 스스로 다른 사람을 판단하는 자리에 앉는 것이다. 판단은 부정적이든 긍정적이든 다 삶을 소외시키는 것이라고 나는 생각한다. 내가 특히 안타깝게 생각하는 점은, 칭찬과 감사 표현 뒤에 숨은 의도가 자기들에게 무언가를 얻어 내려는 것임을 사람들이 알게 되는 순간부터 진정한 감사가 가진 아름다움이 손상된다는 사실이다.", "\"감사합니다.\"를 NVC로 표현하는 방법: \"당신이 ~ 했을 때, 나는 ~ 을 느꼈습니다. 그리고 내 ~ 한 욕구가 충족되었습니다.\" 마셜, 이 두 가지를 말씀하셨을 때, 저는 희망이 생기고 안심이 되었어요. 저는 아들과 좀 더 좋은 관계를 만들고 싶었거든요. 그리고 이 두가지로 제가 찾던 방법을 볼 수 있었어요.", "나페즈가 내게 와서 \"우리가 이번 교육을 통해 배운 것은 우리나라에서 평화운동을 하는 데 크게 도움이 될 것입니다.\"라고 감사의 말을 하면서 \"나는 우리 수피 이슬람교도가 특별히 고마운 마음을 표현할 때 쓰는 방식으로 당신에게 감사하고 싶습니다.\"라고 했다. 그는 엄지손가락을 내 엄지손가락에 걸고 내 눈을 보며 이렇게 말했다. \"나는 당신이 우리에게 이것을 줄 수 있도록 허락하신, 당신 안에 계시는 신께 입을 맞춥니다.\" 그리고 나서 그는 내 손에 입을 맞추었다. 나페즈의 감사 표현은 나에게 감사를 받아들이는 다른 방법을 보여 주었다. 우리는 보통 감사를 상반되는 두 가지 태도 중 하나로 받아들인다. 하나는 자만이다. 인정을 받았기 때문에 우리가 우월하다고 생각하는 것이다. 또 다른 하나는 \"아, 아무것도 아닌 걸요\"와 같은 말을 하면서 감사의 중요성을 부인하거나 무시하는 거짓 겸손이다. 나페즈는 내게, 신이 우리 모두에게 다른 사람의 삶을 풍요롭게 할 수 있는 능력을 부여했다는 인식 안에서 감사를 즐거운 마음으로 받아들일 수 있다는 것을 보여 주었다. 다른 사람의 삶을 더 충만하게 하는 것이 나를 통해 나타나는 신의 힘이라는 사실을 인식한다면, 자만의 덫이나 거짓 겸손에 빠지는 일을 피할 수 있을 것이다."]}, {"title": "빵 고르듯 살고 싶다", "author": "임진아", "genre": "에세이", "publisher": "휴머니스트", "passages": ["나를 읽는 연습을 하며 내가 분명한 웃음을 지어낼 줄 아는 순간을 잡아내는 것. 기분 좋게 고른 고소한 순간과 더불어, 무언가를 꼭 선택해야 하는 상황에서는 나를 위한 방향으로 바라보는 것 또한 내 입에 넣을 빵을 고르는 일과 같다는 것을 저는 빵을 좋아하는 여러 사람과 함께 이야기하고 싶습니다.", "그런 날이 있다. 끝이 안 보이는 이야기로 오전부터 기나긴 회의를 하며 하루 중 가장 아끼는 점심시간마저 내 것이 아니게 된 날. 점심이라 하면 자고로 마음에 점을 찍는 시간인데, 그 작은 점마저 찍을 수 없는 삶이라니. 점처럼 사라지고 싶었다. 무엇으로도 '오늘'이라는 날의 점심 시간을 보상받을 수 없었다. 겨우 회의가 끝나고 마음 무겁게 자리를 떠났다. 일상에 조금이라도 숨을 불어넣는 환기의 시간이 그저 공복을 떼운다는 의미로만 남게 됐지만, 그 축소된 틈에서라도 최선을 다하고 싶어 근처 좋아하는 빵집으로 갔다.", "\"일상에서 작은 악마가 된다고 느끼는 순간 : 집으로 가는 길에 케이크를 딱 한 조각만 사서 가방에 숨겨 가지고 들어가 가족 몰래 방에서 먹을 때.\" 일상에서 악마가 되는 순간이 이런 것밖에 없냐, 악마가 뭔지는 알고 하는 말이냐는 쓴소리를 들을 것 같지만 나 혼자만을 위한 케이크 정도가 나에게 딱 적당한 악마의 행동이라고 생각했다. 남에게 피해를 주지 않는 선에서의 악마라면. 사실 조금 귀엽게 보이고 싶었던 마음도 있었다. 진짜 악마같은 내 모습을 말할 순 없지 그러고는 생각했다. 나를 포함해 내 주변의 사랑스러운 사람들이 매일 이런 못된 일을 했으면 좋겠다고. 남을 배려하는 일만큼 혼자만을 위한 행동도 충분히 했으면.", "손님이 비엔나커피를 주문하고서 화장실에 가면, 나올 때까지 기다렸다가 크림을 올렸다. 크림을 얹자마자 바로 손님 앞에 놔야 아름다우니까. 그런 시간이 좋았고 예쁜 마음이 생겨났다. 그곳에서는 모든 걸 '내 앞에 놓인다면' 이라는 기준으로 만들었다.", "일이라는 건 버티는 게 아닌, 여전한 마음으로 이어가야 한다는 걸 얻은 후 카페를 그만두었다.", "나의 작은 선호를 눈치채고 행동으로 옮기는 것은 나에게 고마운 일. 듣고 싶은 말을 듣고 싶은 순간에 듣는 것만큼 기뻤다. 어쩌면 이런 감각이 내 일상에 더 필요할지도 모르겠다. (선호라는 말은, 왠지어렵다. 선호도 조사 같달까. 선호보다는 좋아한다는 표현을 쓰면 어떨까 내가 무엇을 좋아하는 지 아는 것만큼 그것을 행동으로 옮기는 것이 중요하다.)", "나쁜 일로 하루를 망쳤다고 생각하는 마음에 작은 좋은 행동 하나를 더하는 방법. '나쁜 일 - 나쁜 일 = 나쁜 일 없음' 은 인간이 이룰 수 없는 공식이지만 '나쁜 일 + 좋은 일 = 나빴지만 좋은 일'은 인간이기에 가능한 공식이다.", "물냉면을 먹고 집에 돌아가자마자 엄마는 나를 앉히고 두손을 잡은 후 말씀하셨다. 원하는 것이 있을 때에는 자신있게 말해도 된다고 말이다. \"쑥스러워할 거 없어. 진아가 먹고 싶은 거 확실하게 말해야지. 아까 왜 그렇게 자신없게 말했어?\" 그때 나는 '내가 아까 왜 그랬지' 하며 반성한 것이 아니라, 지금 이 얘길 단둘이 있을 때까지 기다렸다가 해주는 엄마에게 고마움을 느꼈다. 그렇게 차근차근 내가 원하는 것을 고르는 마음과 시간을 엄마에게서 배웠다. 그 덕에 지금 이렇게 '좀 골라본 사람'이 된 것이다.", "누군가의 욕을 하거나 누가누가 더 힘든지 서로 비교하는 대회라도 참가한 듯한 대화만 오간다면, 그 관계는 길어질 수 없다. 집으로 돌아가는 길에 드는 생각은 한결같았다. 왜 '우리'에 대한 이야기는 나누지 못하는 건지.", "열을 내며 내 입으로 직접 말하지 않은 건 온전히 나를 위해서였다. 나의 불쾌함에 대해 열심히 에너지를 써가며 표현한 후 관계를 끊고 완전히 등 돌리는 일을 택하지 않는 건, 그런 안 좋은 상황으로부터 나를 지키기 위해서다. 나를 지키는 건 결국 나뿐이니까.", "나는 안다. 나라는 사람은 주어진 일을 능숙히 해내는 앞서가는 사람이 아니라, 스스로 충분히 받아들일 수 있도록 진지한 태도로 그 일과 상황에 대해 더 생각하는 사람이다. 그것만큼은 누구보다 잘할 수 있다. 오래 씹어보라고 하면 누구보다도 오래 씹어본다.", "완료되지 않은 일은 의미 없다고 보는 이 세상에서 '아직'은 답답함과 미숙함을 나타내는 단어로 사용된다. \"아직 그거 하고 앉아 있냐?\" \"밥을 아직도 먹고 있어?\" \"아직도 숙소 예약을 안 했어? 너 여행 가긴 갈 거야?\" 이런 말들을 들을 때면 마치 아무것도 안 하고 있는 바보처럼 여겨지는 것 같다. 나에게 아직이라는 건 '아직 안 함'이 아니라 '아직 하는 중'이라는 의미가 더 큰데 말이다. '어떤 일이나 상태 또는 어떻게 되기까지 시간이 더 지나야 함을 나타내거나, 어떤 일이나 상태가 끝나지 아니하고 지속되고 있음을 나타내는 말' 인간들의 말보다 사전에 적힌 의미가 오히려 나를 달래주는 듯하다.", "따지고 보면 사실은 아무것도 안 한 게 아니다. 그 걱정의 시간을 지내며 잠들기 전마다 '만약 한다면 이건 이렇게 저건 저렇게' 하고 그려보기도 하고, 외출해 이동하며 '색은 아마도 이렇게? 그림은 옆모습이 좋겠고 머리는 단발로 할까' 하는 등 예열하는 시간이 있었다. 고로 '아직'이라는 만져지지 않는 지속된 시간이 포함되어 있는 것이다.", "나에게서 출발한 기운이 상대에게 닿을 때 좋은 기분이 들 수 있게 한다는 건 그렇게 큰 에너지가 들지 않는 일이다. 그렇게 출발한 무언가가 타인과 마주했을 때의 인상은 내 인상이 되기도 한다. 내 인상이 되지 않더라도, 하루 중 아주 사소하게나마 웃음기를 머금을 수 있도록 작용하기를 바란다. 우연히 웃게 되는 일에는 어쩌면 누군가의 간결한 시간이 묻어 있을지도 모른다. 자신이 어떨 때 즐거운지 잘 알고 있어야, 타인의 기분까지 챙길 수 있지 않을까 싶다.", "내가 소중히 여기는 친구들은 모두 자신이 어떤 빵을 가장 좋아하는지에 대해 즉답할 수 있는 삶을 살고 있었다. 가벼운 질문으로 알게 된 친구들의 뚜렷함. 다들 빵만큼은 분명히 좋아하며 살고 있다. 가장 좋아하는 빵을 꼽는 다는 건, 어찌 보면 그 빵을 가장 좋아하는 사람으로 살고 싶다는 뜻 아닐까."]}, {"title": "사람이 사람에게, 사람의 말을 이어갑니다", "author": "304낭독회", "genre": "시, 희곡", "publisher": "온다프레스", "passages": ["304낭독회의 '여는 글'은 낭독회를 꾸리는 이들에 의해 조금씩 고쳐지고, 덧붙여집니다. 백열 번째 낭독회의 여는 글은 \"우리가 함께 모여 만드는 이 시간이 떠난 이와 떠난 이를 잇고, 떠난 이와 남은 이를 잇고, 남은 이와 남은 이를 잇는 자리가 되기를 희망합니다. 앞으로도 사회적 참사를 생각하는 서로의 목소리가 공명하여 더 크고 넓게 울려 퍼질 수 있도록, 지금의 서 있는 시간으로부터, 슬픔과 분노로 멈춘 우리의 시계가 다시 움직일 때까지, 계속 읽고, 쓰고, 행동하겠습니다.\" 라는 문장으로 끝을 맺습니다. 이것이 우리가 서로에게, 그리고 스스로에게 보내는 희망의 편지이며, 우리가 달고 있는 노란 리본에 담겨 있는 빛의 의미입니다. 이 목소리에 부디 귀 기울여주기를, 당신의 목소리를 덧붙여주기를 바랍니다. 언젠가는 함께 낭독회 후에 읽어 내려가는 다음 문장들을 같이 읽을 수 있기를 바랍니다. 이렇게 모여, 우리는 사람으로 돌아가는 꿈을 꿉니다. 목숨이 삶으로, 무덤이 세상으로, 침묵이 진실로 돌아가는 꿈을 꿉니다. 이렇게 모여, 우리는 사람의 말을 이어갑니다. 떠오르도록, 떠오를 수 있도록, 사람이 사람에게, 사람의 말을 이어갑니다.", "죽은 사람을 제대로 대우하지 않는 나라에서는 산 사람의 존엄 역시 위태롭다는 것을 우리는 알고 있습니다. 삶과 죽음이 존중과 애도로 이어질 때, 삶이 온전히 삶일 수 있고 죽음 또한 온전히 죽음일 수 있을 것입니다.", "\"그동안 가난했으나 행복한 가정이었는데, 널 보내니 가난만 남았구나.\" 단원고의 한 학부모가 이런 말을 써서 팽목항에 내걸었다. 이 짧은 말의 밑바닥에 깔려 있을 절망감의 무한함까지 시간의 홍진 속에 가려지고 말 것이 두렵다.", "우리는 생각한다. 우리의 작업이 도대체 이 현실 속에서 무슨 역할을, 무슨 의미를 가질 수 있는가? 예술이 뭐가 그리도 중요한가? 예술로 감히 무엇을 할 수 있단 말인가? 한 작가는 내게 고백했다. \"사실 두렵다. 하지만 두렵다고 말하지 않는다. 그래야 작업을 할 수 있기 때문이다. 내가 사람들 앞에서 두렵다고 공개적으로 말한다면, 그때는 이미 못하겠다는 마음을 굳힌 다음일 것이다.\"", "우리가 아이를 잃는다면 울며 울며 슬픔의 굽이를 따라가다 강어귀에 다다라 끊어지는 애를 갖게 될 것입니다 우리가 아이를 잃는다면 입을 열 때마다 그 피가 꽃처럼 쏟아져 천년 캄캄한 골목과도 같은 얼굴을 갖게 될 것입니다 우리가 아이를 잃는다면 끈질긴 시간의 넝쿨 위로 칼 대신 피어나는 봄꽃을 의아해할 것입니다. 아침에 왜 눈을 뜰까, 나는 왜 아직 사람인가, 어리둥절해할 것입니다", "\"부모들은 많은 변화를 겪었다. 더 이상 전과 같은 생활로 돌아갈 수 없었다. 먹고사는 문제 때문에 외면했던, 사회적으로 고통받는 사람들이 실은 자신의 모습이었다는 진실을 통렬히 깨닫는 시간이었다. 부모들은 평범한 자신의 삶에 대해 '성찰'하기 시작한 것이다. 이 사회의 문제를 외면할 때 결국 화살이 돌아오는 곳은 자기 자신이었다. 정의롭지 못한 사회에 침묵하는 건 다른 누구도 아닌 스스로에게 벌을 내리는 것이었다.\"", "만약 네가 받았거나 받을지 모르는 상해를 내가 내 안에 안으려 한다면, 그것은 나도 너처럼 취약한 사람이어서 그렇다. 네 덕분에 나는 내가 부서질 수 있다는 것을 알게 되었다. 내가 감히 너의 고통을 함께 겪는다고 한다면, 공감한다고 말하면, 너의 고통에 우리가 굴복하지 않고서도 같이 느끼는 능력이 있어서다. 너의 슬픔에 나는 나를 연다. 우리는 아픈 그것을 같이 데리고 살아나가자.", "노란 리본을 단 사람을 보면 안심된다는 말을 들었던 기억이 난다. 제법 여러 사람에게서 비슷한 이야기를 들었다. 까닭도 가지각색이었다. 같은 편이라는 생각이 든다는 사람도 있었고, 고마운 마음을 느낀다는 사람도 있었다. 노란 리본을 단 사람은 자신을 해코지하지는 않을 것 같아 안심된다는 말도 어딘가의 기사에서 읽었는데, 나로서는 전혀 생각해보지 못한 관점이라 상당히 흥미로웠다. 정확한 내용은 기억나지 않지만, 낯선 사람의 도움을 필요로 하는 상황에 놓인 학생이었고, 그 가운데 노란 리본을 달고 있는 사람이 있어 편하게 말을 붙일 수 있었다는 것이다. 그걸 읽으며 세대에 따라 노란 리본에 대한 감각이 달라질 수 있겠다는 생각을 했고, 한편으로는 그럼에도 기본적으로 일종의 연대의식을 공유한다는 생각을 하기도 했다.", "'나 어떻게 생각하지?' 그러고 보니, 내가 자주 듣는 말 중 하나가 \"생각 좀 하고 말해\"다. 과연, 생각이 말보다 언제나 먼저일까? 의도도 없고 목적도 없고 중요하지도 않은 말을 시시콜콜하게 하는 기쁨이 얼마나 큰지 아는가. 생각은 거듭될수록 중요도를 따지고 의도와 목적을 찾으려 한다. 그런데 의도는 불순하기 쉽고 목적은 맹목적이기 쉽고 중요한 것은 작은 것들을 놓치기 쉽다. 그러니 생각에 너무 많은 시간을 할애하는 사람들에게 이렇게 말해볼까 한다. \"일단 말하고 생각해.\" 그렇다고 아무렇게나 말해도 된다는 건 아니다. 헤아리고 살피는 말하기가 필요한 만큼 생각의 무게에 짓눌리지 않는 말하기도 필요하다는 뜻이다. 시인은 쓸데없이 말을 뒤집는 버릇이 있는 것 같다. 생각 좀 하고 말하라는 게 사실 뒤집을 만한 말은 아닌데, 일단 뒤집어 봤다. 그랬더니 뒤집히는 게 신기하다. 말이 안 될 것 같았는데 말이 된다. 말을 먼저 하다 보면 어떤 말에는 삶에 대한 통찰이 깃들기도 한다. 생각을 먼저 하지 않아도 생각이 내려앉은 자리가 선명하다.", "낭독회 닫는 글 함께 읽는 글 사회자 오늘은 4월 16일입니다. 다 같이 0000번째 4월 16일입니다. 사회자 이렇게 모여, 우리는 사람으로 돌아가는 꿈을 꿉니다. 다 같이 목숨이 삶으로, 무덤이 세상으로, 침묵이 진실로 돌아가는 꿈을 꿉니다. 사회자 이렇게 모여, 우리는 사람의 말을 이어갑니다. 다 같이 떠오르도록, 떠오를 수 있도록, 사람이 사람에게, 사람의 말을 이어갑니다. 사회자 이유를 알고, 책임을 묻고, 참사가 반복되는 걸 막아야 합니다. 다 같이 세월호 미수숩자 모두의 귀환을 염원합니다. 철저한 진상규명을 요구합니다. 모두의 이름으로 명령합니다. 사회자 함께 대답을 들어야 합니다. 다 같이 그때까지 멈추지 않겠습니다. 사회자 끝날 때까지 끝난 것이 아닙니다. 다 같이 끝날 때까지 끝내지 않겠습니다.", "무대가 놓이면 서로의 얼굴을 보기 어렵다. 무대를 바라봐야 하니까. 우리가 광장에서 원으로 서 있을 때에는 마이크가 옆에서 옆으로 옮겨 갔다. 그래서 어디든 틈을 낼 수가 있었다. 누구든 끼어들 수가 있었고, 고개만 들면 서로의 얼굴을 볼 수 있었다. 무대가 있는 자리에서는 그게 어렵다. 그 점을 나는 아쉬워했던 것 같다.", "첫 모임에서, 아마도 최창근 극작가였던 것 같은데, 참석자 중에 누군가가 낭독회를 하면 어떻겠느냐는 제안을 했다. 그때는 많은 아이디어 중에 하나였는데 나는 집으로 돌아가서도 계속 그 생각을 했다. '왜 못 하지?' 한 달에 한 번으로 계산해보니 낭독회를 삼백네 번 치르는 데 26년이 걸리겠더라. '세월호에서 나오지 못한 학생들이 살았다면 2014년 이후 26년을 더 못 살았겠나. 그런데 사람들이 모여서 그 세월 동안 낭독회 하나를 이어가지 못하겠나.' 그 생각 때문에 잠을 잘 수가 없었다. 그래서 다음 회의 때 내가 일어서지는 않았고 아마도 앉아서 그 이야기를 했다. 그런데 벌써 10년간 이어져왔다니 마음이 이상하고, 많이 미안하다.", "나는 애도라는 것이 늘 처음과 같을 수는 없다고 생각한다. 알맞은 과정을 거치면 애도는 다른 것이 된다. 다시는 이런 일이 일어나지 않기를 바라는 마음, 혹은 기도가 되기도 하고. 그래서 삶 '속에' 애도가 있다. 애도가 삶보다 크면 어떻게 되겠나. 그런데 사건이 벌어졌을 때 진상이 규명되지 않고 책임을 명확히 하지 않으면 남은 사람들은 애도를 끝낼 수 없다. 국가와 사회가 애도를 끝낼 기회를 주지 않는데 어떻게 애도를 끝내나. 삶이 애도가 되어버린다. 책임 있는 모든 사람이 당사자들에게 저지르는 가해다. 나는 이게 세월호참사와 10.29 참사의 생존자들, 유가족들에게 한국 사회가 저지른 일이라고 생각한다.", "그저 낭독하는 용도로 쓴 글들이다. 사실 책을 내자는 제안이 이전에 몇 차례 있었는데, 그때마다 거절했던 맥락에는 '이 글들은 낭독의 용도만으로도 충분하다'는 판단이 있었다. 이번에 그래도 다들 해보자고 이야기가 나왔던 맥락에는 10주기를 맞이하면서 유가족들만 그 10년을 겪은 게 아니고 우리가 같이 있다는 걸 이야기하고 싶다는 게 있다. 독자들의 시각에서는 유가족이 고립돼서 싸운 게 아니라는 걸 읽어낼 수 있을 것이다. 결국 이 낭독회가 지속될 수 있는 맥락 중에 중요한 것은, 유가족분들이 계속 이야기하고 있다는 사실이다. 이 분들의 이야기가 있기 때문에 낭독회도 계속된다."]}, {"title": "사랑 밖의 모든 말들", "author": "김금희", "genre": "에세이", "publisher": "문학동네", "passages": ["아픈 기억을 버리거나 덮지 않고 꼭 쥔 채 어른이 되고 마흔이 된 날들을 후회하지 않는다. 아프다고 손에서 놓았다면 나는 결국 지금보다 스스로를 더 미워하는 사람이 되었을테니까. 그리고 삶의 그늘과 그 밖을 구분할 힘도 갖추지 못했을 것이다. 우리는 대개 현명하지 않은 방법으로 상처를 앓는 사람들이지만 그래서 안전해지기도 한다고 믿는다. 삶에 대해 예민한 감각을 갖게 될 것이고, 느끼게 될 것이고, 마음 먹게 될 것이며 결국 나가서 걸을 수 있을 것이다.", "요즘 나는 내 글을 읽을 당신이 무엇보다 안전했으면 좋겠다는 생각을 한다. 때로는 이 글들이 불러일으킬 당신의 어떤 기억과 마음으로부터도.", "할머니와의 이별이 멀지 않았다는 사실을 알고 있었던 엄마는 할머니에게 누구 보고 싶은 사람 없어? 하고 물었다고 했다. 엄마가 그렇게 말했을 때 나는 그 답이 나일 리는 없다고 여기면서도, 어떤 대답이든 좀 마음이 섭섭할 수 있다고 예감하면서도 누구였어? 라고 물었다. 엄마는 할머니가 \"다 보고 싶다\" 라고 대답했다고 전해주었다. 다 보고 싶다.", "엄마는 나를 품어 왔지만 거기에는 어려움을 스스로 이겨온 사람이 가지는 절박함과 긴장이 있었고 나는 그것을 통해 세상살이의 어려움을 짐작했다. 우리는 그것을 부인할 수 없다. 우리의 모성이 그 자체로 완전한 조건에서 생성된 것이 아니라 그것을 불가능하게 하는 여러 조건들에 지지 않으려 싸우며 이루어져 온 것이라는 사실을 말이다.", "자기가 해야 하는 것 이상의 다정함을 보여준 그 느낌이 좋아서, 그 성의를 간직하고 싶었다.", "나는 갈등하는 장면을 잘 보지 못하는 사람이다. 눈앞에서 누가 싸우고 있거나 논쟁을 벌이고 있으면 슬그머니 피하며 채널을 돌린다. 그만큼 누군가와 누군가가 맞서는 긴장감을 제대로 처리하지 못한다는 얘기일 것이다.", "우리는 여성인 지인들과 그 정보를 나누면서 '운전사가 말을 걸지 않는다'는 사실을 강조하곤 했다. 나는 그 서비스를 그렇게 칭찬하다가도 문득 그런 나를 섬뜩해하기도 했는데, 운전사가 아무 말도 하지 않고 묵묵히 운전만 하도록 강제하는 일이, 그렇게 그를 기능으로만 대하는 일이 그토록 내가 원하는 것이었나? 싶었기 때문이다.", "낭독회가 끝나자 경청하던 청년도 가방을 챙겼다. 나는 청년이 혼자 강당 입구까지 왔으니까 거기까지 안내할 생각을 하고 있었는데, 시인 J가 다가가 청년에게 도와드릴까요, 물었다. 어디까지 도와드리면 편하실까요? 라고. 나는 J의 태도에 좀 놀랐고 이내 부끄러워졌는데, 지하철역까지 함께 가줬으면 좋겠다고 청년이 조심스럽게 도움을 청했기 때문이었다. 그 말을 듣고 나서야 나는 강당 입구가 아니라 지하철역까지 함께 가줄 수 있다는 것, 그러면 청년이 더운 여름에 조금 덜 헤매게 된다는 것을 떠올렸다. 상대에게 필요한 것을 예단하지 않고, 내가 여기까지 해주겠다 미리 선 긋지 않는 선의. 그러한 선의가 필요한 순간 자연스럽게 배어나올 수 있는 것. 그것은 얼마나 당연하면서도 소중한가. 이러니 매순간 배워나갈 수 밖에 없다. 배울 수 있는 사람들이 여전히 곁에 있다는 것에 다행스러워하면서. 그런 마음들을 기꺼이 배우겠다 다짐해보면서.", "사랑의 어려움은 시대가 지나도 변하지 않아서 누군가를 사랑한다는 것은 매번 우리 한계를 넘는 일이다.", "언니는 그냥 집에서 가장 먼 바다를 떠올렸다고 했다. 정말 말 그대로 모래밭에서 오래오래 앉아 있기만 했다고, 밀려오고 다시 밀려나가는, 무언가륻 덮고 쓸고 아주 젖어들게 하는 마도를 보면서. 그렇게 패턴을 지닌 것들은 우리를 안정되게도 하는데 결국 그런 주기 안에서 모든 것이 나타났다가 사라지고 피었다가 어김없이 지고 말 것임을 예고하기 때문이다.", "삼촌은 언제 한번 꼭 족발을 먹으러 해운대에 올 것과 아버지와 자신들의 만남을 주선해줄 것을 당부했다. 그리고 전화를 끊을 때쯤 불쑥 그래, 니는 행복하제? 하고 물었다. 집으로 가는 차 안에 있던 나는 잠깐 말문이 막혔지만 그 대답할 수 없음을 지속하지는 않고 이내 그렇다고 말했다. \"행복해요. 행복하게 살고 있어요.\" \"그래, 안 행복할 게 뭐 있나, 맞제?\"", "사람은 언제 집요해지냐면 그것이 마음속의 어떤 것과 결부되어 있을 때, 아니 다시 생각해보면 '결부'라는 표현으로는 모자라고 그것이 내면의 어떤 것을 건드려 '위협' 할 때, 위협은 공포와 분노와 절박감과 동시에 아주 맹렬한 생의 의지를 불러일으키기도 하니까 최선을 다하게 된다.", "무언가를 많이 얻고 멀리 가는 것만이 능사는 아니야. 우리는 그렇게 최소의 방법으로 의외의 나를 구해낼 수 있지. 다행히 생각들이 조금씩 바뀌었어. 그러니까 내가 이 일에서 완전히 마음이 떠났다기 보다는 감당할 수 없을 정도로 버거웠다는 것이고 이 일을 이제 하고 싶지 않다기보다는 이 일을 건강하게 잘 하고 싶다는 마음에 가깝다고.", "나는 지금 당신과 내가 같은 마음이리라 생각하면서 적는 거야. 그러니까 아주 오랜 시간 동안 정성을 다했던 내 일, 내 작업, 내 직장, 내 노동이 더이상 즐겁지 않을 수 있다고 말하기 위해서. 그 느낌은 무엇보다 사람들로부터 시작되었겠지? 주변 사람들이 하는 말과 태도에 날카로워지고 상처받았어. 화가 나고 슬프고 억울해하다가 더 시간이 지나면서 무력해졌을 거야. 더이상 상처조차 패지 않는 단단한 체념.", "그러니까 우리가 안녕이라고 말하지 못한 이별들은 은폐되거나 덮이는 것이 아니라 기억되고 말해져야 한다. 그런 비극이 우리 삶과 얼마나 가까운 것이 될 수 있는지를 지금 또다시 보고 있기 때문에, 더이상은 겪고 싶지 않은 무참한 고통이기 때문에.", "어떤 불행은 나를 비켜 가리라는 기대보다는 내게도 예외란 없으리라는 엄연한 사실 앞에서 위로받는다."]}, {"title": "새벽과 음악", "author": "이제니", "genre": "에세이", "publisher": "시간의흐름", "passages": ["음악만이 유일한 위안이라고 썼던 새벽의 아픈 당신에게", "첫 시집을 내고 난 다음 해 겨울이었다. 이전과 같은 것을 쓸 수 없었다. 이전과 같은 것은 쓰기 싫었다. 멀리 떠나고 싶었다. 멀리 가면 무언가 다른 것을 쓸 수 있을 것 같았다. 멀어지려면 멀리 가야 한다고 생각했다. 심리적이고도 상징적인 거리를 넘어서서 몸으로 뚜렷이 각인될 수 있는 물리적인 거리를 건너가고 싶었다. 머나먼 시베리아라면. 그 혹한의 땅이라면. 무한한 무언가를 볼 수 있을 것도 같았다. 급히 넘겨야 할 원고들을 서둘러 넘기고. 써야 할 원고들을 가방 깊숙이 챙겨 넣고. 시베리아로 떠났다.", "어느 저녁. 응급 수술 후에도 여전히 줄어들지 않는 통증과 마비 상태 속에서. 이 병실을 걸어 나갈 수나 있을까. 한국으로 돌아갈 수나 있을까. 한국으로 갈 수 있다면 어떤 식으로 어떤 비행 편으로 이동을 해야 다친 몸의 이차 손상을 최소화할 수 있을까. 암담하고도 막막한 상황들을 생각하면서 울고 있는데 여자아이가 청소를 하러 들어왔다. 울고 있는 얼굴 때문인지 아이는 내 침대 머리맡으로 와서 작은 소리로 자꾸만 말을 건넸다. 허술한 철제 침대를 자기도 모르게 쓰다듬는지 침대가 살짝살짝 흔들렸다. 침대 머리맡이 그 아이의 온기로 인해 따뜻해졌다. 알아들을 수 없는 그 말을 알아듣기라도 한다는 듯 내 마음도 흔들렸다. 내가 한국에서 왔고 글을 쓴다는 것을 알아서인지 체첵은 자신의 이름이 한국말로 꽃이라고 알려주었다. 그러더니 자신의 목 뒷덜미를 가리키며 무언가 보여주려고 멀리 침대 발치로 가 섰는데. 목을 쉽게 가늘 수 있는 상태가 아니어서 가리키는 그것을 자세히 볼 수 없었다. 옆에 있던 사람이 체첵의 사진을 찍어주었고. 그리고. 그런 뒤. 휴대폰 화면에 찍힌 체첵의 목덜미를 보았을 때. 꽃. 그 목덜미 한가운데에는 '꽃'이라는 한글 하나가 문신으로 뚜렷이 새겨져 있었다. 꽃. 나는 그토록 슬프고 아름답고 강렬한. 그 어떤 단어를. 이전에는 본 적이 없었다. 그것은 누군가 머나먼 이국의 땅에서. 잊지 않기 위해서. 잃지 않기 위해서. 무언가 기억하기 위해서. 무언가 간직하기 위해서. 자신의 몸에 새겨놓은 간절하고도 간절한 모국어였다. 그리고 그것은 내가 그 먼 이국의 땅으로 밀려가. 기어이 보려고 했던. 보아야만 했던. 단 하나의 낱말이었다.", "아픈 허리를 하고 앉아 이제야 그 시절에 대해 쓰고 있다. 무언가로부터 멀어지려고, 멀리 가려고, 발버둥치는 시간들을 온전히 겪어야만 또 다른 무언가를 제대로 쓸 수 있을 거라고 생각하면서. 글을 쓰는 한은 누군가 무언가가 너에게 나에게 우리에게 어떤 시간을 요구한다고. 저 멀리 극단까지 가라고. 그렇게 갈 수밖에 없게 밀어붙이고 있음을 느끼면서.", "결국 쓴다는 것은 자신이 익숙하게 알고 있는 단어속에서 각자 자신만의 고유한 슬픔을 발견하는 것이라는 사실을. 자기가 가진 지극히 단순한 낱말 속에다 자신이 이미 알고 있는 또 다른 소리와 의미를 다시 새롭게 겹쳐 새겨 넣는 것이라는 사실을. 그렇게 일상 속의 아주 사소한 구멍. 아주 작은 틈새로. 추락하듯이 나아가면서. 비틀거리면서. 머뭇거리면서. 망설이면서. 주저하면서. 잘못 말할까 봐 전전긍긍하면서. 고쳐 말할 수 밖에 없는 언어적 상황 속에서. 그렇게 세계와 사물들 앞에서 매번 뒤늦은 존재로서. 언어적 말더듬이 상태에 직면한 채로. 자기 지시적인 단어들을 반복하여 중얼거리면서. 그것들의 자리를 매번 바꾸면서. 쓴다는 것은 선행된 것에 비하면 늘 뒤늦을 수밖에 없는 일이고. 늘 쓰려는 그것을 망치는 일일 뿐이라는 생각을 하면서도. 매번 돌아오는 봄이 지난날의 봄이 아니듯이. 매번 돌아오는 꽃이 지난 계절의 꽃이 아니듯이. 언어적 문맥 속에서 하나의 세계가 스스로 움직이며 날아오르는 순간을. 그렇게 자기 개시의 순간이 활짝 펼쳐지기를 기다리면서. 시의 몸을 입은 언어가. 시의 혼이 흐르는 언어가. 자신을 옭아매고 있던 오래된 의미의 그늘을 지워내고. 한없이 자유롭게 날아오르는 추론의 언어로 다시 움직여가기를. 그런 의미에서 오늘 다시 새로운 봄이고 새로운 꽃이다. 언제까지나 어리둥절한 채로. 순진무구한 아이처럼 바라보면서. 오늘 나는 다시 봄을 모른다. 오늘 나는 다시 꽃을 모른다. 그리하여 어느 날 다시. 꽃의 또 다른 이름 앞에서 문득 울게 될 때까지.", "어떤 음악은 눈물처럼 쏟아진다. 군더더기가 될 것이 뻔한 수사를 허락하지 않는다. 불과 몇 줄 읽어 내려가는 것만으로 압도당하는 기분을 느끼게 하는 책처럼. 그러나 문자가 전하는 것과는 또 다른 물성으로. 이 추상적인 물성에 대해, 언어화될 수 없는 아름다움에 대해 늘 명확한 언어로 쓰고 싶었다. 그러나 말할 수 없는 것을 말하는 일은 매번 실패로 귀결된다. 당신의 마음속에서 흐르고 있는 음악은 무엇입니까. 나는 내 마음속에서 배음으로 흐르는 음과 색을 언어로 드러내 보여주는 것을 나의 소명이라고 생각했다. 그러나 자음 하나 모음 하나를 조합해나가면서 이 티끌의 시간을 모아 음과 색에 언어를 덧입히는 것은 언제나 늘 뒤늦고 허망한 일처럼 여겨질 뿐이었다. 말해질 수 없는 자리에서부터 시작되는 무엇을, 그럼에도 끝끝내 써나가는 일이란 무엇일까.", "보편적인 죽음을 넘어서는 엄마의 죽음이라는 하나의 사건은, 단정한 언어로 수정되고 다듬어질 수 없는, 함부로 죽음을 윤색하는 행위처럼 느껴졌고. 엄마의 죽음은, 엄마의 삶은, 단정적인 언어로 고정시킬 수 없는 것이어서, 언어 밖의 영역이라서, 단락과 단락이 매끄럽게 재배치되는 것을 글 자체가 허용하지 않는 것처럼 느껴졌다. 그렇게 차마 다시 들여다볼 수 없는 기록들은 그저 공책 가득 알아볼 수 없는 글씨로 새겨져 페이지마다 구불구불 물결치고 있었고. 지금 쓰고 있는 이 글도 이전의 글을 들춰보거나 고쳐 쓰지 않고 다시 처음부터 새롭게 쓰고 있다. 끊어지고 어긋나고 모순적이고 파편화된 단상의 모음들일 수밖에 없다고 생각하면서. 그것 외에는 엄마의 죽음에 대해, 아니 엄마의 삶에 대해, 쓸 수 있는 다른 방도가 없다고 느끼면서", "당시는 세 번째 시집과 네 번째 시집을 출간한 직후였는데 거듭해서 중쇄를 찍고 있었다. 가난한 딸을 걱정하던 엄마를 안심시키려고 나는 중쇄와 관련해 출판사에서 보내온 문자를 엄마에게 보여주면서 약간의 과장을 섞어서 말했다. 연달아 인세가 들어오고 있다고. 그러니 이제 내 걱정은 하지 말라고. 마음 푸욱 놓아도 된다고. 엄마는 문자를 보더니 오랜만에 평상시의 천진한 얼굴로 돌아가서 내게 말했다. \"우리 딸, 날개 돋친 듯이 날아다녀라.\" 나는 그 작은 목소리를 분명하게 들었지만 다시 또 듣고 싶어서, 마음에 새기고 싶어서, 엄마에게 되물었다. \"엄마, 지금 뭐라고 했어?\" \"아니, 우리 딸, 날개 돋친 듯이 그렇게, 훨훨, 날아다니듯이, 살으라고.\" 산소 호흡기를 낀 채 엄마는 힘겹게 말했다. 나는 그것이 엄마가 내게 남긴 마지막 유언이라고 생각했다.", "우리는 아직 어떤 작별의 말도 나누지를 못했는데, 가족들은 아직 도착하지도 않았는데, 엄마는 안간힘을 다해 버티고 있는 것 같았다. 지체할 시간이 더는 없다는 생각에 나는 엄마에게 마지막 작별의 말을 했다. 엄마가 내 엄마여서 너무나 감사하다고. 사랑한다고. 고맙다고. 가족들 걱정은 하지 말라고. 그런 뒤 엄마의 의식이 있을 때 하려고 했던 그 말을 지금 바로 전해야겠다고 생각했다. 나는 엄마의 귀에 대고 조용히 말했다. \"엄마, 흰빛을 따라가. 흰빛을 따라가세요, 엄마.\" 그러자 엄마는 처음으로 고개를 돌려 천천히 나를 보더니 들은 말을 재차 확인이라도 하듯이, 그러나 단 한 번도 얘기나누지 않았던 순간이 도착한 것에 특별한 놀람도 없다는 듯이, 한 음절 한 음절 끊어서 천천히 말했다. \"나, 하늘나라, 갈 때?\" \"응, 엄마 그렇게 갈 때, 흰빛이 보이면 그 빛만 따라가\"", "보내야 할 메일 답장이 있어 블로그를 열었다가 영화 '패터슨'에 관해 지인들이 쓴 몇몇 글들을 읽었고 문득 무언가 쓰고 싶은 기분이 들어서 써 내려간다. '패터슨'에 관해서는 천천히 다시 한번 더 공들여 본 뒤에 제대로 된 리뷰를 쓰려고 했었는데. 모르겠다. 정리되지 않은 무언가를 쓰는 것이 내키진 않지만 거칠게나마 메모해 두는 것도 나쁘진 않을 것이다. '패터슨'은 보는 영화가 아니라 듣는 영화라는 생각. 패터슨이 시-쓰기를 시도할 때, 아니, 시 속으로 들어갈 때, 아니, 자기 자신으로 돌아갈 때, 아니, 자기가 아닌 다른 모든 것이 될 때, 화면 가득 소리들이 흘러 나오기 시작한다. 음향에 가까운. 하나의 노이즈로써. 그는 바로 그 음향 속에 속한 사람이다. 현실에 발 디디고 사는 사람이 아니라. 변화가 그리 크지 않은 그의 표정이 어딘가 공허한 듯 다른 무언가에 정신이 팔려 있는 것 같고, 아내와의 대화 혹은 관계에서도 감정 기복 없이 특별한 불평불만을 드러내지 않는 것도, 그는 이 세계에 속한 사람이 아니기 때문이다. 아니, 그는 너무 과잉되게, 초과하여, 이 세계에 속한 사람이기 때문이다.", "당연한 말이지만. 무언가가 되려고 한다는 것은 아직 무언가가 되지 않았다는 말이니까. 무언가로 불리길 원한다는 것은 아직 불리길 원하는 그것이 아니라는 것이니까. 자신이 바라던 무엇이 된 사람은 누구에게 무엇으로 불리든 무심한 법이니까.", "모르겠다. 작품이라고 부르는 것이 무엇인지. 작품이라고 부를 만한 것이 어떤 것인지. 우리가 쓰는 이 모든 것들이 다 무엇인지. 다만 그것이 무엇이라 불리든 간에. 쓰려는 그것이, 쓰려는 사람이 겨냥하고 있는 그것이, 쓰려는 그것의 저 밑바닥까지 드러내 보여주어야 한다는 것. 그러니까 인간의 저 어두운 바닥까지 내려가서 써야 한다는 것. 그것은 아주 집요한 일이고. 고도의 집중이 필요한 일이고. 무엇보다도 그것으로 살아가는 일이고. 그것은 지난한 싸움의 연속이고 시간에 지면서. 시간에 지치면서. 다시 일어나면서. 순간순간 자신을 넘어서는 의지가 필요한 일이고. 그것은 한순간에 습득되는 것도 아니거니와. 그렇다고 결코 가닿지 못하는 것도 아니거니와. 다가올 미래에 무엇이 되려고 하지 말고, 지금 바로 이 순간에 바라는 것이 되어. 조금씩 나아가봅시다. 지금 바로 행복해집시다.", "언제부터 음악이 내게 있어 단순한 멜로디 이상의 것이었는지 기억나지 않는다. 생각해보면 음악은 언제나 가장 가까운 친구로 곁에 있었다. 다른 둘이 아닌 한몸 같은 느낌 속에서, 바깥에서 안을 바라보는 시선이 아니라, 음악 안에서 바깥을 바라보는 형국으로 살아왔던 것 같다. 무엇이 이토록 큰 위안과 울림을 주는 것일까. 음악의 속성을 채 이해하기도 전에, 그것이 우리의 귀를 통해 어떻게 뇌를 거쳐 몸 전체에 폭발적인 파동을 일으키는지, 음악이 우리 몸과 마음에서 어떻게 작동하는지도 모르면서. 애초에 음악은 머리로 이해하는 것이 아닌 가슴으로 느끼는 것이니까. 자신의 내부에서 울려오고 있는 타고난 울음을 다른 누군가가 만들어낸 진동을 통해 내 속에서 다시금 실감하게 되는 것이니까.", "우리는 무언가 낭비하고 있었다. 낭비하고 낭비하는데도 왜 그런지 여전히 낭비할 것이 남아 있는 것만 같았다. 우리는 떠나왔던 곳에서와 마찬가지로 약간의 희망과 약간의 절망을 가지고 있었다. 약간의 행복과 약간의 불행을 가지고 있었다. 여전히 낭비할 빛과 어둠을 가지고 있었다.", "추운 하루였고 많이 걸었다. 걸으면 무언가를 마음껏 그리워할 수 있어서 좋다. 무언가를 잊기에도 좋다. 오래 간직해온 그리움이 떠나간 자리에는 그리움이라는 낱말로는 다 가릴 수 없는 잔상이 일렁이며 흘러가고 있었고. 그것들이 흘러가는 자리를 그저 뒤따라 걷는 것으로 나는 시간 속에서 잠깐 사라지는 사람이 될 수 있었다.", "선배의 표현대로, 자기 앞의 생을 받아들인다는 것, 수락한다는 것, 그것은 다른 말로 하자면, 구하지 못하는 것을 더 이상 바라지 않게 되었다는 말에 다름 아니겠지. 더 나아가 온전히 자기 자신에게 집중할 수 있게 되었다는 것. 외부의 상황이나 평가와는 무관하게 자기가 해나가려는 것을, 조급해하지도 초조해하지도 않으면서, 자기만의 속도로 하루하루 꾸준히 해나가겠다는 말이겠지. 단순하고 명료한 삶으로 나아간다는 것. 이제는 그도 나도 늙어간다는 것이 무엇인지 따로 시간을 내어 생각하지 않아도 자연의 순리를 어떠한 저항 없이 받아들일 나이가 된 것이겠지. 늙음을 받아들이게 되었다는 것. 젊다고 여겨지던 날들 속에서 경험할 수 있는 것들을 이미 온전히 경험하면서 만개했었던 청춘의 시절을 보낸 기억을 갖고 있기 때문이기도 하겠지만. 이제 더 이상 젊음이 부럽지 않다는 것은 얼마나 다행한 일인지. 또한 젊음이 부러울 만큼 충분히 늙지도 않았다는 사실 역시 얼마나 감사하면서도 겸허해지는 일인지.", "그 며칠전에 꾸었던 꿈은 멀리 떠난 여행길에서 혼자만 남겨진 꿈이었는데, 어디다 벗어두었는지 모를 외투를 찾아 헤매는 동안 일행은 떠나고 없었다. 인생이란 그런 것이다. 혼자 와서 혼자 가는 것. 그 곁에 동반자가 있고 없고와는 무관하게. 기쁨 혹은 슬픔과도 무관하게. 혼자로 오롯이 서서 살아가다 왔던 곳으로 다시 돌아가는 것. 그 과정에서 영혼의 수준을 조금이나마 높일 수 있다면 더욱 좋을 테고.", "인생은 짧은 것. 진정한 자신으로 살아가는 삶은 더욱 짧은 것. 그러니 타인의 옷을 입고 타인의 꿈을 꾸고 타인의 인정을 구하려고 애쓰는 대신 제 존재의 타고난 빛을 누리면서 살아가야 한다는 것을.", "나는 무언가를 기다리는 동시에 유예시키면서 이 날들을 건너가고 있다. 천장과 바닥 사이에서. 이전의 방에서 이후의 방으로. 그저 존재하는 것. 다만 존재하는 것. 나의 방의 그 모든 사물들처럼. 아니 그 모든 사물과는 다른 방식으로.", "무언가를 온전히 느끼기 위해, 사람의 무리를 떠나 마음을 움직였던 그 장소로 혼자 되돌아가는 것. 어릴 적부터 줄곧 그렇게 혼자만의 장소를 찾아 해맸다는 것을. 공유할 수 없는 풍경들 앞에서, 공유할 수 없는 감정들 앞에서, 오롯이 혼자여야만 한다고 느꼈던 그 모든 날들을 새삼 떠올린다. 이제 나는 혼자만의 방에서 혼자만의 문장을 쓰는 사람이 되었고. 이제 나는 사람이 없이도, 사랑 없이도 살아가게 되었다고 스러져가는 오후의 빛 속에서 공책을 펼쳐 몇 줄 적는다. 이제 나는 사람 아닌 사람이 되어버린 걸까. 이미 죽어버린 작가들만을 은밀히 사랑하는 것으로 인간과의 관계에서 누리는 최대치의 사치를 누리고 있다고 느끼면서", "이 삶이 언제까지 같은 방식으로 지속될 것인가, 어디까지 나아갈 수 있을 것인가. 지속되는 글쓰기 속에서. 지속되는 글쓰기와 함께 살아갈 날들이 문득 너무 아득하고 무겁게 느껴져서 삶의 끝을 앞당기고 싶다는 생각이 만성적인 통증처럼 찾아들고 나는 이내 머리를 가로젓는다. 책상 위에는 노동의 흔적이 자욱하고. 사랑하는 얼굴이 인화된 사진이 몇 장 놓여 있고. 닳아가는 연필과 지우개. 오늘 다시 쌓이 먼지들. 그리고 미지의 목소리를 향한 끝없는 항해. 그렇게 책과 책과 책들", "아주 어릴 적 소원 그대로 나는 글을 쓰는 사람이 되었는데. 글을 쓰는 깊은 새벽. 아픈 허리 때문에 나도 모르게 입술을 깨물면서 책상을 붙들고 있을 때면. 나는 자진해서 벌을 받는 사람이 되었구나 생각하곤 했고. 어떤 고통 속에서. 사람들은 왜 고통이라는 마음의 낱말 대신 통증이라는 보다 구체적인 몸의 낱말을 가져와 현실의 곤고함을 지우고 누르려고 하는 것인지 생각했고. 그렇게 사물과 사물 사이의 간극. 사물과 언어 사이의 간극. 나와 나 사이의 간극. 나와 언어 사이의 간극. 언어와 언어 사이의 간극을 느끼면서. 그런 간극이야말로 이 세계의 가장 깊은 진실을 가리키고 있는 것은 아닐까 하는 생각과 함께. 이제 나는 내가 시인이 아닌 것 같고. 같은 이유로 더는 시인이 아니기를 바란다. 내가 포기한 바로 그것으로. 그 언어로. 그 형식으로. 내가 바라는 바로 그 작가가 되기를 바라면서. 글을 쓰는 사람이 되고 싶었던 어릴 적의 소망 그대로. 무언가 다시 제대로 쓰기를 바라면서.", "할머니는 아픈 개를 작은 보행기에 태운 채로 목련이 피어 있는 그 길목에 늘 앉아 있었다. 길목 근처 농협을 오가던 사람들은 한눈에 보기에도 몸시 아파보이는 그 개를, 염증으로 짓무른 상처가 가득한 그 늙은 개를, 왜 병원에 데려가지 않느냐고, 한마디씩 하곤 했다. 할머니는 사람들의 편견과 참견과 호기심에 지쳐 더는 아무 말도 하지 않았다. 언제고 곁에 앉은 할머니의 친구들에게 하던 말을 우연히 들었고. 집에서는 알뜰히 살피고 따뜻하게 해주어도 개가 늘 운다고. 따뜻한 볕 아래로 나와 앉아 있으면 울지 않고 좋아한다고. 말을 하는 할머니 역시도 아파보이는 얼굴로 연신 기침을 하고 있었다. 조금 덜 아픈 것이 조금 더 아픈 것을 돌본다는 것. 조금 더 아픈 것이 조금 덜 아픈 것을 살게 한다는 것.", "글쓰기는 개인의 고독과 병증에서 출발한다. 그것이 겉으로 드러나든 드러나지 않든 글쓰기는 한 개인 내부의 가장 허약한 지점에서 떠오른다.", "읽는 법을 잊은 사람처럼 읽었다. 읽는 동시에 잊어버리는 사람처럼 읽었다.", "아직 말이 되지 못한 말들이 있다. 문장이 되지 못한 문장이 있다. 지금 이 순간, 충만함으로 가득한. 유년 시절의 느낌을 닮은. 한동안 잊고 있었던, 거의 공백 상태에 가까운. 내 삶의 원형. 백지와도 같은, 최초의 경이로운 경험들. 한때는 있었으나 이제는 없는 것. 지금은 있으나 곧 사라질 것들. 유년 시절을 불러들이는 물결과 물결과 물결과 피로와 파도와 피로와 파도와. 별빛을 받아 부서질 듯 위태롭게 반짝이는 밤바다를 어두운 다락방 어두운 다락방 창틀에 턱을 괴고 앉아 몇 시간이고 몇 시간이고 바라보던 날들.", "한 편의 시에서 언덕을 말할 때 '언덕'은 구체적인 높이와 깊이를 가진 실제적인 공간이 아닌, '언덕'이라는 단어에서 촉발될 수 있는 무수한 이미지를 뒤집어쓴 채로 순수하게 오해되고 있는 '언덕'이라는 단어 그 자체이다. 그렇게 언어로부터 발생하는 감각과 감정과 사건, 그리고 우리가 끝내 알지 못할 이전과 이후의 기억의 총합이 종이 위에서 펼쳐질 때. 나는 종이 위로 앞서가는 풍경을 눈앞의 실제보다 구체적으로 느끼곤 한다.", "보들레르는 나의 질문을 듣더니 그 질문 그대로를 다시 대답으로 들려주었다. 우리는 오랜 시간 서로에게 같은 문장으로 질문과 대답을 반복했다. 제대로 된 작별 인사 끝에 제대로 다시 보들레르와 만나기 시작했다는 것을 알았다. 내게는 슬픔이나 두려움에서 벗어나는 방법이 하나 있지만, 항상 성공하는 것은 아니다. 그 방법이란 내 주위의 사물이나 사람들을 될 수 있는 한 최대로 집중해서 바라보는 것이다. 그들을 응시하는 것. 아주, 아주 주의깊게 바라보면 갑자기 이 세상 모든 것을 마치 처음으로 보는 것 같았다. 그러면 그것은 이해할 수 없고 이상해졌다."]}, {"title": "설자은, 금성으로 돌아오다", "author": "정세랑", "genre": "소설", "publisher": "문학동네", "passages": ["코로나 19 팬데믹 시기를 지나는 동안, 저는 미스터리 장르에서 큰 위안을 얻었습니다. 언제나 원인이 밝혀지고, 답이 주어지고, 해결이 있는 이야기들이 때로 그렇지 못한 현실의 중압감을 잊게 해주었습니다. 몇백 권을 읽고 나서, 한 권을 더하게 되었습니다.", "시대 배경을 고르는 일은 고민스럽지 않았습니다. 고대사의 이야기와 역사가 아직 분리되지 않은 형태로 기록된 부분에 매력을 느끼곤 했고, 그 어떤 비극에도 안전한 심리적 거리를 가질 수 있는 점 역시 좋았습니다. 특히 신문왕 시대에 항상 끌렸습니다. 큰 전쟁이 끝난 통일신라는, 한껏 융성을 향해서 가다가 어느 순간 무너지기 시작했지요. 풍요 속에 숨어 있는 붕괴의 씨앗 같은 것을 천삼백 년이 넘게 지난 지금 제대로 헤아릴 수 없겠지만, 먼 시대를 거울삼아보는 일은 언제고 의미가 있다고 여깁니다."]}, {"title": "세계 끝의 버섯 1/2", "author": "애나 로왠하웁트 칭", "genre": "인문", "publisher": "현실문화", "passages": ["대부분의 학술서와는 달리, 이 책에는 짧지만 다채로운 장들이 펼쳐질 것이다. 나는 그 장들이 비 온 뒤 쑥쑥 올라오는 버섯과 같았으면 했다. 다시 말해서 넘쳐날 만큼 풍부한 것, 탐험을 부르는 것, 언제나 너무 많은 것이 되기를 바랐다. 각 장의 이야기가 모여 만드는 것은 논리적인 기계가 아니라 열린 배치다. 각 장은 그 바깥에 있는, 훨씬 더 많은 이야기를 향해 손짓한다. 각 장은 서로 얽혀 있으면서도 서로를 방해하는데, 그 모양이 내가 서술하려고 하는 세계의 패치성과 닮았다. 아울러 책에 첨부된 사진은 텍스트와 나란히 어떤 이야기를 들려주지만, 미리 얘기해두자면 삽화처럼 텍스트를 직접적으로 설명하지는 않는다. 내가 이미지를 사용하는 것은 내가 논하는 장면보다는 내 주장에 깃들어 있는 정신을 나타내기 위해서다.", "내 책은 '제3의 자연'을 제안하는데, 그것은 곧 자본주의 속에서도 삶을 살아내는 것을 뜻한다. 우리는 제3의 자연을 깨닫기 위해서라도 미래가 단일한 방향으로 뻗어나간다는 가정을 버려야 한다. 양자장의 가상 입자들처럼 복수의 미래가 수많은 가능성과 함께 출몰한다. 제3의 자연은 이런 시간적 다성음악 안에서 창발하기 때문이다. 하지만 진보에 관한 이야기들이 우리 눈을 멀게 했다. 이 책은 진보의 이야기 없이 세상을 이해하기 위해 삶이 얽혀 있는 방식의 열린 배치를 그려낼 것이다. 이들 열린 배치가 많은 종류의 시간적 리듬과 조화를 이루면서 합쳐지기 때문이다. 나의 형식 실험과 내가 펼치는 주장은 서로를 뒷받침한다.", "이 책은 불확정성과 불안정성의 상황, 즉 안정성에 대한 약속이 부재하는 삶을 탐구하기 위해 버섯과 함께 떠난 나의 여행 이야기다. 1991년 소련이 무너지자 갑자기 정부 지원을 못 받게 된 수천 명의 시베리아인이 버섯을 따러 숲으로 달려갔다는 이야기를 읽은 적이 있다. 내가 쫓는 것이 이러한 버섯은 아니지만, 이 이야기에 내가 하고 싶은 말이 담겨 있다. 바로 우리 것인 줄만 알았던 통제된 세계가 실패했을 때, 통제받지 않는 버섯의 삶이 선물이자 길잡이가 되어준다는 것이다.", "송이버섯은 인간이 교란한 숲에 산다. 쥐, 너구리, 바퀴벌레처럼 송이버섯도 인간이 만든 환경 문제의 일부를 기꺼이 참아주고 있다. 하지만 송이버섯은 유해 생물이 아니다. 송이버섯은 귀한 고급 식재료이며, 적어도 일본에서는 높은 가격 때문에 종종 지구상 가장 귀한 버섯으로 취급되기도 한다. 송이버섯은 나무에 영양분을 제공할 수 있기 때문에, 척박한 땅에서도 숲이 조성될 수 있도록 돕는다. 송이버섯을 따라가다 보면 환경 교란이 일어나고 있음에도 공존할 수 있는 가능성을 배우게 된다. 이것이 환경을 더 훼손해도 된다는 뜻은 아니지만, 여하간 송이버섯은 협력적 생존의 한가지 방식을 보여준다.", "산업적으로 탈바꿈한다는 것은 생계 터전을 잃고 풍경을 훼손하게 될 물거품 같은 약속이었다. 하지만 그것이 전부는 아니다. 이런 기록에 미쳐 담기지 않은 이야기가 있다. 우리가 이 이야기를 쇠락의 결말로 마친다면 모든 희망을 저버리는 것이나 다름없다. 그렇지 않다고 하더라도 약속과 붕괴가 거듭되는 다른 장소로 눈을 돌리는 것에 지나지 않을 것이다.", "인류세란 인류가 출현하면서 시작된 것이 아니라, 풍경과 생태의 광범위한 파괴를 주도한 근대 자본주의가 도래하면서 시작됐다고 보는 것이 가장 설득력이 있다. 그러나 이런 시기 문제 때문에 접두사 '인류-'는 더 문제가 된다. 자본주의 등장 이후의 인간을 상상해보면 진보라는 관념, 그리고 인간 및 다른 존재들을 모두 자원으로 만들어버린 소외 기술의 확산을 떠올리지 않을 수 없다. 이 같은 기술은 인간들을 분리하고 정체성을 철저히 감시함으로써 협력적 생존을 어렵게 했다. 인류세 개념은 근대인의 자만심이라 부를 만한 이런 열망덩어리를 환기시키는 동시에, 우리가 이를 넘어설지도 모른다는 희망을 불러일으킨다. 과연 우리는 이러한 인간 체제 내에서 살아가면서도 그 체제를 넘어설 수 있을까?", "국가의 유효성과 자연 풍경에 대한 자본주의의 대대적인 파괴를 고려할 때, 우리는 국가와 자본주의의 기획 바깥에 있던 것들이 오늘날 왜 살아남았는지 질문할 수 있다. 이 질문에 답하려면 다루기 힘든 가장자리의 것들을 관찰할 필요가 있다. 미엔인과 송이버섯이 오리건주에서 함께 모이게 된 까닭은 무엇일까? 언뜻 사소해 보이는 이런 질문이 모든 것의 방향을 뒤집어, 예측 불가능한 마주침을 핵심적인 것으로 보도록 이끌지도 모른다.", "배치는 유용한 개념이다. 생태학자는 때로 고정되고 제한된 함의를 갖는 생태적 '공동체'를 벗어나 배치로 관심을 돌렸다. 하나의 배치 안에 존재하는 여러 생물종이 어떤 방식으로 서로서로 영향을 끼치는지는 결코 정해져 있지 않다. 어떤 것은 서로를 방해하고 (혹은 먹고) 어떤 것은 생존을 위해 협력한다. 또 어떤 것은 자신들이 같은 장소에 있음을 이제 막 우연히 알게 됐다. 배치는 열린 모임이다. 이를 통해 우리는 편견 없이 공동의 영향에 대해 물을 수 있고, 형성 중인 잠재적 역사를 볼 수 있다. 그러나 내가 뜻하는 바를 위해서는 요소들의 모임을 가리키는 유기체가 아닌 다른 무언가가 필요하다. 삶의 방식이 한데 모이는 모습을 봐야 할 것이다. 인간의 존재 방식과 마찬가지로 비인간의 존재 방식도 역사적으로 변화한다. 살아 있는 것들에게 생물종으로서의 정체성은 출발점이지만, 그것만으로는 충분치 않다. 존재 방식이란 마주침에서 창발하는 결과다. 인간을 떠올려보면 이 점이 분명해진다. 버섯 채집은 삶의 방식이지만 모든 인간이 공유하는 특성은 아니다. 다른 생물종의 경우도 마찬가지다. 소나무는 인간이 만들어낸 빈터를 사용하는 데 도움이 될 버섯을 찾는다. 배치는 삶의 방식을 모으기만 하는 것이 아니라 그러한 방식을 만들어낸다. 배치를 중심에 놓고 생각하면 다음과 같이 질문하게 된다. 어떻게 모임은 때때로 부분들의 합보다 더 큰 '사건'이 되는가? 만약 진보를 뺀 역사가 불확정적이고 다각적이라면, 배치가 그것이 지닌 가능성을 보여줄 수 있는가? 배치에서는 의도치 않은 조율 패턴이 발달한다. 그런 패턴을 알아차린다는 것은 다양한 삶의 방식이 모여 빚어내는 시간적 리듬 및 규모의 상호작용을 지켜본다는 뜻이다.", "미국에서 유행하는 판타지를 살펴보면, 생존이란 항상 다른 존재와 싸워 자기 자신을 지키는 것을 뜻한다. 미국 텔레비전 프로그램이나 외계 행성 이야기에 등장하는 '생존'은 정복과 팽창의 동의어다. 나는 생존을 그런 의미로 사용하지 않겠다. 이 책을 읽는 독자들도 열린 마음으로 다른 의미를 생각해보기 바란다. 어떤 생물종이든 살아 있기 위해서는 살기에 적합한 협력이 필요하다는 것이 이 책이 주장하는 바다. 협력이란 차이를 수용하며 일한다는 의미로, 이것은 곧 오염으로 이어진다. 협력하지 않는다면, 우리 모두는 죽는다.", "우리가 각자 홀로 생존한다는 식의, 사실과 정반대되는 환상을 품을 수 있는 건, 다른 존재를 의식하지 않아도 되는 특권이 있기 때문이다. 만약 생존하기 위해 항상 다른 존재와 관계를 맺어야 한다면, 생존이란 필연적으로 자기 자신과 다른 존재가 함께 변형하는 과정에서 나타나는 불확정성에 영향을 받을 수밖에 없다.", "설상가상으로 오염된 다양성은 근대 지식의 특징이 된 일종의 '요약하기'에 저항한다. 오염된 다양성은 특수하고 역사적이며 항상 변화할 뿐 아니라 관계를 맺으며 존재한다. 여기에 자립적 구성 단위란 없다. 오염된 다양성의 구성 단위는 마주침에 기반한 협력이다. 자립적 구성 단위가 없다면, 어느 '하나의' 관련자에 대한 비용과 혜택 또는 기능성을 산출하는 것도 불가능하다. 그 어떤 자립적 개별자나 집단도 마주침을 감지한 상태에서는 자신의 개별적 이익을 확신할 수 없다. 자립에 기반한 알고리즘이 없다면, 학자와 정책 입안자는 문화사와 자연사에서 중대한 것을 배워나가야 할지도 모른다. 하나의 등식으로 전체를 파악하길 꿈꾸는 사람들에겐 아마도 시간이 너무 오래 걸리는 일일 것이다. 그러나 누가 그들에게 그것을 파악할 책임자의 지위를 주었는가? 만약 골치 아픈 이야기를 쏟아내는 것이 오염된 다양성에 대해 말할 수 있는 최선의 방식이라면, 이제 그렇게 쏟아내는 것을 우리의 지식 실천의 일부로 만들 때다. 어쩌면 전쟁 생존자들과 마찬가지로, 우리는 죽음과 죽을 고비와 쓸데없는 삶에 대한 우리의 모든 이야기가 우리 편에 서서 현재의 도전에 직면하도록 도와줄 때까지 말하고 또 말해야 할 것이다. 골치 아픈 이야기들의 그런 불협화음에 귀 기울일 때, 비로소 우리는 불안정한 생존을 향한 최선의 희망과 마주칠 수 있을지 모른다.", "당신은 생각하는 것이 아닙니다. 당신은 그저 논리적일 뿐입니다.", "인류가 규모의 확장을 통해 전진한다는 인식은 매우 강력하게 자리 잡았다. 따라서 확장될 수 있는 요소는 어마어마한 주목을 받고, 확장될 수 없는 요소는 걸림돌로 여겨진다. 이제는 우리가 단지 서술 대상으로서만이 아니라 이론을 성립하게 하는 요인으로서 확장될 수 없는 요소에 관심을 기울일 때다.", "송이버섯은 다른 생물종과 변형적인 관계를 맺지 않고서는 살아갈 수 없는 것이 분명하다. 송이버섯은 숲의 특정한 나무와 어울려 지내는 땅속 곰팡이의 자실체다. 이 곰팡이는 숙주 나무 뿌리와 상리공생 관계를 맺는데, 나무에게 양분을 찾아주고 자신은 나무로 부터 탄수화물을 얻는다. 송이버섯 덕택에 숙주 나무는 비옥한 부엽토가 없는 척박한 땅에서도 살아갈 수 있다. 그 대가로 곰팡이는 나무에게서 영양분을 공급받는다. 이 변형적인 상리공생 때문에 인간의 송이버섯 재배는 불가능했다. 일본의 연구기관들이 송이버섯을 재배하기 위해 수백만 엔을 들여 노력해왔지만 아직 성공하지 못했다. 송이버섯은 플랜테이션 농장의 환경 조건에 저항한다. 송이버섯에 필요한 것은 숲의 역동적인 다종적 다양성, 그리고 이를 통해 서로를 오염시키는 관계성이다.", "불안정성을 염두에 두고 생각한다는 것은, 확장성을 만들어내고자 하는 프로젝트가 풍경과 사회를 변형시켜온 방식을 이해함과 동시에 한편으로는 확장성이 실패하는 지점, 그리고 확장성 없는 생태적, 경제적 관계가 분출하는 지점을 응시해야 한다는 점에서 도전적인 일이다. 확장성과 비확장성 양쪽 모두가 이뤄놓은 결과에 주목하는 것이 중요하다. 그러나 확장성은 나쁘고 비확장성은 좋다고 생각하는 것은 큰 착각이다. 확장성 없는 프로젝트도 확장성있는 프로젝트만큼이나 끔찍한 결과를 낳을 수 있다. 규제받지 않고 일하는 벌목꾼들은 과학적인 산림감독관보다 더욱 빠르게 숲을 파괴한다. 확장성 있는 프로젝트와 확장성 없는 프로젝트를 가르는 주요한 특징은 윤리적 행동 여하가 아니다. 확장성 없는 프로젝트는 팽창할 채비를 하지 않기 때문에 좀 더 다채로운 양상을 띠지만, 그것 역시 무해한 것부터 끔찍한 것에 이르기까지 다양한 범위에 걸쳐 있다.", "냄새는 규정하기 힘들다. 우리는 냄새의 효과에 깜짝 놀란다. 냄새가 강렬하고 특정한 반응을 일으킬 때조차도 우리는 냄새를 말로 설명하는 방법을 잘 알지 못한다. 인간은 공기를 들이마실 때 숨쉬기와 냄새 맡기를 동시에 하는데, 냄새를 묘사하는 것은 공기를 묘사하는 것만큼이나 어렵다. 그러나 공기와 달리 냄새가 난다는 것은 또 다른 것이 존재한다는 신호이며, 우리는 그것에 이미 반응하고 있다. 반응은 항상 우리를 새롭게 한다. 우리는 더는 우리 자신 - 또는 최소한 이전의 우리 자신 - 이 아니라 또 다른 것과 마주치고 있는 우리 자신이다. 마주침이란 본래 정확히 규정할 수 없는 현상이다. 우리는 마주침을 통해 예상할 수 없는 방식으로 변형된다. 규정하기 어렵지만 명확히 존재하는 혼란스러운 조합의 냄새가 마주침에 내재한 불확정성에 대해 알려주는 유용한 안내자가 될 수 있을까?", "인간은 마주침에서 맞닥뜨린 시련에 대처하기 위해 역사를 소환한다. 이러한 역사는 인간과 비인간 모두에게 결코 잘 짜인 기계장치 프로그램이 아니라 오히려 불확정적인 지금 여기의 응축이다. 철학자 빌터 벤야민이 표현한 것처럼, 우리가 붙잡는 과거는 '위험의 순간에 빛나는' 기억이다. 우리는 '이전에 가본 곳으로 뛰어드는 호랑이의 도약처럼' 역사를 재연한다고 벤야민은 말한다.", "자본주의적 농장은 부를 모으기 위해 생태적 과정을 통해 형성된 살아 있는 존재들을 끌어들인다. 나는 이를 '구제'라고 부르는데, 자본주의적 통제를 받지 않고 생산된 가치를 써먹는 것을 의미한다. 자본주의적 생산에 사용되는 많은 원료는 자본주의가 시작되기 훨신 전부터 존재했다. 또한 자본가들은 '노동'의 전제 조건인 인간 생명을 생산할 수 없다. '구제 축적'은 선두 기업이 상품 생산 조건을 통제하지 않고 자본을 축적하는 과정이다. 구제는 통상적인 자본주의 과정에서 드러나는 부수적인 장식이 아니다. 그것은 자본주의가 작동하는 방식의 한 가지 특징이다.", "어떤 개념을 살아 숨쉬게 하려면 구체적인 역사가 있어야 한다. 그렇다면 버섯 채집이야말로 진보 이후에 탐색해볼 만한 장소이지 않은가? 송이버섯이 거쳐 가는 오리건주에서 일본까지의 상품사슬에 존재하는 균열과 가교를 살펴보면 경제적 다양성을 통해 성취된 자본주의가 드러난다. 주변자본주의적 행위를 통해 채집되고 팔리는 송이버섯은 채집된 다음날 일본으로 보내지면서 자본주의의 재고품이 된다. 이러한 번역은 많은 글로벌 공급사슬의 중심이 되는 문제다.", "자유에 대해 질문할수록 나는 그 용어가 더욱 낯설게 느껴졌다. 여기서 자유란 용어는 개인의 합리적 선택의 규칙성을 논하기 위해 경제학자들이 사용하고 상상하는 그것이 아니다. 정치적 자유주의도 아니다. 버섯 관계자들의 자유는 불규칙적이며, 합리화의 외부에 존재한다. 공연 성격을 띠고, 공동체에 따라 다양하며, 기운이 넘치기 때문이다. 이것은 그 장소의 소란스러운 코즈모폴리터니즘과 관련이 있다. 왜냐하면 그 자유가 잠재적인 분쟁과 오해로 가득한 열린 문화적 상호작용으로부터 등장하기 때문이다. 나는 자유가 유령과의 관계에서만 존재한다고 생각한다. 자유는 귀신 들린 풍경에서 유령들이 벌이는 협상이다. 자유가 귀신 들린 곳에서 귀신을 몰아내는 것이 아니라 세련되게 협상하고 살아남는 방식으로 작동하기 때문이다.", "채집 또한 노동이 아니다. '일'조차도 아니다. 라오계 채집인 사이는 '일'이란 자신의 상사가 시키는 작업을 하면서 그에게 복종하는 것을 뜻한다고 설명했다. 반면에 송이버섯 채집은 '찾는 행위'다. 자신의 업무를 하는 것이 아니라 거금의 재산을 찾는 행위다. 채집인들이 새벽부터 일어나 해가 질 때까지 눈을 헤쳐가며 산에 남아서 열심히 일하기 때문에 좀 더 많은 돈을 벌어야 한다고 채집인에게 호의적인 태도를 보이는 백인 캠핑장 소유주가 내게 말했을 때, 이러한 그의 시각에서 마음에 걸리는 부분이 있었다. 나는 어떤 채집인도 그런 식으로 말하는 것을 들어본 적이 없었다. 내가 만난 채집인 중 어느 누구도 송이버섯으로 얻은 돈을 자신의 노동에 대한 대가로 생각하지 않았다. 나이 통이 가끔 맡는 손주 돌보기조차도 버섯 채집보다 일에 더 가까운 행위였다.", "기다림 또한 자유를 수행하는 것의 일부다. 다시 말해 예의범절, 노동, 재산과 어느 정도 거리를 두면서 마음에 드는 곳이라면 어디든지 찾아갈 수 있는 자유, 채집인은 자신의 버섯을 어느 구매인에게나 가져갈 수 있고 구매인은 그 버섯을 어느 현장 중개인에게나 가져갈 수 있는 자유, 다른 구매인을 폐업하게 만들 수 있는 자유, 감자기 떼돈을 벌거나 모든 것을 잃을 자유 말이다.", "백인 참전용사가 자유는 인종적으로 완전히 분리된 풍경 속에 있다고 상상했다면, 캄보디아인은 전쟁이 어떤 사람을 자신도 인식하지 못하는 사이에 이편에서 저편으로 만들어버리는 것에 대해 이야기했다.", "그날 오후 나는 혼자서 버섯을 줍고 있었는데 근처에서 갑자기 총소리가 들렸다. 너무 무서웠다. 어느 방향으로 달려야 할지 알 수 없었다. 나중에 행에게 물어보았다. '달리지 마!' 그는 말했다. '달려간다는 건 두려워한다는 걸 보여주는 거지. 나라면 절대 달리지 않을 거야. 그게 내가 지도자인 이유야.\"", "글로벌 공급사슬은 진보에 대한 기대를 없애버렸다. 선두 기업이 글로벌 공급사슬을 이용하게 되면서 노동력 통제에 전념하는 전략에서 벗어날 수 있었기 때문이다. 노동을 표준화하기 위해서는 교육과 정규직 일자리가 필수적이었고, 따라서 이윤과 진보는 연결되어 있었다. 이와 반대로 선두 기업은 이제 공급사슬을 통해 많은 배열 장치를 거쳐 조립된 상품을 생산함으로써 이윤 창출이 가능하다. 일자리, 교육, 복리를 약속하고 실천하는 것이 더는 겉치레로서도 필요하지 않다.", "거시사를 서술하는 가장 좋은 방법은 꾸준하게 등장하는, 대수롭지 않아 보일 수 있는 구체적인 사실을 이야기하는 것이다.", "소외 문제로 돌아갈 시간이다. 상품화에 대한 자본주의적 논리에 따르면 사물은 교환 대상이 되기 위해 그것들이 속했던 삶의 세계와 분리된다. 이 과정을 나는 '소외'라 부르는데, 인간뿐 아니라 비인간의 잠재적 속성을 설명하는 용어로 사용한다. 채집인과 버섯의 관계에 소외가 개입되지 않는다는 점은 오리건주의 송이버섯 채집에서 관찰할 수 있는 놀라운 사실이다. 채집인은 버섯을 균질체에서 떼어낸다. 그러나 채집된 버섯은 팔릴 때조차 돈을 자본으로 전환시킬 준비를 마친 소외된 상품이 되지 않고 사냥의 트로피가 된다. 채집인은 자부심에 가득 차서 자신이 딴 버섯을 자랑한다. 버섯 찾기의 기쁨과 위험에 대해 쉴 새 없이 이야기한다. 마치 채집인이 버섯을 먹은 듯이 버섯은 채집인의 일부가 된다. 이는 어떻게든 그 트로피가 상품으로 전환 되어야만 한다는 것을 뜻한다. 만약 버섯이 자유의 트로피로서 채집되고 그 과정에서 채집인의 일부가 된다면, 이것은 어떻게 자본주의 상품이 되는가?", "생산자는 누군지 모르는 상태에서 상품이 팔리면서 공장 노동자가 자신이 만드는 사물로부터 소외되는 것과 마찬가지로, 사물도 그것을 만들고 교환하는 사람에게서 소외된다. 사물은 홀로 존재하는 물건이 되어 이용되고 교환된다. 그 사물은 그것을 생산하고 배치한 사람들의 관계망과 어떤 관련도 맺지 못하게 되기 때문이다. **[출처]** [세계 끝의 버섯 1/2 _ 애나 로왠하웁트 칭](https:blog.naver.com/skdyds/223243543898)|**작성자** [라용](https:blog.naver.com/skdyds)"]}, {"title": "세계 끝의 버섯 2/2", "author": "애나 로왠하운트 칭", "genre": "인문", "publisher": "현실문화", "passages": ["나는 교란을 시작점, 즉 행동을 위한 첫 단추로 삼는다. 교란은 변형적인 마주침을 위한 가능성을 재배치한다. 풍경의 패치들은 교란에서 등장한다. 그리하여 불안정성은 인간을 넘어서는 사회성에서 일어난다.", "인간에 의해 교란된 풍경은 인문학자와 동식물 연구가가 알아차리기를 실행할 수 있는 이상적인 공간이다. 우리는 인간이 그 공간에서 만들어낸 역사, 그리고 비인간 참여자의 역사를 알 필요가 있다.", "교란은 하나의 시작으로, 항상 도중에 일어난다. 즉, 교란이라는 용어에는 교란 이전에는 조화로운 상태였다는 전제가 없다. 교란은 다른 교란을 뒤따른다. 따라서 모든 풍경은 교란되어 있고, 교란은 일상적으로 이루어진다.", "나무는 근대적 자원이 되었고, 자원을 관리하는 방식이란 그것의 자율적인 역사적 활동을 멈추게 하는 것이다. 나무가 역사를 만드는 한, 그것들은 산업적인 통치를 위협한다. 숲을 청소하는 일은 그 역사를 멈추게 하는 작업의 일부다. 그런데 언제부터 나무가 역사를 만들었는가?", "소나무는 버섯과의 마주침을 통해서만 번창한다. 근대 산림관리는 소나무 역사의 한순간을 포착잡을 수 있지만 마주침에 기반한 시간의 불확정성을 멈추게 할 수는 없다.", "송이버섯은 바위와 모래를 분해하는 강한 산을 분비하고 소나무와 곰팡이의 상호 성장을 돕는 영양분을 발산한다. 송이버섯과 소나무가 함께 성장하는 험한 풍경에서는 다른 곰팡이가 거의 존재하지 않는다.", "미국 태평양 연안 북서부의 한 연구자는 일본의 연구들이 '서술적'이기 때문에 별로 유용하지 않다고 말했다. '서술적'이라는 말이 무슨 뜻인지, 그것이 왜 잘못된 것인지 알려면 미국 산림관리 연구의 문화적이고 역사적인 특정성에 집중해야 한다. 서술적이라는 말은 장소 특정적이다는 의미인데, 즉 정확히 규정될 수 없는 마주침, 그렇기 때문에 확장될 수 없는 방식에 맞춰져 있다는 뜻이다.", "숲에서도, 과학에서도 포자는 우리의 상상력이 또 다른 범세계적인 위상 구조에 이르게 한다. 포자는 미지의 목적지를 향해 날아가고, 유형을 교차해 교배하며, 최소한 가끔씩 새로운 유기체를 낳는다. 새로운 종류의 시작이다. 포자는 분명하게 정의하기 힘들다. 그것이 포자의 품격이다. 풍경을 생각할 때 포자는 우리를 개체군 내부에 존재하는 이질성으로 안내한다.", "문화인류학자들이 자신의 연구 단위를 계속 사용하려면 그 연구 단위를 끊임없이 의심해야만 하는 틀로 다루는 것과 똑같은 방식으로 스즈키 박사는 생물종을 다루고 있었다.", "연구자는 오직 서로의 관계 속에서만 이름 지을 수 있는 집단들을 갖기 시작합니다.", "움직이는 것은 생태계다. 인간이 매우 많은 다른 생물종을 의도하지 않고 이동시킨 것이 놀라운 일은 아니라는 것이다. 우리는 항상 새로운 생태계를 창조하기 때문이다. 그리고 사물을 바꾸는 것은 인간만이 아니다.", "우리는 우리보다 먼저 다녀간 수확꾼들의 흔적을 따라가며 그들이 남긴 것들을 어루만진다. 나무에 닻을 내리고 있는 송이버섯은 같은 장소에 다시 나타나기 때문에 이 방법은 놀랍게도 생산적인 전략이다. 우리는 우리보다 먼저 다녀갔지만 자신들의 활동선 흔적을 우리에게 남겨놓은 보이지 않는 채집인과 우리 자신을 나란히 맞춘다.", "브라운은 번역이라는 실천을 통해 채집인들이 화합하게 만들었다. 번역이라는 실천은 너무 쉬운 해결책으로 안주하는 것을 저지하면서, 차이의 해소 대신에 창조적인 듣기를 장려하며 차이를 용인한다. 듣기는 브라운의 정치 활동의 시작점이었다. 그의 활동은 언어가 아니라 도시와 시골 간의 간극으로 시작됐다.", "상호 배움도 중요한 목표다. 집단들은 실수하는 것과 그 실수에서 배우는 것에 대해 솔직하다. 한 봉사자 집단이 이룬 사토야마 작업에 대한 보고서에는 자신들의 노력으로 빚어진 모든 문제점과 실수가 포함되어 있다.", "때때로 공동의 얽힘은 인간의 계획에 의해서가 아니라 인간이 세운 계획과 상관없이 등장한다. 달성하기 힘든 공동의 삶의 순간을 가능하게 하는 것은 계획의 실패가 아니라 오히려 그 계획의 설명되지 않는 부분이다. 사유재산 만들기의 경우가 그렇다. 자산을 모을 때 우리는 공유지를 무시하는데, 공유지가 집합 자산의 구석구석에 퍼져 있을 때조차도 그러하다. 그러나 알아차리지 못한 것들 또한 잠재적인 협력자들을 위한 장소가 될 수 있다.", "우리는 시각을 너무 많이 믿는다. 나는 땅을 쳐다보고 '이곳에는 아무것도 없어'라고 생각했다. 그러나 마치맨이 손을 더듬어 찾아낸 것처럼, 그곳에는 무언가가 있었다. 진보 없이도 헤쳐 나가려면 우리의 손을 이용해 충분히 느껴야 한다.", "끝맺기를 거부하는 이 책은 어떤 종류의 책인가? 송이버섯 숲처럼, 각각의 우연한 모임은 예상하지 못한 풍부함으로 다른 모임들을 지원한다. 학문의 상업화를 반대하며 한계를 넘어서지 않았다면 이것은 불가능했을 것이다.", "협력을 낳는 오염과 불확정성을 두려워하지 말라", "다종의 세계 만들기를 인류 구원이라는 특정한 목적을 가지고 바라본다면, 우리는 지금까지 인류가 지향해온 인본주의적 정치경졔를 버리지 못한 채 다종의 세계 만들기를 인간만을 위해 이용하고자 할 것이다. 화성 탐사처럼, 지구의 생태계를 파괴하는 현재의 정치, 경제, 사회 체제를 바꾸지 않은 채 우주를 식민화해 지구 환경의 대안으로 삼으려는 현재 군사과학의 양상과 크게 다를 바 없을 것이다.", "번역은 노동이 아니다. 번역은 동남아시아 채집인들이 떠나온 고향을 느끼기 위해, 임금노동에서 맛볼 수 없는 자유를 누리기 위해 숲에서 버섯을 찾아다니듯이, 노동을 거부하고 글에서 의미를 찾는 일이다. 번역은 노동의 효율성, 소위 '가성비' 추구를 내팽개칠 때에만 가능하다."]}, {"title": "스탠드업 코미디 대본집", "author": "양다솔", "genre": "에세이", "publisher": "은행나무", "passages": ["농담 짓기가 쓰기보다 훨씬 어렵다는 것을 깨닫는 데는 긴 시간이 필요하지 않았습니다. 재미있는 말을 하려고 보니 결국은 다시 자리에 앉아야 하더라고요. 대본을 써야 했거든요. 말은 허공에 흩어져 버려 그 구성과 핵심을 잡을 수 없었어요. 무대에서 겁도 없이 설치다 잊을 수 없는 치욕을 겪고 결국 주저앉아 고민하기 시작했습니다. 무슨 이야기든 제대로 하려면 글로 돌아가는구나. 흩어지는 단어들을 붙잡아 앉혀야 하는구나, 새삼 분명해졌습니다.", "농담은 간단하고 명확한 구조를 갖고 있습니다. 셋업과 펀치 라인입니다. 이를 전제와 반전이라고 말하기도 합니다. 농담은 셋업과 펀치 라인의 반복으로 구성되는 긴장과 이완의 움직임입니다. 웃고자 하는 일에 긴장이 필요하다니 재미있지요. 물론 이 안에 공감, 반전, 통찰이 두루 포함되어야 합니다. 셋업은 농담이 하는 이야기의 전반을 설명합니다. 펀치 라인은 그 전제로 만들어진 기대와 흐름을 완전히 뒤집거나 과하게 증폭시킵니다. 관객은 생각지 못한 전개를 맞닥뜨리고, 허를 찔리고, 금기를 범하며 사고의 영역에 가기 앞서 웃음을 터뜨리게 됩니다. 판단하기 이전에 진동하게 됩니다. 네, 뭐 어디까지나 성공한 농담이 그렇다는 것입니다.", "좋은 농담은 어떤 것을 드러냈는가보다 어떤 것을 생략했는가가 관건이기도 합니다. 농담은 '좋은 생략'이라고 말해도 좋을 것입니다. 저는 두 친구에 대한 정보가 아주 많았습니다. 그렇기에 어떤 것을 생략하면서 관객과 비슷한 위치에 설 것인가 고민했습니다.", "여러분이 이 농담들을 읽으며 웃지 못하셨다면 그야말로 실례를 끼쳤습니다. 그냥 '농담을 증류하는 일이 이토록 어렵구나!' 생각해 주세요. 좋은 농담이 이렇게나 귀한 것이니 여러분도 지나가는 농담 한 줄 쉬이 여기지 마시고 어딘가에 적어두시는 것이 어떨지요. 그리고 저를 만나면 팔아주세요. 값을 잘 쳐드리겠습니다. 저는 왜 이렇게까지 농담을 하고 싶은 걸까요? 대부분 실례로 끝나고 마는 이 일을 언제쯤 멈추게 될까요. 누군가를 웃기고 싶다는 마음이 드는 것, 그것이 저에게는 사랑인가 봅니다. 여러분이 좋아하는 농담이 궁금합니다.", "여러분은 이별 통보를 어떻게 하시나요. 아무리 나이를 먹어도 누군가에게 이별을 말한다는 건 어려운 일이죠. 한때 너무나 사랑했던 상대를 위해 신중하게 이별을 말하는 건 당연히 중요한 일 있습니다. ​", "\"난 그냥 엄마가 날 좋아해줬으면 좋겠어.\" \"물론 널 사랑하지.\" \"나도 알아. 근데 나를 좋아하냐고.\" - 영화 레이디버드 중에서 이렇듯 사랑하기와 좋아하기는 양립할 수 없다. 배합 금지, 상극, 틀린 전제 하지만 '애호한다'고 말할 수 있다면 대화의 차원이 달라진다. 거기엔 사랑과 좋음이 모두 있기 때문이다. 나는 이 책을 만들며 늘 애호가의 위치를 자처했다. 글 쓰는 사람, 시 쓰는 사람, 조용히 책을 파는 사람, 책을 만들고 싶어 하는 사람 그 무엇도 아닌 애호하는 사람이었다. 시를 애호하는 사람. 여기서 나의 역할은 언제나 '시 애호가'였고 그래서인지 반쯤은 눈이 멀어 있거나 때때로 바보 같은 말을 하기도 한다. 사랑과 좋음의 소용돌이에서 제정신을 유지할 수 있는 사람은 없거나, 있다면 거짓말쟁이이거나, 둘 중 하나다. 시를 쓰는 일곱 명의 사람을 만나 시가 아닌 것에 대해 이야기하면서도 결국은 모두 시 이야기로 돌아갔다. 대화하는 도중에는 조금의 지루함도 여유로움도 없었다. 나는 다 기억하면서 잘 질문하기 위해 바짝 긴장했고 그들은 아무도 다치지 않는 선에서 자신을 분명히 말하기 위해 매우 신중했다. 그 모습을 보면서 나는, 그들이 시를 쓸 때 혹은 쓰지 않을 때 꼭 저런 표정과 몸짓을 하고 있을 것만 같았다. 내 눈에는 그들이 시였다. ​", "이 시대의 시를 읽는다는 일이 아무런 쓸모가 없을지도 모른다는 것을, 나는 매우 잘 알고 있다. 그럼에도 한구석에서는 반드시 읽어야 하는 사람들이 끝끝내 모여 살벌하게 살아 있어야 한다고도 믿는다. 시가 세상을 구하거나 망하게 할지는 알 수 없지만, 우리를 쥐고 흔들 수 있다는 것은 안다. 그러니 시 앞에서 나는 마음껏 조이고 흔들리고 싶다. 그것이 나를 조금씩 더 나은 사람으로 만들어왔기 때문이다. 그리고 나는 내가 혼자가 아니라는 것을 믿는다. 당신이 이 글을 읽고 있다는 것이 선명한 증거이다. 당신 역시 시를 사랑하지 않는가? 좋아하지 않는가? 하지만 때때로 밉고 서러워서 포기하고 싶기도 하지 않은가? ​", "이제는 감상하듯 읽지 말라고 하시더라고요. 왜요? '내가 이 시인이라면 어떻게 썼을까?'를 정말 진지하게 고민하며 읽어보라고 하셨어요. 옆에서 모니터를 같이 들여다 보고 있는 심정으로. ​", "거리 조절을 잘하려고 노력하고 있어요. 정확히는 감정을 켜켜이 쌓아가는 것이라고 해야 할까요? 매 문장을 격렬하게 올리는 편은 아닌 것 같고요. 다만 차근차근 쌓아나가면서 마지막에서 긴장감을 폭발시키는 것을 잘하지 않는지 사실은 잘하고 싶어서 이렇게 말하는 거고요. 시적 긴장감이란 게 파도처럼 밀려올 수도 있지만 물에 잉크가 퍼지듯 ​", "시라는 것은 비교적 짧은 순간에 그 사람의 세계나 메시지를 아주 단박에 알아봐야 하는데, 그 자체가 어려우면서도 참 매력적이라는 생각이 들어요. 그래서 시를 읽다가, 그 시를 쓴 시인의 세계가 전면에 드러나는 걸 느끼는 순간 너무 재밌고, 시인에게 되묻게 되는 순간도 있고요. 이런 이야기를 하려고 했던 게 맞을까? 내가 잘 읽은 게 맞을까? ​", "어쨌든 선택해야 하는 거잖아요. '이것'이 될 때의 시와 '저것'이 될 때의 시는 고민을 끝내야 볼 수 있는 건데 그걸 못하고 있으니까, 시가 더 갈피를 못 잡는 느낌이 들더라고요. 그리고 무엇보다 굉장히 피곤한 일이에요. 그래서 요즘은 너무 깊게 생각하지 말고, '이것'이면 이것인 대로, '저것'이면 저것인 대로, 우선 가보는 연습을 많이 해보자고 스스로에게 말해주고 있어요. ​", "혼자 작게 기도할 때, 늘 생각해요. 문제가 와도 되는데 문제가 오면 이걸 이길 힘까지만 꼭 주셨으면 좋겠다고 ​", "누군가의 세계를 들여다보는 건 정말 신기하고 새로운 일이라고 생각해요. 그리고 누군가의 세계를 끝까지 궁금해한다는 건 어려운 일이고요. 그 어려운 일을 함께 해나갔으면 좋겠다는 생각이 들어요. 그리고 지치지 않고 끝까지 궁금해해줬으면 좋겠어요. 무엇보다 시간 내어 읽어주셔서 너무 감사하고요. ​", "이 시가 울림이 있는 이유는 시인이 시에 대해 일생에 걸쳐 어떤 고민을 해왔는지, 언어와 어떻게 대결해왔는지, 그리고 그것을 자기만의 것으로 수용하고 소화하기까지 어떤 지난한 과정을 거쳤는지가 전집을 통해, 그의 모든 시를 통해 전부 느껴지기 때문이었어요. 이제는 그냥 어떻게 해도 다 좋다, 이게 시여도 좋고 아니어도 좋다, 내가 글씨를 쓸 수 있어도 좋고 손이 떨려서 못 써도 좋다, 이 경지로 다다르는 과정이 저에게는 너무 감동적이고 인상 깊었어요. 그래서 말씀하신 생활과 시에 대한 제 태도도, 점차 이렇게 가는 과정이지 않을까 싶어요. 분리 자체가 제 의지로 무화되는 것은 아니겠지만 시와 삶이 사실은 서로 다르게 있지 않다는 인식을 갖게 되는 일이겠죠. ​", "우선 시를 배우러 왔다는 것 자체가 재능이라고 생각하거든요. 시라는 것이 되게 희귀해진 세상에서, 그것에 감응해서, 이걸 내가 써야겠다고 생각하며 왔다는 사실 자체가 이미 남다른 지점이라고 생각해요. 수업에 오는 학생들은 이미 시에 대해 담보된 열정과 애정을 갖고 있는 거죠. 그러기 때문에 이제 가르치는 사람이 할 일은 이 사람이 가진 재능이 어떤 종류의 것인지, 그리고 어느 방향으로 나아 가는 게 더 나을지를 찾아주는 거라고 생각해요. 왜냐하면 본인은 잘 모르거든요. ​", "그냥 정말 내가 즐겁게만 쓸 수 있으면 좋겠어요. 즐겁고 정직하게. 문학사에 잔존하기 위해서 어떤 포즈를 취하거나 시가 아니라고 생각하는데도 그 태도를 지속해나가거나 옹호하는 자세를 취하지 않고, 정직하게. 내가 믿고 이렇게 쓰는 것이 맞다고 생각하는 대로 계속 쓸 수 있으면 좋겠고 그 과정이 저에게 즐거움이었으면 좋겠어요. 정말 그것만 바라게 되는 것 같아요. ​", "예전엔 이 시대의 선험적 형식이 이상하게 느껴졌고 그러한 것들을 어떻게 하면 무너뜨릴 수 있을지, 어떻게 하면 파열의 지점을 시로 만들어낼 수 있을지 고민했어요. 그래서 언제나 분노를 품고 있었죠. 날카로운 도끼의 날이 무뎌지지 않게 매 순간을 유지하고 있었어요. 그런데 요즘에는 어떤 문제를 제시하는 것에서 더 나아가 다음을 상상해야 한다고 느껴요. 문제를 인식하고, 분노를 느끼고, 무언가를 깨뜨렸죠. 그런데 과연 깨졌을까요? 그다음엔 무엇을 어떻게 해야 할까요? 이런 질문을 스스로에게 많이 하고 있어요. ​", "아무리 쉽게 써도 그 장벽은 존재할 것 같아요. 그렇지만 무엇을 위하여 쉽게 쓸까요? 독자일까요? 벤야민은 어떤 시도 독자를 위해 있는 것이 아니라고 했지요. 어쨌거나 저는 시의 어려움이 시를 보호하고 있다고 생각해요. 어렵겠지만 꼭꼭 씹어서 삼킨 뒤 자신의 신체의 한 부분이 되었으면 해요. 그래서 소리 내어 읽으라고 써 놓은 것도 있어요. 한 시인이 말하고 생각하는 방식과 독자의 것은 다르기 때문에 쉽게 이해될 수 없잖아요. 그런데 소리 내어 읽으면 시인과 독자의 신체가 겹치는 순간이 있거든요. 시인이 손으로 쓰고 입으로 발음하며 만들어낸 육체의 리듬이 독자의 신체를 변화시켜요. 이 느낌을 완벽히 언어화할 순 없겠지만, 분명한 차이가 있을 거라고 생각해요. 그 차이를 느끼게 된다면 시가 다르게 느껴지겠죠. ​", "\"무한히 무한히 실패하고 싶다\"고 했잖아요. 그건 어떤 마음일까요? 여러 의미가 있는데요. 통속적으로 이해되는 성공과 실패의 개념이 있다면, 저는 후자의 경험이 삶에서 중요하다고 생각했고요. 또 시 쓰기 자체가 실패를 쓰는 것이라는 의미도 있어요. 시를 쓰고 있으면 어떤 지점에서 같은 것을 반복하고 있다는 실패의 느낌이 들고 그때 한계가 느껴져요. 그런데 그러한 불가능에 도달했을 때, 이제 본격적인 시 쓰기가 시작돼요. 그래서 실패하든 성공하든, 계속하는 거죠. 어쩌면 저는 실패를 찾아 해매고 있다는 생각도 들어요. ​", "저는 '이런' 부류의 사람이 있다고 말하고 싶은데요. 대상을 향한 열정이나 호의 크기를 물어볼 때 무조건 부정하는 사람들이요. 그들의 기준은 항상 그들 스스로보다 더 많이 읽거나, 쓰거나, 보거나, 궁금해하는 사람들이라 '네, 맞아요. 저 책 많이 읽어요!'라고 쉽사리 대답하지 않더라고요. 저희가 그런 부류인 듯합니다. 맞아요! 많이 좋아하는 것일수록 아무리 읽고, 보고, 듣고, 생각해도 더 궁금하고 알고 싶고 부족하게 느껴지기 때문인지 열정이나 호의의 크기를 가늠할 때 소극적으로 측량하게 되는 것 같아요. ​", "일단 산책을 하루에 두 번은 해야 하니까, 물리적으로 발이 닿는 장소와 눈이 닿는 풍경의 범위나 그 촘촘함 같은 것이 완전히 달라졌어요. 살면서 가장 꾸준히, 성실하게 해본 일이 개 산책이 아닐까 싶을 정도니까요. 아무런 의문 없이 수행할 수 있는 동사로서의 산책, 행위 자체가 당위가 되는 산책이 삶에 들어온다는 것은 많은 것을 바꾸는 듯해요. 그리고 개들은 정말 사람이 보기에는 아무것도 없어 보이는 곳, 아무것도 아닌 것처럼 보이는 무언가를 오래, 깊이, 꼼꼼히 들여다봐요. 눈이 아닌 코로요. 저는 그렇게 관찰하는 연두를 기다려야 하고요. 그러는 동안 자연스럽게 연두가 보는 것을 저도 보게 돼요. 매 계절이 새롭게 느껴져요. 봄에는 봄이, 여름에는 여름이, 가을에는 가을이, 겨울에는 겨울이 원래 이랬나 싶을 정도로요. 말하자면 너무 길어지겠지만 다른 종을 깊이 사랑하게 되는 것은 세계를 인식하는 방식을 근본적으로 흔드는 경험이에요. ​", "시를 쓰는 순간만이, 혹은 시에 연루된 일을 하는 순간만이 그를 시인으로 만들어주는 것이 아니라, 시와 전혀 무관한 일을 하는 것처럼 보이는 생활 속에 있는 순간에도 시가 촉발되는 균열을 기민하게 감각하는 동물 같은 상태로 지내게 되는 것이 시인 같아요. 그래서 시인이라는 정체성은 정말 상태인 동시에 직업인 듯해요. ​", "제가 \"느낌을 생각으로 막을 수 없다\"라는 문장을 쓰기도 했었는데, 정말 그렇다고 느껴질 때가 있거든요. 이걸 보고 아름답다는 생각이나 하고 있을 게 아닌 것 같은데, 그럼에도 불구하고 너무 아름답다고 느끼는 내가, 그 느낌을 막을 수 없는 내가 동시에 있는 거죠. 쓰는 일을 통해 이질감을 깊게 들여다보고 싶은 마음이 있었어요. 그리고 아름답다는 말 자체를 버리고 다시 시작해보기도 했고요. 말이 사라진 바로 그 장소에서부터요. ​", "지긋지긋할 정도로 몰두하고 물고 늘어졌을 때 보이는 것이 있을 거라고 생각했어요. 사실 그렇게 할 수밖에 없기도 했고요. 일종의 반항심 같은 것도 있었던 듯해요. 한 사람이 가진 세계가 그렇게까지 계속 갱신되고 매번 새로울 수가 있나? 그리고 그럴 필요가 있나? 다른 분야에서는, 예를 들어 미술이라면 어떤 세계관이랄지, 관점을 견지하고 거의 전 생애에 걸쳐서 그것을 밀어붙이는 탁월한 작업을 하는 작가도 많잖아요. 왜 그렇게 시 한 편 한 편이 달라야 하고 다채로워야 하고 그래야만 진폭이 넓다고 여겨지는지, 왜 그것이 미덕이라고 생각하는지 의심스럽기도 했어요. 자기를 계속 갱신하는 시를 썼던 시인으로 기억되면 좋겠네요. 갱신의 방식이라는 게 매번 새로운 이야기를 하고 다른 주제를 던지고 하는 것이 아니라, 본 걸 또 보고 다시 이야기하는 것. 어제 보던 방식을 의심하고, 오늘의 방식을 또 의심하고, 그러면서 같은 장면을 거듭 새로이 바라보는 것 같은 방식의 갱신이라면 좋겠어요. ​", "나는 사랑을 이야기해야 할 때면 조금 죽는다. 과장이 아니고 정말로. 사랑을 잘 알지도 못하거니와 사랑은 만만치 않기로 자자한데 내가 무슨 말을 보탤 수 있을까. 무엇보다 사랑은 내게 배당되어서는 안 된다고 느꼈다. 그런데 사랑의 잿더미와 사랑의 미래에 대해 덤덤히 말하는 시인을 보면서 나는 조금 간지러웠다. 내가 느끼는 이 막연한 탈감 역시도 사랑일 수 있다고 말해주는 것 같았다. 막연한 궁금함과 동경으로 그를 막무가내로 지켜보기만 하면서 그가 잘 사랑할 수 있기를 바랐다. 이런저런 사랑에, 모양도 질감도 제각각인 멋대로의 사랑에, 안겨도 보고 치여도 보면서 지금처럼 씩씩하게 사랑하기를 바랐다. 어떻게 해야 사랑에 대해 말할 수 있는지는 아직까지 나의 영원한 과제로 남아 있다. 하지만 나는 이 사실이 슬프지 않다. 빛나게 사랑하고 그 이상으로 말할 줄 아는 동료와 친구들이 내 곁에 있으므로. 연덕 역시도 그중 하나임을 선명히 알고 있으므로. 나는 언제나 그들을 보며 자라기 때문이다. ​", "등단을 준비하는 예비 시인들은 자연스레 개성이나 특별함에 신경을 안 쓰려야 안 쓸 수가 없는 것 같아요. 그런데 그것보다 정말 중요한 것은 스스로를 속이지 않는 거잖아요. 복희 시인은 그게 느껴져요. 매번 달라져야 한다는 갱신의 필요성도 없고, 그냥 내가 잘하는 거 하고, 지금 말하고 싶은 거 하고, 말하고도 다 말 못한 건 계속 끝가지 말하고. 그다음은 그다음에 생각하려는 자신만의 태도요."]}, {"title": "시티뷰", "author": "우신영", "genre": "소설", "publisher": "다산책방", "passages": ["마르면 마를수록 예술이 되는 일을 업으로 삼았었다. 제 몸과 마음에 대한 규준이 잡히지 않은 일고여덟살 때부터 짙은 분장을 하고 타인에게 평가받는 것은 폭력적인 경험이었다. 콩쿠르와 지역 대회, 영재원과 예고 입시 때마다 두상과 허리길이를 나노 단위로 평가받고, 부모의 키와 체중을 묻는 면접 질문에 답해야 했다. 일명 '고'라고 불리는 발등 모양을 타고난 아이들은 운명의 여신에게 미리 키스를 받은 셈이었다. 빈약한 몸과 대비되는 풍만한 발등선은 발레의 세계에서나 아름다운 것이지 일반인에겐 기형적으로 보일 터였다. 높이가 7센티가 넘는다는, 그래서 마지막 동작까지 드라마틱한 곡선으로 완성한다는 무용수의 발등 사진을 보며 어린 수미는 제 발등에 눈물 젖은 스펀지를 테이핑하곤 했다. 그러고 보면 인간이 평등하다는 건 아름다운 미신이다. 인간은 인간이라는 점 외에는 평등하지 않다. 예체늘을 3일만 해보면 알 수 있다. 수미는 제 아이들에게는 몸으로 평가받는 일을 시키지 않겠다고 이를 갈았다.", "주니와의 만남은 불가피한 것이었다. 못된 사람은 참아도 지루한 사람은 못 참으니까. 남편은 표정도, 취미도, 좋고 싫음도 없는 남자였다. 미식과 쇼핑에 관심이 없었고 잠자리는 수미가 눈치를 줄 때만, 그것도 정상위로. 해외여행을 갈 때도 석진은 출국 당일까지 행선지를 몰랐다. 가기 싫다는 소리는 안 했지만 그런 소릴 하는 것보다 더 비참하게 굴었다. 매뉴얼대로만 사는 범생이 촌놈. 그게 석진에 대한 수미의 요약정리였다. 그런 석진의 유일한 일탈이 마흔 넘어 기르기 시작한 수염이었다. 턱의 흉터를 가리키며, 아빠 턱에 그 지렁이는 뭐냐는 영훈의 말을 듣고 난 뒤부터였다. 석진에게 바뀌라고 요구할 생각은 없었다. 그는 제 가족의 등을 데워주고 배를 불려주는 남자였다. 하지만 배부른 소리란 말이 있는 것을 보면 인간은 등 따시고 배불러도 아쉬운 소리를 하게끔 욕망의 구조가 설계된 동물인 터. 수미는 삶에서 누릴 수 있는 어떤 쾌락도 포기하고 싶지 않았다. 인생 어차피 자기 팔 자기가 흔들며 사는 거지. 이런 내가 그에게 피해를 주나. 아니, 이익을 주지. 사소한 부도덕은 상냥한 부인이 되게 해주니까. 그렇지 않은가. 모두에겐 풀 곳이 필요하다. 풀고 와서 우아하게 처신할 곳도 필요하다. 필연적으로 두 개의 장소와 두 개의 자아가 필요하다. 수미는 손쉽게 스스로를 납득시켰다.", "조선백자 같은 얼굴의 수미는 피부에 쓰는 돈이 제일 남는 투자라고 했다. 머리에 뭐가 들었는지는 바로 바로 표가 안 나는데 피부는 조금만 돈을 들여주면 금세 광이 난다고. 인간 자체가 여유롭고 풍요롭고 행복해 보인다고, 그러니 아까워 말고 돈을 써야 한다고.", "모두가 석진과 수미처럼 좋은 식사와 운동을 할 만한 여유가 없다는 것을 모르지 않았다. 그럼에도 자신들이 참아내는 식욕과 게으름을, 인내하지 못하는 족속들이 답답했다. 값싼 쾌락을 당겨 누린 대가로 병들고 늘어진 신체를 끌며 자신들을 찾아오는 고객님과 회원님들이 경멸스러웠다. 그런 인간들의 어리석음과 충동성이 자신들의 주머니를 불려주고, 그 덕에 백화점 지하 식품관에서 유기농 아보카도를 사고 피트니스 회원권을 갱신할 수 있는데도.", "\"딸기 케이크 한 조각은 선물이 될 수 있어도 20킬로 쌀 한 포대는 선물이 못 돼. 쌀 포대가 더 비싸도 말이지. 선물의 세계에선 무용한 게 유용하고, 유용한 게 무용하다니까.\" \"그럼 가장 무용한 음식인 디저트는 왜 뛰어넘어? 크렘 브륄레 안 먹고 가?\" \"마흔 넘으니 당 들어가면 가차 없어. 먹는 데 3분, 빼는 데 3개월.\"", "남동생을 공부시켜 주겠단 약속에 속아 섬으로 시집온 어머니는 시모에게 뺨을 맞아가며 칼국수집 일을 배웠다. 섬 곳곳에 널린 슬레이트 주택의 1층을 개조한 가게로, 섬사람들보다는 외지에서 온 낚시꾼들을 상대했다. 아버지는 그들이 재미로 잡은 생선을 회 쳐주고, 할머니와 어머니는 소주에 곁들일 칼국수를 말았다. 그 핏물과 국물로 석진은 뱃구레를 키우고 가방끈을 늘렸다. 모질게 군기를 잡던 시모가 풍을 앓다 죽고, 석진의 의대 입학을 축하하는 플래카드가 걸린 무렵이었다. 비린 냄새가 첩첩이 밴 어머니의 몸 속에 수상한 것들이 퍼져 나가기 시작했다. 병원비 아까운 티를 숨기지 않는 아버지 때문인지 어머니는 수술을 거부했다. 집에서 보낸 마지막 몇 달간, 어머니는 전에 없던 식탐을 냈다. 지독하게 단것들만 골라서. 한평생 군것을 바치지 않던 터라 의아한 일이었다. 신림동의 기숙사에서 묵던 석진은 토요일이면 찹쌀도넛과 꽈배기를 사서 배를 탔다. 어머니는 아들보다 그것들을 더 반겼다. \"단것만 찾으시면 어떡해요. 영양가 있는 걸 드셔야죠.\" \"됐다. 살면 얼마나 더 산다고. 난 이제 밥상만 봐도 진저리가 난다. 국수 밀고 생선 치고 육수 끓이고. 비리고 짠 거라면 신물이 올라와. 난 죽는 것도 안 무섭고 지옥불도 안 무섭다. 지옥이 별거냐. 주방이 내 지옥이었는데.\"", "양손 가득 들고 있던 것들을 팽개친 옥란이 팔을 벌렸다. 수미의 미간이 찌푸려졌다. 손도 씻지 않은 채 아이들을 만질 때마다 대놓고 말은 못하고 안절부절못했다. 처음 덕적도로 인사를 갔을 때, 아버지가 만진 리모콘을 알코올 티슈로 닦다 들킨 수미였다. 석진이 어릴 때부터 쌓인 먼지와 기름기로 버튼마다 잿빛 때가 엉긴 리모컨이었다.", "\"야, 너는 무슨 애가 그렇게 걸신 들린 것처럼 먹냐.\" \"언젠 복스럽게 먹어서 좋다며.\" \"팔에 그건 또 언제 새긴 천자문이야.\" \"한참 됐는데.\" \"몸에 낙서 작작 해. 그거 아냐? 명품 차엔 도색 안 한다.\" \"이게 미쳤나. 안 하던 지랄이야.\" \"말 좀 곱게 해.\" \"오는 말이 더럽길래 가는 말도 수질 맞춰봤다. 왜?\"", "\"한국인들은 건강에 왜 그렇게 관심이 많아요? 티브이만 켜면 건강, 약, 건강, 약. 중간에 보험 광고가 너무 길어서 드라마에 집중이 안 돼요.\" \"하하.\" \"낮에는 커피, 밤에는 술만 먹으면서.\"", "\"흉터 가리는 데도 돈이 많이 드네요.\" \"그러니까 처음부터 안 생기는 게 좋죠.\" \"그래서 전 안 보이는 데 내잖아요.\" \"그게 더 나쁜 건 알죠?\" \"의사 선생님은 죽고 싶을 때가 없어요? 난 내가 비정상이라고 생각 안 해요. 깨어 있을 때 가끔 졸린 것처럼 살아 있을 때 가끔 죽고 싶은 것도 정상 아닌가요.\" \"신선한 관점이네요.\"", "한 살 한 살 먹을수록 생리적 욕구는 희박해졌지만 타인의 욕구를 불러일으키고 싶은 욕구는 더 강렬해져만 갔다. 여전히 누군가에게 영향력을 행사할 힘이 남아 있다는 것을 강박적으로 확인받고 싶었다. 타인의 몸과 마음에 소용돌이를 일으킨다는 것 자체가 즐거웠다. 섹스는 그 즐거움 때문에 치러야 하는 일종의 기회비용이었다. 주니와의 관계도 시작은 그랬다. 석진에게 죄책감도 없었다. 거짓이 없기 위해서는 거짓이 필요하니까.", "\"개나 소나 다 부자 놀이라니까. 요새 애들 자기네들끼리 월 이백 버는 이백충이라고 자조하면서도 뻑하면 오마카세 먹고 해외여행 다니고 1박에 100만 원 넘는 호텔에서 자고. 소유보단 경험, 고성취보단 소확행, 입으론 잘도 떠들지만 무슨. 뭐든 해내본 게 경험이지 돈 쓴게 무슨 경험이야. 우리 센터 회원들은 나이대가 있지만 가끔 대학생 애들 보면 기가 차.\"", "수영 선수가 되고 싶었던 남자 하나가 바닷가의 유리를 닦다 날개 없는 새처럼 추락했다. 더러운 신발 한 쌍만 남기고서. 그 남자의 아이를 밴 여자는 그걸 꿰어 신고 어디로 갔을까. 쓸 일이 없어진 면도날을 전복의 이빨처럼 제 속에 박아 넣었던 여자는, 지금 어디서 무엇을 하고 있을까. 자신이 면도날을 빼주었다는 것은 착각이었다. 그 여자 몸 속엔 더 거대한 면도날이 박혀 자라고 있었으니까. 유리 건물의 벽을 타다 추락해 죽은 남자의 아이 앞에서, 클라이밍이 취미라며 웃었던 자신. 석진은 그때 그 펄펄 끓던 순대국 뚝배기 속에 제 머리라도 박아 넣고 싶은 심정이었다. 포즈 말고, 진짜 바닥으로 내려가 벅벅 기어야 마땅했다.", "욕망할수록 공허하고 성취할수록 허기진다. 채울수록 부족함이 보이고 가꿀수록 고쳐야 할 부분이 눈에 띈다. 보여지는 것 이상을 가져야만 드러나고, 먹은 것보다 더 많이 감량해야 한다. 현대사회의 성공은 깨진 독에 물 붓기와 다르지 않다. 콘크리트로 덮어서 육지로 만든 바다의 가장 밑바닥 생은 어떻게 되었을까. 사라졌을까? 모두를 내려다볼 수 있는 꼭대기까지 오르려면 정상을 응시해야 한다. 아래를 내려다보는 순간 추락할지도 모른다. 그러나 느낄 수 있다. 흔들리고 있다. 가라 앉고 있다. 밑바닥에 결핍과 상처가 있기 때문이다. 온기가 닿으면 미친듯이 간지러운, 아물지 않은 흉터처럼. 이 소설은 우리에게 묻는다. 자본과 계급이 존재 이유와 사랑의 의미까지 재단하는 현대사회에서, 욕망과 성취로 덮어버린 당신의 밑바닥에는 무엇이 있는지. 밑바닥의 꿈틀거림을 당신도 느껴본 적 있는지.", "거침없이 투명한 시티 뷰를 위해 유리를 닦는 사람과 스릴을 안전하게 감각하기 위해 가짜 암벽을 타는 사람. 한쪽은 지상으로 하강하고 있었고 한쪽은 정상으로 상승하고 있었는데 평행의 정의에 의거하여 그들은 절대 스칠 일이 없어 보였다. 줄에 의지해 오르내린다는 행위의 닮은꼴과 달리 그들 사이에는 무참하리만큼 아찔한 심연이 놓여 있었으니까. 그 사실을 도저히 삼킬 수가 없었다. 헛구역질이 났다. 그게 이 소설의 시작이었다.", "마지막 줄을 쓰고 난 후 세수를 하고 거울을 봤다. 전과 다르지 않은 이목구비의 여자가 서 있었다. 바깥 세상 역시 그럴 것이 분명했다. 아무것도 나아지지 않았을 것이다. 여전히 누군가는 가까운 이들이 던지는 모멸감과 먼 이들이 견지하는 무관심 속에서 떨거나 추락하거나 실종되고 있을 것이다. 나는 무력감을 느꼈다. 전에 없이 부끄러웠다. 그 부끄러움이, 새로운 용기를 주었다. 텍스트로만 덮어두려는 마음, 창밖으로만 구경하려는 마음, 문밖으로 걸어 나가지 않으려는 마음, 아무튼 나아지지 않으려는 마음. 그것들과 영원히 불화하며 살고 싶었다. 그 결심에 밑줄을 긋자 거울 속 내 얼굴이 한결 견딜 만했다.", "아주 오래전 중학교 수업 시간, 도서관에서 빌려 온 '혼불'을 교과서 사이에 끼워 읽던 여학생은 소설 속 허효원의 독백에 눈을 멈췄었다. \"산다는 것은, 그저 타고난 본능만은 아니지. 그것은 일이다. 일이고 말고. 살아도 그만 안 살아도 그만일 수는 없지. 뜻한 것이 이루어지고 재미있고 좋아서만 사는 것이랴. 고비고비 이렇게 산 넘고 물 건너며 제 할 일을 하는 것이 곧 사는 것이다.\" 계속 살아서 할 일을 하라고, 곧 길을 잃을 게 뻔해 보이는 이에게도 출발선을 허락하신 심사위원 선생님들과 혼불문학상 관계자분들께 깊은 감사를 드린다. 부박한 천성대로 많은 약속을 남발하고 싶지만, 입을 다물고 고요하게 바랑을 챙겨본다. 할 일을 하며 사는 이, 쓸 글을 쓰며 사는 이가 되겠다는 약속 하나만 남기고서."]}, {"title": "심장보다 단단한 토마토 한 알", "author": "고선경", "genre": "시", "publisher": "열림원", "passages": ["잘 봐 내가 얼마나 쉽게 슬퍼하는 사람인지 얼마나 화를 잘 내는지 나를 슬프게 만들면 반드시 불행해질 거야", "보세요 부의 기운을 담은 부적입니다 영민함을 상징하는 토끼 두 마리가 그려져 있지요 아 그건 한정판 순금 부적이에요 승천하는 청룡과 여의주가 길한 기운을 가져다줍니다", "농담은 껍질째 먹는 과일입니다 슈퍼 사장님 딸은 중학 데. 솔직히 그렇잖아. 음식 쓰레기 좀 줄인다고 뭐가 달라지겠어. 엄마 아빠만 봐도 이런 거에는 관심도 없잖아. 언니는 이상해. 내가 뭐. 언니 말 들으면 내가 하는 일은 다 소용이 없어. 배운 대로 하는 건데 눈치를 봐야 해. ​", "아이들은 많은 것을 단숨에 외우고 자세하게 기억한다. 규칙을 지키려고 노력한다. 스스로 중요한 일이라고 생각하면 정말 열심히 한다. 소용없다는 이유로 어른들이 더는 하지 않는 일들을 아이들은 한다. 그레타 툰베리는 썸머와 비슷한 나이에 처음 의문을 품었다. 기후변화 문제가 심각하다는데 어째서 사람들은 아무것도 하지 않는 거지? 그리고 나와 비슷한 나이에 기후행동 정상회의에서 분노를 쏟아내며 연설했다. 그 연설 영상을 수십 번 봤다. 보면 볼수록 나 또한 화가 났고, 상황이 심각하다는 것을 비로소 실감했다. 툰베리가 차분하고 예의 바르게 말했다면 실감하지 못했을 거다. 나는 툰베리처럼 화석 에너지를 쓰지 않기 위해 태양광 요트를 타고 바다를 건널 자신은 없다. 피켓을 들고 1인 시위를 할 용기도 없다. 마음에 드는 옷을 보면 사고 싶고 평생 치킨을 먹지 않고 살 수도 없을 것 같다. 하지만 친구들이 기후위기로부터 우리의 미래를 보장하라며 등교 거부 시위를 한다면 참여할 것이다. 비건을 위한 급식 식단을 따로 마련하라는 서명서에 내 이름을 적을 것이다. 계속 텀블러와 스테인리스 빨대를 들고 다닐 것이다. 임준석이 또 개똥 같은 말로 나를 모욕한다면 오늘 아빠에게 그런 것처럼 화를 내고 싸울 것이다. 위악보다는 위선이 낫다고. 망하고 싶으면 너 혼자 망하라고 확실하게 말할 것이다. ​", "20년 후에도 썸머는 마스크를 써야 안전하다고 느낄까? 나의 세상은 썸머가 없었던 때와 썸머가 존재하는 때로 나뉜다. 썸머의 연하고 작은 손을 처음 잡아봤을 때를 아직도 생생하게 기억한다. 썸머의 손을 잡고 다짐했었다. 내가 이 아이를 평생 지켜줄 거라고. 그때를 생각하면 지금도 눈물이 난다. 나는 엄마 아빠에게 야단맞을 때보다 썸머가 실망했다는 표정으로 나를 바라볼 때 더 진땀이 나고 조급해진다. 썸머를 생각하면 미래를 무한하게 긍정하고 싶다. 펜데믹, 미세먼지, 전염병, 홍수, 침수, 가뭄, 꺼지지 않는 산불, 식량난, 기후 난민, 토양오염, 해양오염, 종의 멸종처럼 암울한 일들로 가득한 미래가 아니라 탄소 중립 실현, 미세먼지 없는 대기, 자연 분해 플라스틱, 재생에너지, 수소에너지, 전기자동차, 대체 식품 등으로 채워질 미래를 상상하고 싶다. 엄마 아빠에게는 낯설지만 우리에겐 당연해질 것들을 사람들이 계속 만들어낼 거라고 믿고 싶다. ​", "AI는 인간을 이기려고 하지 않는다. 인간보다 우등해지려고 하지 않는다. 그것이 AI가 인간보다 열등한 이유다. AI는 실행할 뿐 책임지지 않는다. 오직 인간만이 책임진다. 인간이기에 해고당한다. 인간이어서 처벌과 징계를 두려워한다. AI가 오류를 일으켜도 인간들은 AI에게 사과를 요구하지 않는다. 인간 관리자의 해명과 사과를 원한다. 그러므로 책임이 중요한 영역 - 정치, 외교, 종교, 의료, 법, 금융 분야의 전문가, 기업과 기관의 소수 관리자만큼은 인간의 독점이 가능하다. ​", "챗봇은 모르는 게 없어요. 검색하면 다 나오는데? 바로 그걸 이상하다고 생각해본 적 없어요? 어떻게 모든 것을 다 알 수 있지? 신인가? 신도 그럴 수는 없을텐데? '생각해본 적 없어요?'라는 질문 때문에 안나는 심장이 아팠다. 생각을 안 해본 것 같아서 ​", "그 사람이 시집을 주면서 한 말이 있어. 죽음은 언제나 나를 바라보고 있으니 굳이 애쓸 필요가 없다. 그 대신 의미를 찾아라. 그 뜻을 알고 싶어서 시집을 오랫동안 읽었어. 그리고 만났지. 음 뭐랄까. 내 삶의 이정표가 될 만한 문장이랄까. ​", "출판 일을 그만둔 다음부터 김영선은 아침 일찍 아파트 단지 내 헬스장에서 두어 시간씩 운동을 했다. 30년 동안 책상 앞에 앉아 일했기 때문에 목, 어깨, 허리, 손목의 건강이 좋지 않았다. 하체 근육 또한 거의 없는 편이었다. 도배 일을 하려면 육체적 건강이 중요했다. 근육을 단련하고 코어 힘을 키우면서 김영선은 은근한 보람을 느꼈다. 운동은 '1+1=2' 가 가능한 세계였다. 하는 만큼 결과가 보였다. 김영선이 청춘을 바친 일들은 대게 그렇지 않았다. 한 권의 책을 만들어서 시장에 내놓는 일, 다른 팀과 업무를 조율하고 갈등을 잠재우는 일, 저자와 동료의 무심하고 무례한 말에 휘둘리지 않는 일, 거래처 직원과 오직 업무적으로 필요한 감정만을 주고 받는 일, 사람을 오랫동안 상대하며 신뢰를 쌓는 일 등을 무사히 해내려면 예상보다 많은 감정 노동이 필요했다. 결혼생활이나 시댁과의 관계등은 말할 것도 없었다. 인풋 대비 아웃풋이 형편없을 때가 많았다. 운동은 육체적 건강과 함께 자신감을 불러왔다. 다 낡아버렸다고 생각했는데 그렇지 않았다. 운동을 할수록 몸이 살아나는 것 같았고 다시 젊어질 여지가 보였다. 자기에게 가장 필요했던 것이 바로 자신감이었음을 김영선은 뒤늦게 깨달았다. 퇴직하던 당시 김영선은 자조적으로 자기를 '다 쓴 사람' 이라고 칭했다. 그에 비하면 요즘 김영선은 '되살아난 사람' 에 가까웠다. ​", "확실히 결혼은 여자한테 손해야. 근데 출산과 양육은 또 다르거든. 그건 결혼이랑 개념이 완전히 달라. 엄마 입장에서는 네가 그 경험은 해보면 좋겠거든. ​", "나는 그것도 진짜 이해가 안 돼. 있는 사람도 못 챙기면서 왜 자꾸 더 낳으라는 건지. 일자리 부족이랑 인구 절벽이 같이 거론되는 것도 좀 웃기지 않아? 어차피 인공지능 때문에 사람이 할 수 있는 일은 점점 줄어들 텐데. 솔직히 기후 위기 때문에 출산을 주저하는 사람들도 있어. 이제 결혼이나 출산은 당연한 라이프 스테이지가 아니야. 엄청난 도전이라고. ​", "나는 잘못될 생각부터 하기는 싫어. 나는 복직할 거고 태양이는 잘 클거야. 물론 아프겠지. 다치겠지. 속상하겠지. 가끔 후회하겠지. 애 아빠하고 싸우기도 할 거고 태양이는 울겠지. 그러면 서로 미안하다고 말하고 화해할 거야. 중요한 일은 같이 고민하고 약속은 질킬 거야. 특별한 날에는 외식도 하고 여행도 갈거야. 나는 그렇게 살 거야, 엄마. ​", "왜 남아 있는지 나조차 알 수 없는 기억들. 나의 선택으로 기억하는 게 아니라 기억이 나를 선택하여 남아 있는 것만 같다. ​", "나는 무슨 일이든 어진과 상의할 수 있다고, 곤란하고 힘든 일도 함께 겪을 수 있다고 믿었다. 사고가 나면 수습하고, 싸우면 화해하고, 고장 나면 고치고, 잃어버리면 같이 찾고, 상대가 악몽에 갇혀 있을 때는 작은 소리로 이름을 부르고 또 불러 서로를 천천히 구원하는 일상. 나에게 미래란 내일이었다. 내일도 오늘과 별반 다르지 않으리라는 기도와 같은 기대만으로 충분했다. 나는 미래를 걱정하지 않았다. ​", "사전연명의료의향서를 쓸 거야. 자연스럽게 떠날 수 있도록 두라는 뜻이야. 내 몸에 어떤 튜브도 넣지 말고 나를 살리겠다고 나의 가슴을 짓 누르지도 말란 뜻이야. 엄마, 잘 기억해. 나는 꼭 작별 인사를 남길 거야. 마지막으로 내가 한숨을 쉬면 그건 사랑한다는 뜻이야. 비명을 지르면 그건 사랑한다는 뜻이야. 간신히 내뱉는 그 어떤 단어든 사랑한다는 뜻일 거야. 듣지 못해도 괜찮아. 나는 사랑을 여기 두고 떠날 거야. 같은 말을 어진에게도 했다. 사랑을 두고 갈 수 있어서 나는 정말 자유로울 거야. 사랑은 때로 무거웠어. 그건 나를 지치게 했지. 사랑은 나를 치사하게 만들고, 하찮게 만들고, 세상 가장 초라한 사람으로 만들기도 했어. 하지만 대부분 날들에 나를 살아 있게 했어. 살고 싶게 했지. 어진아, 잘 기억해. 나는 이곳에 그 마음을 두고 가볍게 떠날 거야. ​", "저는 하나의 질문을 짊어지고 이 책 저 책을 떠돌고 있는 것 같아요. 이 질문을 이렇게도 써보고 저렇게도 써보는 거죠. 조금 폭넓게 얘기하자면 '어떻게 살아야 할 것인가' 라는 질문을 다양한 이야기로 풀어보는 건데요, 그 질문은 모든 작가의 공통된 주제라고 생각해요. 다들 그 얘기를 하고 있어요. 모든 책이. 어떻게 살 거야?(웃음) 그 질문을 각자의 이야기로 풀어내는 것 같아요. 왜냐하면 그 질문에는
