  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #fff;
    color: #1a1a1a;
    font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
  }

  /* ── Shared char styles ─────────────────────────── */
  .passage-text {
    font-size: 30px;
    font-weight: 900;
    line-height: 1.8;
    letter-spacing: 0.02em;
    white-space: pre-wrap;
    word-break: keep-all;
    user-select: none;
  }

  .char {
    display: inline-block;
    vertical-align: baseline;
    position: relative;
    color: #ddd;
  }
  .char.correct { color: #1a1a1a; }
  .char.wrong { color: #ddd; }
  .char.wrong::before {
    content: attr(data-typed);
    position: absolute; top: 0; left: 0;
    width: 100%; line-height: inherit;
    color: #e07070; pointer-events: none;
  }
  .char.composing { color: #ddd; }
  .char.composing::before {
    content: attr(data-composing);
    position: absolute; top: 0; left: 0;
    width: 100%; line-height: inherit;
    color: #1a1a1a; pointer-events: none;
  }
  .char.cursor-after::after {
    content: '';
    position: absolute; right: -1px; top: 50%;
    transform: translateY(-50%);
    width: 2px; height: 1.1em;
    background: #1a1a1a;
    animation: blink 0.8s step-end infinite;
  }
  .char.cursor-before::before {
    content: '';
    position: absolute; left: -1px; top: 50%;
    transform: translateY(-50%);
    width: 2px; height: 1.1em;
    background: #1a1a1a;
    animation: blink 0.8s step-end infinite;
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  /* ── MOBILE LAYOUT ──────────────────────────────── */
  .mobile-layout {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px 20px;
  }

  .mobile-container {
    width: 100%;
    max-width: 700px;
  }

  @media (max-width: 1000px) {
    .mobile-container { max-width: 100%; }
    .passage-text { font-size: 18px; line-height: 1.9; }
    .type-page { display: none !important; }
  }

  .mobile-stats {
    display: flex;
    gap: 32px;
    margin-bottom: 24px;
    font-size: 13px;
    color: #888;
  }

  .mobile-passage-area {
    position: relative;
    margin-bottom: 24px;
  }

  .mobile-input {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    opacity: 0;
    cursor: text;
    resize: none;
    border: none;
    background: transparent;
    font-size: 18px;
    z-index: 10;
  }

  .mobile-bottom {
    border-top: 1px solid #ddd;
    padding-top: 20px;
    margin-top: 8px;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }

  .mobile-book-title {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 4px;
  }

  .mobile-book-meta {
    font-size: 13px;
    color: #888;
  }

  .mobile-controls {
    display: flex;
    gap: 12px;
    flex-shrink: 0;
  }

  .mobile-controls button {
    background: none;
    border: none;
    width: 28px;
    height: 28px;
    padding: 0;
    cursor: pointer;
    color: #aaa;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 0.15s;
  }

  .mobile-controls button:hover { color: #555; }

  /* ── PC LAYOUT ──────────────────────────────────── */
  .pc-layout { display: none; }

  @media (min-width: 1001px) {
    body { overflow: hidden; height: 100vh; }

    .mobile-layout { display: none; }

    .pc-layout {
      display: flex;
      width: 100vw;
      height: 100vh;
      position: relative;
    }

    /* Outer border 1px inset */
    .pc-layout {
      box-shadow: inset 0 0 0 1px #1a1a1a;
    }

    .pc-layout::after {
      content: '';
      position: absolute;
      left: 50%;
      top: 0;
      height: 100%;
      width: 1px;
      background: #1a1a1a;
      pointer-events: none;
    }

    /* Left sidebar — exactly 50% width */
    .pc-sidebar {
      width: 50%;
      flex-shrink: 0;
      height: 100vh;
      padding: 35px 0 35px 44px;
      display: flex;
      flex-direction: column;
      position: relative;
      background: #fff;
      transition: background 0.2s;
    }

    .pc-book {
      margin-top: 0;
    }

    .pc-book-title {
      font-size: 30px;
      font-weight: 300;
      color: #222;
      line-height: 2;
    }

    .pc-book-lock {
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      color: #222;
      line-height: 0;
      flex-shrink: 0;
      transition: color 0.15s;
      position: relative;
    }
    .pc-book-lock:hover { color: #999; }
    .pc-book-lock svg circle { fill: none; transition: fill 0.15s; }
    .pc-book-lock.locked svg circle { fill: currentColor; }
    .pc-book-lock:not(.locked)::after {
      content: attr(data-tooltip);
      position: absolute;
      left: calc(100% + 10px);
      top: 50%;
      transform: translateY(-50%);
      white-space: nowrap;
      font-size: 15px;
      font-weight: 300;
      color: #222;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      z-index: 200;
    }
    .pc-book-lock:not(.locked):hover::after { opacity: 1; }

    .pc-book-meta {
      font-size: 15px;
      font-weight: 300;
      color: #222;
      line-height: 2;
      margin-bottom: 15px;
    }

    .pc-sidebar-content {
      height: 100%;
      position: relative;
    }

    .pc-font-info {
      position: absolute;
      bottom: 128px;
      left: 44px;
      font-size: 30px;
      font-weight: 300;
      color: #222;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 0;
      z-index: 101;
    }

    .pc-font-info a {
      color: #222;
      text-decoration: none;
      font-size: 30px;
      font-weight: 300;
      transition: color 0.15s;
    }

    .pc-font-info a:hover { color: #999; }

    .pc-font-lock {
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      color: #222;
      line-height: 0;
      flex-shrink: 0;
      transition: color 0.15s;
      margin-bottom: 18px;
      position: relative;
    }
    .pc-font-lock:hover { color: #999; }
    .pc-font-lock svg circle { fill: none; transition: fill 0.15s; }
    .pc-font-lock.locked svg circle { fill: currentColor; }
    .pc-font-lock:not(.locked)::after {
      content: attr(data-tooltip);
      position: absolute;
      left: calc(100% + 10px);
      top: 50%;
      transform: translateY(-50%);
      white-space: nowrap;
      font-size: 15px;
      font-weight: 300;
      color: #222;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      z-index: 200;
    }
    .pc-font-lock:not(.locked):hover::after { opacity: 1; }

    .pc-sliders {
      position: absolute;
      bottom: 35px;
      left: 44px;
      right: 54px;
      display: flex;
      flex-direction: column;
      gap: 7px;
      z-index: 101;
    }
    .pc-slider-row {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .pc-slider-val {
      font-size: 15px;
      font-weight: 300;
      color: #222;
      white-space: nowrap;
      width: 60px;
      flex-shrink: 0;
      text-align: left;
    }
    .pc-slider {
      -webkit-appearance: none;
      appearance: none;
      flex: 1;
      width: 0;
      height: 1px;
      background: linear-gradient(to right, #222 50%, #ddd 50%);
      outline: none;
      border: none;
      cursor: ew-resize;
      margin: 8px 0;
    }
    .pc-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 1px;
      height: 16px;
      background: transparent;
      cursor: ew-resize;
    }
    .pc-slider::-moz-range-thumb {
      width: 1px;
      height: 16px;
      background: transparent;
      border: none;
      cursor: ew-resize;
    }

    /* Right panel — fills remaining 50% */
    .pc-right {
      flex: 1;
      height: 100vh;
      overflow-y: auto;
      overflow-x: hidden;
      position: relative;
      background: #fff;
      transition: background 0.2s;
    }

    /* Invisible textarea covers right panel for click-to-type */
    .pc-input {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      opacity: 0;
      cursor: text;
      resize: none;
      border: none;
      background: transparent;
      font-size: 18px;
      z-index: 10;
    }

    .pc-passages-track {
      padding-top: 35px;
      padding-bottom: 35px;
      padding-left: 54px;
      padding-right: 60px;
    }

    .pc-preview-slot { display: none; }

    /* Slide animation on passage change */
    .pc-passages-track {
      will-change: transform;
    }

    @keyframes slideOutUp   { from { transform: translateY(0);     opacity: 1; } to { transform: translateY(-60px); opacity: 0; } }
    @keyframes slideInUp    { from { transform: translateY(60px);  opacity: 0; } to { transform: translateY(0);     opacity: 1; } }
    @keyframes slideOutDown { from { transform: translateY(0);     opacity: 1; } to { transform: translateY(60px);  opacity: 0; } }
    @keyframes slideInDown  { from { transform: translateY(-60px); opacity: 0; } to { transform: translateY(0);     opacity: 1; } }

    /* Type button in sidebar bottom-right */
    .pc-type-btn {
      position: absolute;
      bottom: 128px;
      right: 54px;
      font-size: 30px;
      font-weight: 300;
      color: #222;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      font-family: inherit;
      z-index: 101;
      transition: color 0.15s;
    }
    .pc-type-btn:hover { color: #999; }

    /* Type page overlay */
    .type-page {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      background: #fff;
      box-shadow: inset 0 0 0 1px #1a1a1a;
      z-index: 200;
      flex-direction: column;
    }
    .type-page.open { display: flex; }

    .type-header {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      padding: 0 54px 0 44px;
      min-height: 104px;
      border-bottom: 1px solid #1a1a1a;
      gap: 54px;
    }

    .type-title {
      font-size: 30px;
      font-weight: 300;
      color: #222;
      width: 200px;
      flex-shrink: 0;
    }

    .type-close {
      position: absolute;
      top: 35px;
      right: 35px;
      background: none;
      border: none;
      cursor: pointer;
      color: #222;
      padding: 0;
      line-height: 1;
      font-size: 30px;
      font-weight: 300;
      font-family: inherit;
      transition: color 0.15s;
    }
    .type-close:hover { color: #999; }

    .type-input {
      flex: 1;
      font-size: 30px;
      font-weight: 900;
      color: #1a1a1a;
      border: none;
      outline: none;
      background: transparent;
      font-family: 'Noto Sans KR', sans-serif;
    }
    .type-input::placeholder { color: #ddd; }

    .type-list {
      flex: 1;
      overflow-y: auto;
    }

    .type-row {
      display: flex;
      align-items: center;
      padding: 0 54px 0 44px;
      min-height: 104px;
      border-bottom: 1px solid #1a1a1a;
      gap: 54px;
    }

    .type-row-name {
      font-size: 15px;
      font-weight: 300;
      color: #222;
      width: 200px;
      flex-shrink: 0;
      line-height: 2;
    }

    .type-row-name a {
      color: #222;
      text-decoration: none;
      transition: color 0.15s;
    }
    .type-row-name a:hover { color: #999; }

    .type-row-text {
      flex: 1;
      font-size: 30px;
      font-weight: 900;
      color: #ddd;
      line-height: 2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .pc-passages-track.slide-out-up,
    .pc-sidebar-content.slide-out-up   { animation: slideOutUp   0.18s ease-in  forwards; }
    .pc-passages-track.slide-in-up,

<script>
const BOOKS = [{"title": "21세기를 살아가는 반자본주의자를 위한 안내서", "author": "에릭 올린 라이트", "genre": "사회정치", "publisher": "이매진", "passages": ["경제 성장과 기술 혁신, 생산성 증대와 소비재의 하향 확산이 두드러지지만, 자본주의의 발전으로 생계가 파괴되는 다수의 빈곤, 자본주의 노동 시장의 밑바닥에 내몰린 사람들의 불안정화, 다수를 소외시키는 지루한 노동 등이 자본주의적 경제 성장하고 나란히 나타난다 무엇보다도 가차없는 이윤 추구에 따라 움직이는 자본주의가 환경을 파괴하고 있다는 점은 어느때보다도 분명해지는 중이다.", "자본주의는 반자본주의자를 낳는다 자본주의가 존재하는 때라면 언제나 이런저런 형태의 불만과 저항이 생겨난다.", "계급의식은 당신이 울타리 어느 쪽에 있는지를 아는 것, 계급 분석은 당신 옆에 누가 있는지를 알아내는 것.", "세계가 울타리 양쪽 편에 자리한 두 계급만으로 구성된다면, 반자본주의를 오로지 계급적 이해관계 측면에만 고정시키는 정도로 충분하다. 고전적 마르크스주의는 기본적으로 이런 방식으로 문제를 바라봤다. 계급 구조 내부에 복잡성이 자리한다고 하더라도 자본주의의 장기적 동학은 자본주의에 찬성하거나 반대하는 쪽으로 이해관계를 뚜렷하게 양분하는 경향을 띠게 돼 있었다. 이런 세계에서 계급 의식은 주로 세계가 어떻게 작동하는지, 그리하여 어떻게 일부 계급의 물질적 이해관계를 희생시키면서 다른 계급의 이해관계에 봉사하는지를 이해하는 문제였다. 일단 노동자들이 이 현상을 이해하면 자본주의에 반대할 수밖에 없다는 논리였다. 이런 이유 때문에 많은 마르크스주의자들은 사회적 부정의와 도덕적 결함의 측면에서 자본주의를 향한 체계적 비판을 발전시킬 필요는 없다고 주장했다.", "계급적 이해의 복잡성 때문에 언제나 울타리의 어느 한쪽 편에 분명하게 이해관계가 존재하지 않는 사람들이 많이 있게 마련이다. 그런 이들이 기꺼이 반자본주의 구상을 지지할지 말지는 문제가 되는 다른 종류의 가치에 어느 정도 좌우된다. 자본주의를 극복하려는 전략이 실행 가능하려면 그런 이들이 보내는 지지가 중요하기 때문에 계급적 이해관계만이 아니라 어느 정도 여러 가치를 중심으로 연합을 형성하는 문제가 관건이 된다.", "행복한 삶이란 사람이 능력과 재능을 발전시켜 삶의 목표를 추구하는 삶이며, 따라서 일반적인 의미에서 자기의 잠재력과 목표를 실현할 수 있는 삶이다. 어떤 사람의 건강과 신체 상태를 생각하면, 이 말에 담긴 의미를 이해하기 쉽다. 행복한 삶이란 단순히 병이 없다는 의미를 넘어서며, 세상에서 정력적으로 살 수 있는 기반이 되는 신체적 활력이라는 긍정적인 의미 또한 담겨 있다.", "행복한 삶을 누리기 위한 사회적 수단은 물질적 수단보다 복잡하며, 이런 사회적 수단의 목록을 작성하면 논쟁적인 항목들이 거의 확실하게 포함될 듯하다. 나는 적어도 다음 같은 항목을 포함시키려고 한다. 일반적으로 '노동'이라고 부르는 일에 연결된 의미 있고 성취감을 주는 활동, 친밀성과 사회적 연결, 자기 삶을 의미 있게 통제한다는 뜻을 지닌 자율성, 사회적 존중이나 몇몇 철학자가 말하는 사회적 인정. 인종, 젠더, 섹슈얼리티, 외모, 종교, 언어, 종족, 그 밖의 개인의 두드러진 속성에 연결된 사회적 낙인은 행복을 위한 물질적 수단에 다가갈 접근권을 여러 모로 가로막을 뿐 아니라 인간 행복 자체를 방해한다. 정의로운 사회에서는 모든 사람이 행복한 삶에 필요한 이런 사회적 조건에 다가갈 동등한 접근권을 누린다.", "문제가 되는 결정이 내게, 오직 나에게만 영향을 미친다면, 다른 누구의 간섭도 없이 내가 결정을 내릴 수 있어야 한다. 이런 상태를 우리는 자유 또는 자유권이라고 부른다. 누구의 허가도 받을 필요 없이, 다른 사람의 간섭을 받지 않고 어떤 일을 할 수 있는 상태를 말한다. 그렇지만 문제가 되는 결정이 다른 사람들에게 영향을 미친다면, 그 사람들 또한 그 결정의 당사자가 되거나 또는 적어도 자기가 참여하지 않은 채 내가 결정을 내리는 데 동의해야 한다. 모든 사람에게 구속력이 있고 강제적인 규칙을 부과하는 결정이 특히 중요하다. 국가가 내리는 결정이 여기에 해당되는데, 그런 결정에는 규칙의 영향을 받는 모든 사람이 결정 과정에 의미 있게 참여할 수 있어야 한다.", "실제로 한 사람이 실행할 수 있는 거의 모든 결정과 행동은 다른 사람에게 일정하게 영향을 미친다. 따라서 모든 사람이 자기에게 영향을 미치는 모든 결정의 참가자가 되기란 불가능하다. 또한 사회가 이렇게 포괄적인 민주적 참여로 나아가려 한다면 엄청난 일이 될 수 있다. 그러므로 우리에게는 자유의 맥락과 민주주의의 맥락 사이에 사회적으로 수용되는 경계를 규정하는 일련의 규칙이 필요하다. 이 규칙에 관해 이야기하는 데 필요한 개념이 사적 영역과 공적 영역 사이의 경계다. 사적 영역에서는 개인이 자기가 한 행동에 영향을 받는 사람들의 민주적 참여를 수반할 필요 없이 원하는 일을 자유롭게 하는 반면, 공적 영역에서는 직접적으로든 간접적으로든 결정의 영향을 받는 모든 사람이 참여를 권유받는다.", "사람들이 동료 시민의 안녕에는 상대적으로 거의 관심을 기울이지 않고 정치가 전적으로 이익 집단만을 중심으로 조직되는 사회 세계에서도 확실히 정치적 민주주의가 존재할 수 있다. 그렇지만 이런 민주주의의 질은 상당히 얇을 가능성이 높고, 공공선과 폭넓은 합의의 모색에 관해 진지한 공적 숙의를 진행할 공간도 적게 마련이다.", "그 말이 무엇을 의미하든 간에 자유란 '아니오'라고 말할 수 있는 능력이다. 부유한 사람은 거리낌없이 임금 노동을 하지 않겠다고 결정할 수 있다. 반면 독립적인 생계 수단이 부족한 가난한 사람은 그렇게 쉽게 고용을 거부할 수 없다. 그렇지만 하나의 가치로서 자유는 단순히 '아니오'라고 말할 수 있는 능력보다 깊이 나아간다. 자유는 또한 자기의 인생 계획에 따라 능동적으로 행동할 수 있는 능력이다. 이런 의미에서 자본주의는 많은 사람에게서 진정한 자유를 박탈한다. 풍요 한가운데에 있는 가난은 행복한 삶을 위한 조건으로 향하는 동등한 접근권을 사람들에게서 앗아갈 뿐 아니라 자결권에 필요한 자원에 다가갈 접근권도 앗아간다.", "각기 다른 시간과 장소에서 자본주의의 반민주적 효과를 완화하기 위해 많은 일들이 벌어졌다. 이를테면 공과 사의 경직된 경계를 잠식하기 위해 갖가지 방식으로 사적 투자에 공적 제약을 부과할 수 있고, 강력한 공공 부문과 적극적인 공적 투자로 자본 이동의 위협을 누그러트릴 수 있으며, 선거에서 개인 재산을 사용하는 범위를 제한하고 정치 캠페인에 다양한 형태의 공적 자금을 투입해 부유층이 정치 권력에 특권적으로 접근하는 폐해를 줄일 수 있고, 노동법은 노동조합을 통해 노동자의 집합적 권력을 강화하는 동시에 일터의 지배 구조에서 일정한 구실을 부여받는 노동자 협의회를 의무화하는 등 일터 안에서 노동자의 권리를 강화할 수 있으며, 폭넓은 복지국가 정책을 통해 사적 재산에 다가갈 접근권이 없는 사람들의 진정한 자유를 증대할 수 있다. 정치적 조건이 제대로 갖춰진다면, 반민주적이고 자유에 방해가 되는 자본주의의 특징을 완전히 근절하지는 못하더라도 어느 정도 길들일 수는 있다.", "사유화된 소비주의는 공공재와 집단적 소비를 개인의 전반적인 생활 수준과 삶의 질에서 중요한 구성 요소로 보기보다는 개인적 소비의 축소로 간주한다. 이렇게 개인적이고 사적인 소비에 몰두하면 경쟁적 개인주의에 연결된 요소인 타인의 안녕에 관한 상대적 무관심이 더욱 강해진다.", "자본주의의 세계화 때문에 자볹주의 기업들은 규제가 덜하고 노동력이 값싼 세계 여러 곳으로 투자를 이동하기가 한층 쉬워졌다. 기술과 인구에서 일어난 다양한 변화에 나란히 이런 자본 이동의 위협 때문에 노동 운동이 파편화되고 약해졌으며, 그 결과 저항과 정치적 동원 능력이 떨어졌다. 자본의 금융화도 세계화와 결합하면서 부와 소득의 불평등이 엄청나게 커지는 결과로 이어졌고, 이런 불평등은 다시 사회민주주의 국가에 반대하는 세력의 정치적 영향력을 증대시키고 있다. 자본주의는 길들여지기는커녕 점점 속박에서 풀려나고 있다.", "자본주의에 저항하기는 이 체제의 폐해를 누그러트리려 하면서도 국가 권력을 장악하려 하지는 않는다. 그렇게 하기 보다는 시위를 비롯해 국가 외부에서 벌이는 여러 형태의 저항을 통해 자본가들과 정치 엘리트들의 행동에 영향을 미치려 한다. 우리는 자본주의를 변혁하지는 못하더라도 문제를 일으키고 시위를 벌이고 엘리트들이 자기가 한 행동 때문에 치러야 하는 비용을 높임으로써 자본주의의 폐해에 맞서 우리 자신을 지킬 수는 있다. 이 전략은 독성 폐기물과 환경을 파괴하는 발전 산업에 항의하는 환경론자들, 약탈적 대기업에 맞서 불매 운동을 조직하는 소비자 운동, 이민자, 빈민, 성 소수자의 권리를 지키는 운동권 변호사 등 다양한 부류의 많은 풀뿌리 활동가들이 추구한다. 또한 임금을 올리고 노동 조건을 고치려 파업을 조직하는 노동조합이 기본적으로 구사하는 전략적 논리이기도 하다.", "일반적으로 볼 때 자발적이고 소박한 '라이프 스타일'은 자본주의 내부의 소비주의와 경제 성장을 향한 집착을 거부하는 폭넓은 흐름에 기여하기도 한다.", "자본주의에 도전하는 한 가지 방법은 이 복잡한 체제 내부의 여러 공간과 틈새에서 가능한 곳마다 더 민주적이고 평등하며 참여적인 경제 관계를 건설하는 길이다. 자본주의 잠식하기라는 개념은 이 대안들이 장기적으로 개인과 공동체의 삶에서 충분히 두드러지게 돼 결국 이 체제에서 자본주의의 지배적 구실을 대체할 수 있는 잠재력이 충분하다고 상상한다.", "하나의 전략적 전망으로서 자본주의 잠식하기는 매혹적이면서도 억지스럽다. 이 전략이 매혹적인 이유는 국가가 사회 정의와 해방적 사회 변화의 진전에 아주 적합해 보이지 않을 때에도 우리가 많은 일을 할 수 있다는 사실을 시사하기 때문이다. 우리는 낡은 세계의 잿더미 위가 아니라 그 세계의 틈새 안에서 새로운 세계를 건설하는 일을 계속할 수 있다. 또한 내가 '현실적 유토피아'라고 이름 붙인 장소들, 곧 여전히 자본주의가 지배하는 사회 안에서 자본주의를 넘어서는 해방적 종착지의 조각들을 건설할 수 있다. 이 전략이 억지스러운 이유는 자본주의자가 지배하는 경제 안에서 아무리 해방적 경제 공간을 축적한다고 해도 자본주의 대기업이 거대한 권력과 부를 갖고 있으며, 대부분의 사람들이 자본주의 시장의 순조로운 기능에 생계를 의존하는 현실을 감안할 때 자본주의를 정말로 잠식하고 대체하기란 참으로 불가능해 보이기 때문이다. 분명 비자본주의적인 해방적 형태의 경제 활동과 관계가 자본주의의 지배력을 위협하는 수준까지 증대하지 않는다면, 이런 활동과 관계는 분쇄되고 만다.", "시장은 자본주의 경제뿐 아니라 실행 가능한 어떤 국가주의나 사회주의 경제에서도 일정한 구실을 한다. 문제는 시장이 존재하는지가 아니라 다른 형태의 권력들이 어떻게 시장 내부에서 탈집중화된 교환의 작동을 실현하는지다. 독일 총리 앙겔라 메르켈은 시장에 순응하는 민주주의를 호소하는 정치인으로 유명하다. 그렇지만 우리에게는 민주주의에 순응하는 시장, 곧 사실상 민주적 권력의 행사에 종속되는 시장 경제가 필요하다.", "협동조합은 지리적으로 뿌리를 두기 때문에 협동조합에 투자된 자본도 이동성이 한결 적은 만큼 국가 규제를 피하기 위해 국경을 넘어 움직일 가능성이 적다. 시장 지향적 기업이 모두 그렇듯이 협동조합도 이윤에 영향을 주는 몇몇 규제에 반대할 수 있지만, 국각 관할권을 벗어나겠다고 위협하면서 그런 규제를 봉쇄할 가능성은 덜하다. 따라서 협동조합은 국가를 통해 정식화되는 민주적 우선 과제에 한결 쉽게 종속된다.", "자본주의의 재생산이라는 관점에서 보면, 조건 없는 기본 소득은 세 가지 결과를 달성할 수 있다. 첫째, 주변화 때문에 생겨나는 불평등과 빈곤이 가져오는 최악의 효과를 완화함으로써 사회안정에 기여한다. 둘째, 모든 사람을 위한 자유재량 소득을 창출하기 위한 일자리의 자기 창조라는 또 다른 소득 창출 노동의 모델을 뒷받침한다.", "하나의 생산 체제로서 자본주의 기업들의 자동화는 본질적으로 생산되는 제품을 살 만한 사람들을 충분히 고용하지 못하는 문제에 직면한다. 조건 없는 기본 소득은 폭넓게 분산된 기본적인 소비재 수요를 제공한다. 이런 이유들 때문에 조건 없는 기본 소득은 자본가 엘리트들에게도 매력적인 정책 선택지가 될 수 있다.", "정체성은 시간이 흐르면서 바뀌는데, 이런 변화가 일어나는 한 가지 방식은 사회적 투쟁이 발휘하는 효과를 거치는 경험이다. 사회운동을 비롯한 여러 형태의 집합 행동에 참여하는 생생한 경험은 자기가 누구인지, 그리고 어떤 종류의 사람인지 생각하는 개인의 인식을 바꿀 수 있다.", "자본주의 사회라고 해서 모든 사회 공간이 자본주의에 지배되지는 않는다. 자본주의에는 틈새와 균열이 존재하며, 사회주의의 맹아가 자리한다."]}, {"title": "JOBS, 소설가 : 써야 하는 이야기를 쓰고 마는 사람들", "author": "매거진 B 편집부", "genre": "인터뷰, 자기계발", "publisher": "REFERENCE by B", "passages": ["브래드 다큐멘터리 매거진 B 의 단행본 시리즈 '잡스'는 브랜드 이야기의 확장판입니다. 많은 사람들이 매력적으로 느끼는 브랜드에는 자신만의 직업의식을 지닌 매력적인 사람이 있고, 일에 대한 태도와 가치는 곧 브랜드의 철학과 정신으로 자연스레 이식됩니다. 그래서 '잡스'는 각자만의 방식으로 브랜드를 만드는데 기여하는 이들에게 질문을 던집니다. '당신은 어떤 일을 하는 사람입니까?', '어떤 생각으로 그 일을 합니까?' 사람을 중심으로 일과 삶을 담아낼 '잡스'는 이 시대의 직업인과 나눈 대화를 가장 생생한 방식으로 전달하기 위해 인터뷰집 형식을 취합니다. 이 책을 통해 세상의 많은 창의적인 일이란 전문지식이 아닌, 직업적 사고를 제대로 이해하고 갖추는 데서 시작한다는 것을 전하고자 합니다.", "소설가의 일을 고립된 상태에서 할 수 있는 것으로 여길 수 있지만, 잘 생각해보면 사람들과 소통하는 능력이 뛰어난 사람이 좋은 소설가가 되는 데 유리한 고지를 점합니다. 나와 다른 사람의 생각을 받아들이는 이해의 폭이 넓어야 내 생각의 폭도 다양해지니까요. 물론 다른 사람이 남긴 여러 기록을 간접경험하면서 보완할 수도 있겠지만, 기본적으로는 다양한 상황에 대한 경험의 총량이 많아야 하죠.", "그들 앞에는 늘 써야 하는 이야기가 있고, 그 이야기를 써내기 위해 불안과 고독을 견디며 시간과 사투를 벌입니다. 이 책의 제목처럼, '써내고야 마는' 소설가의 의지는 그 무엇보다 견고합니다. 마치 소설가의 재능이란 이야기의 완결을 보고 싶다는 의지가 아닐까 하는 생각이 들 정도죠.", "기록을 남기는 데 나름의 집착이 있습니다. 글을 쓰려고 노력하는 이유는 제 생각을 더 정교하게 정돈하고 싶어서죠. 형체가 드러나지 않은 어떤 소재를 깎아서 구체적인 형상을 드러내는 조각처럼요. 그래서인지 누군가 스스로의 생각을 글로 정의하지 않으면 저는 그 생각이 정리되지 않았다고 느끼는 편입니다.", "제 머릿속은 늘 작품에 대한 생각으로 가득 차 있거든요. 쓰는 때가 아니면 써야 할 글을 생각하기 바쁩니다.", "나는 아주 오래전부터 나 스스로를 작가로 여겼고, 늘 바쁜 와중에도 틈틈이 글을 썼다. 일주일에 7일, 하루에 16시간 이상씩 일하면서도 시간이 나면 나와는 완전히 다른 세상에 사는 남자에 대한 글을 썼다.", "글의 호흡을 짧고 속도감 있게 가져가려고 해요. 독자가 책을 내려놓을 틈을 주지 않는 거죠. 그들이 페이지를 계속 넘기게 하고 싶지, 다른 데로 시선을 돌리게 하고 싶진 않으니까요. 퇴고에 퇴고를 거듭하며 단어를 덜어내고, 또 덜어내는 작업을 반복해요. 본질만 남을 때까지요. 단어 하나하나 그 존재의 이유가 명확해야 하죠.", "우리는 이제 우리와 닮은 존재가 아닌 닮지 않은 존재를 사랑하는 법을 배워야 하지 않을까? 사랑의 특성은 번지는 것에 있으므로 머지않은 날에 정말 가능할지도 모른다.", "물러서서 100년 단위로 보면 세계는 확실히 나아지고 있다는 거죠. 다만 사람들을 좌절시키는 건, 자신이 원하는 세계가 자신의 수명 안에 오지 않을 가능성이 높다는 사실이 아닐까 합니다. 그래도 지금 그것을 원하면 다음 100년은 분명히 변한다고 생각해요 우리가 비슷한 처지라는 걸 아니까.", "우리는 상실한 이들이 일군 변화에 빚지고 있다. 사랑하는 사람을 잃은 자가 죽도록 애써서 겨우 바꿔놓은 것이 한국 현대사의 한 흐름일 것이다. 서로 닮은 죽음이 각각의 우연한 비극이 되지 않도록 사회적 애도를 발명해온 이들 덕분에 느리게 조금씩 변해왔다. 지옥 같은 그리움을 꽃처럼 들고 살아가는 유족들의 이야기가 지금보다 더 귀하게 여겨지기를 간절히 바란다. 우리 모두는 결국 서로를 잃을 수밖에 없기 때문이다. 상실 이후에도 무엇이 가능한지 알고 싶기 때문이다.", "정혜윤의 소설 '마음 편해지고 싶은 사람을 위한 워크숍'엔 이런 문장이 등장한다. 어떤 사랑은 이 세상의 많은 일들에 반대하게 만들어. 반대하는 힘이 한 사람의 진짜 힘이야. 너를 지키기 위해서라면 나는 기꺼이 반대자가 될 거야. 이 책은 사랑과 저항이 하나임을 천명한다. 모든 존재는 크고 작게 취약하고, 취약한 존재를 사랑하다 보면 결코 동의할 수 없는 질서와 마주하게 된다. 계속 사랑하기로 결심한 자는 싸우는 자로 거듭난다. 그것이 다름 아닌 연대다. 그러나 연대는 어떠한가. 누군가의 가슴을 뜨겁게 하거나 멀찍이 떨어지게 할 이 단어의 진실은 안담, 한유리, 곽예인이 함께 쓴 '엄살원'에 적혀 있다. 연대라는 건 아름답지 않은 거구나. 엄청 싸우면서 동행하는 거구나 활동가 여름의 말이다. '활동가라는 이상한 사람들'에 관해 안담은 이렇게 썼다. 자기 일도 아닌 문제에 자기 일처럼 화를 내는 게 직업인 사람들. 여성, 장애인, 성노동자, 퀴어, 빈민, 홈리스, 청소년, 동물의 이야기가 곧 나의 이야기이기도 하다고 굳게 믿는 감각이상자들. 비관할 구석이 가득한 세상에서 냉소를 통해 똑똑해 보이기를 선택하지 않은 사람들. 안담의 문장 너머로 활동가들의 특수한 노동이 보인다. 비슷한 문제의식을 지닌 동지들이라 해도 싸우는 방식과 더 절박하게 여기는 부분이 얼마든지 다를 수 있다. 적과 싸우는 고통에 비하면 말이다. 죽어라 부딪치면서도 같은 현장을 지켜야 한다는 점에서 연대는 아름답기만 할 수 없다.", "팔짱을 낀 채로는 응원할 수 없다. 기후재난이 빈번하고, 후쿠시마 오염수 방류가 허가되고, 사람들이 일하다 죽고 괴로워서 죽는 이 나라에서도 아이를 낳기로 결심한 친구가 있다면, 무모하고도 용감한 그를 위해 궁리하고 싶을 따름이다. 나는 어떻게 힘을 보탤 것인가.", "무언가를 멈추는 일이 장마철에 빗방울을 피하는 것만큼이나 어렵게 느껴지는 세상이다. 빠르고 잦은 소비를 부추기는 방향으로 설계된 이 시대에서 착취에 덜 가담하려면 의지와 기쁨이 필요하다. 죄책감만으로 바뀌는 데에는 한계가 있지 않던가. 마음을 틀어서 새로운 쾌락을 연습해야 할 때다. 덜 사는 기쁨을 진정으로 알아가고 싶다. 그래야 덜 만들어질 테니까. 그래야 덜 버려질 테니까.", "우리 엄마는 세상 대부분의 문제를 현미밥과 된장국으로 해결할 수 있다는 듯이 말한다. 내가 글을 못 쓸 때에도, 관계를 망치고 있을 때에도, 중대한 계약을 앞두고 스트레스에 시달릴 때에도 엄마의 입장은 한결같다. \"요새 현미밥이랑 된장국을 덜 먹어서 그래.\" 그는 언제나처럼 밥을 안치고 냄비에 된장을 푼 뒤 콧노래를 부르며 제철 채소를 다듬기 시작한다. 못난 딸들이 으레 그러듯이 나는 작가로서의 내 결함(충분히 첨예하지 않음, 유치함, 사유의 길이가 짧음 등)이 모두 저 여자 탓이라고 생각했다. 그가 물려준 엄청난 단순함과 명량함이 아주 보잘것없는 장점 같았다. 애트우드에게 보부아르가 있듯 나에게도 있다. 징그럽게 똑똑한, 내가 절대로 쓰지 못할 문장을 쓰는 동료 작가들이. 그들은 시시각각 나를 작아지게 한다. 그러나 '타오르는 질문들'을 선물하고 보부아르에 대한 애트우드의 헌사를 소리 내어 읽어준 것도 살아 있는 동료들이다. 그들을 선망하고 두려워하면서 배웠다. 우리가 가진 것과 가지지 못한 것. 양쪽 다 글감이 된단 걸. 문학에선 풍요와 결핍을 무 자르듯 나눌 수 없다는 걸. 나는 엄마의 생명력 덕분에 작가가 되었단 걸.", "제 직업은 긴 글을 쓰는 일이에요. 최근 들어서는 드라마 각본도 쓰고 아이돌 가사도 쓰지만 뭐니 뭐니 해도 종이책을 만드는 게 본진인 출판인이자 저자입니다. 모두가 숏폼을 보기에도 바쁜 세상에서 문학이라는 롱폼으로 승부를 보겠다는 야망을 품고 있습니다. 독서율도 종이책 판매량도 떨어지는 시대의 흐름 속에 딱히 전망이 좋아 보이지는 않지만 누구에게나 무모하게 지키고 싶은 장르가 하나쯤 있기 마련이죠. 그게 제게는 문학입니다.", "기술의 발전이 모두의 일상에 평등하게 반영되지는 않을 테고, 첨단을 향해 갈수록 사람들 사이 계급 차가 오히려 선명히 드러날지도 모르겠어요. 어떤 인간들은 살아남고 어떤 인간들은 주변부로 밀려날 거라는, 발 빠르게 똑똑해 보이는 진단들 앞에서 저는 어쩐지 자꾸 사소해 보이는 질문만 하고 있어요. 나는 누구와 함께 밥을 나눠 먹고 치우고 싶지? 누가 슬플 때 곧장 그의 곁으로 가고 싶지? 기쁨과 슬픔과 웃김과 더러움을 기꺼이 공유하고 싶은 타인이 누구지? 그를 위해서라면 왜 기꺼이 번거로움을 감수하고 싶어지지? 그들 때문에 마음이 달그락거리는 감각. 이걸 대수롭지 않게 여겨서는 안 된다는 직감이 들어요.", "실제 몸뚱아리를 가진 인간과 만나는 수고는 계속될수록 좋다고 생각해요. 에이아이와 맺는 관계를 사랑과 우정이라고 하기엔 무리가 있으니까요. 내가 상대로부터 버려질 위험이 없는 관계는 사랑과 우정이 아니죠. 우리는 에이아이로부터 거절당하지 않아요. 그렇기 때문에 마음껏 무례해지기도 하고 상당히 착취적인 태도로 서비스를 이용하죠. 이렇게 구는데도 실망당할 위험, 차일 위험, 손절당할 위험이 없다니. 그게 어떻게 사랑과 우정이겠어요.", "에이아이의 '약하지 않음'도 주의 깊게 살펴봐야 할 부분인 것 같아요. 인간은 훨씬 한계가 많잖아요. 우리는 참을성의 한계도 있고, 체력의 한계도 있고, 밥을 한 끼만 굶거나 잠을 하루만 설쳐도 인품이 나빠져요. 약하게 태어나서 약하게 죽고, 언젠가 반드시 삶이 끝난다는 한계도 있죠. 그런데 바로 그 한계 때문에 발생하는 아주 중요하고 소중한 것이 있지 않은가 질문해보는 거예요.", "회의에서는 이런 얘기가 오가요. 드라마란 무엇이냐. '주인공이 무언가를 강렬히 원하는데 그걸 이루기가 정말 어렵다'라는 구조를 가진 이야기지요. 시나리오 대가들의 고전적인 정의예요. 사람들은 누군가의 분투를 보고 싶어 해요. 진짜 분투요. 저는 여기서 약한 인간의 가능성을 봐요. 있는 힘을 다해서 노력하는 것이 분투라면, 분투란 약한 자들만 할 수 있지요. 분투하는 서사의 주인공들은 여전히, 그리고 아주 먼 미래까지도 인간일 수밖에 없지 않을까요.", "우리는 고작 자기 자신으로만 살다 가요. 나 아닌 사람의 눈으로 세상을 보기란 거의 불가능한 일이에요. 그 어려운 시도를 계속하는 게 문학의 도전이죠. 실패했든 성공했든 간에, 대부분의 책에는 모르는 삶을 최대한 섬세하게 헤아리려는 흔적들이 담겨 있어요. 김애란 작가님은 모름의 렌즈로 봐야만 비로소 알게 되는 것들이 있다고 쓰셨어요. 너라면 어떻게 느낄까? 라는 질문을 관두지 않는 성실함이 사랑하는 자와 쓰는 자와 읽는 자가 공유하는 무언가라고 생각해요.", "애컬리의 작품 '아버지와 나'에 대해 고닉은 다음과 같이 씁니다. '애컬리가 자신의 이야기를 전할 목소리를 명료히 하는 데는 삼십 년이 걸렸다. 거리 두기를 성취하고, 자기 자신에게 정직해지고, 신뢰할 만한 서술자가 되는 데 삼십년이 걸린 것이다. 이런 세월이 글에 아로새겨져 있다. 사건마다, 단락마다, 문장마다 우리는 노력으로 얻어진 한 페르소나의 찬란함을 느낀다.' 가까운 애증의 관계일수록, 특히 같이 살수록 더더욱 공간적 거리 두기가 어렵죠. 그래서 시간적 거리, 즉 세월이 흘러야만 비로소 제대로 관계를 해석할 수 있게 되기도 해요. 그래서 저는 꼭 할머니가 될 때까지 살고 싶죠. 중년기와 노년기를 모두 겪으며 쓰고 싶죠. 칠십 대, 팔십 대에도 무르익은 실력을 발휘했던 작가들을 닮고 싶고요.", "그는 그림자 속으로 들어갈 때나 흰 방에 입장할 때나 똑같은 속도로 걷는다. 내가 그를 뚫어지게 바라보아도 원래 짓던 표정을 잃지 않는다. 별다른 경직 없이 편안해 보인다. 비장애인들은 시선 때문에 자주 굳곤 하는데. 상대로부터 시선을 돌려받는 이에게 생기는 특유의 경직을 그에게선 찾을 수 없었다. 보이지 않기 때문에 생기는 자유 또한 그에게 깃들어 있음을, 그의 일부는 응시로부터 해방되어 있음을, 사진 찍히는 그의 모습을 보다가 알게 되었다.", "질의응답 시간엔 내가 아는 사람 중 제일 청아한 눈동자를 지닌 이가 손을 들었다. 카운터에 기대앉은 책방 주인 요조였다. 출근길에 올려다본 하늘이 너무 아름다웠다고 요조는 말했다. 그동안 자신에게 아름다움이란 대부분 시각과 관련된 경험이었는데 김성은 작가님께서는 무엇을 아름답다고 느끼시는지 알고 싶다고 조심조심 물었다. 김성은은 대답했다. 얼마 전에 오래된 친구랑 산에 갔어요. 친구 도움을 받아서 정상까지 올랐어요. 친구가 너무 좋아하면서 말하더라고요. 야. 여기 오니까 세상이 다 보인다. 가슴이 탁 트이는 것 같애! 듣고선 저도 솔직하게 말했어요. 그러게. 나도 한번 볼 수 있다면 얼마나 좋을까. 속이 다 후련하겠다! 그 말을 하면서 편하게 울었어요. 걔 앞에선 약한 소리를 해도 되니까 시각장애인들은 손이 눈이에요. 만지면서 세상을 봐요. 그런데 하늘은 만질 수가 없잖아요. 떨리는 김성은의 음성 사이로 독자들이 훌쩍이는 소리가 섞였다. 하늘에 손이 닿지 않는 건 누구나 마찬가지지만 볼 수 없는 사람에겐 더 사무치는 느낌이겠구나."]}, {"title": "겨울을 지나가다", "author": "조해진", "genre": "소설", "publisher": "작가정신", "passages": ["췌장암 선고를 받은 엄마와 사별한 뒤 홀로 남겨진 주인공이 엄마의 죽음을 애도하며 다시 일어서는 과정을 그리는 작품이다. 필연적으로 작별을 겪어야 하는 세상의 모든 엄마와 딸에게 바치는 헌사이자, 커다란 상실의 슬픔 속에서도 또 다른 아픈 이를 향해 곁을 내어주는 사람들에 관한 이야기다. (카드뉴스) 엄마가, 떠났다. 장례를 치르고, 모두가 각자의 자리로 돌아간 뒤 나 홀로 엄마 집에 남았다. 배가 고프면 아무때나 라면을 끓여 먹었고 갈아입을 옷이 없으면 그제야 빨래를 했다. 언젠가부터 엄마 옷과 털신을 신고 엄마가 쓰던 화장품과 목걸이를 걸쳤다. 내 몸에서 엄마의 냄새가 나기 시작했다. 내게는 시간이 필요했다. 엄마가 떠났다는 말을 담담히 전할 수 있을 만큼, 슬픔을 여과하는 마음의 근육과 뼈가 만들어질 만큼, 그만큼의 시간이 모든 건 잊힌다고, 세상에 잊히지 않는 것은 없다고, 엄마는 그렇게 말했었다."]}, {"title": "고상하고 천박하게", "author": "김사월, 이훤", "genre": "에세이", "publisher": "열린책들", "passages": ["나는 정말 상상할 수 없거든. 우리 부모님이 주인공이 아닌 결혼식을. 너의 결혼식에선 부부가 된 이들에게 소중했던 사람들을 모아 놓고 서로를 소개해 주는 듯했지. 신랑의 아버지는 축가를 불렀고 신부의 어머니는 축무를 추었다. 결혼식의 전통을 지키는 척 슬쩍 부수었다. 나는 모든 것을 부정하는 혁명에는 부정적이야. 내 모습대로 살아 버리는 혁명을 원하고 패배에서 시작된 질서를 원한다. 오늘 난 이성에 결혼식에서 할 수 있는 파격적이고 우아한 순간들을 본 것 같았어. 너의 아버지는 축가를 부르다 간주 부분에서는 슬아와 너의 책 제목을 이용해서 내레이션도 하셨지.'너무 절박해지지 말고 아무튼 노래도 하고 당근 마켓도 많이 하고 끝내주는 인생을 살거라' 촉망받는 두 젊은이에게 세대의 배턴을 넘기며 미래를 긍정하는 어른의 축복이었다. 이 순간은 너무 듣고 보고 싶었던 이야기지만 절대 일어날 수 없다고 굳게 믿으며 사는 사람의 체기를 바늘로 찌르는 듯했다. 내 인생에서는 죽어도 없을 것 같은 장면이기에 부러워서 화조차 났다. 이 결혼식을 해낸 슬아와 네가 나보다 더 어른같이 느껴져서 나는 어리광쟁이처럼 울었다.", "훤아 미안하지만 지금 세기의 결혼식이 사람들을 서로 의심하게 한단다. 저 정도는 되어야 사랑인가 싶어서 외로운 기분을 느끼게 하지. 딱 술이 맛있어지는 기분 그런 거지.", "사내새끼가 왜 우냐는 말을 그렇게 많이 듣고도, 울때마다 동네북처럼 놀림당하고도 왜 이렇게 눈물이 날까. 미안할 때 고마울 때 지나간 시절의 나를 타인한테서 볼 때 어김없이 운다. 누가 나를 복잡하게 알아줄 때도.", "결혼식 날 아빠가 슬아와 내 책 제목을 인용하며 축복할 때 나도 둑이 무너지듯 울었다. 아빠는 사랑이 많지만 그것을 매일 살갑게 말하지는 않았다. 그날, 그렇게 온 마음 다해, 큰 소리로 축하해 줄 줄은 몰랐어. 아빠가 집에서 백 번도 넘게 연습했다는 건 나중에 알게 됐다. 나는 아빠를 잘 모르는지도 모른다. 가족 바깥의 '종찬'을 이제부터 찬찬히 알아 가야겠다고 그날 다짐했어. 가족이라는 거 이상하지 않니. 가장 못생긴 서로의 얼굴을 알면서 빛나는 모습 앞에 둔하기도 하고, 편한데 불편하고, 짜증 나는데 애틋하고, 돌이켜 보면 나는 가족에게 가장 인색했다. 사월의 창법도 집 안에서 큰 소리를 내지 않으려다 생겨났다며, 식구들이 들을까 봐 이불 덮고 조용히 연습하다 지금처럼 부르게 되었다는 사실을 떠올리다 오묘한 기분에 휩싸인다. 어떤 복잡한 사랑과 증오와 우애를 지나온 거니.", "처음에는 말 못 할 내 이야기를 세상에 흘려보내는 게 좋았고 어떤 때에는 사람들이 원하는 모습이 되고 싶었다면 지금은 스스로에게 말하듯이 무대를 하고 싶다고 생각해. 요즘은 그런 무대를 했을 때 후회가 덜하더라. 어떤 척을 하고 나면 정말 괴롭고 수치스러워. 타인의 취향과 호감이 나의 작업적 생존을 결정하지만 결국 생긴 대로 굴어야 한다니 참 어렵다. 이렇다 저렇다 그래도 난 무대가 좋아. 관객들이 무대 위만 봐야 하는 아름다운 강압도 좋아. 음악 같은 걸 하겠다고 생각도 못 하던 때에도 난 무대 위의 사람들을 보면 간질거리고 두근거리더라. 부럽다는 건 내가 뭘 원하는지 알 수 있는 알람 같은 거겠지. 너도 이런 기분 일까? 시를 안 쓸 때도 시가 부러웠나? 무대까지 올라가 버리는 사람은 그럴 수밖에 없는 이유가 있는 거겠지. 너도 나도 긴장되고 두렵다면서도 기어코 무대 위로 올라가는구나.", "바로 그 한 사람의 구조와 질서를 잘 배우고 싶어 시간을 바치는 게 사랑일 텐데. 그 과정 동안 일어나는 변화가 신기해. 서로의 언어를 닮고 놀리고 또 뒤집기도 한다는 게. 연인뿐 아니라 가장 가까운 사람들도 그런 침범을 하지. 바라지 않을 때도 그런 일은 일어나고. 얄팍한 어른들을 향한 복수심과 불만족이 만든 에너지로 네가 너무 잘 산다는 이야기를 읽으며 복잡한 마음이 든다. 근데 슬픔을 팔아서 받은 것들로 행복해도 된다. 가장 중요한 걸 내어 준 거잖아. 그 노래들 때문에 얼마나 많은 사람이 움찔했는지, 얼마나 많은 새 눈빛이 태어났는지 아니. 네 유년의 어른들 태도는 애석하지만 이 세상에 너의 음악이 있다는 게 안도되고 고맙고 미안하기도 해. 나도 비슷하게 느껴. 결핍은 슬픔을 더 뾰족하게 만들지. 그걸 들고 우리가 무대에 서고.", "우리는 다르게 탁월하다. 나만 나처럼 만들 수 있다.", "자라면서 무대에 서는 사람은 누구나 큰 음성을 갖게 된다고 은연 중에 믿게 되었던 것 같아. 한편 내 목소리가 작다는 걸 받아들이는 게 어려웠어. 마이크를 쥔다고 해서 모두가 커지진 않는다. 하지만 어떤 자리에서는 작은 목소리가 더 잘 들린다. 그 비밀을 기억하기로 한다.", "기존에 했던 작업과 달라진 부분이 두 가지 있어. 십년 만에 처음으로 단절감에서 뻗어 나가는 화두가 아닌 작업이라는 것. 나는 이제 연결에 대해 이야기하고 싶어졌어. 움직이는 우리에 대해. 움직이면서 부딪히고 몸을 뗐다 붙이고 이야기를 시작하는, 연결감에 대해. 오래 단절돼 온 사람들이 연결에도 천착하게 되는 거겠지.", "이틀 동안 스마트폰의 노예로 살았다. 자신이 어떤 도구를 사용하는가에 따라 그걸 쓰는 뇌의 부분이 커지면서 활성화된다면서? 뚱뚱해진 스마트폰 뇌를 다이어트시키며 조금은 내가 더 좋아하는 내 모습으로 돌아오는 통로에 너에게 편지 쓰기가 있었다. 다행이다. 글을 쓸 수 있고 그걸 기다리는 사람이 있다는 것이. 다시금 느낀다. 내가 가야할 곳은 '좋아요'가 아니고 '좋아합니다'의 세계다.", "너의 연말과 연초는 어떻게 흐르고 있니. 또 365번 해가 뜨고 지다니. 다시 1월이라니. 믿을 수 없다. 새 마음을 갖추려고 인간이 주마다 달마다 해마다 결승선을 마련해 두었다는 게 조금 귀엽다.", "한편 가만히 있는 게 더 어렵다는 걸 실감한다. 바다에 쉬러 갔는데 원고를 자꾸 꺼냈다 넣었다 했다. 소음도 없고 취객도 없는 평화로운 그 바다 앞에서 자꾸 다음 일 생각을 하는 거 있지. 일을 안 하면 불안한가 봐. 효용에 중독됐나 봐. 직업이 나보다 더 커졌구나 싶어서 경각심마저 들었다. 슬아는 몸이 흠뻑 젖은 채 바다에서 돌아오고 있고 나는 노트북과 교정지를 가방에 쑤셔 넣었다. 애써 돗자리에 누워 있었다. 시도 때도 없이 꺼내 쓰는 삶을 이제는 지양한다. 모든 순간을 이미지와 텍스트로 만들다가는 정작 중요한 순간에 우리가 모자랄 거다. 올해는 덜 일하고 싶다. 걷고 듣고 멈추고 보는 데 시간을 할애하고 싶다.", "누구에게도 아첨하지 않으면서, 마음에 없는 말은 건네지 않으면서, 오래 만들고 싶다.", "닿아 있을 때는 고립을 꿈꾸고 단절에서는 연결을 향하며 우리는 갈지자로 걷는구나. 함께가 소중해진 사람이 말해 주는 닿지 않음에 대한 이야기가 무척이나 궁금하다.", "대중 예술이기 때문에 이 작업에 누가 어떤 말을 하건 자유다. 평생을 단련한 선수들의 스포츠 경기를 보면서 우리가 맥주 마시고 잘하네 못하네 하는 것이 대중문화다. 그 쪽팔린 길을 내가 원했다. 도마 위에 오르는 것, 이게 진짜 좋으냐 별로냐 가타부타, 뭔가 만드는 사람들은 그런 화젯거리에 오를 수 있다는 것도 고마운 일이지. 나는 어떤 의견이나 비난에도 진실이 있고 그걸 내가 수용해야 진짜 성숙한 사람이 된다고 생각했던 것 같아. 그렇다고 그 모든 의견을 다 찾아볼 필요는 없었을 텐데. 하나의 댓글을 수용하기에도 우리는 약해지고 아파지잖아. 누군지 모를 사람들의 날이 선 반응을 찾아보다가 내 마음이 걸레짝이 되었나 봐. 이 모든 것에 중독되어서 난 웹에서 나를 계속 찾아보고 있었다고.", "요새 시집 작업을 다시 시작했어. 다음 원고를 쳐내듯이 서둘러 작업하고 싶지 않아서 반년 동안 시를 안 썼어. 오랜만에 써서 그런가, 좀 깨끗하게 남아, 시가 내 안에. 붙들리고 싶은 이미지들이 좀 더 선명해진 것 같고. 뭔가 문장이나 기교로만 완성하려 하지 않고 다 정돈되지 않은 채로 이끌려 가는 느낌", "내가 이번 공연 준비할 때 즈음 보게 된 문장이 있어. '한 음이 틀리면 모든 게 무너지는 연주를 할 것인가, 모든 음이 다 틀려도 살아 있는 음악을 할 것인가' 인상 깊은 말이지. 모든 음이 다 틀려도 살아 있는 음악을 해야지. 그렇지.", "우아한 듯이 행동하라. 당당하게 존재하며 위대하게 행동하라. 과장된 우아함과 정확함으로 움직여라. 그러면 오래잖아 당신의 몸이 정말 그렇게 바뀔 것이다. 실존적 위기 앞에서 나는 어떻게 우아해질 것인가 내일 앞에서 언제든 죽을 수도 있다는 듯이 오늘 앞에서 평생 살 수 있다는 듯이 그 모든 것이 두렵지 않다는 듯이 그 두려움을 모두 직면하는 것이 우아함일까", "산책을 함께한 사람과는 조금 더 빠르게 친근해지는 느낌이다. 걷기는 생각보다 더 적극적인 상호 작용이기 때문이다. 상대의 신만 보며 걷지 않지만 그가 이동하는 속도에 내 발끝뿐 아니라 몸의 전반적인 반경을 맞춰야 하고, 반대편에서 오는 행인이나 자전가와도 거리를 유지하며 이야기까지 잘 이어 나가야 하는 꽤 입체적인 교감 방식이다.", "관람을 마치고, 서른 명의 관람객이 나란히 앉아 전시와 그날 밤에 대해 썼다. 각자가 쓴 걸 돌아가며 읽었다. 그리고 각자의 한두 문장씩 발췌해서 그 자리에서 새로운 시를 한 편 만들었다. 그 기록은 모두가 함께 빚은 시였다. 말미에 순서를 재배치하지 않고 읽었는데 텍스트들이 멀면서 때때로 매우 가까웠다. 손이 베일 만큼 날카롭기도 했다. 밤이 수반하는 우연성, 그리고 즉흥성이 약속하지 않은 텍스트에서 묻어났다. 거기 있는 문장 일부는 우리 것이고 나머지는 개인의 것이다. 우리는 공동의 비밀을 만들었다. 비밀을 함께 만든 자들을 어떻게 더 좋아하지 않을 수 있을까. 그날 와준 친구는 말했다. '나 너 때문에 시랑 좀 친해진 듯. 시가 좀 더 좋아지는 것 같아' 그렇게 말하는 친구를 어떻게 더 좋아하지 않을까.", "편지는 세계를 다시 읽는 지침서 같은 거니까. 이 책은 둘이서 쓴 세계에 대한 일지이자 서로에 대한 목격담이고 자신에 대해 쓴 보고서다. 더 많은 타인에게로 향하는 광야의 우정이기도 하다. 그런 우정을 오래 원했다.", "나는 뭔가를 안 보고 살았다. 이 세상에 일어나는, 내 주변이 겪는, 내가 겪을 수도 있었던 여성과 남성이 관계하며 겪는 기쁨과 만족, 애매함과 슬픔, 갈망과 폭력 그리고 그렇게만은 표현하기 어려운 그 모든 것에 대해 회피하고 있었던 것 같다. 내가 거부했던 세상을 우연히 되돌아보니 별로라고 생각해서 아예 고려도 안 했던 것들이 그렇게까지 별로이고 나쁘고 죽을죄인지 싶었다. 그 나름의 아름다움과 탁월함, 그만의 고통과 아픔을 거절하며 남성과 친하지만 않다면 안전하다고 생각했던 나는 모두에게 얼마나 오만하고 무례했던 걸까? 그런 식으로 안전히 살아온 내 세상은 얼마나 좁았던 거니? **[출처]** [고상하고 천박하게 _ 김사월, 이훤](https:blog.naver.com/skdyds/223850421342)|**작성자** [라용](https:blog.naver.com/skdyds)"]}, {"title": "고통 구경하는 사회", "author": "김인정", "genre": "에세이, 인문", "publisher": "웨일북", "passages": ["기자 세계의 초입에서 서성이던 시기였다. 인간에 대해 궁금한 게 많았다. 되도록 많은 고통을, 많은 죽음을, 더 많은 폭력과 광기를 보기 위해 그 어귀에 서있다는 건 잘 알았다. 고통을 많이 볼수록 인간이라는 종을 잘 이해하게 될 거라 기대했다. 뭐든지 최대한 많이 보고 싶었다. 잘 본 뒤에, 잘 보여주면 된다는 원론만 알았다. 고통을 보는 일, 그리고 다른 이들에게 보여주는 일에 따라붙는 여러 복잡한 감정이나 윤리적 고민에 대해서는 아직 잘 알지 못했다.", "얼마 지나지 않아 내가 꽁무늬를 쫒고, 진상을 파헤치고, 추적하는 일이 타인의 고통과 자주 뒤얽히곤 한다는 사실을 알게 되었다. 사회부 기자가 하는 일이 그랬다. 경찰서를 출입하다 보면 정돈되지 않은 눈물과 비명과 고성이 흔했다.", "고통의 목격을 묻는 일은 차라리 수월했다. 고통의 당사자 앞에서 마이크와 카메라를 움직이는 일은 훨씬 곤혹스러웠다. 언제든 장례식장에 갈 수 있게 늘 단정한 옷을 준비해 두라는 회사의 권고는, 뉴스를 위해서는 언제든 타인의 극단적 상실 앞으로 밀려 보내질 수 있다는 말로 들렸다. 실제로 장례식장 앞이나 안까지 쫒아 들어가 유족에게 무슨 일이 일어났는지, 얼마나 고통스러운지 자주 물어야 했다. 기자가 아니라면 흔히 하지 않을, 혹은 도저히 할 수 없는 일이었다.", "매체가 고통의 스펙터클에 일정 분량의 시간을 할애하기를 애호한 게 먼저였는지, 대중이 뉴스 안에서 일정한 양 이상의 고통을 보기를 원한게 먼저였는지는 알 수 없다. 어느 분야에서건 수요와 공급은 서로를 북돋고 창출해 낸다. 무엇이 먼저였든, 언론은 오늘도 안방의 브라운관 안까지, 손안의 스마트폰 화면 앞까지 고통을 질질 끌어다 놓는다. 고통의 필터이자 고통의 확성기가 된다는 선천적 모순에 휩싸여, 기자들은 매 순간 저울질을 한다. 어떤 고통을 보여줄지, 이 보여주기가 윤리적인지, 혹은 어떤 고통을 가릴지, 이 가림이 윤리적인지에 대해. 실패하면 누군가에게 씻을 수 없는 상처를 줄지도 모르는 이 저울질은 하릴없이 아슬아슬하다. 상황에 다라 들쭉날쭉 변화하는 기준에 부응하는 일은 언뜻 불가능하고 위태로워 보이기도 한다.", "온라인에서 사람들이 영상을 유포하지 말아달라고 호소하고, 일부 방송사가 이 현장 영상들을 뉴스에 쓰지 않겠다고 선언한 이유는 단지 영상에 찍힌 모습의 참혹함 때문만은 아니었다. 이미지가 끔찍해 보인다는 것이 늘 그 장면을 볼 수 없는, 보면 안 되는 이유가 되지는 않는다. 영상에 대한 광범위한 비판에는 피해자들의 초상권과 더불어 촬영자들의 태도가 큰 영향을 줬다고 본다. 구조인력이 절실했던 상황에서 충분히 도울 수 있는 거리에 있었던 것으로 추정되는 촬영자들이 구조 대신 촬영을 선택했다는 사실이 보는 이들을 괴롭혔다.", "기자의 카메라는 공적 기능을 수행하고 있다는 이유만으로 '구경꾼'의 시선이라는 비난에서 간단히 자유로워질 수 있는 걸까? 기자들은 촬영자들이 직접 제보하지 않은 경우에도 영상을 다운로드하는 여러 기술을 활용하여 영상을 확보했다. 논란이 된 동영상들은 사고 초기에 여러 뉴스 채널을 통해 방송되었다. 영상에 대한 여론을 의식해 뒤늦게 사고 당시 영상들을 일제히 쓰지 않기로 한 국내 언론사들의 결정에 수긍하면서도, 일견 공범자가 손을 터는 듯한 위화감을 느꼈다. '아무것도 하지 않는 카메라'에 관한 오랜 공포가 있다. 찍고 있지만 상황을 냉담하게 기록할 뿐, 상황을 개선하지 않는 카메라. 이 공포는 카메라를 꺼내들어 남의 절박한 고통을 보고 듣고 기록하고 생중계하는 순간부터 시작돼 편집하고 재구성한 뒤 널리 퍼뜨린 이후까지 이어진다. 공포의 근원은 이걸 찍어서 보여준 뒤에도 내가, 이걸 본 뒤에도 우리가 아무것도 하지 않거나 못 할 수 있다는 데 있다.", "숨가쁜 추모와 기간을 정한 애도를 하며 '슬픔을 정치에 이용하지 말라'고 자못 엄숙한 목소리를 내는 이들이 있었다. 그러나 타인의 고통을 본 뒤 슬픔에만 머무르라고 강요하는 건 이상하다. 구경하는 눈이 되지 않기 위해서는 해야 할 일이 많으니까. 본 뒤에는 우리끼리 눈을 마주치고 우리가 어떻게, 어디로 가야 할지를 함께 고민하는 일이 남아있으니까. 어쩌면 이런 선언은 참사의 책임을 묻기 위해 정치가 가동되는 순간을 원천 봉쇄하는 커다란 부작용을 낳고 있지는 않을까? 하나의 고통이 사회적으로 알려져야 하는 이유는 다양하고, 슬픔은 많은 이유 중 하나이지 전부가 될 수 없다.", "대상화를 무조건 멈추라는 말은 함정이다. 타인에 대한 말하기가 멈출 수 있기 때문이다. 서로를 도울 기회를 알지 못한 채 지나칠 수 있기 때문이다. 나의 시선이 구경이 될 수 있다는 걱정에 빠져서 고통을 보는 일 자체를 멈춘다면, 그것은 또 다른 인간성 실패의 시작일 것이다. 우리의 눈은 움직일 수 있다. 자랑스럽지 않은 이유로 머물렀다고 하더라도 더 나은 곳으로 분명히 이동할 수 있다. 본 뒤에 무엇을 할 것인지가 더 중요하다. 전달과 전달, 중개와 중개를 통해 유예되어 버린 행동의 가능성이 당신에게 있으니까. 그러므로 구경으로 시작됐다고 하더라도 그 시선을 멈추지 말기를. 여력이 된다면 포기하지 말고 움직이기를. 행동이 절대선은 아니라는 것을 잊지 않기를. 시급한 진단의 효용과 오용을 잊지 않은 채 무엇을 해야 하는지를 사유하기를.", "때론 죄책감이라는 통증을 넘어서야 타인의 고통에 다가가는 길이 열린다는 걸 말하고 싶다. 나의 것이 아닌 고통을 보는 일에는 완벽함이 있을 수 없으므로. 우리가 서로의 부족함을, 미욱한 애씀의 흔적을 조금씩 용인하면서라도 움직이기를 바라기에.", "쉴 새 없이 이어지는, 때로는 과다하기까지 한 정보에 어떻게 반응해야 할지 머리가 멍해질 수도 있지만, 감정적이거나 지적인 공백을 걱정할 일은 없다. 반응과 분석과 해석 역시 실시간으로 공급되기 때문이다. 끊임없이 업로드되는 뉴스에 대해 제법 업데이트된 반응을 취하려고, 사이버불링으로부터 안전한 반응을 하려고, 적어도 동시대인으로서 사회적 기대치를 충족하고 싶다는 욕망에 휩싸인 채 스크롤을 내린다.", "사람들은 이제 보고 싶은 것을 본다. 바라는 것을 본다. 편향은 온라인에서 우리가 드러낸 자기 정체성과 취향의 결과물이다. 우리가 엉망이기에 우리의 소망 역시 엉망일 수 있다는 걸 잊고, 자신의 엉망이 반영된 볼거리를 편하게 즐길 수 있게 하는 기술이 완성형에 가까워졌다. 이런한 환경에서 사람들의 눈에 들고자 노력하는 뉴스 콘텐츠 역시, 저널리즘이 그다지도 피하고 싶어 했던 극단적 주관의 세계 안에서만 소비되고 있는지도 모르겠다. 많은 기자들이 이토록 양극화된 세계에서 저널리즘이 어떻게 기능해야 할지, 양극단에서 횡행하는 가짜뉴스를 어떻게 배격할지 오늘도 고민하고 토론하고 있다.", "대중은 벌을 주고 싶어 한다. 얼굴을 보고, 이름을 알고, 망신을 주고, 그에게 사회적 죽음을 선고하고 싶어한다. 얼굴과 이름을 광장에 매달아 놓는 방식으로라도 사법 테두리 밖에서 한 번 더 징벌하고 싶어 한다. 그러니가 얼굴을 '까는' 일은 단죄다. 대중은 앞으로 일어날 재판에서 정의가 이뤄질 것이라고 믿지 않는다. 그러기엔 좋지 못한 전례를 지나치게 많이 안다.", "흉악범의 얼굴이 공개되는 순간 관심은 한 명의 개인에게 쏠린다. 드물게 응집된 사회적 에너지가 이 사람이 누구이고, 어떻게 자라왔고, 어떤 학창 시절을 보냈으며, 평소에 어떤 행동을 했는지를 파해치는 데 소비되어 버린다.", "개인을 가리키는 손가락은 그 방향을 틀어야 한다. 범죄가 일어나도록 방조하는 사회 구조는 물론이거니와, 얼굴 공개라도 하지 않으면 충분하지 않다고 생각하게 하는 사법 시스템을 가리켜야 한다. 믿지 못하는 대중보다도 범죄의 무게에 걸맞지 않게 가벼운 처벌을 일삼는 사법부가 더 큰 문제여서다.", "날씨는 누구에게나 공평하게 가혹하고 무정해 보이지만, 실은 차별 없음과 거리가 멀다. 날씨가 몰고 오는 위험함과 불쾌함은 일정 부분 값비싼 주거 환경이나 적절한 냉난방 시설로 다스릴 수 있다. 그러니 날씨로 인해 가장 먼저 취약해지는 건 약자들이다. 가난한 사람, 아픈 사람, 그리고 노인. 실제로 그러한지에 대한 판단은 유보해야 하겠지만, 원론적으로 보자면 날씨 뉴스는 경제적 약자나 건강 약자를 배려하는 차원에서도 뉴스 가치를 더하게 된다.", "날씨 뉴스의 소재로 어떤 지역과 어떤 계층이 주로 등장하는지를 살펴보면, 언론이 누구의 안전을 신경 쓰는지, 누구를 볼거리로 삼는지를 알 수 있다.", "기후 위기 역시 '오늘의 날씨'라는 강력한 이미지에 밀려 도외시되고는 한다. 인류가 필수적으로 감지해야 하는 변화지만, 그 범위가 너무나 크고 넓은 나머지 기후는 오늘의 뉴스라는 근시안적 채집망에 붙잡히지 못하고 만다. 기획 뉴스가 아니고선 기후 위기가 뉴스가 되는 일은 드물다. 큰 재난이 닥치거나, 각국의 의사 결정권자들이 잔뜩 모이거나, 급진적 환경운동가들이 비명 지르듯이 카메라의 시선을 끄는 과격한 활동을 할 때 정도면 모를까.", "방글라데시는 아시아의 빈곤한 국가 중 하나다. 개발을 위해 앞장서서 탄소를 배출한 나라가 아니다. 기후 위기에 대비할 수 있을 만큼 충분히 제반시설을 갖추지 못한, 극도로 가난한 아시아의 개발도상국을 기후 위기의 샘플이자 해결책으로 소개하는 뉴스는 누구의 시선인가. 저 멀리서 일어나고 있는 일이니, 그들의 날씨가 우리의 날씨가 아니고 그들의 기후가 우리의 기후가 아니라며 무심히 지나치고 있지는 않은지. 오늘의 문제를 계속해서 이야기해야 하는 뉴스는, 그리하여 태생적으로 근시안이다. 뉴스는 인간이 만들어내는 것이라 인간을 닮았다. 보이는 걸 보이는 대로 보다가 자칫하면 주류의 시각을 답습한다.", "산업재해는 주로 인재다. 충분히 막을 수 있는 사고였지만 비용을 절감하기 위해 노동자들의 목숨을 담보로 잡고 안전 관리를 소홀하게 했다는, 뻔한 패턴이다. 직접 하기엔 험한 일이라며, 위험하다고 인지했기 때문에 하청 노동자에게 일을 넘기기도 한다. 일에 더해 위험성까지를 도매금으로 싸게 넘기는 것이다. 이럴 때 산업재해는 이미 입력되어 있는 설계 오류다. 그들이 최저가로 팔아 넘기는 위험에는 작게는 다칠 위험부터 크게는 죽을 위험까지가 뒤섞여 있다.", "문제는 산업재해라는 고통의 흔함이다. 흔한 고통은 문제가 아닌 문화가 되어 사회 안에 천연덕스럽게 한자리를 차지하고 앉는다. 통계는 이 기사 저 기사에 인용되며 산업재해가 얼마나 많이 일어나는지 보여주기도 하지만, 잘 정리된 숫자 속으로 진짜 이야기들을 빨아들여 감춰버리기도 한다. 산업재해가 흔하면 흔할수록 '끊이지 않는 산재' 같은 제목을 단 기사를 계속해서 만들기도 새삼스러워진다. 흔한 사고일수록, 어디서나 보이는 사고일수록 그 고통을 보는 일에 능숙해지고, 주기적으로 비슷한 소식을 들은 나머지 거의 아무것도 느낄 수 없는 상태가 되고 만다. 결국 시급하게 해결해야 할 사회문제가 '계속 일어나고 있기 때문에' 이야기되지 않는다는 패러독스에 빠진다.", "눈물을 흘리지 않고도 울 수 있다. 그걸 나는 어머니들에게서 봤다. 전두환의 연희동 자택 앞에서, 여의도 국회 앞에서 어머니들은 쓰러져서 운다. 악을 쓴다. 어머니라고 부르던 아이가 살아 있던 시간보다, 사라져 버린 뒤의 시간이 더 길어지고 있다. 그들은 1980년 5.18 민주화운동 당시 광주에 살고 있었고, 계엄군 공수부대의 집단 학살로 자녀를 잃었다. 어머니라는 이름을 잃고, 오월 어머니라는 이름을 대신 얻었다. 오월 어머니들은 어차피 늘 속으로 울고 있으니 별로 어려울 것도 없다는 듯, 울어준다. 보여준다. 카메라 앞에서.", "40년에 가까운 세월 동안 어머니들이 망연자실한 표정으로 오열할 때마다 카메라들은 반응하고, 바라보고, 찍고, 퍼뜨려 주었다. 카메라는 눈물을 흘리는 인간 앞으로 자주 끌려간다. 누군가 울어야만 진짜 고통의 증거로 인정받을 수 있다는 듯, 클로즈업해 촬영하고 집중적으로 편집하곤 한다. 결국 어떤 장면이 나가게 되는지 숱한 경험으로 알게 된 어머니들에게 울음은 단순 노동에 가까워 보였다. 관계자들이 어머니들을 시위에 모셔오고 카메라 앞에 드러내는 방식에 대해 이용한다면 냉소하는 사람도 있었지만, 정작 어머니들은 크게 개의치 않는 듯 보였다. 할 일을 하는 모습이었다. 수십 년간 희생자의 어머니로 살아오며 카메라 앞에서 자신에게 주어진 '역할'이 무엇인 줄, 기대치를 충족했을 때 카메라가 무엇을 약속해 주는 줄, 알고 있었다. 오래된 슬픔이 주목받기 위해 무엇을 해야 하는지 말이다. 새롭지 않은 고통은 다뤄지기 힘드니까. 뉴스는 슬픔에 약간의 시의성이라도 보태져야 그 굼뜬 몸을 빠르게 움직인다.", "어머니들은 40년 전에도, 지금도 울고 있는 모습으로 뉴스에 등장한다. 너무나도 전형적인 모습이지만, 그보다 전형적인 건 가해자의 행태이니, 적어도 피해자의 정형성을 견뎌야 할 책임이 언론에 있다고 믿기에 망설임 없이 그 모습을 포착하게 된다.", "보도란 '누군가의' 고통과 어려움에 대해 말하는 일이고, 그 하나하나의 고통 역시 누군가에게 속한 것이기에, 취재를 통해 고통에 침범하는 일은 결국 누군가의 삶에 침입하는 일이었다. 어떤 고통이 문제라고 말하는 건, 고통이지만 끝내 당신의 것인 무언가가 잘못됐다고 지적하는 일과 크게 다르지 않았다. 왜 이걸 취재하는지 잘 이야기하고 동의를 받은 것만으로는 다 무를 수 없는, 취지가 좋은 것만으로는 다 메울 수 없는, 취재 자체가 사람들에게 남기는 상처가 있었다.", "어떤 노동자들에게 보이는 곳에서 쉴 권리가 제대로 주어지지 않는 사회는, 그들의 휴식이 그다지 중요한 문제로 다뤄지지 않는 사회는, 그들이 쉬는 모습을 실은 보고 싶어 하지 않는 사회일지도 모르겠다는 걸 취재 끝 무렵에야 깨달은 것이다.", "쉬는 걸 보이지 않아야 쉴 수 있는 사람들이 있다. 고쳐져야 하는 건 보이는 인프라나 환경만이 아니라 이들을 어둑한 땅속으로 밀어넣고서 깐깐한 고용주라도 된 것처럼 노동과 쉼을 고작 자신의 눈에 띈 장면만으로 평가하는 무례함이다.", "이들이 겪는 '불우함', 그걸 견뎌낸 '근면함'과 '베푸는 마음'이 순차적으로 조명될 때, 이런 뉴스들은 누구를 향해 어떠한 메시지를 보내게 될까? 뉴스 매체에의 메시지 주입 능력을 과신하는 건 아니지만, 혹여 이런 뉴스가 약자들의 도덕성에 대한 기대치를 높이고 행동의 폭을 더 옭아매는 것은 아닐까? 희망의 증거로 함부로 소비되는 건 이들이 과연 동의한 역할과 노동인 걸까? 뉴스가 은근슬쩍 제시하는 '옳은' 삶의 방향 앞에 어쩌면 가장 여린 마음들, 자기를 검열할 필요가 없는 선한 이들이 먼저 반응하게 되는 건 아닐까? 그렇게 약자들의 선행과 관련된 뉴스는 계속해서 생산되고 소비되면서, 또다시 그들이 선하기까지 해야 하는 세상을 이끌어내는 데 일조하고 있는 건 아닐까? 만약 누군가가 안방에서 이 뉴스를 보고 부끄러움과 감동을 느낀다면, 그 감정은 어디에서 오는 걸까? 나보다 '더 못한' 사람도 누군가를 돕고 있다는 우월 의식이 깔린 반성인걸까? 뉴스는 약자를 슬쩍 도구로 삼아 섣부른 계몽을 하며 사람들의 삶에 개입하고자 하는 걸까?", "법치주의 사회에서 소수자가 범죄를 저질렀을 때 매번 연민의 렌즈만으로 사건을 볼 순 없을 것이다. 까딱하면 범죄자에게 서사를 부여한다는 대중의 비난에 부딪힐 수도 있다. 그러나 소수자를 둘러싼 상황의 특수성과 모순, 한계에 조금이라도 더 주의를 기울일 수는 있지 않을까. 한줌의 사람으로 그 집단을 대표하는 식의 기사를 쓰려면 적어도 어떠한 구조적인 맥락에서 왜 이런 일이 일어나고 있는지 더 큰 숲을 보려는 노력이 필요하다는 걸, 낯 뜨거운 실패에서 배웠다.", "나, 나의 가족, 나의 친구라는 테두리를 벗어나 우리의 우선순위를 생각하는 것. 알고리즘과 구독에 갇힌 나의 타임라인을 빠져나와 다른 삶의 존재를 알아채는 것. 나와 연관되지 않은 일 역시 중요할 수 있다는 사실을 인정하는 것.", "고통을 언제 보여줘야 하고 언제 보여주지 말아야 하는가? 우리는 어떤 고통에서 눈을 떼지 말아야 하고 응시를 참아내야 하는가? 고통을 얼마나 보여주고, 또 가려야 하는가? 보여주기의 윤리와 보여주지 않기의 윤리는 누구를 지키는 것이며 누구를 위한, 향한 것인가?", "한국 매체가 듣고 싶어 하는 것이 무엇인지를 알아챈 홍콩의 젊은 운동가들이 인터뷰를 할 때 영리하게 이런 발언을 집어넣은 것인지, 기자들이 질문으로 답을 유도한 것인지 다 헤아릴 수는 없었지만, 홍콩의 시위대가 한국의 민주화운동을 롤 모델로 삼고 있다는 식의 발언은 한국 매체에 자주 편집되어 등장하곤 했다. 내게는 이것이 우러러봄이나 칭찬이 아닌 호소로 들렸다. 해외 여론이 중요하다는 점을 잘 이해한 운동가들이 해외 미디어에 다뤄지기를 간절히 바라며, 너희에게도 비슷한 일이 있었던 걸 기억해서라도 홍콩과 함께해 달라는 외침으로 들렸다.", "일부 인터넷 커뮤니티의 '루저 문화'를 토대로 하여 터져나온 불안에 찬 목소리가, '이대남'이라는 가상의 주인공으로 만들어져 미디어와 정치권에서 그대로 옮겨지기 시작한 건 그들의 정치 성향이 청년들은 진보를 지지한다는 스테레오 타입을 붕괴시키면서부터다. 갑작스레 '이대남'은 마음을 얻고 귀를 기울어야 할 대상이 되었다. 그리고 남초 커뮤니티와 그들이 쓰는 언어에 대한 정성스러운 사회적 독해가 이루어졌다. 이러한 과정을 거쳐 재빨리 \"성별 갈등은 청년 세대 남성이 피해를 경험하는 것으로 재의미화\"되었는데 이는 \"남성이면 무조건 비하하고 모욕하는 여성이라는 악한 주체를 만들어냈기에 가능\"했다. 그러나 '나쁜 말'의 원래 주인이었던 자들이 누구인지는 쉽게 잊혔다.", "저항을 무효화하는 효과적인 방식은 억압된 자들이 들고 일어났을 때 저항이야말로 갈등의 범인이라고 지목하는 것이다. 이는 원인과 결과를 뒤집는 일이다. 왜 이런 일이 일어나고 있는지, 교묘하게 맥락을 지우는 일이다. 언론은 갈등 상황을 '화해'가 필요하고 '해결'되어야 하는 문제라며 부정적으로 묘사하는 경향이 있다. 이쪽도 힘들고 저쪽도 힘들다고 나열하며 사안의 무게를 재려하지 않고 등가로 기록하고 지나간다. 그러나 사회적 갈등의 효용은 매우 분명하다. 구조적인 오류를 수정하고 해결할 수 있는 기회다. 억압의 맥락을 자른 보도는 억압을 재생산하고 기존 질서를 공고하게 만드는 데 기여하곤 한다.", "우리에게 필요한 것은 맥락을 제거한 채 화해를 강요하는 일이 아니라, 지워진 맥락을 복구하는 작업이다. 또한 김지수 기자가 말했듯 \"갈등의 맥락을 재배치해 더 나은 언어를 설계\"하는 일이다. 갈등이 있다고 외치기보다는 무엇을 고민해야 하는지 정확하게 묻고 대화가 이루어질 수 있는 공론장을 만들어내는 일이다. '젠더 갈등'을 유일한 문제로 지목하지 않고, 현실에서 살아가는 청년들이 피부로 겪고 있는 진짜 문제가 지워지지 않도록 정확하게 말해야 한다. 그들의 문제를 그들의 목소리로 말할 수 있도록 자리를 내줘야 한다.", "뉴스는 숱한 고통 하나하나에 빛을 비춰주지만, 다음 소식을 바쁘게 생산해 예전 소식을 밀어내는 기능을 하기도 한다. 이쯤 되면 생산자에게나 소비자에게나, 최소한의 시간을 할애해 타인과 사회 정의를 신경 쓰고 있다는 만족감과 효능감을 주는 치밀한 알리바이, 또는 면죄부로써 뉴스가 존재하는 것은 아닐까 싶어 서글퍼진다.", "빨리 시선을 잡아채는 것이 반드시 변화를 약속해 주지 않는다는 사실을 학습한 지 오래이니, 오래 걸리더라도 있어야 할 것, 알아야 할 것, 알려야 할 것을 균형 있게 생산해 내는 매체로 머무는 건 어떤가.", "같은 이름의 다른 고통을 막기 위해 일어선 사람들에게 공동체가 함께해 줄 수 있는 것. '왜', '무엇을', '어떻게'와 같은 이야기의 구성성분을 완성하는 것. 즉 진상 규명과 책임자 처벌."]}, {"title": "고통에 관하여", "author": "정보라", "genre": "소설", "publisher": "다산책방", "passages": ["국제통증학회의 정의에 따르면 통증은 '조직 손상이 있거나 있었다고 생각되는 사건에 연관되어 나타나는 감각적 또는 정서적 불유쾌한 경험'으로 정의된다. 이러한 정의에서 알 수 있듯이 전통적으로 통증은 서양 의학의 관점에서 몸이라는 '기계'에 손상이 일어났음을 알려주는 일종의 신호로 이해되었다. 몸에 손상이 일어나면 우선 신경계에서 통증을 감지하여 뇌로 전달한다. 그러므로 통증을 없애기 위해서는 말단 감각체가 통증을 느끼지 못하게 하는 방법과 통증 신호가 뇌로 전달되지 못하게 막는 방법이 있다.", "NSTRA-14의 등장으로 인해 고통의 개념은 신체적인 감각에 중점을 둔 통증의 범위로 축소되었다. 사회적, 문화적, 철학적, 정신적 의미의 고통에 대한 질문은 점차 사라졌다. 고통은 의학적인 문제였고, 의학은 과학기술과 함께 발전하고 있으며, 그러므로 고통은 약을 먹거나 주사를 맞거나 다른 방식의 시술 혹은 치료를 통해 해결해야 하며 해결할 수 있는 문제였다. 고통은 견디는 것이 아니었다. 견딜 필요가 없기 때문이다. 고통을 견딘다는 것은 그 자체로 정신병의 징후로 의심되었다.", "그 삶이 고통이라도, 거기에 의미가 있고 목적이 있다면 사람은 어떻게든 견뎌낸다. 그리고 그러한 경험이 오래 지속되면 고통을 견뎌내는 것 자체가 삶의 의미가 된다. 삶의 의미를 고통에서 벗어나거나 더 건강하고 자학적이지 않은 방식으로 찾을 능력과 자원은 이미 고통을 견디는 데 소모되어 사라진다. 이것은 사이비종교와 불법 다단계 사업체 등으로 대표되는 착취적인 조직이 주로 사용하는 흔한 방식이다. 교단 또는 세력을 확장하고 신도를 붙잡아 두기 위해 같은 방식에 의존했다. 신도들은 고립되어 고통받았고, 고통을 견디는 과정에서 고립되었으며, 그 고통의 끝에 그들의 삶에는 교단 외에 아무것도 남지 않게 되었다.", "네가 고통을 느끼고 쾌락을 느끼는 이유는 몸을 가진 인간이기 때문이야. 네 몸이 고통의 근원이자 쾌락의 근원이고, 모든 인지와 정서와 감각의 근원이야.", "인간은 자신의 존재를 스스로 잘 이해하지 못하는 것 같다고 엽은 생각했다. 잘 이해하지 못할 뿐 아니라, 혹은 잘 이해하지 못하기 때문에 , 인간은 스스로 자신의 존재를 그다지 능숙하게 감당하지 못했다.", "인간은 자신의 신체를, 신체의 감각과 기능을 타인과 공유할 수 없다. 그 어떤 환희나 쾌락도 오로지 감각하는 사람 자신만의 것이며 고통과 괴로움도 마찬가지다. 자신의 육체가 경험하는 감각과 사고를 언어 혹은 다른 방식으로 타인에게 전달할 수는 있으니 인간은 오랫동안 그렇게 전달하고 소통하고 공유하려 애썼으나 그 어떤 표현의 방식도 결국은 불충분하다. 완전한 의사소통의 방식이란 존재하지 않는다. 인간은 태어난 순간부터 죽는 순간까지 자신의 신체 안에 고립되어 있기 때문이다.", "\"젋은 여자 두 명이라고 얕본 게 아닐까요\" 경의 변호사가 지나가는 말처럼 중얼거렸다. 경은 자 가 넘치는 세상에서 없는 사람들의 이야기를 기록하고 싶다고 했다.", "\"만약 이 책의 어느 구절에서 멈추고 밑줄을 긋게 된다면, 바로 거기에서부터 또 자신의 이야기를 써 가면 좋겠다. 누군가와 함께, 누군가를 위해.\" 글을 잘 쓰고 싶은 마음이야 원래 있었지만, \"누군가와 함께, 누군가를 위해\"라는 문구를 보고 잠시 방학이었던 글 수업을 다시 시작하고 싶어졌다. 함께 살고 싶어서, 함께 쓰고 싶다.", "가끔 SNS로 소식을 엿보면 은은 여전히 타자를 돌보는 글을 쓴다. 더위나 추위에 상관없이 집회에 나가고, 유기견 센터에도 정기적으로 봉사 활동을 나간다. 항상 소외된 곳을 향하는 은은 '나'의 구렁텅이에 빠질 일이 분명 적을 거다. 은은 관계를 직시하는 사람이니까. 은처럼 나도 이미 촘촘한 관계망 안에 존재하지만, 은은 그 사실을 잊지 않는 사람이고 나는 그 사실을 자주 잊어버리곤 하는 사람이다. 그게 은과 나의 차이일 거다. 은의 말처럼 질문을 바꾸는 일은 내 세계를 바꾸는 일이다. '나'에서 '관계'로 시선을 확장하는 일. 아니, 이미 이어진 관계를 제대로 보는 일.", "'우리는 글 한 편을 읽었을 뿐이지, 그에 대해 아는 것이 없어요. 이 글 역시 선택한 단어와 문장으로 선택한 이야기를 들려주는 거예요. 그러니까 글 한편으로 그 사람을 다 아는 것 같은 기분을 경계해야 해요.' 합평은 글을 다듬는 시간이기도 하지만, 성급한 판단 회로를 벗어나는 시간이기도 하다."]}, {"title": "궁금한 건 당신", "author": "정성은", "genre": "에세이, 인터뷰", "publisher": "안온북스", "passages": ["사랑이 이루어지지 않은 건 참 좋은 일 같다. 덕분에 많은 글을 썼다. 연인이 있었더라면 그 사람 귓가에 속삭이느라 다 날아갔을 텐데. \"무슨 생각을 하고 계신가요?\" 물어봐주는 건 페이스북뿐이어서 부끄러운 줄도 모르고 거기에 속마음을 드러내던 어느 날. 한 통의 전화를 받았다. \"혹시 신문에 글 한번 써볼래요?\" 나의 이야기에 가끔 '좋아요'를 눌러주던 기자님이었다.", "한때는 이야기를 지어내는 사람이 되고 싶었다. 하지만 집 밖을 나가니 사람들이 주옥같은 말을 하고 있었다. 그것들을 받아적으며 세상이 더욱 궁금해졌다. 사랑하지 않으면, 궁금한 일조차 없을지 모른다. 이 책이 사랑이 이루어지는 공간이길 바란다. 그럴수록 우리는 서로를 더욱 궁금해할 테니.", "그는 공부를 못 했다고 했다. 이런 질문은 좀 이상하지만, 공부를 못 하면 어떤 기분이냐고 물었다. 나도 잘한 건 아니지만 어떻게든 서울에 이름 있는 대학에 들어가려고 삼수나 했으니까. 학벌 사회의 혜택을 받고 싶었다.", "운수업이 운송한다고 운수업이 아니에요. 운이 좋아야 운수업이거든요. 누가 불러줘야 하고, 만약 용산까지 차로 이동했으면, 용산에서 다시 일이 잡혀야 돈을 벌죠. 그렇게 계속 운에 맡기려니 무기력한 기분이 들었어요.", "스물여섯 살 때부터 선을 봤다. 엄마의 소원은 나의 결혼이었다. 내 의사는 묻지도 않고 결혼정보회사에 등록하고 온 날, 황당했지만 끝내 환불하지는 못했다. 자신이 생각하는 가장 좋은 것을 선물하려는 부모의 선의를 거절할 수 없었다. 시간이 흘러 서른세 살이 되었다. 요즘은 효도하는 셈치고 나간다. 대신 장소는 내가 정한다. \"우리 샐러드바에서 만날까요?\" 이왕 시간 보내는 거 건강한 거라도 먹자 싶어서.", "어떤 면에선 부러워요. 뭐가요? 정신없을 정도로 할 무언가가 있다는 것요. 너무 많은 자유가 주어지면, 뭘 할지 몰라 무력해질 때가 많다. 열심히 하지 않는 자신에 대한 수치심도 생긴다. 어쩌면 정신없이 굴러가는 수레바퀴 같은 삶이 더 건강한 게 아닐까.", "사람이 뭔가를 하는 게 왜 중요하냐면요. 그걸 보고 사람들이 와서 계속 새로운 걸 던져주기 때문이에요. 저한테도 그래요. 이거 해보라고, 저거 해보라고. 만약 제가 아무것도 안 하고 방에만 있으면 누가 나한테 와서 그러겠어요. 내 어디를 믿고. 뭔가를 지속적으로 잘해오다가도, 그걸 잠시 손에서 놓다 보면 금세 자신이 사라진다. 일을 그만두고 여행을 하면서 얻은 것도 많지만 잃은 것도 많다. 그것에 겁이 났는데, 사장님 말을 들으며, 일단 가게 문을 열어놓는 것의 중요성에 대해 생각했다. 그 문을 잠시 닫는다고 해도, 그때 그걸 했던 나는 사라지지 않는다는 것도.", "떡볶이를 만들어드렸다. 부부는 당황해하며 \"뭐 이런 걸 다\" 했지만. 어쩔 수 없이 입꼬리가 올라갔다. 같이 떡볶이를 먹으며 이런저런 얘기를 했다. 남편이 도통 돈을 벌어오지 않아 아내가 경제활동을 오래 했다고 한다. 어린이집 교사, 사회복지사, 목욕탕 청소, 홀서빙, 식당 주방 모두 처음하는 일이라 잘리는 게 다반사였다. 아주머니는 말했다. 나는 열심히 한다고 하지만 그분들 보기에 마음에 안드는 부분이 있을 거 아녜요. 그럼 바로 잘라. 내일부터 오지 말라고. 그럼 눈물 흘리며 또 다른 데 가는 거야. 애들은 키워야 하는데 남편은 일을 안 하지. 너무 힘들었어요.", "제가 자존감이 높다 했잖아요. 그래서인지 사람에게 별로 서운한 게 없어요. 누가 저에게 불친절하게 대해도 오늘 저 사람 힘든가 보다, 하고 넘겨요. 어떻게 보면 합리화를 잘하는 건데, 괜히 상처받고 스트레스받고 그러면 제가 2차 피해를 받는 거잖아요. 그게 너무 싫거든요.", "약속 당일, 대학생 네 명이 몰려와 이것저것 물었다. 10년 전 영화를 찍을 땐 어떤 마음이었는지, 왜 영화감독이 되고 싶었고, 어쩌다 포기하게 되었는지. 당시 나는 동아리에서 꽤 기대주였던 걸로 기억하는데 왜 포기했는지는 생각이 잘 안 났다. 그래서 대충 떠오르는 대로 말했다. 이야기를 지어내는 것이 어려웠고, 연출보다 편집하는 걸 좋아했는데, 그렇다고 편집 감독이 되자니 폼이 안 났다고. 그렇게 영화감독을 꿈꾸다 가난이 걱정돼 PD로 진로를 바꿨다가 시험에 여러 차례 떨어져 프리랜서 영상 제작자로 활동하다가 그것도 때려치우고 글쓰며 스탠드업 코미디판에 기웃거리는 내 이야기를 하는데 허탈함이 밀려 왔다. \"뭔가 미꾸라지처럼 계속 빠져나가는 인생 같네요\" 인터뷰 후 기진맥진해 있는데 동아리 후배가 다가와 말했다. 빠져나가는 게 아니라 하고 싶은 걸 좁혀나가고 있는 것 같다고. 그 말 덕분에 그 친구와 더 이야기할 체력이 생겼다. 무슨 대답을 듣고 싶어 이런 기획을 했냐 물으니 자신도 영화감독이 되고 싶은데 막막해서 그랬단다.", "누가 어떻게 그 분야에서 잘 되었는가에 대한 기록과 주목은 많지만, 포기의 역사를 담는 내용은 별로 없잖아요. 그걸 꺼내기 힘든 사람도 많을 거고. 그래서 그 이야기를 들어보자, 하는 게 기획 취지였는데 인터뷰를 하면서 느낀 게 많아요.", "어떠한 단계에 불과한 느낌을 받았어요. 사실 인터뷰하기 전엔 포기의 과정을 통해 생긴 모종의 결핍이 다들 있을거란 전제하에 질문을 짰거든요. 영화를 못 찍어서 생기는 패배감이나 결핍을 계속 가지고 있을 거다? 그런데 아니었어요. 다들 너무 잘 살기도 하고. 영화를 안 하겠다 마음먹은 것 자체가 자신을 찾는 일 중 하나였던 거예요. 그걸 해야겠다 결심한 것도 과거의 나지만 그걸 지속했을 때 행복한가? 의심하고 결국은 더 맞는 걸 찾는 것도 나였던 셈이죠.", "우린 늘 이야기에 매혹되잖아요. 그래서 소설을 읽고, 영화를 보죠. 저도 완전히 정리된 생각은 아닌데요. 누군가가 자기 이야기를 하잖아요. 그럼 누군가는 그걸 듣잖아요. 그게 쌓이면 그 사람에 대해 우린 알게 되죠. 반면 입을 다물어버리면 내 이야기는 세상에 없잖아요. 사람들이 듣고 싶어 하는 이야기를 하면 더 좋겠지만, 꼭 그렇지 않더라도 이야기를 하는 사람은 결국 그 이야기를 들어줄 사람을 찾을 테고, 이야기를 들어줄 사람이 생기기 때문에 그 이야기를 계속할 힘을 얻고, 그래서 이야기가 이어질 수 있다고 생각해요.", "세상 사람들이 말하는 섹시의 끝까지 가면 나는 무슨 모습이 될까 궁금해지더라고요. 섹시한 할머니라는 것도 결국 라이프스타일에 대한 이야기예요. 몸만이 아니라 정신도 섹시해지고 싶고. 보디 프로필 찍는 것처럼 단기간에 그냥 운동하고 끝나는 게 아니라, 계속 운동하고 계속 배우고 계속 받아들이고 이렇게 살아가는 게 저의 비전이거든요.", "\"아이를 키우는 데 시간과 정신의 소모가 너무 큰 것 같아.\" 오랜만에 만난 동아리 선배는 말했다. \"이미 낳았으니 어쩔 수 없어요.\" 미혼인 나는 그걸 조언이랍시고 했다.", "사람에게 기대를 잘 안 해. 나에게도 기대 안 했으면 해서. 나는 누가 좋다가도, 어디 한 부분이 마음에 안 들면 떠나버리는 사람이거든. 그래서 민준에게도 큰 기대를 안 했던 것 같아. 무언가에 매여 있는 것보다 항상 가볍고 싶었으니까. 그런데 민준이는 나를 있는 그대로 봐줬어. 어떻게 그게 가능했는지 모르겠는데 그러니까 대단하다는 말이야. 나의 무엇을 보고 그런 사랑을 주는지 잘 모르겠어. 원래 사랑받으면 잘 몰라. 의도한 게 아니니까.", "보통 자의식 과잉이라고 하잖아요. 저는 그 상태가 불편해요. 제가 다른 사람을 사랑하는 데 방해가 돼요. 실제로 현대인이 겪는 정신적 문제의 일부는 내가 나에 대한 생각을 너무 많이 해서 나타나는 거라고 생각해요.", "글도 그래서 써요. 내가 아무것도 아닌 존재가 되는 게 좋아서. 글쓰기는 내가 나로부터 떨어질 수 있게 도와주거든요. 나를 무섭게 하는 문제들도 글로 쓰면 안 무서워져요. 내 문제가 너무 커 보여도 그걸 글로 쓰면 다룰 만한 문제가 돼요.", "지난 연애에서 제가 마음고생을 많이 했거든요. 충분히 사랑받지 못하고 있다는 느낌 때문에. 그걸 내가 요구하면 안 된다고 느꼈어요. 그런데 '윤리적 잡년'이라는 책을 보니, 얼마든지 요구할 수 있다는 거예요. 내가 원하는 종류의 방향과 관심, 나를 더 보살피고 사랑해달라는 요구는 얼마든지 할 수 있다고. 서로가 편안한 방식으로 충분히 연결되어 있고 사랑받고 있다는 느낌을 주는 것이 연인 사이에 너무나 중요하다는 얘기를 하더라고요.", "그건 너만의 문제가 아니야. 우리는 대체로 자기가 살아온 방식대로 생각하니까. 나도 그래. 상대의 말을 확대해석하고, 혼자 서운해서 마음속으로 멀어진 사람들 너무 많아. 모두가 나의 애인이 아니니까, 마음속에 있는 걸 말할 용기도, 힘도 없어서 멀어지지. 그런데 사랑하는 사이면 '그냥 내가 더 사랑해줄게' 하고 안아주면 그걸로 소통이 되는 거 아니야?", "저는 현재만 생각하는 게 좋은 삶이란 생각을 해요. 미래에 대한 불안이나 과거에 대한 미련 없이. 특히 운동하는 순간만은 그럴 수 있는 것 같아요. 몸을 움직이니까 어쩔 수 없이 현재에만 몰입하게 되죠. 설령 추상적이고 쓸모없는 상념에 젖더라도 지나칠 수 있죠. 몰입 상태에 있는 삶의 한 단면을 운동으로 경험할 수 있어 좋아요. 하루 24시간 운동하는 순간처럼 채울 수 있다면, 얼마나 풍요롭겠어요. 좋은 사랑은 운동을 하는 마음 자세로 하는 게 아닐까 싶어요. 사랑 때문에 괴로워하고 짓눌리는 이유가 현재에 몰입하지 못하기 때문이잖아요. 저는 어릴 때 사랑이 영원할 수 있을까? 이 좋은 순간이 끝났을 때 나는 얼마나 큰 상실감을 느낄까? 상상하며 사랑 속에 있으면서도 미래에 대한 불안 때문에 그 사랑을 밀어냈었어요. 이건 곧 사라질 거니까 여기에 나를 너무 내주지 마. 그렇게 마음이 늘 미래나 과거에 있어서 괴로웠는데, 그렇게 안 하고 달리기하는 산뜻한 마음으로, 아 지금 너무 좋다. 보고 싶다. 저 사람 이해하고 싶다. 이런 마음들에 집중하면 좋을 것 같아요.", "낯선 사람에게 말 거는 방법을 가르쳐준 엄마에게도 감사하다. 엄마는 길 가는 처자를 붙잡고 \"쓰고 계신 안경이 참 멋진데 어디서 사셨어요?\" 물은 뒤 브랜드명을 적어 와 같은 걸 사는 사람이다. 상대가 들었을 때 기분 좋은 말이면 처음 보는 사람에게 해도 된다는 걸 그녀에게서 배운 후로 나는 좋은 얘기는 꼭 해주는 사람이 되었다. 덕분에 이런 책도 쓰게 되었다."]}, {"title": "귀하의 노고에 감사드립니다", "author": "황여정, 최영, 지영, 주원규, 정진영, 장강명, 임성순, 이서수, 염기원, 서유미, 김의경", "genre": "소설", "publisher": "문학동네", "passages": ["작가분들께 미리 말씀드린 문제의식과 규칙은 있다. 문제의식은 '평범함 사람들이 먹고사는 문제를 사실적으로 그리는 한국소설이 드물다. 우리 시대 노동 현장을 담은 작품이 더 나와야 한다'는 것이었다.", "지금 새로운 재난이 오고 있다는 느낌을 받는다. 그게 뭔지, 거기에 어떤 이름이 붙을지는 잘 모르겠다. 중산층이 무너지고 있다. 몇몇 천재들의 창의적인 아이디어나 부동산에 매겨지는 가격은 가파르게 상승하는데 성실한 노동의 가치는 추락한다. 플랫폼과 인공지능이 노동시장을 흔든다. 일에서 의미나 보람을 찾는다는 사람은 드물다. 이런 현상들을 '자본가 대 노동계급'이라는 과거의 틀로 파악하고 대처할 수는 없다는 게 내 생각이다. 나는 저 현상들의 한가운데 있으며 그 현상들을 제대로 이해하지 못한다. 원인도 모르고 대책도 모른다. 그러나 그것이 고통스럽다는 사실을 알고, 그 고통에 대해서는 쓸 수 있다. 후대 작가들은 알 수 없는 것, 동시대 작가의 눈에만 보이는 것도 있다. 스타인벡도 통화 긴축이 대공황을 불러왔다거나 재정지출 정책을 펼쳐야 한다는 얘기를 소설에 쓴 것은 아니었다. 이런 마음으로 기획안을 쓰고 작가들을 모았다.", "\"이러다가 정말 사라지는 거 아니야?\" 씻고 씻고 또 씻고. 소독하고 소독하고 또 소독하고. 더러운 것이 전부 빠져나가면 언젠가 몸이 먼지가 되어버릴 것 같았다. 따지고 보면 몸에 더럽지 않은 부분이 있던가. 머리카락이 빠지고 손발톱이 뽑혀나가고 내장기관마저 빠져나가면 껌데기만 남은 몸은 주저앉아 평평해진 다음 썩어서 흙이 되겠지. 나는 그런 상상을 하며 손을 건조기로 말린 뒤 소독기에 집어넣었다. 드디어 들어가라는 반장의 지시가 떨어졌다. 비로소 삼각김밥을 만들 준비가 완료된 것이다.", "\"여기 있으니까 마음이 편해. 저 안으로 들어가고 싶어.\" \"어디? 무쇠 밥솥 안으로?\" \"응. 쌀 한 톨이 돼서 밥으로 태어나고 싶어.\" 농담이라기엔 표정이 진지했다. \"뭔가 쓸모 있는 사람이 되고 싶어.\"", "수업을 하러 학생들의 집으로 이동하면서 경진은 평일 낮에 거리를 걷는 사람들이 다 자유로운 게 아니라는 걸 알게 되었다. 세상에는 많은 직업과 다양한 형태의 노동이 있고 이름만 들었을 때는 짐작하기 어려운 고충이 존재했다. 학습지 교사도 그런 일 중 하나였다. 어떤 일인지 대충 알고 있다고 생각했지만 교육을 받고 직접 수업을 하는 동안 이 직업에 대해 잘 모르고 오해하고 있었다는 걸 깨달았다.", "그만두겠다고 말한 뒤에야 경진은 차분히 자신이 했던 일을 돌아보았다. 잘 모르고 가본 적이 없는 동네를 걸어다니며 학생들의 집을 방문했고 수업시간을 맞추기 위해 빠르게 걷거나 뛰었다. 교육에 대해 잘 모르면서 한글이나 수학을 가르쳤고 학습에 대한 상담도 했다. 새로운 수업을 권유했고 수업을 그만두겠다는, 돈이 아깝다는 얘기도 들었다. 선생님이지만 집까지 학습지를 배달하는 사람이었고 영업을 못해서 수업이 줄어들면 눈치가 보이고 월급이 줄었다. 보람과 모욕이 하나의 그릇 안에서 녹아내렸다.", "\"원래 대다수의 부하 직원은 상사한테 갖는 감정이 하나로 귀결돼. 경멸.\"", "누구는 값싼 단가에는 저렴한 품질로 대응한다고, 콩 심은 데 팥이 날 순 없다고 강변했지만 결국 자기 작품, 자기 농사라 생각하면 콩값을 받고도 팥을 심어야 했다.", "\"혁수한테 들었는데, 물이 예전에 그런 말 했었대요. 선생님을 보면 이상하게 안타깝다고. 진짜 하고 싶은 말은 한 번도 못 해본 사람 같다고요. 그런 사람들은 어떤 독한 감정이, 그러니까 경멸이나 환멸 같은 거요. 그런 게 솟구칠 때 꼭 딴소리를 한대요. 뭐랬더라, 객관적으로 바른 말 같은 거랬나? 절대 틀릴 수 없는 말 같은 거요. 말이 여러 번 옮겨지느라 표현이 달라졌을 수 있는데 아무튼 그랬대요.\""]}, {"title": "그러나 누군가는 더 검은 밤을 원한다", "author": "우다영", "genre": "소설", "publisher": "문학과지성사", "passages": ["어느 날 우리가 장을 본 음식들을 품에 안고 버스에 앉았을 때, 오메가는 단일 작물 재배의 기괴함에 대해 들려주었다. 한 가지 식물 종을 밀집된 땅에서 기르는 것은 가축 농장처럼 인류가 만들어낸 인위적인 상태이며, 이 과정에서 잡초와 해충으로 간주되는 수많은 동식물이 마땅한 이유도 없이 살처분당한다고 성토했다. \"하지만 해충이 식량을 훼손하니까 어쩔 수 없는 일이잖아.\" 내가 말하자 오메가는 단호히 고개를 저었다. \"원시 농업시대에 곤충은 농부들에게 별로 고민거리가 아니었어. 곤충으로 인한 문제가 심각해진 건 종의 분포를 단순화하는 대규모 농업 때부터지. 이때 특정 곤충의 개체 수가 폭발적으로 증가할 수 있는 환경이 조성된 거야. 우리가 그 종을 문젯거리로 만들어놓고 또 죽이려고 애쓰고 있는 거지\" 또한 오메가는 이처럼 한 가지 작물이 오랜 기간 머문 땅은 황폐해지기 마련이고 결국 휴경을 해야 하거나 영영 씨앗을 싹 튀울 수 없는 모래밭이 되어버린다고 지적했다. 또한 큰 태풍이 덮치면 여러 종의 나무와 잡초와 뿌리식물이 골고루 얽혀 있는 자연 생태계의 땅과 다르게 단일 작물 경작지는 힘없이 쓸려 나가버린다고도 말했다. \"주변과 스스로를 모두 지킬 수 없는 상태가 되는 거야. 그러니까, 언제나 단순화가 문제인 거지.\"", "나는 언제나 영혼의 본질을 정보라고 보았다. 그 사람이 인지하고 기억하는 정보가 곧 그 사람을 이루는 모든 것이며 죽은 뒤에도 사라지지 않고 남아 재생될 수 있는 가장 원초적인 정보의 형태가 영혼이라고 생각했다.", "\"영국인 각성자의 영혼에 한 사람이 인류의 역사 동안 다 살 수 없는 수많은 생이 존재한다면, 그건 그 영혼이 살지 않은 생을 만들어냈다는 뜻일 거야.\" \"흥미롭다. 그래서?\" \"문제는 어떻게 생을 만들어내느냐인데, 나는 왠지 이 식물에 해답이 있을 것 같아.\" 나는 그렇게 말하며 아침에 읽었던 아즈깔에 대한 기사를 태블릿으로 열었다. 같은 종끼리 같은 정보를 동시에 공유하는 식물. \"이 기사가 사실이라면 아즈깔은 인간의 집단 무의식이 가진 원형이나 상징 따위와는 비교도 할 수 없을 만큼 정확하고 구체적인 정보를 공유하고 있어. 인간의 무의식 수준을 가볍게 뛰어넘어 서로가 긴밀하게 연결돼 있지. 나는 그 식물이 인간보다 많은 세대를 거듭한 역사를 가지고 있고, 그래서 더 많은 정보를 획득했기 때문에 직감에서 한발 더 진화한 결론에 도달할 수 있었다는 가설을 세워봤어. 그러니까 여기서의 핵심도 정보야. 귀납적 정보의 축적은 패턴을 만들어. 당연하게도 더 많은 정보가 더 구체적인 패턴을 만들고. 다수의 반복이 다각형을 거의 원으로 만드는 것처럼. 과거의 생을 모두 기억한다면, 그리고 그 정보들을 충분히 패턴화할 수 있는 수준에 이른다면, 우리는 과거의 패턴뿐 아니라 미래의 패턴도 알 수 있어. 물론 직감보다 훌륭한 수준으로. 마치 기억과 같은 형태로 말이야. 기억한다는 것과 알게 된다는 것은 사실 다르지 않으니까. 그건 곧 영혼의 일부가 된다는 거야. 안다는 건 기억이고 기억이 우리를 구성하니까.\"", "곤은 식물이 왜 선량해지는가에 의문을 품었고 그것이 자신과 타자의 경계가 허물어졌기 때문이라고 생각했다. 즉 식물은 자신과 다른 개체, 나아가 자신과 전부를 하나로 생각하기 때문에 양분과 물을 양보하고 위험을 알리는 것이라고, 이것은 마치 이타적인 마음과 같지 않느냐고 내게 물었다. 나는 곤의 관점 덕분에 각성자들이 가진 공감 능력에 대해 좀더 상상할 수 있게 되었다. 생과 인연이 반복된 영혼들은 상대를 사랑하고 증오하며 서로에 대해 수없이 생각한다. 서로를 알게 된다. 서로의 기억과 마음이 뒤섞인다. 때로는 가해자가 되고 때로는 피해자가 되며 인과 역시 뒤섞인다. 이것은 나와 너가 겹쳐진다는 의미이다. 감정이 출발하고 도착하는 너와 나의 거리가 사라지기 때문에 사랑과 증오는 희미해진다. 그리하여 마침내 고도의 이타적인 마음이 된다.", "언젠가 우리가 마침내 하나가 되어버리면 무슨 일이 일어날까? 그렇게 된다면 아무 일도 안 일어나지 않을까? 사랑도 증오도 없고 차이도 선택도 없는 상태에서 모든 것이 멈추는 거야. 그건 너무 끔찍한데. 나는 얼굴을 찌푸리면서도 영혼의 끝이 정말 그러하리라고 생각했다. 나와 너를 구분할 수 없게 된 영혼은 아무런 관계도 맺지 못하고 생에는 아무런 인과도 생기지 않는다. 영혼의 기억으로 만들어진 세상이 멈추고 모든 것이 고요 속으로 사라진다. 마치 별이 붕괴할 때처럼. 별의 무수한 잔해가 엄청난 밀도의 블랙홀이 되어 줄어들고 줄어들다가 마침내 시공간이 사라진 한 점으로 소멸해버리는 것처럼 말이야. 우리가 가진 기억과 특별함과 아름다움이 다 사라지고 아무것도 남지 않은 텅 빈 우주가 되는 거야. 어쩌면 우리는 그 사라짐의 순간에 다가가기 위해 살고 있는지도 몰라. 사람들과 관계를 맺을수록, 사람들과 사랑을 할수록, 우리는 더 빨리 정지하겠지.", "그렇습니다. 예지는 미래가 존재함으로써 존재합니다. 여러 전제 조건이 필요한 예측과는 전혀 다른 개념이죠. 예지는 선험적 직관으로서 미래와 얽힌 상태로 존재합니다. 미래와 다르다면 그것은 예지로서 성립되지 않습니다. 그러므로 예지는 그 존재 자체로 미래가 이미 존재한다는 사실을 증명할 수 있습니다. 우리 연구의 최종 목적은 예지자들의 능력을 빅 데이터로 모아 예지 인공지능을 만드는 것입니다. <볼볼볼>은 그 표준집단을 선별하기 위해 만든 게임이죠.", "정말 사흘째 되었을 때 변화가 생겼다. 효주는 더 이상 눈 앞에 놓인 갈라진 길의 양쪽을 쳐다보지 않았고, 저곳에 길이라는 개념의 공간이 있다는 것도 떠올리지 않았으며, 자신이 지금 이곳에 있다는 사실도 잊어버렸다. 얼마 후에 예지자들과 이야기를 나누다가 알게 되었지만, 바로 그것이 예지에 임하는 기본 태도였다. 선형적인 인과의 조건들을 모두 잊는 것. 예지는 정답인 길을 알아맞혀 지나가는 것이 아니라, 다음 길 위에 있는 자신의 위치와 상태를 보는 것이다. 그것은 눈앞에 존재하지 않고, 머릿속이나 마음속에도 존재하지 않으며, 다만 미래에 존재한다. 효주는 이미 존재하는 것을 그저 보는 방법을 어렴풋이 터득했다. 물론 본다는 것은 은유적인 표현이었다. 효주가 느끼기에 미래는 보이지 않았고, 안 보이지도 않았다. 마치 잠을 자려고 누워서 생각을 하고 있다는 생각을 떨쳐버리려고 애쓰지만 끝내 떨칠 수 없는 느낌과 비슷했다. 시야의 가장자리에 무언가가 붙어 있는데, 그 무언가가 있다는 것을 알 뿐 도무지 그것을 정확히 볼 수 없는 처지와 같았다. 그러나 효주는 미래가 존재한다는 느낌을 분명하게 알게 되었다.", "미래가 정말 중력과 같은 힘으로 예지를 끌어당긴다면, 더 강한 중력을 가진 미래는 더 강하게 예지를 끌어당길 겁니다. 즉, 미래에 더 강한 힘을 가진 사건이 존재할 때, 그 특정 사건을 적중하기 위해 쏘아진 화살처럼 뻗어나가는 예지력은 그와 비례하게 상승한다는 겁니다. 만약 블랙홀처럼 강력한 미래가 우리 앞에 있다면, 그게 정말 세상의 종말이라면 예지자들이 넘쳐나는 현상이 설명되겠죠.", "평소에도 기도를 하십니까? 아니요. 그건 어려운 일 같아요. 무엇이 어렵다는 거죠? 우리가 지금 이 순간 무엇을 원해야 하는지 정확히 아는 것은 이미 신의 은총이 아닐까요?", "신인류는 액체 요람 속에서 잉태되어 태아기를 보낸 뒤 출생 시기가 되면 성숙해진 뇌의 피질전도 신호를 매기에 연결시키지요. 더 이상 거친 세계와 폭력적으로 맞닥뜨리는 출산을 경험하지 않고, 모든 감각이 아득한 꿈결처럼 저자극으로 수용되는 양수 속에서 정신을 부드럽게 육체 밖으로 전도시키는 겁니다. 인류는 평생 신체적 고통과 질병에서 해방되어 오직 정신의 확장과 창작의 발전에 전념할 수 있는 문명 단계에 이른 것이지요.", "오, 혜경. 승용이 '말'을 하는 모습을 처음 본 제 기분을 과연 당신이 짐작하실 수 있을까요? 말 말이라니요! 그렇습니다. 분명 세상에는 화자와 청자가 의사를 주고받는 말이라는 것이 존재했습니다. 말이 가진 의미뿐만 아니라 기분, 기운, 믿음, 예감, 희망, 절망, 치유와 폭력까지 내포하고 그것들을 때로는 제대로, 대개는 엉터리로 옮기는 말 말입니다. 당신과 마찬가지로 저 또한 이미 수많은 영
