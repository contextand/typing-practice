 아무것도 기억에 남겨두지 않았고 하루는 그날의 수면으로 끝을 냈다. 그것이 d의 일상이고 패턴이 되었다.", "d가 매일 가는 곳. 아는 곳. 알고 있는 얼굴과 목소리들이 있는, 그중의 누군가가 불시에 등을 꾹 찌르며 나를 알지 않느냐고 물으면 내가 어떻게 너를 아느냐고 반문할 수는 없는 사람들이 있는, 낡고 지저분하고 기묘하고 수많은 그곳들.", "서수경이 달리면 선생들과 다른 종목의 선수들이 그것을 보러 모였다. 언젠가 나는 군중 속에서 서수경이 달리는 모습엔 무언가가 있다고 누군가 말하는 것을 들은 적이 있는데 그 모습엔 무언가가 있다기보다는 무언가가 없다고 하는 편이 더 정확했다. 달릴 때 서수경은 그저 달렸다. 욕심이나 걱정 없이, 바로 옆 트랙에서 출발한 경쟁자나 골라인이나 기록에 대한 관심 없이, 불필요한 움직임이나 괜한 버릇도 없이 꼭 필요한 동작만으로 서수경은 달렸고 그 모습엔 훗날 내가 생떽쥐베리의 책에서 읽은 문장들이 말하는 바와 같이, 기둥이나 배의 밑바닥, 비행기 동체의 곡선을 묘사하며 그가 말한 바와 같이, \"덧붙일 것이 없\"는 것이 아니고 \"빼내야 할 것이 아무것도 없\"었다.", "처음에 서수경에게 연락을 하면서, 그리고 그 이전부터 내가 생각하기로 서수경의 이미지는 좀 불친절하다 싶을 단답으로 대화를 하거나 만사에 초월적인 태도를 지녔을 것 같은 사람이었는데, 예상 외로 서수경은 성실한 수신자였고 답신자였다.", "1996년 8월 15일에 연세대학교의 그 육중한 철문이 포클레인으로 뜯겼을 때 사람들은 큰 충격을 받았고 그것을 뜯어낸 쪽이 정부였는데도 시위대의 폭력성을 개탄했지. 유레카. 고위 관리 중에 누군가는 그렇게 생각하지 않았을까? 물리적으로 고립시키고, 폭력이라는 틀을 씌운다. 수단으로써 그것은 철저하고도 완전한 발견이었을 거야. 물리적 봉쇄와 이념적 봉쇄, 운동과 일상의 격리. 말하자면 일상적인 것에서 정치적인 것의 박리.", "차벽은 말이지 차벽은 벽으로써 시위 관리에 동원되지만 시위대가 그것에 손을 대고 흔들기 시작하는 순간 그것은 더는 벽이 아니고 재산이 되잖아. 국가의 재산. 시위대의 움직임은 가로막힌 길을 뚫는 돌파 행위가 아니고 재산 손괴 행위가 된다. 관리자들이 행복해진다. 관리가 쉬워지니까. 더는 움직이지 못하도록 막아둔 뒤, 시위대가 다녀간 자리에 남은 것들을 텔레비전이나 사진으로 대중에게 보여주면 되는 것이다. 파손된 차벽과 도로에 널린 깨진 유리 조각들을. 부서진 재물, 재산을. 운동이 아닌 관리자의 방향으로 대중의 공감이나 이입이 이루어지도록. 그렇게 되도록 하는 데에 재산 손괴, 만큼 효과적인 광경도 없을 거라고 서수경은 말했다. 재산 손괴 장면은 종종 인명 손실 장면보다도 효과가 강하지. 왜냐하면 그 장면에 대한 이입이 훨씬 더 쉬우니까. 왜 그게 더 쉬운지는 설명하기 어렵지만 지금 여기서는 그게 더 쉽고, 뭐가 더 쉬우면 쉬운 쪽으로 되어간다. 뭐가 그렇게 되기 쉬우면 뭐는 곧 그렇게 되지 여기서는.", "독서의 경험이란 앞선 삶의 문장을, 즉 앞선 세대의 삶 형태들을 양손에 받아드는 경험이기도 하니까.", "한번은 둘이서 골목을 걷다가 바싹 마른 꽃나무를 살리려는지 마저 죽이려는지 화분째 바깥에 내다둔 집 앞을 지나갔고 그때 정진원이 내게 이모, 저 나무가 죽었느냐고 물은 적이 있었다. 살아 있어, 아직은 삶보다는 죽음에 가까운 대답을 해놓고 뜨끔해 아이를 내려다보았다. 정진원은 다만 햇빛이 눈부신 듯 미간을 찡그린 채 걷고 있었다. 진지하게 무언가를 생각하는 얼굴 같기도 했다. 나는 이 아이가 조금 전 대화에서 아무런 인상을 받지 않았기를, 대화 자체를 벌써 잊었기를 바랐다.", "20년을 함께 살아왔지만 유사시, 우리에게는 서로의 유사가 전달되지 않는다. 서수경에게 위급한 일이 생기면 그 연락은 서수경의 가족에게 갈 것이다. 내게 위급한 일이 생기면 김소리나 내 부모에게 갈 것이다. 그렇지 않을 가능성이 있다 하더라도 서수경과 내가 조금 더 염두에 두는 가능성은 서로에게 연락이 '오지 않을' 경우이고 우리는 그 가능성과 살아가며 끊임없이 서로의 죽음을, 혹은 죽음에 이르는 순간을 가정한다. 조금씩 독을 삼키듯 상실을 경험한다. 일상에서 내 기도의 내용은 서수경의 귀가이다. 서수경이 매일 집으로 돌아온다. 그는 저 바깥에서, 매일의 죽음에서 돌아온다.", "너희가 무슨 관계인가. 나는 궁금하다. 그렇게 묻는 우리의 이웃은 그것이 정말 궁금할까? 그 '궁금함'의 앞과 뒤에는 어떤 생각이 있을까, 그것은 생각일까? 예컨대 너희가 무슨 관계냐는 질문을 받을 때 서수경과 나는 우리의 대답으로(우리가 대답을 하건 하지 않건) 우리가 또는 우리 각자가 대면할 수 있는 위협을 생각하고, 질문자와의 관계 변화를 생각하고, 그 질문이 나오기까지의 과정과 대답 이후까지를 창나에 상상하는데 우리에게 질문한 이웃도 그 정도는 생각했을까? 아니야 언니. 라고 김소리는 말했다. 사람들은 그런 걸 상상할 정도로 남을 열심히 생각하지는 않아. 그것을 알/생각할 필요가 없으니까.", "서수경은 내 머리에 손을 올리며 너무 속상해하지 말라고 말했지만 아니 나는 속상하다고 진짜 속상해서 그 사람들을 일일이 방문해 이렇게 말해주고 싶다고, 한 사람이 말하는 상식이란 그의 생각하는 면보다는 그가 생각하지 않는 면을 더 자주 보여주며, 그의 생각하지 않는 면은 그가 어떤 사람인가를 비교적 적나라하게 보여주는데 당신은 방금 너무 적나라했다고 말해주고 싶다고.", "매번 집회의 평화적 측면을 강조하는 분위기도 나는 불편하다고 여기고 있었다. 평화적 시위에 대한 사람들의 열광은 서수경과 내게 거의 강박처럼 보였다. 광장이나 여론이 모이는 곳에서 종종 보이곤 하는, 평화적으로 시위하는 착한 시민이라는 자부가 우리는 불편했다. 착한 시민의 정상적 시위와 착하지 않은 시민의 비정상적 시위가 이렇게 나뉘는 것일까 세월호 유가족과 미수습자 가족들은 지난 3년 내내 착하지 않은 시민이었다는 말인가", "서수경과 나는 그 침묵 속에서 함께 침묵하는 동안 평화적 시위를 원하는 사람들의 갈망에서 상처를 보았다. 누군가 다치는 광경을 우리는 너무 보았다. 사람들은 그렇게 말하고 싶은 게 아니었을까. 누구도 다치게 하지 말라, 우리는 이미 너무 겪었다고.", "혁명이란 무엇인가. 황정은은 그것이 번개처럼 크고 단절적인 절대적 힘이 아니라, 작고 사소한 진공관 속의 빛과 소음을 발견하는 일이라 말한다. 어떤 사소한 사물조차 \"세상에 그거 한대뿐\"이라는 유일성을 담고 있음을 인지한 자라면, 그 안에는 결코 우습게 볼 수 없는 뜨거움이 있다는 사실을 알게 될 것이다. 그리고 이 뜨거움은 시대가 주는 환멸과 낙담으로부터 벗어나는 길을 열어낸다.", "캐럴 페이트먼은 일반적으로 성적 관계에서 여자의 거절은 사회적 편견에 다라 '예스'로 재해석되며 체계적으로 무효화된다고 말했다. 문제는 동의에 관한 문제가 사적 영역의 관계들에만 한정되지 않고, 공적 영역의 시민권에도 영향을 미친다는 것이다. 호감을 빙자한 성희롱이 난무함에도 많은 이들이 이를 낭만적 예술성의 발로나 유쾌한 농담으로 받아들여주는 동안, 남자들의 통치가 여자들의 신체에 성적으로 접근할 수 있는 권리는 사회적으로 이미 허용되는 셈이다.", "사람들이 '상식'이라는 말을 사용할 때는 대개 \"사리 분별을 하고 있지 않은 상태\"라는 것, 그저 \"굳은 믿음\"이자 \"몸에 벤 습관\"이라는 소설의 통찰은 정확하다. 상식은 강자의 것이다. 그러므로 대개 상식은 약함에 대한 혐오와 긴밀한 관계를 맺는다. 혐오는 누군가를 사랑하는 대신 증오하기 때문에 문제인 것이 아니라, 사회에서 반복되어온 이데올로기를 무비판적으로 재생산하기 때문에 문제가 되는 것이다. 무엇보다 '상식'이라는 말은 혐오의 작동방식을 순식간에 비가시적으로 만들어버린다.", "일상 속에서 사소하게 치부되어온 문제들과 지워져 온 존재들을 위해 무한히 많은 혁명들이 계속되어야 하고, 정말 혁명이 도래하는 그날에는 \"아무것도 말할 필요가 없\"는 대신에 모두가 말하게 될 것이다."]}, {"title": "디스보다 피스", "author": "박하재홍", "genre": "교양, 인문", "publisher": "슬로비", "passages": ["이 책은 개인적으로는 청소년들과 호흡하며 성장한 나의 기록물이고, 독자들에게는 대중음악으로 소통하는 방법을 익히는 지침서가 될 것이다. 특히 청소년의 추천곡이 바탕이 된 만큼, 학생과의 소통에 어려움을 겪는 교사나 부모에게 대화의 길잡이 역할을 해줄 것이다. 그들의 마음을 이해하고 호흡하는 창구로 대중음악만 한 게 없다. 서로 도움을 주는 음악을 발견하려는 사람들이 많아진다면 밤거리에는 술 마시는 노래방 대신 잔잔한 별처럼 반짝이는 장소가 하나 둘 늘어나지 않을까? 나는 그런 '문화'에 일조하고 싶다. 내일도 나는 학생들을 만나면 내가 쓴 짧은 랩 구절을 또박또박 읊어주고 부지런히 추천 음악을 받아볼 것이다 . 우린 서로 다른 사연들을 지녔고 우린 서로 다른 노래들을 골랐어 우린 서로 닮은 사연들을 지녔고 우린 서로 닮은 노래들을 골랐어 ​", "사실 많은 청소년들이 남들 앞에서 노래해 보고 싶어 한다. 자신이 느끼는 내면의 진짜 정체성을 다른 이들에게 알릴 수 있기 때문이다. 하지만 현실적으로 그런 기회를 얻기 어렵다. 가창력에 자신 있는 사람이 아닌 이상 선뜻 용기를 내기도 껄끄럽고, 잘못했다간 망신만 당할 수도 있으니 말이다. 그래서 나는 '오픈 마이크'라는 환대의 무대 방식을 수업에 접목했다. 오픈 마이크 무대에선 실력과 상관없이 신청자 모두에게 10분 정도의 시간이 주어지고, 관객은 무대에 선 사람이 자신의 감흥을 잘 전달할 수 있도록 귀를 기울인다. 무명의 공연자와 관객이 적극적으로 소통하는 자리다. ​", "어떤 음악이 더 좋은 음악인지 판단하는 기준은 개인마다 다르지만, 서로 다른 시공간을 사는 이들에게 공통된 승화 경험을 선사하는 음악이 꽤 있다는 건 분명하다. 당장은 인기 순위에 이목이 쏠리는 대중음악이지만 세대와 시대를 폭넓게 끌어안는 곡들이 곳곳에 보물처럼 숨어 있다. ​", "청소년 대상 강연을 하면서 얻은 지혜가 있다. 10대들이 마음속에 어떤 음악을 품고 있는지 알아내려면 질문이 중요하다는 것이다. 다짜고짜 '무슨 노래 좋아해?'라고 묻기보다는 두고두고 들을 만한 음악을 추천해 달라고 하거나, 혼자 듣기 아까운 음악을 공유하자고 얘기하는 편이 낫다. 이때 '노래'라는 표현 대신 '음악'이라고 해야 한다. 이 점이 중요하다. 노래라는 단어는 아무래도 노래하는 가수부터 떠올리게 할 소지가 크다. 가수의 외모나 패션 그리고 무대 연출에 대한 이미지까지 몽땅 끌어오기 때문에 음악이 가려진다. 무엇보다 음악 자체를 중시하는 질문을 던질 때 그들 안에 내재한 예술적 감각이 움직이기 시작한다. ​", "지난날을 돌이켜 보면 나는 랩이든 춤이든 상업적인 오디션의 입김에 별 영향을 받지 않고 내 방식대로 즐겨왔다는 안도감이 든다. 힘합이라는 언더그라운드 문화 덕분이었다. 허름한 지하실 공연장에서 열창하는 래퍼와 디제이, 공원 한쪽에서 기술을 연마하는 댄서들의 열정은 그야말로 삶에 대한 찬사였다. 힙합을 느끼며 고개를 끄덕이는 동안만큼은 무한 경쟁 사회라는 커다란 오디션 현장에서 탈출할 수 있었으니까. ​", "강연장에서는 나는 '세상에 하나쯤 있어도 좋을 래퍼'라고 나를 소개한다. 그렇게 소개하는 이유는 힙합이란 문화의 넉넉한 품성을 알리고 싶어서다. 힙합은 평범한 나에게 래퍼라는 호칭을 허락했고, 삶 속에서 주인공이 될 수 있는 순간을 아낌없이 선물해 주었다. ​", "인생은 한 편의 '영화' 같잖아 그래서 난 항상 '배우'는 자세 주변에서는 내가 좋아하는 일을 잘 찾은 직업인으로 보이는지 부러워한다. 종종 청소년 진로 교육을 맡아달라는 요청이 들어올 때도 있다. 한번은 중학교에서 '좋아하는 것을 직업으로 삼는 방법'이란 제목으로 진로 강연을 부탁해 와서 난감하기 짝이 없었다. 생각해 보니 좋아하는 것을 직업으로 삼기 위해 노력한 적이 없었기 때문이다. 그저 기질에 맞을 듯한 일을 사방팔방으로 찾았을 뿐이다. 그래서 '좋아하는 걸 포기하지 않는 방법'으로 하면 어떻겠냐고 제안했더니 다행히 담당 교사도 맞장구를 쳐주었다. ​", "대중음악은 누군가의 의식을 거머쥐고 혼란스럽게 뒤흔들기도 한다. 나는 누구든지 음악의 놀라운 힘에 휘둘리며 사는 게 아니라, 그 힘을 잘 활용하며 살기를 바란다. 대중음악에서 적절한 위로와 용기를 얻고 삶에 활력을 더하기를. 더 나아가 살아가면서 마주치게 될 사람들의 내면을 대중음악으로 한층 깊이 들여다보고, 사람들 사이의 갈등까지 완화하는 방법을 찾는 것. 서로가 첨예하게 대립하는 세상에서 내가 추구하는 평화론이다."]}, {"title": "디자이너의 일상과 실천", "author": "권준호", "genre": "디자인, 미술", "publisher": "안그라픽스", "passages": ["구체화되지 않은 정보의 구조를 분석하고 엮어내어 시각적인 형태를 만들어가는 디자인 과정은, 머릿속에 부유하는 얼마간의 생각들과 삶 속에서 축적된 경험을 토대로 한다. 그러므로 디자인을 업으로 삼고 있는 사람이 습득해야만 하는 삶의 여러 원재료 중, 단편적인 소비성 정보의 비중이 점점 높아지는 것은 분명 위험한 일이다. 나에게 글쓰기는 내가 읽거나 겪어낸 사람과 사물, 그리고 체험한 현상들을 이미지라는 보호막 없이 민낯 그대로 드러내는 일이다. 글쓰기의 숙련도가 부족한 만큼 나의 생각과 경험은 억지로 꾸며지거나 각색되지 않고, 좀 더 솔직하고 온전한 생각의 덩어리로 만들어지곤 한다. 생각과 경험을 글로 남기자는 결심은, 소비성 정보가 아닌 더 많은 글을 읽고, 온라인이 아닌 현실의 삶에서 더 다양하고 깊은 경험의 순간을 흘려보내지 말라는, 내가 나에게 내주는 일종의 과제이기도 하다.", "우리는 무턱대고 견적을 물어보는 클라이언트에게 '가용 예산'이 어느 정도인지를 물어본다. 단체와 개인, 기업과 비영리 기관 등 클라이언트의 상황에 따라 디자인에 지출하는 예산은 천차만별이지만, 우리가 가용 예산을 물어보는 이유는, 그것이 우리가 만들어내는 디자인에 그들이 얼마만큼의 가치를 부여하고 있는지를 알아볼 수 있는 하나의 척도가 되기 때문이다. 그러나 대부분의 클라이언트는 그들의 가용 예산을 공개하지 않고, 견적서를 받아본 후 예산이 배정될 것이라는 자동 응답기 같은 회신을 보내온다.", "동일한 분량과 강도의 작업이라도, 그 작업의 비용은 상대적으로 다르게 책정될 수 있다. 우리가 '같은 분량의 일'에 다른 보수를 받는 이유는, 디자이너에게 '보수'의 개념이 돈이라는 단일 기준으로 환산될 수 없기 때문이다. 그 계산 안에는 하나의 작업이 갖는 사회적 의미, 작업자로서 느끼는 창작의 재미, 그리고 무엇보다 그 프로젝트를 의뢰하는 사람이 보여주는 '직업 자체와 작업자에 대한 존중'이라는 변수가 포함된다. 이 모든 변수를 고려해 적절한 디자인 비용을 정하는 일은 여전히 어려운 일이다. 그러나 작업에 대한 애정과 디자이너의 노동에 대한 존중이 수반된다면, 예산을 정하는 일은 자신의 패를 숨긴 채 상대를 떠보는 눈치 싸움이 아닌, 서로의 상황과 입장을 이해하고 조율해 나가는 투명하고 건강한 협상이 될 수도 있다. 갑과 을, 클라이언트와 용역 업체가 아닌, 디자인이라는 노동이 갖는 특수한 상대적 가치를 이해할 수 있는, 하나의 프로젝트를 함께 만들어가는 협업자를 좀 더 자주 만나기를 언제나 고대하고 있다.", "어떤 큐레이터도 일생동안 돌과 철재를 소재로 단정한 조각 작품을 선보이던 작가에게, 화려한 색채의 유화 작품을 의뢰하진 않는다. 물론 하나의 작품 세계를 깊게 파고드는 작가와, 다양한 프로젝트를 민첩하게 풀어내야 하는 디자이너를 동일 선상에서 비교할 수는 없을 것이다. 그러나 디자이너는 이성과 직관의 균형잡기를 통해 결과물을 만들어내고, 그 과정에서 동반되는 창작의 행위 자체는 예술가의 그것과 다르지 않다. 디자이너의 포트폴리오는 한 디자이너가 쌓아온 문제 해결의 과정과 결과를 살펴볼 수 있는 기준이 된다. 프로젝트의 실무자라면 기계적인 가격 비교가 아닌, 디자이너의 포트폴리오를 통해 해당 프로젝트에 적합한 작업자가 누구인지 파악하려는 분석적인 노력이 반드시 뒷받침되어야 한다. 의뢰하려는 과업과 디자이너의 적합성을 연결 짓지 못한 채, 단지 가격 비교를 통해 디자이너를 결정하는 것은 좋은 작업을 위해 실무자가 담당해야 할 업무를 방기하는 일종의 직무유기라고 할 수 있다. 첫 단추가 잘못 끼워진 프로젝트는 결국 좌표를 잃어버린채 목적지인 바다가 아닌 산으로 갈 수밖에 없다.", "누군가 꾸준한 태도를 유지할 때, 사람들은 그 사람이 '원래' 그런 사람이라고 생각한다. 그러나 꾸준함은 그 뒤에 보이지 않는 치열함이 수반되지 않는다면 불가능한 일이다. 누군가 쉽게 판단하는 '원래 그런 상태'를 유지하기 위해 그 사람은 끊임없이 자신을 돌아보고, 자기 복제를 피하려 스스로를 시험대 위에 올려놓으며, 조금이라도 더 나은 결과를 만들기 위해 악착같이 작업에 매달리고 있을 것이다.", "그림을 그리는 능력이 개인의 타고난 표현 능력을 기반으로 발전하는 재능이라면, 디자인은 주어진 문제를 분석해 논리적인 해결 방식을 시각적으로 제안하는 행위라는 것을, 미술이 개인의 재능에 큰 영향을 받는 반면, 디자인은 후천적으로 학습하는 사회적 맥락과 관계성의 이해에 따라 그 결과가 달라질 수 있음을 어렴풋이 깨달을 수 있었다. 디자이너가 되기 위해서는 내가 속한 사회에서 통용되는 맥락을 읽을 수 있어야 하며, 개인의 능력을 독단적으로 주장하는 것이 아닌, 공동체와의 협업을 모색하는 것이 무엇보다 중요하다는 사실은 천부적인 재능을 타고나지 않은 평범한 청년에게 큰 위안이 되었고, 그제야 꿈이라는 것의 얼개를 조금씩 그려갈 수 있었다.", "그들이 말하는 '대중적인 디자인'이란 '대중이란 누구인가'에 대한 어떤 해석의 노력도 하지 않은 게으른 디자인일 수 있다. 반면 모호하고 추상적인 개념을 다양한 형식으로 시각화해 프로젝트의 주제를 은유와 상징으로 담아내려는 시도를 하는 디자인은, 대중이 그 안에 담긴 메시지를 읽어낼 수 있는 존재라는 믿음을 품고, 그들에게 디자인을 매개로 한 진지한 대화를 건네는 시도일지도 모른다.", "성공적인 디자인 프로젝트를 위해서는 결정권을 가지고 있는 대표님과, 그 대표님에게는 다소 낯설 수 있는 작업을 제안하는 디자이너 사이에 있는 '실무자'의 역할이 매우 중요하다. '실제로 사무를 맡아 처리하는 사람'인 실무자가 대표님의 의견을 아무 여과없이 단순 전달하는 역할에 그친다면, 그 실무자는 프로젝트의 수월한 진행을 위해 차라리 존재하지 않는 편이 낫다. '대표님 지시 사항'이라는 경직된 텍스트의 나열보다는 차라리 육성으로 직접 전해 듣는 편이 그 요구의 본질을 파악하기 그나마 수월하기 때문이다.", "사진을 촬영하기 위해서는 사진이 찍히는 대상이 필요한데, 나는 내가 만들어내는 작업의 차별성을 그 대상을 손으로 만들어내는 행위에서 찾았다. 손으로 무엇인가를 만들 때 발생하는 계획과 우연 사이의 (오차 범위 내의) 불협화음이, 컴퓨터 그래픽 작업과는 다른 독창성을 작업에 부여할 수 있다고 생각했다.", "디자이너는 사진이라는 단편적인 이미지를 통해 무엇을 드러낼 것이며, 무엇을 감출 것인가를 판단하고, 그 드러냄과 감춤 사이에서 사진이 전달해야만 하는 이야기의 운율을 만들어내기 위해 노력한다. 보여줌으로써 전달되는 것과, 가림으로써 연상되는 것 사이의 긴장감을, 디자이너는 지면 위의 다른 요소와의 조형성과 맥락을 고려하며 배치해야 한다. 사진이 어떻게 잘리고 붙여지는가에 따라 극명하게 다른 메시지를 전달할 수도 있다는 것, 그 의도적인 왜곡이 따론 악의적인 욕망으로 소비될 수 있다는 것을, 사진을 작업의 도구로 다루는 디자이너라면 반드시 알아야 한다.", "제대 후 돌아간 대학에서 수작업은 예술가들이나 하는 것이라는 교수의 수업을 들으며 나는 절망했다. 수업에서 손으로 만드는 작업과, 질감의 느낌을 이야기하는 것은 구시대의 것으로 여겨졌고, 학생들은 과제를 위해 컴퓨터에만 매달렸다. 디자인은 이성적인 계산으로 재단되어 있었고 그 냉장한 영역에 '감정적인 어떤 것'이 끼어들어 갈 틈은 없어보였다. 팔리지 않는 것은 디자인이 아니라는 믿음과 소비자와의 소통이라는 이름 아래 이루어지는 소비자 욕구 조사는 학생들을 창작을 위해 고민하는 사람이 아닌 판매를 위해 고민하는 사람으로 키워내고 있었다. 그 노골적인 자본주의적 사고방식이 디자인을 공부하는 학교의 기본 정신이 되어버린 것에 의아함을 느꼈다. 나는 항상 이런 의문을 가지고 있었다. 모든 디자인이 반드시 대량으로 생산되어야 하는 걸까? 손으로 만들어진, 작은 집단 혹은 개인을 위한 이미지와 작업들이 디자인이 아니라는 그 신념과도 같은 믿음은 어디에서 온 것일까?", "한편 수작업에 기반한 디자인은 클라이언트와의 신뢰가 없다면 성사되기 어렵다. ctrl+Z 를 눌러 쉽게 뒤로 돌아갈 수 있는 컴퓨터 작업과는 달리, 한 번 재료의 성질을 변형해 만든 작업은 그전으로 다시는 돌아갈 수 없기 때문이다. 디자이너의 작업을 존중하고, 자신의 생각을 벗어나는 시도를 하는 디자이너를 믿어주는 클라이언트는 좋은 작업을 위한 가장 큰 조력자이며, 그 결과는 특히 손으로 만들어진 작업에서 더욱 두드러진다.", "어떤 사람들은 사회의 변화를 꿈꾸고 나름의 실천을 이어나가려는 사람들의 허물을 찾아내기 위해 혈안이 되어 있는 것처럼 보인다. 그들의 활동이나 생각이 어떤 이들에게 잠재된 부채 의식을 자극하기 때문일 텐데, 환경보호에 대한 메시지를 전하려는 사람에게 어째서 완전한 비건이 아니냐고 따져 묻거나, 노동자의 권리를 대변하는 목소리를 내는 활동가에게 노동자를 착취하는 글로벌 기업의 상품을 소비하는 것이 모순은 아닌지 질문하는 식이다. 이런 질문들은 일견 합리적 의심인 듯 포장되어 있지만, 그 속엔 '당신도 우리와 다를 바 없는 속물이며, 혼자 고귀한 척하지 말라'는 본심이 숨어 있는지도 모른다.", "디자이너 역시 한 사회의 구성원이며, 그들이 만들어내는 결과물은 우리가 살아가는 사회에 크고 작은 영향을 끼칠 수 있다고 믿는다. 절대적으로 옳고 그른 일을 아마도 존재하지 않을 것이다. 내가 어떤 가치를 믿고 있다고 해서, 수많은 신념과 가치관이 혼재되어 있는 현대사회에서 그것이 어떠한 모순도 없는 순결한 가치일 수도 없다. 다만 이 작업이, 혹은 이 작업을 의뢰하는 클라이언트가 내가 믿고 있는 삶의 가치와 위배되지는 않는지, 이 작업의 결과물이 사회에 어떤 영향을 끼치는지를 고민하는 사람은, 그것을 애써 외면하는 사람보다 자신이 만들어내는 작업에 뚜렷한 책임감을 가지려 노력하는 사람일 것이라고 믿는다.", "디자이너는 누군가의 의뢰를 받아 아름다운 이미지를 만들어내는 사람이기도 하지만, 아무도 관심 갖지 않는 버려지는 것들에서 아름다움을 발견해내는 사람이기도 하다는 것을, 좀 더 세심하게 일상의 아름다움을 관찰하는 시선을 가질 것을 그는 tat*를 통해 제안하고 있는 것 같다.", "'타이포그래피'는 정보를 전달하는 가장 중요한 도구이자, 그래픽 디자이너를 다른 창작자들과 구분 짓는 가장 분명한 영역입니다. 디자이너에게 잘 짜인 조판은 하나의 훌륭한 예술 작품처럼 시각적인 즐거움을 선사합니다. 또한 '대화'는 디자인 작업을 진행할 때 동반되는 가장 중요한 의사소통 수단입니다. 클라이언트, 동료 디자이너, 인쇄소, 혹은 시공사와의 대화를 어떻게 이끌어가는가에 따라 그 작업의 완성도와 마감의 질이 결정됩니다. 좋은 디자이너는 어쩌면 훌륭한 대화를 이끌어나갈 수 있는 사람일지도 모릅니다. 마지막으로 '확장성' 역시 디자인 작업이 가진 중요한 성질입니다. 현시점의 디자인은 하나의 고정된 매체에 국한되지 않습니다. 인쇄물을 염두에 둔 디자인이라고 해도, 그 디자인이 온라인과 모바일에서 운용되는 방식에 따라 전혀 다른 결과를 도출해 내기도 합니다. 전시의 주제, '포스트 미디어, 미래의 감각 체계'라는 키워드 역시 이러한 확장성이 어떻게 변화해 나갈 것인가에 대한 고민을 담고 있다고 생각했습니다.", "클라이언트와의 효율적인 소통을 통해 성공적인 프로젝트를 진행하기를 원하는 디자이너라면, 분명하고 합리적인 언어로 클라이언트의 행동 양식을 교정해 줄 의무가 있다. 아래의 내용은 실무 디자인에서 자주 마주하게 되는, 갑질이라고 오해를 살 수 있는 클라이언트의 행동 양식에 대한 현실적 대응의 참고 사례다.", "카카오톡 방을 만들어 업무 요청 및 수정 사항을 생각날 때마다 전달할 때 디자인 작업은 사적 영역이 아닌 공적인 영역에서 이루어져야 하는 과업이다. 카카오톡을 업무 용도로 사용했을 때, 사적인 대화 사이에 쌓여 있는 수정 사항을 미쳐 확인하지 못해 제대로 반영되지 못하는 상황이 발생하기 때문에, 수정 사항은 내부적으로 정리 후 공식적인 메일로 발송할 것을 요청해야 한다.", "직접 디자인을 수정해서 보내줄 때 실무를 맡아서 진행하는 클라이언트 중 때때로 의욕이 넘쳐서 디자인 시안을 포토샵으로 열어 직접 수정 후 보내주는 경우가 있다. 이 경우, 디자인은 디자이너가 작업의 구성과 조형에 분명한 의미와 논리를 담아 만들어낸 창작물이며, 그 창작물을 작업자의 동의 없이 수정한다는 것은 의도하지 않았다고 해도 매우 무례한 행위로 인식될 수 있음을 알려주어야 한다. 특히 포토샵을 사용할 줄 아는 것과 디자인을 하는 것은 매우 다른 범주의 행위임을 숙지시켜야 한다. (이런 행위를 이미 저질러버렸다면, 디자이너가 입은 마음의 상처는 회복하기 어려운 수준일 것이므로, 다른 디자이너를 찾아보는 편이 낫다.)", "아무런 이유와 근거를 제시하지 않고 수정 사항을 전달 할 때 디자인 수정의 명확한 근거를 요청하기 위해서는, 디자이너 스스로 디자인 제안 단계에서 작업에 대한 분명한 논리와 근거를 클라이언트에게 제시해야 한다. 작업에 대한 서사를 겹겹이 쌓아올려 만들어진 디자인 제안서는 근거 없는 수정 사항을 반려할 수 있는 논거가 되지만, 충분한 근거에도 불구하고 무논리로 무장한 채 수정을 요청하는 클라이언트에게는 디자인이 개인적인 취향의 집합이 아님을 분명하고 단호하게 이야기해 주어야 한다.", "한 사회의 고정관념을 전복하려는 그들의 정치적이고 사회적인 급진성과는 달리 이미지를 대하는 태도는 신기할 정도로 보수적인 관점을 지니고 있는 경우가 많았다. 누구보다 치열하게 관습에 저항하는 사람들이 보여주는, 어떻게든 관습을 벗어나려 하지 않는 모순적인 태도는, 사람들이 왜 그들의 목소리에 귀 기울이지 않는가를 알 수 있는 역설적인 모습이었다. 그들에게 당연한 상식이라고 생각될 것들이 누군가에게는 급진적인 사고였고, 우리에게는 평범한 디자인이 그들에게는 너무나 급진적인 변화였다. 그 간극이 너무나 멀어 보여서 아득하게만 느껴졌는데, 한편으로는 그 거리를 좁혀가는 것 역시 디자인의 중요한 과정일 것이라고 생각했다. 내가 깨우친 가치, 삶의 태도가 너무나 지당한 나머지, 그것이 지닌 의미가 아직은 낯선 사람들을 배척하고 폄하하는 일은 어떤 사상에 경도된 사람들이 저지르는 흔한 일반화이며, 때문에 시각 이미지를 받아들이는 수용의 폭이 각자의 처지에 따라 다른 것은 어쩌면 당연한 일일 것이다.", "나는 창작이 노동에 기반해야 한다고 믿는다. 취미로서의 창작이 아닌, 직업으로서의 창작은 더욱 그렇다. 노동의 완성도는 시간에 비례한다. 그래서 노동의 결과는 정직하고, 그 정직함이 창작의 기본이 되어야 한다고 생각한다. 짧은 기간에 성급한 결과로 얻어진 결과물은 누군가의 생각을 베낀 것이거나, 어쩌다 우연으로 얻은 것이거나, 흉내 낸 것에서 벗어날 수 없다. 지난하고 고통스러운 작업의 과정을 생략한 채 매끈한 결과를 얻으려는 것은 창작 활동을 성과주의의 시각으로 접근하는 계산적인 태도다. 그렇게 만들어진 결과물은 아마도 또 하나의 영혼 없는 공산품에 지나지 않을 것이다.", "'스튜디오'와 '에이전시'라고 불리는 디자인 회사의 차이점은 단순히 두 집단의 규모로 구분된다기보다, 해당 집단의 구성원이 추구하는 지향점에서 그 차이를 찾아볼 수 있다. 말하자면 스튜디오는 '할 수 없는 것은 할 수 없다'라고 말 할 수 있는 공동체이며, 그때 제시되는 '할 수 없는 이유'가 스튜디오의 정체성을 대변한다. 그러나 '프로'라는 단어가 사회에서 통용되는 기준에 비추어본다면 그런 태도는 '아마추어'적이라는 평가를 받는다.", "'프로'라는 수식어가 디자이너에게 붙기 위해서는, 좋은 작업을 위한 모든 조건이 갖춰진 상황이 아닌, 열악한 환경에서 진행되는 작업에서 설득과 균형의 언어를 통해 조형성을 잃지 않는 작업을 만들어낼 수 있어야 한다고 생각했다. \"그것은 할 수 없다\"라고 말할 때, 그 이유가 눈앞에 펼쳐질 프로젝트의 고생스러운 과정 때문만은 아니어야 한다고 믿었다.", "그 경험은 어떤 메시지를 전달하기 위해 디자인이 적극적으로 개입하고 발언해야 한다고 믿던 그때의 나에게 작업을 대하는 새로운 시각을 갖게 했다. 어떤 콘텐츠는 디자인이 개입하지 않아도 그 자체로 이야기를 전달하는 가장 강력한 매체가 될 수 있다는 것을, 발언하지 않는 것이 때로는 더 정확한 소통을 위한 디자인일 수도 있다는 것을 나는 어렴풋이 깨달을 수 있었다."]}, {"title": "땡스 갓, 잇츠 프라이데이", "author": "심너울", "genre": "소설", "publisher": "안전가옥", "passages": ["지금 다 안 들려요. 그 말이 옳았다. 신촌 번화가의 입구에서 세브란스병원까지는 차와 사람들이 너무 많아서 도저히 끼어 들어갈 틈이 없었다. 병원 앞의 장사진을 보고, 이 불가해한 상황을 깨달은 사람들이 많았을 것이다. 도로는 정차한 차들로 완전히 막혔다. 어떤 사람들은 눈물을 흘렸다. 다른 어떤 사람들은 뭔가 크게 외쳤다. ― 아니 외치는 것처럼 보였다. 아무것도 들리지 않았다.", "일주일이 지났다. 정적은 여전했다. 사람들은 마포구와 서대문구를 정적 구역이라는 이름으로 싸잡아 불렀다. 정부는 모든 가용 인력을 여기에 쏟아부어서 안전 관리를 시작했다. 하지만 소리가 없으니 온갖 괴상한 일들이 일어났다.", "하늘에서 정적 구역의 한계 높이를 알아낸 사람들은 땅속으로 시선을 돌렸다. 몇몇 단체가 연합해 난지도 근처에서 굴착기로 땅을 파고 또 팠다. 지하 1,000m부터 콰콰콰 하는 요란한 소리가 들렸다. 정적 구역의 경계 지점이 지상 1,000m, 지하 1,000m라고 하니 이공계열 종사자 등 숫자와 관련한 일을 하는 사람들은 묘한 만족감을 표시했다.", "이곳의 분위기가 마음에 들었다. 요즘 카페들은 죄다 천장을 시원하게 노출하고, 벽에 아무런 마감재도 바르지 않는다. 넘어지면 크게 다칠 것 같아서 정말 싫다. 커피에 횟가루가 들어갈 것 같기도 하다. 참 이상한 유행이다. 그런데 이 장소는 바닥이나 벽이나 천장이나 깔끔한 타일로 잘 처리되어 있었다. 아주 깨끗하고 조용한 느낌이었다. 생각해 보니 조용한 건 당연하군.", "여기 땅값이 엄청 내렸어요. 그래서 제 주변 사람들은 다 마포구 한강변에 있는 아파트에 살게 됐어요. 장애인 편의 시설 설치가 웬 말이냐 하면서 시위하는 사람들도 없고, 창밖으로 한강도 보이고, 얼마나 좋아요. 요즘에는 방송마다 자막도 달아 주잖아요. 수화는 기대도 안 하지만.", "막다른 곳에 몰렸던 소현은 윤리 규정 덕분에 많이 진정한 것 같아. 왜, 실험 동물들을 다루는 데 대한 여러 윤리적인 규칙들이 있잖아. 필요 없는 고통을 주면 안 되고, 가능한 희생을 최소한으로 해야 하고. 사실 그런 규정이 쥐들에게 무슨 의미가 있겠니? 어차피 죽는 건 매한가진데 말이야. 사람들이 자기를 윤리적으로 대하려고 노력하는 걸 알기나 하겠어? 그러니까, 그건 결국 전부 실험자를 위한 규정이야. 실험자가 스스로 규칙을 지키고 있다고 생각하면 정신이 한결 편해지거든."]}, {"title": "뛰어놀며 운동장의 기울기를 바꾸기", "author": "백희원", "genre": "사회정치", "publisher": "FDSC", "passages": ["연대는 할 수 있을지언정 '친구'가 되기는 쉽지 않다. 같은 생각을 기대하고 만나면 차이점에 더 민감해지기 마련이니까. 게다가 여성의 삶이란 얼마나 복잡다단한가. 우리는 쉽게 비슷비슷한 사람이 될 수 없다. 아마 여기서 비롯된 관계의 긴장감을 기껍게 받아들이는 것이야말로 페미니스트적 태도일 것이다.", "사람들이 만나고 모이는 방식은 끊임없이 진화한다. 그래서 새로운 세대가 주축이 되어 만들어진 조직은 전혀 새로운 것으로 보일 수 있지만, 결국 사람들이 만나고 모이는 이유는 유사 이래 다르지 않다. 우리는 세상에 홀로 남겨져 외로워지고 싶지 않기 때문에 모인다. 이 여성들은 서로의 처지를 이해할 만한 사람들과 유익한 것을 나누고, 때로는 무익한 시간을 함께 보내는 친구가 되기 위해 모였다. 다만 그러려면 같은 성별이나 페미니즘을 경유해야 했고, 그런 '필터링'이 필요한 세상은 이들에게도 탐탁잖은 것이기에 사회의 변화에 목소리를 함께 내어온 것이다.", "고립되지 않은 페미니스트 커뮤니티의 필요성을 실감하는 페미니스트로서 그리고 정책적 언어를 납득하지 못하는 바람에 정치적으로 대의되지 못한 시민으로서 품어온 욕망이 연구에서 만난 어떤 순간들에 감응할 수 있었고, 동시에 그 감응이 단순히 동질성에 기반한 자기애적 공감은 아닌지 되묻게 되었다. 특히 후자는 현장에서 연구 참여자들의 진솔함이 만들어낸 낯선 순간들을 마주칠 때 발휘될 수 있었다. 그 덕분에 직관을 믿는 용기를 낼 수 있었다.", "인터뷰 이후 연구 대상을 \"여성 작업자 커뮤니티\"에서 \"업계 페미니스트 커뮤니티\"로 변경하였다. 커뮤니티 구성원들이 '여성'으로만 이루어져 있지도 않기도 했거니와 '페미니스트'라는 언어가 만들어내는 구분과 긴장감으로 인한 의미 있는 경험이 많이 발견 되었기 때문이다. 하지만 연구에서 '여성'과 '페미니스트'라는 단어를 엄밀하게 구분 지어 사용하지는 못했다. 연구 현장에 있는 딜레마를 연구 과정에서 풀어내는 데 이르지 못하고 고스란히 반영한 셈이다.", "1/ 야근, 격무, 회식이 당연시되는 문화는 여성과 사회적 약자를 배제함을 인지하고 노동환경 개선을 위해 공부하고 실천합니다. 2/ 좋은 디자인에는 명확한 이유를 붙이고, '천재적 재능' '감각' 등 종교적으로 디자이너를 신격화하는 시선을 거둡니다. 3/ 공짜로 일하지 않습니다. 무급 노동, 인턴제를 거부합니다. 우리는 우리 직업과 기술에 자부심을 가지고 그 결과물에 정당한 대가를 요구하는 법을 공부하고 실천합니다. 4/ 작업을 발전시키고, 알리고, 자신감을 가지는 훈련을 합니다.", "정량적 성과보다 질적이고 시각적인 결과물로 가치를 평가받는 디자인 일의 특성상 모호한 수사를 통해 부각되는 이와 배제되는 이가 생기고, 그 수사의 힘은 발화자의 권력에 크게 의존할 수밖에 없다. 권위 있는 사람의 칭찬이 더 좋은 기회로 이어지는, 소위 '인맥'이라고 하는 폐쇄적인 네트워크의 힘이 발동되기 좋은 환경인 것이다. 이는 기울어진 운동장의 원인이자 결과로, 불평등을 강화하는 핵심 기제다. 그렇기에 FDSC는 '페미니스트 디자이너'에게 기존의 모호한 수사를 거부하여 지배적인 말의 힘을 약화하는 동시에 자신의 작업에 대해서는 더 많이 발화할 것을 권유한다. 5/ 지인을 통한 고용이나 협업은 지양합니다. 5번은 더 평등한 환경을 만들기 위한 실천을 이야기하고 있다. 여성이라는 사회적 약자로서 업계의 여성 혐오에 저항하는 실천뿐 아니라, 사회 구성원으로서 더 나은 환경을 만들어나가기 위한 윤리적 책임도 함께 요청하는 셈이다.", "FDSC는 여러분의 참여로 기능합니다. 아주 작은 참여라도 커뮤니티를 활성화하는 데 기여하며 FDSC가 모두에게 유용할 수 있게 만듭니다. 모든 질문은 유효하고 반드시 누군가에게는 도움이 됩니다. 주저 말고 묻고 이야기합시다!", "일터에, 관계에, 마음에, 삶의 터전에 기존의 작동을 멈추고 달라붙어 있던 익숙함을 떼어내는 데 꽤 큰 용기가 필요했습니다. 그리고 다음은 어디로 나아가게 될까요? 생산으로 질주하는 시대 페미니스트 디자이너가 말하는 '멈춤'에 대한 이야기를 건넵니다.", "분위기를 깬다는 것은 삶을 열어젖히는 것이고, 삶을 위한 공간, 가능성과 기회의 공간을 만드는 것이다.", "FDSD는 처음부터 소수에게 조직의 책임과 역할을 위임하지 않을 것임을 명확히 했다. FDSC를 운영하는 일을 '전문적인 영역'까지 발전시키지 않고 누구나 함께할 수 있는 자리로 만들고자 했던 것이다. 위 인용에서는 이를 '희생'을 하지 않기 위한 것이라고 말하고 있다. 이 맥락에서 FDSC의 공공적 측면과 더불어 그 공공성을 유지하는 기반이 어떠해야 하는지에 대한 지향까지 함께 담고 있다. 소수의 이해가 아니라 FDSC의 회원, 더 나아가 업계에서 일하는 불특정 다수에게 더 공정하고 안전한 환경을 구축하고자 만들어진 커뮤니티가 소수의 역량에만 기대 운영된다면 결국 그 소수를 희생시키는 것이라는 셈법이다. 조직 운영을 위해 소수의 전문성을 인정하고 응당한 인건비를 지급하는 것 역시 커뮤니티를 운영하는 한 가지 방법이지만, FDSC는 전문적인 운영진과 그 외를 구분하는 대신 '디자이너들'이라는 동등한 지위의 구성원들이 모인 커뮤니티라는 정체성을 유지하는 쪽을 택했다.", "FDSC의 공공성은 '소수의 확실한 희생'이 아니라 '다수의 자율적인 역량'이 발휘될 가능성을 동력으로 삼아서 유지된다. 이는 저절로 되는 일은 아니어서 결국 FDSC를 위해 일하는 사람들은 많은 부분 이 자율성을 촉진하기 위한 일을 한다.", "커뮤니티를 직접 만들 만큼 이런 공간을 가장 필요로 한 당사자였던 이들은 오늘도 FDSC에서 질문과 농담과 일 사이를 자유자재로 오간다. 어떤 조직이든 '열정적인 리더십'은 조직이 초기에 생존하기 위한 핵심 조건이다. 혹시 자신의 적극성이 다른 회원들의 능동성이 발휘될 기회를 뺏는 건 아닌지 마음 졸이며 회원들에게 꾸준히 더 많은 자랑을 부추기고, 신입 회원도 운영진으로 참여할 수 있도록 활동의 문턱을 낮추는 일에 진심으로 임해온 FDSC 창립 멤버들 역시 그 조건을 충족시키고 있는 것 같다. 과연 이들은 희망하는 대로 일반 회원이 될 수 있을까?", "FDSC의 목적은 '오늘'에 고정되어 있다. 오늘 누구도 희생시키지 않는 것이 FDSD의 전제라는 건 몇 번을 반복해서 이야기해도 부족하지 않은데, 이 조직의 많은 디테일이 그로부터 비롯하기 때문이다. 오늘 우리가 잘 모여서 서로 즐겁고, 전보다 나은 지금을 누리는 게 중요하다. 더 나은 내일은 오늘의 희생을 통해 오지 않는다. 오늘 희생을 멈춰야 내일의 희생도 없다.", "FDSC 커뮤니티 가이드라인은 사람이 모인 곳에서 갈등이 일어날 수 있음을 인정하고, 갈등이 폭력으로 이어지지 않는 혹은 갈등과 폭력을 건강하고 생산적으로 다룰 수 있는 성숙한 커뮤니티 문화를 만들어가기 위해 작성되었습니다.", "예전에 이런 피드백을 한 적이 있어요. FDSC가 불편함을 유해하게 느끼지 않는 공간인 것 같다고. 불편함이 없는 건 아니지만, 당장 해결이 되든 안 되든 해결하기 위해 여러 실험을 하는 조직이라는 생각이 들었고, 그걸 지켜본 것과 보지 않은 것은 차이가 크죠.", "업계의 페미니스트들이 만든 멋진 이름의 커뮤니티 회원으로 존재하기로 하면서, 다른 회원들의 이야기를 들으면서 알맍은 자리를 찾아내어 자기 자신으로서 말하기를 다시 시작하는 사람들이 있었다. 커뮤니티의 친구들은 적절하고 깔끔한 톤 앤 매너의 업무 메일 같은 쾌적한 관계와 서로의 몸 개그에 깔 깔 웃는 친밀함을 시도하고, 함께 쓸데없는 일을 하기 위해 굳이 '행사'를 기획하기도 하면서 '일'로서 놀고, 놀기 위해 일하고 있었다. 크리틱과 조언을 나누며 '친구'가 되기도 했다. 나를 위한 방식으로 일과 삶의 경계를 허물며 이들이 하고 있는 방식으로 일과 삶의 경계를 허물며 이들이 하고 있는 일은 함께함의 시간을 쌓는 일이다. 서로의 맥락을 이해할 수 있도록. 각자가 포기하지 않을 수 있도록. 커뮤니티가 역사를 쌓고 점차 더 무시할 수 없는 미래가 될 때까지.", "시간이 쌓여 함께 더 큰 리스크를 나눌 수도 있을 만한 명확한 미래가 보이면 또 다른 커뮤니티로의 질적 변화가 이루어질지도 모른다. 여성가족부가 존폐 위기에 놓이는 사회에서 '페미니스트'는 여전히 불리한 이름이고, 그러니까 이 사람들은 스스로 불리한 이름을 골라서 모인 사람들이고, 이를 통해 이미 어느 정도 불리함을 개인으로부터 분리해내는 데 함께 기여하고 있으니 다음 미래를 믿어봄 직하지 않을까?"]}, {"title": "마법의 디자인", "author": "사키모토 신지", "genre": "디자인, 미술, 예술", "publisher": "우듬지", "passages": ["<디자인에는 정답이 없다>라는 말을 자주 듣는다. 나 또한 그렇게 생각한다. 그러나 다양한 '정답'이 있기 때문에 오히려 즐거운 일이라고 생각한다. 한편, 디자인의 긴 역사 속에서 <사람들이 반드시 아름답다고 느끼는 기억> 이나 <기분이 좋아지는 배색>, <읽기 쉽고, 가슴에 오래 남는 문자 디자인> 등의 실천적 테크닉이나 법칙도 매우 많이 생겨났다. 이런 테크닉이나 법칙은 인간의 본능적인 부분과도 깊은 연관성이 있기 때문에 많은 사람들은 무의식적으로 <좋다>고 느끼게 되는 것이다. 앞으로 디자인을 배울 사람이라면 이런 테크닉이나 법칙, 또는 원리를 사용해야 할 것이다. 위대한 선인들이 쌓아온 업적이 있으니 이왕이면 그런 것들을 기본으로 익힌 다음에 계속 활용해 나가도록 하자.", "독자의 의도를 제대로 전달하는 디자인, 소비자의 마음에 남는 디자인, 이해하기 쉬운 디자인을 제작하는 데 가장 중요한 것은 센스가 아니다. 디자인 제작에서 중요한 것은 다음의 두가지다. \"누구에게 무엇을 전달할 것인지를 명확하게 할 것(목적)\" \"그 목적에 필요한 최적의 디자인 방법(기본 법칙)을 선택해 제작할 것\"", "어떤 디자인 제작물이나 자료를 만들 경우, 그것을 작성하는 목적이나 읽는 사람의 속성, 완성된 이미지 등을 파악하지 못한 상태에서 대충 만들기 시작해서는 곤란하다. 손대기 쉬운 부분부터 아무런 생각 없이 만들기 시작한다면, 결국 제대로 완성하기 힘들다. 오히려 중간에 수정할 것들이 많이 생기거나, 전체적인 통일감이나 밸런스가 완전히 무너지게 된다. 같은 정보라도 무엇을 전달할 것이냐에 따라 디자인을 전개하는 방법은 완전히 달라진다.", "반드시 게재해야만 하는 정보나 사진과 제작물의 목적, 완성된 이미지 등을 준비해두면 실제 디자인 제작이 순조롭게 진행될 수 있다. 조금씩 만들어 나가면서 생각하는 것이 아니라 필요한 것을 먼저 순서대로 준비해놓고, 디자인을 제작한다는 커다란 흐름을 중요하게 기억하기 바란다.", "요소를 그리드에 맞춰서 배치하면 요소 간의 연관성이 생겨나 깔끔하고 질서 있게 완성된다. 레이아웃의 기본은 요소들을 맞추는 것이다. 맞추는 것만으로도 지면에 질서가 생긴다. 디자인에는 유일한 정답이 없지만 질서를 유지하면 아름다운 디자인에 가깝게 완성된다.", "유사한 항목끼리 그룹화하면 항목 간의 연관성이 강조되어 시각적으로 정보를 인식하기 쉬워진다.", "많은 정보를 게제하는 경우나 왁자지껄한 인상을 주고 싶은 경우에는 판면은 넓게, 여백은 좁게 설정함으로써 판면 비율을 높이는 것이 좋다. 천천히 읽어주기를 바라는 문서나 고급스러움을 추구하는 경우, 또는 차분한 인상을 주고 싶은 경우에는 판면을 좁게 하고 여백을 넓게 설정함으로써 판면 비율을 낮추는 것이 좋다.", "그리드는 지면에 수직 수평의 같은 간격으로 배치된 격자 상태의 가이드라인이다. 그리드를 이용한 레이아웃 기법을 그리스 시스템이라고 한다. 그리드 시스템은 20세기 유럽에서 처음 만들어진 모던 그래픽 디자인을 대표하는 디자인 기법 가운데 하나다. 그리드 시스템은 기본이 되는 사각형의 그리드를 하나의 단위로 설정하고 그 조합에 의해 지면을 구성하게 된다. 그리드에 따라 지면의 구성 요소를 배치하면 잘 정돈되어 보이고 아름다운 레이아웃을 구현할 수 있다. 미리 그리드를 작성해두면 구성 요소를 배치하는 데 기준이 되기 때문에 그리드가 없는 경우와 비교했을 때 레이아웃 작업이 훨씬 쉬워지게 된다. 그렇기 때문에 특히 텍스트의 양이 많은 자료나 잡지, 서적 등의 지면을 제작할 때 그리드를 이용하면 빠른 시간 안에 망설임 없이 어느 정도 수준 이상의 아름다운 지면을 제작할 수 있다. 또한 여러 페이지에 걸친 레이아웃의 경우에는 전체적인 통일감을 유지하는 것도 가능하다. 그러나 모든 페이지를 같은 레이아웃으로 구성하면 독자에게 단조롭고 지루한 인상을 줄 수 있기 때문에 주의할 필요가 있다. 같은 그리드를 사용하더라도 레이아웃 패턴에 변화를 줄 수 있다면 전체적인 통일감과 더불어 페이지별 독자성이라는 두 마리 토끼를 한꺼번에 잡는 것도 가능하다.", "사람들은 무의식적으로 비슷한 형태를 하고 있거나, 근처에 있는 것들을 하나의 덩어리로 연결시켜 인식하려고 한다. 이런 특징을 '게슈탈트 법칙'이라고 한다. 이것은 많은 사람에 해당되는 인간의 본질적인 특징 가운데 하나다. 디자인 제작에 이 특징을 제대로 이용하면 제3자에게 정보를 빠르고 정확하게 전달할 수 있다. 구체적으로 말하자면, 같은 그룹의 요소나 비슷한 요소끼리 가깝게 배열하고, 반대로 연관성이 없는 요소는 떨어뜨려 배열하는 것이다. 또한 전체에서 가장 눈에 띄게 강조하고 싶은 요소가 있는 경우는 그 요소만을 덩어리에서 분리시켜 배치하는 것이 효과적이다. 정보의 내용에 따라 그룹화시키거나, 독립시키는 등의 방법을 시도해보기 바란다. 디자인 요소 가운데에서 명확한 그룹을 만들면 전체적인 덩어리가 생겨나 직감적으로 내용을 이해할 수 있게 된다. 반면, 그룹화시키지 못하면 정보를 올바르게 전달하기 어려워진다.", "레이아웃의 기본은 요소끼리 맞추는 것에 있다. 사람들은 줄이 잘 맞춰진 것을 보면 본능적으로 아름답다, 좋다 고 느끼게 된다. 그렇기 때문에 도판이나 문자 등을 레이아웃할 경우 각 요소끼리 제대로 맞추는 것이 중요하다. 줄을 맞추면 디자인에 안정감이 생기고 정리되어 보이기 때문이다. 지면에 움직임이나 역동감을 주기 위해서 일부러 맞추지 않는 경우도 있지만 어디까지나 맞추기의 기본을 제대로 이해한 다음에 이러한 변화를 시도하는 것이 좋다. 인간의 뇌와 눈의 인식 구조는 매우 뛰어나기 때문에 아주 조금만 틀어져 있어도 금방 이상하다고 느끼게 된다. 그러므로 디자인할 때는 조금이라도 틀어지지 않게 제작하기를 권한다. 아무런 맥락 없이 무조건 맞추면 안 된다. 그룹화에서도 강조했지만 맞추기를 통해서 덩어리가 생기기 때문에 연관성이 높은 요소끼리 맞춰야 한다. 연관성이 떨어지는 요소들을 맞추면 독자에게는 이해하기 어려운 디자인으로 인식되기 때문이다.", "디자인에서는 이러한 대비를 강조하고자 하는 내용과 그렇지 않은 내용을 구분하기 위해 이용한다. 요소 간의 내용이나 목적에 따라 각 요소를 적절하게 대비시키면 지면상의 역할이 명확해지기 때문에 강약의 신축성이 생겨나 독자에게 정보를 정확하게 전달할 수 있게 된다.", "점프 비율이 높으면 감각적인 인상을 주기 때문에 호소력이 높아진다. 반대로 점프 비율이 낮으면 조용하고 차분한 인상을 주기 때문에 고급스러워 보이는 지면을 연출할 수 있다. (점프비율 = 대비의 정도)", "타이틀이나 중간 제목을 크게 설정하면 시선 유도가 뛰어난 결과를 만들 수 있기 때문에 지면을 훑어보는 것만으로도 중요한 정보를 전달할 수 있다. 이 방법은 순식간에 정보를 전달하고자 하는 광고나 잡지, POP 등에서 자주 이용되고 있다. 점프 비율이 높기 때문에 정보의 중요도가 명확하게 드러난다. 읽는다기보다는 훑어보는 느낌으로 정보를 쉽게 받아들이게 된다. 점프 비율을 높이면 활력이 넘치는 결과물을 만들어내기 쉽기 때문에 즐겁고 건강한 인상을 주고자 할 경우에도 효과적이다. 점프 비율을 낮추면 고급스러움이나 신뢰성, 고급스럽고 설득력 있는, 지적인 감각 등의 이미지를 줄 수 있다. 시간을 들여서 천천히 읽어주기 바라는 책이나 카탈로그, 엽서 등에 어울린다고 말하기도 한다. 점프 비율을 낮추면 여유로운 느낌이 들기 때문에 고급스러움을 연출하고자 하는 광고 등에도 효과적이다. 왼쪽의 사례는 메인 타이틀의 사이즈가 큰 만큼 무겁고 답답한 인상을 준다. 그에 비해 오른쪽의 사례는 메인 타이틀을 작게 배치하여 속삭이는 것처럼 조용한 인상이다.", "문자 크기는 소리 크기에 맞춰서 생각할 수 있다. 문자가 단조롭게 나열되어 있는 레이아웃은 아무런 변화가 없는 톤으로 이어지는 지루한 강의처럼 귀에 들어오지 않는다. 자신의 생각을 상대방에게 전달하기 위해 강약을 조절하면서 말하는 것처럼 내용에 따라 문자의 크기나 굵기, 색이나 서체의 종류에 차이를 주어 지면에 변화를 만들어낼 필요가 있다. 단조로운 지면 구성으로 디자인의 전달 포인트가 직감적으로 전달되기 어렵다. 또한 보기에도 생동감이 없어 뒤로 물러서는 것 같은 인상을 주고 있다. 모든 요소를 크게 강조하려다 보면 서로 큰 소리로 자기주장만 내세우는 대화처럼 나쁜 인상을 주게 되고, 정보도 명확하게 전달하기 힘들다. 강약이 있는 대화와 같이 강조할 부분과 그렇지 않은 부분을 명확하게 함으로써 지면의 가독성이 향상된다. 또한 보기에도 활기가 넘치는 인상을 준다.", "반복, 나열이란 여러 장의 사진이나 도판, 문자 등을 동일한 디자인 법칙으로 레이아웃하는 방법이다. 다수의 요소에 같은 디자인 법칙을 적용함으로써 요소들의 규칙성을 만들어낼 수 있고, 그 결과 전체적으로 정리된 느낌과 통일감이 생겨난다. 반복, 나열은 매우 심플한 방법이지만 그 효과는 절대적이라고 말할 수 있다. 특히 목적이나 역할이 같은 레벨의 요소가 지면에 다수 존재하는 경우에는 더욱 효과적으로 활용될 수 있다.", "지면에 요소를 배치할 때에는 각 요소의 무게를 눈으로 측정하면서 전체의 중심을 고려해 레이아웃해야 할 필요가 있다. 무게는 문자, 사진, 도판, 색의 농도 차이에 따라 변환시켜 생각해볼 수 있다. 농도나 밀도가 높은 것은 무겁고, 반대로 낮은 것은 가벼워진다. 문자는 굵게 하거나 글자 간격을 좁게 설정하면 밀도가 높아지기 때문에 전반적으로 무겁게 느껴지게 된다. 사진이나 색은 배경과의 콘트라스트가 크면 클수록 무겁게 느껴진다. 또한 같은 굵기의 문자나 사진, 색채라 해도 색이 진할수록 무거워지고 연할수록 가벼워진다.", "모든 요소를 지면의 중앙에 배치하면 지면의 좌우에 균등하게 여백이 생긴다. 이것은 균형 잡힌 지면 디자인을 완성할 수 있는 가장 무난한 여백의 설정 방법이다. 이와는 반대로 좌우 어느 한쪽에 요소를 맞춰서 배치하면 당연히 여백은 한쪽으로 쏠리게 된다. 이에 따라 밀도가 높은 부분과 낮은 부분의 콘트라스트가 생겨나기 때문에 디자인에 강약이 부여된다. 눈길을 끌고 싶은 요소 주변에 넓은 여백을 설정하면 다른 요소와의 대비가 생겨나기 때문에 그 부분을 독립된 존재로 인식시킬 수 있다. 또한 동시에 여백이 없는 부분을 하나의 그룹으로 인식시키는 것이 가능하다. 여백이 좁으면 활력이 넘치는 인상을 주고, 여백이 넓으면 고급스럽고 풍부한 인상을 주게 된다.", "처음부터 요소를 지면의 중앙에 배치하면 상하좌우의 여백이 균등해져 공간적인 확장성을 연출하기 힘들다. 요소를 지면의 끝에 배치하면 넓은 여백이남게 되어 다양한 레이아웃 패턴을 검토할 수 있다. 공간적인 확장성을 연출하기 위해서는 좌우가 균등하지 않은 여백이 필요하기 때문에 통상적으로는 지면의 끝에서부터 각 요소들을 맞춰서 배치해 나간다. 상하좌우 어느 한쪽 끝으로 요소를 맞추면 요소가 몰려 있는 부분과 여백이 생겨나는 부분이 명확하게 분리되기 때문에 공간의 확장성이 한 방향으로 고정된다. 그 결과 공간의 확장성과 안정감이라는 두 마리 토끼를 모두 잡을 수 있게 된다.", "지면 안에 적절한 여백을 설정한 경우라도 지면의 네 방향 모두에 어떤 요소가 배치되어 있으면 빠져나갈 수 있는 공간이 없어지기 때문에 외부로의 확장성이 차단되어 경우에 따라서는 옹색하고 답답한 인상을 줄 수도 있다.", "대칭성이 있는 것은 사람들 눈에 규칙이 있는 도형으로 인식되기 때문에 사람들은 무조건적으로 아름답다고 느끼게 되는 것이다. 대칭적으로 배치해서 좌우 여백을 균등하게 하면 안정감이 느껴지면서 정적인 인상의 지면이 만들어진다. 따라서 이 방법은 격식, 전통, 클래식 등의 디자인에 적절하다. 심메트리는 지면 중앙에 수직의 선이 있어 좌우가 대칭인 이른바 가운데 맞추기가 일반적이다. 이 구조를 살리는 포인트는 적절한 여백을 만드는 것에 있다. 배치할 요소가 너무 많거나, 요소를 지나치게 크게 배치하면 압박감이 느껴져 답답한 인상을 줄 수 있다. 또한 배치하는 요소가 너무 적어도 대칭성을 연출하기 어려우므로 주의하기 바란다.", "아래쪽에 무게중심이 있는 삼각형 구도는 안정감이 강조된다. 한편, 위쪽에 무게중심이 있는 역삼각형 구도에서는 긴장감이 느껴진다.", "같은 지면 위에 여러 장의 사진이 게제되어 있는 경우 사진의 조합 방법이나 크기, 배치 방법 등에 따라서 인상이 크게 달라진다. 몽타주 이론은 사진들의 관계성으로 상황을 암시하는 기법이다. 몽타주는 프랑스어로 조합하다, 조립한다라는 뜻이다. 다양한 컷의 조합으로 다양한 의미를 만들어낼 수 있는 기법이다. 여러 장의 사진을 게제하는 경우에 배치하는 위치나 크기를 제각각 설정하면 사진 간의 연관성이 약해지기 때문에 스토리를 느낄 수 없다. 사진의 크기를 맞춰서 배치하면 사진 간의 연관성이 강조되기 때문에 지면에 하나의 스토리가 생겨난다.", "배경을 따내면 피사체가 독립되어 활기차고 즐거운 느낌을 주기 때문에 움직임을 연출하고자 하는 경우에 잘 어울린다. 디자인적인 악센트로서도 효과적이다.", "인물이 옆을 바라보고 있는 사진과 같이 피사체에 방향성이 있는 경우는 피사체의 시선 앞쪽에 공간을 비워두면 미래를 생각하고 있는 인상을 전달할 수 있다. 반대로 뒤쪽에 공간을 비워두게 되면 과거를 추억하는 것 같은 인상을 줄 수 있다.", "지면에서 사진이 지닌 임팩트는 매우 크기 때문에 사진의 크기나 배치 간격 등을 조절함으로써 전달하고자 하는 정보를 시각적으로 컨트롤할 수 있다. 여러 장의 사진을 레이아웃할 때에는 사용하는 사진에 메인이나 서브 등의 역할을 부여해서 크기나 간격을 조절하는 것이 중요하다. 관계성을 강조하고자 하는 경우에는 가깝게 배치하고, 관계성을 약하게 하고 싶은 경우에는 간격을 떨어뜨리면 정보의 차이가 명확해진다.", "정보량이 많은 위치에 문자를 올리면 배경과의 콘트라스트를 충분히 확보할 수 없기 때문에 문자를 읽기가 매우 힘들어진다. 정보량이 적은 곳에 문자를 배치했지만 문자 주변에 충분한 공간이 없기 때문에 옹색한 인상을 주게 된다. 사진을 트리밍해서 정보량이 적은 위치를 충분하게 확보하고 문자를 올리면 사진과 문자에 일체감이 생겨서 매력적으로 완성된다.", "난색은 빨강을 중심으로 한 색상이다. 태양이나 불을 연상시키는 색이다. 심리적으로 흥분색 이라고 해서 사람의 마음을 고양시키는, 식욕을 촉진시키는 등의 효과가 있다. 한색은 파랑을 중심으로 한 색상이다. 일반적으로 물이나 얼음을 연상시키는 색이다. 심리적으로 진정색 이라고 해서 마음을 진정시키는, 식욕을 감퇴시키는 등의 효과가 있다. 중성색은 초록이나 보라 등과 같이 온도가 확실하게 느껴지지 않는 색이다. 중간적인 색이기 때문에 다른 색들과의 조합에 따라 그 색의 이미지가 좌우된다. 무채색은 색감이 없는 색이다. 기본적으로 어떤 색과 조합해도 조화가 이루어지는 만능 색이다. 한편으로는 냉정하고 스타일리시한 인상을 주는 색이기도 하다.", "따뜻함, 적색 - 불타오를 것 같은 활발한 이미지. 기분을 북돋워서 건강하게 만든다. 사랑의 색 차가움, 청색 - 성실함과 신뢰감을 느낄 수 있는 이미지. 냉정하고 속도감을 느낄 수 있다. 지성적인 색. 자연적, 녹색 - 자연의 생생한 초목의 이미지. 기분을 넉넉하게 해준다. 생명력이 넘치고 릴렉스 효과가 있는 색 인공적, 진한 하늘색 - 드라이하고 이성적인 이미지. 마음을 밝고 편안하게 한다. 젋고 청결함이 느껴지는 색. 부드러운, 핑크색 - 사랑스럽고 환상적인 이미지. 아름답고 마음이 풍족해진다. 봄이 다가오는 것을 알려주는 행복의 색. 딱딱한, 진한 남색 - 중후함이 느껴지는 지적인 이미지. 쿨하고 차분하고 어른스러운 인상. 성실하고 시크한 색 빛, 황색 - 태양빛이 비치는 것 같은 이미지. 마음을 따뜻하게 하고, 기분이 즐거워진다. 바람, 연한 하늘색 - 시원한 바람을 느낄 수 있을 것 같은 이미지. 푸른 하늘 아래에 있는 것 같은 해방감을 준다. 젋고 상쾌한 색 고급스러움, 자주색 - 어른스럽고 고급스러운 이미지. 감성을 높이는 힘이 느껴진다. 신비로우면서도 기품있는 색. 활발함, 오렌지색 - 생생한 기운을 전달하는 태양의 색. 따뜻함이 있고 양기가 넘쳐나 기분이 즐거워진다. 비타민 같으면서 온화한 색. 신선함, 황록색 - 봄의 새싹과 같은 순수한 이미지. 신선하게 시작하는 기대감을 준다. 생명력이 있고 프레시한 색 숙성한, 갈색 - 대지나 나뭇가지 등의 자연을 연상시킨다. 신뢰감이 있고 역사도 느낄 수 있다. 따뜻하고 모던한 색.", "진한 색은 무겁고, 연한 색은 가볍다고 생각하는 일반적인 색의 연상작용 무거운 색을 위로 하면 중심이 위로 올라가기 때문에 공간의 확장성이 느껴지고, 반대로 아래에 두면 무게중심이 내려가기 때문에 안정감이 느껴진다. 문자나 도판의 보기 쉬운 정도나 보기 불편한 정도는 명도 차이에 의해 결정된다. 명도 차이가 적으면 보기 불편해지고, 명도 차이가 크면 보기 편해진다 확실하게 잘 보이는 것을 시인성이 높다고 하고, 보기 불편한 것을 시인성이 낮다고 한다. 채도가 높은 색끼리 조합하면 하레이션 halation 이라고 부르는 현상이 나타나는데, 눈이 부신 느낌이 나기 때문에 그 요소를 보기가 불편해진다.", "유사색이나 동일 계열 색의 조합으로 배색을 할 때에는 명도에 차이를 주기 바란다. 명도 차이가 적으면 눈에 잘 띄지 않는 디자인으로 완성되기 쉽다.", "조화로운 배색의 기본은 같은 톤으로 색을 맞춘다는 것이다. 톤은 색의 밝기다. 톤을 맞추면 자연스럽게 조화로운 배색이 된다. 그러나 복수의 색을 사용하는 경우에 모든 색의 톤을 다 맞추다 보면 색의 강약이 생기지 않기 때문에 상대적으로 밋밋한 인상을 주는 경우도 있다.", "그라데이션이란, 색을 단계적으로 변화시켜서 배열한 다색 배색이다. 따라서 깊이감이나 공간감을 연출하는 경우에 자주 사용된다.", "명조체나 세리프체가 독자에게 주는 인상은 획의 굵기에 따라 달라진다. 획이 굵은 서체는 권위적, 역사적, 남성적, 성인 등의 인상을 주고, 획이 가늘어지면 유연, 모던, 중성, 품격 등의 인상을 준다. 명조체는 손으로 쓴 붓끌씨의 해서를 형식화한 서체다. 끝에 돌기가 있는 것이 특징이다.", "문자의 형태를 나타내는 용어로 서체와 폰트가 있다. 서체는 동일한 콘셉트에 따라 디자인한 스타일의 글자체를 말한다. 한글에서는 명조체, 고딕체 등이 여기에 해당된다. 한편, 영문에서의 폰트는 금속활자를 이용해 인쇄하던 시대에 사용했던 단어로 같은 크기, 같은 디자인의 영문 활자를 말한다. 지금은 같은 디자인의 한 종류의 문자 모음을 폰트라고 부르는 경우가 많다. 그러나 현재 서체와 폰트는 거의 같은 의미로 사용되는 경우가 많고, 아무런 구분 없이 모호하게 사용되는 것이 현실이다.", "명조체의 경우에도 품이 좁거나, 글자 면적이 좁은 서체에서는 붓글씨의 느낌이 강하게 살아 있기 때문에 고전적이고 격식을 갖춘 것 같은 인상이 강하다 한편, 품이 넓고 글자 면적이 넓은 서체에서는 현대적이고 캐주얼한 인상을 받게 된다.", "문자의 크기로 입체감을 만들 때 어느 정도의 차이를 줄 것인지 고민스러운 경우가 있다. 이럴 때에는 등배나 등차 등을 기본 축으로 해서 차이의 정도를 고민하면 좋다. 명확성을 더욱 강조하고 싶다면 크기에 변화를 주기 쉬운 등배를 권한다.", "디자인에서는 지면을 연출하는 장식적인 요소로 영문 서체를 활용하는 경우가 종종 있다. 정보를 전달하기 위해 문자를 사용하는 것이 아니라 지면을 연출하는 요소로서 사용하는 문자다. 한글만으로는 딱딱한 인상을 줄 수 있는 경우에도 악센트로서 영문 장식을 사용하는 경우가 있다. 영문의 매력은 폭넓은 예술적 연출이 가능하다는 것이다. 알파벳은 한글이나 한자와 같은 복잡함이 없고, 문자 자체가 기호와 같이 심플하기 때문에 가독성을 유지하면서도 다양한 표현이 가능하다. 문자를 크게 사용하면서 과감하게 일부를 절단한 디자인은 의미를 스트레이트로 전달하기 좋은 표현 방법이다. 또한 알파벳이나 숫자는 글자의 형태가 심플하기 때문에 문자의 일부가 보이지 않더라도 어떤 문자인지를 충분히 인식할 수 있다.", "문자에는 제대로 읽고 이해해주기를 바라는 읽게 만들어야 하는 문장과 순간적으로 눈길을 끌게 만드는 역할을 하는 보여주기 위한 문자가 있다. 지면 안에 보여주기 위한 문자가 있는 경우에는 그것을 아이콘화하는 방법이 있다. 아이콘화하면 정보를 순식간에 인식할 수 있게 되고, 보기에도 좋아진다."]}, {"title": "마은의 가게", "author": "이서수", "genre": "소설", "publisher": "문학과지성사", "passages": ["나는 달을 바라보며 지화 씨에게 그 얘기를 다시 꺼냈다. 아무래도 장사를 해야 할 것 같다고. 지화 씨는 지난번과 비슷한 반응을 보였다. \"도대체 장사를 왜 하려고 그래?\" \"엄마도 하잖아.\" \"먹고살 게 없으니까 하는 거야.\" \"나도 그래. 나도 먹고살 게 없어.\" 지화 씨는 말문이 막힌 듯 아무런 대꾸가 없었다. 내 딸은 어쩌다 먹고살 게 없는 사람이 되었을까. 아마도 그런 생각을 하는 것 같았다. 먹고살 게 없어서 장사를 해보려는 공마은. 그게 바로 나였다. 숫자에 연연하지 않겠다고 다짐했지만 요즘 들어 수시로 내 나이가 떠올랐다. 3년만 지나면 마흔이라는 사실이 무겁게 다가왔다. 어느 정도 내세울 만한 이력이 필요한 나이 같았지만 나에게는 그런 게 없었다. 모아놓은 돈도 많지 않았다.", "\"나는 섬세한 사람이 좋은데 그런 사람은 없더라.\" 내가 하고 싶은 말을 이모가 먼저 했다. 섬세한 사람을 좋아한다는 건 상처받고 싶지 않다는 의지의 표현이나 다름 없었다. 나는 우리 둘 다 겁쟁이라서 친구가 없다는 결론을 마음속으로 내렸다.", "\"좋은 가게를 열었네. 잘될진 모르겠지만 열심히 해봐. 죽기 살기로 해봐.\" 나는 대꾸 없이 희미하게 미소 지었다. 죽기 살기로 살아왔던 지난날들에 대한 보상이 바로 이 가게였다. 단 한 번일지라도 마음 편한 직장을 가져보는 것. 그러나 가오픈한 지 닷새 만에 나는 그것이 대단히 큰 착각이었음을 깨달았다.", "이웃 사장들에게 떡을 돌려야 한다는 지화 씨의 말을 나는 끝까지 듣지 않았다. 그들과 등지고 살려는 건 아니었다. 단지 친근한 관계를 만들고 싶지 않았을 뿐이다. 도움받을 일을 가급적 만들지 않고, 도움 줄 일도 거의 없었으면 했다. 도움은 간섭으로 쉽게 변질되고, 상대가 자기 말을 듣지 않으면 어느샌가 상대를 압박하게 되니까. 어리석다고 타박하게 되니까. 사회생활이든 교우 관계든 나는 늘 그게 고민이었다. 이젠 독립된 섬처럼 내 가게 안에만 머물며 장사하고 싶었다. 물론 지화 씨에겐 이런 말을 하지 않았다. 그러면 안 된다고 잔소리를 할 게 분명하니까.", "\"엄마는 장사 그만두고 싶은 생각 없어?\" \"이거라도 하면 그래도 밥은 먹고 살아. 남는 반찬이 있으니까.\" \"그 정도잖아.\" \"병원비도 조금씩 벌고.\" \"그 정도잖아.\" \"공과금도 내고.\" \"그러니까 딱 그 정도잖아. 미래를 위한 계획 같은 건 전혀 없잖아.\" 지화 는 잠시 침묵하다가 말했다. \"마은아, 장사하는 사람들은 다 우리 같지 않을까?\" 나는 아무런 대답도 하지 못했다. 벌써 몇 년 동안 장사를 한 것 같은 기분이 들었다. 좌절은 시기상조인데. 그러나 이 가게의 앞날이 그리 밝지 않을 것 같은 기분은 사라지지 않았다.", "\"마은아, 너는 지금 행복해?\" 나는 언니의 질문에 잠시 침묵했다. 나는 행복한가. 열심히 장사를 하고 있지만 밤마다 두려움을 느끼며 잠을 설치는 나는 행복한가. 그럴 리가 없지. 손님들 앞에선 밝게 웃지만 적자를 예상하고 저녁밥을 컵라면으로 때우는 나는 행복한가. 그럴 리가 없지. \"언니는?\" \"나는 행복하진 않아 근데 괜찮아. 행복한 게 중요한 게 아니니까. 괜찮은 게 중요한 거지.\"", "\"연대하자는 게 왜 광고판이야?\" \"나도 연대가 좋아. 근데 진정한 연대가 뭔지 모르겠어. 인스타그램이나 트위터에만 있는 것 같아. 목소리를 내는 게 크게 두렵지 않고, SNS로 자기 홍보를 잘하는 사람들이나 실천할 수 있는 거 같아. 계층이 있어. 여기에도. 그런 자원에 접근하고 싶지 않거나 접근하고 싶더라도 할 수 없는 사람들도 있거든. 마음의 벽이라는 것도 있고. 소용없을 것 같아서 지레짐작으로 하는 포기도 있고. 의지를 가질 수가 없는 거지. 예전엔 개인의 문제라고 생각했는데 이젠 아닌 것 같아. 일과 이 사회 때문에 지쳐서인 것 같아.\"", "우리는 동등할 수 없는 걸까. 이웃이자 손님인 그들과 자영업자는 결코 동등해질 수 없는 걸까. 무조건 그들의 취향에 나를 맞추고 그들의 평가에 전전긍긍해야 할까. 자영업자니까, 서비스업이 금만 이상한 소문이 돌아도 학부모들이 나를 자르려고 탄원을 해올 것이라고. 그러면 가르치는 일로밖에 벌어먹고 살 줄 모르는 나는 이 사회에서 살아갈 수가 없게 될 거라고. 상주는 그 말들에 다 동의했지만 내게 사과를 하지는 않았다. 너 역시도 보고 싶은 것만 보며 좁게 살지 않냐고 되물었을뿐이다. 그 말은 오랫동안 뇌리에서 사라지지 않았다. 맞는 말이었다. 나는 좁게 살아간다. 비밀 첩보원처럼. 들키지 않으려고. 그래서 계속 촌스럽게만 남아 있는지도 모른다.", "\"그래도 말했어야지\" \"뭐하러 그래. 별일도 아닌데 괜히 걱정하고. 마음 졸이고.\" 진영은 다시 또 담배 한 개비를 꺼내 물었다. 바람이 너무 많이 불어서 불을 붙이는 데 좀 애를 먹었다. \"마음 졸이게 했어야지.\" \"뭐하러.\" \"같이 졸이게 해줬어야지.\"", "서로 다른 두 사람이 모든 것을 공유할 수는 없었다. 나는 오랫동안 그런 식으로 문제를 해결해왔다. 다른 방식은 알지 못했다. 물론 병에 대해서는 말해야 했는지도 몰랐다. 하지만 난 정말 겁이 났었고 진영과의 관계가 끝나지 않기를 바랐기 때문에 내린 결정이었다. 병보다도 더 두려웠던, 그때 느낀 불안들을 들키고 싶지 않았다. 그것이야말로 나 혼자 감당해야 할 몫이었다.", "언덕길을 지나다 경치가 좋은 공터를 발견했을 때에는 미셸에게 잠깐 쉬었다 가자고 말한 후 차를 세우고 내렸다. 고등학교를 다닐 때 자주 지나는 곳이었지만 한 번도 들어가본 적은 없었다. 물론 그런 곳들은 아주 많았다. 안다고 생각하는데 사실은 전혀 알지 못하는 곳 어쩌면 별것도 아닌 그 풍경을 한참 바라보았다. 오래 바라보고 싶은 풍경과 마주하는 게 참으로 오랜만이었다.", "사람들은 자기가 하는 말이 무슨 뜻인지 잘 모를 때가 많다. 어릴 때만 그런 건 아니다. 미안하다는 말도 그렇다. 그 마음을 갖지도 않은 채로 그 말을 한다. 반장은 이번에도 나의 어디가 구체적으로 어떻게 이상하다는 건지는 말하지 않았다. 나도 자세히 묻지 않았다. 뒤늦게 또 상처를 받을 것 같았기 때문이었는지도 모른다. 반장이 '우리'라고 말하면서 나를 싫어했던 사람이 자신만이 아니었다는 걸 상기시키는 것에도 마음이 상했다.", "\"진짜 용서 안 해줄 거야?\" 이제 와서 그런 게 뭐가 중요하냐고 묻고 싶었다. 이렇게 우연히 만나지 않았다면 절대 구하지 않을 용서 아니었냐고. 내가 용서를 해준다고 해서 뭔가 달라지는 것이 있느냐고. 나는 그런 것들을 묻지 않았다. 반장이 어떤 대답을 내놓는다고 해도 그렇게 애원하는 듯한 표정을 보니 원하는 답을 해주기가 싫어졌다. 어릴 때에 누군가에게 오랫동안 미움만 받았던 기억은 도무지 지워지지가 않았다. 상처가 됐다. 내 마음대로 할 수 있는 일이 아니었다. \"안 해줄래. 그러니까 그냥 계속 싫어해.\"", "물론 그것은 물리적으로 가능한 일이긴 하지만 따지고 보면 나는 물리에 대해서는 아는 게 거의 없는 편이라서, 게다가 물리도 이 세계에 대해 완전히 다 아는 건 아니지 않나 싶기도 해서, 그런 확신이야말로 어떤 것을 이해하는 일에서 더 멀어지게 할 뿐일 테니까, 그 사람이 원진이었다고 믿으면 안될 건 또 뭐람, 하고 생각해버린다.", "살면서 다시는 유코를 만날 일이 없을 것이라고 생각했다. 그게 슬프지는 않았다. 전혀 아무렇지도 않았다. 아주 많은 사람을 다시는 만나지 못하면서 살아가니까.", "나는 내 좌표가 어디인지 정확하게 찍으려는 사람들 앞에서 늘 애매모호한 사람이 되어 얼버무렸다. 하지만 그 순간만큼은 내가 어디에 서 있는지를 분명히 말했어야 했는지도 모른다. 큰 것을 무화시키는 작은 이름들.", "정은은 문득 그걸로는 충분하지 않다는 생각이 들었다. 사과만으로는 부족했다. 사과만으로 뭘 할 수 있는데. 뭐가 달라지는데. 어떻게 나아지는데. 원하는 것은 원상 복구뿐이었는데 그건 불가능했다. 사과 이상의 것이 필요했다. 하지만 미안하다는 말조차 단 한 차례도 없었고, 당연히 그 이상의 것도 없었다. 내내 불편하기만 했던 식사를 하고 위로금 조인지 모를 돈 십만원을 받기는 했지만 사과가 선행되지 않았으므로 그게 사과 이상이 될 수는 없었다. 그건 사과 이하였다. 사과 미만이었다.", "저는 기억력이 나쁘단 말이에요. 이런 거 안 찍어두면 다 까먹을 거라고요. 끝끝내 정은이 사진을 찍으면서 그렇게 투덜거리면 까먹어도 괜찮다고 말했다. 다 까먹으면 어때. 그때는 또 다른 걸 하면 돼. 지나간 일은 떠올릴 시간도 없이 정신없이 살면 돼. 정은은 뒤늦게 그 말을 곱씹어보았다. 정신없이 사는 것은 너무 어려운 일이었다. 무엇보다도 살아간다는 것이 마음먹은 대로 되지가 않았다.", "너 인영이 기억해? 고3 때 같은 반이었던. 걔가 돈 빌려다라고 전화했더라. 거의 십 년 만에 연락해서는 돈 빌려달라는 얘기부터 꺼내는 사람한테 어떻게 빌려줘? 정은이 호들갑을 떨며 그렇게 투덜거렸을 때 혜수가 머뭇거리며 말했다. 난 빌려줬어. 얼마나 급했으면 나한테까지 연락했겠나 싶어서. 사정이 있는 것 같아서 현금 서비스 받아서 빌려줬어. 그러니까 십 년 만에 연락을 해왔다는 이유로 정은이 돈을 빌려주지 않았을 때 혜수는 정확히 같은 이유로 지갑을 연 것이었다.", "그날 이후 정은은 혜수처럼 되고 싶었다. 무엇보다도 친구의 좋은 점을 칭찬하는 사람이 되자고 마음먹었는데 아무리 애써도 잘 안 됐다. 누군가를 칭찬하는 건 상당한 열의가 필요한 일이었다. 그런 걸 잘하는 사람은 누군가를 위해 자신의 하루치 열량을 다 소모하는 것인지도 몰랐다.", "화가 머리끝까지 나서 미친듯이 화를 내고 싶었는데 속성으로 이루어진 검열 끝에 화를 내서는 안 된다고 결정했다. 그 말이 자신에게 얼마만큼 큰 의미가 있는지 들키고 싶지 않았기 때문이었다.", "살면서 결혼만큼 큰 결정을 내린 적이 없는 것 같아. 해보니까 별거 아니더라. 그 결정을 내리고 나니까 다른 것쯤은 쉽게 할 수 있을 것 같은 기분이지", "정말 좋지는 않겠지만. 그럴 리는 없겠지만. 가족들이 지나치게 맘 아파하며 걱정하는 꼴을 보기 싫어서 괜찮은 척 약을 파느라 하는 헛소리겠지만. 우리가 불행을 극복하는 방식은 태연해지는 것이었다. 낫는다는 것을 믿고 그 미래가 이미 도래한 것처럼 굴기. 그렇게 하면 반복되는 불행들을 점점 대수롭지 않게 여길 수 있었다.", "해야만 하는 일이 많았다. 원하든 원치 않든 삶은 오랫동안 계속될 것이고 거기엔 아주 많은 공을 들여야만 한다.", "죽는다는 건 어쩌면 그냥 마음이 산산이 흩어지는 건지도 모르지. 다른 누군가가 그게 무슨 말이냐고 되물었다. 처음에 기능을 다하는 건 몸뿐이지만 그렇게 되면 마음이 머물 곳이 없어지니까 마음은 산산이 흩어질 수밖에 없지. 그러면 너라고 할 만한 것은 완전히 사라지고 마는 거야. 너는 여러 마음들의 집합체 같은 거라서.", "그렇게까지 울기 위해서는 엄청난 열의와 압력이 필요했다. 절대 사라지지 않을 것만 같았던 악감정들을 온몸으로 울면서 모두 죽여버린 기분이었다.", "그런 사소한 이유 로도 살고 싶은 게 사람이 아니냐고 나는 대답했다. 죽고 싶은 이유를 수십 가지나 가지고서도, 자기 같은 건 아무짝에도 쓸모없다고 생각하면서도, 밤마다 엉엉 울면서도, 아침이면 일어나 허기를 느끼고 무언가를 먹고 마시며 포만해지는 게 사람 아니냐고. 그러자 삼이 내 얼굴을 꼴똘히 보다가 눈감고 아, 해, 하고 말해서 눈 감고 아, 했더니 내 입 속으로 '바람과 함께 사라지다'를 한 숟갈 넣어주었다. 이 달달함 때문에 살고 싶은 거냐고 물어서 차가운 단맛을 침으로 녹이며 그렇다고 고개를 끄덕였지만 사실 나는 맹물을 들이켜면서도 살아 있는 게 낫다고 생각하는 사람이었다. 그러니까 자살은 아니었다.", "하긴 영지의 말마따나 그건 집안에서의 일이었고 밖에서는 엄마가 어떤 사람인지 아빠가 어떤 사람인지 나도 잘 몰랐다. 우리 가족은 서로를 잘 모르는 한에서만 사이가 좋았다.", "현영처럼 반듯하게 잘 자란 사람과는 편하게 지내는 게 어렵다. 특별히 특별한 데가 있는 게 아닌 사람. 그냥 평범해 보이는 사람. 모두와 두루두루 원만하게 잘 지내는 사람. 대체로 좋은 사람. 이상하게 그런 사람들이 어렵다.", "여전히 자신의 의견을 피력하는 영호의 이야기를 들으며 나는 그야말로 '안물안궁'의 기분이었지만 고개를 끄덕였다. 그러니까 나는 네가, 시스젠더 헤테로 남성인 네가, 자라는 내내 나와의 가정 내 이권 다툼에서 늘 교모히 우위를 점하던 네가, 나와는 접점이 거의 없어 십 분 이상 대화를 이어나가는 게 무리인 네가 나에 대해 어떻게 생각하든 생각이란 걸 하든 말든, 이해를 하든가 말든가, 응원이고 나발이고 아무 관심이 없었지만, 정말 어쩌라고 싶었지만, 내 인생 하나 살기도 벅차다! 하고 외치고 싶었지만 웃으며 고개를 끄덕였다. 당신이 보여준 하해와 같은 아량에 깊은 감사를 표합니다 같은 표정을 짓는 것 정도는 전혀 어렵지 않았다.", "그때 나는 더는 참지 못하고 폭발하고 말았다. 생각해보니 이번 식사시간 동안만 참은 게 아니라 아빠의 딸로 태어나서 사는 내내 참아왔다. 정말이지 계속 참았다. 화병에 안 걸린 게 신기할 정도로 참았다. 이 심리적인 응어리가 실체를 가진 덩어리가 된다고 해도 이상하지 않을 정도로 참았다. 이미 몸속에 그런 게 있을지도 모르지. 사리라던가, 요로 결석이라든가.", "진짜 사랑하는 것도 아니잖아. 사랑하는 사람한테 어떻게 죽은듯이 살라고 말할 수가 있냐고. 만나서 한다는 소리가 끝까지 입 닥치고 살라는 말뿐이잖아. 그냥 이도 저도 못하게 하려고 사랑한다고 말하는 거잖아. 널 사랑하는 사람한테 어떻게 그런 상처를 주냐는 식의 죄책감을 심으려고. 그게 왜 상처가 되는지에 대해서는 제대로 설명하지도 못하잖아.", "나는 늘 끝나는 순간에 대해 생각한다. 영지와 나의 관계가 끝나는 순간에 대해 생각할 때도 많다. 바라는 끝이 있어. 내 이야기는 이렇게 끝났으면 좋겠어, 하고 기대하는 장면들. 나는 아주아주 행복한 사람으로 죽을 거야. 아무도 그걸 못 막을 거야.", "좋아하는 장소가 생긴다는 것은 마치 인생에 경력이 쌓이는 듯한 기분이어서 한편으로는 뿌듯하기도 했다. 나는 공원이 좋았다.", "\"비밀이에요?\" 그건 비밀이 아니었다. 공공연한 사실이었다. 하지만 모두들 모르는 척하고 있었으므로 나도 눈감아버렸다. \"그래. 그러니까 가줄래?\" 그 말에 아이는 자리를 뜨기는커녕 내 옆에 앉았다. 땅에 닿지 않는 다리가 공중에서 달랑거렸다. \"우는 사람을 혼자 두고는 못 가요.\"", "문득 나는 내가 사는 걸 무척이나 좋아한다는 것을 깨달았다. 그건 처음에는 너무 뜬금없고 이상한 감정처럼 느껴졌는데 점점 선명해졌다. 뜻대로 된 적은 별로 없지만 나는 사는 게 좋았다. 내가 겪은 모든 모욕들을 무슨 수를 써서라도 극복해내고 싶을 만큼 좋아한다. 그렇게 해서라도 사는 건 좋다. 살아서 개 같은 것들을 쓰다듬는 것은 특히나 더 좋다.", "그러니까 선천적으로 마음의 긴장도가 높아 솔직하게 다 표현하지 못하는 사람, 그로 인해 미련과 슬픔이 만들어내는 환시와 환청 속에 잠겨 이에 대해 말해야만 살 수 있는 사람이라니, 홀로 남겨졌다는 감각은 인물들의 일상 전체에 그림자처럼 드리워져 있다. 안정된 삶을 사는 친구들을 바라보면서 정상 생애 주기에서 벗어난 자신을 자각하는 것은 상시적으로 찾아오는 어긋남 속에 머무는 일이기 때문이다.", "소설은 관성적으로 반복되는 삶의 어떤 면을 무력하게 포용하는 대신, 상황을 불편하게 만들지라도 진심을 다해 거절하는 솔직함에서 비록하는 쾌가 분명히 있다고 말하는 것 같다.", "\"어차피 알 수 없는 일이며\"이며 \"이제 와서 그런 게 뭐가 중요하냐\"는 김지연 특유의 미묘한 초연함이, 과거에 다른 선택을 함으로써 생겨났을 수도 있는 다른 가능성에 대한 상상을 끊어내는 결단으로 향한다는 사실이 중요하다.", "그것은 충격적인 물리적 세계의 사건들 앞에서 약간의 거리를 유지하는 일, 각도를 살짝 기울여 환상에 침투해 들어가는 일이다. 현실과 어딘가 조금 어긋나 있는 엉뚱한 농담이 만들어내는 시간의 운동성 속에서 우리의 삶은 조금은 부드럽고 유연하게 풀리며 넓어지는 듯하다. 이것은 김지연이 우리에게 열어 보이는 가장 아름다운 환상인 동시에, 소설만이 할 수 있는 최대치의 일이 아닐까.", "요즘 나에게 있어 글쓰기란 엉엉 우는 일과 비슷하다는 생각을 한다. 이왕이면 온 힘을 다해 남김없이 잘 울고 싶다. 홀가분한 마음으로 남은 일을 해낼 수 있도록. 그리고 어디선가 혼자 우는 사람이 없는지도 돌아보고 싶다. 누구도 혼자 울지 않았으면 좋겠다."]}, {"title": "만화의 이해", "author": "스콧 맥클라우드", "genre": "만화", "publisher": "비즈앤비즈", "passages": ["카툰화를 정의하려면 만화에 할애한 만큼의 지면이 더 필요하겠지만, 여기서는 카툰화법을 '단순화를 통한 전달효과 확장'의 한 형식으로 보려 합니다. 카툰화법을 통해서 형상을 추상화하는 것은 세부묘사를 없애는 것 이상으로, 특정부분에 초점을 맞춰 가는 것입니다. 핵심 \"의미\"가 나올 때까지 주어진 형상을 벗겨내면, 작가는 사실묘사를 했을 때보다 그 의미를 확장시킬 수 있습니다.", "우리 인류는 자기 중심적인 종족입니다. 우리는 모든 것에서 우리 자신을 봅니다. 아무 것도 없는 곳에도 정체성과 감정을 부여합니다. 그리고는 세상을 우리 방식에 따라서 재구성합니다.", "두 사람이 얘기할 때는 보통 마주보기 마련인데, 이때 서로 상대방의 얼굴 특성을 생생하게 보게 됩니다. 그들은 끊임없이 자기 얼굴을 의식하는데, 이때 정신에 떠오르는 모습은 전혀 생생하지 않습니다. 단지 대강의 모양과 배열 일반적인 배치 정도의 느낌입니다. 단순하고 기본적인 어떤 것 바로 카툰화로 말입니다. 그래서 얼굴을 사진이나 사실화로 대할 때는 그것을 다른 사람의 얼굴로 보게 됩니다. 하지만 카툰화의 세계로 들어오면 자기 자신으로 보이는 것입니다. 보편적인 동일시, 단순성, 그리고 많은 카툰화된 캐릭터들의 어린이스러운 모습 등 다른 이유들도 중요하지만, 저는 이것이야말로 어린 시절 우리가 카툰화에 빨려드는 일차적인 요인이라고 생각합니다. 카툰은 우리 정체성과 의식을 빨아들이는 진공상태입니다. 그 빈 껍데기를 우리가 채워넣음으로써 다른 세계로 여행할 수 있게 됩니다. 우리는 카툰화를 단지 바라보는 것만이 아니라, 스스로 그것이 되는 것입니다.", "마셜 맥루헌은 사람들이 비생명체와 상호작용할 때, 비시각적인 인식과 비슷한 현상이 일어난다는 걸 알아냈습니다. 예를 들어, 운전할 때 우리는 오감이 알려주는 것보다 훨씬 많은 것을 경험합니다. 보고 느끼고 들을 수 있는 부분만이 아니라, 차 전체가 끊임없이 우리 정신에 자리잡고 있습니다. 차는 우리 몸의 확장이 됩니다. 차는 우리의 정체성을 흡수하고, 우리가 바로 차가 됩니다.", "우리가 살면서 겪는 모든 사물은 두 영역으로 나눌 수 있습니다. 개념의 영역과 감각의 영역으로요. 우리의 정체성은 영구적으로 개념의 영역에 속합니다. 그것은 볼 수도 들을 수도 냄새 맡을 수도, 만지거나 맛 볼 수도 없습니다. 단지 사고일 뿐입니다. 그리고 이외의 모든 것들은, 처음에는 감각의 영역, 즉 우리들의 바깥세계에 속합니다. 서서히, 우리는 자신의 영역 너머로 나갑니다. 우리는 자기 신체의 모습, 냄새, 느낌, 맛 그리고 소리를 접하게 됩니다. 또한 우리를 둘러싼 세상을 말입니다. 그러고 나면 우리는 곧 물질세계의 사물도 역시 이쪽으로 넘어올 수 있다는 것을 알게 되고 그것들이 자체적인 정체성을 지니고 있다는 것을 알게 됩니다. 혹은, 그것은 우리들의 연장으로서 점점 생명력을 띄게 됩니다. 바로, 우리가 그 생명력을 빌려주는 것입니다. 카툰화는 물질세계의 겉모습을 줄이고 형태라는 관념을 취하기 때문에 스스로를 개념의 세계에 위치시킵니다.", "모든 매체의 이야기꾼들은 알고 있습니다. 바로 수용자의 관여도는 그들이 캐릭터들에게 감정이입을 느끼는 정도에 달렸다는 것을. 독자의 감정이입은 카툰화법의 전문분야이기 때문에. 카툰화는 전세계의 대중문화 속으로 뚫고 들어가는 것에 있어서 우월한 위치에 있습니다. 반면에, 벽돌담이나 풍경에 이입할 사람은 없을 테니, 배경은 좀 더 사실적으로 그려지곤 합니다.", "의미는 남습니다. 모양의 유사성은 없어집니다. 글이야말로 최종형태의 추상입니다. 많은 미국만화, 그 중에서 코믹북 형식은 오랫동안 말과 그림의 차이를 강조해 왔습니다. 글쓰기와 그림그리기는 별개의 훈련과정으로 간주되고, 작화가와 스토리작가를 별개의 부류로 보는 것입니다. 그리고 이 아주 다른 표현 형식들을 잘 조화시켜야 '좋은' 만화라고 합니다. 하지만 과연 얼마나 다를까요? 글도, 그림도 다른 아이콘들도 만화라는 언어의 어휘입니다.", "그림은 수용되는 정보입니다. \"메시지를 얻기 위해서\" 정식 교육을 받을 필요는 없습니다. 메시지는 즉각적이죠. 글은 인지되는 정보입니다. 추상화된 언어 상징을 해독하려면 시간과 전문지식이 필요합니다. 그림이 \"현실\"보다 많이 추상화될 수록, 더 높은 인지력이 요구됩니다. 더욱 언어에 가까워 집니다. 또한 글이 더 강하고 직접적이 될 때는, 요구되는 인지력의 수준도 낮아서 더 빨리 수용됩니다. 더욱 그림에 가까워지는 것이죠. 만화를 통일된 언어로 보고자 하는 욕구는, 글과 그림이 동전의 양면처럼 붙어 있는 가운데 지점을 바라보게 만듭니다. 그러나 세련된 만화를 만들고자 하는 욕구는, 말과 그림이 가장 멀찍이 떨어져 있는 바깥쪽 방향으로 가도록 만듭니다.", "현대는 점점 더 상징을 지향하는 문화가 되어가고 있습니다. 21세기가 되면 시각 아이콘언어가 범세계적인 통신의 한 형태가 되어줄 지도 모릅니다. 아이콘들이 작동하기 위해서는 우리가 직접 참여를 해야 합니다. 아이콘의 생명은, 여러분이 부여해 준 만큼만 생겨납니다.", "우리들은 자신의 감각을 통해서 세계를 하나의 전체로 인식합니다. 하지만 우리의 감각은 단편적이고 불완전한 세계를 드러낼 뿐입니다. 세상에서 가장 여행을 많이 하는 사람이라도, 평생 동안 세상의 극히 일부분만을 볼 수 있습니다. 우리가 \"현실\"을 인식하는 것은 단편들에 근거한 믿음의 작용입니다.", "만화의 칸들은 시간과 공간을 모두 분할합니다. 그럼으로써 분절된 순간들의 쪼개진 스타카토 리듬을 보여줍니다. 하지만 완결성 연상효과는 우리로 하여금 이 순간들을 연결시키게 하며, 정신 속에서 지속적이고 통일된 현실을 그리게끔 합니다. 시각 아이콘 언어가 만화의 어휘라면, 완결성 연상은 그 문법입니다. 만화에 대한 우리의 정의는 요소들의 배열을 매우 중시하므로 진정한 의미에서, 만화는 완결성 연상 그 자체인 셈이죠. 전자매체에서의 완결성 연상은 연속적이고, 대개는 비자발적이며 사실상 무의식적으로 이루어집니다. 그러나 만화에서는 완결성 연상은 연속적인 것과는 거리가 있으며, 결단코 비자발적이지 않습니다. 만화가 종이 이 위에 저지르는 모든 행동은 말없는 공범들의 도움과 부추김을 받습니다. 그리고 그 공범자는 바로 독자들입니다.", "만화는 단일 감각 매체입니다. 만화는 한 가지 감각만으로 경험의 세계를 전달합니다. 그렇다면 나머지 4가지는 어떻게 할까요? 소리는 말 풍선 등의 장치를 통해서 표현합니다. 하지만 그것은 여전히 전적으로 시각적인 표상일 뿐입니다. 이 칸 안에서 전달되는 모든 정보는 시각정보입니다. 하지만 칸과 칸 사이에는 어떤 감각도 필요하지 않습니다. 그렇기 때문에 오히려, 우리의 모든 감각이 개입하게 됩니다. 한 페이지 안에서도 몇 번씩, 독자들은 공중그네 타는 서커스 단원처럼 열린 상상의 세계로 던져졌다가 다음 칸에서 뻗어 나온 팔에 붙잡힙니다. 독자들이 혼란과 지루함의 심연으로 추락하지 않도록, 재빨리 붙잡아 줍니다. 하지만 완결성 연상 작용을 잘 조절하면 독자들이 날아오르는 방법을 배우게 할 수 있지 않을까요? 제가 보기엔 그렇습니다. 카툰화는 독자들에게 이미 개념으로 다가오기 때문에, 칸과 칸 사이의 개념적 영역을 쉽게 흘러가는 경향이 있습니다. 발상들은 자연스럽게 다음 칸으로 흐릅니다. 하지만 사실적인 형상은 그렇게 유연하지 않습니다. 이 형상들은 시각적인 존재감을 지니고 있어서, 쉽게 개념의 영역으로 들어오지 않습니다. 따라서 앞의 예에서는 연속동작으로 보이던 것이, 여기서는 정지된 그림들의 연속인 듯한 느낌이 듭니다. 비슷한 경우로, 비록 이유는 다르지만 만화가 그림 도형의 방향으로 가까이 갈 때도 마찬가지로 완결성 연상이 더 어려워집니다. 여기서 이 그림들을 전체로 느끼게 하는 것은 각각의 구성체인 칸들이 아니라, 디자인의 통합적 속성입니다. 대충 말해서, 독자들이 어떤 이야기에서 그림을 특별히 의식하게 되면 상당한 노력을 기울여야만 완결성 연상을 이룰 수 있다는 것입니다.", "만화가들은 독자들을 있는 것과 없는 것이 펼치는 소리 없는 춤 속으로 잡아끕니다. 즉 보이는 것과 보이지 않는 것 말입니다. 이 춤은 만화 특유의 것입니다. 만화가 아닌 다른 어떤 예술형식에서도, 이 정도까지 대중에게 많은 것을 주고, 또 그만큼이나 그들로부터 요구할 수 없습니다. 바로 이 때문에 저는 만화를 시각 예술과 산문 소설의 단순한 혼혈아로 평가해서는 안된다고 봅니다. 칸과 칸 사이에서 일어나는 일은 만화만이 해낼 수 있는 일종의 마술입니다.", "칸딘스키와 동료들은 어떻게든 감각을 하나로 모을 수 있는 예술을 찾아내고자 했습니다. 그럼으로서, 이러한 각기 다른 감각들에 호소하는 여러 예술 형식들을 하나로 묶어내고자 했던 것입니다. 우리는 이런 개념을 공감각미학이라고 부릅니다. 당시, 리하르트 바그너나 프랑스 시인 보들레르 같은 다른 분야의 예술가들이 비슷한 생각을 나타낸 것도 놀랄 일은 아니지요. \"예술은 보이는 것을 재생하는 것이 아니다. 오히려 보이게 만드는 것이다.\" - 파울 클레", "사실 어느 선에나 표현적인 요소들이 잠재되어 있지 않을까요? 방향을 주는 것만으로도, 선은 수동성과 무한성에서부터 자부심과 강인함, 역동성과 변화까지도 담아낼 수 있지요. 선의 모양에 따라서 매정함과 엄격함, 따스함과 부드러움 혹은 합리성과 보수성을 표현할 수 있습니다. 선의 특징에 따라서 야만성과 죽음, 나약함과 불안정, 솔직함과 직접성을 나타낼 수 있습니다.", "표현주의와 공감각미학은 그 속성상, 어그러지는 경향이 있습니다. 어그러짐이 너무 심하면 소재의 상 자체를 모호하게 만들 수 있습니다. 하지만 명료성의 결여가 오히려 독자들의 참여와 몰입을 더 강하게 만들 수도 있습니다. 그것은 많은 작가와 예술가들이 바라는 거죠.", "만화의 다양한 공감각적 아이콘 중 가장 널리 쓰이고 가장 복잡하며 가장 다용도적인 것은, 항상 있어왔고 늘 인기를 끌어온 말풍선입니다. 만화가들은 오랫동안 시각매체에 소리를 담아내고자 하는 필사적인 노력을 통해서 다양한 표현기법들을 개발해왔습니다. 풍선의 모양은 다양하며, 또한 날마다 새로운 모양들이 만들어집니다. 또한 풍선 안쪽에도, 갖가지 상징기호들을 적용하거나 아예 새로 발명해 넣어서 비언어적인 영역을 표현하고 있습니다. 말풍선 안팎에 사용되는 글꼴을 다양하게 하는 것도 소리의 본질을 잡아내려는 지속적인 투쟁의 일환입니다.", "물론 다른 어떤 시각 상징기호보다도, 글 자체에 이미 감각과 감정이라는 보이지 않는 영역을 완벽하게 묘사할 수 있는 힘이 있습니다. 글은 아무리 중립적인 듯한 그림에도 풍부한 감정과 경험을 실을 수 있습니다. 그림은 독자들에게 강한 감정을 일으킬 수 있으나, 글 만큼의 명료함이 모자랄 수 있습니다. 반면에 글은 명확하긴 하지만, 그림이 주는 것 같은 즉각적인 감정을 일으키지 못하고 느린 축적 효과에 의존합니다.", "글은 점점 더 전문화하고 추상화하고 정교해지면서 그림과는 점점 더 멀어져 갔습니다. 반면에 그림은 반대 방향으로 진화하기 시작했습니다. 추상성과 상징성이 줄어들고, 구상성과 명료성이 뚜렷해졌습니다. 1800년대 초, 서양에서는 미술과 글 사이가 가장 멀어졌습니다. 한쪽은 형태 유사성, 빛, 색, 눈에 보이는 모든 것에 몰입했고 다른 한쪽은 보이지 않는 보물들인 감각과 정서, 영성, 철학 따위에 흠뻑 빠졌습니다.", "하지만 곧 대폭발이 일어났습니다. 표현주의, 미래파, 다다이즘, 초현실주의, 야수파, 입체파, 추상적 표현주의, 신조형주의, 구조주의 그대로 되돌아오는 길만 빼고 전방위로 뻗어나갔습니다. 이 새 유파들에게는 엄격한 구상화 양식은 중요하지 않았습니다. 아이콘적이건 비아이콘적이건, 추상성이 멋진 컴백을 한 것입니다. 일부 화가들은 아예 그림도형의 정점을 향해 나아가, 외형도 외면적 의미도 버리고자 했습니다. 그러나 미술에서 주된 추세는 의미로 되돌아오는 것, 즉 현실 유사성이 아닌 개념의 영역으로 돌아가는 것이었습니다. 동시에 글 영역에서도 변화가 일고 있었습니다. 시는 이전의 그 난해한, 이중삼중으로 추상화된 언어에서 벗어나 보다 직접적인 양식, 심지어는 구어체로까지 나아갔습니다.", "제 생각에는, 우리 모두가 세상에 하고 싶은 말이 있습니다. 실제 문제는 \"누군가가 들어줄 것인가\" 입니다. 불행히도 그것을 미리 알 수는 없습니다. 그런 이유 때문에 멈추어 서지는 않는다고 한다면, 두 방향의 선택은 이런 의미가 있습니다. 형식을 선택하면, 그는 이제 탐험가로 나서는 것입니다. 목표는, 그 예술 형식의 가능성들을 모두 찾아내는 것입니다. 그렇다고 해서 그의 예술에 어떤 발상이나 목적이 없는 것은 아닙니다. 그의 예술이 바로 목적이 되고, 발상들이 떠올라서 내실을 채워줄 것입니다. 반면에, 첫째 단계를 목표로 선택하면 그의 예술은 도구가 됩니다. 그리고 그 예술의 힘은 그 속에 담긴 발상의 힘에 좌우됩니다. 여기서는 \"이야기 서술\"이 발명보다 우선시됩니다. 하지만 이야기를 가능한 한 효과적으로 전달하려면, 어느 정도 형식의 발명이 필요할 때가 많습니다.", "흑백과 컬러 만화 사이의 차이는 넓고도 깊어서, 읽는 경험의 모든 단계에 영향을 줍니다. 흑백에서는 예술 뒤에 있는 발상들이 더욱 직접적으로 전달됩니다. 의미가 형식을 앞서고, 예술은 언어에 가까워지지요. 단색 컬러에서는 형식 자체가 더 중요해집니다. 세계는 모양과 공간으로 이루어진 놀이터가 됩니다. 그리고 보다 표현적인 색채를 통해서, 만화는 흡입력 있는, 색채만이 줄 수 있는 감각들의 공간으로 변모할 수 있습니다.", "우리 모두는 깊은 고립 상태에서 살아가고 있습니다. 다른 어떤 사람도 여러분의 마음 속은 알 지 못합니다. 또한, 다른 사람에게 아무리 가까이 다가가도 여러분이 느끼는 바를 똑같이 느끼도록 할 수는 없습니다. 모든 의사소통 매체는 이렇게 마음에서 마음으로 직접 전달하지 못하는 우리의 슬픈 무능력 때문에 생긴 부산물입니다. 인간사의 거의 모든 문제가 이 무능력에서 생긴 것이기 때문에 슬플 수 밖에 없는 것입니다. 모든 매체(media: 중간이라는 뜻의 라틴어에서 나왔습니다.)는 마음과 마음을 잇는 다리 역할을 합니다. 매체는 생각을 물리적인 현실세계 속에서 전달될 수 있는 형태로 바꾸고, 그것들은 다시 하나 이상의 감각을 통해 생각으로 바꾸어 줍니다.", "만화는 영화나 회화의 화상 묘사 능력에다 글의 친밀함을 더해, 폭넓은 가능성과 자유로움을 제공합니다. 필요한 것은 전달하고자 하는 욕구와 배우려고 하는 의지와 볼 수 있는 능력 뿐입니다."]}, {"title": "매일을 헤엄치는 법", "author": "이연", "genre": "에세이", "publisher": "푸른숲", "passages": ["우리는 자기 자신일 뿐이기에 남이 될 수 없고, 그것만으로도 몹시 충분하지만 그 사실을 자주 잊고 산다. 나 또한 20대 중반까지 항상 내가 아닌 사람이 되고 싶었다.", "타인의 코골이를 듣는 대신 혼자서 이기적인 숙면을 취하고 싶고, 누군가와 생활 공간을 나누기보다는 내가 통제할 수 있는 방에서 일관된 컨디션으로 지내고 싶다. 누군가는 그런 말을 했다. 결혼이라는 건 영영 나의 일부를 포기하는 일이라고. 나는 그런 일이 너무 겁나는 사람이다. 이기적이라는 비난을 기꺼이 감수하고 싶을 정도로 내게는 그런 미래가 두렵다. 남들은 시간이 지나면 알아서 결혼한다고 하지만 시간이 지날수록 결혼율과 출산율이 줄어드는 사회 행태를 보아하니 결혼이라는 게 꼭 그렇게 '자연스러운' 일도 아니라는 생각이 든다.", "내가 된다는 것의 의미는 단순하다. 흉내를 그만두고 내가 나일 수 있는 일을 하는 것이다.", "평범한 사람이 다정해지는 방법에는 두 가지가 있다. 다정한 사람들과 함께 지내는 것, 그리고 다정할 수 있는 여유를 가지는 것. 감사하게도 나는 다정한 사람들 속에서 자랐고, 후에는 금전적으로도 여유가 생 만나는 것도 나쁘지 않다. 항상 훌륭한 선택만 하는 것은 아니지만 우리는 그래도 진지하니까. 그만큼 스스로가 할 수 있는 최선을 택할 것이다. 누워 있고 싶다면 그 또한 최선이다. 그러니까 때로는 운에 맡겨보자.", "다시 잘 살아보고 싶은 날은 6시에 일어난다. 이른 새벽에는 아직 많은 희망이 있다. 이 시간에 모든 비밀을 만든다. 그리고 그걸 가지고 세상에 나간다.", "뭐든 해봐야 안다. 그중 깊게 한번 무언가에 가닿은 경험이 없으면, 내 연애가 그렇듯 시작도 전에 의심만 하다가 끝난다. 뭐든 한 번은 빠져보는 게 순서고, 그다음에야 넓어질 수 있다.", "솔직해지는 법은 간단하다. 좋고 나쁨에 대한 기준을 잠시 내려놓으면 된다. 우리가 솔직하지 못한 건, 그 이야기 혹은 내 모습 등이 좋지 않다고 생각해서 숨기고 싶기 때문이다.", "장사도 결국 길게 봐야 한다. 잘 팔려면 내가 무엇을 가지고 있는지 알아야 하고, 그걸 더 많이 준비해둬야 한다. 계속 아웃풋만 나오는 사람은 없다. 인풋의 시간이 필요하다.", "나는 내가 받고 싶은 사랑을 나에게 주는 방식으로 스스로와 대화한다. 그리고 그것은 일종의 사랑에 대한 연습이기도 하다. 언젠가 사랑을 주고 싶은 사람이 나타나면 나는 내가 아는 최고의 다정을 주려 한다. 물론 내가 좋아하는 것과 상대가 좋아하는 게 다를 수 있지만, 따뜻한 말을 싫어하는 사람은 보지 못했다.", "실제로 나는 이어폰을 두고 자주 혼자 산책한다. 그때는 내게 나눌 대화거리만 챙겨 나간다. 걸으며 묻고, 대답하고, 다시 묻고, 대답한다. 그림을 그리며 깨달은 게 있다. 대상을 알려면 그 순간만큼은 그 대상을 사랑해야 한다. 애정을 갖고, 편견을 내려놓은 순수한 눈으로 바라보는 것이다. 그저 그리기 위해서 무언가를 바라본다는 것. 그것을 왜곡하지 않기 위해서 애쓴다는 것. 그것이 하는 이야기를 듣는다는 것. 그렇게 스스로를 바라볼 수 있다. 나는 그런 사람이 타인도 더욱 사랑할 수 있는 사람이 된다고 믿는다. 사랑을 담아 만든 창작물이 인간의 심장에 가장 가깝게 닿는다.", "할 얘기가 없다는 사람에게 나는 이렇게 말한다. \"솔직할 자신이 없는 거겠지.\" 사실 내가 나에게 던지는 말이다. 솔직하기 위해서는 내 마음에 무엇이 들어 있는지 자주 들여다봐야 한다. 그리고 그게 그렇게 끔찍하지 않고, 사실은 굉장히 평범한 것들이라는 것도 확인해야 한다. 스스로가 자주 실망스럽고, 비겁하고, 나쁜 생각을 하는 게 그렇게 특별하게 이상한 일인가? 모든 인간이 거의 비슷하다. 자기 자신을 안다는 건, 어두운 일면까지 바라볼 수 있다는 것이다.", "우리 마음속에 있는 가시도 그런 것이지 않을까? 당신의 마음에 무엇이 들어 있든, 그것이 얼마나 무겁든 어둡든, 냄새가 나든, 끔찍하든, 상관없다. 그걸 상관없다고 생각하고 안아줄 당신만 있으면 정말로 괜찮다. 스스로에게 솔직할 시간을 내어주자. 그리고 그 시간을 흠뻑 살아내어 더욱 선명한 자기 자신이 되자."]}, {"title": "미술 사는 이야기 - 신생공간이라는 사건과", "author": "유지원", "genre": "미술, 예술", "publisher": "마티", "passages": ["10년 전 누군가 내게 미술에 대한 책을 쓰게 될 거라고 말했다면 헛소리라며 일축했을 게 분명하다. 막 상경해 대학교를 다닐 당시에는 미술과 거리가 먼 전공을 공부하며 도저히 익숙해지지 않는 도시를 살아내느라 '미술 같이 고상한 것'에는 관심을 둘 여유가 없었거니와 어디서 미술을 만날 수 있는지조차 몰랐으니까. 하지만 우연에 우연이 포개지고, 만남이 만남을 부르면서 어느새 전시를 만들고 미술에 대해 글을 쓰는 일이 업이 되었다. 누구나 인정하는 등용문을 통과한(그런 것이 있기는 했나?) 적은 없지만 분명 시작이라 할 만한 기회, 여기 어딘가에 내 자리가 있는 것 같다는 어렴풋한 확신, 어떤 세계의 발견 끝에 따라오는 설렘을 선사한 사건과 사람이 있었던 건 분명하다. 돌이켜보건대 그것은 나만의 경험에서 끝나지 않고 2010년대 동시대 미술계에서 펼쳐진 어떤 흐름, 즉 '신생공간'의 시공간과 닿아 있다. ​", "즉 무어라 콕 집어 말할 수는 없지만 어쩐지 '재미가 없다'고 입을 모으는 각자도생의 시대를 맞이하고야 말았다. 방학숙제를 마무리하지 못한 채 맞이한 신학기의 초조함, 끝나버린 관계를 매듭 짓지 못한 채 시작되어버린 새로운 만남의 찝찝함 같은 것이 따라붙는다. 불확실한 과정 속에서도 미술을 하며 사는 삶이 지속가능한 것인지, 그것이 어떤 모습인지 고민한 이들이 있었고, 나는 어쩌면 이들이 펼쳐 보인 때로는 기발하고 때로는 실패가 예견된 시도들의 목격자 같은 것이었다. 나 스스로 미술을 하며 살아야겠다는 비장한 결심을 해본 적은 없었지만, 전형적인 생애주기 혹은 성장서사에 대한 신뢰가 붕괴되는 가운데 젊은 창작자들이 조직한 시공간은 희미하게 반짝이고 있었다. 불과 몇 년 되지 않은 시간 동안 이러한 목격에 대한 증거품이 옷장 한구석을 가득 채웠다. 기억력이 좋지 않은 나를 대신해 어느 사건 한복판에 있었던 사물들을 앞세워 서울이라는 도시에 정착하여 살아가는 일, 취향을 발견하며 나를 찾아가는 일, 행동반경을 확장하고 사람을 만나는 일, 돈을 벌고 쓰는 일, 즉 '미술 사는 일'이라 요약될 법한 이야기를 풀어놓는 것에 불과하다. 이 이야기가 기록되어야 하는 이유는 단지 나뿐만 아니라 한 움큼의 사람들이 미술 사는 일을 함께 겪었다고 믿기 때문이다. 미술관으로 출근을 하고, 퇴근하면 미술이 어땠느니 하는 글을 쓰고, 주말이면 충무로의 작은 미술공간에 사람을 모아보려 하는 현재 내 삶의 양식에 대한 지분이 그들에게 있으므로. ​", "'굿-즈'는 티켓을 파는 입구에서부터 창작자와 방문객 사이의 거리가 팔 하나 길이밖에 되지 않는 좁은 부스까지, 모두가 대놓고 사고팔 준비가 되어 있었다. 이러한 태도 때문이었을까, 우려 섞인 시선도 있었다. 미술이 이렇게 가볍게 거래될 수 있는 것인가? 젊은 창작자들은 결국 시장에 편입되기를 희망하는 것일까? 게다가 서브컬처나 아이돌 산업에서 제작사의 정식 허가를 받아 만들거나 개인이 2차 창작으로 제작한 소품류를 통칭하는 '굿즈'를 행사의 제목으로 제시했으니, 의심을 살 만도 했다. 노상호는 수채 드로잉을 벽에 걸어놓고, 규격에 맞추어 원하는 구간을 잘라서 살 수 있게 했다. 꽤 인기가 많았던 터라 마지막날쯤 돼서는 그림이 너덜너덜했다. 김웅현은 2015년부터 이어질 3부작 개인전 '공허의 유산'의 프리퀄 격으로 정육사를 자처하여 소를 제작해 살을 발라 판매했다. 조익정과 퍼포머들이 굴렁쇠를 굴리며 붐비는 사람들 사이를 날렵하게 스치며 달리는 사이, 김동규는 판매할 만한 굿즈가 없다며 행사 기간 내내 거지로 분장하여 구걸을 했고, 박보미는 정체불명의 검은 물을 팔았다. 젊은 작가가 주도한 대안적인 미술 시장이라고 부르기에는 가벼운 농담이 야심과 포부를 눌러버렸고, 돈을 벌겠다고 장을 펼쳤다기에 판매가는 재료비나 인건비조차 건질 수 없어 보였다. 이들은 아주 활기차게 수지에 맞지 않는 장사를 하고 있었다. ​", "다음 국면으로 이행하기 위한 발판의 소실은 청년 창작자에게 위협적인 정황이 분명했으나 동시에 소위 '데뷔'를 위한 통과의례가 약화되면서 작가로서의 성장 기반을 재구성할 수 있는 공백이 마련된 것이기도 했다. 이런한 맥락에서 등장한 '굿-즈'는 기성 미술 제도나 시장에서 순환하기 위해 마땅히 갖춰야 할 경력이나 젊은 작가로서 잠재력을 증명해내기 위한 일련의 단계 중 하나로 마련되었다기보다, 굿즈라는 개념 혹은 양식을 공통 질문 삼아 창작자가 당도한 현실에 대한 각자의 답을 내놓는 장에 가까웠다. 각 창작자는 거래된 적이 없는 작품 혹은 실천을 가질 수 있는 단위로 재편하는 과정에서 스케일과 매체 측면에서 변주를 감행하고, 창작자로서의 자신의 태도와 방향성을 재고하게 된 것이다. 판매의 여부와 그 형태는 수익과 생존에 대한 문제이기도 하지만 작가가 작업을 대하는 태도와 직결되어 있다. ​", "본격적으로 미술을 소비하기 전까지는 작품이나 전시를 보고, 이로부터 발생한 감정을 눌러 담아 누가 읽을지도 모를 글을 쓰곤 했다. 미술을 뜯어보고, 생각하고 그러면서 작업과 나의 삶과 이를 둘러싼 더 큰 세계를 글로 엮어내는 활동은 미술에 대한 애증을 표현하는 일이자 이를 '가지는' 일이었다. 물론, 작품 감상의 세계는 넓고 깊어서 그저 보는 것만으로도 수없이 많은 생각을 자아내는 데다가 글쓰기에 감히 끝은 없기에 그 어떤 작품도 가질 수 없다. 때문에 적극적인 감상과 글쓰기라는 활동은 결코 소비로 대체될 수 없을 것이다. ​", "할로겐 조명과 마법의 거울을 갖춘 드레싱 룸에서 볼 때 멋있던 옷이 형광 조명과 일반 거울 앞에서도 근사하리라는 법이 없듯, 전시장에서 본 좋은 작업이 집에 와서 조화롭게 자리 잡으리라는 보장은 없다. 피규어를 모으는 한 지인이 알려주길, \"덕질의 완성은 부동산\"이라는 말이 있단다. 내가 좋아하는 것이 제 위치를 잡기 위해서는 능력껏 환경을 조성해야 하는 것이다. ​", "이곳에서 사진을 구매하는 경험은 공간을 조성하는 데 사용된 이케아 가구처럼 딱 맞아떨어지는 모듈을 조합하는 것과 유사한 쾌감이 있었다. 총 1,020장의 사진은 작가와 작품에 대한 정보 없이 모두 A4 사이즈로 출력되어 데이터 용량의 오름차순으로 진열되어 있었다. 이것저것 재거나 눈치 볼 것 없이 그 많은 선택지 중에서 직관적으로 좋아 보이는 사진을 고르면 그만이었다. 사진을 골라 고유 넘버를 적어 넘기면 사진과 함께 관련 정보를 포장해서 건네주는데, 그제야 각 작업이 누구의 것인지 알 수 있게 된다. 뭘 알고 작품을 구매하는 것이 아니라 구매해야 비로소 알게 되는 시스템을 통해 많은 이가 사진을 난생처음 구매했다. 결제하기 위해 길게 늘어선 줄을 보며 한 운영자는 놀라움을 감추지 못했다. \"이상한 광경을 목격하고 있습니다. 사진이 팔리고 있습니다.\" ​", "반려견은 가족의 행복과 불화뿐 아니라 각 구성원의 치부를 가장 가까이에서 지켜보면서도 아무 말 하지 않는 구성원으로, 함께 살게 된 순간부터 떠날 때까지 언제나 아기로 머물면서 인간의 마음을 어루만지는 한편 심경을 복잡하게 헤집어 놓곤 한다. 그에게 최선의 것만 주려고 하지만 그들의 언어를 알지 못하는 인간으로서는 이 동물이 행복한지 결코 알 수 없다. 균형 잡힌 영양분을 제공한다고 소문 난 사료를 먹이고, 좋은 장난감과 쿠션으로 집을 가득 채워도 그것이 인간의 죄책감을 덜고 외로움을 채우려는 일이 아닌지 의문할 수밖에 없는 것이다. ​", "전시장에서는 어떤 작품도 지시 또는 허락이 없는 한 만질 수 없기 때문에 옷깃이라도 스칠세라 극도로 경계하지만 내 생활공간에 오면 이야기가 달라진다. 물리적, 심적 거리감이 좁혀지고 관찰할 시간도 무한정 늘어나면서 손이 나가게 되는 것이다. 그것은 더 이상 감상의 대상이 아니라 나와 함께 부대끼며 살아가는 반려사물 같은 것이 되어버린다. ​", "물론 조각만 만질 수 있는 건 아니다. 드로잉을 한곳에 오래 걸어두면, 눈이 이리저리 선과 공백을 왕복하며 그 표면을 어루만지게 된다. 박아람의 연필 드로잉 '굴리기'(2012)에는 서사나 재현의 요소를 빠뜨린 채 두 칸에 걸쳐 네 개의 원이 그려져 있다. 단순하게 표현된 원이 먼저 눈에 들어오지만 어느새 그 주위의 거친 연필 선을 따라 위아래로 시선을 왕복하기 시작한다. 박아람은 눈을 굴리는 행위를 일종의 퍼포먼스로 보고, 눈 굴리기를 지시하거나 유도하는 작업을 해왔다. 이런 점을 고려하면 두 쌍의 원은 데구루루 운동하는, 눈동자가 아래를 향하는 두 쌍의 눈알처럼 보인다. 거기에 더해 연필선을 따라가며 배경을 함께 칠해볼 수도 있다. 그러다 여백에 시선을 두고 잠시 쉬어갈 수도 있겠다. 이렇듯 드로잉에서도 시선이 선과 형상과 여백 사이를 살뜰하게 훑어내는 시간이 쌓인다. 만질수록 그 자체로 하나의 생명이 있는 양 다가오는 조각처럼 드로잉도 오래 두고 보면서 서로를 알아가야 한다. ​", "작품과 함께 산다는 것은 같은 공간에 머물면서 손과 눈으로 그것을 만지고, 더 알아가고, 그것만의 고유한 특징과 위치를 발견해가는 과정이다. 이는 소유자가 사물에 의미를 부과하는 일방적인 관계에 그치지 않는데, 생활공간으로 들어온 작품은 동거인의 동선과 시선을 재조직하기에 이른다. 아무것도 없던 벽에 드로잉이 하나 걸리면 몇 초나마 시선이 머물게 되고, 책을 쌓아두었던 선반에 작은 조각을 얹어 놓으면 지나칠 때마다 그것을 괜히 쓰다듬을 테니 말이다. 다양한 재료의 조각과 상상의 여지를 남기는 드로잉이 일상을 침범할 때, 비활성화되어 있던 감각이 순간순간 살아난다. 이러한 각성의 경험은 미술 전시를 관람하는 태도나 작품을 구매하는 기준에도 영향을 미친다. ​", "경제 논리로 볼 때, 이러한 행사는 성공과는 거리가 멀었다. 근본적인 이유는 판매자와 구매자가 동질적인 집단이었기 때문이다. 미술 시장과는 거리가 먼 젊은 작가들이 서로의 창작물을 구매해주었던 것이다. 쉽게 말해 새로운 소비자층을 개발하지 못한 채 우리끼리 돈을 돌려쓰면서 수입과 지출이 상쇄된 샘인데, 이 지점이 바로 작가 장터의 궁극적인 실패 원인이자 동시에 새로운 교환의 가능성을 볼 수 있는 지평이다. ​", "그 당시의 태도와 마음처럼 어쩌면 전시를 만드는 과정에서 가장 중요하지만 정작 기록할 수도 붙잡을 수도 없는 것은 어디로 가는 걸까? 당시에 시간을 함께 보낸 사물은 구체적인 정보를 전달해주지 못하지만 지나간 사건에 대한 일종의 저장 장치가 되어준다. ​", "이러한 순례 놀이에 국공립미술관이나 대형 사립미술관을 포함시키지 않았던 것이 꼭 제도권 공간이나 기성 미술계에 대한 반항심을 표명하는 것은 아니었다. 단지 나를 부르는, 내가 가야 할 것 같은, 나에게 가깝다고 느껴지는 지점들을 중심으로 움직였을 뿐이다. 그 점들은 결코 한 동네에 몰려 있지 않았고, 운영자나 작가를 안다든가 하는 당위성이 있는 것도 아니었으며, 각 공간들이 홍보에 대단히 적극적이었던 것도 아니었다. 하지만 사람들은 어디로 가야 하는지 정확히 아는 것처럼 움직였다. ​", "그곳은 직설법 대신 리듬으로 소통하는 연약한 연대와 흔히 평가 절하되는 여성적 언어, 깊이 혹은 저 너머에 숨겨진 의미 대신 표면에 머무는 질감을 옹호하는 현장이었다. 무질서하게 놓여 있는 듯한 작품은 게으름이나 포기가 아니라 긴밀한 대화, 긴장과 갈등 끝에 도출된 절묘한 균형 상태였다. ​", "단일한 목적을 향한 연대보다 각자의 자리에서 무엇인가 되어가는 과정을 공유하는 자발적인 움직임은 곳곳에서 발견되었다. ​", "그때 그곳에 함께 있었다는 사실. 그것이 무얼 해줄 수 있는 걸까? 일련의 '함께 하기'는 생각이 굳어지거나 사건에 이름과 판단이 붙기 전 몽글몽글한 잠재적 구간을 최대한으로 연장하여 야금야금 맛나게 먹는 상태에 가까웠다. '전문' 미술가의 일이 작품을 만들고 그것을 전시하는 것이라 할 수 있겠지만, 이를 위해 제도권 기관의 호명을 받거나 아르바이트와 기금으로 필요한 자원을 끌어 모으고, 한 번 쓰고 버릴 집기를 제작하고, 여러 전문 인력을 동원하여 그럴듯한 모양새를 만들어 전시를 하는 일은 때로 창작의 동력 자체를 비용으로 요구하곤 한다. '성공한 작가 되기'라는 불확실한 목표를 좇다가는 지치고 길을 잃을 것이 뻔하다. 그렇다면 적절한, 아니 유일한 선택지는 적당한 기회에 발탁되기를 기다리거나 비장한 상승을 도모하는 것이 아니라 동료를 발견하고 함께 시간을 보내며 유무형의 자원을 길어 올리는 일이 아니었을까? ​", "성장과 상승의 서사는 고장 났다. 그렇다면 더 이상 제도권의 승인을 선망할 필요도, 권위 있는 인물의 발탁이나 추천을 기다릴 이유도 없다. 올라갈 수 없다면 오히려 즐겁게 게걸음 치는 것이 현명한 처사일지 모른다. 수평적인 관계 속에서 동료들과 작업에 대한 직접적인 피드백을 주고받고, 재미있는 무언가를 끊임없이 도모하는 공동의 정서가 있다면 그것으로 이 시기를 충분히 함께 날 수 있을테니. ​", "직함이나 지위를 부여하는 단단한 조직이 아닌 마치 구름 같이 성긴 네트워크에서 위계형 폭력이 가능했다면, 그것은 애초에 그 기반이 매끈하기보다 울퉁불퉁하며, 평평하기보다 기울어져 있다는 것을 보여주는 게 아닐까? 또 다른 피해를 방지하기 위해서는 가해자의 무기, 즉 그를 향해 쏠려 있는 관심과 기회를 끊어내야 한다는 데 여론이 모여 들었다. 신생공간 활동이 경제적인 이윤이나 사회적 지위를 가져다주지는 않았지만 '관심'이라는 새로운 종류의 자본을 나눠 가질 수 있게 했다는 관점이 등장한 것이다. 같은 시간을 통과한 이들은 이제 거론할 수 없는 인물과 사건을 공유하게 되었다. 무언가 신나는 일이 벌어질 것만 같았던 기대감이 사실 누군가의 고통과 공존하고 있었다는 것을 의식한다면, '우리'는 이전과 같을 수 없다. 서로의 신원을 확인하지 않고도 같은 곳을 보고 있다면 함께 할 수 있다는 개방성은 불신으로 대체된다. 누구든 공간을 열고 흥미로운 일을 도모하는 기동성에 제약이 걸린다. 학연이나 지연에 얽메이지 않는 우연한 만남에 거는 기대감에는 검증되지 않은 접선에 대한 두려움이 드리운다. 큰돈을 벌거나 유의미한 커리어의 성취를 얻지는 못해도 큰 재미가 남는다고 믿었지만, 흥의 기억은 변질되고 감당할 준비가 되지 않았던 책무가 안겨진다. ​", "해시태그 운동이 소셜 미디어를 공론장으로 전환했다면, 소셜미디어의 상업화는 온라인 플랫폼을 하나의 커다란 스팸 게시판으로 만들었다. 소셜미디어의 알고리즘은 더 이상 내가 좋아할 만한 미술공간이나 창작자의 계정을 소개해주지 않는다. 대신 낮밤으로 내 말소리를 훔쳐 듣고 귀신같이 필요한 상품을 눈앞에 들이미는 카탈로그가 되었다. ​", "물론 소비가 정체성과 완전히 일치될 수는 없고 그 사이를 벌려 놓기 위해 안간힘을 써야겠지만, 오늘날의 소비는 불가피하게도 시간과 관심, 돈을 어딘가로 향하게 하는 선택을 아우르는 활동이 되었다. 나의 소비와 그 결과물에 대한 처신은 나의 관심과 애정(혹은 애증), 기대감을 보여주는 증거물이 될 것이다. 그러니 무언가를 집에 들인다는 것은 한순간의 즐거운 소비 경험을 넘어 일정 정도 책임을 지는 행위가 된다. 많은 시간이 흘러, 이 사물이 하나의 군집이 된다면 그것이 무엇을 말하게 될지 궁금하고, 또 두렵다. 동시에 바로 이러한 두려움을 안고, 보다 의식적인 선택을 해야 한다는 것을 받아들일 수밖에 없다. 물론 이 과정이 마음에도 없는 당위를 억지로 만들어내 나를 검열하는 불행으로 향하기를 원치 않는다. 다만, 이미 내려온 선택 기저에 있는 무의식적인 기준을 발견하며 더 다듬는 것이 될 수 있다면 좋겠다. ​", "'왜 문을 다는가'가 아니라 어째서 이러한 공간이 열렸는지를 질문하는 것이 더 적절할 것이다. 수익성 사업을 진행하지 않고, 심지어 비용의 상당 부분을 사비로 부담하면서 서로의 작업 활동을 지지하는 공간이 한 도시에 동시다발적으로 발생한 것이 오히려 예외적인 상황이었다. 전시 기회를 얻기 어려웠던 신진 창작자들의 문제의식으로부터 탄생한 신생공간은 부담되지 않은 정도의 대관료를 받거나 그조차도 받지 않고 주변의 동료나 비슷한 상황의 창작자에게 공간을 내어주었다. 대가를 요구하지 않되 서로를 착취하지 않고, 금전적 거래가 아닌 다른 종류의 상호교환을 통해 형성된 관계망은 체계적 기반 위에 있었다기보다 같은 시기와 조건을 함께 겪는 이들이 무의식적으로 선택한 임시방편이었을지 모른다. ​", "2010년대 신생공간을 주제로 한 학위 논문이 몇 편 발표되었다는 것을 알고 적잖이 반가웠다. 아직 매듭 짓지 못한 숙제를 뒤늦게라도 해보려는 듯 찾아서 정독하며 당시에는 희미했던 연결 고리를 추적하거나 서로 다른 입장의 차이를 발견하기도 했다. 미술사 연구의 주제가 되었다는 것은 신생공간이 그만큼 중요한 흐름이었다는 것을 증명해주는 일이지만 다른 한편으로는 그로부터 비평적 거리가 확보되었다는 뜻이기도 하다. 지나가버린 일이라는 것이다. ​", "2020년대에 젊은 컬렉터 층을 겨냥하며 우후죽순 생겨난 젊은 아트페어는 어쩐지 내가 굳이 갈 이유가 없어 보였다. 마치 나를 부르는 것 같았던 이전의 판매 행사에서 취급했던 것은 상품으로서의 가치는 가늠하기 어렵지만 창작자의 실천과 행보, 행사의 취지 및 맥락과 긴밀한 관계를 맺고 있었다. 때문에 때로는 하찮아 보이는 것조차 의미 있는 시공간에 대한 기념품을 구매하듯 사물 그 이상의 무언가를 가지는 인가. 은유든 환유든 근대든 현대든, 릴케든 김종삼이든 존 케이지든, 온갖 시들이 난무하는 이곳에 존재하는 이 이상한 균형이 나는 마음에 든다. 내가 싫어하는 것은 방식의 차이를 낡음 쪽으로 위치시키며 시를 대하는 태도를 은근하게 획일화하고자 하는 척박함과 비열함뿐이다.", "존재하는 시가 존재하지 않는 시보다 좋을 수 있나. 시를 쓰며 종종 하는 생각이다. 인간으로서의 삶은 세계의 알 수 없는 입자들로 존재하던 시절보다, 또 죽음 이후 육체라는 집합으로부터 탈출하여 다시 이곳저곳으로 흩어지게 될 미래보다 좋을까. 좋음의 정도를 가늠하는 일이 몸이 있는 자로서의 편협한 발상일지라도, 자아와 타자가 뒤섞이는 무한의 영역에서는 무효한 고민에 불과할지라도 가끔은 그런 생각을 해보게 되는 것이다. 누구에게도 읽히지 않은 시는 없다. 쓰는 사람은 쓰는 순간 자신이 쓴 시의 독자가 되기 때문이다. 쓴 사람이 있다면 읽은 사람도 있는 셈이기에 독자 없는 시는 세상에 없다. 궤변처럼 들리겠지만 존재하지 않는 시만이 독자 없이 존재하는 특권을 누린다. 종이 위에 활자로 남겨지거나 입 밖으로 말해지기 전 누군가의 상상으로만, 혹은 착상으로만 존재하는 시의 상태. 그것을 시라고 부를 수 있다면, 그러한 상태의 시가 쓰기나 말하기 혹은 다른 어떤 방식으로 우리의 육체를 거쳐 세상에 나온 시보다 더 좋을 수밖에 없지 않을까. 쓰이지 않은 시에는 가공되지 않은 날것의 조아한 아름다움고, 부드러운 새 살과, 무한한 가능성 자체가 내재하기 때문이다. 물성에 도달하는 순간, 시에게 구체적인 언어가 생기는 순간(언어는 시의 몸이기도 하므로) 시는 무존재의 자유와 영원한 안식을 상실하고 세계의 구체적인 활자로서, 혹은 누군가의 목소리로서 존재하게 되고, 소통하고 매개하고 기능하며, 이렇게 정체를 드러내는 대가로 자신의 좋음을 일부 탈취당하는 것이 아닐까. 그것이 시의 존재와 비존재의 역학 관계가 아닐까.", "유니버셜뮤직 클래식 유튜브 채널에서 제작된 시리즈에서 조성진 피아니스트는 첫 솔로 스튜디오 녹음을 마친 후 자신이 연주한 쇼팽의 곡에 관해 설명한다. 그중 발라드 4번 영상의 초반에 그는 인상적인 이야기를 들려준다. 막 연주를 시작하는 순간, 그는 첫 음에 맞는 건반을 오른손으로 거칠게 두드리며 'We don't start up this piece(우리는 이 곡을 시작하지 않아요).\"라고 말한 뒤, 직전의 연주를 취소하 듯 왼손을 뻗어 허공으로부터 건반으로 서서히 당겨오며 \"It's already started(그것은 이미 시작되어 있어요).\"라고 덧붙인다. 손으로 허공 어딘가에 이미 존재하는 음악을 데려와 피아노 위에 내려놓듯이 곡의 도입부를 시작하는 것이다. 뒤이어 놀랍도록 아름다운 연주가 잠시 이어진다. 그의 말대로 정말 건반이 눌리기 이전에 음악이 시작되어 있는 것처럼, 알 수 없는 천상의 소리에 의해 곡은 이미 진행 중이고, 피아니스트는 그 연주를 이어받아 우리에게 들려주는 듯 보인다.", "귀로 들을 수 있는 소리는 건반에 연결된 해머가 현을 내리치고, 현의 진동이 향판을 울리며 발생하는 첫 음부터이지만, 사실 우리에게는 그 전부터 이미 시작되어 있는 곡을 들을 수 있는 능력이 있다. 피아니스트는 들리지 않는 음악을 포함함으로써 곡을 표현한다. 인간과 예술이 공유하는 아름다운 아이러니다. 그런데 보이지 않는다면 존재하지 않는 것일까, 혹시 '존재하지 않는'이라는 표현을 너무 성급하게 쓴 것은 아닐까 하는 생각에 이른다. 오히려 '시'라는 말이 포괄하는 범위를 존재의 앞뒤로 넓혀본다면 시를 읽고 쓰는 일이 더욱 풍성해질 수 있지 않을까?", "평소 낮은 텐션과 목소리로 인해 영혼이 없어 보인다는 말을 종종 듣는다. 그러면 나는 고민하게 되는 것이다. 영혼은 무엇이며 없음이란 또 무엇인가", "선생님은 사랑하는 친구가 죽어 묻혀 있는 무덤을 떠올려보라고 했다. 비가 오고 바람이 부는 날이면 죽은 친구가 추울까 걱정되지 않겠느냐고, 이미 죽고 없음을 알지만 그의 안부가 걱정된다면 귀신이 존재하지 않는다고 우리는 분명하게 말할 수 없을 것이라고, 결국 물성은 감각이고 감각은 감정으로 연결되므로, 감정이 존재한다면 곧 물성이 존재한다는 의미가 된다. 그러므로 죽음 이후의 타인에게 우리가 느끼는 감정은 역으로 그의 물성을 증명한다. 죽음 이후에도 물성을 가지는 존재를 우리가 귀신이라 부른다면, 그리고 그에 대한 감정이 우리에게 존재한다면 귀신이 없다고는 말할 수 없게 되는 것이다. 영혼이 없다는 말은 멋진 말이다. 영혼이란 원래 없는 것이므로 그 말인즉슨 부재가 부재한다는 뜻이기 때문이다. 부재의 없음은 역으로 존재한다는 의미이기에 영혼이 없다는 말은 곧 여기에 있다는 뜻이다. 창문에 비친 나의 반영은 이곳에 내가 존재함을 증명한다. 영혼은 없지만 몸을 가진 내가 여기에 있다. 그러므로 듣고, 웃고, 말한다. 이러한 일들이 나는 자주 신기하다.", "아이는 건반에 손을 올리자마자 자신의 미래를 보았을 것이다. 피아노와 최초로 접촉했던 순간이 한 사람을 피아니스트로 만들었다면, 그리고 그 순간에 아이가 그것을 느낄 수 있었다면, 자신을 덮친 갑작스러운 매혹으로부터 영원히 벗어날 수 없음을 확신했다면, 미래를 본 일과 무엇이 다르다고 말할 수 있을까.", "첫 시집이 출간되고 한동안 제대로 펼쳐보지 못했다. 나의 시의 부족함에 대한 부끄러움, 내가 적은 활자들이 책이라는 형식을 통해 권위를 얻었다는 사실에 대한 간지러움, 표지에 내 이름이 적힌 시집이라는 낯선 대상에 대한 어색함 탓도 있었지만, 앞으로 평생의 많은 시간을 백지 앞에서 키보드를 두르리며 보내게 되리라는 예감이, 처음 내 손으로 타인의 시집을 꺼내 들었던 그 순간보다 훨씬 무겁게, 동시에 감당할 수 없을 만큼 두근거리는 감각으로 나를 압도했기 때문이었다. 출간 후 꽤 오랜 시간을 압도감에 시달려야 했다. 내 손으로 첫 시집을 펼쳤던 순간은 압도감을 극복했을 때가 아니라, 그러한 예감에 조용히 순응할 수 있을 만한 용기가 생긴 순간이었다. 이제 나는 종이 앞에서 여전히 끙끙대며 시를 쓰는, 백발의 노인이 된 나를 어렵지 않게 떠올린다.", "우리가 여름이라고 말할 때 여름은 잠깐 우리에게 온다. 여름을 말하는 사람에게서 여름을 듣는 이에게로 여름이 부드럽게 이동한다.", "이 글을 쓰는 지금은 봄에서 여름으로 건너가는 환절기다. 점점 짙어지는 햇볕 아래에서 봉기를 들고 일어나는 까다로운 피부를 긁적거린다. 환절기라는 말 속에는 두 개의 계절이 들어 있다. 두 개의 옷차림이 들어 있다. 계절은 스위치를 껐다 켜듯이 바뀌지 않고 다만 그라데이션으로 이동한다. 두 개의 계절이 겹쳐지고, 두 개의 옷차림이 겹쳐지면서. 연결되는 여러 개의 시퀀스처럼. 다행히 겨울의 옷과 달리 어깨를 짓누르지 않는 여름의 얇은 옷들이 여름에 대한 글을 한결 가볍게 한다. 반팔과 반바지. 부드러운 재질들.", "나는 원장님의 가르침을 매우 좋아해서 레슨 때마다 한마디도 놓치지 않으려 귀를 기울이는 편이다. 어느 날에는 피아노에 대한 원장님이 비유에 감탄하느라 연주할 부분을 잊어버리기도 했다. 이를테면 정수리로부터 한 방울의 물이 흘러내려 손끝에서 톡 떨어지듯이 건반을 눌러야 한다거나. 아주 짧은 32분 음표에도 각자의 목소리가 있기 때문에 그걸 찾아줘야 한다거나. 왼손이 내는 소리에 오른손이 갇히면 안 된다거나.", "루바토가 악보에 적혀 있으면 해당 구간에서 연주자는 기존의 템포에 얽매이지 않고 자유롭게 템포를 조절할 수 있다. 템포 루바토에서만큼은 음의 길이를 연주자의 감정과 해석에 따라 늘였다 줄이는 것이 가능해진다. 이탈리아어 루바토는 영어의 'rob(훔치다)'과 같은 단어인데, 악보에 기입되었을 시에는 \"시간을 훔치다\"라는 의미를 갖는다. 그러니까 해당 음의 앞의 음이나 뒤의 음의 시간을 훔쳐 와 자신의 것으로 이어 붙이고, 훔친 시간을 다시 돌려주는 방식으로 원 템포를 되찾는 것이다.", "나는 시의 초고를 쓴 후에 오랜 시간 퇴고를 하고는 하지만, 격렬한 퇴고 과정 이후에도 결국에는 초고의 형태와 내용으로 돌아오는 경우가 잦다. 왜냐하면 퇴고는 대체로 루바토를 깎아내는 작업이기 때문이다. 시가 추동하는 대로 빼앗기거나 빼앗은 언어를 규범대로 되돌리는 동안 시는 자신이 가진 미지를 잃는다. 더 정확히 구조화되기 위해 여분의 언어가 절단되는 순간, 시가 가진 에너지는 급격히 줄어든다. 손상되지 않은 초고에는 자연스러운 루바토가 있다. 언어의 질서로부터 자신도 모르게 달아나버리는, 그로 인해 어떤 새로움을 발생시키는, 어쩌면 단어의 바깥으로 단어의 의미가 늘어나거나, 반대로 세계의 좁고 내밀한 곳을 통과할 수 있을 만큼 축소되어버리는.", "수용자에게 미지란 다채로운 모호함을 포함하는 '알수 없음' 자체일 것이다. 그렇다면 창작자에게 미지란 무엇일까? 그것은 작가가 작품을 장악하거나 포섭하려 하지 않는 태도, 작품이 발생시키는 리듬에 몸을 맡길 줄 아는 겸허함이자 작품의 원천인 자신과 세계에 대한 존중일 것이다. 루바토가 표면적으로는 연주자 개인의 감정과 해석에 따른 표현 방식이지만, 사실은 역으로 연주자의 강박을 비우고 음악에게 자리를 내어주는 순간에 발생하는 것처럼.", "어느 정도 곡을 익힌 후에도 미스터치가 발생하는 경우가 있다. 근육에 건반의 위치가 충분히 기입되어 있을 때, 그것을 방해하는 것은 생각이다. 딴생각을 하면 틀리는 것이 아니다. 건반 생각을, 지금 내가 하는 연주에 대한 생각을 하면 무조건 틀리게 되어 있다. 내 혀가 어디 있지? 생각하는 순간 입속 어디에 혀가 있어도 어색하게 느껴지는 것처럼, 생각은 곡을 뒤튼다. 건반에 대한 생각, 곡에 대한 생각, 연주에 대한 생각은 연주하는 순간의 전후로 해야 한다. 피아노 치는 스스로를 바라보는 세 번째 눈이 허공에 생겨나는 순간 온몸이 경직되고 연주는 지루해진다. 나는 종종 눈을 감거나 먼 곳을 보며 곡이 자아내는 이미지 속에 잠겨 피아노를 친다. 그럴 때 연주는 가장 자연스럽고 유려해진다.", "시 쓰는 근육이 어디에 붙는 것인지는 모르겠으나, 어찌 됐건 생각은 접어두고 그것에 기대어 써 내려가는 편이 낫다. 그러니까 허공에 기대는 것이다. 허공의 미래를 시라고 믿으며, 시가 되기 이전의 허공이 자아내는 것들에 잠겨, 그곳의 출렁임에 나의 근육을 맡겨버리는 것이다. 나를 잊은 순간, 시는 이미 나타나 있곤 했다.", "매혹이란 무엇일까. 알다시피 그것은 불능의 상태가 되는 것이다. 존재의 자율을 상실하고, 마음의 근육이 녹아내리고, 액체에 가까운 모습이 되어 보이지 않는 물길 따라 한없이 흘러가버리게 되는 것. 그리고 그 이전으로는 다시 돌아갈 수 없게 되는 것.", "글을 쓰는 것은 필연적으로 어떤 문장 다음에 어떤 문장을 쓸지 선택하는 일이고, 매 시간 새롭게 탄생하는 과거와 현재와 미래 중 어느 순간을 글 속으로 건져 올릴지 고민하는 무의식의 험난한 낚시질 곁에 무릎 꿇고 앉아 있는 일이다. 이를테면 누워서 이 글을 쓰고 있는 나에게 지금 당장 발생하고 있는 무한한 감각들, 두 눈의 피로, 등에 닿는 침대의 촉감, 익숙한 방의 냄새, 몇 시간 전에 마신 술로 인한 잔잔한 복통, 내일은 일어나자마자 청소를 해야겠다는 옅은 다짐, 잠을 자고 싶다는 욕구 같은 것들 중 나라는 개인의 다음 이야기를 쓰기 위해 어떤 감각을 택하여 언어화를 시키는가에 대한 문제인 것이다. 글이 나아갈 방향이 뚜렷하지 않다면 언어화된 감각은 무의미한 발화 수준에 머물다 흩어질 것이다. 반대로 지나치게 명징한 방향성을 지닌다면 감각은 감각 자체로 글 속에 실존하지 못하고 문학성이라는 허구에 속박되어 부자유하고 경직된 형체로, 어떠한 떨림도 움직임도 없이 진열되어 있을 것이다.", "피아노 연습과 시를 퇴고하는 과정이 몹시 비슷하게 느껴진다. 양쪽 다 리듬과 촉감과 정서와 심상을 결정하는 일이라는 점에서. 음의 깊이와 길이, 무게, 호흡, 더듬거림을 고르는 일과 문장에서 적합한 단어(음절의 길이, 의미의 진폭, 상투성, 조사 유무, 구어/문어체의 사용 등)를 탐구하는 일이 정말 비슷하다. 피아노를 정교하게 칠 수 있어질수록 시를 보는 눈도 더 정교해짐이 느껴진다. 하나의 음을 연주할 때 처음에는 그 방식의 선택지가 2개였다면 시간이 지날수록 5개, 6개, 10개로 늘어나게 되는데 그러한 가능성을 피아노에서 체험하자 시에서도 2개였던 단어의 선택지를 5개, 6개, 10개로 늘려갈 수 있게 되고 이에 따라 낡아진 눈도 다시 새것 같아진다.", "이렇게 많은 문화를 다채롭게 누릴 수 있는 시대에 취향이나 기질이란 대체 어떻게 생겨나는 것인가? 아무도 알 수가 없다. 미디어를 통해 외적으로 조화로운 사람들이 등장하는 자극적인 콘텐츠들을 셀 수 없이 시청할 수 있는데, 왜 누군가는 이미 죽은 사람들이 오래전에 만들어놓은 것들에 빠져서 살아가는가? 나는 세대론에 좀 알러지가 있는데 아마도 이러한 이유 때문일 것 같다. 내가 느끼기에 시공간은 그런 식으로 분리되지 않으며 과거와 현재와 미래는 개인의 신체를 매개하여 서로 파악될 수 없는 역학 관계를 형성한다. 세대로 나누어서 문학적 성향을 가늠하거나 사회문화적 변화로 개인이나 시대의 변화를 측량하거나 하는 일들이 전혀 무효하지는 않은 것임을 알지만 그러한 방식의 부족함이 나에게는 더 강력하게 다가온다. 시대의 예측되는 영향력 하에 있는 사람들보다, 그 영향력으로부터 조금씩 비켜나 있는 사람들. 혹은 그 영향력으로부터 벗어나려는 움직임들. 언제나 그쪽에 더 눈길과 마음이 간다. 아마 앞으로도 그럴 것이다.", "나는 그냥 아무것도 아닌 날이 좋았어 그날을 위해 뭘 준비하지 않아도 되는 그래서 뭔가 감당할 필요없는 그런 날들 있잖아 갑자기 겨울 냄새가 풍겨오는 아침이라든가 길 가다 마주한 석양이 유난히 예쁜 저녁이라든가"]}, {"title": "미치게 만드는 브랜드", "author": "에밀리 헤이워드", "genre": "마케팅, 브랜드", "publisher": "알키", "passages": ["뛰어난 브랜드는 고객 여정 전반에서 한쪽에는 신선함과 의외성, 다른 쪽에는 깊고 친밀한 유대감을 놓고 절묘하게 균형을 잡는다. 이런 브랜드에서는 무언가를 팔거나 설득하려는 느낌이 들지 않는다. 그보다는 가치관이 통하는 친구를 사귀는 것 같다.", "요즘 소비자는 특정 브랜드에 빠지면 친구들에게 자랑하고 소셜미디어에 열심히 올리기만 하는 게 아니라, 그 브랜드 제품을 자기정체성의 일부로 받아들인다. '나는 그 브랜드를 좋아하는 사람'이 중요한 자기표현이 되는 것이다.", "가장 먼저 할 일은 뻔한 문제 말고 해결이 절실한 근본적인 문제를 정하는 것이다. 이 단계를 거치면 다가가려는 대상, 즉 타깃 고객에게 정말 필요한 브랜드를 만드는 첫발을 뗀 셈이다. 그 다음 단계는, 브랜드가 사람들의 삶에서 어떤 감성 영역을 차지할 것인지, 다시 말해 브랜드가 사람들에게 어떤 감정을 불러일으킬지 정하는 것이다. 하지만 감성적인 울림을 논의하기 전에 우선 제품부터 생각해야 한다. 사람들이 미치게 좋아하는 브랜드를 만들려면 우선 제품부터 유의미한 차별화가 되어야 한다. 예외는 없다.", "요즘 사람들이 어느 때보다도 구매하는 물건과 구매하는 장소에 친밀감을 느끼고 싶어 하며, '오, 빠른데' 말고 다른 느낌에도 목말라 있다. 그러니 편리함을 갖추지 않고는 사업을 시작하기 어렵지만, 편리함 제공에 그쳐서는 안 된다. 합리적인 판단을 넘어서는 무언가를 제시할 궁리를 해야 한다. 원칙대로 고객의 문제를 해결하려는 데서 출발한다면 감성적인 브랜딩은 속임수를 써서 사랑을 얻는 게 아니다. 오히려 고객이 정말 필요한 것을 예민하게 알아차려 진심으로 해결해주는 행위이며, 따라서 브랜드가 약속한 내용을 제품이 철저히 지켜야 한다.", "가장 사랑받는 브랜드는 하나같이 제품의 편익을 넘어서는 상위의 감성을 명확하게 내세운다. 우리가 고객과 일할 때는 해결해야 하는 문제에서 출발하고 그다음 브랜드가 내세우는 감성, 그리고 브랜드가 사람들에게 불러일으키는 느낌을 정의한다. 이런 방향이 명확하게 잡힌 다음에야 브랜드의 분위기와 디자인, 언어를 고민한다.", "현실 세계에서 소비자들이 맥락 없이 브랜드 이름을 단독으로 접하는 경우는 극히 드물다. 브랜드 이름은 항상 나머지 브랜드 커뮤니케이션이라는 맥락 안에서 보이므로 보통은 더 감성적이고 추상적인 이름을 선택하는 게 유리하다.", "브랜드에 있어 이름은 종이나 캔버스가 되어야 한다. 올버즈처럼 상징적인 뜻이 담길 수 있고 차량 공유 서비스 리프트처럼 업의 본질이 명시될 수도 있다. 어느 경우라도 사업의 성장을 가로막지 않고 사람들이 각자 나름의 의미를 부여할 수 있도록 해석의 여지가 충분히 커야 한다.", "오늘날처럼 그 어느 때보다 소비자에게 선택의 여지도, 지식도, 권력도 많은 시장에서는 처음부터 진정성 있게 브랜딩을 해야 한다. 로고에 대한 고민을 시작하기 전에 회사가 사람들에게 어떤 도움을 주려 하는지, 그 결과 사람들이 브랜드를 어떻게 느꼈으면 좋겠는지 알아야 한다. 중요한 건 당신의 브랜딩으로 실제 문제를 해결해주고, 그 과정에서 사람들이 이해받고 격려받는다고 느끼는 일이다. 당신이 차지하려는 감성의 영역을 제품이 든든히 받쳐주지 못한다면, 브랜드란 그저 누군가가 한 꺼풀 벗겨내는 순간 산산히 흩어지는 허울 좋은 이야기일 뿐이다.", "기존 메시지가 '우리 브랜드로 당신을 이렇게 표현하세요'라면 새로운 메시지는 '당신이 X에 관심이 많다는 걸 알아요. 우리도 마찬가지예요'이다. 브랜드가 말하고 싶은 자기중심적인 이야기에 고객을 억지로 끼워 맞추려 하지 않고, 고객이 서있는 그 자리로 다가가려는 태도이다. 제품 중심이던 상황을 반대로 뒤집으니 브랜딩은 기업 자신의 정체성을 세우는 일이 아닌, 고객과 공동의 정체성을 만들어가는 활동이 된다.", "사람들은 자기 가치관을 그대로 비춰주는 브랜드를 찾고 있으며, 기업은 기대에 부응하기 위해 싫든 좋든 브랜드 방향성뿐 아니라 직접 실천하는 모습까지 확실하게 보여야 한다. 에버레인이 내거는 투명성이라는 메시지는 웹사이트의 한 부분을 통째로 공장 소개에 할애했기에 그만큼의 무게를 가질 수 있다. 소비자들은 이제 소유할 가치가 있는 품목이 무엇인지부터 신중하게 따진다. 그럴싸한 말만으로는 전혀 설득력이 없다.", "브랜드의 방향성이 그렇듯 '커뮤니티' 역시 하루아침에 느닷없이 만들거나 영리한 소셜미디어 전략으로 꾸며낼 수 없다. 가장 성공한 커뮤니티는 브랜드가 가치관을 명확히 세우고 꾸준히 지킬 때 절로 발달하며, 단순히 같은 제품을 사는 사람들이 아닌 브랜드의 철학에 동참하는 사람들끼리 자연스레 유대감을 형성한다.", "성공한 신세대 브랜드는 고객의 선택을 줄여주기만 해도 도움이 된다는 사실을 간파했다. 브랜드는 제품이나 서비스를 단순화함으로써 자잘한 차별화가 아닌 중요한 감성적인 이야기에 집중할 여력이 생긴다.", "스노우가 추구하는 건 특정한 스타일이 아니라 모두가 좋아할 만한 느낌이다. 이를테면 가볍지만 튼튼한 식사용 접시와 손에 잡는 느낌이 기막히게 좋은 유리잔, 보들보들하고 푹신푹신한 수건의 느낌. 안드레스는 스노우의 제품 철학을 이렇게 설명한다. \"우리는 기본 중 기본 아이템을 제대로 만들고 싶었어요. 오랜 시간에 걸쳐 차곡차곡 모아 이리저리 조합할 수 있는 필수품을요.\"", "모두와 반대로 가려면 이유가 확실해야 하며, 우선 익숙하고 편안한 느낌을 줄 부분을 확실히 정해야 그 외의 곳에서 규칙을 깰 여유가 생긴다. 다시 말해 전략이 필요하며, 전략은 소비자 통찰에서 비롯되어야 한다.", "브랜드의 방향성은 하나지만 그 방향성을 다양한 방법으로 표현할 수 있고, 또 표현해야 한다. 요즘처럼 브랜드가 모습을 드러내야 하는 곳이 다양한 때에는 늘 유연한 전술로 흥미를 끌어야 한다.", "누구나 광고 '당하는' 기분은 싫어하지만, 한편으로는 좋아하는 브랜드의 소식을 일부러 더 들으려 한다. 그러니 브랜드는 이 기회에 사람들이 실제로 보고 싶어 할 만한 콘텐츠를 만들면 된다. 지금처럼 선택의 여지가 많은 시대에 사람들의 주의집중력은 일종의 선물이며, 브랜드는 그만한 가치를 되돌려주어 그 호의에 보답해야 한다. 소셜미디어를 가장 효과적으로 활용하는 브랜드는 융통성 없는 일관성을 고집하기보다 소셜미디어 특유의 미적 취향과 언어를 자연스럽게 자기 것으로 만드는 브랜드다.", "사용자 제작 콘텐츠를 브랜드 스토리에 활용하기 위해서는 통제의 고삐를 조금 내려놓아야 한다. 사람들을 브랜드 세계의 일원으로 초대하는 순간 완벽한 일관성은 포기해야 한다. 사람들이 어떤 내용을 올릴지, 브랜드를 자기 개성에 맞게 어떻게 손을 댈지 일일이 관리할 수 없다. 하지만 잃는 것보다 얻는 것이 훨씬 더 많다. 브랜드가 항상 완벽해야 한다는 욕심을 버리면 고객의 접근성과 주도성을 높일 수 있으니 타깃 고객과 더 가까워질 기회가 훨씬 많아진다.", "브랜드는 로고만으로 소비자와 친밀감을 쌓을 수 없다는 사실을 깨달아야 한다. 마스터카드가 로고에서 회사명을 없애고 두 개의 겹치는 원만 사용하겠다는 중대발표를 했을 때, 솔직히 내 반응은 그러거나 말거나 였다. 요즘 주변 맥락 없이 로고만 볼 경우가 어디 있다고 이름이 있는지 없는지 알아차리기나 하겠는가? 로고 변경은 마스터카드가 '카드'를 넘어서서 고객에게 다른 IT 솔루션과 서비스를 제공하겠다는 신호였다. 하지만 이 정도 인식의 전환은 행동과 경험을 통해 생기지, 새로운 로고 때문은 아니다. 로고는 전체 브랜딩 시스템 속 한 부분으로서 중요한 의미를 지니며, 우리 팀도 로고가 정확한 느낌과 개념을 표현하는지 확실해질 때까지 몇 주씩 공들여 개발한다. 그렇다 해도 퍼즐의 한 조각일 뿐이다.", "우리는 창업자가 나서는 건 자아도취가 아니라 접근성을 높이는 일이라고 설명한다. 제품 상자에 얼굴을 새길 필요는 없지만, 소비자들은 물건을 살 때 물건을 만드는 사람이 누구인지 궁금해한다.", "사람들은 자신이 사는 물건을 만든 사람이 누구인지 그 어느 시대보다 주의 깊게 살펴본다. 그들은 기업이 아니라 신뢰하는 팀을 돕고 싶어 한다. 새로운 기업들이 창업팀을 브랜드 스토리의 중심으로 내세우는 이유가 여기 있다. 그래서 팀을 꾸리기 전에 누가 믿음직스럽게 기업의 얼굴로 언론 앞에, 그리고 무엇보다도 고객 앞에 나설 수 있을지 생각해봐야 할 것이다.", "브랜드는 창업자가 회사의 성장에 발맞춰 내부 팀과 꾸준히 만들어가는 조직문화이며, 회사가 보여주고 행동하는 모습 하나하나이고, 세상의 변화에 따라 기업이 무엇을 이야기할지, 무엇을 제공할지 끊임없이 진화시켜 가는 과정이다. 브랜드가 어떤 가치를 내세우는지, 그 가치가 왜 중요한지 힘들게 정의한 뒤에도, 그 생각을 표현해 소비자에게 보여주고 그 표현을 항상 신선하게 유지하려면 어마어마한 창의성과 전문성이 필요하다. 이 책에서 브랜드는 단지 로고가 아니라 그 이상이라고 여러 번 이야기했지만, 브랜드를 겉으로 표현하는 방법은 무척 중요하다. 이런 표현이 브랜드의 인상을 만들고, 사람들은 이런 인상에 힘입어 브랜드를 이해하고 결국 브랜드 덕후가 되기 때문이다. 다시 말해 표현 하나하나가 중요하다. 세심한 디자인과 명확하고 매력적인 메시지가 있어야 소비자들이 주목하고 브랜드를 자신의 세계로 초대하며, 시간이 지나도 계속 관심을 유지하는 것이다. 훌륭한 디자인과 그 디자인의 구현에 꾸준히 일관성 있게 투자하는 브랜드는 신뢰할 만하고 정통성이 있다는 인상을 준다. 이는 뭔가 새로운 것을 세상에 내놓을 때는 특히 더 중요하다. 사람들에게 듣도 보도 못한 회사를 위해 카드를 긁으라고 할 거면 '실존하는 회사'가 맞는지 의심하는 일은 없어야 하지 않을까. 사업 아이디어가 얼마나 굉장하든 상관없이 당신이 새롭고 생소한 것을 내놓을수록 브랜드를 통해 유대감을 쌓는 일은 더욱더 중요하다.", "고객이 접하는 모든 단계마다 유용하고, 기억에 남고, 기쁨을 주는 경험을 만들어야 한다. 결국에는 머리부터 발끝까지 고객을 위해 존재하는 브랜드를 만들 때 고객의 덕심이 우러나오는 것이다. 오늘날 성공하는 브랜드는 권력이 기업에서 소비자로 이동한 현실을 알아보고 존중하며, 이를 매일 행동으로 보여주는 브랜드이다."]}, {"title": "방송 연출 기본기", "author": "정영택", "genre": "예술", "publisher": "다이브캐스트", "passages": ["연출은 의도를 이루기 위해 몰입이란 수단을 쓰는 작업이며, 의도와 몰입 사이의 줄을 타는 작업이다. 균형을 잃고 어느 한쪽으로라도 넘어지면 의도는 이룰 수 없다.", "연출을 잘하기 위해서 좋은 작품을 많이 보는 것도 중요하지만, 가장 빠르고 성능 확실한 방법은 직접 편집을 해보는 것이다. 편집을 해보면 의도나 몰입에 넘치는 부분이 뭔지, 부족한 부분이 뭔지, 필요한 부분이 뭔지 알게 된다. 그래서 편집 경험이 많은 사람은 기획 과정부터 탄탄한 구성과 포맷을 짜거나 촬영 과정에서도 필요한 부분을 놓치지 않고 찍는다.", "기획의도는 내가, 팀이, 클라이언트가 영상을 통해서 시청자에게 전하려는 메시지를 말한다. 기획의도를 이룬다는 것은 메시지 전달 그 자체가 될 수도 있고, 메시지 전달을 통해 감정이나 행동의 변화를 이끌어 내는 것이 될 수도 있다. 복면가왕-\"노래 실력만으로도 인정받을 수 있다\" 가짜사나이-\"이런 사람들도 한다. 당신도 할 수 있다\"", "무한도전-멤버들이 봅슬레이에 도전한다-경험도 없는 멤버들이 탈 수는 있을까?-전진과 형돈이 부상을 입었네, 출전할 수 있을까?-재석, 명수, 준하 최고령 멤버들이 출전하게 됐네, 완주할 수 있을까?-무사히 완주했다.-야 재밌었다! 사람들이 반복한 공통된 행위는 무엇인가? 수많은 질문을 던졌다! 누가 시키지도 않았는데 스스로 수많은 질문을 던졌다! 보면서 그 질문들이 해결되고, 또 다른 질문이 생기고 또 해결되는 과정이 반복된다. 사람들은 스스로 계속 참여한다. 이 과정이 바로 '몰입'이다. 이야기를 재미있게 만들고 싶다면, 이야기가 끝나기 직전까지 스스로 질문과 해결을 반복하도록 만들어라. '어떻게 해야 재미있을까?'가 아닌 '어떻게 해야 궁금할까?'를 고민해라.", "시청자가 질문을 던지고 추리할 수 있도록, 복면과 가왕, 연예인 판정단과 개인기 타임이란 포맷을 잡는다. UDT 훈련 체험과 강력한 교관, 퇴소라는 장치를 넣는다. 재연과 실험, 인터뷰를 한다. 기획의도 실현에 필요한 영상들을 얻기 위해, 취재를 하고 장치를 넣고 포맷을 잡는다. 그렇게 얻은 영상들을 촬영 순서와 상관없이, 시청자 스스로 질문과 해결을 반복할 수 있도록 편집한다. 이 두 가지를 성공하면 기획의도는 마법처럼 자연스레 이뤄진다. 이게 영상 연출이다. 이게 다다.", "출연자의 의도나 감정이 드러나는 '행동'을 보여주면 시청자는 집중하고, 질문하고, 추측한다. '행동'들을 이어 붙이면 이 과정을 반복하며 몰입하게 된다.", "영상 구성의 기본은, 기획의도 실현에 필요한 장면중에서 출연자의 의도나 감정이 드러나는 '행동'을 찾아 채워나가는 것이다. 영상은 행동을 보여줘야 제 효과를 발휘하는 매체다. 행동을 보여줘서 집중하게 만들어야 한다. 시청자의 입에 직접 떠먹여주는 게 아니라 \"내가 뭘 본 거지? 뭔 장면이지?\"라고 직접 생각하게 만들어야 한다. 그래야 그 답을 찾기 위해, 이어지는 장면들에 몰입하게 된다.", "기록물이나 보도물은 '리얼'이 중요하다. 사실을 있는 그대로 전해야 한다. 반면 교양, 예능 같은 구성물은 '리얼리티'다. 사실을 있는 그대로 전하는 게 아니라 '진짜 같아' 보이게 만드는 것이다. 현실을 수정해도 된다는 뜻이고, 시청자의 몰입을 위해선 그래야만 한다. 하지만 행동의 의미를 반대로 왜곡하거나, 없던 일을 만들어내란 게 아니다. 그건 조작이다. 그렇다면 대체 조작이 아닌 수정은 무엇일까? 시청자에게 현실보다 강렬한 경험을 선사하기 위해, 의미를 훼손하지 않는 선에서 컷을 바꾸거나 구성 순서를 바꾸는 것이다. 이 선을 잘 타는 것이 중요하다.", "출연자의 의도나 감정이 드러난 행동을 찾으려면, 평소 사람에 대해 관심을 갖고 관찰하며 행동의 의미를 파악하는 꾸준한 연습과 훈련이 필요하다.", "시청자 스스로 질문을 던지고 해답을 찾도록 만드는, 즉 시청자를 몰입시키는 세상에서 가장 유명하고, 강력하고, 자주 쓰이는 방법은 딱 한 줄로 설명된다. 누군가가 어떤 일을 하려고 대단히 노력하는데 그것을 성취하기는 매우 어렵다.", "관객이 '누군가'와 감정이입하고 있다는 건, 출연자와 우리 자신을 동일시한다는 말이다. 또 출연자가 실제 시청자와 유사성을 지닐 때 동일시 효과는 커진다고 한다. 출연자도, 나도, 너도, 우리도 '사람'이란 사실만 같은데. 사람답게 밥 먹고 똥 싸는 컷을 붙이면 감정이입이 되려나? 그냥 호감만 조금 생기고 말 것 같다. 더 센 게 필요한데 '사람'이라면 다들 뭘 하면서 살아갈까? 너도 하고 나도 하는 어려운 행동이 뭘까? 바로 '노력'이다. 원하는 것을 이루기 위해 뭔가를 하려고 애쓰는 것. 출연자도 여기까지는 해줘야 우리 같은 '사람'으로 느껴진다.", "내적으로든 외적으로든 원하는 걸 이루기 위해 뭔가를 하는 출연자의 행동을 찾아 편집하는 것이 바로 감정이입을 위한 첫 번째 방법이다. 왜냐? 모든 시청자는 '노력'이란 행동이 힘들다는 걸, 이미 경험으로 뼈저리게 알고 있기 때문이다.", "누군가 행동하고 누군가 반응하는 컷을 붙인다. 이것이 편집의 처음이자 끝이다. 1명이 행동하든, 100명이 행동하든, 카메라 1대가 됐든, 100대가 됐든 이 구조에서 스케일만 커진 것이다. 행동하는 자와 반응하는 자가 있고, 반응하는 자는 다시 행동하는 자가 된다. 편집은 무엇이든 행동-반응의 구조에서 벗어날 수 없다. 우선 내가 전달하려는 의도를 행동으로 드러내는 출연자를 찾자. 당연히 반응하는 자들도 있을 것이다(침묵도 반응이다). 거기서부터 시작이다.", "일본의 영화감독 기타노 다케시의 요리 비유로 살펴보자면, 샷의 크기가 클로즈업으로 갈수록 불을 세게 올려 빨리 볶을 수 있다. 다시 말하면 '여기 집중하자!'라고 더 크게 소리쳐서, 단번에 연출자의 의도를 전할 수 있다. 하지만 길면 타버리는 것처럼, 시청자를 지치게도 한다. 마치 단 음식을 먹을 때 처음엔 매우 달지만 나중엔 그저 그런 것처럼, 길고 거듭되는 클로즈업은 의도 전달을 무뎌지게 한다. 풀 샷으로 갈수록 불을 약하게 줄여 조리는 것과 같다. 약한 불로는 오래 조리되듯 시청자는 풀 샷에 담겨있는 모든 것들을 관찰하며 자신이 보고 싶은 것을 보고 생각할 수 있는 시간을 가질 수 있다. 단점은 클로즈업의 반대, 바로 연출자의 의도를 단번에 강렬히 전달하기 힘들다는 것이다.", "구소련의 뛰어난 다큐멘터리 제작자 지가 베르토프는 \"슬로 모션은 시간의 클로즈업이다\"라고 말했다. 슬로컷은 해당 행동에 대한 시청자의 체험을 길게 늘여, 빨리 지나가 버리는 행동을 관찰하고 인지할 수 있게 해 준다. 그로 인해 클로즈업처럼, 센 불로 요리하듯 연출자의 의도를 단번에 강렬히 전달할 수 있다. 반대로 빠르게 줄인 패스트 컷은 오랜 시간 걸쳐 이뤄진 행동의 경과를, 풀 샷이 한 컷에 여러 정보를 담듯 한눈에 인지할 수 있도록 해준다.", "봅슬레이 완주 기록은 57.40초이다. 무도는 의도와 감정을 담기 위해, 57.40초를 5분 1초로 늘려놨다.", "'준비'는 방송판에서 '니주를 깐다'라고도 말한다. 어떤 사건이 일어나는 장면 전에, 분위기를 잡거나 사전 정보를 전달하는 것을 말한다. 예를 들어 KBS에서 이만기와 강호동이 천하장사 재대결을 시작하기 전, 예전 자료화면을 붙였다. 자료화면은 바로 젋었던 시절, 최고의 씨름선수였던 그들의 경기 장면이다. 이 자료화면을 본 시청자는 알았던 사람은 알아서, 몰랐던 사람은 몰라서 가슴이 벅차오른다.", "전달되는 컷의 정보를 모두 파악하지 못하고 컷이 넘어갈 때 시청자는 빠른 속도감을 느낀다. 완벽히 이해하지 못해서 추측하게 되고, 추측 속도보다 컷의 변화가 빨라서 추측이 끝나기도 전에 또 새로운 시각 정보가 전달되는. 즉 머리가 시각 정보를 따라가지 못해서 리듬이 빠르다고 느끼는 것이다. 그 결과, 이해하기 위해 머리를 긴장시키고 적극적으로 장면을 따라가게 된다. '이해하기 힘들게 만들어 추측하게 한다.' 이것이 바로 빠른 리듬이 몰입을 만드는 원리다.", "'충돌'은 컷과 컷이 붙으며 생기는 시각적인 충격을 말한다. 그리고 그 충격을 일으키는 컷의 시각 정보, 즉 충돌 요소는 '롱 샷/바스트 샷'처럼 샷의 크기만 있는 게 아니다. 빛과 어둠, 클로즈업과 와이드 숏, 왼쪽에서 오른쪽으로의 움직임과 오른쪽에서 왼쪽으로의 움직임, 정적과 활동, 종교와 정치 등을 배치했을 때 컷에서 충돌이 만들어진다. 이들은 조화로움, 균일한 흐름, 평온함에 약간의 충격과 변화를 준다.", "긴장감을 주는 방법, 소위 '쪼는' 방법엔 공통점이 있다. 바로 시간을 늘리는 것이다. 정확히는 중요한 부분에서 리얼타임보다 체감 시간을 늘리는 것이다. 왜냐? 결과를 늦게 보여줘서 조마조마 애태우게 만들기 위해서다. 빠른 리듬은 시청자를 추측하게 하고 따라가게 만들어 긴장을 유발한다. 하지만 제대로 된 긴장감을 주고 싶다면, 시청자에게 지금의 상황을 이해시켜 놔야 한다. '지금 상황은 알겠어! 그래서 다음은 어떻게 되는데?' 기대라는 것도 뭘 알아야 할 수 있기 때문이다. 그래서 사용되는 건 '느린 리듬'이다. 느린 리듬을 만들기 위한 방법은 빠른 리듬을 만들 때와는 반대다.", "'느린 리듬'을 만드는 방법 1- 컷의 지속시간을 길게 하고, 적은 컷을 붙인다. 2- 충돌 요소를 활용해 시청자의 뇌를 멈칫하게 한다. 3- 대사와 감정 변화를 줄인다. 출연자의 목표와 감정을 고정해, 시청자도 샛길로 빠질 틈을 주지 않는다. 4- 움직임의 동선을 모두 보여준다. 슬로를 걸어 보여줄 수도 있다.", "언제나 대사보다 행동이 강렬하다. 대화 장면의 편집을 하더라도, 대사를 뛰어넘어 더 많은 걸 드러내고 추측하게 만드는 행동이나 인서트가 있다면 활용해보자. 그것을 보고 시청자는 생각을 멈추지 않을 것이다. 천 마디 말보다 사진 한 장이 낫다. 이 말은 대화 장면에서도 통한다.", "편집을 계속하며 느낀 것이 있다. 사람은 오디오에 민감하다. 컷이 튀는 것보다, 오디오가 튀는 것을 못 견딜 정도로 오디오에 민감하다. 오디오가 매끄럽게 연결돼 있으면, 컷이 좀 튀어도 대수롭지 않게 넘어가는 경우가 많고, 다음 컷의 오디오가 먼저 들리면, 컷이 튀지 않는 것처럼 느끼기도 한다. 그래서 영상을 매끈하게 다듬을 때, 다음 컷의 오디오를 비디오가 나오기 전 2~3 프레임 먼저 삽입하는 스플릿 편집을 쓰기도 한다.", "음악을 잘못 쓰면 그때부터 리듬의 주도권은 음악으로 넘어가, 시청자의 영상 집중을 방해한다. 하지만 영상 리듬과 음악 리듬이 어울릴 때, 그 시너지는 대단해서 안 쓸 수도 없는 노릇이다.", "촬영이 기획의도를 이루기 위해 달려가는지, PD인 나뿐만 아니라 모두가 두 눈 부릅뜨고 지켜보고 있다. 연출진과 작가진이 모여 그날의 촬영을 돌아보고, 부족한 부분을 찾고, 대안을 마련해 다음 날 촬영에 채워 넣는다. 이것도 물론 최종 이미지가 없거나 모두에게 공유되지 않았다면 있을 수 없는 과정이다. 뭐가 부족한 지도 알 수가 없으니까. 이뿐만 아니라 지금, 이 상황에서 무엇이 가장 중요한지도 '최종 이미지'를 기준으로 판단해서 연출한다.", "촬영을 진행하거나 문제가 생길 때 모두가 PD를 바라보는 이유는 PD가 최종 결정권자라서 그런 것보다, PD만이 가장 정확한 '최종 이미지'를 그리고 있어서다. 그게 없이 \"나중에 편집할 거니까, 일단 그냥 다 찍어주세요\"라고 한다면, 모두가 대번에 안다. '이 사람 PD 아니구나.' 신기하게도 그 순간부터 모든 스태프의 열의가 솜사탕에 뜨거운 물 부은 마냥 녹아 없어지기 시작한다."]}, {"title": "백의 그림자", "author": "황정은", "genre": "소설", "publisher": "창비", "passages": ["그림자 같은 건 따라가지 마세요. 라고 말하는 무재씨의 모습이 어쩐지 부옇다고 생각해서 눈에 힘을 주고 바라보니 거미줄처럼 가느다란 여우비가 내리고 있었다. 가만히 서 있자 눈꺼풀이 젖어서 묵직해졌다. 아래쪽으로 늘어진 열개의 손가락 끝에 물방울이 맺혔다. 입술에 고인 빗물의 맛이 짰다. 맥이 탁 풀린 채로 얼마간 서 있었다.", "무재씨, 춥네요. 가만히 서 있어서 그래요. 죽겠다. 죽겠다니요. 그냥 죽겠다고요. 입버릇인가요. 죽을 것 같으니까요. 무재씨가 소매로 풀 즙을 닦아내고 똑바로 서서 나를 바라보았다. 그러면 죽을까요? 여기서,라고 너무도 고요하게 말하는 바람에 나는 겁을 먹었다. 새삼스럽게 무재씨를 바라보았다. 나보다 조금 키가 커서 내 눈높이보다 한뼘 반 정도 위쪽에서 나를 내려다보고 있었다. 검은 눈이었다. 평소엔 좀 헝클어진 듯 부풀어 있던 머리털이 빗물에 젖어서 차분하게 가라 앉아 있었다. 은교씨, 하고 무재씨가 말했다. 정말로 죽을 생각이 아니라면 아무렇게나 죽겠다고 말 하지는 말아요. 네.", "소년 무재의 부모는 개연적으로, 빚을 집니다. 개연이요? 필연이라고 해도 좋고요. 빚을 지는 것이 어째서 필연이 되나요? 빚을 지지 않고 살 수 있나요. 그런 것 없이 사는 사람도 있잖아요. 글쎄요, 하고 무재씨가 나무뿌리를 잡고 비탈을 내려가느라고 잠시 말을 쉬었다가 다시 말했다. 그런 것 없이 사는 사람이라고 자칭하고 다니는 사람을 나는 별로 좋아하지 않아요. 조금 난폭하게 말하자면 누구의 배도 빌리지 않고 어느 날 숲에서 솟아나 공산품이라고는 일절 사용하지 않고 알몸으로 사는 경우가 아니고서야, 자신은 아무래도 빚이 없다고 말하는 사람은 뻔뻔한 거라고 나는 생각하고 있어요.", "당신, 그림자를 따라갔나요, 라고 그녀가 떨리는 목소리로 묻자 소년 무재의 아버지는 고개를 끄덕입니다. 얼마나, 얼마나 따라갔나요, 라고 소년 무재의 어머니가 묻자 그는 조금 따라갔어, 아주 조금만 따라갔어, 라고 대답합니다. 소년 무재의 어머니는 자식들을 향해 돌아앉아서 눈물을 닦습니다. 소년 무재의 아버지가 그녀를 돌아보며 말했습니다. 당신 그렇게 울지 말아요, 조심할게요. 조심할 건가요. 다음번에 일어서더라도 깊이 따라가지 않도록 조심할게요. 깊거나 말거나 따라가지를 말아야죠, 애초에 따라가지를 말아야죠. 따라가지 않을게요. 약속해줄 건가요. 약속할게요. 이렇게 약속할게요, 라고 말했지만 그날 이후로 소년 무재의 아버지는 아무래도 남몰래 그림자를 따라거나 하는 듯 별로 먹지도 않고 말하지도 않으면서 나날이 헬쑥해지는 것이었습니다.", "그래서 그림자를 따라가는 기분이 어땠나. 나쁘지 않았어요. 자꾸 따라가게 되던데요, 라고 말하자 그렇지,라는 듯 여씨 아저씨는 고개를 끄덕였다. 그게 무서운 거지, 그림자가 당기는 대로 맥없이 따라 가다보면 왠지 홀가분하고, 맹하니 기분이 좋거든, 좋아서 자꾸 따라가다가 당하는 거야, 사람이 자꾸 맥을 놓고 있다보면 맹추가 되니까, 가장 맹추일 때를 노려 덮치는 거야, 라고 말해두고 그때까지 쥐고 있던 오실로스코프 바늘을 가만히 작업대 위에 내려놓았다.", "나, 왔습니다. 라고 말하며 유곤씨가 수리실로 불쑥 들어왔다. 사장님 나, 이천원만 빌려주시지 않겠습니까. 뭘 하려고? 여씨 아저씨가 무뚝뚝하게 묻자 유곤씨는 흰 단추가 달린 앞섶을 손으로 가만히 누르며 말했다. 내가 쓸 생각입니다. 어디다 쓸 생각인데. 복권을 사는 데 쓸 생각입니다. 에라. 이번엔 틀림없다는 계산이 나왔습니다. 틀림없다는 그 계산, 틀리지 않은 적이 있었나. 이번엔 다릅니다. 뭐가 달라. 틀림이 없다는 점이 다릅니다. 라면서 유곤씨는 수리실 구석에 놓이 등받이 없는 의자에 꼿꼿이 등을 펴고 앉아서 두서없는 이야기를 늘어놓았다. 오늘은 아침부터 발가락이 아픕니다, 발가락이 그런 식으로 아프면 날씨가 좋지 않게 마련입니다. 오전엔 그래도 날씨가 좋을 듯하여 방심했건만 오후가 되고 보니 역시 공기가 무겁지 않겠습니까, 올라오는 길에 보니 접는 우산을 양동이에 두어개 담아둔 가게가 있었는데 그건 파는 우산일지 모르겠습니다, 일전에 이 수리실에 우산을 하나 두고 간 것 같은데 그게 남아 있을지 모르겠으나 남아 있지 않더라도 언젠가 유용하게 사용하셨을 테니 섭섭하게 생각하지 않겠습니다, 남아 있다니 말이지만 두 사람이 밥을 먹을 때 계란말이가 한조각 남는다면 그것은 정말로 애매한 문제가 아니겠습니까, 계란말이, 좋아하십니까, 나는 좋아합니다, 라는 둥 듣거나 말거나 상관없다는 듯 말하면서 언제나 손에 쥐고 다녀 반질반질하게 닳은 계산기를 무릎 위에 올려놓고 만지작거렸다.", "등교할 시간이 되었는데도 집에 머물러 있는 것을 보고도 아버지는 내게 아무 말 하지 않았다. 그런 날이 이어져 얼추 한달이 되어서 오히려 내 쪽에서 침묵을 견디다 못해 이제 더는 학교에 가지 않겠다고 말해도 그래, 하고는 그만이었다. 일을 해보고 싶다고 말해도 그래, 하고는 그만이었고 근처에 방을 얻어서 짐을 먼저 보낸 뒤에 현관에서 갈게요, 라고 했을 때도 그래, 하고는 그만이었다. 먼 데서 찌이, 하고 한꺼번에 매미들이 울자 계단 쪽에서 끄 하고 따라 울었다. 냉장고에 있던 호박을 썰어서 호박국을 끓였다. 대강대강 자른 호박을 기름에 볶다가 새우젓을 넣어 간을 보고 물을 부었다. 서너번 먹을 분량으로 양을 맞춘 다음 끓기를 기다렸다가 내 몫으로 한그릇 덜어냈다. 간장에 절인 마늘과 김치를 곁에 놓아두고 아버지도 없는 아버지의 집에서 호박국에 밥을 먹었다. 활짝 열어둔 창으로 바깥이 내다보였다. 두건을 쓴 아주머니가 물통을 실은 수레를 끌며 약수터로 가는 비탈을 오르고 있었다. 멀리 높은 곳에서 힘차게 매미들이 울었다. 계단 쪽에서도 끄, 하고 들려왔다. 기력이 없어 제대로 울 수 없는 듯 두어번 울다가 말았다가 울었다가 더는 울지 않았다. 그릇을 닦아두고 나가보니 뒤집어져 있었다. 갈게요,라고 말하고 문을 닫았다.", "차라리,라고 생각했다. 어두운 것이 되면 이미 어두우니까, 어두운 것을 어둡다고 생각하거나, 무섭다고 생각하는 일은 없지 않을까, 아예 그렇지 않을까, 어둡고 무심한 것이 되면 어떨까, 그렇게 되고 나면 그것은 뭘까, 뭐라고 부를 수 있을까, 아 모르겠다 모르겠어, 모르도록 어두워지자, 이참에,라고 생각하며 눈을 뜨고 있는데 전화벨이 울렸다.", "그 속에서 전구를 파는 노인은 숱 많은 머리칼이 모두 하얗게 세어버린 칠십대 노인이었다. 그는 벽돌만 한 골판지 상자들이 빼곡하게 들어찬 선반을 등진 채로 나무 책상과 걸상을 놓아두고 앉아 있었다. 침침하게 머리 위를 밝히고 있는 알전구 불빛 속에서 그는 언제나 무언가를 들여다보며 골똘히 생각에 잠겨 있다가 손님이 찾아와서 어떤 종류의 전구를 달라고 말하면 대답도 없이 서서히 걸상을 밀며 일어났다. 서두르는 법 없이 그렇다고 망설이는 법도 없이 선반의 한 지점으로 부들거리며 다가가서, 어느 것 하나 새 것이 아닌 골판지나 마분지 상자들 틈에서 벽돌을 뽑아내듯 천천히 상자 하나를 뽑아 내고 그것을 책상으로 가져와서 일단 내려둔 뒤엔 너덜너덜한 뚜껑은 젖혀두고, 이번엔 다른 선반으로 걸어가 손바닥만 한 비닐봉투 한장을 가지고 책상으로 돌아온 뒤, 시간을 들여 정성껏 봉투를 벌려서 입구를 동그랗게 만든 다음에, 오른손을 상자에 넣어서 손톱만 한 전구를 한움쿰 쥐고 나서, 왼손에 들린 채로 대기하고 있는 봉투 속으로 한번에 한개씩, 언젠가 내가 다른 손님들 틈에서 순서를 기다리고 있다가 재미있게 얻어들은 바에 의하면, 제비 새끼 주둥이에 뻥 과자 주듯, 떨어뜨렸다.", "지금 생각해보면 장사를 어떻게 했을까 싶을 만큼 말도 그렇고 여러모로 서툰 점이 많은 사람이었는데, 함께 순대를 먹으며 앉아 있다가도 사람이 지나가면 슬쩍 일어나서 말을 걸곤 했어요. 어린 마음에도 나는 이렇게 호객하는 아버지를 보는 것이 당황스럽고, 사람들이 그가 하는 말을 못 들은 척하며 지나가는 것이 싫어서 종종 울었거든요. 이유도 말하지 않고 우니까 못됐다고 혼도 많이 났지만 나는 그냥 속이 상했을 뿐이었고요. 그런 속을 모르고 혼을 내니까 더 속이 상해서 더 울고 더 혼이 나고, 하다보면 아버지가 더는 아무 말도 하지 않고 나로부터 고개를 돌리고 있었어요. 거기까지 되고 보면 나는 더 울 수가 없어서 아버지 곁에 그냥 서 있었고요. 돌아가신 지가 오래라 그런 기억이란 희미해질 법도 한데 도무지 그렇지가 않아서, 나는 이 부근을 그런 심정과는 따로 떼어서 생각할 수가 없는데 슬럼이라느니, 그런 말을 들으니 뭔가 억울해지는 거예요. 차라리 그냥 가난하다면 모를까, 슬럼이라고 부르는 것이 마땅치 않은 듯해서 생각을 하다보니 이런 생각이 들었어요.", "나는 이렇게 차가운 음식 말고 따뜻한 음식이 먹고 싶어요, 국물이요, 먹으면 배가 따뜻해지는, 따끈하고 맑고 개운한 국물이 있는 것을, 듬뿍 먹고 싶거든요, 라고 훌쩍거리며 말하다가 코를 닦고 국수를 마저 먹었다. 세탁기가 탈수를 마쳤다고 조그맣게 알람하고 있었다.", "충분히 갈 수 있다는 대답을
