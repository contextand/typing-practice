 그 대신 나에게 푹 안겨서 열심히 울었다. 그리고 자기가 꼭 한국에 가겠다고 했다. 나보고 오라는 소리는 하지 않았다. 오지 않을 걸 안다는 듯이. 가서 꼭 같이 눈을 맞아요. 그렇게 이야기하는 안나의 목소리는 정말이지 진실되었다. 나는 눈이 오지 않는 나리에 사는 사람이 함께 눈을 맞자고 하는 말의 의미를 알고 있었다. 천천히 고개를 끄덕이고 내가 가장 하고 싶은 말, 그리고 해야 할 말을 했다. \"꼭 안전해야 해.\" 나는 그 말을 하면서도 자꾸자꾸 미안했다. 특정할 수 없는 모든 이들에게 미안했다.", "왜 산 사람들은 죽은 사람들의 흔적을 필사적으로 지우려고 할까. 또 어떤 죽음은 거룩하게 포장되고 어떤 죽음은 조용히 잊힌다. 그것이 단순한 우연에 불과한 걸까? 나는 다시 한 번 내가 경험했던 그 거대한 상실을 떠올렸다. 엄마의 죽음, 나는 엄마의 죽음을 통해 갈라지고 쪼개지고 으깨지고 녹아내렸다. 상실은 극복되는 것이 아니다. 나는 수많은 상실을 겪은 채 슬퍼하는 사람으로 평생을 살아가게 될 거고 그것은 나와 관계 맺은 이들에게까지 이어질 것이다. 엄마를 잃음으로써 내가 상실을 겪을 것이고 우리 같은 사람들은 그 상실의 늪 속에서 깊은 슬픔과 처절한 슬픔, 가벼운 슬픔과 어찌할 수 없는 슬픔들에 둘려싸여 종국에는 축축한 비애에 목을 축이며 살아가게 되겠지. \"나는 슬픔을 믿을 거야.\" 처량하고 처절하고 절실한 것들을 믿을 거야. 내가 이렇게 말하자 혜란이 고개를 들어 하늘을 쳐다보았다.", "한 사람의 궤적이 온전히 그 사람의 몫이라고 할 수는 없다. 한 사람의 궤적은 온 사람의 궤적이 되고 그 궤적은 종내 알 수 없는 문양을 한 채로 우리 모두를 잡아끈다.", "내가 겪는 아픔과 내 주변 사람들이 겪는 아픔은 어떻게 이어져 있을까. 또 내 주변의 고통과 세상 사람들이 겪는 고통은 어떻게 관련되어 있는 것일까? 세월호 이후 거듭된 참사에 뒤따랐던 상반된 반응들을 떠올려보자. 누군가는 자기 일인 것처럼 괴로워한다. 누군가는 그저 멀리서 일어난 남의 일로 여긴다. 누군가는 슬퍼하는 사람들을 조롱하고, 누군가는 피로감을 드러내며 그만 이야기하라고 한다. 여기저기서 편집증적인 음모론이 대두되기도 한다. 그리고 누군가는 무시나 조롱에 맞서 '당신 자신이, 혹은 당신 가족이 그런 일을 겪는다고 생각해보라'라고 말한다. '당신의 일이라고 생각해보라.' 그런 말을 할 때, 사람들은 남의 일을 내 일처럼 상상하면서 다른 이에게 공감할 수 있다고 전제한다. 거꾸로 생각해보면, 공감을 위해서는 상상력이 필요하다는 것이다. 상상력은 멀리서 일어난 일을 가까이 불러 올 수 있다. 상상력을 통해 다른 이의 상황에 나를 놓을 수 있다. 소설을 읽을 때 우리가 하는 일이 그런 것 아닐까. 내가 아닌 다른 누군가의 자리에 서보기.", "공감은 분명 타인과 나를 이어주지만, 그 확장의 범위는 내 시야와 마음의 한계를 벗어나기 힘들다. 이 소설을 이러한 한계를 문제 삼으며, 우리의 상상력과 공감이 어떻게 '나' 혹은 '우리'의 한계를 넘어 '영원'에 닿을 수 있는지 묻고 있다. 그렇다고 우리의 삶과 동떨어진, 공허하고 추상적인 당위를 주장하는 것은 아니다. 소설은 내 일과 남의 일, 가까운 것과 먼 것, 현재와 과거의 관성적 구분을 흐리면서 그것들이 결코 구분되는 것이 아님을 보여주려 한다. 현재의 사건과 과거의 사건이, 가까운 슬픔과 먼 슬픔이, 개인의 번민과 집단적인 애도가, 자국의 참사와 외국의 참사가 친구들의 이야기 속에서 베를 짜듯 엮인다.", "기억의 주관성. 친구들은 비슷한 기억을 공유하면서 더 가까워지고 끈끈해진다. 하지만 기억은 주관적이고, 같은 일을 겪은 사람도 상황을 다르게 기억한다. 한 사람의 기억 속에서는 흐린 배경 속에 잠겨버린 사소한 말다툼이, 다른 사람 기억 속에서는 오래도록 예리한 조명을 받는다. 한편 기억의 관성은 가까운 관계에서 오히려 더 치명적일 수 있다. 과거에 알던 모습을 통해 계속해서 상대를 판단하고 평가하게 되기 때문이다. \"우리가 갖고 있던 기억에 의존해 지금의 석이의 모습을 우리 식대로 만들어내고 생각의 흐름을 판단하고 있었던 것이다.\"", "이해하기 전에 판단해버리는 일, 그러고는 이해했다고 착각하는 일. 이것이 아마 가장 결정적인 난관일 것이다. 화자는 자신이 알던 친구의 모습에 따라 지금의 석이가 어떤 상태일지 판단했는데, 그 판단이(완전히 틀린 것은 아니었을지라도) 많은 것을 보지 못하게 했다. 타인을 정말로 이해하기 위해서, 벗어나기 어렵지만 벗어나려고 애써야 하는 것은 결국 '나'의 한계라고. 이 소설의 '나'가 혜란과 함께 석이를 찾아가는 과정은 결국 관성적인 '나'로부터 벗어나는 여정이 아닐까. 나의 기억, 나를 중심으로 한 멀고 가까움, 내가 가진 것과 가지지 못한 것에 대한 자의식, 나의 도덕적 기준, 나의 판단 이것들을 내려놓기란 말처럼 쉬운 일은 아니다. 하지만 분명한 것은, 우리가 사랑하는 사람들과의 관계에서는 나를 내려놓아야만 하는 일들이 일어난다는 사실이다. 마치 나를 구성하는 관계가 동시에 나의 와해를 요구하는 것처럼. 나를 지금의 나로 만든 사람들, 그래서 좋든 싫든 나의 일부가 된 이들은 나를 무너뜨릴 수도 있다. 어떤 관계들은 \"나를 망가뜨릴 수 있는 문제\"가 된다. 어쩌면 내가 무너질지도 모르는 위험을 감수하는 일-이것이 이해와 공감에, 그리고 애도에 필요한 일일 것이다. 소설이 진행되는 동안 화자가 여러 번 놀라고, 부끄러워하고, 자신의 판단을 번복하고 후회하는 이유는, 그가 특별히 어리석은 사람이기 때문은 아니다. 오히려 사라진 친구를 이해하기 위해 자신이 변하는 것을 감내할 만큼 용감한 사람이기 때문이다.", "유한한 우리는 어떤 시공간에 속박되어 있고, 특정한 관점으로 세상을 볼 수밖에 없으며, 각자가 겪는 생활의 문제에 매여 있다. 내 한몸 건사하기도 힘든데 어떻게 다른 이들을 염려하고, 심지어 이 세상에 책임감을 가질 수 있을까. 그 모든 연결 하나하나에 온 마음을 쏟으면 마음을 탕진하게 되지 않을까. 영원에 진 빚을 갚느라 파산하지 않으려면, 석이가 그랬던 것처럼, 결국 신에게 의탁할 수밖에 없는 것 아닐까? 아니면 화자가 그랬던 것처럼 \"직접적으로 연루되어 있지 않은 일에는 쉽게 눈을 감아버리는 사람\"이 되거나. 하지만 반대로 이렇게 생각해볼 수도 있다. 우리가 뭐든 감수할 수 있을 정도로 강하고 큰 존재라서가 아니라, 반대로 취약하기 때문에, 누구도 다른 이에게 의존하지 않고 살 수는 없기 때문에 그런 빚을 감당하는 것이라고. 따라서 빚을 감당해야만 하는 것이 아니라, 어떤 의미에서는 빚을 감당할 수밖에 없고, 또 빚을 짐으로써만 우리는 살아가게 된다고. 한 친구를 이해하는 과정이 나를 깨뜨리는 노력을 요한다면, 사랑하는 사람을 상실하는 경험은 우리를 속절없이 무너뜨린다. 사람들은 사랑하는 사람을 상실할 때 자신의 일부가 함께 사라진다고 느낀다. 그가 내 안에 들어와 운명을 함께하고 있었기 때문에, 나의 일부는 그에게서 빌린 것이었기 때문에. 만약 '연루'된다는 것이 그처럼 누군가를 내 안으로 받아들이고 그럼으로써 상실과 상처에 노출되는 일이라면, 연루됨은 세상을 살아가는 인간 존재의 조건이라고 할 수 있다.", "사실은 극복할 수 있는 것이 아니고, 극복되어야만 하는 것도 아니다. 상실의 경험은 우리를 영영 변화시킨다. 그렇지만 이것은 단지 체념이나 무기력을 뜻하지 않는다. 화자가 슬픔을 믿는 이유는, 슬픔이 단지 우리를 괴롭게만 하는 것은 아니기 때문일 것이다. 오히려 슬픔은 '정상적'인 일상이 보지 못하게 하는 무언가를 보게 해준다. 우리가 서로 어떻게 연결되어 있는지, 어떻게 상실에 노출되어 있는지, 그렇기에 얼마나 취약한 존재인지를. 이 사실을 직시하고 받아들이면, 우리가 참사를 기억하고 애도하는 방식도 달라질 수 있을 것이다. 적어도 나의 슬픔 없는 일상을 위해 누군가의 슬픔을 외면하지는 않게 될 것이다. 나의 슬픔과 너의 슬픔 사이에 빗장을 걸지 않을 수 있을 것이다.", "나와 나 아닌 이들의 삶은 아주 복잡하고 교묘하게 얽혀 있고 그 얽힌 모양을 면밀히 바라볼 수 있으려면 우리는 다름 아닌 서로의 슬픔에 의연해져야 하는 것이 아닌가 싶습니다. 틈틈이 슬퍼하고 그 슬픔을 평생 간직하겠다는 태도야말로 나 그리고 우리를 더 단단하게 하는 것이 아닐까 그런 생각이 듭니다. 사랑하는 사람을 떠나보낸 저는 지금 슬퍼하고 추억하며 비로소 온전함을 느끼는 사람이 되어버렸습니다. 빈자리를 곱씹으며 비로소 시절을 떠올리는 사람이 되어버렸습니다. 저는 슬픔 앞에 무력하지만 그만큼 단단해진 것도 같습니다. 그래서 저는 마음껏 슬퍼하고 그것을 내보이기로 했습니다. '영원에 빚을 져서'는 실종된 친구를 찾아 떠난 사람들의 이야기입니다. 사라진 사람의 흔적을 떠나 비로소 서로가 서로에게 연루된 존재임을 알게 되는 이야기이죠. 연루되는 일은 불가항력이지만 연루된 모든 존재를 놓치지 않고 톺아보는 일은 우리에게 주어진 일이라고 생각합니다."]}, {"title": "옆사람", "author": "고수경", "genre": "소설", "publisher": "열린책들", "passages": ["이전에는 자신이 그들에게 뭔가를 알려 주고 가르쳐줘야 한다고 생각했다. 그러나 강이 알았던 건 그들도 금방 배웠고 새로운 건 더 빨리 익혔다. 이제 서른 다섯인데 이십 대 후반에서 삼십 대 초반 사이의 교사들보다 뒤쳐지는 것 같았다. 중년 교사들만큼의 연륜도 없으면서 같은 초년 교사들처럼 빠릿빠릿하지도 못했다. 언젠가부터 강은 종종 그들을 멈춰 세우고 도움을 구해야만 했다. 그럴 때, 특히 같은 질문을 다시 할 때는 꼭 미안한데, 라는 말을 붙여 썼다.", "이 시국에도 아이들은 학교 수업을 땡땡이치고 놀러다녔다. 학교에 오고 싶지 않은 아이들이 갈 만한 곳은 대체로 뻔한 법이었다. 어두컴컴한 피시방 구석 자리에서 컵라면을 먹으며 게임하는 아이를 발견할 때는 우습기도 했다. 책상에서 도망친 곳이 책상이라는 생각에.", "윤아의 집에서 멀어질수록 하지 못한 말이 입안을 맴돌았다. 윤아야, 미안한데, 너희가 정말 괜찮을까? 괜찮지 않은 거라면 내가 뭘 할 수 있을까? 지우가 아무것도 아니예요, 하고 돌아섰을 때 강이 아무것도 아니게 되어 버린 것 같았다.", "그렇구나. 소희는 모든 대답을 그렇구나로 통일했다. 이럴 때는 먼저 목소리를 높이는 사람이 진다는 걸 알고 있었다. 난 별생각 없이 한 말인데 네가 예민한 거 같아,를 말하는 사람이 이기는 게임이었다.", "은희는 예전에 타인을 선의로 돕지 않는다고 말했다. 그저 받고 싶은 걸 먼저 줄 뿐이라고.", "언제 나가? 느려서 우리 눈에는 안 보이는 거지 나가고 있어. 얘도 빈방인 줄 알고 들어온 건데 모르는 사람이랑 같이 있기는 싫을걸. 진지한 말투에 지영은 당황해서 도마뱀과 은희를 번갈아 보았다. 농담인지 아닌지 헷갈렸다. 곧 은희가 웃으면서 지영의 어깨를 툭 쳤고 지영은 재빨리 따라 웃었다. 그러면서도 불안해서 다시 확인했다. 괜찮은 거 맞지? 그냥 두고 잊어버리면 사라질 거야. 계속 신경 쓰면 더 안 움직여.", "근데 요즘엔 헤매는 것도 좋아. 말도 헤매고, 길도 헤매고. 그러는 동안에는 거기에만 집중하니까 다른 생각을 안 하게 되더라. 회사에서 잘렸던 것도, 웹툰 도전만화에서 계속 실패하는 것도, 옛날 일들도.", "알면 갖고 싶어지고 가지면 짐이야. 요즘 무서운 건 그거야. 나는 물건을 못 버린다니까. 아예 모르는 게 낫지.", "육아가 어렵다고 말하는 부모들은 대부분 잘하고 있는 사람들이었다. 자신이 아이에 대해 모르는 게 있다는 것과 노력할 일이 더 남아 있다는 것을 인정하기란 얼마나 어려운 일인지 그녀는 알았다. 그토록 어렵게 인정하고 노력해도 아이는 결국 부모가 다 알지 못하는 사람으로 커버린다는 것도.", "일을 시작하고 한이가 학원과 독서실을 다니게 되면서부터 그녀는 하루 동안 한이의 어떤 장면들만을 보게 되는 것 같았다. 아침에 집을 나서는 한이. 학원 건물 앞에 서 있는 한이. 하루 단위로 찍힌 사진 같은 조각들이 그녀에게 주어졌고 그녀는 늘 필름이 부족하다고 느꼈다. 한이는 이제 겨우 열여섯 살이었다.", "패스트푸드점과 영화관도 점원들을 키오스크로 대체하는 시대에 컴플레인트를 받는 곳에 사 '의 차이가 장애인 무용수와 비장애인 무용수 사이에, 나와 비장애인 친구들 사이에 존재했다. 춤 따위에 관심을 가지기 보다는, 몸에 주의를 기울이기보다는, 언어와 규범의 세계에서 교양과 전문성으로 무장한 어른으로 살고자 애썼다. 삶은 예측할 수 없다. 그런 내가 이제는 휠체어도 없이 어슬렁어슬렁 기어서 무대에 오르고 내린다. 몸을 움츠려온 긴 시간을 깊이 후회한다. 몸을 움직이는 일은 꽤 즐거울 뿐 아니라, 예상보다 잘할 수도 있었다. K팝 댄스를 추거나 발레 무용수들처럼 움직일 수는 없다. 여전히 2000년대 중반 그 동아리방, 술자리, 캠퍼스 한가운데로 돌아간다면 나는 장애가 없는 친구들에 비해 '효율적으로' 어떤 일을 해낼 수는 없을 것이다. 우리에게는 각자의 한계가 있다. 그러나 춤추고 춤추는 몸을 가까이서 볼수록, 함께 춤을 출수록 (미약하게나마) 몸이 간직한 어떤 '힘'을 느낀다. ​", "워크숍에 참여해 몸을 쓰며 다른 몸을 만나는 일이 늘어갈수록 어린 시절부터 내 몸에 깃든 오랜 힘을 자각한다. 아픈 나를 어머니와 아버지, 할머니가 안아주고, 쓰다듬고, 업고 계단을 오르내릴 때마다, 그들은 내 안에 무엇인가를 남겨주었다. 베토벤을 즐겨 듣는 사람이 아니어도, 한문학자가 아니라도 돌보는 몸은 돌봄을 받는 몸에게 자시보다 더 큰 힘을 전해준다. 청소년기를 보낸 특수학교에서, 장애가 있는 우리는 원어민 선생님에게 외국어를 배우거나 미술관에서 그림을 본 적은 없어도 각자의 몸짓과 말하기 방식, 삶을 향한 독특하고 드문 태도를 나누었다. 계단과 언덕으로 가득한 고등학교 생활에서 내 휠체어를 밀어준 친구들의 몸은 내 몸의 한곳에 새겨졌다. 몸을 가지고 살아가는 이상 우리의 몸에는 늘 구체적인 타인이 깃든다. 온전한 평등은 추상적 규범이나 이념으로서가 아니라 '능력'의 측면에서 지극히 차별적인 관계에 놓인 존재들이 상대의 '힘'을 존중하고 신뢰할 때 달성된다. 당신이 나를 배려해 내 앞에서 발레를 추지 않는다 하여 우리가 온전히 평등해지는 것은 아니다. 발레를 잘 추는 '능력'으로 당신은 내가 모르는 세계에 접속하는 다양한 방법을 나에게 제안할 수 있다. 내게도 춤출 '힘'이 있음을 깨달은 지금 나는 발레를 추는 당신의 능력이 나보다 뛰어나다는 데 좌절하지 않는다. 물론 나에게도 당신보다 능력이 뛰어난 차원이 있을 테다. 그것은 발레와 다른 종류의 춤일 수도, 논픽션 글쓰기일 수도, 일반적으로는 매우 사소하다고 여겨지는 어떤 분야의 기술일 수도 있다. 그 능력이 무엇이든 나는 이 능력들로 당신과 차별적인 개인이 된다. 그리고 이를 통해 내가 잘하는 영역을 섬세하게 이해하면서, 한편으로는 당신의 '힘'을 믿으면서 나의 세계로 당신을 초대할 방법을 고안할 수 있다. 그때 우리는 '법 앞의 평등'에만 머물지 않을 것이다. 각각의 차별적인 능력을 지닌 개인들이 서로의 동등한 힘에 주의를 기울일 때, 우리는 고유한 개인이면서도 더 큰 세계의 일부가 된다. ​", "모두에게 동등하게 작용하는 힘(중력)에 몸을 온전히 맡기면서도, 동시에 그 힘에 맞서는 각자의 몸의 기술(능력) 사이에서 움직이기. 그것이 내가 아는 좋은 춤, 잘 추는 춤이다. 따라서 좋은 춤, 잘 추는 춤을 향한 몸들의 역사를 살피는 것은 온전히 평등하고 지극히 차별적인 개인들로 이뤄진 공동체를 그려내는 한 가지 방법이다. ​", "몸 자체로 세상을 느끼고 경험하지 못한 채 이 몸을 어떻게든 남의 시선이나 폭력, 물리적인 사고로부터 보호하고 지키고 감추려고 의식적인 노력을 계속하다보면, 자신이 처한 상황 안에서 내 몸(=나)에 잠재된 역량의 한계 지점까지 나아가기가 어려울 것이다. 팔과 다리를 쭉 뻗어 공을 따라 도약하고, 가슴을 활짝 내민 채 달리고, 바닥에서 엉덩이를 떼고서 저 먼 곳까지 네발로 질주하고, 두려움 없이 암벽을 오르고, 사람들 사이에서 있는 힘껏 온몸을 흔들어볼 때, 비로소 내 몸(=나)이 어디까지 뻗어갈 수 있고 얼마나 강하고 (어쩌면) 특유하게 아름답거나 자류로운지도 깨달을 수 있다. 내가 내 몸이 작동하는 '원천'임을 잊는 단계까지 나아가보는 것. '나'를 잃을 수 있을 때 '몸'이 곧 가장 생생한 내가 되는 경험. 가슴이 불거지고 바닥에서 잘 기지만 걷지는 못하는 소년은 자신의 몸이 어디까지 움직일 수 있는지 가늠하지 못한다. 나는 내 몸이 무엇을 할 수 있고 할 수 없는지 모른다. ​", "프릭쇼는 이주민과 (현재의 용법으로) 장애인에 대한 인종적, 장애차별적 역사를 가진 폭력과 착취의 현장이면서 다른 한편 사회에서 배제된 몸들이 직업적으로 활약하고 대중에게 영향을 미치는 기회였다. 프릭이 된다는 건 한 시대의 욕망과 배제가 모두 포함된 용광로로 뛰어드는 일이었다. <위대한 쇼맨> 속 프릭은 바넘에게 \"당신이 우리를 세상으로 끌어내주었다\"고 말하는데, 이는 바넘을 비롯한 프릭쇼 제작자들을 미화하고 당대의 폭력을 외면하는 재현이다. 하지만 프릭쇼가 놀림받고 배척당하는 몸들이 '빛 속으로' 나오는 계기가 되었다는 점도 사실이다. ​", "시선이 중요하다. 공연을 준비할 때 나는 시선 때문에 고생한다. 오래 훈련받은 무용수들처럼 움직임과 시선을 능숙하게 일치시키거나 흥미롭게 불일치시키지 못하는 건 어쩔 수 없다. 연습이 필요하다. 문제는 무엇인가를 종종 '잘못' 응시하는, 몸에 붙은 습관이다. 시선은 그저 보는 것이 아니라, 실은 움직임이다. 눈동자는 물론이고 몸 전체의 이동과 관련이 있다. 항공사 승무원처럼 신뢰와 안정감이 중요한 직무를 수행하는 전문가들은 눈동자나 고개가 아니라 가능한 한 몸 전체로 상대를 바라보라는 훈련을 받는다. 눈동자의 움직임이 크고 몸통의 움직임은 작은 시선은 의도와 상관없이 받아들이는 사람에게 의혹이나 반감, 비존중의 신호로 해석되기 쉽다. ​", "<무용수-되기>의 후반부에 나는 휠체어 바닥으로 내려오고, 무용수 최기섭(그는 비장애인으로 나와 동갑이다)과 함께 일정한 패턴을 만들며 바닥을 기고, 구르고, 특정한 동작을 반복해서 수행한다. 이 장면을 언급하면서 나는 장애가 있는 그 관객들에게 \"바닥은 우리가 전문가잖아요. 여러분이 잘 보았다면 정말 좋은 춤인가봅니다.\"라고 신이 나서 말했다. 그들이 크게 웃으며 공감했다. ​", "병신춤이 장애가 있는 몸을 통해 진정한 화합과 해방의 장으로 나아간다는 일련의 해석을 수긍하기 어려운 결정적인 이유가 있다. 이 춤의 역사에서 실제로 '장애가 있는 사람'이 춤추는 자로서 참여한 기록을 확인하기가 어렵다는 점이다. 왜일까? 누군가가 진짜 '히줄래기' '꼽추' '절름발이'에게 그 춤을 같이 추자고 초대했지만, 그들이 도저히 그 자리를 즐길 자신이 없었던 걸까? 아니면 히줄래기, 꼽추, 절름발이도 기꺼이 축제에 참여해 춤추고자 했지만 '히줄래기'는 '히줄래기 춤'을 배울 수 없었기 때문일까? 어떤 이유에서든 '병신춤'을 춘 '병신'의 존재가 없다면, 이 춤이 억압에서 벗어나 다 같이 신명에 이르고 해방과 화합의 장을 만들기에 장애를 그저 조롱하는 춤은 아니라는 해석을 나로서는 받아들일 수가 없다. ​", "타인의 몸이 '되려는' 사람은 몸짓이 가진 요소를 낱낱이 분석해 그 특징을 포착하려 시도하기보다는, 그 몸의 경험과 세계를 깊이 이해하려 애쓸 것이다. 온몸을 좌우로 흔들며 걷는 뇌성마비의 몸이 있다. 그 몸을 모방하는 사람은 비틀거리는 몸짓을 흉내내기 위해 우스꽝스럽게 넘어질 듯이 걸을 것이다. 하지만 그 몸이 되려는 사람은 그 몸짓의 주체로서 생각할 것이므로, 그렇게 걷는 바로 그 '개인'에게 다가가고자 한다. 그러면 '그 사람'에게 비틀거림이란 제대로 걷지 못하는 것이 아니라 넘어지지 않고 그만의 방식으로 걷는 것임을 알게 될 수도 있다. 혹은 '비틀거리는' 그 사람이 실은 조금 더 비틀거리는 편이 자신에게 안전하고 편안할 때조차 다른 사람의 시선 때문에 위험을 감수하고 덜 비틀거리려 애쓴다는 사실을 깨달을 수도 있다. 타인의 시선과 자신의 몸이 가진 고유한 특성 사이에서 균형을 잡으려 노력하는 개인을 만나는 것이다. ​", "발레처럼 비교적 엄격한 체계와 규칙, 질서가 존재하는 영역에서는, 이를 도저히 충족할 수 없는 신체적, 정신적 몸들이 있기 마련이다. 발레가 특별히 차별적이어서가 아니다. 자신이 접근할 수 없는 체계를 사랑하게 된 사람은 퍽 아쉬운 운명을 사는지도 모르겠다. 다만 특정한 규칙과 체계에 대해 '닫힌' 사람이라도, 그 체계와 규칙을 얼마간 창의적으로 변형함으로써 그 체계 안에서만 접근이 가능해 보이던 가치나 의미를 자신에게 열린 세계를 통해 만나는 경우도 있다. 기존의 질서에 어긋남으로써, 그 오래된 체계 안에서 제시받는 주문을 탁월하게 배신함으로써, 즉 무대 자체를 변형시킴으로써 무대에 접근하는 사례가 드물기는 해도 없지는 않다. ​", "일본 NHK 방송국 피디 출신의 오구니 시로는 2017년 6월 도쿄에서 좌석수 12개의 작은 레스토랑을 이틀간 열었다. 햄버그스테이크와 피자, 만두 등을 파는 작은 식당의 이름은 '주문을 틀리는 음식점'이다. 이 식당에서는 이름 그대로 주문에 어긋나는 메뉴가 나오는 일이 당연하게 받아들여진다. 햄버그스테이크를 주문하면 물만두가 나오는 식이다. 손님들은 메뉴를 주문하지만 다른 것이 나올 수도 있다고 생각하며 오히려 흥미진진하다는 듯 음식을 기다린다. 이 식당에서 서빙을 하는 종업원들은 모두 인지장애(알츠하이머)가 있는 노인이다. '주문을 틀리는 음식점'의 취지는 인지적인 장애가 있는 노인들도 사회의 관심과 지원이 있다면 누구나 자신만의 역할을 해낼 수 있음을 보이는 데 있다. 이 식당은 알츠하이머가 있는 어르신에 대한 관심이나 지원을 시민들의 윤리적 책임이나 동정심에만 호소하지 않는다. 대신 식당의 '규칙' 자체를 새롭게 설정함으로써, 인지기능에 제약이 있는 사람도 누구나 실수를 두려워하지 않고 일할 수 있는 장소를 만든다. ​", "공연학자 에리카 피셔리히테는 1960년대 이후 연극과 무용을 포함한 공연예술 전반에 이른바 '수행적 전환'이 일어났다고 지적한다. 우리 시대 공연은 흥미로운 이야기나 교훈, 의미를 관객에게 전달하는 예술이라기보다 공연자와 관객이 현실의 시공간에서 직접 만나 새로운 현실을 창출하는 '사건'을 지향한다는 것이다. 사건은 크든 작든 우리 삶을 그 사건이 벌어지기 이전과 이후로 구별하는 현실의 계기다. 우리가 매일 하는 수많은 경험이 '사건'이 되려면 그것이 비록 사소할지라도 내 삶의 현실과 결부되어야 한다. 우크라이나전쟁은 엄청난 비극이지만 영상으로 소식을 접하는 대부분의 사람들에게 그것은 사건이 되지 못한다. 하지만 서울 지하철 4호선으로 출근하는 당신 앞에 장애인 시위대가 기어서 지하철에 탑승하고 그것 때문에 회사에 지각했다면 이것은 사건이 된다. 당신은 지하철을 타도 지각할 가능성이 있는 세상에서 살게 된 것이며, 일상에서 직접 본 적이 없는 장애인의 신체가 바로 그 원인이 될 수 있는 세상에 살게 된 것이다. 그 시위의 방법론과 대의에 대해 당신 입장이 어떠한지와 무관하게, 그것은 사건이다. ​", "춤을 출 때 우리가 자기 몸과 관계를 맺는 방식은 곧 우리가 타인의 몸과 관계를 맺는 방식의 기초가 되며, 이는 곧 더 큰 차원에서 공동체를 이루는 '몸들'과 맺는 관계의 바탕이기도 하다. 즉 이것은 말 그대로 '정치적인' 쟁점인 것이다. ​", "장애는, 유전적 변이 혹은 후천적 외상이나 감염에 따른 생리적 손상에 사회를 구성하는 여러 관습과 실천, 제도가 반응한 결과다. 그러니 당신은 삶을 개선하기 위해 우선 손상에 필요한 의학적 처치를 받고, 그 손상에 덧붙여진 각종 사회적 힘에 맞서기 위한 정보를 모으고, 기술을 습득하고, 장애인이라는 이름으로 묶인 공동체의 일원이 되어 법률과 사회제도를 바꾸는 활동(사회운동, 정치, 기업활동 뭐가 되었든)에 참여하는 편이 좋다. 이 과정은 자주 실패하고 때로 성공하겠지만, 그 이유는 결정된 운명이나 신의 보살핌, 역사의 필연적 진보와 상관이 없다. ​", "우리가 몸이 움직여지는 어떤 경이로운 순간에 나를 기꺼이 내던지면서도, 결코 폐쇄적인 도취 상태에 빠지지 않기란 말처럼 쉽지 않다. 남의 눈에 어떻게 보일지, 혹시 타인에게 실수하지 않을지 걱정하기 시작하면 오래전부터 내 안에 자리잡은 타인의 시선이 나를 계속 검열할 것이다. 그렇다고 타인의 시선 따위 무시한 채 내 안에서 일어나는 충동에 오롯이 집중하고, 나라는 존재의 심연에 놓인 진실을 표현하겠다며 온몸을 던지면, 최소 그날 밤 이불을 스무 번쯤 걷어찰 실수를 범하거나 최악으로는 타인을 향한 어처구니없는 폭력에 가담할 가능성도 있다. 나를 속박하는 각종 규범을 뛰어넘어 기꺼이 경이로운 순간의 일원이 되면서도, 객관적인 외부 상황과 조건, 타인들의 존재를 의식하며 그 세계에 접속하는 춤은 고도의 기예다. 이를 익히기 위해서는 훈련이 필요하다. ​", "나는 장애인의 몸에 문명이니 문화니 합리성이니 하는 이름이 붙은 고상한 가치들의 위선을 폭로하고 그 한계를 전복하는 힘이 있다고 믿는다. 장애인의 몸에서 억압적인 규범과 질서에 맞서는 해방적 가능성을 본다. 그렇다고 그 몸과 움직임이 항상 모든 종류의 질서나 규범에서 벗어난 상태라는 뜻은 아니다. 장애인의 몸이란 '다른 방식으로 질서잡힌' 것이다. 모든 문화적 형식, 규범에서 이탈한 '원시적인 충동'은 장애와 별 관련이 없다. 장애가 있는 몸, 그 몸의 실존과 춤은 오히려 '시민적인' 삶을 상징한다. 1960년대 이후 세계적으로 전개된 민권운동은 이 상징을 공고하게 만들었다. 장애인차별금지법을 제정하기 위해 워싱턴에서 백악관 계단을 기어서 오르고, 런던 도로 한복판에서 버스를 세우고, 서울역을 온몸으로 점거하며 권리를 외치는 장애인의 신체는 진부한 문화적 규범에서 멀리 이탈하면서도 압도적으로 '시민적'이다. 2022년 봄 대한민국 여당의 당대표는 출근길 지하철 시위에 참여하는 장애인들을 '비문명적 행동'이라고 비판하며 역설적으로 진실을 드러냈다. 장애인들의 지하철 시위에 관한 다양한 논쟁이 가능하겠지만, 바로 장애가 있는 사람들이 대중교통 한가운데 등장해서 '시민들의 출근길'을 붙잡을 수 있기에 이 공동체가 문명의 일부로 남는 것이다. ​", "우리 모두 남보다 더 용기를 내야 하는 삶의 영역이 있기 마련이다. 내게는 공연, 그중에서도 신체적 표현을 주요한 방법으로 삼는 춤이 그중 하나였을 뿐이다. 여기에 거창한 실존적 의미는 없었다. 나는 점점 그냥 하게 되었다. 어느 날은 잘하고, 어느 날은 못했다. ​", "우리 모두 하나의 공동체를 지배적으로 규율하는 사회적 안무의 영향을 받으며, 그 힘에서 벗어나기란 간단하지 않다. 외줄 앞에서 추락을 감수하는 결의까지 필요하지는 않지만, 기존의 '안무'에 저항하고 새로운 춤을 추기 위해 몸은 변해야 한다. 그 변화는 어떻게 일어나는 걸까? 아마도 우리가 만난 구체적인 몸들이 얼마나 우리에게 '깃들어' 있느냐에 달려 있을 것이다."]}, {"title": "우는 나와 우는 우는", "author": "하은빈", "genre": "에세이", "publisher": "동녘", "passages": ["내 말이 허공에서 길을 잃는 동안 나는 사람들의 눈이 동그래졌다가 가늘어지는 것을 볼 수 있었다. 대화는 자연스럽게 내 삶의 형태에 관한 질문으로 넘어갔다. 내 안에는 길고 구불구불한 이야기가 들어 있었기 때문에 대화는 스무고개처럼 이어졌다. 그러면 질문은 머지않아 비슷한 데로 수렴했는데 외연은 달랐으나 속뜻은 대강 이랬다. (어쩌다 그렇게 됐어요?) 나는 번번이 어물거렸다. (우를 사랑하기 때문이에요) 한 번도 떳떳하게 이 대답에서 괄호를 벗기고 말줄임표를 떼어본 적이 없다. 나는 사람들의 눈이 가늘어지는 것이 싫었다. 내 삶의 형태가 기묘하다는 사실을 확인하는 것이 싫었다. 나를 설명하기 위해 점점 더 많은 말을 해야 한다는 게 힘이 들었다. 말을 할수록 사람들이 어리둥절해하고, 나 역시 내가 무엇을 어디서부터 왜 자꾸 설명하고 있는지 모르는 게 힘이 들었다. 우와 함께하는 삶은 분명 어려운 데가 있었다. 이 문장을 쓰기까지 십 년이 걸렸다.", "괄호도 말줄임표도 없이, 길고 구불구불한 이야기를 시작해야 한다.", "힘들지 않았다고 하긴 어려운 시간 동안 내가 계속 우의 곁에 있었던 이유는 내가 유별히 착하거나 우가 극진히 잘해주거나 우리의 다른 무엇이 특별해서가 아니라 우와 있는 것이 웃겼기 때문이다. 우리는 진짜로 즐거웠고 다큐멘터리를 찍는다면 사람들에게 그걸 알게 하고 싶었다. 우리는 어떤 불구의 상태도 아니고 '그럼에도 불구하고'의 상태도 아니고 그냥 즐겁다고. 우와 나는 어딘가 찌그러지고 상한 애들인데 우리에게 그건 고통만은 아니며 도리어 그 사실을 귀하고 진기하게 여긴다고. 무언가 시작도 하기 전에 울지 않겠노라고 약속한다면 우리도 우리가 어떻게 생겼는지 열어보이겠다고. 그건 자랑이었다기보다는 좋아하는 친구를 방에 데려가 아끼는 것을 보여주는 마음이었던 것 같다.", "우에 관해 적는 것은 태양을 올려다보는 일처럼 어렵다. 우와 보낸 시간은 뜨거운 볕처럼 내 안의 모든 것을 평등하게 비춰주고 있다. 내 안에서 나고 자란 것들은 모조리 그 빛을 쬐었다. 오 년이 지났는데도 그 빛은 여전히 뜨겁고 눈부셔서 당최 제대로 쳐다볼 수가 없다. 우와의 일을 나는 아주 잠깐씩만 들여다본다. 짙은 필름 조각을 들고 태양을 올려다보는 사람처럼. 딴청을 피우고 시간을 끌며. 필름 조각을 겹겹이 포개고 여러 차례 눈을 깜빡이며. 실은 대개 올려다보지조차 못하고 그 볕을 받아 반짝이는 것들만 망연히 바라본다. 여기 쓰인 것은 내가 쓰고자 했던 것이 아니라 쓰기에 실패한 것들이며, 쓰고자 했던 것의 그림자이거나 흔적이거나 사라짐이다. 시야는 번번이 다시 어두워지고, 이따금 데인 듯이 눈물이 흐른다.", "잊는 것은 일종의 방어기제였다. 우의 병을 나눠 가질 수 없다면, 우의 병이 죽을 때까지 우만이 풀어야 하는 무겁고 고단한 숙제라면, 우가 매우 취약하고 어이없을만치 죽기 쉬운 몸을 가졌다는 사실을 절박하게 잊어버려야 했다. 그래야 밥을 먹고 잠을 자고 하루를 살 수 있었다. 나는 침대에서 일어나고 싶었고 씻고 싶었고 학교에 가고 싶었고 친구들을 만나고 싶었다. 잠자리에 누워 잡히지 않는 불투명한 미래가 아니라 내일의 자질구레하고 구체적인 할 일을 생각하고 싶었다.", "나는 장애인 애인을 가졌으면서 다른 것도 가지고 싶었다. 욕심이었을까? 욕심이라고 생각할수록 더욱 그렇게 하고 싶어졌다. 때로 적나라하게 물질적인 것들이 마음을 잡아끌었다. 예쁘게 차려입는 사람이 되고 싶었고 정갈한 의자가 있는 집에 살고 싶었다. 어떤 때에는 몇 번 바르지도 않을 화장품을 있는 대로 모으고 입지도 않을 옷을 잔뜩 사서 비좁은 서랍장 한 칸 안에 꾸역꾸역 욱여넣었다. 어느 날은 친구의 자취방에 갔다가 그 집에서 본 접시며 식기 따위를 며칠이고 생각했다. 올리브절임 단지 하나까지도 다 그 애 거라는 게 부러웠다. 우와 나는 오랜 시간을 함께 보낸 뒤에도 여전히 우리의 공간을 스스로 결정할 수 없었고 우리의 손으로 우리 자신을 먹여살릴 수 없었다. 우와 나는 늘 덤터기가 되어 우리를 도와주는 다른 이들의 호의와 능력에 손을 벌렸다.", "나는 전형적이고 세속적인 것들, 말초적이고 그럴싸해 보이는 것들을 원했다. 예쁘고 귀여운 게 갖고 싶었고 맛있는 게 먹고 싶었고 멋진 여행을 가고 싶었고 쾌적한 집에서 살고 싶었다. 엄청 재미없고 무지 좋아 보였다. 그런 걸 원한다는 게 자존심이 상했다. 내가 초라한 것도 우와 있는 내가 초라하다고 느끼는 것도 싫었다. 건강하고 유능한 친구들을 만나고 있으면 마음이 어두워졌다. 애꿎은 우를 미워하게 될까 봐 겁이 났다. 욕망과 질투와 미움과 열등감이 손발을 하나씩 붙들고 각기 다른 방향으로 달려나갔다. 학교 상담실에서 비죽비죽 울었다. 몸 하나로는 모자라요. 아무 바람도 안 생기기를 바라요.", "아파트나 빌라를 매입해 우에게 알맞도록 개조하면 가장 좋겠지만 그러려면 지금 당장 저축을 시작해도 족히 삼십 년쯤 그때까지 우가 살아 있을까? 어느 날 내가 말했다. 그때까지 안 죽으면 그것도 문제지. 우도 말했다. 난 진지하게 말하는 건데. 나도 진지하게 대답했는데. 우리는 신호등이 바뀌기를 기다리고 있었다. 머리 위 햇빛이 뜨거웠다. 우리는 횡단보도를 건넜다. 아무튼 삼십년은 너무 먼 미래야. 우는 내게 만 원을 건데며 침착한 어조로 말했다. 나는 비장한 얼굴로 그 돈을 받아들고 낡은 복권 가게에 들어가 로또를 다섯 줄씩 두 장 샀다. 뜨거운 햇빛이 허황된 구름을 피워올리는 금요일 한낮이었다. 우리는 하루 동안 각자의 복권을 지갑에 넣어놓고 깜빡이는 확률의 세계에서 반짝이는 우연한 행복들을 세어보았다.", "그는 영원이 없다고 말하면서도 희망을 가지려 하고, 희망이 안 보이는 것 같은데도 힘을 내자고 하고, 매일 조금씩 힘이 없어져도 나를 힘껏 안아준다. 애석하게도 함께 걷거나 달릴 수 있는 애인을 가진 것은 아니다. 그러나 나는 나의 심연으로 깊이 잠수해올 수 있는 애인을 가졌다. 그는 언제나 슬픔을 함부로 위로하지 않고, 대신 기꺼이 마음속으로 헤엄쳐 들어와 벌어진 틈새를 도닥여준다. 그런 그와 함께 가고 있어서 이 길이 꿈처럼 이상하고 아름답다. 이것이 내게 있는 가장 가까운 진실이므로, 다가올 종말보다 가깝고 내일의 슬픔보다 따뜻하므로, 언젠가 꺽일 핸들 같은 것이랑은 생각하지 않고, 어제처럼 오늘도 조용히 사랑한다.", "실로 '디스에이블드'했던 나날을 생각한다. 누구의 탓도 할 수 없어 그저 서로의 얼굴을 빤히 바라볼 수밖에 없었던 날들의 까마득하고 근본적인 불능에 관하여. 누가 대신 나누고 갈라주었다면 좋았을 텐데. 어디까지는 병의 영역이었고 어디부터는 장애의 영역이었다고. 어디까지는 조건과 환경의 문제였고 어디부터는 기량과 능력의 문제였다고. 그랬으면 내심 기꺼워하며 따랐을지도. 절망하지 않았을지도. 씩씩하게 눈물을 훔치고 더 나은 삶을 향해서 팔을 걷어붙였을지도.", "우리는 대개의 사람들이 누릴 수는 없는 희소한 지적 문화적 자원을 비교적 풍족하게 향유했다. 동시에 우리는 대개의 사람들이 너무나도 당연하게 여기는 가장 기본적인 것들, 이를테면 안전과 이동, 배변 따위의 문제와 내내 씨름했다. 우리는 때로 우리가 분수에 비해 지나치게 고상하다고 생각했다. 우리가 교육받았고 지성을 갖추었다는 사실, 교양 있는 언어를 구사한다는 사실은 자랑스럽다기보다 종종 부끄러웠다. 우리의 앎은 우리의 삶과 너무 달라서 우리는 우리 자신이 누구인지, 스스로를 어떻게 생각해야 하는지 자주 헷갈려했다. 날씨가 좋고 커피를 마신 어느 오후엔 문득 우리가 무엇이든 될 수 있을 것만 같아서 불쑥 가슴이 벅차고 손이 떨리기도 했다. 사는 게 팍팍하고 고달픈 날에는 우리가 그 누구도 아니며 그 무엇도 될 수 없다는 사실을 거듭 씹어서 삼키고 나서야 가까스로 침대에서 몸을 일으켜 하루를 시작할 수 있었다. 시간이 흐르며 전자의 날들보다는 후자의 날들이 압도적으로 많아졌다.", "포기는 우리가 불가해한 일상을 살아가는 가장 유용한 방식이었다. 체념은 우리가 살아남기 위해 가장 먼저 익혀야 했던 기술이었다. 하지만 나는 잦은 포기와 습관적인 체념이 우리의 무능력과 나약함을 드러내는 부인할 수 없는 증거일까 봐 두려웠다. 세계는 우리에게 모질고 냉담하였고 우리 자신조차 우리가 세계에 거주하는 방식을 부적절하거나 위법한 것으로 여겼다. 세계는 우리에게 낙담과 비참을 가르쳤다. 우와 나는 차차 유순하게 길이 들었다. 분노해야 할 때 수치심을 느꼈고 바깥으로 화를 내는 대신 마음 깊은 곳에 우울을 감추었다. 긴 시간 고인 우울은 냇물이 자라나 강이 되고 바다가 되듯이 점차로 깊어지고 거칠어지고 사나워졌다.", "치히로가 자신의 이름을 잃어버리고 센이라는 이름으로 살았듯이, 빈은 지금 빈이라는 이름을 버리고 이름도, 그 이름이 갖는 무게도 털어버릴 수 있는 덧없고 아름다운 삶으로 가버리려는 것입니다. 얼마나 달콤할까요. 사랑하는 것도 소중한 것도 가지지 않는 삶이란. 더 이상 궁색해질 일도 옹졸해질 일도 없을 것입니다. 관계와 종속과 책임이 빈의 어깨에서 떨어져나갈 것이고, 그곳에는 영영 우와 동이가 없을 것입니다.", "매번 장면의 이유를 묻고 움직임에 대한 설명을 청하는 내게 시내는 대답하곤 했다. 여기엔 아무런 의미도 없어. 처음에는 거기에 정말로 아무런 의미가 없는지, 그렇다면 이 짓을 왜 해야 하는지, 의미가 없다면 무엇을 기준으로 취하고 버릴 것을 가려내는지 알 수 없어 혼란스러웠다. 그러나 연습을 거듭하면서 나는 시내의 말대로 애초에 정해진 의도나 의미를 전하는 것이 이 공연의 목적이 아님을 깨달아갔다. 몸짓들은 해독되어야 할 뜻을 품거나 텍스트를 조달하기 위한 기호가 될 필요가 없었다. 무용수는 무대 위에 가상의 세계를 옮겨오거나 예술가의 내면을 표현하기 위해 애쓰지 않아도 되었다. 몸과 춤이 다른 무엇을 위해 있을 필요가 없다는 뜻이었다. '여기에 아무 의미가 없다'는 것은 말하자면 이런 명이었다. 무엇으로도 해석되지 않는, 그저 몸일 것. 무엇에도 복무하지 않는, 그저 춤일 것.", "우와 나는 그 숙연함이 예고하는 바를 잘 알고 있다. 그것은 분위기를 잡친다는 의미다. 사람들을 닥치게 하고 쩔쩔매게 한다는 말이다. 그들을 안심시키는 데 우리의 시간과 체력 그리고 마음의 힘을 쓰게 된다는 말이다. 에너지를 다 쓰고 곤죽이 된 둘만 덩그러니 남겨진다는 말이다. 나는 복잡한 마음으로 화면 속 우는 나를 바라본다. 나를 안아주는 우를 보며 생각한다. 너희는 그냥 웃긴 이야기를 하려고 해도 사람들의 얼굴에 떠오르는 난처함을 목격하게 될 거야. 사람들이 너희에게 엄지를 치켜세우고 박수갈채를 보내는 것을 보게 될 거야. 대단하다고, 보기 좋다고, 응원한다고 격려하는 말들을 엄청 많이 듣게 될거야. 그러나 너희가 도움을 요청하면, 그들은 너희에게 장애에 대해 잘 몰라서, 당사자가 아니어서, 혹여 실수를 하거나 상처를 남길까 봐 두렵다고 말할 거야. 너희가 버스를 탈 수 없고 취업을 할 수 없고 계단을 오를 수 없고 살 집을 찾을 수 없고 출근을 할 수 없는 동안 그 사람들은 너희를 부드럽게 지나쳐갈 거야. 너희가 가지 못하는 바로 그 길을 무탈히 걸어 안전하게 자신의 삶으로 되돌아갈거야. 너희는 그들의 뒷모습을 오래오래 바라보고만 있을 거야. 모르지 않았다. 점점 더 기묘하게 고립되리라는 것을. 나를 가로막는 돌부리들이 무엇인지 제대로 바라보거나 설명할 수조차 없으리라는 것을. 내 손으로 내 팔자를 꼬고 있다는 것을. 세상 천지에 오로지 둘뿐인 것이 지겹도록 외로워서 자꾸만 기척을 내려 들 것이었다. 앞으로도 거듭해서 패배할 이야기, 가장 원하지 않는 바로 그 방식으로 오독될 이야기를 반복할 예정이었다. 다 알면서도 다른 방법이 없었다. 아무도 대신 해주지 않는 이야기를 해야만 했다. 그러지 않으면 살아갈 수가 없었다. 누구도 우리 대신 살아주지 않는 삶을 어떻게든 계속해서 살아야 했다.", "우리가 바라는 방식으로 보여지기를 시도한 것은 대단한 저항 행위였다기보다는 뭔가를 좀 피해보려는 마음이었다. 일상을 축축하게 적시는 안개 같은 모욕감을. 사랑을 지속하는 일에 스며드는 나쁜 냄새를. 어딜 가나 무례하고 노골적인 시선을 받는 일을. 애시당초 어디를 갈 수조차 없는 일을. 차별의 말들이 직접 날아와 꽂히는 일은 드물었다는 것만으로 감사했어야 했을지도 모른다. 멸시와 혐오보다는 연민과 동정을 받았다는 사실에 감지덕지해야 했을지도 모른다. 쫓겨나는 일은 많지 않았다는 것에 안도하느라 어딘가엔 아예 들어가지조차 못하고 있다는 사실을 몰랐더라면 달랐을지도 모른다. 부러지지 않았을지도 모를 일이다. 사람들의 친절과 호의에 기대어 그 친절과 호의에 의해 가려지는 불평등을 눈 딱 감고 잊었더라면. 더러 찾아오는 반짝이는 기쁨과 즐거움을 더 쩨쩨하고 우악스럽게 붙들었더라면.", "엄마의 문자 중 마음속으로 굴러들어온 단어들이 있습니다. 예컨대 '현실'이라는 말이 그렇습니다. 도대체 현실이 뭘까요. 설명할 수 있고 보여줄 수 있는 것, 손에 잡히고 구체적인 것, 내가 발 디디고 서 있을 수 있는 것 등등의 특성들을 떠올립니다. 그렇다면 나의 현실은 무엇이며 엄마가 생각하는 현실과는 얼마나 다를까요? 나는 엄마가 걱정하는 '현실'을 아마도 '근육병'이라는 말로 바꿀 수 있을 것이라 생각합니다. 근육병에 대해서라면 내게는 할 수 있는 말이 많지 않습니다. 근육병은 정말이지 알쏭달쏭, 이상한 존재이기 때문입니다. 우는 근육병과는 여러모로 다른 속성을 가지고 있습니다. 우는 손에 잡히고, 선명하고 구체적입니다. 자극에 반응하고 일관성이 있으며, 마음과 감정과 자유의지에 의해 움직입니다. 말하자면 나는 이렇게 항변하고도 싶습니다. 나의 현실은 근육병이 아니라 우라고. 우에 대해서라면 할 말이 아주 많고, 아예 그를 데려와 보여줄 수도 있다고 말하고 싶습니다. 내가 마음을 주는 만큼 그가 나에게 마음을 주는 것이 기쁘고, 함께 하는 크고 작은 일들이 즐거워 힘이 난다는 것을 알려주고 싶습니다. 그렇지만 엄마는 그런 사실들을 알고 싶어 하지 않을 것입니다. 그런 것들이 나를 지탱한다는 사실, 내가 그런 것들에 발 딛고 서 있다는 사실은 엄마가 가장 듣고 싶어 하지 않는 종류의 말입니다. 나의 일상에서 우를 발견할 때마다 엄마는 화를 내고 슬퍼하고 고통스러워합니다. 그것이 내게도 견딜 수 없이 고통스럽습니다.", "우리는 그때 정말로 죽어가고 있었을까? 그것은 정녕 제대로 된 삶이 아니었을까? 지금은 그렇게 생각하지 않는다. 살아간다는 것은 그저 살아간다는 것이다. 갈수록 가난해진다고 해도, 평생 이동에 큰 제약이 있다고 해도, 그 어떤 지대에까지 내몰린다 해도 삶은 삶이었을 테다. 그 어떤 몸으로도 우가 우였을 것처럼. 나날이 근육과 뼈가 얇아지고 박동과 호흡이 얕아져도, 종국엔 눈꺼풀 들 힘조차 메마른대도 우의 몸은 여전히 따뜻하고 부드러웠을 것이다. 누군가는 죽느니만 못하다고 여길 그 몸에서도 아무도 모르게 손톱이 자라고 눈썹이 돋았을 것이다. 찬바람이 부는 계절이면 핏줄 비친 눈에 눈물이 고이고, 까칠한 뺨에서는 나무가 타는 듯한 달콤한 냄새가 났을 것이다. 거기에는 죽음을 닮은 것이 조금도 없었을 것이다.", "어떤 이들이 과거에 대해 쓰는 이유는 과거를 반복하지 않기 위해서다. 반면 나는 과거를 반복하기 위해 이 책을 썼다. 우를 떠나며 서른 살이 된 은빈은 이 책 속에서 다시 스무 살의 은빈이 된다. 도돌이표처럼 돌아가 다시 우와 살고, 사랑하고, 상하고, 헤어진다. 우와 함께하지 않았더라면 겪을 일 없었을 깊은 슬픔이 있음에도 나는 분열하고 돌아보고 돌아가기를 반복한다. 그 모든 시간 이후에도 여전히 우는 내가 살면서 가져본 가장 좋은 것이다."]}, {"title": "우리, 나이 드는 존재", "author": "고금숙, 김하나, 김희경, 송은혜, 신혜우, 윤정원, 이라영, 정수윤, 정희진", "genre": "에세이", "publisher": "휴머니스트", "passages": ["최근 1~2년 사이 한국 사회를 강타한 키워드 중 하나는 '저속 노화'입니다. 노화의 속도를 늦추면서 건강하게 나이 드는 법이 많은 사람의 화두가 되었지요. 이런 흐름 어딘가에 '노화 공포'가 있는 건 아닐까 싶은 생각도 듭니다. 거울 속 주름진 얼굴을 피하고 싶은 마음이 얼마쯤 있고 현역에서 물러나면 소외되지 않을까 하는 두려움을 느끼는 것은, '나이 드는 일'을 긍정적으로 받아들여도 된다는 사인을 세상에서 읽지 못하기 때문일 겁니다. 어쩌면 우리 각자 서로에게 그런 신호를 보내지 않고 있는지도 모릅니다. 우리는 즐겁게, 소소하게, 편안하게, '나답게' 늙어 가는 삶의 나날을 엿볼 기회가 필요합니다. 늙는다는 것은 인간 모두에게 해당하는 현상이니 젊은이든 늙은이든 '아, 나도 나이 들면서 저런 모습이면 좋겠다', '오, 이런 걸 참고해서 더 잘 늙어 봐야겠다'하고 여러 겹의 의미로 노화를 마주할 수 있도록요. 일 년에 꼭 한 살씩 누구나 나이를 먹으니까요.", "세상 모든 일이 일정 부분은 매일 조금씩 쉬지 않고 꼬박꼬박 무심하게 앞으로 나가는 힘을 요구한다. 무슨 일을 하든 나아가기를 멈추면 거기서 끝이니까. 끝이 다 나쁜 것은 아니지만, 오래오래 한 가지 일을 지속하다 보면 쉽게 도달하기 어려운 지점까지 가닿기도 한다.", "만약 당신이 시간의 파도를 넘어 더 오래 좋아하는 일을 하며, 더 길게 사랑하는 사람을 사랑하며 살고 싶다면, 그렇다, 일어서라. 그리고 자신에게 가장 잘 맞는 운동을 찾아라. 육체의 단련은 정신의 성장과 긴밀하게 연결되어 있다. 내가 바다에서 그토록 원하던 자유를 얻었던 것처럼, 당신에게도 당신만의 자유가 깃들기를. 삶 속에서 새로이 배우는 그 기쁨은 언제나 우리를 기다리고 있다.", "사람들은 나이가 들면서 자신을 알아 가는 만큼 '나'라는 벽을 쌓는다. '나는 이런 걸 안 좋아해'라는 식으로, 시행착오에 드는 에너지를 줄이려는 것이다. 나 또한 당연히 그런 벽을 쌓기도 하지만 이게 단단한 조개껍질이 되지 않게끔 일부러 허물어 보기도 한다.", "내가 세상을 궁금해하는 만큼 세상은 나에게 새로운 경험을 줄 것이다. 정신적 스트레칭이다. 새로운 경험만큼 나는 더 유연해질 것이다. 나이가 더 들면서 점점 조개가 되어 간다 할지라도 의식적으로 자주 입을 벌려 세상과 호흡하고 싶다. 세상을 못마땅해 하기 보다는 끝까지 세상을 선물로 여기고 싶다. 나의 경계가 어디까지인지 늘 실험하고 기꺼이 허물 수 있는 사람이 되고 싶다.", "웬만한 장례식장에서는 일회용 접시에 국, 반찬, 밥이 나오고, 일회용 숟가락과 나무젓가락, 종이컵에 마구 사용된다. 제로웨이스트 덕질로 살아온 내가 삶을 이렇게 마무리한다면 좀 원통하지 않겠는가. 찾아보니 김해시는 전국 최초로 장례식장에 다회용기를 도입해 연간 63톤의 일회용품 사용을 줄였고, 이어 춘천시도 다회용기를 도입할 예정이다. 시행 전에는 상주와 조문객의 반발이 우려됐으나 시행 후에는 되레 격조 있는 장례라며 상주들의 만족도가 높다고 한다.", "죽음의 순간을 구체적으로 떠올리면 내가 좋아하는 일상, 옳다고 여기는 대의, 누구를 더 사랑하고 돌볼지, 어떤 일에 집중할지 정리할 수 있다. 그렇게 나답게 살아가는 법을 조금씩 알게 된다. 그래서 김영민 선생께서도 \"아침에는 죽음을 생각하는 것이 좋다\"라고 하시지 않았을까. 게다가 자신이 언제 죽을 지 아무도 모른다. 인생의 의미는 내가 구하는 것이 아니라 삶이 내게 묻는 거고, 죽음은 아랑곳없이 닥친 결과다. 그러니 죽음이 뜬금없이 보일 때 지금 당장 죽어도 원하는 방식으로 죽을 수 있을지 고민해보고, 그렇게 살아가면 좋겠다.", "마지막으로 내가 좋아하는 멋진 언니 중 한 분인 시몬 드 보부아르 님의 잘 늙는 방법을 몇 가지 공유한다. 과거를 받아들이자. 삶을 의미 있게 해 주는 친구를 사귀고, 타인의 생각이나 평가에 신경 쓰지 말자. 호기심을 잃지 말고, 자기 존재에 의미를 부여해 주는 사회적, 정치적, 지적, 창의적 작업을 추구하자. 인생에서 모든 것을 최대한 많이, 오랫동안 즐겼으므로 때로는 모든 일을 멈추고 쉬는 한때를 보내자. 내가 끝마치지 못한 일은 다음 세대가 끝마쳐 줄 것이다. 부디 120세에 내가 뿌듯한 마음으로 이 글을 보면 좋겠다. 나답게 사는 것이 가장 잘 늙어가는 것 아니겠는가. 좋아하는 것은 더 좋아하고 싫은 건 눈치 보지 않고 버리고, 건강 염려 없이 먹고 싶은 걸 먹을 수 있는 나이, 나는 늙어 가는 시간이 기대된다.", "사실 정시 출퇴근을 하지 않을 뿐이지 계속 일하고 있으니, 많아진 시간이 다 여유롭진 않다. 정해진 대학 강의 외에 프리랜서로 하는 강연, 글쓰기, 자문 등으로 종종 시간에 쫒긴다. 어떨 땐 일에 쏟는 시간이 예전과 별반 달라지지 않은 것 같기도 하다. 다만 내 시간을 내가 통제할 수 있다는 점이 큰 차이랄까. 원치 않는 일이 종주먹을 들이대듯 불쑥 밀고 들어오거나 지루함과 무의미를 감수하며 쓸모없는 일에 시간을 죽여야 하는 상황이 없어진 것만으로도 시간이 풍족한 사람이 된 듯한 해방감을 느낀다.", "변화의 시간을 잘 통과하는 방법의 하나는 사소하더라도 매일 실천하는 과제를 만들어 내는 것이다. 소설가 무라카미 하루키가 날마다 달리기를 하며 되뇌었다던 말마따나 \"이건 내 인생에서 아무튼 하지 않으면 안 되는 일\" 같은 일과가 필요하다. 일과의 중심이 내게는 숲이지만 어머니에게는 성당에 가는 일이다. 또 어떤 누구에게는 책 읽기, 운동, 그림 그리기나 악기 연주 등 자기만의 일과를 만들어 내는 다양한 방법이 있을 것이다. 매일의 과제가 거창할 필요도 없다. 좋아하는 일, 반복해도 질리지 않는 일이면 된다. 매일의 시시한 과제, 사소한 습관이 처음으로 늙어 보는 시간을 견디며 자신의 길을 스스로 찾아갈 마음의 근육을 키워 준다.", "관계 속에 있을 땐 혼자 있고 싶어지고, 혼자 있는 시간이 길어지면 연결되고 싶어 하는 이 마음은 그저 변덕일까.", "쓰기는 아는 것을 쓰는 것이 아니라 아는 것을 버리는 과정이다. 이 깨달음이 긴 세월 동안 내게 위로가 되었다.", "생애 주기와 노후 담론은 이데올로기다. 특히 노후 계획은 연령주의와 계급주의의 결합이다. 중산층의 경험에서만 노후는 은퇴를 의미한다. 한국인은 대개 평균 73세까지 일하므로 노후랄 게 거의 없는 셈이다. 중산층 이상이어야 노후라는 시기가 별도로 주어진다. 그들은 '남는 시간'을 어떻게 보낼 것인가가 고민이다. 그들의 경험을 일반화하여 노후 대책이라는 말이 나온 것이다.", "누구나 자신의 성향과 조건에 맞는 노후 대책이 필요하다. 나의 노후 계획은 공부를 계속하는 것인데, 사전 준비 중에서 가장 중요한 것은 일을 덜 하고 최대한 돈을 절약하는 것이다. 강의를 줄이고 글을 쓰려면 궁핍한 생활, '외로운' 환경을 만들어야 한다. 나는 지금도 급한 생계 외에는 외출하지 않고 번잡한 인간 관계를 피하려고 한다. SNS와 손전화도 사용하지 않는다.", "쓰기는 아는 것을 쓰는 것이 아니라 아는 것을 버리는 과정이다. 이 깨달음이 긴 세월 동안 내게 위로가 되었다. 계속적인 모색, 다시 말해 모르는 것을 찾아 해매는 상태의 지속이 곧 공부를 '잘하는' 방법이라는 신념이 있었기 때문이다. 공부에는 완성이 없다. 공부는 추구의 과정이라는 사실이 나를 경쟁 사회에서 버티게 해 주었다. 글을 쓰다 보면 막히는 때가 있는데, 이는 거기서 멈추고 다시 질문해야 한다는 좋은 신호다. 모든 것을 다시 점검해야 한다. 쓰다가 길을 잃은 느낌이 드는 데에는 반드시 이유가 있다. 최초의 문제의식과 다른 내용을 쓰고 있거나, 자기 생각을 뒷받침할 사유 틀(이론)을 찾지 못해 '이론을 창시하는 고통'을 겪고 있거나, 사례가 적절하지 않거나, 문제의식 자체가 틀렸거나 이 과정을 통해 내가 모르는 것을 깨달아야 하는데, 이는 쓰기를 반복해야만 알 수 있다. 겪어야만 깨달을 수 있고, 이때 새로운 지식이 생산된다. 과학자는 실험을 반복하고, 글쓴이는 쓰기를 반복한다. 프로 운동선수나 세계적인 예술가들은 연습을 거듭한다. 연습을 훈련이라고 하는 이유다. 거듭하는 연습을 훈련이라고 하는데, 이는 몸에 익을 만큼 되풀이한다는 뜻이다. 우리는 위대한 운동선수나 예술가의 영광을 보지만, 사실 그들의 영광은 일반인이 상상할 수 없을 만큼 연습한 몸의 결과다.", "훌륭한 저작을 남긴 지식인이나 작가의 오만을 사랑할 수 있는 이유가 여기 있다. 쓰기를 반복하는 일은 좌절의 연속이다. 그러니 무조건 계속 쓸 수도 없다. 길을 잃는 공포가 엄습한다. 사유보다 힘든 일이 쓰기다. 그래서 우울은 공부의 벗이다. 공부를 멈추지 않는 사람은 겸손하다. 자신에게 몰두한다. 계속 자기 한계, 사회적 한계와 싸워야 하기 때문이다. 공부를 계속하는 사람이 드문 이유다.", "자본주의는 불안 장사로 굴러간다고 생각하기에 현재를 미래에 저당 잡힌 채 살아가지 않으려고 한다. 아마도 이런 생각을 아직까지 유지하는 것이야말로 나이가 덜 들었다는 방증일지도 모르겠다.", "더 젊을 때는 어떤 사람이 '되고 싶다'는 마음이 있었으나 이제는 '되고 싶다'는 생각에서 거의 벗어났다. '되기'보다는 '하기'로 기울었다. 무엇을 할 것인가. 죽음은 시간과 아무런 관련 없이 찾아오고, 언제 내 삶이 멈추더라도 수치스럽지 않은 인생의 조각들을 하루하루 쌓아 가야겠다고 생각할 뿐이다.", "목소리의 불평등과 불균형이라는 화두를 놓지 못하는 나는 증발하거나 침몰하는 목소리 하나라도 더 부여잡고 싶다.", "젊은 사람은 낯선 사람에게 함부로 말을 걸지 않는 게 예의라고 여기고, 또한 낯선 사람의 말 걸기를 경계한다. 반면 나이가 든 사람일수록 낯선 사람에게 자신의 이야기를 꺼내곤 한다. 그들이 주책맞거나 꼰대라서가 아니다. 흘러넘치는 삶의 이야기에 비하면 그 이야기를 담을 공간이 상대적으로 적어서다."]}, {"title": "우리는 순수한 것을 생각했다", "author": "은유", "genre": "에세이, 인터뷰", "publisher": "읻다", "passages": ["나는 글쓰기 수업마다 짬을 내어 시를 읽는 시간을 마련한다. 누구에게나 필요한 건 아닐지 몰라도 시는 분명 생의 한 시절 피난처가 되어준다는 믿음이 있다.", "나는 한국 시 번역가들을 인터뷰하면서 사랑과 감탄의 언어를 원없이 들었다. 스스로 '과몰입 성향'이라고 칭할 만큼 아름다운 걸 볼 자세와 감탄하는 능력을 장착한, \"자기 힘에서 멀어지지 않은 사람\"들이 눈앞에 존재했다. 돈에 삶을 내어주고 미래를 위해 현재를 바치라는 시대의 명령에 휘둘리지 않고, 자기 마음이 이끄는 대로 자기 힘을 동원하여 좋아하는 것을 남들과 나누며 살아가는 번역가들의 꼿꼿한 열정에 매번 감탄했다.", "나의 노동은 세상에 무엇을 더하고 있나. 나는 누구의 이익에 복무하고 있나. 아무도 가지 않은 길인 한국문학 불모지를 개척하는 젊은 번역가들이 사는 법과 직업의 긍지를 조심스레 내놓는다. 문학의 시대는 끝났고 첨단기술이 소설을 쓰고 번역가를 대체하리란 전망이 우세한 시절에 시가, 문학이, 번역이 사람을 살리는 현장 이야기를 얹고 싶었다.", "좋아하는 것을 좋아하는 모습은 비슷하다. 머릿속에서 폭죽이 터지는 느낌. 피가 빠르게 도는 느낌. 그건 몸의 명령이다. '너 이거 해라.' 거역할 수 없다.", "당연히 시는 번역하기 어렵죠. 시는 어쨌든 언어를 극한으로 밀어붙이고, 특별히 이해받고 싶어 하지 않는 경험을 만드는 장르니까 더 어렵죠. 근데 우리가 소통을 할 때 오해를 감수하고 말하는 것처럼 시 번역도 그냥 사람이 할 수 있는 아름다운 일 중에 하나 아닌가 싶어요. 그걸로 누군가랑 이어질 수 있다면, 그걸 통해서 더 많은 사람들이랑 만날 수 있다면 저는 번역을 할 때 그 독자들한테 애정을 보내는 느낌이에요.", "쓰고 싶은 글을 쓰기 위해서 쓰고 싶지 않은 글을 써야만 했던 시기. 아마 작가들에게는 각자의 '죽음의 계곡' 서사가 있지 않을까 싶다. 안톤에게 9년을 어떻게 견뎠는지 물었다. \"견디지 않았어요. 저는 번역을 그만뒀다고 생각했어요. 왜냐하면 당시 에이전시에서 제가 번역한 김연수 작가님의 원고를 가지고 아무것도 안 하겠다고 했고, 여러 안 좋은 일들이 있었죠. 더러운 일들이 많았어요. 왜 내가 이거를 해야 하지? 왜 이 사람이 나한테 이런 말을 하지? 왜 내 실력을 끊임없이 증명해야 하지? 너무 말이 안 돼서 매일 그만둘 생각을 했어요. 저는 프리랜서 번역가로 진출해서 돈을 많이 벌었어요. 별의별 클라이언트를 다 만나봤고 즐거운 모험을 했어요. 문학 번역을 그만뒀지 번역을 그만둔 건 아니었죠. '나는 너희가 필요 없어'를 너무나도 완벽하게 증명했어요. 그때 쌓은 자본과 그 경험이 있기 때문에 저는 지금도 매일마다 문학 번역을 그만둘 준비가 돼 있어요.\"", "무한화서는 이성복 시인의 시 창작 수업 내용을 담은 아포리즘이다. 페이지마다 금과옥조 같은 문장이 나온다. 예를 들면, \"앎이란 모르는 상태를 견딜 수 있는 능력이에요. 모르는 걸 피하려 하지 마세요. 아는 것처럼 이야기하는 게 더 나쁜 거예요. 모르면 알 때까지 기다릴 수 있잖아요. 기다림은 힘들어도 좋은 거예요\" 같은", "분노는 그를 주저앉히는 게 아니라 일으켜 세운다. 사랑의 힘을 길러주고 시를 쓰게 한다. 그래서 \"정확한 대상에 초점을 맞춘 분노는 진보와 변화를 촉진하는 강력한 에너지원\"이 될 수 있다고 말한다. 안톤도 분노를 잘 활용하는 번역가다. 그는 문학을 연장 삼아, 배제하고 왜곡하고 고정관념으로 사람을 대하는 케케묵은 차별 관념과 관행에 균열을 일으키며 변화를 꾀하고 있다.", "내가 어떤 사람인지, 남에게 맡기지 않고 스스로 설명해보는 것은 자신을 아는 하나의 방법이다. 안톤은 한국문학 번역가로서 자신에 대해 이렇게 서술한다. \"나는 번역 욕심이 많다. 모든 문학작품을 번역하고 싶다. 하루 종일 번역을 하다 보면, 작가가 앞에 앉아서 얘기를 해주는 느낌이 든다. 매일 작가와 함께 시간을 보내는 기분이랄까. 작가에겐 일개 번역가일 수 있지만, 자기 작품을 믿고 맡긴다는 건 마음의 선물, 신뢰를 주는 일이다. 그런 이유로 최선을 다해 번역하려고 노력한다.\"", "장애나 인종 등 다른 차별 이슈와 달리 페미니즘을 더 강조하는 까닭이 궁금했다. \"퀴어는 어디에나 있지만, 자신한테 커밍아웃한 퀴어가 없어서 내 주변에는 퀴어가 없다고 인식할 수 있다고 쳐요. 100만 번 양보해서요. 그런데 내 주변에 여성이 없다고 할 수는 없잖아요. 우리는 모두 여성으로부터 오니까, 어디를 가도 다 남자만 상대하는 어떤 극단적인 상황이 아니라면 당연히 주변에 여성이 있어요. 그러니까 핑계를 댈 수가 없어요. 내가 아는 사람 중엔 없었어, 나는 무지해, 이럴 수가 없죠. 그래서 호모포비아를 만나면 x같고 인종차별주의자를 만나면 x같지만 여성혐오주의자를 만나면 진짜 x같죠. 주변 어디에나 있는 여성에 대해서도 이런 생각을 하는 너는 정말 희망이 없는 사람이야, 그런 느낌이 특히 더 드는 거죠.\"", "내가 본 안톤의 느낌도 그렇다. 모국어와 영어 실력에 대한 자부심을 높고, 겸손이 필요치 않도록 노력을 최대치로 끌어올리고, 한영 번역가로서 자긍심이 드높다. 그래서 잘 다치기도 한다. 원래 더 많이 사랑하면 더 많이 상처받는다. 일을 대하는 온도와 태도가 나와는 다른 사람들의 무신경, 무감각, 무지를 감당해야 한다.", "\"벗에 대한 동경은 우리 자신을 드러내주는 누설자\"라고 니체는 말했다. 소제에게 동경하는 대상이 생기는 것은 자신을 설명할 언어를 모으는 일과 다르지 않았다.", "\"산다는 것은 우리보다 먼저 존재했던 문장들로부터 삶의 형태들을 받는 것\"이라고 롤랑 바르트는 말했다. 소제에게 오정희의 문장이 그러지 않았을까. 말하지 못한 것, 모순적인 것, 불분명한 것이 선명해지는 경험, 감정에 선이 생기고 색이 입혀지는 느낌. 숨겨놓은 경험과 날것의 감정을 인정받는 기분. 이런 책을 우리는 인생에서 만난다. 자주는 아니고 드물게. 그리고 사랑하는 것을 더 잘 사랑하는 방법은 글쓰기다. 구체적으로 쓰기 위해 '그것'을 아주 오래오래 붙들고 있어야 하기 때문이다.", "남의 글에 대해 얘기하는 것은 자칫 남의 삶에 대해 평가하는 것처럼 들리기 쉽다. 논평에 고도의 섬세함과 지성을 발휘해야 하는 이유다. 소제는 이런 원칙을 세웠다. \"헐뜯지 않기. '이것도 번역이야?' 이런 말 하지 않기. 어떤 말도 가시처럼 느껴지지 않도록 조심해요. 초과는 원본을 손상하지 않는 한 다른 관점을 허용해요. 그렇지만 제 기준을 없앨 수는 없고, 같은 감정이라도 다르게 표현을 하죠. 이 번역은 '이런 단어 선택에서 과감하다'고 한다면 그 이유나 증거를 대줘요. 이 단어 선택을 다른 사람들의 단어 선택과 비교하고, 누가 제일 잘했다는 느낌을 없애려고 해요.\"", "글이 늘려면 적절한 비판과 정확한 칭찬이 고루 필요하다. 문제는 내용보다 방식이다. 어떻게 말하느냐. 말하는 사람이 찌르기보다 듣는 사람이 찔려야 한다. 쓴 사람은 그렇게 쓸 수밖에 없어서 쓴 것이고, 글은 금방 바뀌지 않는다. 그래서 나는 비판을 하기 보다 질문을 건넨다. 글에서 잘 모르겠는 부분, 이상한 부분, 아쉬운 부분에 대해 물어보면 필자가 답을 하는 과정에서 더 깊은 이야기가 나온다. 글쓰기의 실마리가 풀리기도 한다. 그러면 성공이다. 자기 내면에 집중하게 하는 일, 자기 목소리를 찾아주는 일, 그것이 합평의 역할이니까.", "소제에게 번역은 가장 친밀한 읽기 행위다. 특히 시 번역을 좋아하는 이유는 \"시가 정답에 저항하는 장르\"이기 때문이다. 한영 번역의 어려움은 크다. 한국어는 대명사 삭제, 존칭 사용, 복수 표시 생략, 교착어, 미괄식 구조, 주어-목적어-동사 어순의 언어다. 모든 것이 영어와 다르다. \"행으로 나누어 이어지는 것은 작은 기적이다.\" 그럼에도 소제는 동료 번역가들에게 '도착어와 출발어 둘 다를 이해한다'는 칭찬을 받는다.", "번역하다가 리듬이 막힐 때는 일본 작가의 책을 낭독한다. 이를테면 호리에 도시유키라는 작가의 소설은 복잡한 구조에 비해 문장이 매끄럽게 읽힌다. 동그라미를 쳐가며 여러 차례 읽어본다. 잘 읽히는 글의 리듬을 몸에 저장한다. 마지막으로, 내용과 형식 살펴보기. 언어에는 무엇을 쓰는가 하는 내용적인 측면과 그것을 어떻게 쓰는가 하는 형식적인 측면이 있다. 같은 내용이라도 쓰는 방식에 따라 효과가 달라진다.", "저는 번역을 몸으로 하거든요. 번역하는 문장이나 대사들이 제 몸을 한번 통과해야 '딱 이거다'라는 생각이 들어요. 뭔가 연극을 하는 느낌이에요. 몸을 통과한다는 게 어떤 건가요? 온전히 받아들이는 거예요. 그 마음이나 상태가 되어보려고 노력해요. 등장인물이 친구를 잃어버렸다는 깊은 상실감을 느끼면 저도 그 마음 상태가 계속돼요.", "내 생각엔 학교를 가는 것보다 가지 않는 게 어렵다. 무엇을 하지 않는다는 건 가만히 있는 게 아니라 규범과 관성을 거스르는 일이라서 훨씬 많은 에너지가 소모된다.", "성실하고 정직한 인간은 언제나 불가능한 것을 가능한 것으로 만들기 위해 싸운다고 했던가. 혼돈의 영역을 언어로써 조금씩조금씩 인간적 질서의 영역 속에 편입시키는 것이 예술가의 책무임을 나는 문학평론가 김현의 책에서 배웠다. 표현 불가능하니까 포기하는 게 아니라 표현할 수 있도록 성실하고 정직하게 노동하는 일.", "작가로 살지 않더라도 이 세상에서 좋은 사람으로 살 수 있는 방법에 대해 계속 읽고 생각합니다. 나는 내 감수성을 유지하고 정신을 바짝 차리고 싶고, 그렇게 하는 게 정말 중요하다고 생각합니다."]}, {"title": "우리의 활보는 사치가 아니야", "author": "김지우", "genre": "에세이", "publisher": "휴머니스트", "passages": ["휠체어를 탄 언니들을 만나고 나서 많은 것이 바뀌었다. 내 고난과 외로움은 지독히 독특하고 아무도 알아주지 않는 것이 아니라, 많은 언니가 경험한 대수롭지 않은 일이거나 참고 문헌을 따라 마주할 수 있는 일이 되었다. 휠체어를 탄 채로 어른이 된다는 것은 순응이나 실패가 아니라, 바퀴의 동력으로 더 멀리 구르는 삶을 살게 된다는 말이었다. 장애와 함께 사는 미래는 불투명한 미지의 시간이 아니라, 이미 수많은 갈래로 뻗어 나간 언니들이 있는 실제의 시간이기도 했다. ​", "성희 언니를 처음 본 건 협동조합 무의의 '걸즈 온 휠즈'라는 토크콘서트에서였다. 행사의 캐치프레이즈는 '멋진 언니들, 그런데 휠체어를 타는'이었다. 늘 '휠체어' 혹은 '장애인'이라는 설명이 이름 앞에 붙는 사람들을 다른 방식으로 호명하고 싶었다는 게 이 문장이 만들어진 배경이다. ​", "나의 엄마 현미는 \"지우는 어쩔 수 없이 도움이 필요한 순간들이 있을거야. 그럴 때 도움을 구하는 걸 부끄럽게 생각하지 않아야 해.\"라고 말하곤 했다. 나는 길을 걷다 와락 넘어져 일어날 수 없을 때, 휠체어를 타고서는 도무지 오를 수 없는 가파른 경사를 맞닥뜨릴 때마다 그 말을 생각했다. 연약함을 드러내도 된다는 현미의 말은 내 얼굴을 단단하게 만들어서 모르는 이에게 말을 걸어 손을 맡기고, 도움을 받고 나서는 한껏 웃으며 고맙다고 말할 수 있게 되었다. ​", "바디 프로필이니 식단 조절이니, 생활인으로서 운동하는 사람들의 이야기가 최근 몇 년간 넘쳐 나는데 운동하는 장애인은 언제까지고 타자였다. 장애인의 몸 이야기를 할때면, 신체 단련보다 기어코 재활 이야기가 등장했다. 문득 땀을 흘려 본 경험이 없다는 것을 깨달았다. 헉헉대며 숨을 들이쉬고 내쉰 경험도 없다는 걸 알았다. 내 몸을 거울에 대고 비춰 보며 근육을 구경하고, 한계까지 몰아붙인 경험은 더더욱 없었다. ​", "장애가 있는 몸은 필연적으로 더 많이 덜컥이고 비틀대지만, 미묘하고 뿌리 깊은 차별과 혐오를 금세 감지하는 더듬이가 있는 몸이기도 하다. 성희 언니의 말을 들으며 나의 예민하고도 기민한 몸이 좋다고 생각했다. 하지만 그 기민함은 때때로 책임감이 되어 장애 당사자를 짓누르기도 한다. ​", "몸의 무게를 더는 일은 어떻게 가능할까. 우리의 몸은 전혀 없는 것 취급되다가도 어느 순간 너무 크게 불어나 그 자체로 모든 문제인 것처럼 여겨지곤 한다. ​", "탈시설화와 더불어 장애인의 자립 생활이 끊임없이 이야기되고 있다. 아쉬운 점은, '어떻게' 자립을 시작해야 하는지, '무엇' 이 자립생활 유지에 도움이 되는지 이야기해도 부족한 마당에 장애인이 '왜' 자립해야 하는지 논의답지 못한 논의가 여전히 오가고 있다는 점이다. 사회적 통념으로는 사람이 태어나 자라고 일정 시점이 되면 양육자로 부터 독립해 살아가는 것이 마땅한 수순이라고 여기면서, 장애인의 사례에서는 왜 이 기본적인 전제마저 자꾸만 부정하는 걸까. ​", "서로에게 상처 주지 않으려는 태도는 중요하다. 그러나 때로 그런 태도가 그와 나 사이를 가르고, 타자와 주체의 위계를 만들기도 한다. 피해와 가해의 방향이 정해져 있는 관계에서 어떻게 친구가 될 수 있을까. ​", "항의할 문제가 있으면 항의하는 일, 학교가 학생의 이야기를 '사소한 민원' 이 아닌 '개선에 대한 요구' 로 진지하게 받아들이는 태도, 공동체 구성원들이 상의와 토론의 과정을 거쳐 보여 주기 식 해결책이 아닌 시스템을 만들어 가는 순간이 놀라웠다. 아니, 놀랍기보다는 이제껏 내가 그리고 장애가 있는 학생들이 무언가 박탈당해 왔다는 생각이 들었다. 내 존재를 자연스레 받아들이고 더 함께하기 위해 고민하는 사람들과 시스템을 만나는 순간은 너무도 소중하고 중요하다. 장애와 함께 살아가는 어린 세대가 가능한 한 빨리 그런 순간을 마주해야 한다는 생각이 들었다. 시간이 지날수록 변화의 가능성을 체득하기 힘들어지고, 용기를 얻기는 더욱 어렵다는 것을 알기에 마음이 조급해지기 까지 했다. \"너 하나 때문에 바꿀 수 없다.\" 라는 말을 들어 온 어린이와, \"바꿔야 할 게 있으면 꼭 항의해야 한다.\" 라는 말을 들으며 자라는 어린이의 미래는 너무나 다를 것이 분명하다. ​", "장애인이 실패할 수 있으면 좋겠다는 글을 쓴 적이 있다. 실패가 전제된 일을 시도하는 경험은 여유 있는 사람에게만 허락되고 때때로 그의 자산이 되기도 한다. 반면 어떤 이들은 실패하면 다시 시도할 기회를 찾기 어렵다. 한 사람의 실패가 집단 전체의 실패로 여겨지기도 한다. 장애인이 그렇다. 실패할 기회가 없는 상황에서 최대한 안정적인 결과만을 찾아야 하는 장애인은 자꾸만 자신의 가능성을 축소한다. 장애인이 실패했으면 좋겠다. 그리고 다시 할 기회가 주어지면 좋겠다. ​", "'장애인의 노력' 을 그 자체로 바로보기보다 굴절해서 받아들이는 사람이 많다. 기본적으로 실패한 사람으로 여겨지곤 하는 우리는 조금만 노력해도 '장애를 극복한 사람' 이나 '슈퍼 장애인' 이 되기도 한다. \"몸이 불편한데도 대단하다.\" 라는 소리를 들었던 다은 언니처럼, 쉽게 덧씌우는 슈퍼 장애인 이미지는 때로 '넌 그대로 머물러도 되는 존재' 라는 메시지를 내포하기도 한다. \"장애가 있는데도 대단하다.\" 라는 말은 장애인에게 장벽이 되는 환경을 개선하려는 의지보다 그 환경에 자신을 욱여넣어 어떻게든 적응하려고 한 장애인의 희생만 높이 평가한다. ​", "그렇게 세상으로 한 바퀴 나간 언니들은, 그 순간을 혼자만의 성취로 간직하지 않고 자꾸만 다른 이들을 불러 모은다. 이 기분을 나만 느낄 수 없다고, 우리는 함께해야 한다고 말하며 운동을 하고, 모임을 만들고, 민원을 넣고, 사업을 한다. 나도 그 움직임에 동참하고 싶다. 그게 내가 이 글을 쓰는 이유다. 우리와 공명하는 이들이 있다면, 그들이 이 글을 읽고 있다면, 두려워서 하지 못하고 있는 일이 있다면, 얼른 이 보물 같은 문장 \"나, 갈 수 있구나.\" 를 자신의 언어로 직접 만나라고 말하고 싶다. 그러기 위해 꾹꾹 힘을 눌러 담아 글을 쓴다. ​", "누군가에게 장애인 활동가를 비난하는 일은 그저 유희거리였다는 생각을 했다. 때때로 그 비난들은 원본 없이 그저 복제될 뿐인 학습된 분노이기도 하다. 장애인에게 쏟아지는 비난이 많은 경우 '밈' 처럼 비슷한 문장의 형태로 이뤄져 있다는 데서 그 근거를 확인할 수 있다. 그리고 더 중요하게는, 미워하는 마음은 꾸준할 수 없다는 것을 알았다. 자동 반사적으로 튀어나오는 분노는 금세 스러지고 지속 가능하지 않다. 하지만 사 이 되면 일제히 집을 향해 가는 사람들 틈에 섞여 버스에 오르는 삶. 그래야 나라는 사람이 옆에 있다는 걸 알아줄 테니까. ​", "세상에서 멋있는 사람은 다 무신사에 모여있는 것 같다. 여기 사람들은 옷을 잘 입니다. 나에게 있어서 옷을 잘 입는다는 건 두 가지를 의미하는데, 첫째는 자신이 무엇을 좋아하는지 잘 안다는 것이고, 둘째는 자신에게 무엇이 잘 어울리는지 인지하고 있다는 것이다. 그러니까 옷을 잘 입는 사람은 이 넓은 우주에서 자신의 위치를 정확하게 파악하고 있는 사람이다. ​", "우리는 특별하기를 원한다. 그리고 많은 경우, 그 특별함에는 정답이 있는 것 같다. 좋은 신발, 좋은 옷, 좋은 차. 그 외의 것들에는 좀처럼 눈길을 주지 않는다. 마치 1월 1일의 해돋이만 모든 스포트라이트를 받고 다른 날들의 해돋이는 주목하는 사람들이 별로 없는 것처럼. 1월 1일은 특별한 하루지만, 진짜 재밌는 일들은 나머지 날들에서 더 많이 일어난다는 것을 잊지 말기. ​", "평생을 이래라저래라 하는 대로 착실히 살았는데, 어느 순간 갑자기 이래라저래라 하는 목소리들이 사라진 것이다. 자유, 나는 그걸로 뭘 해야 할지 몰라서 매일 술을 마셨다. 이제는 무엇을 해야 하고 무엇을 좋아해야 하는지, 누가 나에게 알려줄까. 자유롭다는 것은 다시 말해서 어디에든 얽매일 수 있다는 것이다. 어디에도 묶이지 않은 나는 멋있어 보이는 것에 쉽고 빠르게 사로잡혔다. 그리고 나의 주도권과 자유를 넘겨주었다. 자유롭기 위해서는 어느 정도의 통제가 필요하다. ​", "나의 취향이 뚜렷하고 흥미롭고 매력적일수록, 사람들은 내가 만들어 내는 것에 집중할 것이다. 고로 나만의 취향은 나의 무기가 될 수도 있다. 그러나 취향을 발견하는 건 생각보다 어려운 일이다. 너무나 많은 곳에서 콘텐츠를 제안하고 있으니까. 유튜브가, 인스타그램이, 스포티파이가, 넷플릭스가 나를 너무 잘 알고 있으니까. 나는 의식적으로라도 알고리즘 바깥으로 나가려고 한다. 유행하는 것은 일부러 안 보고, 남들이 잘 안 보는 것들에게 더 기회를 주려고 애쓰기도 한다. ​", "가장 말단에 위치한 콘텐츠에는 내가 새롭게 생각을 발전시킬 수 있는 공간이 없다. 햄을 더 가공할 수 없는 것처럼. 그래서 이왕이면 유튜브 영화 리뷰로 만족하기보다는, 직접 영화를 보는 게 좋다고 생각한다. 영화를 보고 나서 평소 영화감독이 영감을 많이 받았다고 알려진 책을 찾아보는 것도 좋겠다. 그리고 가능하다면 실제로 세상에 나가서 많은 경험을 해보는 것이 가장 좋은 것 같다. 여행도 많이 하고, 사람도 많이 만나보고, 대화도 많이 나눠보는 거다. ​", "시작보다 중요한 건 계속하는 거다. 실패해도 그냥 많이 시도하는 거다. 그러다 하나 얻어걸리는 거다. 그걸 기다리는 거다. ​", "초심자일수록 경험이 필요하다. 성공과 실패가 많이 쌓일수록 경험이 쌓이고 실력이 쌓인다. 그런데, 완벽함을 지향하면 별로다. 완벽을 가하느라 들어가는 노력과 시간과 힘듦에 대한 두려움 때문에 시작조차 하기 어려워진다. 그래서 생각만 하다가 시작을 못 하는 문제에 봉착하는 것이다. 그렇기 때문에 우리는 완벽을 지양하는 동시에, 완성을 지향해야 한다. 결과가 나쁘든 말든 끝을 지어서, 그것을 하나의 지워지지 않는 교훈으로 삼아야 한다. ​", "결국 경험이다. 물론 경험하기 전 일말의 정보를 알고 시작하는 건 많은 도움이 되지만, 여기서 중요한 건 내가 몸으로 직접 경험해보고 겪어 보아야 한다는 것이다. 그것만이 나에게 제대로 된 흔적을 남긴다. ​", "아무것도 모르고 취직할 때의 나는 맥시멀리스트였다. 내가 알고 있는 것, 내가 할 줄 아는 것, 또는 그렇다고 믿고 있는 것들을 최대한 부풀려서, 거대하고 능력 좋은 사람인양 포장하는 것이 자기소개서의 주된 미션이었다. 지금에서야 깨닫는 거지만, 그렇게 부풀린 모습이 좋게 보일리 없었다. ​", "나는 당근마켓이 무섭다. 상대의 능숙한 말 한마디와 불편한 침묵 몇 초로 가격이 오르락내리락하는 감정의 롤로코스터! 말을 잘 못하는 데다가 설득도 금방 당하는 나는, 물건을 팔 트라 마일은 새로운 스탠더드를 창조하는 것이다.", "Courage to Fail Fast 빨리 실패할 용기를 가진다. 실패를 두려워하지 않는 마음은 성공으로 가는 지름길이다. 성공하고 싶을수록 고민에 머무르기보다 더 빨리 시도하고 실패할 수 있는 용기와 담대함이 필요하다. 막상 실패해보면 예상보다 별일 아니라는 걸 알게 된다. 오히려 어떤 것이 더 중요한 문제였는지, 무엇을 더 잘하면 되는지 간절하게 느낄 수 있다. 실패를 부정하거나 회피해서는 안 된다. 토스팀은 언제나 더 빨리 실패를 선언하고, 거기서 배워 다음 단계로 나아가는 용기에 박수를 보낸다.", "대표가 욕먹는 것을 보니, 그래도 제대로 하는 모양이었다. 경험상 적이 없는 나이스가이는 어떤 것도 스스로 결정하는 법이 없는 무능한 사람이었다. 판을 흔들어 무언가를 바꿔보려는 혁신가는 적이 많았다.", "우리는 그동안 실패를 방지하거나 회피하기보다는, 실패가 일어났을 때 빠르게 회복하는 데 집중해 왔습니다. 그 실패에서 의미 있는 배움을 얻는 것이 중요했고요. 하지만 시간과 자원이 적게 드는 '저렴한' 실패를 하는 것도 중요하다는 것을 이번에 깨달았습니다.", "우리 회사가 얼마나 위대한 회사인지는 매출보다도, 사용자 수보다도, 나와 동료들이 얼마나 열정적으로 이 공간에서 함께하고 있는지를 돌이켜보면 알 수 있었습니다.", "개인의 실력도 중요하지만, 신뢰자원이 얼마나 소중한 것인지 회사가 커지면서 알게 된 거예요. 혼자서만 일을 잘하는 게 아니라, 팀원들로부터 깊이 신뢰받고 안정감을 주는 사람이 코파운더로 존재하는 것만으로 팀에 정말 좋은 영향을 준다는 걸요. 굳게 빛나는 등대 같은 사람을, 제가 그때는 놓쳐버렸죠.", "눈앞의 문제를 푸는 것과 동시에 팀원들에게 장기적인 비전을 지속적으로 공유하는 과정이 필수라 생각했어요. 수없이 많이 겪게 되는 작은 실패들은 가설 검증을 위한 과정이라 이해할 수 있도록 하는 것, 한 번 실패하더라도 팀이 무너지지 않고 계속 도전할 수 있도록 팀원들을 동기부여하는 것 또한 중요하고요.", "그즈음 UI 디자이너로 합류한 강수영은 토스 앱 디자인의 문제가 효율성에 있다고 진단했다. 송금과 계좌조회, 신용조회 등 각 제품마다 텍스트와 버튼, 화면 흐름 등 스타일이 다르면, 사용자들은 마치 서로 다른 앱에 접속한 것처럼 각각의 제품에 익숙해질 시간이 필요해진다. 낯선 환경에서는 이탈하는 비중도 높아질 수밖에 없다. 사용자에게만 비효율인 것이 아니라, 프로덕트 디자이너들의 생산성 측면에서도 효율이 떨어졌다. 정해진 스타일이 없으니 제품을 디자인할 때마다 매번 같은 고민, 같은 잡무가 반복되었다. '빨리빨리'를 외치며 아무렇게나 디자인을 내버려둔 것이 오히려 토스팀의 가속을 방해하고 있었던 셈이다.", "강수영은 '토스의 제품 디자인은 이래야 한다'는 궁극의 목표를 먼저 잡았다. 사용자가 어떤 행동을 하면 되는지 직관적으로 알 수 있도록 설계하자는 심플리시티(simplicity)의 원칙이 기반이 되었다. 그는 \"파편화된 기존의 금융 경험을 붕괴시키고, 모든 금융생활을 토스 하나로 가능케 한다, 하나의 앱에서 통합된 금융 경험을 주겠다는 토스팀의 미션을 성취하려면, 평범한 디자인 시스템보다 훨씬 더 일치된 기댓값을 가져야 한다\"고 판단했다. 토스가 만드는 제품 하나하나가 종적인 혁신이라면, 각 제품이 일관성을 갖추고 최상의 사용자 경험을 제공하는 것은 횡적인 혁신이었다. 이후 여러 프로덕트 디자이너들이 각자 작업해온 제품을 모두 분석해, 각 화면에서 공통으로 등장하는 요소를 따로 떼어냈다. 정보 입력, 상품 가입, 내역 조회, 오류 발생 등 사용자가 각 제품을 사용하는 과정에서 마주치는 화면이 하나의 목소리를 내도록 디자인했다. 글씨 모양과 크기, 간격, 버튼의 너비와 정렬, 그래프 굵기와 컬러 등을 일관성 있게 만들었다.", "TDS는 토스팀 전체의 효율성을 증대시키는 데 기대 이상의 영향을 미쳤다. 화면 한 페이지를 디자인하고 개발하는 데 걸리는 시간이 1시간에서 15분 이내로 단축됐다. 코드 길이도 절반으로 짧아졌다. 감독하는 사람 없이도 저절로 디자인의 일관성이 지켜졌다. 프로덕트 디자이너가 직접 컴포넌트를 그리는 작업은 줄었고, 오로지 더 나은 제품 경험이 무엇인지를 고민하는 시간이 늘었다.", "서비스를 배포한 뒤 30분 후에 지표를 보고, 1시간 뒤에 확인하고, 2시간 지나 또 보고, 저녁에 보고, 새벽에 보고 퇴근하는 팀이 있어요. 반면 서비스를 오늘 론칭했으면 '고생했다' '축하한다' 하고 퇴근하고 다음 날 출근해서 지표를 보는 팀이 있죠. 첫 번째 팀은 성공하고 두 번째 팀은 실패해요.", "리더인 승건 님까지 나서서 반대해도 매번 우리 사일로가 믿는 방향대로 밀고 나갔잖아요. 그런 환경을 제공해주는 조직은 세상 어디에도 없다고 생각했어요. 작은 성공 경험들도 쌓았고요. 그럼 이번 반기에는 세상에서 가장 잘하는 팀이 되어보자. 세상에서 가장 뛰어난 팀은 어떤 목표를 세울까? 그로스를 만드는 팀이 가질 수 있는 가장 큰 목표는 뭘까? 팀원들이랑 머리 맞대고 고민했어요. 세계 최고의 팀이라면 역사에 남을 정도의 성장은 만들어야 한다고 생각했죠.", "친구를 000에 가입시키면 나도 5000원, 친구도 5000원을 받는다는 식이다. 회사 입장에서는 신규 고객 한 명을 가입시키는 데 1만 원이 든다는 계산이 나온다. 정승진은 이 구조를 '친구에게 5000원 보내기'로 바꾸고 '송금지원금'이라 이름 붙였다 \"연락처를 한번 훑어보세요. '토스에 가입하고 우리 둘 다 5000원씩 받자'고 말하는 것보다, 그냥 5000원을 주는 게 마음 편한 상대가 많을 거예요. 내게 이득이 되는 일을 친구에게 부탁하는 것보다 상대에게 이득인 것을 주는 게 쉬우니까요.\"", "얼마 전 유명한 투자사 앞에서 영어로 발표하고 질의응답을 했는데, 감동받았다고 하더라고요. 무슨 일이든 중요한 건 그걸 해내야 하는 이유의 크기, 절실함과 절박함의 크기, 그리고 그걸 달성하기 위한 전략, 그 전략을 뒷받침하는 의지와 실행의 속도와 양의 문제예요. 불가능은 없다고 생각해요.", "토스가 제품을 만드는 원칙을 'Product Principle', 줄여서 PP라 부른다. PP는 토스에서 좋은 제품과 나쁜 제품을 가르는 기준이 되며, 팀원들은 이를 토대로 서로의 제품에 대해 의견을 개진한다. 개인의 취향이 아니라 일관된 작대로 개선점을 찾기 때문에, PP는 토스가 사용자에게 '미친 만족감'을 주는 제품을 지속적으로 만들 수 있는 원동력으로서 기능하고 있다. PP를 빠르고 완성도 있게 제품에 구현하도록 돕는 도구가 바로 토스 디자인 시스템 TDS다. 단 한 번도 변한 적 없는 핵심적인 가치는 'Simplicity', 즉 단순함이다. 토스가 생각하는 단순함이란 사용자가 서비스를 이용하기 위해 특별히 알아야 할 것, 배워야 할 것 없이 직관적으로 이해할 수 있는 상태다. 별다른 설명 없이도 원하는 가치를 얻을 수 있는 매끄러운 경험을 만드는 것이 사용자 경험 설계의 궁극적인 목표다. 사용자 경험이 단순할수록 더 많은 사람이 사용하는 서비스로 빠르게 성장할 수 있다고 믿는다.", "제품 전략 Casual Concept 전문적인 금융용어와 개념을 이해해야 하는 수고를 사용자에게 지우지 않고, 친숙하고 이해하기 쉬운 개념으로 전달한다. Minimum Features 이 기능 없이는 '절대' 목표를 달성할 수 없는지 다시 한 번 생각한다. 기능이 늘어날수록 제품은 점점 어려워지고, 개선 속도는 느려진다. 기능 추가는 목표 달성을 위한 최후의 선택이다. Less Policy 단순한 제품의 시작은 단순한 정책이다. 수많은 정책과 조건으로 복잡해진 제품은 친절한 설명이나 깔끔한 UI로도 극복 할 수 없다. 사용자가 서비스를 이용하기 위해 '알아야 하는 것'을 최소화한다. UX 원칙 One Thing per One Page 하나의 화면은 하나의 메시지만 표현한다. 한 화면에 너무 많은 정보를 전달하지 않도록 지우고, 제외하고, 제거한다. Tap & Scroll 핵심 플로우를 누르기(Tap)과 스크롤(Scroll)만으로 구성한다. Easy to Answer 사용자가 마주치는 모든 질문에 3초 안에 대답할 수 있도록 한다. 기억하기 힘든 정보는 알아서 찾아준다. Value First, Cost Later 사용자에게 제품의 가치를 먼저 전달한다. 정보를 입력하는 등 비용을 부과하는 행동은 그다음의 일이다. No Ads Patterns 광고가 아닌 기능으로 소구한다. 광고 스타일을 사용하지 않을 때 오히려 사용자가 집중하기 쉽다. Context-based 사용자가 서비스를 이용하는 맥락을 고려해 플로우를 만든다. 맥락 없이 이어지는 플로우는 사용자의 이탈을 부른다. No More Loading 사용자를 기다리게 하지 않는다. 이를 위해 정책, UX 플로우, 새로운 기술 등 모든 방법을 동원한다. Sleek Experience 사용자가 의식하지 못할 정도로 매끈한 경험을 설계한다. 모든 시선과 손짓에 어색함이 없도록 배려한다.", "스타트업으로서 토스는 끊임없이 성장해야만 나아갈 동력을 얻을 수 있었다. '이만하면 됐어' 또는 '토스는 여기까지야' 하고 자족하고 안주하면 공룡 같은 경쟁사의 먹잇감이 될 뿐이었다. 현재 규모와 상관없이 토스는 미친 상상력을 펼쳐야 했다. 남들이 뭐라건 몇 번이고 사점을 넘을 수 있는 팀이라는 사실을 안팎에 보여주고 싶었다.", "우리는 다른 회사보다 더 유난한 도전을 극복해야 할 것입니다. 그것은 우리의 꿈이 다들 하는 방식대로 잘하는 회사가 아니라, 고객이 기대하지 못했던 수준의 미친 만족감을 주고, 아무도 꿈꾸지 못했던 수준의 제품을 개발하며, 있기 전과 후를 나누는 수준의 산업적 변화를 주도하고, 지속적인 혁신 추구에도 고객과의 신의를 끝까지 지켜내며, 자율과 책임의 문화 속에서 일을 통해 성취함으로써 더 행복해질 수 있는 근본적으로 새로운 방식의 기업문화를 만드는 것인 까닭입니다. 이 모든 과정을 당신과 함께할 수 있다면, 그 결과가 무엇이든 저는 후회가 없습니다. 어떤 혼란과 어려움이 닥치더라도, 당신과 함께 이야기 나누고 극복해나가며 새로운 역사를 만들어가고 싶은 마음뿐입니다. 토스팀 모두 같으리라 생각합니다. 내년에도 함께 달려보시죠!", "간편함이 핵심인 간편결제인데, 보안 절차를 추가하면 추가할수록 분명한 건 불편해진다는 겁니다. 간편결제의 대명사인 미국 페이팔 같은 경우 간편함을 없애면서까지 절차를 추가하지 않습니다. 대신 부정거래가 발생하는 경우 약자인 소비자에게 우선적으로 피해를 보상합니다. 즉각적으로 보상부터 하고, 나중에 원인을 밝혀 손해배상 절차를 밟겠다는 토스의 접근방식은 굉장히 선진화된 방식이고 바람직하다고 생각합니다.", "신뢰는 사용자에게 약속한 것들을 꾸준하고 일관되게 지켜나갈 때, 아무런 문제 없이 많은 시간을 함께할 때, 감지되지 않는 속도로 그러나 확실하게 쌓였다. 그러다 어느 하나가 어긋나는 순간 신뢰는 눈 녹듯 사라졌다. 부정결제 사건은 고객 1700만 명 중 단 8명에게 일어난 일이었지만, 언론 보도로 널리 알려지면서 수많은 이들도 '나도 같은 일을 겪을지 모른다'는 불안을 느꼈다. 토스가 쌓아온 신뢰의 탑을 허물기에 충분했다. 지름길은 없었다. 다시 묵묵히 시간을 축적해가야 했다.", "관행을 답습하고 남들 말을 잘 따르는 것은 성공을 가져다주지 않아요. 어떤 변화를 만들어내고 싶은지 미션과 동기가 명확해야 하고, 그걸 실행할 수 있는 용기와 역량을 갖춰야 하죠. 같은 방향을 바라보며 달리는 좋은 동료가 있어야 하고요. 함부로 말하는 사람들이 틀렸고, 우리가 맞았다는 걸 토스뱅크의 성공으로 증명하고 싶었어요.", "그 어떤 것보다 고객의 편익을 우선하는 태도가 홍민택이 생각하는 기업가정신이었다. 때때로 유혹에 사로잡히더라도 선의가 탐욕을 이기는 기업만이 100년, 200년 영속할 수 있다. 선의에 부합하는 제품과 서비스를 계속 만들어내고, 고객에게 가장 이득이 되는 결정을 반복해야 한다고 자신을 다잡았다.", "짜여진 사회적 구조에 스스로를 맞추기 위해 이해할 수 없는 것들을 그저 받아들이는 사람들에게, 세상의 룰에서 벗어나기를 두려워하며 벗어나면 결코 성공할 수 없다고 믿는 사람들에게, 매일 느끼는 좌절과 비인간적인 도 다른 말투와 다른 표정을 갖지 않을까 하고 생각해요.", "하고 싶은 말이 있는 사람은 어떻게든 씁니다. 쓰다보면 잘 표현하고 싶고 단어 하나도 고심하며 붙들고 다시 읽어보며 고치고. 이 노동이 실력으로 쌓이고 재능처럼 보이는 어떤 능력으로 길러지겠죠.", "사람은 개인이 아니라 집단 같아요. 다른 사람이 과제를 안 하면 나도 안 하게 되고, 다른 사람들이 모두 과제를 하면 자기도 하게 돼요. 주변에 영향을 받는 것만이 아니라 나도 영향을 끼치죠. 내 주변까지 나인 거예요.", "우리가 합평을 통해서 얻을 수 있는 것은 좋은 평가도 나쁜 평가도 아닙니다. 좋은 평가든 나쁜 평가든 이런저런 말이 지나간, 그래서 말들의 풍파를 겪어낸 글을 쓰는 단단한 몸을 얻는 거죠. 쓰는 존재로서 체급을 기르는 겁니다. 그러니 일희일비를 충분히 하셔서 글 쓰는 신체를 단련하시길 바랍니다.", "정직하고 솔직한 글을 쓴다는 말을 다르게 표현하면 내 삶에서 일어난 일을 끝까지 고개 돌리지 않고 있는 그대로 바라보고 쓴다는 것입니다. 당연한 거 아닌가 싶지만 그 당연한 일이 어려워서, 생각처럼 잘되지 않아서 글쓰기가 힘든 것 같습니다.", "글로 자기 이야기를 솔직하게 쓴다는 것은 자기 아픔을 마냥 묻어두고 덮어두는 일이 아니라 아픔을 꺼내서 잘 정리해두는 일, 그렇게 함으로써 나와 아픔을 분리하는 일 같아요. 더 이상 그 일이 내 일상을 침해하지 못하도록요. 그렇게 분리하려면 자기 경험의 덩어리를 꺼내서 세부 항목으로 분류하는 과정이 필요하겠지요.", "제 글쓰기의 첫 공정은 자료 조사입니다. 내 안에 들어 있는 것을 세상에 꺼내놓는 일이 글쓰기잖아요. 생각이든, 정보든, 느낌이든, 지혜든, 무엇이든지요. 가진 것이 없으면 내줄 것도 없겠지요. 반대로 자기가 많이 알고, 오래 붙들던 주제라면 그것에 관해 주제 장악력이 있겠고요. '아는 만큼 보인다'라는 말도 있듯이 알아야 씁니다. 그리고 글로 써봐야 내가 얼마나 아는지 무엇을 모르는지도 드러나고요.", "글의 틀이 어느 정도 잡혔다 싶으면 이제 소리 내어 읽어봐요. 문장이 길어서 늘어진다 싶으면 단문으로 끊어줍니다. 문장이 길게 이어지면 내용 파악이 안 되고 글을 계속 읽게 만드는 리듬이 안 생기거든요. 긴 문장이 있으면 좀 짧은 문장도 넣어주고요. 특정 단어가 너무 중복된다 싶으면 다른 단어로 바꿔주고요. 자기도 모르게 습관적으로 쓰는 부사가 다들 있죠. 그것도 적절히 덜어내고요. 부사 없이도 문장을 이해하는 데 문제가 없다면 부사를 적절히 빼주시면 됩니다. 그런데 이렇게 다 했는데도 글이 어째 재미가 없고 늘어진다 싶으면 단락을 뒤집어서 구성을 바꿔보기도 해요. 한 편의 글이 꼭 시간순일 필요는 없거든요.", "퇴고의 중요성, 퇴고의 방법에 대해 말씀을 드렸어요. 정답은 없고, 최선을 다하는지의 문제 같아요. 저는 수단과 방법을 동원해서 체력이 닿는 데까지 써봐야 못 쓴 글 같아도 덜 부끄럽더라고요. 대충 쓴 게 아니라 내 딴에는 하는 데까지 해봤다는 것. 이것이 또 다음에 글 쓸 용기를 주는 것 같습니다. 퇴고에 정진해보시길 바랍니다. 글쓰기가 내 최상의 것을 보여주는 것이 아니라 최선의 것을 보여주는 일이라는 것을 기억하시면서요.", "글 쓰는 과정에서 한 인물을 입체적으로 보려는 노력을 의무적으로 해야지, 내 글 속 인물이 납작해지지 않고 말과 행동의 맥락을 살려낼 수 있어요. 그러다보면 그 사람과 연루된 나의 행위나 말, 감정이나 생각도 객관적으로 보게 되죠. 글쓰기로 특정 인물을 형상화하는 작업은 기존의 내 감정이나 판단을 내려놓고 그 사람을 최대한 공정하게 보려고 노력하는 일 같아요.", "저는 얼마 전에 농인은 '듣지 못하는 사람'이 아니라 '수어를 제1의 언어로 사용하는 사람'이라는 사실을 배웠어요. 어떤 존재를 결핍으로 규정하지 않는다는 점에서 더 나은 정의라고 여겼습니다. 좋은 언어는 적어도 타인을 마음 상하게 하거나 재단하지 않는 언어라고 생각해요. '먼지 차별'이라고 불릴 정도로 일상에 스민 차별과 혐오의 언어를 골라내기는 어렵지만 하나씩 배우면 되고, 헷갈리면 책을 찾아보거나 주변에 물어봐서 지혜를 구하면 됩니다. 누구나 실수하고 그렇게 실수하면서 배웁니다. 그러니까 올바르지 못한 표현을 쓴 사람에게 정색하지 말고 상대가 무안하지 않게 생각과 의견을 전달하고, 자신의 말이나 글에 그런 표현이 있다는 사실을 알았을 때는 반성하고 고쳐나가면 됩니다.", "저는 '현장'이라는 말을 참 좋아하는데요. 삶이 발생하는 자리, 생생한 현실을 일깨우는 삶의 진실이 현장에 있습니다. 일상에 매몰되지 않고 낯선 이웃이나 현장을 찾아나설 때, 기존의 앎에 혼란스러움을 느끼고 그 혼돈의 토양에서 생각의 씨앗이 발화합니다. 여러분도 각자 찾아보세요. '나의 현장은 어디인가' '내가 이방인이 되는 자리가 어디인가' '나의 가장 먼 이웃은 누구인가' 하는 것들을요. 하지 않던 상상을 하고 현장을 기웃거리고 새로운 시도를 하는 것 자체가 일상에서 생각을 키우는 시작이지 않을까 싶습니다.", "글쓰기는 시험대에 오르는 일 같아요. 내 생각이 얼마나 진실하고 정교한지 증명하는 자리이고, 내가 무엇을 알고 무엇을 모르는지, 무엇을 모르면서도 안다고 생각했는지 검증받는 시간이기도 하고요. 삶은 너무나 구체적이고 실질적이기에 우리의 글이 모호하고 추상적이라면 초점이 안 맞는 사진처럼 되어버린다는 이야기로 이번 글을 마무리해보겠습니다.", "좋아하는 영화 캐롤에 이런 대사가 있어요. \"궁금한 것들이 있는데 당신에게 물어봐도 될지\" 테레즈가 캐롤에게 말해요. 캐롤이 답하죠. \"뭐든 물어봐줘요, 제발\" 아, 저는 이 장면을 이 영화에서 가장 아름다운 장면으로 꼽아요. 당신을 알고 싶다고 말하는 바로 그 장면이요. 캐롤은 중산층으로 가족이나 지인과의 관계가 피상적인 인물이에요. 주변엔 그를 전시하려고만 할 뿐, 그의 내면까지 깊게 알고 싶어 하는 사람이 없었어요. 그러니 테레즈가 자기의 존재를 궁금해하면서 말을 걸어올 때 캐롤이 얼마나 벅찼을까요.", "저한테 '잘 사는 일'은 하루를 잘 보내는 일입니다. '인생'을 잘 사는 건 어려운데 '하루'를 잘 보내는 건 해볼 만하죠."]}, {"title": "음악소설집", "author": "김애란, 김연수, 윤성희, 은희경, 편혜영", "genre": "소설", "publisher": "프란츠", "passages": ["외국어로 대화할 때면 늘 그렇듯 나는 내가 하고 싶은 말이 아닌 할 수 있는 말을 했다. ​", "네가 외국어를 배우는 목적은 뭐야? 나는 고민하다 비교적 솔직하게 답했다. 언젠가 이곳을 떠나고 싶어서? 이렇다 할 기술도 자격증도 없는 상태에서 막연히 품은 희망이었다. 나는 정작 가장 중요한 이유인 '외국어 공부를 하다보면 아직 내게 어떤 가능성과 기회가 남은 것 같은 착각이 들어서'라는 말은 하지 않았다. ​", "'하나 마나 한 말'을 최대한 진심 어리게 하는 것도 어른의 화법일 텐데, 누군가의 부고와 마주할 때마다 스스로가 가진 표현의 한계와 상투성에 어쩔 줄 몰라했다. 상투성이 뭐 어때서. 세상에 삶만큼 죽음만큼 상투적인 게 또 어디 있다고. 그 '반복'의 무게에 머리 숙이는 게 결국 예의 아닌던가. ​", "나는 로버트가 평소 옷을 잘 갖춰 입는 게 좋았다. 은퇴 후에도 여전히 자신의 노동 앞에서 어떤 격식과 약속을 지키는 것 같아서였다. 그건 본인뿐 아니라 상대에 대한 예의이기도 했다. 그리고 나는 몇 년간 그런 존중에 좀 목말라 있었다. ​", "큰 교훈 없는 상실, 삶은 그런 것의 연속이라고, 그걸 아는 사람을 만나 정말 반갑다는 말을 하려다 말았다. ​", "\"삶은 대체로 진부하지만 그 진부함의 어쩔 수 없음, 그 빤함, 그 통속, 그 속수무책까지 부정하기는 어려운 것 같다\"고. \"인생의 어두운 시기에 생각나는 건 결국 그 어떤 세련도 첨단도 아닌 그런 말들인 듯하다\"고 했다. \"쉽고 오래된 말, 다 안다 여긴 말, 그래서 자주 무시하고 싫증 냈던 말들이 몸에 붙는 것 같다\"고. ​", "나는 로버트에게 이런 이야기를 하고 싶었다. 하지만 그러지 못했다. 실력도 안 될뿐더러 지금 내 마음을 어색하게 번역했을 때 일어나는 어쩔 수 없는 누락과 손실이, 하찮은 세부 하나하나가 내 감정의 가장 중요하고 소중한 부분으로 느껴질 것 같아서였다. 기쁨이라면 상관없었다. 하지만 슬픔은 달랐다. 고통만큼은 내 슬픔의 언어, 감정의 뿌리, 모국어로 말하고 싶었다. 그렇지만 모국어로 말한들 과연 그게 온전히 전해질까? ​", "'숨쉬기가 어려울 때마다 나무 바라보기'라는 제목의 그 동영상에서 그는 시급하게 나무를 바라봐야 할 여러가지 상황에 대해 말하고 있었다. 숨을 제대로 쉴 수 없을 때가 가장 심각한 상황이지만, 다른 경우에도 나무를 바라보는 일은 꽤 도움이 된다는 것이다. 예컨대 기분의 추세가 중요하다. 기분이 나빠지는 것 같다면, 당장 그 자리에서 일어나 가장 가까운 곳에 있는 나무 앞으로 간다. 그리고 나무가 한눈에 들어오는 자리에 서서 그 나무를 바라본다. 핵심은 바람을 보는 것이지만, 그건 눈에 보이지 않으니 나뭇잎과 가지의 흔들림으로 알아차릴 수밖에 없다. 가만히 서 있는 나무들도 바라보다보면 언젠가는, 그리고 어딘가는 반드시 흔들리게 돼 있다. ​", "유튜브에는 세상의 모든 이야기가 있었다. 내가 잠시도 쉬지 않고 들여다본다고 해도 새로운 동영상이 올라오는 속도를 따라잡을 수는 없었다. 이는 내가 접하는 유튜브는 전체의 극히 일부분에 불과하다는 사실을 뜻했다. 그런 점에서 유튜브는 우리가 사는 세계를 닮았다. 우리는 이 세계의 극히 일부분만을 경험한다. 그건 이 세계에 대해 우리가 아는 것은 거의 없다는 뜻이다. 이게 진실이다. ​", "어떤 시간여행자가 과거로 돌아가기로 결심했다면, 거기에 자신이 놓친 것이 있기 때문입니다. 신물이 날 정도로 인생이 뻔하고 지긋지긋하다면, 같은 하루를 몇 번이고 다시 살아가고 있다는 느낌이 든다면, 우리는 뭘 해야만 할까요? \"찾기 위해서죠. 지금 이 순간 내가 놓치고 있는 것이 무엇인가를. 지금 여기에서 그걸 찾아야 해요. 그게 내가 기시감, 신맛, 자살 충동을 느끼는 이유에 대한 나의 가설입니다. 그래서 지금 나는 몇 번이나 이 하루를 다시 살아가고 있는 것입니다.\" 어쩌면 우리 모두는 시간여행자일지도 모르죠. 지금 여기에 우리가 놓친 뭔가가 있습니다. ​", "과학은 불변의 진리가 아니야. 그 당시 살았던 과학자들이 알아낸 데까지를 뜻하는 거라고. ​", "언어도 마찬가지야. 사용할 당시에만 맞는 말이고 결국은 변하게 돼 있어. 맞았던 답이 틀려지는 거지. 명심해라. 세상에 변하지 않는 건 음악뿐이야. ​", "기획사의 탓만은 아니었다. 아무도 자본과 소비자를 불편하게 만들고 싶어하지 않기 때문이었다. 문화는 소비와 장식을 위한 상품이었으므로 뛰어넘어야 할 고통이나 고정관념을 거스르는 질문은 처음부터 차단되었다. 대중을 위해 가공된 연성 소비재가 유행에 따라 만들어지고 폐기되는 분위기에서 본격적이고 독창적인 시도를 하는 정교한 예술은 점점 환영받지 못하게 되었다. ​", "어릴 때 저는 그저 '저 노래를 따라 부르고 싶다'는 욕구만으로 뜻 모르는 팝송 가사를 한글로 옮겨 적곤 했는데요. '의미'가 아닌 '소리'를 따라 불렀을 뿐인데 왠지 그 곡을 제가 가진 것 같아 설렜습니다. '러브 허츠'는 그런 경험을 어른 버전으로 풀기 적당한 곡이라 생각했어요. '소리'가 먼저 오고 나중에 '의미'가 따라오는 '이별 이야기'에 어울릴 듯했고요. 독창과 이중창, 오해와 이해, 모국어와 외국어의 겹을 쌓기에도 괜찮을 것 같았습니다. ​", "사십 대 경력 단절 여성이 고립된 환경에서 혼자 할 수 있는 게 뭘까 고민하다 언어 공부를 택했어요. 슬픔이 많은 인물인 만큼 상대에게 자기 상황을 충분히 유려하게 말할 수 없는 공간으로 보내고 싶었고요. 만약 우리에게 '타인'이 한 명 한 명 다 '다른 나라', 곧 '외국'이라면 외국어 수업의 의미도 더 넓어질 것 같았습니다. 실은 중간에 주인공을 '호주로 이민을 준비 중인 간호사 지망생'으로 바꿔보기도 했는데요. 그런 목적성 자체가 이야기를 하강이 아닌 상승 서사로 바꾸더라고요. 그래서 결국 주인공을 '외국에 갈 일이 거의 없지만 외국어 공부를 하는 사람'으로 다시 고쳤습니다. ​", "누군가 자신의 인생을 바꾸기로 결심한다는 것은 최소한 다른 한 사람의 인생도 바뀔 가능성이 생긴다는 뜻이군요. 혼자 힘만으로는 새로운 인생을 시작할 수 없겠죠. 나를 바꾼다는 건 내 앞의 세계를 바꾼다는 뜻이니까. 자연스레 타인과의 관계 역시 바뀌게 될 테고, 그럼 그 사람의 인생도 바뀌게 되겠죠. 이게 평소 제 생각은 맞지만, 거기까지 염두에 두고 이 소설을 쓴 것은 아닙니다. 제가 알고 있었던 건 어릴 때 기진은 엄마에게서 새로운 인생을 찾는 방법을 배웠는데, 그건 보통 때라면 말을 걸지 않을 낯선 사람에게 말을 거는 일이었다는 것뿐이었습니다. 인생이 궁지에 몰렸을 때는 도와줄 귀인이 필요해요. 혹시 그런 상황이라면 먼저 말을 걸어보세요. ​", "그때나 지금이나 '주석', 혹은 '글쓰기'는 제게 사실에 맞서 진실을 기입하는 일입니다. 사실과 진실. 말장난 같기도 한데, 이렇게 설명하면 어떨까요? 이 세상이 하나뿐이라고 생각하면 너무나 끔찍하겠죠. 뉴스를 보면 정신착란에 걸릴 것 같아요. 공해 수준의 인간이 너무나 많죠. 그 어리석은 짓들, 전쟁들, 폭력들, 살인들은 또 어떤가요. 이게 '사실의 세계'입니다. 이 세계가 우리에게 가르치는 교훈은 약육강식, 적자생존 같은 것입니다. 돈과 권력이 없으면 불행 속에서 살아가야만 하는 세계입니다. 하지만 '진실의 세계'는 저마다 하나씩이라고 생각합니다. 사실의 세계에서 봤을 때는 완벽하게 불행해야만 하는 어떤 사람이 전혀 불행하지 않게 살 때, 그는 사실의 세계가 아니라 자신만의 진실의 세계에서 살고 있는 것입니다. 자신만의 진실이 바로 사실의 세계에 저마다 다는 주석, 혹은 자막 같은 것이라고 생각합니다. 저는 그게 이야기라고 생각합니다. 제가 누군가를 받아들이는 방법은 이야기를 통해서입니다. 저만의 진실로 누군가에 대해 말할 수 있는 것이지요. 그게 사실은 아닐지언정 제게는 진실이 됩니다."]}, {"title": "음악의 쓰임", "author": "조혜림", "genre": "에세이", "publisher": "파이퍼프레스", "passages": ["아이돌을 너무나도 좋아하는 후배가 케이팝에 대해 이야기하는 사람이 되고 싶은 꿈이 생겼다고 한 적이 있다. 그는 나에게 물었다. \"평론가가 되려면 어떻게 해야 할까요?\", \"음악에 관한 일을 오래 꾸준히 하기 위해서는 어떤 공부를 해야 할까요?\" 약간은 절박한 듯한 그의 질문에 내가 해줄 수 있는 답은 하나였다. 많이 듣고, 많이 쓰라는 것. 성실한 기록이 당신의 명함이 될 것이라고 말이다. 나 역시 그랬다. 블로그에 남긴 일기 같기도 소설 같기도 한 글들과 혼자서 만들어 본 플레이리스트들이 나를 지금의 자리로 이끌었다.", "하루키는 책 '달리기를 말할 때 내가 하고 싶은 이야기'에서 이렇게 말한다. \"매일 달린다는 것은 나에게 생명선과 같은 것으로, 바쁘다는 핑계로 인해 건너뛰거나 그만둘 수는 없다. 만약 바쁘다는 이유로 달리는 연습을 중지한다면 틀림없이 평생 동안 달릴 수 없게 되어버릴 것이다.\" 계속해서 하고 싶기 때문에, 계속한다는 것. 우스운 동어반복 같기도 한 이 메시지에서 나는 삶을 지탱하는 성실의 힘을 확인한다. 성실하다는 건 목표를 정하고, 목표에 부합하는 활동을 꾸준히 해내는 자세만을 의미하지는 않는다. 당장은 상관없어 보이지만, 그냥 좋아서 하는 것이 어쩌면 진정한 의미의 성실이 아닐까 생각한다. 해서 뭐하나 싶은 활동을 매일 할 수 있다는 것만큼 강력한 동기와 의지가 또 있을까?", "김사월. 한국의 대표적인 포크 뮤지션이자 싱어송라이터, 내가 오랜 시간 흠모해 온 사람이자 인생의 유서 깊은 취향. 그의 노래는 언제나 사랑을 이야기한다. 그가 표현하는 사랑은 나의 눈길이 미쳐 닿지 못한, 세상의 섬세하고 다양한 풍경을 향한다. 마음속 깊은 곳에 자리한 연약한 진심을 이야기한다. 어딘가 간절하기도 하고 날카롭기도 한, 사랑하지만 한편으론 그 사랑에서 벗어나고 싶은 양면적인 감정의 지독한 모순을 그는 맑은 목소리로 노래한다. 사랑은 아름답지만 복잡하고 난해한 슬픔으로 가득하구나. 김사월은 나에게 사랑이란 이토록 다채로운 색을 가지고 있다는 것을 알려주었다.", "사람을 편안하게 하는 음악. 침대 위 이불에 둘려싸이듯 포근하고 편안한 음악에는 거부하기 힘든 큰 힘이 있다. 그래서 포크의 감성에는 여전히 전 세대를 아우르는 힘이 있는 것 같다. 나는 김사월에게 그것이 당신의 음악이라 말했다. \"그래서 계속 포크를 하게 되는 것 같아요.\" 그가 다정한 미소를 건네며 말했다.", "\"저는 사랑이 잘되면 좋지만 안 돼도 좋다는 생각을 해요. 모든 것을 사랑으로 볼 수 있을 때의 제가 좋긴 하지만, 사랑에 실패할 때, 슬퍼하는 과정을 통해 오히려 더 나다워지는 것 같아요. 사실 인생의 사랑은 나 자신이어야 하고 그 마음이 좋을 때도 싫을 때도 그걸 표현하는 방식으로 음악을 찾았으니까요. 그것만으로도 저는 무척 행복한 게 아닌가란 생각을 해요.\"", "매우 추상적인 질문을 한 적이 있다. 그녀가 노래에서 이야기하는 단어들은 실체가 뚜렷하지 않은 추상적인 것들투성이였다. 그래서 나는 물었다. \"사월 씨가 생각하는 '초월하는 사랑'이란 어떤 건지 궁금해졌어요.\" 그는 잠시 멈칫하는 듯하다 큰 호흡 한 번, 미소 한 번을 짓더니 이야기를 이어갔다. \"'믿는 것'인 것 같아요. 그냥 생각나는 것부터 말하자면요. 마치 '확률'(김사월 정규 3집 수록곡)의 '우리 헤어진 후에도 나의 여생을 함께할 수 있는 사람'이라는 가사처럼요. 이 사람은 지금의 내 세상에는 없어졌더라도 내 마음속에는 계속 남아있을 거라는 이야기거든요. 그렇다면 사실상 저와 영원히 함께하는 거나 다름없어요. 오히려 저와 실제로 함께하는 것보다 더 가까이 있을 수 있을 거예요. 저는 이것이 조금은 다른 차원을 믿는 개념이라 생각하거든요. 누군가와 헤어졌다 하더라도 과거의 그 공간과 차원 안에서 우리는 계속 함께한다는 것, 그것을 믿는다면 지금 잠깐의 불안감이나 불신 같은 게 얼마나 하찮은 것일까? 더 큰 차원을 믿고 싶다는 마음, 그런 느낌으로 가사를 쓰게 된 것 같아요.\"", "적어도 '이 길이 맞는 길이 아니면 어떡하지'하는 고민은 더 이상 하지 않는다. 험하든 멀든 이 길이 옳다고 믿고 있다. 하나의 목표를 향해서 차근차근 걸어나가는 과정에서도 좌절과 실패는 있겠지만, 다시 일어나 걸어나갈 수 있을 것이다. 내가 가야 할 길이 저 앞에 분명하게 보이니까.", "\"그냥 그날의 작은 조각들, 사소한 것들이 동력이 돼요. 멀리서 보면 안 돼요. '내일 뭐 시켜 먹지?' 같은 걸 생각하는 거죠. 체크리스트도 만드는 편이에요. 만약 너무 먹고 싶은 게 있는데 지금 배달이 안 되면 내일 이거 꼭 시켜 먹어야지 써두는 거죠. 예를 들면 듄2를 너무 재미있게 봤어요. 그러면 듄3가 나올 때까지는 살아있어야지 다짐해요. 내가 좋아하는 것들의 다음을 보기 위해서, 내가 좋아하는 음식을 한 번 더 먹기 위해서 그런 사소한 것들이 삶의 동력인 것 같아요.\" 싱어송라이터 스텔라장과의 인터뷰에서 그가 나에게 알려준 하루하루를 힘내서 살아가는 방법이다. 요즘처럼 삶의 루틴, 삶의 동력에 대해 생각하는 시기가 오면 나는 그의 말을 곱씹어보게 된다.", "그가 가장 집중하는 것은 매일의 루틴을 지키고 삶의 밸런스를 구축하는 일이라고 했다. 그에게 루틴은 딱딱한 틀에 자신을 밀어넣고 평가하는 것이 아닌, 스스로를 사랑하고 보살피고자 하는 애정의 규칙이었다.", "\" 큰 성취를 이룬 사람들이 그 후 더 큰 성취를 하지 못해 우울해지는 경우가 있잖아요. 과정을 즐기는 사람이 결국에는 승자라는 생각을 해요. 진부한 얘기지만 과정이 재미있어야 하는 것 같아요. 오늘 바로 어떤 결과를 내지 못했어도 과정 자체에서 도파민이 나올 수 있는 시스템을 만들어야 하는 거죠. 저는 가수가 직업이고 경제 활동이기에 이 밸런스를 찾는 것이 너무 중요한 것 같아요. 삶의 모든 것이 그 밸런스를 찾는 문제인 것 같기도 하고요.\"", "영화 평론가이자 감독인 푸랑수아 트뤼포는 영화와 더 가까워지기 위해 1. 많은 영화를 보고 2. 영화를 만든 감독의 이름을 적어보고 3. 내가 감독이라면 어떤 선택을 했을지 생각해 보았다고 했다. 흔히 '영화광의 3단계'로 알려지면서 감상-비평-제작의 순서로 좋아하는 사람들의 깊이가 깊어진다는 의미로 해석되는 이야기다.", "꿈은 없지만, 먼 미래는 잘 그려지지 않지만, 오늘 주어진 일에 진심을 쏟는다는 그 단단한 철학을 생각한다. 살아가면서 내가 받은 도움을, 이번엔 내가 다른 사람들에게 줄 수 있는 기쁨을 소중히 여기는 순수함을 내 마음에도 새겨본다.", "'음악에 빠진다는 건 어떤 의미냐'는 질문을 종종 받는다. 음악에 풍덩 빠지는 기분, 다른 말로 하면 음악을 감상하는 것이라고 생각한다. 음악을 감상한다는 건, 단순히 듣는 것과는 다르다. 음악만을 위해 시간을 내고, 에너지를 쏟아야 한다. 귀를 통해 마음으로 전달되는 감동을 느끼려면, 비용을 지불해야만 한다. 음악이 내가 하는 일의 배경이 되는 것이 아니라, 주인공이 되어야 한다. 지금 내가 하는 일은 '음악을 든는 일'이다.", "음악에 풍덩 빠져들고 싶다면, 공연을 보는 것이 좋다. 공연장에서 나는 일종의 성스러움을 느낀다. 공연은 희생의 연속이다. 비용을 지불하고 티켓을 구매한 뒤 몇 달을 기다려 현장에 가면, 티켓을 교환하고 줄을 서고, 복도를 따라 천천히 입장한다. 길게는 몇 시간을 거쳐 들어간 공연장을 가득 채운, 기다리는 사람들의 모습. 설레는 마음이 절정에 달할 무렵, 조도가 낮아지고, 일순간에 무대가 밝아짐과 동시에 터지는 사람들의 함성. 고행에 가까운 기다림의 끝에 관객들은 소름 돋는 희열을 만난다. 낯선 사람들과 함께 노래를 따라 부르고, 소리 지르고, 감동해서 울기도 하는 그들을 바라보는 순간은 내가 경험한 가장 강력한 연대였다. 처음 보는 사람들과 정확히 같은 감정으로 연결되어 함께 있을 때의 느낌은 시공간의 개념을 잊게 될 만큼 환상적이다.", "나에게 가장 중요한 것은 더 많이 좋아하는 것이다. 더 높은 자리, 더 많은 돈을 원하는 사람들도 있겠지만 내 기준은 그렇다. 내가 추구하는 멋짐은 무언가를 많이 좋아하고 좋아하는 것들과 함께 사는 모습이다. 그렇게 좀 더 멋진 나를 꿈꾸며 좋아하는 것들을 찾아나가다 보니 지금의 자리에 와있다. 출발선에서는 전혀 상상하지 못했던 음악 콘텐츠 기획자이자 평론가라는 직업을 갖고 일한다. 막연히 동경해 온 사람들의 아름다움을 발견하며 살아간다. 어린 시절 단 한 번도 꿈 꾼 적 없는 일이다. 나는 지금의 내가 꽤 마음에 든다. 좋아하는 것들을 좇는 내가 조금은 멋진 것 같다. 앞으로 나아가고 위로 높아지는 삶이 아닌, 옆으로 확장하는 삶을 살아가는 사람. 발전하기보다 여유를 갖기를 택하는 사람. 나는 그런 내가 좋다.", "우리의 삶에 오래도록 남는 것은 결국 순간이다. 좋아하는 것들을 마주하며 설레고 행복했던 순간, 그 순간의 마음가짐이 삶의 태도를 결정한다. 그래서 나는 순간이 영원할 것을 확신한다. 순간을 놓치지 않으려는 사람들의 용기를 사랑한다."]}, {"title": "이 아이는 자라서 이렇게 됩니다", "author": "이용한", "genre": "에세이", "publisher": "이야기장수", "passages": ["\"이렇게 살기 힘든 세상에 고양이가 옆에 있어 다행이야\" 가끔 그런 생각을 한다. 고양이는 아무 말 없이 그냥 옆에 있어주는 것만으로도 위로가 되는 존재라고. 내가 만난 모든 고양이가 그랬던 것 같다.", "아무것도 아닌 삶은 없다. 고양이도 마찬가지다. 인간의 관심밖에서 소외된 묘생을 사는 고양이도 고양이로서 자신의 본분을 다한다. 고양이도 고양이로서 온 힘을 다해 산다.", "오랫동안 나는 고양이 밥을 배달하느라 거리를 떠돌았다. 거리에서 만난 고양이는 모두가 하나같이 갸륵했다. 어떤 고양이는 거리의 현자처럼 먼 곳을 바라보았고, 또 어떤 고양이는 자연의 수행자처럼 느긋하게 걸어갔다. 나는 그들의 아득한 철학이 거리와 자연에 있음을 믿는다. 내가 만난 고양이들은 자연 속에서 가장 빛났고, 길 위에서 가장 아름다웠다."]}, {"title": "이 지랄맞음이 쌓여 '계획대로 되지 않는다는 계획'을 세워두는 것이 좋습니다. ​", "인터뷰는 '당신'에게서 '이야기'를 발견하는 과정입니다. 인터뷰 속 이야기에는 옳고 그름이 없습니다. 좋고 나쁨도 없습니다. 듣고 싶은 이야기인지, 묻고 싶은 이야기인지, 제삼자에게 전하고 싶은 이야기인지가 중요합니다. ​", "우리가 인터뷰이에게 건네야 할 것은 열쇠입니다. '열쇠 같은 질문'입니다. ​", "그 사람을 알고 싶다면 질문을 해야 합니다. 다만 우리는 그 사람을 결코 다 알 수 없을 거라는 마음으로 질문을 시작했으면 합니다. 우리가 결코 그를 다 알 수 없을 것이라는 마음은, 몇 가지 질문만으로 그를 쉽게 파악하겠다는 무례한 마음을 갖지 않겠다는 뜻입니다. ​", "그의 어린 시절이 궁금하다면? 그를 어린 시절로 데리고 갈 만한 질문을 준비합니다. \"어린 시절엔 어떤 아이였어요?\"라고 시작할 수도 있겠지만, 보다 구체적으로 그를 어린 시절의 한 풍경으로 이동시킬 만한 질문이 더 좋을 겁니다. \"초등학교가 끝나면 바로 집으로 가는 아이였나요? 떡볶이집이나 문구점 앞을 서성이는 어린이였나요?\"처럼 생생한 장면 안으로 인터뷰이가 들어갈 수 있는 질문이 더 좋습니다. 이런 질문은 인터뷰이의 마음 안에 있는 여러 방 중 '초등학생 방' 앞에 그를 서게 할 수 있습니다. 성공한 외식사업가에게 식당을 열게 된 계기와 초기의 성공 전략을 묻고 싶다면 어떤 질문으로 시작하는 게 좋을까요? \"어떻게 식당을 시작하게 됐어요?\" \"사업 초창기엔 어땠나요?\"라는 질문도 나쁘지 않습니다. 그러나, \"식당을 처음 열던 날 기억나세요? 그날 하루는 어땠나요? 첫 손님 기억하세요?\"라고 시작한다면 어떨까요. 그를 '사업의 첫날'로 데려가는 겁니다. ​", "누구도 찌르지 않고, 누구도 궁지에 몰아넣지 않는 질문. 질문을 통해 마음의 방 깊숙한 곳까지 들어갔다 나오는 경험을 한 인터뷰이는 인터뷰가 끝난 뒤에도 열쇠를 버리지 못할 거예요. 더 많은 방의 문을 열고 더 많은 기억, 더 깊은 생각과 만날 겁니다. 이런 인터뷰를 경험한 사람은, 그날의 인터뷰를 잊지 못할 거예요. 무엇보다 자신에게 열쇠를 건넨 사람을 기억할 겁니다. ​", "질문은 그것이 어떤 형태여도 상대를 긴장하게 합니다. 처음 만난 사람이 던지는 질문은 더욱 그렇겠죠. 물음표는 둥글둥글하게 생겼지만, 일단 던지고 나면 상대에겐 뾰족한 모습으로 다가갑니다. 질문을 '받았다'기보다 질문을 '당했다'는 느낌일 때가 많아요. 특히 꼭 답이 있어야 할 것 같은, 정확하거나 멋진 대답이 짝꿍일 것만 같은 그런 질문은 상대를 뒷걸음치게 할 수 있습니다. 성심껏 대답해놓고도 '내가 잘 대답한 건가?' 불안하게 만들 수 있어요. ​", "알아가는 단계의 다음은 낱말 맞추기 시간입니다. 지금까지 그 사람에 대해 알게 된 정보는 마음에 담아두고, 이제 그와 어울리는 낱말을 찾아봅니다. ​", "그 사람을 닮은 낱말들을 떠올리기. 그 낱말들을 카테고리로 묶어보기. 어울리는 단어끼리 혹은 영 어울리지 않아 보이는 단어끼리 조합해보기. 여기까지 마쳤다면 이제 한 단계만 더 나아가봅시다. 다음은 '내가 좋아하는 아무 단어와 연결해보기'입니다. ​", "잘 묻는 것보다 더 중요한 것은 잘 살피는 것, 그리고 잘 듣는 것입니다. 상황에 따라 우리는 준비한 질문을 다 버리고 새로운 질문으로 채워야 할 수도 있죠. 상황이 달라졌는데 준비한 질문만 '대본대로' 하는 것은 좋은 인터뷰라고 하기 어렵습니다. 우리는 다행히 AI가 아니니까 스스로 자유롭게 '입력값'을 바꿀 수 있습니다. 쓸데없어 보이는 질문, 인터뷰 주제와는 당장 상관없어 보이는 질문, 그날 그 현장에서만 할 수 있는 질문, 그런 질문들이 우리의 인터뷰를 특별하게 만듭니다. ​", "저는 인터뷰를 할 때, 그 사람의 하루를 상상해보려고 노력합니다. 오늘 이곳에 오기까지 어떤 아침을 보냈을까, 어제 잠은 잘 잤을까, 점심밥으론 무엇을 먹었을까, 피곤하고 나른한 오후엔 진한 커피를 마시는 편일까, 달달한 쿠키를 먹는 편일까, 그가 일하는 공간은 어떨까, 이 인터뷰가 끝나면 그가 돌아가는 곳은 어디일까, 평소에 그는 어떤 표정일까. ​", "'인생의 좌우명'은 어떻게 바꿀 수 있을까요? 한 사람이 한 가지 좌우명만 갖고 사는 경우는 참 드물죠. 나이에 따라 상황에 따라 추구하는 이상향은 달라집니다. 우리가 좌우명이라는 질문을 통해 알고 싶은 것은 그가 어떤 삶을 추구하는지, 어떤 것에 의미를 두고 살아가는지, 어떤 것에 의지하는지 등등일 겁니다. 그렇다면 이렇게 바꿔보면 어떨까요? '좌우명이 뭐죠?' > 힘들 때 의지하게 되는 문장이나 말이 있나요? > > 참 멋진 말, 생각이다 싶어 메모장이나 수첩에 적어둔 문장이 있나요? > ​", "인터뷰이에 대한 정보를 열심히 모았다는 것을 드러내면서도 상대방을 뒷걸음치게 하지 않으려면, 그 정보들을 통해 인터뷰이를 새롭게 읽어내는 노력이 필요합니다. 나에 대한 정보는 내가 제일 많이 알 것 같지만, 그 정보들을 어떻게 조합하고 바라보느냐에 따라 '새로운 나'를 발견할 수도 있죠. 나를 다른 시선으로 바라봐준 타인에 의해 내가 다시 정의되기도 해요. ​", "Q2. 작품의 중심은 감독님의 여러 경험에 뿌리내리고 있어요. (중간 생략) 이런 상황에서 개인적인 경험으로 영화를 만들려면 좋았던 기억들만 찾아갈 수 없어요. 평소라면 떠올리고 싶지 않은 순간들도 돌아봐야 하죠. 작품에 들어간 대사나 장면 중에 감독님의 용기가 필요했던 것들이 있었나요? 이 질문도 간단히 바꿔보겠습니다. Q2. 엘리멘탈은 한국계 이민가정 출신인 감독님의 경험담에서 나왔습니다. 개인적인 이야기를 영화로 만들 때 어려운 점은 없었나요? 인터뷰어는 다소 민감할 수 있는 피터 감독의 집안 이야기를 언급하면서도, '대사나 장면 중에 감독님의 용기가 필요했던 것'을 물어봅니다. 창작자의 입장에서 그가 어떤 고민의 과정을 거쳤을지 가늠하며 건네는 질문이죠. 같은 의도를 가진 질문도 어떻게 하느냐에 따라 상대는 다르게 느낄 겁니다. 어떤 질문은 피터 감독을 '영화 홍보 장소'에 머물게 하고, 어떤 질문은 '두 번째로 장편영화를 만들게 된 뉴욕의 픽사 사무실'과 '한국계 부모를 둔 사람으로서 미국 사회에서 살며 느낀 아픔과 고민을 영화에 어떤 식으로 표현할까 고심하던 순간'으로 데려갑니다. ​", "저는 한 인물의 생애사와 현대사를 엮는 것을 좋아합니다. 한 사람의 사소해 보이는 경험, 우연으로 느껴지는 선택들이 사실은 시대와 맞닿아 있고 사회적으로 어떤 의미가 있는지 연결하는 작업입니다. 인터뷰라는 것이 그저 묻고 답하는 시간이 아니라, 대화를 통해서 그 사람의 선택, 경험, 실패와 실수에 어떤 의미가 있는지 어떤 가치를 만들어냈는지 발견해보는 과정이라고 생각해요. ​", "나라면 어떤 편지를 받았을 때 누군가에게 시간과 마음을 내어줄 수 있을까요. 어떤 편지를 받는다면 나의 속 깊은 이야기를, 내가 알고 있는 정보와 지식들을 그에게 말해주고 싶을까요. 저라면 인터뷰를 통해 나 자신도 무언가를 발견할 수 있는 사람을 만나고 싶을 것 같습니다. 내가 좀 부족해도 내 안에 있는 것들을 잘 끌어내줄 수 있는 사람, 나의 이야기를 함부로 판단하고 이용하지 않을 사람과 인터뷰하고 싶을 것 같습니다. 인터뷰를 통해 스스로에게 해보지 못했던 질문을 하고, 질문을 통해 나를 새롭게 보게 되고, 내 생각과 경험을 정리하는 일. 그렇게 인터뷰 이전과 이후의 삶이 조금씩 달라질 수 있는, 저라면 그런 인터뷰를 하고 싶을 것 같습니다. ​", "그날의 인터뷰를 친한 친구나 동료, 가족에게 가볍게 수다 떨듯이 전달해보는 겁니다. 실제로 누군가에게 말해보거나 누군가에게 이야기하듯 혼잣말을 해봐도 좋습니다. 들어줄 사람이 없거나, 타인에게 말하는 것이 어색하다면 혼자 메시지 창을 열고 '나에게 보내기' 기능을 활용해 친구와 채팅하듯이 말해봐도 좋습니다. 여기서 중요한 건 절대 완벽한 문장으로 쓰려고 하지 말고, 그야말로 말하듯이 해보는 겁니다. ​", "누군가에게 설명하거나 전달할 때, 우리는 묘하게 상대를 설득하려는 경향을 갖게 됩니다. 그게 좋다는 이야기든 안 좋다는 이야기든요. 그 과정에서 내 생각이 논리적으로 정리되는 경험을 하기도 합니다. 말하다보면 이게 말이 되는지 안 되는지, 어떤 식으로 구성하면 좋을지 판단도 할 수 있습니다. ​", "어떤 인터뷰는 차마 담아낼 수 없을 것처럼 무겁게 느껴지기도 합니다. 너무 아름다워서, 너무 깊어서, 너무 아파서 대체 나라는 사람의 깜냥으로는 제대로 기록할 수 없을 것 같습니다. 그런 순간에 저는 한 문장과 한 장면을 찾아내려 노력했습니다."]}, {"title": "일놀놀일", "author": "김규림, 이승희", "genre": "자기계발", "publisher": "웅진지식하우스", "passages": ["이제 저희에게 일은 돈을 버는 수단을 넘어서 '나'라는 사람을 만들어주는 모든 활동들입니다. '왜 일하는가'의 저자 이나모리 가즈오는 일은 곧 매일 수련하는 활동과 같다고 이야기한 바 있습니다. 저희는 거기에 일을 놀이로, 놀이를 일처럼 하는 삶의 태도, '일놀놀일'의 방식을 보태어 이야기하고 싶습니다. 기왕 해야 하는 것, 재미있게 해낼 수 있다면 더할 나위 없이 좋겠다는 마음으로요.", "'꼰대'는 보통 반면고사의 대상이지만 나는 참 운 좋게도 사회에 나와 '꼰대'란 단어와는 거리가 먼 선배들을 많이 만났다 그 동안은 그게 당연한 줄로만 알았는데 해가 지나 후배들이 생기면서 깨달았다 피드백을 줄 때 의견을 들을 때 꼰대 같은 모습이 튀어나오지 않도록 하는 데도 상당한 노력이 필요하단 걸 내 안의 꼰대 같은 마음이 튀어나오려 할 때마다 선배들을 떠올렸다 생각해보니 그들에게는 공통점이 몇 가지 있었다 모르는 것을 부끄러워 하지 않고 늘 자신이 틀릴 수 있다는 걸 전제했고 무엇보다 '그럴 수도 있겠다' 라는 이야기를 많이 했다.", "어설픈 말로 가르치려는 대신 그저 내 삶을 살아가는 방식으로 보여주는 것, 그것이 내가 살아가고 싶은 방향이자 꼰대가 되지 않는 방법이다.", "꼭 '재입사'의 형태는 아니더라도, 누군가가 다른 일을 할 때 나를 다시 떠올리거나 필요로 한다면 한 조직의 구성원이자 누군가의 동료로서 잘 해냈다는 좋은 지표로 볼 수 있지 않을까?", "마감이란 단어가 가진 무시무시한 느낌이 있지만 사실은 마감이란 존재를 좋아하고, 늘 고마움을 느낀다 마감은 눈에 보이는 목표점을 친절하게 찍어주고 같이 달리며 페이스메이커가 되어주고 무사히 결승선에 도달하게 해준다.", "\"내 정신을 맑게 해주는 게 뭔지 알게 되었다. 마감이었다. 마감 없는 삶보단 마감 있는 삶이 낫고, 괴로워도 주기적으로 시작과 끝이 있는 게, 끝없이 펼쳐지는 자유보다 나은 것 같다.\" 우연히 페이스북을 넘겨보다가 칼럼니스트 정성은 님의 타임라인에서 이런 글을 봤다. 끝없이 펼쳐지는 자유보다 마감있는 삶이 낫다는 그 문장에 묘한 공감이 갔다. 그래, 맞지. 마감은 강력한 동력이지. 하지만 그때뿐. 나는 오늘도 마감에 시달리고 있다.", "내가 성장했다고 느끼는 순간들 당황할 만한 순간에도 침착한 나 자신을 발견할 때 멀리서 동경만 하던 것이 어느새 내 일상으로 녹아들었음을 깨달을 때 프로젝트가 끝나고 동료들과 회고하는 시간 이전에 했던 고민을 비슷하게 하고 있는 사람에게 도움을 줄 수 있을 때 어느날 문득 걸어온 길을 돌아볼 때", "나는 나를 자극하는 사람들이 많은 곳에 있고 싶다. 혼자 일하는 것보다 사람들이 많은 조직에 계속 나를 두는 이유도 업데이트할 수밖에 없는 환경에 나를 두고 싶기 때문이다. 혼자 있으면 내가 할 수 있는 생각만 하지만 함께 있으면 내가 할 수 없는 생각들을 할 수 있게 된다. 낯설지만 새로운 환경에서 자극을 받아 내가 얼마나 부족한지 느끼는 삶. 부서지고 다시 겸손해지는 것. 그렇게 하나씩 부딪히며 배워나가는 것이야말로 내가 바라는 업데이트의 모습이다. '내가 왕년에~'라는 말에 갇히고 싶지 않다.", "자존감을 높이기 위해서는 남이 나를 어떻게 생각하는지보다 내가 나를 어떻게 생각하는지를 더 중요하게 보아야 한다. 남들의 시선을 투영하여 보는 대신 내가 나를 온전히 보는 연습을 거듭해야 자괴감으로부터 나를 지킬 수 있는데 나는 그러지 못한 것이다. 자존감보다 자존심과 자괴감이 더 컸던 나는 스스로를 고독하게 만들고 있었다.", "대부분의 재능은 타고난다는 점에서 범접할 수 없는 느낌이 있어서일까. 타고난 사람들을 볼 때 밀려오는 좌절감 같은 게 있다 하지만 이내 떠올린다. 재능을 떠나 행위 자체만으로 충분히 행복하고 기쁜 것들을 기왕이면 재능까지 받쳐주면 더 좋겠지만, 생각만 해도 가슴 벅차고 더 잘 해내고 싶은 일이 있다는 것. 그것만으로도 충분한 게 아닐까. 라는 생각이다.", "재택근무로 더욱 중요해진 건 '커뮤니케이션'이다. 상대방이 해당 업무나 진행 사항에 대해 잘 모른다는 가정하에 충분히 설명하고 문서를 알아보기 쉽게 만들기, 내 표정과 목소리가 담기지 않는 메신저로도 충분히 설명이 가능한 상황을 만들기, 보고 느낄 수 없을만큼 더 신경 써서 따뜻하고 부드러운 커뮤니케이션하기는 필수 덕목이 되었다.", "문을 열고 들어가 문을 닫고 나가기까지의 여정에서 줄 수 있는 인상은 참 많겠지만 감동은 의외로 아주 사소한 부분에서 온다는 사실 지금 챙길 수 있는 작은 것들을 눈앞에 두고, 대단한 무언가를 만들려고만 하고 있진 않은지 생각해보게 된다. 내가 만들 수 있는 작은 단위의 감동에 집중해보자.", "나는 목요일마다 글을 쓴다 '이제 세상은 긴 글을 쓸 수 있는 사람과 못 쓰는 사람으로 나뉘지 않을까?' 동료의 한마디에 두려워져 시작한 것인데 어느새 4년도 훌쩍 넘게 매주 쓰고 있다 소재 고갈의 괴로움도 있고 나를 비웃듯 쳐다보는 빈 화면도 매주 마주하지만 엉덩이를 붙이고 모니터를 노려보면 무엇이든 써 내려가게 된다는 믿음이 생겼고 항상 글감을 찾다보니 일상을 좀 더 세심히 관찰하게 됐다 해보니 참 좋은 나와의 약속. 누구나 환영해요.", "'무언가를 열렬히 좋아해봐야만 뭔가를 좋아하게 만들 수 있지' 자주 들었던 상사님의 말처럼 진심으로 좋아했던 멋진 경험을 녹여 또 다른 멋진 경험으로 만드는 것이 곧 '마케팅/브랜딩'이 아닌가. 그러니 어쩌면 '덕질'은 일을 잘하기 위해 해야 할 (기쁜) 필수 활동에 더 가까울 수도?", "생산자의 입장에서 정보를 전달할 때, 생산 과정에서 익숙해져 특별하다고 생각하기 힘든 부분들이 있는데 소비자의 입장에서는 작은 정보라도 말해주지 않으면 알 길이 없다 다양한 정보를 줌으로써 그 물건과 소비자의 연결 고리를 만들어주는 것 때때로 결과물을 만들었다는 뿌듯함에 심취해 간과하곤 하지만 좋은 물건을 만드는 데 들인 노력만큼 물건의 이야기를 전달하는 노력도 중요하단 점을 생산자 이전 소비자의 관점으로 오늘도 되새겨본다.", "혼자서 일기장에 생각을 쓰는 것과 달리 소셜미디어 포스팅은 꽤 큰 용기를 요한다 (적어도 내게는 그렇다) 나의 세계를 깨고 나와 내가 만든 무대에 스스로를 세우려 한다 무대 앞에 누가 얼마나 있을지 어떤 반응이 돌아올 지 알 길은 없으나 계속해서 무대에 서고 신나게 공연하다보면 언젠가는 나에게 공감해주는 관객을 만날 수 있다고 믿기 때문이다 내가 소셜미디어를 계속 하는 이유"]}, {"title": "일의 감각", "author": "조수용", "genre": "자기계발", "publisher": "레퍼런스 바이 비", "passages": ["남 일 아닌 내 일처럼 일할 수 있는 방법이 있습니다. 좀 비현실적으로 들릴지 모르겠지만 클라이언트의 일을 내 일이라고 생각하고 몰입하는 겁니다. 물론 디자이너에게만 통하는 방법은 아닙니다. 모든 직장인이 이렇게 일한다면, 내 상사를, 상대 부서장을, 회사의 대표를 쉽게 설득할 수 있습니다. 한 마디로 진정한 오너십을 가지자는 건데, 월급쟁이 직장인 입장에서는 오너십은커녕 '내 회사도 아닌데'라는 생각이 드는 건 당연합니다. 하지만 저는 그렇게 일하면 재미가 없을 뿐더러, 결국 어차피 가야 하는 길을 돌아가게 된다고 생각합니다. 회사가 나를 월급만큼만 일하는 직원으로 생각하게 되는 것은 물론, 그저 '주어진 일을 하고 허락받기를 기다리는 사람'에 머무르게 됩니다. 이게 과연 나에게 좋은 일일까요? ​", "'이 직원은 믿어도 되겠다, 이대로 하면 손해볼 일 없겠다.' 회사가 이런 신뢰를 가지면 내 의견에 힘이 실리고, 내 생각을 펼치며 일할 수 있게 됩니다. 그 믿음이 가장 큰 직원에게 사장의 역할을 맡길 수도 있을 겁니다. 그러나 이처럼 신뢰를 쌓으려면 일을 잘하는 것보다 더 중요한 게 있습니다. 그것은 바로 오너보다 더 오너십을 가지는 것입니다. 물론 오너십을 가지고 일하면 시키는 대로 컨펌을 받으며 일할 때보다 부담이 엄청납니다. 하지만, 결국 그 부담이 쌓여 내 자산이 됩니다. 쉽게 말해, 오너의 신뢰를 얻으려면 오너의 고민을 내가 대신 해주면 됩니다. ​", "프리랜서 디자이너로 디자인 일을 하면서 깨달은 사실은, 내가 오너십을 가져야 클라이언트가 날 믿게 되고 오랜 관계로 이어진다는 것이었습니다. 어떤 디자인 업무를 의뢰받든, 제 관점에서 그 디자인의 필요성을 원점에서 재해석하고 사업 자체의 미래를 제안할 때 클라이언트가 만족했습니다. 어떤 때는 '제품부터 다시 만들어야 하지 않느냐, 이 제품은 경쟁력이 없는데 지금 디자인이 웬 말이냐'라며, 클라이언트에게 불편한 소리를 할 때도 있었습니다. ​", "이 사업은 왜 하는가. 어떻게 하면 지속적으로 이익을 내며 성장할 수 있는가. 저의 고민을 늘 오너의 고민과 일치시키려고 했고, 오너에게는 보이지 않지만 내가 볼 수 있는 부분에 대해서는 오너도 그런 시야를 가질 수 있도록 도왔습니다. '정상적인 오너'라면 내 고민을 치열하게 같이 해주는 사람의 이야기를 경청하기 마련입니다. 그렇게 신뢰가 누적된 것이 저의 커리어가 멈추지 않고 이어지는 데 큰 역할을 했을 겁니다. ​", "\"관심 없는 사람들에 빙의해보세요.\" 디자이너라면 서비스에 아무 관심 없는 사람의 입장이 되어 봐야 합니다. 일반적으로 기획자나 디자이너는 서비스를 만들 때 자연스레 이 일에 이미 익숙해진 자신을 기준으로 삼을 때가 많습니다. 하지만 특정할 수 없는 다수가 쓰는 서비스인만큼, 관여도가 거의 없는 사용자의 눈으로 서비스를 바라봐야 합니다. 공감은 우리의 타깃 고객이 알아볼 것과 그렇지 못할 것을 구분하고, 그들의 잠재의식 속에 남을 잔상을 유추할 때 시작됩니다. 그래야만 해야 할 일과 안 해도 될 일, 중요한 일과 중요하지 않은 일을 구분하기 쉬워집니다. 지금의 나를 지우는 훈련이 필요합니다. 그래서 저는 어떤 프로젝트에 본격적으로 몰입하기 전의 '나'를 박제해두고 종종 그때의 내가 되어보려고 노력합니다. ​", "전권을 부여받는 게 마냥 좋은 일일 것 같지만, 엄청난 부담이 함께 따라옵니다. 하지만 저는 누군가에게 허락받으려고 일하지 않고, 소신을 가져야만 힘들어도 재미있게 일할 수 있는 사람입니다. '오너십을 가지라'는 말은 마음만 그렇게 먹으라는 말이 아닙니다. 실제로 내가 맡은 일의 주인이 되라는 말입니다. 그러려면 첫 삽을 뜨고, 마지막 흙을 덮는 일까지 직접 살피려 노력해야 합니다. ​", "우선 '나'로부터 시작해야 합니다. 일단 무엇보다 내가 좋아하는 것에 대한 이해가 남달라야 합니다. 무언가를 좋아한다는 것은 그 분야를 잘 안다는 것을 전제로 하며, 많이 알면 알수록 더 구체적으로 좋아하게 됩니다. ​", "'내가 좋아하는 것'과 '타인에 대한 이해'가 만나는 지점에서 많은 사람들이 공감하는 결과물들이 만들어 졌습니다. 저는 내 취향을 깊게 파고, 타인에 대한 공감을 높이 쌓아 올린 결과 만들어지는 것이 '감각'이라고 생각합니다. ​", "해당 분야의 현재와 그 흐름을 이해한 뒤 '지금 필요한 것'을 발견하고 재구성해서 더 현명한 방향을 제안하는 능력. 이것이 제가 생각하는 좋은 감각입니다. 그렇다면 이런 감각은 어디에서 나오는 걸까요? '마음가짐'에서 나오는 겁니다. 친구의 부탁으로 디자인을 하는 마음과 10억 원이라는 비용을 받고 디자인을 하는 마음은 천지 차이일 수밖에 없습니다. 자신이 맡은 모든 일이 10억 원짜리 일이라고 상상하는 사람의 결과물은 '받은 만큼 일한다'라고 생각하는 사람의 결과물과 같을 수가 없겠죠. 그러니 이런 마음가짐으로 일하는 사람에게는 저절로 감각이 생깁니다. 다시 말하지만, 감각의 시작은 마음가짐입니다. 실제로 얼마의 대가를 받았든, 맡은 일을 대충 할 수 없다고 생각하는 마음가짐입니다. 모든 일을 10억 원짜리 의뢰처럼 여기는 겁니다. 이렇게 일하는 사람은 어떤 일을 맡아도 그 사람만의 감각적인 결과물을 내놓습니다. 로고를 디자인해도, 인테리어를 해도, 모바일 페이지 한 장을 만들어도 마찬가지 입니다. 본질적인 질문을 던지고, 세상의 흐름을 알기 위해 끊임없이 공부하며, 사소한 일을 큰일처럼 대하는 마음가짐을 가지는 것. 이것이 감각의 원천입니다. ​", "감각이 좋은 사람에겐 어떤 특징이 있을까요? 그들은 '모험가'처럼 살려고 노력합니다. 파악하려는 대상을 억지로 암기하듯 공부하지 않습니다. '몰입하는 시간'과 그렇지 않은 시간을 구분하지 않고, 평소 대상의 주변을 돌며 계속 무언가를 '발견'하려고 합니다. ​", "내가 해야 할 일이 정해지면, 거기서 의미를 발견하기 위해 그 주변을 계속 맴돌며, 좋아하려고 노력해야 합니다. 어떤 것이든 좋아해보려고 노력하는 마음이 감각의 시작입니다. ​", "낯선 분야에 '쇼핑하듯 접근'하는 겁니다. 이 방법을 쓰면 평소 관심이 없었거나, 스스로 벽을 세웠던 분야도 비교적 쉽게 들여다 볼 수 있습니다. ​", "\"30만 원 예산 안에서 네 방에 놓을 그림을 하나 골라봐. 아빠가 사줄게.\" 미술이나 아트 페어에 전혀 관심이 없던 아이들도, '쇼핑한다'고 생각하는 순간 그림을 다르게 보기 시작합니다. 미술에 대한 이해를 떠나, 온전히 '어떤 그림을 방에 걸어야 계속 좋아할 수 있을지' 탐색하기 시작합니다. 선택의 기준이 훤씬 단순해지는 겁니다. 아는 그림, 사고 싶은 그림이 없기 때문에 답을 찾으려면 그림을 더 많이 볼 수밖에 없습니다. 대충 보고 '다 비슷하고 재미없다'라며 진작에 집에 가자고 할 아이들이, 가격표까지 확인하면서 몇 바퀴를 더 돌아봅니다. ​", "일상 속에서 쇼핑에 집중하는 일은 '내 취향을 깎고 다듬어가는 과정'과 같습니다. 물건을 사지 않아도 그 과정만으로 좋은 경험이 됩니다. 저는 예전이나 지금이나 틈날 때마다, 욕실 수건부터 빌딩까지, 가상 쇼핑을 즐깁니다. ​", "감각은 안정감과 밀접하게 연결되어 있습니다. 좋은 감각은 사용자조차 미처 알아내지 못하는 영역에서 안정감을 제공하는 역할을 합니다. 제가 정의하는 안정감이란 '업에 진심인 사람들이 성실하게 노력하고 있는 느낌'입니다. ​", "브랜드를 끌고 간다는 것과 크리에이티브 디렉팅한다는 것은 엄밀히 말하면 '오너'만이 할 수 있는 일이다. 이 브랜드가 실패하면 제일 슬퍼할 사람, 성공하면 제일 기뻐하고 득을 크게 보는 사람만이 디렉팅할 수 있다. 엄밀히 말하면, 이 사람 직업을 브랜드 매니저라든지 크리에이티브 디렉터라고 말하는 것은 사실이 아닐 수 있다. 오너를 가장 닮은 사람이거나, 그를 가장 많이 돕는 사람인 거다. ​", "나의 주관은 똑같다. '이 브랜드는 어떤 게 어울릴 것 같다는 제 생각에 공감하신다면 제 것처럼 한다'라고 했다. ​", "의식 있게 물건을 만든 것보다 어쩌면 더 큰 게 유통이다. 유통이란 시장도 크리에이티브 마인드를 갖고 봐야 한다. 조금 더 가면 부동산도 그렇게 봐야 한다. 근데, 이런 얘기 좀 싫지 않나. 그런 건 누가 해주면 안 되나 생각한다. '이렇게 좋은 물건을 만들었는데 왜 안 가져가고, 집세는 자꾸 올리지?' 하는 식이 된다. 그러면 안 된다는 거다. '이 사람은 집세를 정말로 왜 올려야 할까?', '내가 집주인이면 어떻게 할까?', '돈이 몇십 억이 있어서 건물 하나 샀다면 나는 안 올릴 것인가?' 이렇게, 창의적일 수 있는 부분이 있다는 것이다. 세상은 다 각자의 이득을 취하는 퍼즐이 맞춰져 있다. 유통 전문가가 있다면, 그가 매력적이라 느끼는 부분이 있어야 한다. 다른 분야, 내가 하는 것이 실제로 소비자에게 들어가는 지점까지 두려워하거나 도망가지 말고, 창의성을 보는 것이 진짜 브랜드이고 디자인이다. ​", "아이디어 자체는 그다지 중요하지 않습니다. 아이디어는 어디에나 있습니다. 정말 중요한 건 여러 이해 당사자들을 한 방향으로 이끌어 포기하지 않고 '끝까지 실행'하는 겁니다. 그런데 아이디어가 만일 상식과 본질에서 시작되었다면 실행이 비교적 수월합니다. 상대를 설득하기 쉽기 때문입니다. ​", "세상에 원래 그런 건 없습니다. 빵 한 조각을 봐도, 도시의 빌딩을 봐도 왜 그런지 끊임없이 물어야 합니다. 본질로 돌아가는 것. 그게 바로 감각의 핵심입니다. 상식으로 돌아가 내 기준에서 당연한 게 무엇인지 생각해보는 작업만 꾸준히 해도 충분히 남다를 수 있습니다. 정해진 관성에서 벗어나, 원래 그런 것은 없다고 가정하고 사물을 바라보아야 합니다. 감각적인 사람은 우리가 잊고 있던 본질을 다시금 떠올리는 사랍니다. ​", "의뢰받은 요청을 기반으로 시안을 디자인하고 의뢰한 사람을 만족시키는 게 디자이너의 일이라고 생각할 수 있습니다. 하지만 의뢰를 받았을 때 \"이게 이 사업에 어떤 의미가 있죠?\"라고 물을 수 있어야 기획자로 한걸음 나아갈 수 있습니다. 이 질문을 늘 했기에 저는 디자이너임에도 여러 기획을 맡을 수 있었습니다. ​", "내가 좋아했던 순간을 끝까지 추적해서 구체화하고 단단하게 정리해요. 그게 '브랜딩'이에요. 그런 다음은 이것저것 안중요한 걸 빼요. 불필요한 걸 빼고 나면 오히려 남다른 캐릭터가 생겨요. ​", "매거진 <B>도 2년 하다가 그만뒀으면 흔적도 못 찾았을 텐데 6년을 버티니까 존재감이 생긴 거죠. 그게 아이디어의 좋고 나쁨이 아니라 핵심은 얼마나 버티는가 거든요. 버티면 좋은 아이디어와 콘셉트가 되는데, 못 버티면 실패가 되죠. ​", "실용성, 심미성, 가격만 충족되어도 충분히 좋은 브랜드라고 할 수 있습니다. 하지만 세 요소만으로는 입체적인 브랜드가 되지 못합니다. 셋 중 하나만 부족해도 브랜드로서 존립이 어려워집니다. 여기에 철학이라는 점을 찍어야 브랜드가 입체적이 됩니다. 철학이 꼭지점을 만들면, 나머지 세 요소 중 하나가 조금 모자라도 브랜드는 앞으로 굴러갈 수 있습니다. 즉 가격이 비싸도, 실용성이 좀 떨어져도, 아름다워 보이지 않아도 철학이 있다면 브랜드는 완성입니다. ​", "이제 큰 브랜드는 작은 브랜드처럼 행동해야 하고, 작은 브랜드는 큰 브랜드처럼 생각해야 합니다. 작은 브랜드처럼 행동한다는 건 '불특정 다수'가 아닌 '의식 있는 소수'가 열광하는 부분을 찾아 이를 실천한다는 뜻입니다. 큰 브랜드처럼 생각한다는 건 '업에 진심인 사람들이 성실하게 노력하고 있는 느낌'인 '안정감'을 추구한다는 것입니다. ​", "내가 직장인이든 사업을 하든 우리의 삶은 1) 브랜드를 운영하거나 2) 브랜드를 소비하는 두 가지 중 하나, 혹은 양쪽 모두에 속해 있습니다. 꼭 자본주의에 속해 있어서가 아니라 그냥 인간의 삶이 그런 겁니다. 다시 말해 '브랜드를 키워서 돈을 벌고 싶은 욕망'이나 '브랜드를 소비하고 싶은 욕망'을 빼면 이 세상을 설명하기 어렵습니다. 어쩌면 브랜드 스토리는 고전을 읽는 것보다 더 쉽고 흥미로운 인문학 공부가 될 수 있습니다. 우리는 브랜드 스토리를 통해 사람들이 뭘 중요하게 생각하는지, 어떤 대상에 끌리는 심리는 무엇인지, 한 사람이 마음을 먹으면 기술로 세상을 어디까지 바꿀 수 있는지 흥미진진하게 공부할 수 잇습니다. ​", "저는 제가 어떤 브랜드나 사람을 좋아하면 알고 싶은 욕망이 되게 많은 사람이거든요. 어떤 제품을 사도 많이 궁금해해요. 어떻게 만들어진 건지, 왜 지금 사람들이 구하고 싶어 하는지가 궁금하거든요. 없어지면 왜 없어졌는지도 궁금하고. 사람에 대해서도 똑같은 관점을 가지고 있어요. 누가 너무 멋있어 보이면 왜 멋있는 거지. 왜 이렇게 매력이 넘치지. 그러면서 그 사람의 인터뷰나 이런 것들을 쭉 보다 보면 아, 이런 이유가 있구나, 이 브랜드가 이렇게 만들어진 거였구나. 호기심과 관심이 생기는거죠. 좋은 브랜드는 이런 이야기가 끝도 없이 서로 오가는 거거든요. ​", "누군가는 내일 죽는다면 오늘 뭐 할 거야? 다음 달에 죽는다면 지금 뭐 할 거야? 라는 질문을 하는데, 사실 그건 너무 극단적이고 상상이 잘 안돼서. 얼마 못 산다는데 너 뭐하고 싶냐고 물
