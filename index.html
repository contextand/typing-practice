아닐 수 있으니까. 단순히 내가 특별하게 생각하는 사람이라고 함부로 초청장을 내밀 수는 없었다. 누군가의 종말에 초대되는 것은 각별한 의미이다. 그가 나에게 의미가 있듯이 나도 그에게 의미 있는 사람이어야 했다. 그런 사람이 내 인간관계에서 몇 명이나 있는지, 우리는 그 숙제를 마지막에 가서야 꾸역꾸역하기 시작한다. ​", "모든 상황이 좋을 때 같이 최고의 시너지를 낼 수 있는 관계가 있고, 세상이 무너질 때 지푸라기를 같이 내어주는 관계가 있고, 또 그 두 지점 사이에 무수히 많은 스펙트럼의 관계들이 있다. 어떤 관계가 어느 지점에 있는지, 죽음 앞에 다가가면 관계의 명도가 본능적으로 보이기 시작하고 분명해진다. ​", "이제 음악은 멈췄고 당분간 춤을 출 일은 없다. 한 치 앞도 보이지 않는 부분들이 여전히 많았지만, 그 어느 때보다도 분명하게 보이는 것들도 있었다. 인간관계라는 지긋지긋한 숙제에서 해방되었다. 나에게 중요한 사람들이 누구인지 그 얼굴들이 선명하게 떠올랐다. 이들을 슬프게 하고 싶지 않다. 다시 함께 춤출 일은 없더라도, 최소한 내 몫의 노력은 끝까지 해야겠다. 그것이 이들에 대한 도리이고 이들과의 관계를 비로소 완성하는 것이다. 질 때는 지더라도 이들을 봐서라도 싸워봐야겠다. ​", "그때부터 엄마와 나는 충돌하기 시작했다. 나는 삶을 포기할 준비를 하고 있었고 엄마는 포기를 모르는 사람이었다. 엄마는 내가 좋든 싫든 반드시 김밥을 싸야 하는 사람이었다. 엄마가 석류나 블루베리가 암에 좋다고 사 오면 짜증이 났다. 석류나 블루베리가 효과가 있었으면 죽는 사람이 왜 있겠는가. 엄마는 어디서 읽었는지 맨발로 걷는 것도 좋다고 근처 바닷가로 나를 데려가서 10분이라도 맨발로 걷게 했다. 역시나 이런 게 효과가 있었으면 사람은 왜 죽겠는가. 엄마는 내가 삶을 완전히 포기한 것처럼 하는 모든 행동에 화를 냈다. 이를 닦지 않는 것, 샤워를 하지 않는 것, 나 자신을 돌보지 않는 것. 그럴 때마다 나도 역정을 냈다. 엄마한테 화가 나서가 아니었다. 엄마가 계속해서 희망을 품는 것이 가슴 아파서 볼 수가 없었기 때문이다. 그런데 어느 날 방사선과에서 다섯 살 정도 돼 보이는 여자아이와 마주쳤다. 머리에 붕대가 감겨 있으니 아마도 뇌종양일 것이다. 곧이어 아이 엄마로 보이는 여자가 진료실에서 나와 내 옆에 앉았다. 아이는 자신에게 벌어지고 있는 일이 무엇인지 알지 못했고 그렇기에 해맑게 엄마와 장난을 치려고 들었다. 아이 엄마는 딱 내 또래였다. 그녀의 상태는 암 환자인 나보다 심각했다. 얼굴엔 핏기가 전혀 없었고 눈빛은 허공을 응시하고 있었다. 그녀는 확실히 나보다 더 깊은 지옥에 있었다. 난 단번에 느낄 수 있었다. 자식이 아픈 것과 자신이 아픈 것은 감히 비교할 수 없는 고통이라는 사실을, 그녀의 모든 것이 말해주고 있었다. 만난 지 1분도 안 된 이 사람을 안아주고 싶었다. 무엇이든 할 수만 있다면, 이들의 앞날에 아무런 걱정이 없도록 해주고 싶었다. 이 모녀도 나차럼 최소한 37년만이라도 같이 추억을 쌓을 기회가 있었으면 좋겠다. 남의 엄마는 그토록 안쓰러워 보이면서 내 엄마는 왜 안 보였는지 모르겠다. 그녀가 떠나간 자리에 앉아보았다. 그곳에 앉으면 엄마의 마음을 이해할 수 있을까. 그곳에 앉으면 저들의 고통을 조금이라도 헤아릴 수 있을까. 내가 할 수 있는 일은 그 의자를 내 체온으로 데우는 것뿐이었다. ​", "설명하고 있던 존을 멈췄다. \"죄송하지만 전혀 궁금하지 않아요. 제가 살 수 있는지 궁금하고 아니라면 시간이 얼마나 남았는지 그것만 궁금합니다.\" 존은 나를 한참 바라보더니 마스크를 턱 밑으로 내렸다. 힘든 이야기를 꺼낼 때마다 마스크 뒤에 숨지 않고 얼굴을 드러내주는 이 작은 배려가 좋다. \"왜 그런 질문을 하는지 충분히 이해는 합니다. 30년간 진료했던 수많은 환자들이 이런 상황에 놓이면 늘 책의 마지막 챕터로 바로 훅 넘어가려고 했죠. 책의 마지막 장에 어떤 결말이 기다리고 있을지만 알고 싶어 합니다. 하지만 그 마지막 챕터로 가기까지 정말 다양한 이야기들과 서사들이 있어요. 결말에 대한 통계를 알려드릴 수는 있지만 결말만이 의미 있는 것은 아니에요. 그럼에도 불구하고 알고 싶다면 알려드리죠. 알고 싶으세요?\" ​", "처음에는 어떤 종류의 위로든 기쁜 마음으로 받아들였다. 하지만 암이라는 병에 대해서 자세히 알게 될수록, 치료가 길어질수록, 병과 나의 관계가 깊어질수록, 어떤 위로의 말들은 나를 힘들게 했고, 어떤 위로의 말들은 나를 외롭게 했고, 어떤 위로의 말들은 나를 귀찮게 했다. 힘들고 외롭고 귀찮게 하려고 이런 말들을 하는 사람은 단 한 사람도 없었다. 모두 위로의 마음만큼은 진심이었다. 하지만 암이라는 병의 고유한 특성 때문에 위로하는 사람 입장에서는 어려운 점이 너무 많다. 원인도 없고, 치료 효과에 대한 보장도 없고, 스스로 통제할 수 있는 변수도 없는, 그야말로 속수무책으로 당하고만 있어야 하는 불운의 구덩이 속에 있는 사람에게 위로는커녕 인사를 건네는 것조차 얼마나 무섭고 어렵고 어색한 일인지 잘 안다. 게다가 내 나이대에 흔히 일어나는 일이 아니기 때문에 나도, 내 주변 사람들도, 우리 모두 초짜였다. 그렇기에 우리 모두 함께 시행착오를 겪으며 위로의 방법을 배워갔다. ​", "강해야만 겨우 극복할 수 있을 것 같은 최악의 상황에서 아이러니하게도 가장 위로가 되었던 말은 강하지 않아도 된다는 말들이었다. 열다섯 살에 유방암으로 엄마를 잃은 친구 J가 그런 위로를 해주었다. 슬픔, 상실, 공포, 허무, 분노 등 다양한 스펙트럼의 감정을 느끼게 될 텐데 이 모든 감정들을 온전히 느끼는 것이 당연하고 괜찮다고. 지금 하고 있는 것은 싸움이 아니라고. 무언가와 싸워서 이기려고 기를 쓰지 말고 묵묵하게 버티라고, 그리고 자기가 바로 옆에서 같이 버텨주겠다고. 상실을 겪어본 사람들만이 소통할 수 있는 비밀스러운 언어가 존재한다. J는 그 언어로 나에게 말을 걸어왔다. 그리고 그녀의 위로 덕분에 나는 철갑을 벗어던지고 가장 연약한 내 안의 알맹이를 드러냈다. 나는 강하지 않다, 그래도 괜찮다. 싸움이 목표가 아니라 완주가 목표이기 때문에 강하게 힘을 줄 필요가 없어졌다. ​", "그러던 어느 날, 집에 갑작스럽게 피자 배달이 왔다. 시킨 적이 없다고 배달원에게 이야기했지만, 그는 이 주소가 맞다고 M이라는 사람이 주문했다고 했다. M은 직장 동료였다. 우리는 사실 친한 사이는 아니었지만, 함께 프로젝트를 한 적이 있었다. 독일 사람답게 커뮤니케이션이 명확해서 업무적으로 매우 좋아하고 신뢰했지만, 개인적으로 친해질 기회는 없었다. 그렇기 때문에 내 투병 사실에 대해서 직접 얘기한 적도 없다. 피자와 함께 전달된 메모에는 이렇게 쓰여 있었다. \"아프다고 들었습니다. 뭐가 필요한지 모르겠지만 끼니 챙기기 힘들 것 같아서 피자를 보냅니다. 피자를 싫어하면 부담 없이 그냥 버리세요.\" 이 사람을 좋아했던 이유가 생각났다. 무엇이 필요한지 모르는 나에게 대부분의 사람들은 무엇이 필요한지 물어보는 단계에서 끝났지만, 이 사람은 조금 투박하고 서툴더라도 행동이 먼저였다. 잘 생각해놓은 그럴싸한 말보다 서툰 행동을 좋아한다. 그리고 그런 행동이 나에게 좋은 위로가 되었다. 항암 후 처음 먹는 피자는 까무러치게 맛있었다. ​", "암 환우들, 특히 젊은 환우들이 힘들어하는 것이 바로 정체성이다. 어떠한 삶을 살아왔건 투병을 시작하는 순간부터 병이 자신의 정체성이 된 것처럼 느껴진다. 주위 사람에게 우리는 비운의 아이콘이다. 우리에 관한 이야기는 대게 '건강 관리 잘하자' 같은 덤담으로 마무리된다. '아픈 사람'이라는 정체성이 나를 거의 집어삼켰을 때, 내가 어떤 사람이었고 어떤 삶을 살아왔는지 기억을 일깨워준 것은 주위 사람들이었다. 정체성을 되찾은 것은 온전히 내 몫이었지만 그 불씨를 지펴준 것은 옆에 있는 사람들이었다. 외로운 저항을 하고 있는 사람이 주위에 없는지 잘 둘러봐야 하는 이유다. ​", "질병을 싸워서 무찔러야 하는 대상으로 바라보는 사회적인 코드에도 문제가 있다. 의지와 긍정의 힘으로 암과 싸워서 이겼다고 주장하는 사람들은 현대 의학을 너무 우습게 보는 경향이 있다. 사람의 수만큼 다양한 암이 존재하기 때문에 그저 당신이 가지고 있는 암이 현존하는 항암제에 반응하는 유전적인 특성이 있었을 뿐이다. 병응 극복하지 못한 수많은 사람들이 의지와 투기와 긍정의 힘이 부족했던 것이 아니다. 질병을 없애야 하는 존재로만 본다면 나같이 만성으로 병을 안고 살아가는 사람들이나 장애를 안고 살아가는 사람들은 설 자리가 전혀 없다. ​", "직장생활 인간관계라고 늘 선을 긋고 피곤해만 할 필요는 없다. 서로의 상황을 이해하고 공감하는 것, 성실하고 일관적인 태도로 상대방에게 예측 가능성과 신뢰를 주는 것, 작은 친절과 배려를 베푸는 것, 이 모든 게 직장생활의 스킬이자 인생 스킬이다. 과하게 친할 필요는 없더라도 이유 없이 상처를 줄 필요는 없다. 최소한의 정서적인 연대를 바탕으로 서로으 성장에 관심을 가져주는 것이 성과를 잘 내는 팀의 기본이다. 그렇게 되기까지 우리는 뜨겁게 싸워야 하고, 결국에는 시원하게 화해를 해야 하고, 그 모든 과정에서 속닥속닥 이야기를 나누어야 한다. 정반합의 과정을 계속 겪으며 더 나은 우리가 될 수 있어야 한다. 그러고 보면 단체 생활은 일종의 종합예술이다. 그리고 그 종합예술을 조금씩 터득해가는 과정은 끝이 없고, 무엇보다 재미있다. 사람 간의 일은 언제나 예측 불가능하지만, 그 사람들이 한마음이 되어 무언가를 딱 해냈을 때의 쾌감은 그 무엇과도 비교할 수가 없다. ​", "'결과만 보겠다'는 리더들의 말을 들으면 솔직히 좀 우습다. 일단 결과만 보겠다는 말을 하는 사람치고 결과가 좋은 사람을 본 적이 없다. 그리고 결과만 보는 것 만큼 쉬운 일이 없다. 숫자로 정렬만 하면 되니까. 아무나 앉혀놓아도 할 수 있는 일이다. 결과보다는 과정이다. 과정이 잘 설계되어 있으면 좋은 결과가 나올 수밖에 없다. 조직장으로서 내가 하는 고민은, 우리가 얼마나 함께 밀도 있는 시간을 보내고 있는가이다. 이 부분이 만족스럽다면 결과는 자신 있다."]}, {"title": "그렇게 쓰면 아무도 안 읽습니다", "author": "전주경", "genre": "디자인", "publisher": "윌북", "passages": ["브랜드의 말과 목소리는 어떤 부분에 해당할까. 이를 단지 카피라고 생각할 수도 있겠지만 광의적 측면에서 그것은 그 브랜드가 제공하는 모든 서비스에 적용된 '언어'에서 비롯된다. 당신의 브랜드가 고객과 직접 만나는 제품이 아닌 온라인 혹은 앱 서비스라면 그것이 바로 'UX라이팅'에 해당하는 부분이다. 이는 브랜딩을 설계할 때 중요한 부분이며, 한편으로는 대부분의 브랜드 담당자가 놓치거나 어려워하는 부분이기도 하다.", "나는 사용자에게 믿음을 주면서도, 서비스와 사용자 사이에 편안한 대화가 끈김없이 이어지게 하는 것이 곧 그 서비스의 성공이라고 믿는다. 그래서 사용자가 편안하게 읽을 수 있는 의미 있는 UI 텍스트 작성의 핵심 원칙과 기술을 이 책에 모아 담았다.", "'Micor-'가 가진 미시적이고 단발적인 인상은 그 자체로서 UI 텍스트의 간결성을 표현하기도 하지만, 한편으로는 서비스의 시작에서 끝까지 쉼 없이 이어지는 긴 담화나 사용자와의 적극적인 대화로써의 UI 텍스트의 특성을 충분히 표현하지 못한다. 최근 들어 UX와 UX 라이팅에 대한 논의가 '재치 있는 단어로 이목 끌기' 또는 '현란한 언어로 사용자를 움직이기' 쪽으로 초점이 맞춰지는 것 같아 시니어 UX 라이터로서 약간은 걱정이 된다. 좁은 화면 위에서 짧은 순간에 강렬한 인상을 주어 사용자를 움직이는 것은 UX 라이티이하는 일의 아주 일부일 뿐이다. 실제로 UI 텍스트는 사용 경험의 경로를 진득하게 따라붙으면서 정보를 제공하는데, 그와 동시에 사용자를 격려하고, 안심시키고, 때로는 제한하기도 하며 사용자에게 뭔가를 제안하고 통보하기도 한다. 사용자의 손을 잡고 UI 플로우의 큰 물결로 그를 인도하는 셰르파 역할을 수행하는 것이다. 사용자에게 편안함, 행복, 안정감, 도전 의식, 긴장감, 안심 등 다양한 감정을 느끼게 하는 것도 모두 UI 텍스트가 하는 일이다. 때문에 각 UI 텍스트의 길이는 마이크로할지언정 그 텍스트들이 수행하는 역할과 많은 텍스트들이 연이어져 만들어내는 의미 체계는 결코 마이크로하지 않다.", "작성자가 준비하는 내용을 독자가 순차적으로 쭉 따라 읽어주리라 예상할 수 있는 다른 텍스트에 비해, UI 텍스트는 사용자의 생각과 의사, 행동에 따라 비선형적으로 등장하는 텍스트, 즉 상대의 반응에 따라 달라질 수 있는 상호작용을 위한 텍스트라는 점에서 차이가 있다.", "개인적으로 앞서 지적한 UI 텍스트 배껴 쓰기 풍토 역시 UI 텍스트에 대한 잘못된 시각에서 기인한다고 생각한다. UI 텍스트는 서비스의 성격과 철학을 그대로 반영하는 거울이다. 다른 메이저 서비스의 UX와 UI 플로우, 화면 구성과 사용자는 우리 서비스와 완전히 같을 수 없다. 설사 기술 개발이나 화면 구성이 유사할지언정 텍스트는, 아니 텍스트만은 같은면 안 되는 것 아닌가?", "사용자의 언어 직관을 존중하는 자세를 견지하되, 모든 제안이나 지적을 그대로 받아들이기보다는 우리가 고민하고 조사해서 쓴 UI 텍스트의 근거가 여전히 유효하고 타당한지를 재확인하고 그에 의거하여 대응하거나 설득하는 것이 바람직하다. 물론 타당한 지적이라면 열린 마음으로 받아들여 텍스트를 수정하거나 가이드라인에 반영해야 한다.", "UX 라이터는 그냥 글을 잘 쓰는 사람이 아니라 어떤 이유에서 이 텍스트가 작성되었는지를 객관적 근거와 언어 지식으로써 잘 설명할 수 있는 사람이어야 한다.", "빠르게 업무를 처리할 때 뛰어난 기억력은 큰 도움이 된다. 앞에서 말했듯이 UI 텍스트는 비선형적인 텍스트이지만, 동시에 서비스에서 플로우와 맥락으로 다른 텍스트들과 강력하게 연결되어 있는 사슬형 담화이기도 하다. UX 라이터는 한 개의 UI 텍스트가 지니고 있는 히스토리와 관계성을 기억하여, 굳이 찾아보지 않아도 그들 간의 일관성을 맞춰주고 기획자에게 과거 텍스트 변경 히스토리를 알려줄 수 있을 정도로 기억력이 좋아야 한다. 완벽한 가이드라인 암기는 기본 중의 기본이다.", "일반적으로 사용자는 화면에 진입한 후 바로 글자부터 읽지 않는다. 사용자는 먼저 화면 전체를 빠르게 훑어보고 전체적인 형태나 레이아웃만으로 화면의 용도와 의미를 직관적으로 이해해 보려고 하는데, 만약 그게 어렵다고 판단되면 그때부터 텍스트를 진지하게 읽어보려고 하는 경우가 많다. 사용자가 텍스트를 읽기로 마음 먹은 그 순간 UI 텍스트는 몇 음절, 몇 어절 또는 한 문장으로 사용자를 빠르게 이해시켜야 한다. 이 때문에 UI 텍스트를 쓰는 사람은 텍스트의 형태를 가장 가독성이 좋은 방향으로 조정하려고 한다.", "일렬로 나열되는 메뉴명의 앞부분에 동일한 어휘가 배치된다면 메뉴 변별성이 매우 떨어지게 된다.", "버튼은 사용자 보이스가 드러나는 영역이기 때문에, 버튼 텍스트의 염원, 기원, 다짐, 미래, 예정의 의미를 담은 명사형 진성어미 '-하기'를 쓰면, 마치 사용자가 스스로 해당 액션을 다짐하는 듯한 인상을 살짝 주게된다. 버튼 레이블을 속으로 되뇌는 사용자가 순간적으로 마치 스스로가 목표를 설정하고 발화한 것 같은 일종의 '셀프 미션'을 선언한 듯한 느낌을 받게 되기 때문이다. 내 생각에 가장 안타까운 버튼 텍스트는 '서비스 탈퇴하기', '멤버쉽 해지하기' 같은 버튼이다. 이런 버튼은 마치 서비스를 꼭 떠나기로, 멤버쉽을 반드시 해지하기로 사용자 스스로가 다짐하는 듯한 인상을 준다. 습관적으로 '-하기'를 붙이는 '하기병'이 만들어낸 안쓰러운 버튼 레이블이라고 하겠다.", "일관성이 맞지 않으면 제품을 신뢰할 수 없게 된다. 일관성은 낮은 텍스트가 계속 노출되면 어느 순간 사용자는 텍스트를 끊임없이 의심하면서 비판적으로 읽게 되기 때문이다. 쉽게 말해 틀린 것이 있나 없나, 어긋나는 것이 또 있나 없나를 무의식적으로 찾게 된다는 것이다. 이렇게 되면 사용자에게 서비스를 이용하는 일은 노력을 들여 신경 써야 하는 일, 일종의 고역이 된다. 사용 경험이 편안하고 매끄러우려면 사용자의 긴장도를 낮춰줘야 하는데, 텍스트 불일치가 끊임없이 발견되면 사용자는 원치 않게 정보와 텍스트 이격에만 집중하게 된다.", "일관성은 브랜드 이미지와도 깊은 관련성을 가진다. 일반적으로 사람들은 예측 가능한 존재, 일관성 있는 존재를 선호한다. 어떤 대상을 접하든 '어, 여기 구멍이 있네? 허술하네? 앞뒤가 안 맞네?' 라는 생각이 드는 순간, 브랜드에 가졌던 긍정적인 이미지에 균열이 가기 시작한다.", "놀랍게도 꽤 규모가 있는 서비스에서조차도 모든 서비스 화면에 어떤 텍스트들이 현재 노출되고 있는지 전체 목록도 갖고 있지 않은 경우가 꽤 많다. IT 회사에서 텍스트 데이터 관리 시스템을 만드는 것이 그렇게 어렵지 않음에도 불구하고 텍스트와 관련된 업무는 보통 개발이나 디자인 이슈보다 우선순위에서 밀리곤 한다. 진심으로 안타까운 일이다.", "구문법 단어가 결합하여 구, 절, 문장의 구조나 기능을 구성하는 규칙 또는 원리를 말한다. 만약 한 화면에서 타이틀에는 명사구나 명사형을, 디스크립션에는 항상 문장형을 썼다면 서비스 속 모든 화면의 타이틀, 디스크립션에서도 동일한 구문법을 적용해야 한다. 한 화면에서 타이틀 위치에 '삭제할 내역이 무엇인가요?'와 같은 문장형을 쓰고 다른 화면에서는 '삭제할 기록 선택'과 같이 명사구를 쓰지 않도록 주의하자. 하나의 텍스트 시스템 안에서는 구문법에 대해서 통일된 접근 방식을 견지해야 한다.", "한국어는 화자, 청자, 객체 사이의 관계에 따라 높임 관계를 달리 표현하는 높임법을 가진 언어이다. 여러 한국어 높임법 중에 가장 발달된 것은 말의 끝 용언의 어미에 '-요, -ㅂ니다'를 붙이는 상대높임법이다. 쉽게 말하면 종결 어미의 높임을 보고 상대가 나를 자신과 동등하거나 낮은 위상으로 여겨 적당히 높이고 있는지, 반대로 아주 어렵게 생각해서 한껏 높여주고 있는지를 판단하는 것이다.", "해요체와 하십시오체는 크게 두 가지 측면에서 차이를 보인다. 첫째, 높임의 정도이다. 해요체는 상대를 적당히 높이는 표현이기 때문에 UI 텍스트에서 해요체를 쓸 경우 사용자를 동등하거나 아주 약간 높은 대상인 것처럼 여기는 인상을 줄 수 있다. 반면 하십시오체를 쓰면 사용자를 서비스 자신보다 확실히 높이고 있다는 느낌을 주게 된다. 위계 관계에 있어서 사용자를 보다 어렵고 높은 대상으로 여기고 대우하고 있다는 인상을 줄 수 있는 것이다. 둘째, 격식성이나 공식성, 전문성의 정도이다. 해요체는 다분히 사적인 표현이라고 할 수 있다. 해요체로 작성된 문장을 읽으면 언뜻 서비스와 사용자가 감정적, 사적인 대화를 할 만한, 즉 사적으로 꽤나 가까운 사이인 듯한 인상을 받을 수 있다. 반면 하십시오체는 더 공식적이고 격식을 차려야 하는 상황에서 쓰는 말투, 즉 보다 이성적이고 진지한 어른의 문체이다. 이 문체를 쓰면 서비스와 사용자 사이에 사회적인 공적 관계가 정립된 듯한 느낌을 줄 수 있으며, 보통 전문 분야의 대화를 나눌 때에는 집중적으로 하십시오체를 쓰기 때문에 서비스의 전문적인 이미지를 강조할 때 유용하다.", "두 문체를 상황에 맞게 적절하게 섞어 써야 한다. 앞서 말했듯 해요체는 두루높임 + 비격식성, 하십시오체는 아주높임 + 격식성을 띠고 있다. 높임의 수준과 격식성이 단단하게 결합되어 있기 때문에 어쩔 수 없이 음료의 농도를 조절하듯 두 문체를 적절하게 섞어서 사용해야 원하는 보이스를 구축할 수 었다. 일반적으로 한국인들은 사회적 관계에서 발화 시에 거의 100퍼센트 해요체와 하십시오체를 섞어서 쓰는데, 이는 두 가지 문체를 섞어서 쓰는 것이 가장 기계적이지 않고, 동일 문체의 중복을 피할 수 있으면서도 자연스러운 그야말로 '가장 한국인다운 말하기'이기 때문이다.", "보통 해요체는 온보딩이나 사용 가이드 등 서비스 초반부에 등장하는 텍스트에서 큰 활약을 하곤 한다. 앞서 말했듯 일반적으로 해요체는 사용자가 덜 집중해도 되는 사적인 상황에서 많이 쓰이므, 서비스 첫 화면에서 해요체를 쓸 경우 사용자에게 아직 그렇게까지 긴장하지 않아도 좋다는 시그널을 줄 수 있다. 이 외에도 사용자에게 뭔가 부탁하거나 요구하는 문장을 써야 할 경우에는 해요체를 쓰는 것을 권장한다. 특히 보조동사와 해요체가 결합한 '-주세요', '-보세요'는 해요체로만 쓰는 명령형 '하세요'보다 덜 권위적이고 부드럽게 청유하는 뉘앙스를 갖고 있기 때문에 대부분의 요청 및 권유 문장에서 융하게 사용할 수 있다.", "공감 표현은 사용자 상황에 대한 깊은 이해, 진정성 있는 관심, 그리고 그것을 충실하게 드러낼 수 있는 언어적 표현 능력까지 모두 갖췄을 때에만 시도할 수 있는, 어떻게 보면 가장 난이도 높은 UX 라이팅 기법이다. 만약 그 모든 걸 커버할 수 있는 기량이나 자신이 없다면 쓰지 않는 것이 여러모로 안전하다. 그럼에도 공감 표현을 시도하고 싶다면 다른 리스크가 거의 없는 행복, 기쁨, 안정, 인정 등의 긍정적 감정과 관련된 메시지부터 작성해 보자. 사용자에게 보편적인 공감, 축하가 필요한 순간이 언제인지를 곰곰이 떠올려 보고, 그에 걸맞은 따뜻한 메시지부터 제공해 보길 권한다.", "레이블에 있어서는 '대표성'이 가장 중요하다는 사실만은 강조하고 싶다. 레이블을 쓸 때에는 해당 명칭이 다루고 있는 대상의 성격을 언어가 오롯이 담아내는지, 잘 포괄하는지를 먼저 체크해야 한다.", "보통 레이블링 시스템을 구축할 때 가장 기본이 되는 자료는 현재 서비스에 있는 모든 텍스트 목록이다. 텍스트 목록을 펼쳐놓고 새로 작성한 레이블과 어깨를 나란히 하는 주변 레이블을 함께 살펴보며, 레이블 각자가 서로 뚜렷하게 구별되는지, 혹시 각 용어와 개념 간에 의미적, 표현적 중복이 있지는 않은지 확인해야 한다. 일반적으로 레이블은 혼자서만 의미를 발현하는 것이 아니라 주변 레이블과의 어울림, 비교 대조를 통해 그 뜻이 비로소 명확해지거나 의미가 한층 강화되는 측면이 있다. 단독 표기되었을 때는 조금 모호하게 느껴질지라도, 해당 레이블을 품고 있는 상위 레이블이 확실한 의미를 뿜어내고 있다면 하위 레이블은 그 의미의 날개 아래서 부담을 덜 수 있는 것이다.", "서비스를 처음 방문한 사용자가 단 몇 개의 레이블을 보고도 서비스의 전체적인 모습을 파악하고, 아직 보지 않은 메뉴의 역할까지 유추하려면 서비스 레이블이 매우 형태를 띠고 있어야 한다. 아주 쉽게 말하면 타이틀은 타이틀끼리, 메뉴명은 메뉴명끼리 서로 형태적, 의미적 유사성을 갖고 작성되어야 한다는 것이다.", "텍스트를 아이콘으로 대체하려고 할 때 기억해야 할 것은 모든 아이콘에는 필연적으로 모호함이 있기 때문에 가급적 아이콘 하단에 이름을 병기해 주어야 한다는 것이다. 아이콘은 상징성을 가진 이미지로서 기표에 기의가 깃들어 있는 형태이기 때문에, 현실적으로 아이콘이 표현하고자 하는 의미를 모든 사람이 정확하게 이해할 수는 없다.", "우리가 언제 팝업을 써야 하는지는 비교적 명확하다. 사용자에게 아주 중요한 정보를 전달해야 하거나, 사용자의 의사 결정을 반드시 받아야 할 때에만 팝업 컴포넌트를 써야 한다. 사실 이것이 팝업 텍스트 라이팅 원칙의 처음이자 끝이다. 이것만 지키면 좋은 팝업을 쓸 수 있음에도 다들 잘 지키지 않는 것 역시 바로 이 원칙이다. 일반적으로 한국 서비스에서 2버튼 팝업을 더 많이 쓰는 경향이 있는데, 많은 기획자들이 사용자에게 선택권을 주고 싶어 하고, 또 뭐든 확실하게 사용자 의사를 확인받고 싶어 하는 듯하다. 나는 굳이 묻지 않아도 될 것까지 묻는 이런 팝업을 '걱정 텍스트' 또는 '걱정 팝업'이라고 부른다. 조금 냉정하게 말하면 걱정 팝업은 선택의 책임을 사용자에게 전가하고 싶은 설계자의 마음이 드러난 것이라고 볼 수 있다.", "우리의 목표는 사용자의 시간과 노력을 최대한 아껴주는 것이다. '버튼을 먼저 읽고, 그래도 정보가 부족하면 타이틀까지 읽고, 의사 결정을 한다' 부지불식간에 이루어지는 3단계 과정이 물 흐르듯 연결될 수 있도록 팝업 타이틀에는 중요한 정보만 배치하자.", "허투루 써도 되는 UI 텍스트는 단 하나도 없다. 만약 정보를 찾는 사용자의 시선이 차례대로 버튼과 타이틀을 스쳤음에도, 그곳에서 그가 원하는 만큼의 정보를 얻지 못했을 때, 그때 비로소 본문의 존재가 빛을 발하게 된다. 팝업은 등장했다가 금방 사라진다. 상황에 따라 재현이 어려울 수도 있어서 두 번 다시 사용자에게 읽히지 못하고 넘어갈 수도 있는 요소이다. 이 같은 팝업에 길고 장황한 이야기를 쓰는 건 적합하지 않다. 팝업 본문에는 사용자의 버튼 선택에 도움이 되는 포석과 같은 구체적인 정보를 담아야 한다.", "사용자가 오른쪽 버튼을 눌렀다는 것은 지금까지의 의사를 철회하지 않고 가던 방향으로 계속 나아가겠다고 결정했다는 의미이다. 그래서 보통 오른쪽 버튼에는 주로 직전에 결정한 행위와 동일하거나 관련된 버튼 레이블을 적고, 진한 컬러로 시각적 무게를 더해준다.", "어떻게 하면 사용자의 명령과 의사를 잘 받들 수 있는지, 즉 어떤 방식으로 버튼 레이블을 작성하면 '서비스를 향한 사용자의 의사 표현'이라는 버튼의 근원적인 역할을 잘 수행하게 할 수 있는지에 대해서 이야기하려고 한다.", "버튼의 동사가 원미래가 아닌 근미래 상황을 지시해야 한다는 규칙도 중요하다. 바꿔 말하면 이 버튼을 누르면 이 행위가 바로 이루어지리라는 확신이 강하게 들도록, 바로 다음 화면을 추축할 수 있는 동사를 버튼 레이블로 써야 한다.", "화면 상단의 넓은 부분이 서비스가 말하는 영역이고, 하단의 버튼 영역이 사용자가 말하는 영역이다. 즉 사용자의 보이스는 그가 조작하는 공간, 버튼 텍스트에서 드러난다고 할 수 있다. 일반적으로 버튼 레이블에는 건조한 서술성 명사(삭제, 저장, 이동)가 사용되기 때문에 서비스를 이용하는 사용자 본인도 버튼을 자신의 목소리가 나타나는 영역이라고 인지하지 못하는 경우가 많다. 사용자 보이스를 부각시키는 대화체 버튼을 사용하면 어떤 효과가 있을까? 우선 사용자 본인이 직접 UI에서 발언하는 인상을 줘서 조금이나마 관여도를 높이게 된다. 본인의 목소리로 서비스와 상호작용하는 듯한 느낌이 들기 때문에, 사용자가 이 상황에 적극적으로 참여하고 있다는 인상을 받을 확률이 높아진다.", "만약 버튼에 해요체를 쓰면 사용자의 의사와 상관없이 둘 사이의 거리가 사적인 관계인 듯 재정의되고, 둘 사이의 권력관계도 평등하거나 오히려 사용자가 약간 아래쪽인 것처럼 인식된다. 보통 해요체로 말할 때는 상대방이 사적인 관계에서 나보다 연장자이거나 친근하지만 적당히 불편하고, 함부로 대할 수 없는 경우가 많기 때문이다. 내가 가장 문제적이라고 생각하는 해요체 버튼의 사용 사례는 사용자의 이익과 관련된 중요한 선택의 순간에 버튼의 톤을 조정해서 뭔가를 얻어보려는 시도이다. 예를 들어 이용권 해지라는 상황에 몰렸을 때 사용자에게 갑자기 해요체를 쓰게 만드는 케이스에 대해, 조금은 심각하게 바라볼 필요가 있다고 생각한다. 서비스 이용 내내 사용자와 서비스 존재의 위상은 평등했거나 사용자가 약간 높았는데, 갑자기 서비스 해지의 순간에 사용자가 서비스에게 존댓말을 하도록 해서 둘 간의 권력 위계가 조정되고 있다.", "그동안 우리는 UX 라이팅을 통해 서비스가 사용자 결정에 영향을 미칠 수 있고, 또 그래야 한다고 생각해 왔다. 버튼 레이블을 어떻게 쓰면 오픈율이 올라간다, 어떤 말로 관심을 끌면 클릭률이 높아진다 하는 것들에 열중하며, 마치 UX 라이팅의 효용이 언어로써 사용자를 조종할 수 있느냐 없느냐에 달려 있는 것처럼 이야기하기도 했다. '버튼에 급박한 부사 - 지금, 바로 - 를 써서 사용자를 재촉하라', '버튼에는 먼 훗날에 받게 될 잠재적인 이익을 당장 얻을 수 있는 것처럼 쓰라'와 같은 CTA 작성 기술을 당당하게 UX 라이팅 꿀팁으로 공유하기도 했었다. 그런데 그런 것들을 정말 좋은 UX 라이팅이라고 할 수 있을까? UX 라이터로서 나는 그것에 대해 지표를 추구하는 글쓰기 기법이라고 할 수 있을지언정, 진심으로 사용자를 돕는 좋은 UX 라이팅이라고는 말할 수 없다. 사용자의 의사를 내 마음대로 쥐고 흔드는 것이 우리가 하는 이 일의 목표가 아니기 때문이다. 사용자 목소리를 흉내내서 버튼 텍스트를 쓸 때, 내가 사용자를 어떻게 생각하고 있는지가 또렷하게 드러난다. 사용자를 소중한 고객으로서 존중하고 있는지, 아니면 그저 말로 잘 구슬려서 뭔가를 뽑아먹을 대상으로 바라보고 있는지는, 버튼 텍스트를 평소와 다르게 써보려고 할 때 작성자 스스로가 가장 먼저 깨닫게 되기 때문이다. 좋은 UX 라이팅은 건강한 방식으로 사용자를 도우면서 서비스 스스로의 매력을 드러내는 일이다. 버튼 레이블을 쓰기 전 한 번쯤은 사용자의 좋은 결정을 돕기 위한 글쓰기란 무엇인지, 그것은 어떤 형식으로 표현되어야 하는지에 대해 고민해 보았으면 한다.", "사용자는 늘 본인이 수행한 액션에 대한 결과를 알고 싶어 하므로 우리는 정직하게 상황을 보고하고, 문제를 인정하고, 그 문제를 해결할 수 있는 방안을 제시해야 한다. 그래야 사용자와 서비스의 동반 여정이 계속해서 이어질 수 있다.", "이제 사용자는 휴대폰과 앱과 웹 서비스 화면에서 텍스트를 스캐닝, 스킵하여 필요한 정보만 빠르게 습득하려고 한다. 이처럼 변화한 현시대의 사용자 정보 추구 행태를 정면으로 마주하며 UX 라이터는 공공 글쓰기의 주역으로서 UI 텍스트를 읽는 사용자에 대해 무거운 책임감을 느낀다. 내가 작성한 서비스 텍스트 하나가 우리 사용자의 언어 습관에 중대한 영향을 미칠 수 있다는 것을 잘 알기 때문이다.", "결국 서비스 텍스트를 쓰는 사람들은 쉽지만 빈약한 언어와 어렵지만 풍부한 언어 사이에서 아슬아슬하게 균형을 잡아가는 수밖에 없다. 중요한 것은 우리가 사용자를 어떻게 잘 이해시킬 것인가를 고민하는 동시에, 사용자와 서비스가 함께 의미 있는 성장을 할 수 있는 방법이 무엇인지를 끊임없이 찾아내는 것이다.", "'편하게 앱으로 보기' '불편하지만 웹으로 볼게요' 웹페이지에 접속한 사용자에게 앱 설치를 유도하기 위해 자주 사용되는 버튼 텍스트이다. 사실 '웹으로 보기'가 편한지 안 편한지는 사용자만이 아는 것이다. 사용자는 웹이 편하니까 지금 웹으로 보고 있는 것 아니겠는가? 고객이 웹을 선택한 이유가 분명 있을 텐데도 서비스가 멋대로 앱은 편하고, 웹은 불편하다고 먼저 규정한 다음, '당신은 불편한 일을 즐겨 하는 이상한 사람이 되고 싶은가? 그냥 앱을 깔지?'라고 버튼으로써 말하는 이 컨펀 셰이밍이야말로, 가장 사용자의 마음을 불편하게 한다."]}, {"title": "끌어안는 소설", "author": "정지아, 손보미, 황정은, 김유담, 윤성희, 김강, 김애란", "genre": "소설", "publisher": "창비교육", "passages": ["순간 D시에 있는 집 현관문을 잠그지 않은 게 생각났다. 도둑이 들어 봤자 별로 훔쳐 갈 것도 없었다. 물건들은 몇 달쯤 나를 기다리다가 결국 지쳐 스스로 색이 바랠 것이다.", "나는 찜질방에서 지냈다. 한 달치 목욕비를 한꺼번에 끊으면 20퍼센트를 할인해 주었다. 매일매일 목욕을 했더니 잠이 잘 왔다. 개인 사물함에 들어가지 못하는 물건들을 보면 아예 욕심이 생기질 않았다. 최신식 가전제품을 보아도 마음이 흔들리지 않았고, 예쁜 옷을 보아도 사고 싶다는 생각이 들지 않았다. 목욕을 하고 나오다가 바닥을 닦고 있는 여자의 발을 밟았다. 어! 미안해요. 여자는 괜찮다는 듯 목례를 하고는 다시 바닥을 닦기 시작했다. 다음 날 나는 수건을 개고 있는 여자의 다리를 깔고 앉았다. 미안해요. 못 봤어요. 나는 다시 한번 사과를 했다. 그다음 날 나는 목욕탕 문을 열고 나오는 여자와 정면으로 부딪쳤다. 여자의 이름은 W였다. W는 내게 몸에 난 수많은 멍을 보여 주었다. 하루에 수십 번은 사람들과 부딪쳐요. 가만히 서 있는 내 발을 밟고 나서 사람들은 이렇게 말하죠. 미안합니다. 못 봤어요. 정말 사람들 눈에는 제가 잘 안보이나 봐요. W의 말처럼 나도 W와 부딪치기 전까지는 그녀의 존재를 느끼지 못했다. 어, 이 사람이 언제 여기에 있었지? W와 부딪치고 난 뒤에야 그런 생각이 들었다.", "보물을 찾으러 갔다 온 사이, 주방장이 도망을 갔다. 주방에 있던 그릇들과, 냉장고에 가득 들어 있던 음식 재료들과, 배달용 오토바이를 가지고 사라졌다. Q는 주방 바닥에 주저앉아 어린아이처럼 울었다. 그만 울고 싶을 때까지 울어요! 나는 Q의 등을 두드리며 말했다. W가 밖으로 나가더니 어딘가로 전화를 걸었다. 잠시 후에 냉면 네 그릇이 배달되었다. 이럴 땐 매운 음식을 먹는 게 최고예요. W가 가방에서 매운 소스를 꺼냈다. 맞아요. 슬퍼서 울었다고 말하는 것보다는 매워서 울었다고 말하는 게 덜 쪽팔리잖아요. 고등학생이 냉면을 비비면서 말했다."]}, {"title": "끝내주는 인생", "author": "이슬아", "genre": "에세이", "publisher": "디플롯", "passages": ["\"나는요. 작가님을 책으로 만났어요. 그러다가 하도 궁금해서 여기 찾아온 거예요. 오는 길에는 버스를 두 번 갈아탔어요. 내려서 걷는데 세상에 꽃들이 활짝 피어 있어요. 그러면 나는 멈출 수밖에 없지요. 멈춰가지고 꽃에 얼굴을 묻어요. 냄새를 들이마시려고요.\" 꽃이 핀 줄도 몰랐던 내가 할머니를 바라본다. 할머니는 사람들 시선에 아랑곳 않고 이야기를 이어간다. \"그렇게 와가지고 여기 앉아서 작가님 얘기를 흠뻑 들었어요. 꽃구경만치 재밌어가지고요. 나는 정말로 물어보고 싶은 게 있어요. 작가님이 결혼을 할까? 아이를 낳을까? 엄마가 될까? 그런 게 너무 궁금해요, 나는.\" 사람들이 웃고 나도 웃는다. 그런 질문을 삼가는 시대이기 때문이다. 나는 할머니한테 장난스레 여쭤본다. \"제가 어떻게 하면 좋으시겠어요?\" 할머니는 설레는 목소리로 대답한다. \"작가님이 꼭 결혼하면 좋겠어요. 애도 낳고요. 그럼 또 얼마나 삶이 달라지겠어요? 그럼 또 얼마나 이야기가 생겨나겠어요? 나는요. 계속 달라지는 작가님의 이야기를 오래오래 듣고 싶어요.\" 사람들은 여전히 웃고 있지만 나는 눈시울이 벌게져버린다. 절벽 같은 세상에서 결혼을 하고 엄마가 된다는 게 얼마나 덜컹이는 일인지를 곱씹으면서도, 누가 내 얘기를 그렇게 오래오래 듣고 싶어 한다는 게 너무 고마워서. 다음 이야기가 무엇인지 할머니도 나도 모른다. 어디선가 바람이 불어오고 할머니의 백발과 나의 흑발이 동시에 살랑인다. 건물 부서지는 소리도 들린다. 나는 무대에 서서 수십 갈래로 뻗어나가는 내 인생을 본다. 그중 살아 볼 수 있는 건 하나의 생뿐이다.", "2021년, 삼십대의 내가 영월로 휴가를 온다. 이번에는 차를 몰고 혼자 온다. 유일하기 때문에 저절로 최고가 되는 것들이 영월에는 있다. 하나뿐인 문학서점. 하나뿐인 서점 주인. 숙소 근처에 하나뿐인 편의점. 읍내로 가는 하나뿐인 길. 읍내의 하나뿐인 영화관. 하나뿐인 터미널 그곳들을 드나들 땐 비교를 멈추게 된다. 날마다 영월 최고의 무언가를 발견하고 이렇다 할 고민 없이 잠든다.", "진정한 일꾼들은 늘 소리 없이 많은 일을 끝내놓는다. 엄살도 생색도 없이 다음 일을 향해 간다.", "유년기를 돌아보다가 어떤 일이 좋은 일이었는지 안 좋은 일이었는지 알 수 없게 될 때가 있다. 그것은 당연한 것일지도 모른다. 기쁨과 슬픔은 사실 하나니까. 행복과 불행은 언제나 맞닿아 있으니까. 좋은 이야기는 두 가지를 동 떨어진 것처럼 다루지 않는다. <남매의 여름밤> 도 그런 영화다.", "동주는 망각과 회복의 달인이다. 이혼 후 떨어져 사는 엄마가 만나자고 하면 별 고민 없이 흔쾌히 수락한다. 왜냐하면 보고 싶으니까. 만나면 반가우니까. 옥주는 그런 동주가 맘에 들지 않는다. \"넌 자존심도 없냐? 보러 오란다고 보러 가고 싶어?\" 옥주의 질문에 동주는 망설임 없이 대답한다. \"응.\" 동주로서는 당연한 일이지만 옥주는 속이 터진다. 이랬다저랬다 하는 엄마의 마음에 휘둘리고 싶지 않아서다. 더 이상 상처받고 싶지 않은 옥주가 말했다. \"저번에도 보자고 했다가 못 봤잖아!\" 동주는 대답한다. \"그땐 그때고\" 이것이 동주의 마음자리다. 지나간 일은 지나간 일로 흘려보내는 것. 상처받을 수도 있지만 보고 싶으면 일단 만나러 가는 것. 옥주는 그게 잘 되지 않는다. 내 마음은 동주와 함께 홀가분해졌다가 옥주와 함께 축축해지고 서글퍼진다. 어느 날 옥주는 모질게 굴고 나서 이렇게 사과한다. \"저번에 누나가 때려서 미안해.\" 망각의 달인이자 유머의 달인인 동주가 가볍게 응수한다. \"괜찮아. 간디도 옛날엔 조폭이었대.\" 나는 옥주 같은 마음으로 태어나 동주 같은 얼굴을 동경하며 살아가는 듯하다. 그래서인지 꼭 죄다 겪어본 것처럼, 내 유년을 보듯 그리운 마음으로 <남애의 여름밤>을 본다.", "\"무대에서 자기 자신처럼 굴어도 된다고 믿을 수 있기까지 얼마나 어려웠을까?\" 번역하는 여자의 질문이다. 나에게나 남에게나 사랑스럽게 받아들여질 만한 나다움, 도대체 가능하기나 한 건지 모르겠는 그 자기다움을 지니는 것이 얼마나 도달하기 힘든 경지인지 다들 안다. 무대가 주는 압력은 굉장하니까. 그 압력에 진땀을 흘리면서도 나 아닌 것은 하지 않겠다는 자세로 버티는 사람을 보면 왠지 마음이 좋아진다.", "현과의 만남 당일, 이슬아는 헌사람의 버릇을 버리지 못하고 지각을 하며 사과 문자를 보냈다. \"조금 늦을 것 같습니다. 뛰어가고 있습니다.\" 현은 자주 다시 태어나본 사람답게 느긋한 답장을 했다. \"저는 기다리는 걸 좋아합니다. 걸어오십시오.\"", "서로의 눈을 피하지 않는 여자들이었다. 현이 흰 봉투 하나를 이슬아 쪽으로 내밀었다. 돈 봉투라고 하기엔 작고 카드 봉투라고 하기엔 컸다. \"이게 뭐죠?\" 이슬아가 묻자 현이 차분하게 대답했다. \"열어보시면 뭔가가 시작됩니다.\" 이슬아는 영문을 모른 채 봉투를 뜯었고 그 안엔 한장의 종이가 들어 있었다. 종이에 적힌 문장은 다음과 같았다. 생일잔치 식순 **인사 및 소개케이크 먹기 (노래는 속으로만)선물 전달태어난 소감 발표인사 및 마무리** - 인사 및 소개 - 케이크 먹기 (노래는 속으로만) - 선물 전달 - 태어난 소감 발표 - 인사 및 마무리 \"이슬아는 몹시 바쁜 사람이라고 들었습니다. 귀하게 내준 시간을 알차게 쓰기 위해 순서를 정해보았습니다.\" 그 말을 하는 현은 남색 재킷을 입고 있었고 마치 중요한 학회를 진행하는 사람처럼 보였다. 행사에 일가견이 있는 이슬아는 현이 무얼 하려는지 곧바로 이해한 뒤 식순을 충실히 따랐다.", "우선 기자님께서 기억하시는 만큼 저의 대답을 작성하시지요. 그렇게 인터뷰의 초고를 만들어주시면 부족한 부분을 제가 추후에 상세히 보완하도록 하겠습니다 그런데 어찌 보면 그 초고가 인터뷰의 진정한 결과라는 생각도 듭니다. 기자님께서 진짜로 기억하시는 부분만 남을 테니까요. 아무쪼록 최대한 많이 기억나시기를 바랍니다. 진심으로 응원합니다!", "모두가 조금씩 집요하고 우스꽝스러운 구석을 지녔다는 사실에 나는 안도한다. 책 만드는 자들은 어떤 결벽과 강박을 공유할 수밖에 없다. 교정교열과 윤문과 조판과 편집이 그런 작업이다. 텍스트의 오류를 제거하는 일 역시 극도로 치밀한 집착을 필요로 한다. 애초에 직육면체 모양의 물성에 매달리고 그 안에서 최고를 추구한다는 점부터 예사롭지 않다.", "친구들 사이에서 나는 맨날 감사하는 애로 알려져 있다. 거의 모든 대화를 '그래도 감사하다'는 말로 마무리해서다. 감사해야 마땅할 여러 행운은 물론이고 이런저런 불운 속에서도 참깨를 키질하듯 감사할 구석을 찾아내고야 마는 나에게 친구들은 조금 질려 있다. 지칠 줄 모르는 나의 감사 메들리에서 가장 자주 등장하는 대상은 지면이다. 지면이 주어진다는 건 전혀 당연하지 않으니까.", "마찬가지로 작가인 절친은 하루가 멀다 하고 내게 전화를 건다. 그는 데뷔 일 년 차 신인이다. \"주간지에 보낼 원고를 마감하는데 아무래도 쓰레기를 쓰고 있는 것 같아.\" 나는 이야기를 쭉 듣고선 대답한다. 쓰레기를 쓰레기라고 알아볼 수 있을 만큼 자기 객관화된 안목에 감사하자. 그걸 알아봤으니 다음에는 더 좋은 원고를 쓸 수 있고 얼마나 좋으냐. 출퇴근하지 않고 집에서 일할 수 있음에 감사하자. 글값으로 십오만 원을 벌 수 있음에 감사하자. 부족한 우리에게 청탁서를 보낸 주간지에게 감사하자. 그리고 마지막으로 지면이 주어진 것에 감사하자고 말할 때쯤 친구는 진절머리를 내며 전화를 끊는다.", "내게는 한 가지 습관이 있다. 마감이 다가오면 우선 빈 문서를 켠다. 그야말로 텅 빈 문서다. 맨 윗줄에 날짜를 쓴다. 그리고 맨 아랫줄에 '-끝-' 이라고 쓴다. 원래는 마지막에 써야 하는 말이지만 그냥 처음부터 써놓는다. 그렇게 하고 나면 조만간 이 글을 끝낼 수 있을 거라는 믿음이 생긴다. 나는 '-끝-' 위에 쓰기 시작한다.", "\"직업이든 공부든 생계든 해야만 하는 일은 있잖아요. 회피할 수 없는 일, 회피하면 모든 게 무너지는 그런 일이 누구한테나 있어요. 일루수한테 공은 그런 거죠. 그런데 그 일이 자신감이 없는 거예요. 감당할 수가 없는 거예요.\" 잘 써야만 하는데 자신이 없는 원고를 마주할 때면 서툰 수영 실력으로 파도에 담기는 것 같은 느낌이 든다고, 선생님은 말씀하셨다. 나는 놀랐다. 이 사람도 무서워한다는 것에. 잘해야만 하는 소중한 일들 앞에서 두려움을 느낀다는 것에. 선생님에게도 글쓰기가 그런 공이라는 사실이 무지막지한 위안이 되었다. 그는 이렇게 이야기를 이어갔다. \"제안을 하나 드립니다. 약간 느슨한 협회를 만드는 거예요. 삶이 감당이 안 되는 사람들의 모임. 그런 모임을 만들어서 각자 상황을 얘기해보면 어떨까 세상의 모든 일루수한테 마음을 조금 보내주는 거죠. 마음을 조금 보내는 게, 그렇게 어렵지 않아요. 모르는 사람이어도 그 사람이 처한 상황을 서로 생각하는 거죠.\""]}, {"title": "나 자신으로 살아가기", "author": "임경선", "genre": "에세이", "publisher": "마음산책", "passages": ["인생을 사는 일엔 객관적인 정답이 존재하지 않기에 더욱 어렵게 느껴진다. 남들과 똑같이, 남을 따라 하며 살수가 없기 때문에 상황은 더 복잡해진다. 그래서 우리에게 남겨진 최선의, 혹은 유일한 방법은 '나 자신으로 살아가기' 이다. 대체 그게 뭔데? 왜 '나답게' 살아야 하는 건데, 라고 당신은 물을지도 모른다. 왜 그래야 하느냐면, 누가 뭐래도 나는 남과 다를 수밖에 없기 때문이다. 한 사람 한 사람 개별적인 존재로 태어난 우리는 그래서 가급적 내가 나 자신과 불화하지 않고 살 수 있도록 스스로의 삶을 각별하게 보살피고 조율해야만 한다.", "선입견이나 고정관념에 얽매이지 않고 불평하거나 투덜대거나 까탈스럽게 굴지 않고 무의미한 말을 시끄럽게 하지 않고 떼 지어 몰려다니지 않고 나대지 않으면서도 내가 잘하고 좋아하는 일을 가능한 한 계속하는 것. 현재로서는 이것이 내가 나이 듦에서 바라는 모든 것이다.", "복잡한 상황에서도 자기 힘으로 끝까지 해결책을 생각해내며, 핵심을 파악하는 사람들이다. 혜안을 가진 사람들은 시선도 표정도 맑고 깨끗하다. 나이 들수록 탁한 느낌을 주는 사람이 되고 싶지 않다.", "오하시 아유미는 지속적으로 커리어에 조금씩 변화를 줬다. 이삼십대에는 일러스트레이터로 활발히 활동하다가 사십대가 되어서는 10여 권의 에세이를 내는 작가로도 일을 했다. 그 후에는 1인 잡지 아르네를 10년간에 걸쳐 37권 만들고, 그와 병행해서 어른들이 입기 좋은 캐주얼웨어 브랜드 '이오 플러스'를 론칭해서 온오프라인 숍을 열었다. 어른들이 입을 만한 편하면서도 세련된 옷이 없어서 자신이 직접 만들기도 했단다.", "우리는 나이가 들어서도 자기가 가치를 보탤 수 있는 영역에서 활발하게 일하고 있는 사람을 더 많이 볼 수 있어야만 한다.", "나는 인간의 복잡성과 모순성이 지극히 인간답고 아름답다고 생각하기에 사람들의 그런 마음을 세심하고 깊게 이해하고 싶고, 그에 대한 이야기를 하고 싶을 뿐이다. 세상과 인간을 납작하게 보지 말 것. 겉으로 보이는 것이 다가 아니라 그 밑에 여러 겹의 다른 모습들이 존재한다는 것을 잊지 말 것. 나 역시도 감정을 생생하게 느끼면서 살아가고 싶다. 어쩌면 그러려고 글을 쓰는 것일지도.", "인간은 다 다르고 서로 내 맘 같지가 않다. 그래서 우리는 대화를 하는 것이고, 가능한 한 그 대화를 정교하게 하려고 애쓰는 것이다. 가장 난감한 것은 갈등을 겪게 되면 '저 사람은 나랑 안 맞아. 내가 무슨 말을 해도 이해하지 못할 거야'라고 쉽게 예단한 후, 해결되지 않은 감정은 온라인으로 풀어 나와 아무런 관계를 맺어본 적도 없는 사람들의 공감을 얻고 적당한 만족감을 느끼며 끝내는 것이다. 나는 이런 처리법이 좋아 보이지 않는다. 그럴 만한 의미가 있는 갈등이라면 가급적 정면으로 대처할 수 있는 의지와 끈기가 있었으면 한다. 그 결과, 오해를 풀거나 완전히 갈라설 수도 있다고 해도. 그 과정에서 눈물과 상처를 입히는 말들이 오갈 수 있다고 해도. 혹은 지금은 타이밍이 좋지 않다 싶으면 잠시 시간을 두고 '식혔다가' 나중에 이야기할 수 있다. '이 사람하고는 여기까지고 더 이상은 말이 안 통해'라고 생각하기까지 그래도 기회를 충분히 주었으면 좋겠다. 상대와 정면으로 마주하는 것을 회피하려는 것은 내 감정이 제일 소중하고 내 자존감이 제일 소중하기 때문에 내가 다치면 안 되니까 전전긍긍하는 것일 텐데, 사실 그것은 자기를 보호하는 것을 넘어 스스로를 점점 더 약한 사람으로 만드는 것이다. 자신에게 껍찔 같은 것을 씌워놓고서 감정적으로 안전할 것만 추구하면 인생을 얕게 사는 습관이 생기는 것 같다.", "불안이라는 것은 내가 그것을 잘해낼 수 있을까에 대한 자기 의심인데, 그 의심을 최소화하기 위해서는 실질적인 준비를 많이 해야 한다.", "자기 자신을 시험에 들게 하기 위해, 여러 가지 경험을 쌓기 위해, 그리고 다양한 사람들에게 나를 알리기 위해 초기엔 가급적 가리지 않고 여러 장소에 자신을 갖다 놓는 것이 필요한 일이라고 생각했다. 하지만 계속 그래야만 할까? 너무 가기 싫고 나와 맞지 않는 곳에, 가면을 쓰고 연기를 해가면서도 그저 경험을 쌓고 돈을 벌기 위해, 인지도를 올리기 위해 나를 그 어느 곳이든 데려다 놓아야만 하는 것일까?", "들어오는 일을 가급적 해보려고 하지만 가장 본질적인 부분에서 나와 맞지 않으면 단호하게 하지 않고, 조금 더디더라도 내가 보여지고 싶은 방식으로 보여질 수 있고, 내가 이해받고 싶은 방식으로 이해해줄 수 있는 독자를 조금씩 늘려가는 방향. 현재로서는 나를 그렇게 운영해나가려고 한다.", "글을 쓴다는 건 영감이 찾아올 법한 분위기 좋은 카페에 가서 노트북을 펼쳐놓고 그날의 기분이나 소소한 발견을 적는 것이 아닐 것이다. 쓰고 싶은 주제를 둘러싼 자료들을 찾아 읽고 공부를 해서 쓰고자 하는 것에 깊이와 풍부함과 디테일을 더해야 하고 무엇보다도 그 과정에서 내가 쓰고자 하는 내용을 스스로 잘 '소화'를 하고 있어야 한다. 필요한 주제에 대해서 자료 조사를 하다 보면 쓰면서도 계속 새로운 아이디어가 생겨서 내 글을 앞으로 나아가게 만든다.", "선입견이 만들어진 데에는 분명 나의 책임이 얼마간 있다. 그렇다면 내가 비치고 싶은 이미지의 글들을 더 많이, 더 잘 쓰는 것 말고는 방법이 없었다. 말보다 실천으로 보여주는 수밖에. 사람들의 선입견을 바꾸는 데는 오랜 시간이 필요하지만 노력하는 과정 중에서 분명 내가 이해받고 싶은 방식 그대로 정확히 나를 이해해주는 소수의 독자를 만나게 될 것이다. 그들의 발견과 인정에 힘입어 내가 바라는 쪽으로 더 끌어가는 힘을 키운다. 그렇게 역할극이 아닌 진짜의 나와 잘 맞는 고정 독자들을 조금씩 늘려가는 게 중요하다.", "엄밀히 말해서 글쓰기는 가르칠 수가 없는 영역이라고 생각하는데 그래도 글쓰기를 배울 수 있는 가장 좋은 방법은 내가 좋아하는 작가의 작품을 반복적으로 읽으면서 문장을 씹어 먹다시피 소화하는 것이라고 생각한다. 글을 읽으면 글을 쓰는 방식을 저절로 깨친다. 호흡, 리듬, 톤, 온도, 습도, 기법 이런 것들이 계속 읽다 보면 다 보이고 어느덧 내 것이 되어간다.", "작가는 자기 소신이나 주관이 있어야 하지만 단정 짓고 결론짓는 사람들은 아니다. 흐릿한 부분은 흐릿하게 남긴 채 그 모호성을 있는 그대로 관찰하는 사람들이 글 쓰는 사람이 아닐까.", "조금 손해 봐도 되니까, 힘들어도 좋으니까, 다른 사람이 어떻게 생각하든 상관없으니까, 라면서 간절히 선택한 것에는 단순히 계산으로 설명할 수 없는 더 큰 가치가 숨겨져 있다. 거기에는 누가 뭐래도 내가 행복이라고 생각하는 어떤 모습이 들어 있을 것이다. 내 경우 그 어떤 모습은 '자유'와 '아름다움'이었다.", "내가 나 자신과 어긋남이 없는 선택을 하기 위해서라면 책임, 노력, 미움 받거나 실패할 가능성 등의 여러 가지 대가를 얼마든지 치를 수 있다. 나 자신으로 살아가기 위하여"]}, {"title": "나는 세계와 맞지 않지만", "author": "진은영", "genre": "에세이", "publisher": "마음산책", "passages": ["\"나는 시작을 중단하지 않았다.\" 이 말은 이렇게 읽힌다. \"나는 어떤 슬픔 속에서도 삶을 중단하지 않았다.\" ​", "내가 다 기억할 수 없는, 죽고만 싶었던 숱한 순간에 나를 살린 누군가의 문장들이 있었을 것이다. 고통의 순간도 회복의 과정도 전부 잊었지만 그 시간들이 있었기에 나는 지금 여기에 살아 있다. 나는 위대한 책들을 읽고서 혁명을 일으키지도 못했고 인류를 구원하지도 못했다. 어쩌면 나처럼 평범한 대부분의 독자에게 독서란 위대해지기 위해서가 아니라 살기 위해 하는 것일지도 모른다. ​", "사실 삶은 기나긴 소송 과정이라고 할 수 있다. 우리는 태어나는 순간 성별, 인종, 계급 등의 사회문화적 규범들 속에 던져진다. 사회는 그 규정들이 제대로 지켜지는지 감시하며 늘 우리에게 체포영장을 발부하려고 대기 중이다. 규정 하나를 잘 지켜도 다른 규정들로 인한 소송들이 이어질 수 있다. 그러니 누구나 사는 동안 사회적 '정상상태'에 있을 것을 명하는 법 앞에서 계속 무죄를 입증하거나 유죄를 인정해야 할 처지에 놓이게 된다. 따라서 완전한 무죄방면은 불가능하다. ​", "한나 아렌트의 구분법대로라면, 타자를 전제하는 활동인 대화는 '행위'에 속한다. 인간과 사물 사이의 관계인 작업과 달리, 행위는 사람들 사이에서 자신을 드러내는 활동이다. 그런데 행위에는 불안이 따른다. 나와 다른 욕구와 관심을 가진 타인들이 내 의도대로 반응하지 않아서 행위의 결과를 예상할 수 없기 때문이다. 우리가 인간관계에서 느끼는 불안이란 대부분 이런 것이다. 그래서 예측 가능한 통제 과정에 속해서 불안을 제거하려는 욕구가 생겨난다. '행위'하는 대신 '기능'하려는 욕구 말이다. 한나 아렌트는 요아힘 페스트와의 인터뷰에서 '기능하기'는 행위하기를 멈추는 것임을 강조한다. \"행위에서 중요한 것은 남들과 함께 행동하기, 즉 함께 상황을 논의하기, 어떤 의사 결정에 도달하기, 책임을 받아들이기, 우리가 하는 일에 대해 사유하기 등이 있는데, 이 모든 것이 기능하기에서는 제거\" 된다. 선택하고 결정하는 사람은 한 명이면 족하고 나머지는 그 계획에 따라 기능하면서 예상한 결과를 얻으면 된다. 대화는 불필요하다. 매뉴얼을 숙지하고 실행하라. 만일 최고 결정권자가 머릿속에서 지옥을 그리면 지옥의 질서가 그대로 실현된다. 이것이 기능적 안전성의 아이러니이다. 우리는 안전하게 지옥에 도착했다! ​", "과잉 생산되고 과잉 소비되는 사물은 인간에게 유용하지 않다. 생산성에만 유용할 뿐. 더 많은 소비를 외치는 열망은 더 많은 노동을 외치는 열망의 다른 얼굴이다. 이 열망은 다른 동료 인간들에게서 행위와 사유의 가능성을 빼앗고, 그들을 더 많은 노동, 더 위험한 노동으로 내몬다. ​", "세계가 불확실하고 미결정적인 것으로 남아 있을 때 사람들은 불안을 느낀다. 우리는 이 기분을 해결하기 위해 어떤 특정 대상을 위험한 것으로 지정해서 모호한 고통을 확실한 고통으로 바꿔버린다. 명확한 경계의 대상이 생기는 순간 그것만 제거하면 세계는 다시 확실하고 안전한 곳이 될 것이라고 믿기 때문이다. 이주노동자들이 범죄를 저지를까 두려워. 저 동양인은 걸어 다니는 바이러스야. 이처럼 두려움의 대상을 고안하고 이들만 사라지면 사회가 안전하고 건강해질 거라는 감정적 방어책을 만들어내면서 타인에 대한 잔혹한 반응을 정당화하게 된다. ​", "시인은 다른 사람들이 요구하는 속도가 아니라 자신이 원하는 삶의 속도로 단어에 머물 수 있는 권리를 주장하는 것처럼 보인다. ​", "그는 평범함을 유지하려고 애써왔다. 평범함은 최소한의 인간적 품위를 유지하는 상태를 말하는 것. 우리가 그 상태를 지키기 위해 인생의 한순간도 교활하거나 타협하거나 아첨하지 않았다고 자신할 수는 없지만, 그런 순간을 조금이라도 피하기 위해 최선을 다했음을, 그는 우리 보통 사람들을 대표하여 발언한다. 그래서 그가 왜 내가 항상 피로와 불안과 고통을 느끼는지 도무지 알 수 없다고, 도대체 나는 언제쯤 쉴 권리를 가지게 되는 거냐고 질문할 때 우리는 고개를 끄덕이게 된다. 우리도 그 답이 가장 궁금하기 때문이다. ​", "폴란드의 연극배우 조피아 칼린스카는 연기 지도를 받는 젊은 여배우들에게 목소리를 키우라고 말하곤 했다. \"목소리를 키우라는 건 크게 말하라는 뜻이 아니에요. 본인이 원하는 바를 소리 내어 말할 자격이 있다고 스스로 느끼라는 뜻이죠. 우리는 원하는 게 있을 때 기어이 주저하고 말죠 하지만 여러분이 그 소망을 붙들어 언어로 표현할 준비가 되면, 그땐 속삭여 말해도 관객이 반드시 여러분 말을 듣게 돼 있어요.\" ​", "목록은 유서깊고 창조적인 문학 양식이다. 시인들은 목록의 단순한 양식이 주는 기쁨을 잘 알고 있다. ​", "세상에는 기쁨을 주는 복잡한 양식도 있다. 그러나 지쳐 있을 때는 단순한 반복이 안정을 준다. 이런 안정감은 우리가 세상에 나오기 전에 경험한 엄마의 심장 소리에서 연유한다는 견해가 있다. 목록을 쓰면서 행복해하는 사람들은 이 원초적 리듬을 즐기는 것인지도 모르겠다. ​", "인간은 항상 타인과 자기 자신을 위해서 수축과 후퇴를 시도할 수 있는 공간을 가지고 있어야 한다. 그런 점에서 물러섬과 드러내지 않음은 타자를 배려하는 미덕인 한편, 드러내기 문화에 반하는, 가장 현대적인 저항의 태도가 된다. ​", "실존주의는 \"미래에 대해 기대를 걸 것이 없는\" 부조리의 세계속에서 희망 없는 자들 옆을 지키려면 미래를 계산하는 영리함 대신 실패를 감수하는 사랑이 필요함을 강조하는 철학이다. ​", "우리가 무엇을 꿈꾸며 싸우든 그 꿈을 이루는 일은 어렵다. 조금 전진한 기분이었는데 도로 제자리라는 걸 깨닫게 된다. 인간은 실패하려고 태어난 '훼손된 피조물'인지도 모른다. 그러나 카뮈 덕분에, 우리는 어려운 싸움을 계속 이어가는 이들을 어리석다고 말하는 대신 위대한 용기를 가졌다고 말할 수 있게 되었다. 또한 우리가 진정 사랑하는 이들은 승리하는 이들이 아니라 진실과 인간적 품위를 지키기 위해 어쩌면 패배할지도 모를 싸움을 시작하는 이들이라는 것도 알게 되었다. ​", "신학자들 식으로 표현하자면 누군가의 더러워진 발을 닦아주거나 음식물로 오염된 식기를 씻어내는 일은 세계를 부활시키는 일이다. 사람과 사물의 몸에서 시간의 죄를 씻어내고 새롭게 태어나도록 하는 일이니 설거지나 빨래, 청소, 목욕시키기만큼이나 위대하고 종교적인 이미지를 가진 인간의 일도 없을 것이다. 문제는 우리가 살림살이를 하면서 이러한 이미지들을 체험할 수 없을 정도로 기계적으로 일한다는 데에 있다. 한 사람이 온 가족의 설거지와 빨랫감을 해치우듯 처리해야 하는 분주한 일과 속에서 노동은 기계적 활동이 될 수밖에 없다. 거기엔 몽상을 위한 시간이 존재하지 않는다. 이런 점들을 떠올린다면 바슐라르는 반근대적 몽상가다. 살림살이 뿐만 아니라 모든 일에서 가능한 한 짧은 시간에 최대한 많은 결과를 내야 한다는 생산성의 논리에 철저히 반대하는 것이 몽상의 논리다. 몽상은 여유 없는 곳에서는 생겨나지 않는다. ​", "관습이나 종교에 따라서든, 혹은 책을 만드는 방식으로든, 우리가 애도를 위해 선택하는 모든 제의의 핵심은 이것이다. 사랑하는 이가 떠났다는 소식을 전하면서 그의 이름을 부르고 그 얼굴을 떠올리며 그의 삶이 어떠했는지를 다른 이들과 함께 이야기하는 것. 그렇게 함으로써 고인이 살았던 삶의 역사를 세상에 알리며 그와 정중히, 그리고 천천히 작별하는 것. 2022년 우리가 거리에서 많은 젊은이를 잃고서 치러야 했던 사회적 제의가 공허하게 느껴지는 것은 이 핵심이 전부 생략되어 있기 때문이다. 위패도 사진도 없는 분향소에서 우리는 고인에 대한 어떤 이야기도 하지 못하고 듣지 못한 채 누군지도 모르는 고인을 애도하고 추모했다. 세상을 떠난 당신이 누구였는지 알고 기억하는 것이 가장 중요한 바로 그 제의에서 말이다. ​", "인디언식 선물은 서로 주고받는 게 아니다. 대체로 받은 것은 제삼자에게 건네지고 그에 의해 또 다음 사람에게 건네진다. 이처럼 선물이 대가 없이 건네질 때마다 사람들 사이에는 느낌과 생기가 생겨난다. 수건돌리기가 놀이의 공동체를 만들어내듯 선물은 계속 돌아가며 사람들 사이에 결속감을 부여하고 느낌의 공동체를 만들어낸다. 하이드는 예술 작품도 선물처럼 움직인다고 말한다. 시를 한 줄도 읽어본 적 없는 시인, 소설을 한 편도 읽은 적 없는 소설가가 있을까? 좋은 작가들은 언제나 좋은 독자였다. 그들은 다른 예술가의 작품에서 자극받은 생기를 자신의 작품 속에 담아 다른 독자에게 선물하는 독자다. ​", "다른 존재들을 구하거나 우리가 원하는 세상을 만들기 위해서 머리부터 발끝까지 거창하게 새로운 인간이 될 필요는 없다. 늘 하던 대로, 그러나 에너지의 방향을 조금 바꿔서, 매일매일 움직이면 될 뿐. 우리의 사랑이 사소한 일에서 시작되듯 구원도 혁명도 그럴 것이다. ​", "우리에게 정말 필요한 멘토는 멀리서 거룩한 지혜의 오라를 뿜어내고 있는 존재가 아니라, 멀지 않은 거리에서 같은 곳을 탐험하는 동료 대원이다. 그러니 젊은 시인의 가장 좋은 멘토는 젊은 시인이 아니겠는가. ​", "학생이 교사의 설명을 통해서만 배울 수 있다면 늘 교사보다 지적으로 열등한 존재일 수밖에 없다. 그러나 아기들은 교사 없이도 모국어를 배우지 않는가. 설명할 때만, 그리고 설명해준 것만 아는 사람은 설명자에 예속된 존재이다. 혼자서 자신의 고유한 방식과 자신에게 맞는 속도로 배울 수 있을 때 그는 자유로워질 수 있다. 좋은 교사는 유식한 자가 아니라 해방된 자를 만드는 교사이다. 가령 시를 가르칠 때 교사는 학생들이 시에 대해 자유롭게 말하고 그 대화에서 기쁨을 느낄 수 있도록 도와야 한다. 그러기 위해서 그는 전문가의 시 해석을 미리 알려주지 않는 사람, 학생이 시에서 읽어낼 의미를 앞서 정하지 않는 사람, 그래서 학생이 배우게 될 어떤 것에 무지한 사람, 다시 말해 무지한 스승으로 남아야 한다. \"이해할 것은 아무것도 없다. () 이야기할 것만 있다.\" 이제, 용기를 가지고 그 이야기를 시작하라."]}, {"title": "나는 지금도 거기 있어", "author": "임솔아", "genre": "소설", "publisher": "문학동네", "passages": ["\"배민석 선배 존나 좋지 않냐?\" 막대사탕을 흔들며 친구가 말했다. \"매우 좋구나.\" 막대사탕을 흔들며 다른 친구가 답했다. 친구들이 와르르 웃음을 터뜨렸다. 좋다는 표현 앞에 '존나' 같은 속어를 붙이면 진심, '매우'나 '상당히' 같은 문어체 표현을 붙이면 반어적 표현이 되었다. 사용법은 점점 복잡해졌다. '매우'가 붙었는데 진심인 경우도 있었고, '존나'가 붙었는데 반어법일 때도 있었다. 억양의 미묘한 차이로 알아챌 수 있었지만, 화영은 무엇이 반어법이고 무엇이 아닌지 자주 헷갈렸다. 그 차이를 세심히 캐치하기 위해 노력 같은 걸 해야 하는 사람은 화영뿐인 것 같았다. ​", "석현은 야구나 농구를 제대로 해본 적이 없다고 했다. 군대에 가본 적도 당연히 없었다. 총을 쥘 한쪽 손이 없었으니까. 남성성을 자랑하는 남성에 대해서라면 질색을 했다. 이차성징이 시작되기도 전부터 여자아이들이 어떤 위험에 처하는지, 매일매일 어떤 유리 천장에 부딪히며 살아가는지, 알지도 못하면서 아는 척을 하는 숱한 남자들과 달랐다. 석현은 알았다. 행인이 몸을 훑어본다는 것이 어떤 느낌인지를. 세세하게 배려받는 것 같지만 치밀하게 소외된다는 것이 무엇인지를. ​", "어떤 이야기에도 심취하지 못하며 어떤 그룹에서도 완전한 소속감을 느끼지 못한다는 것, 그 사실에 화영은 이제 조바심을 느끼지 않았다. 빈자리를 찾아내는 것, 그곳에 발끝을 디디는 것, 없는 사람 같아서 제거할 필요도 없는 사람이 되는 것. 그것이야말로 생존에 있어서는 더없이 탁월한 재능이라는 걸, 화영은 이제 잘 알았다. 한 번으로 충분하다. 이 사람들을 또 만날 필요는 없다. 그게 화영의 판단이었다. ​", "가끔은 어떤 것도 귀 때문은 진다. 자아는 작아지고 외부에 의존하게 된다. 후회스러운 경우가 많다. 외로움은 타인과 나의 관계가 아니라 나와 나의 관계다. 자신이 몰두하는 대상이 몸이 부끄러울 만큼 아름다울 때 인간은 외롭지 않다. 예술, 공부, 사회운동, 정치, 자연이 그런 대상이 아닐까. ​", "절대로 사람에게 헌신해서는 안 된다. ​", "실패에서 배울 수 있는 영역은 사업이나 공부처럼 한정적이다. 인간관계는 그렇지 않다. 관계는 배움 이전에, 상처다. 아무도 믿을 수 없다. 어떻게 살 것인가. 그래도 다시 한번? 자신이 없다. 피해의식과 분노로 남은 인생을 보낸다면, 이처럼 억울한 일도 없을 것이다. 분노의 시대요, 상처의 시대다. ​", "왜 어떤 지식은 사상이고, 어떤 지식은 경험인가. 왜 어떤 무지는 수치스러운데, 어떤 무지는 권력이 되는가. '무식하다'는 욕 같지만 자기 위치를 모르는 이들에겐 완장이다. 그래야 통치가 가능하다. 대개 남성들은 '지식인'이든 아니든 여성주의를 모르는 것을 자랑스럽거나 당연하게 생각한다. 심지어 '진정한 페미니즘'을 가르치려는 이들도 심심찮다. 우리 사회에는 장애, 성별, 이성애 제도에 대한 지식이 없다. 나는 '정상인'들의 무지가 차별의 엔진이라고 생각한다. 당하는 입장에서는 매번 대응할 수도 없고, 교정을 요구할 수도 없는 고단한 삶이다. 무지를 부끄러워하기는커녕 나서는 사람들이 있다. 이유는 간단하다. 그래도 되기 때문이다. 세상에서 가장 무섭고 해결하기 어려운 권력은 '몰라도 되는 권력'이다. ​", "나는 최근 우리 사회의 여성 혐오 현상이 '혐오'일까 다소 의문이 든다. 전통적인 혐오(포비아)는 공포와 무지로 작동한다. 지금 일련의 사건들은 무지나 두려움 때문이 아니다. 그냥 약자를 함부로 취급하는 것이다. 이들의 자기 도취에는 타인을 짓밟겠다는 의지가 있다. 근대적 인권 상식은 규범적으로는 모든 이들이 평등하는 것인데, 규범에 동의하지 않아도 상관없다. 말만 하지 않으면 된다. 생각은 자유지만 발화는 공동체를 파괴하는 행위다. ​", "여성 혐오는 인류 문명의 가장 강력하고 독자적인 문화적 기반이다. '인종 역할', '계급 역할'이라는 단어는 없다. 그러나 성 역할이란 말이 널리 쓰이는 것은 성차별이 부정의가 아니라 지켜야 할 규범으로 여겨지기 때문이다. ​", "사실 나를 가장 놀라게 한 사건은 \"나도 잠재적 가해자입니다.\"라는 '운동'이다. 잠재적 가해자라니? 남성이 잠재적 가해자라면, 여성의 현실적, 현재적, 일상적 피해는 누가 저지른 일이란 말인가. 물론 '선의'겠지만 무지에서 나온 선의는 지배 세력의 관용과 성찰로 둔갑하기 쉽다. 사회적 모순에 '잠재'라는 말은 있을 수 없다. 빈부 격차를 '잠재적'이라고 하는가? 지역 차별, 장애인 차별도 일상적이고 노골적이지 잠재되어 있지 않다. 성차별은 더욱 그렇다. 따라서 \"나는 잠재적 가해자입니다.\"는 \"나는 성차별 구조에서 가해자의 위치에 있습니다.\"로 바꿔야 한다. ​", "상처가 아니라면, 왜 쓰겠는가? 상처가 없으면 쓸 일도 없다. 작가는(학자도 마찬가지다) 죽을 때까지 '팔아먹을 수 있는' 덮어도 덮어도 솟아오르는 상처가 있어야 한다. 자기 이야기를 쓴다는 것은 경험을 쓰는 것이 아니다. 경험에 대한 해석, 생각과 고통에 대한 사유를 멈추지 않는 것이다."]}, {"title": "날씨와 얼굴", "author": "이슬아", "genre": "에세이", "publisher": "위고", "passages": ["마음에 걸리는 얼굴들 때문에, 이 책은 쓰여졌다. 분명 어떤 얼굴들은 충분히 말해지지 않는다. 그들에 대해 말하려면 특정 방향으로 힘이 기우는 세계를 탐구해야 한다. 그게 내가 배운 저항의 방식이다. 중요한 이야기를 중요하게 다루는 것. 누락된 목소리를 정확하게 옮겨 적는 것. 여러 사람에게 묻지 않고는 쓸 수 없었다. 어떤 책보다도 부지런히 자료를 조사하며 완성했다.", "처음 보는 십대들에게 나를 소개한다. 중요한 이야기의 수명을 늘리기 위해 노력하는 사람이라고 말한다. 글쓰기는 디스토피아를 극복할 수단 중 하나가 될 수 있는가? 물론이다. 나는 비밀 병기를 장전해주는 심정으로 미래 세대와의 글쓰기 수업을 시작한다.", "온실가스 매출의 주요 원인 중 하나인 이 산업을 빼놓고 기후위기를 말할 수는 없다. 공장식 축산은 전 세계 평균기온을 상승시키는 데에 분명 영향을 끼쳐왔다. 하지만 그보다 먼저 말하고 싶은 건 폭력에 관한 이야기다. 인류가 동물에게 겪게 해온, 그리고 앞으로도 겪게 할 고통의 시스템을 어떻게든 바꿔보고 싶다. 축산업이 축산업 바깥에 미치는 영향을 차치하더라도, 축산업 내부에서 동물이 강제당하는 생의 모든 순간이 착취적이기 때문이다.", "나에게 비거니즘은 어떤 착취에 더 이상 일조하지 않겠다는 다짐이자, 동물과 인간이 관계 맺어온 방식을 개선하고 싶다는 의지다. 이것은 기후위기에 대한 입장이기도 하다. 육식을 줄이는 것만으로는 다가올 기후재난을 해결하기에 충분치 않지만, 현재의 식습관을 티끌만치도 바꾸지 않는 채로 찾는 대안은 한계를 가질 수밖에 없다.", "음식 선택은 전염성을 지닌 행위다. 타인이 먹는 것을 나도 주문하고, 내가 먹는 것을 타인도 주문한다. 무엇을 먹고 싶은지 알아채기도 전에 다른 사람의 밥상으로부터 영향받는 것이다. 식품 산업은 언제나 이 선택들을 주시하고 있다. 더 잘 팔리는 품목과 버려지는 품목을 기록하면서.", "돼지 한 마리가 죽었다, 라고 쓴 뒤 지우고선 이렇게 다시 써본다. 돼지 한 명이 죽었다. 그러자 문장 속 죽음은 내 안에서 더 크게 덜컹이는 사건이 된다. 두 개의 문장이 당신에게도 다르게 읽힐지 알고 싶다. '명'은 주로 사람의 수를 셀 때에만 사용되어 왔다. 국어사전에 따르면 '마리'는 '짐승이나 물고기, 벌레 따위를 세는 단위'다. 언어 바깥에서나 언어 안에서나 비인간 동물은 인간 동물보다 덜 중대한 존재로 대해진다. 그것이 지금까지의 역사다. 나는 지혜로운 친구들의 말과 글을 따라가다가 이 역사와 이 언어가 몹시 기구하게 느껴졌다. '마리'라는 언어를 명예롭게 할지 아니면 모든 종에게 '명'을 붙일지에 관한 고민은 앞으로도 계속되겠으나 고민을 진행하는 동안에도 새롭게 말해보고 싶었다. 한 마리씩 말고 한 명씩 세면서 글을 쓰고 싶었다. 한 명의 돼지. 한 명의 소. 한 명의 닭.", "물결의 편집장 계미현은 언어가 은폐하는 착취와 폭력과 억압에 대해 우려하며 이렇게 썼다. \"물에 사는 동물이지만 죽기 전까지는 '고기'로 불리다가 죽으면 '생선'으로 변모한다. 살아 숨 쉬는 동물을 '고기'로 부르는 종차별을 지양하기 위해 이 책에서는 '물살이'라는 언어를 쓴다.\" 그의 말처럼 이미 여러 작가들이 '물고기' 대신 '물살이'를 사용하며 문장을 완성하고 있다.", "이것은 동물을 한 명씩 세다가 시작된 이야기다. 인간 동물인 내 목숨과 비인간 동물인 누군가의 목숨을 나란히 생각할 때 우리가 쓰는 말도 새로워진다. 새로운 언어는 나의 존엄과 당신의 존엄이 함께 담길 그릇이 될 것이다.", "\"인간은 죽을힘을 다해 사는 것이 아니라 죽인 힘으로 산다.\" 절멸에 적힌 문장이다.", "작가(만드는 이)는 어떤 존재인가? 경계를 모르는 존재다. 상상하고 이입하는 존재다. 타자되기를 일삼는 족속들이다. 만약 동물들의 존재론적 목소리를 복화해줄 인간을 찾는다면, 그 역할을 맡을 주체로서 어떤 부류를 지목하겠는가?", "나 이슬아는 오늘 이 순간 돼지로서 말한다. 나는 태어난다. 꼬리가 잘린다. 이빨이 뽑힌다. 나는 갇힌다. 먹는다. 자란다. 빨리빨리 자란다. 다 자라고 나면 뒤돌아볼 수조차 없다. 이곳은 딱 나만 한 크기의 감옥이다. 그곳에 오물이 쌓인다. 나는 더러워진다. 수없이 주사를 맞는다. 그리하여 나는 항생제로 이루어진다. 부작용투성이가 된다. 쇠로 된 창살을 물어뜯는다. 나는 멍해진다. 나는 옮겨진다. 나는 실려 간다. 나는 놀란다. 나는 운다. 나는 죽임당한다. 내 몸은 분리된다. 썰린다. 비닐에 담긴다. 냉동된다. 먹힌다. 온갖 방식으로 먹혀서 당신들의 신체로 간다. 또 다른 나는 산 채로 묻힌다. 나는 수만 명의 나와 함께 땅속에 있다. 나는 썩는다. 나는 아주 천천히 병든 땅이 된다. 내가 묻힌 땅. 내 피로 물든 강. 나를 스친 사람들. 나를 먹는 당신들. 모두 아프게 될 것이다. 내가 이렇게나 아프기 때문이다. 나는 고통의 조각이기 때문이다. 고통이 돌고 돈다. 당신에게서 나에게로. 나에게서 당신에게로.", "작가들은 실패할 것을 알면서 주어를 바꿔 말하고 있었다. 세상 대부분의 일이 '어차피'와 '최소한'의 싸움이기 때문일지도 몰랐다. 어차피 세상은 변하지 않는다고 말하는 이들과 최소한 이것만은 하지 않겠다고 말하는 이들 사이의 간극을 메우는 말들이 흘러나왔다. 그것은 절멸하지 않고 싶다는 의지였다. 너도 살고 나도 살자는 소망이었다.", "빛나는 동료 창작자들과 예술가들도 만나지만 그만큼이나 공들여 준비하는 만남은 알려지지 않은 사람과의 인터뷰다. 뉴스에도 없고 SNS에도 없는 사람. 너무 많은 말을 읽거나 듣거나 내뱉지 않는 사람. 마이크를 넘기면 무슨 말부터 해야 할지 모르는 사람. 나보다 먼저 태어나 묵묵히 살아가는 사람. 그런 이들을 향한 질문지를 준비한다. 지난해 여름에는 1940년대에 태어난 존자 씨와 병찬 씨를 만났다. 그들은 나의 외조부모다. 아파트 계단 청소 노동자로 일하는 존자 씨가 충청도 사투리로 나를 타박했다. \"근디 뭔 할무니 할아부지를 인터뷰한다고 그르냐. 우리는 아무것도 모르는 멍청이여!\" 스스로를 멍청이라고 말하는 사람과의 인터뷰는 세 시간 동안 이어졌다. 노동의 역사와 사랑의 역사와 고통의 역사와 한국 근현대사가 아무렇지도 않게 그들 입에서 흘러나왔다. 이야기를 듣는 동안 나는 너무 많이 웃어서 광대뼈가 욱신거렸고 때로는 마음이 아파서 목에 돌이 박힌 것처럼 아무런 추임새도 할 수가 없었다.", "내 옆에 선 이들은 주로 동료 사진가들이었다. 그들은 질문하는 나와 대답하는 인터뷰이 사이에서 조심스레 인터뷰의 풍경을 담는다. 대화의 흐름을 방해하지 않으며, 카메라 렌즈가 인터뷰이를 긴장하게 하지 않도록 주의를 기울이며 움직인다.", "이 시각 국감에 모여 앉은 저 어른들에게 떠오르는 풍경이 있을까? 텍스트와 숫자 말고, 얼굴과 장면 말이다. 어떤 정책을 거론할 때마다 가슴을 아프게 하는, 단어마다 자꾸 걸려 넘어지게 하는 누군가가 그들 마음속에 있을까? 만약 있다면 그들이 내뱉은 문장은 지금보다 생생하게 뛸 것이다. 나는 '진짜 질문'과 '진짜 대답'을 그리워하며 국회방송을 시청한다.", "침묵하지 않고 저항하는 몸들을 본다. 어떤 차별을 당연하게 만들지 않겠다며 신체를 걸고 싸운다. 모두의 삶이 각자에게 크고 작은 투쟁이겠으나, 온몸을 총동원하며 싸우지 않을 수 없는 이들도 있다.", "장혜영 의원실은 국내 최초로 기후 국감을 진행했다. 반지하 홍수 피해로 사망한 이들의 영정을 마주하고 온 장 의원이 기후 정치가 얼마나 절박한 일인지 실감했기 때문이다. \"안다고 착각했던 일을, 진짜로 알게 되는 순간이 있지 않습니까?\" 대담에서 그는 말했다. 21대 국회 3백 개의 의원실 중 적어도 한 곳은 기후위기 상황실이어야 하지 않겠냐는 경각심이 그를 기후 국감으로 이끌었다. 탄소배출 감소와 취약계층을 위한 정책들이 실제로 잘 이루어지고 있는지, 책임자들의 코앞에다 대고 묻고 감시하는 국감이었다.", "프랑스의 가족관계 문서는 '부/모' 말고 '보호자1, 보호자2'를 적게끔 한다. 부모가 모두의 기본값은 아니라는 점을 존중하는 문서 형식이다. 현재의 상상력으로는 '부모' 대신 '보호자' 혹은 '어른'이라는 말을 일상어로 쓰는 것이 최선처럼 느껴진다. 미래에는 더 적절한 말을 발명할 수 있을 것이다.", "누군가는 고작 소 다섯 명일 뿐이지 않냐고 물을 듯하다. 그러나 우리는 지금 이 땅에서 처음으로 소가 해방된 순간을 목격하는 중이다. 공장식 축산으로부터 소 다섯 명을 구조하기가 이토록 어려웠다. 앞으로는 조금씩 덜 어려워질 것이다. 나는 이 일이 훗날 교과서에 실리기를 바란다. 소 옆에 선 친구들이 내뿜는 눈부신 후광을 쬐며 생추어리를 위한 후원금을 송금한다. 모두가 생추어리를 만들 수는 없지만 그게 지속되게끔 힘을  감각 안에서 노인력은 태어났다. ​", "요즘 사람은 약해 빠져서 가장 먼저 머리에 의존하려고 한다. 나도 요즘 사람이니까 논리적 사고를 그대로 따르려는 경향이 있다. 물론 인간의 생활에는 논리가 필요하다. 1 더하기 1은 2이지 않으면 곤란하다. 그런데 그것은 1 더하기 1의 경우에만 해당할 뿐이다. 만약 1 더하기 냄새라면 어떻게 논리적으로 대답해야 할까. 곤란해진다. 그런데 이런 경우가 실생활(현장 실습)에서 종종 발생한다. 이때는 역시 자기 감각에 의존할 수밖에 없다. 예를 들어 논리적으로는 옳다고 생각해도 '뭔가 좀 찜찜한데.'하고 느꼈다면 그쪽으로 가면 안 된다. ​", "스트레칭 노동. 스트레칭이라고 하면 피트니스 클럽에서 한도 끝도 없이 움직이는 인체를 떠올리게 된다. 그러면 좀 시시해진다. 근육의 순수 배양이라고 할까, 재미가 없다. 어차피 몸을 움직인다면 일하는 편이 훨씬 더 낫다고 생각한다. 스트레칭하다 보니 잡초가 뽑혀 있고, 나무가 대패질되어 있고, 집이 세워져 있는 편이 더 재미있다. 그저 컨베이어 벨트 위에서 걷는 것보다는 말이다. 현역으로 움직이는 세상에 뒤섞인 스트레칭, 즉 취미의 노동이다. 취미의 노동에서는 그런 현실과 함께 뒤섞여 있다는 점이 중요하다. 이게 잘 이루어지면 거의 예술의 노동이라고 할 수 있다. ​", "잊으려고 애쓸수록 오히려 더 잊을 수 없다. 노력해서 외울 수는 있어도 노력해서 잊을 수는 없다. 잠드는 일도 잊는 일도 노력해서는 도달할 수 없다. 하지만 인간은 매일 잠들고 매일 잊는다. 왜 그럴까. 인생을 시작한 이래 모든 현상을 전부 기억한다면 사실상 머리는 과부하에 걸려 살아갈 수 없다. 실제로 머리가 어느 정도 적당히 잊기에 대충 별문제 없이 생활한다. 여기에서 중요한 점은 '적당히'다. 어느 정도 적당하다는 것이 우리를 잠들게 하고 건망증을 실현해 준다. 그런 '적당히'라느 무엇일까. 어떻게 정의하면 좋을까. 이는 어렵다. 정의한다는 말은 '적당히'를 배제하는 일이다. 그러니 '적당히'를 정의하면 적당히가 아닌 게 된다. 난처하다. 그래도 정의해 보자. 적당히란 반노력을 말한다. 물질이 있어 반물질이 있다고 한다. 이와 마찬가지로 노력이 있어 반노력도 있다. 노력의 반대. 자, 그럼 게으르다는 말이냐고 하면 좀 다르다. 굳이 말하자면 게으름 피울 힘이라기보다 노력하지 않는 힘이라고 하는 게 맞다. '잠든다' '잊는다'를 가능하게 하는 것은 반노력의 힘이다. 우리는 반노력에 의해 잠들 수 있으며 반노력에 의해 잊을 수 있다. 그런 노력하지 않는 힘이 이 세상 어딘가에, 우리 어딘가에 있다. 그리고 그런 반노력의 힘이야말로 노인력의 실체이지 않겠는가. ​", "공석이 전부 노인력 때무에 생겼다고는 할 수 없어도 그럴 가능성은 있다. 야구장이라든지 극장, 음악회, 가부키, 신칸센, 비행기, 호화여객선까지 공석이라는 공석이 모두 노인력에서 비롯되었다면 기야말로 엄청난 일이지 않겠는가. 세상에 공석이 존재하는 만큼 가정에서는 노인력과 관련된 사람이 온 집안을 뒤지면서 없는데, 어디로 가버렸지, 분명히 여기에 두었는데, 하고 중얼거리며 돌아다닌다. ​", "젊은 사람들은 정보 사회에 젖어 있습니다. 정보 사회에서 사람들은 쩨쩨해집니다. 정보를 몽땅 끌어안으려고만 하고 깔끔하게 버리지 못하죠. 저도 본래는 쩨쩨한 편인데 노인력은 버리는 일이 얼마나 기분 좋은지 알려줍니다. 휙휙 잊어버리는 일의 재미죠. 정보가 단순해지면 스스로가 보인다고 할까요, 본래의 자신이 그대로 드러납니다. 반대로 정보로 온몸을 무장하면 정보가 자신을 지탱해 주는 대신 더 이상 신선하지 않게 되어 무언가 신선미가 떨어지고 진부해집니다. 그러니 요즘 사람들은 차곡차곡 부지런히 모은 정보를 끌어안고 상당히 괴로운 상태에 빠지기도 합니다. ​", "인간의 생활은 하루하루가 연속적이며 쉴 틈 없이 돌아가니 인생에서 가끔 넘어지는 일도 당연히 발생한다. 넘어지면 아프니까 넘어지지 않아야 가장 좋지만, 평생 넘어지지 않는 일 따위는 있을 수 없다. 그렇다면 넘어지는 일을 두려워하지 않는 게 좋다. 일부러 넘어질 필요는 없지만, 안타깝게도 굴렀을 때는 넘어져도 그냥은 일어나지 말아야 한다. 옛날부터 이렇게 생각했다. 생각 끝에 나온 결론은 아니어도 넘어진 채로 있으면 억울하다. 그렇다고 그냥 그대로 일어나기도 분하니까 주변을 둘러보고 꼭 무언가를 주워서 일어난다. ​", "조현병 환자가 양팔이 잡힌 채 진찰실로 왔다. 환자는 병원에 올 때까지 엄청나게 저항하며 난리를 피워 모습이 엉망이었다. \"일단 앉으세요.\" 그렇게 선생님은 침착하게 문진을 시작했다. 환자는 힘으로 완강히 버티면서 제대로 대답하려고 하지 않았다. 선생님은 어느 정도 형식적인 질문을 하면서 \"흠 그런데 그건 좀\" 하며 팔짱을 꼈다. 그때도 \"흐으음\" 하고 길게 소리를 내면서 결국에는 잠이 들고 말았다고 한다. 그전까지 양팔을 잡힌 채 힘을 잔뜩 주고 버티던 환자도 그 모습에 맥이 빠져 어이가 없다는 얼굴로 말했다. \"알겠습니다. 저, 이제 입원할게요\" 환자가 간 뒤에 선생님은 아예 제대로 자리를 잡고 주무셨다고 하니 이분은 완벽한 명인이라고 나는 생각한다. 환자도 안정되었고. ​", "정신과는 머리의 병을 다룬다. 그 머리의 병을 고치는 데 머리의 사고는 잘 통하지 않는다. 논리적으로만 생각하면 안 되며 대략적인 느낌으로 일단 뭉뚱그려서 치료해가야 한다고 한다. 물론 단순히 그게 전부만은 아니겠지만, 무언가를 진행하는 속도는 대충, 일단, 뭐 오늘은 이 정도로, 적당히, 좋은 날씨네요, 아이고 고맙습니다, 같은 느낌이라고 한다. 뭔지 알 듯하다. 머리도 결국 몸이다. 당연한 이야기지만, 요즘 사람은 일일이 항목별로 생각하는 버릇이 들어 있어 정신적으로 힘들다. ​", "뭐든지 100퍼센트는 좋지 않다. 인간에게는 100퍼센트 의존증이 있는데, 아니, 또 논리를 펼치는 꼴이 되니 여기서 접겠다. 그런데 야구 타율도 보면 아무리 좋아봤자 3할, 승률조차도 5할 조금 넘는 게 현실이다."]}, {"title": "눈물에는 체력이 놓아있어", "author": "한유리", "genre": "에세이", "publisher": "중앙북스", "passages": ["이건 나라는 존재가 가지고 있는 본질적인 속성과도 연결된 아주 아득하고도 복합적인 문제다. 만약 갑자기 남녀가 평등해져서 '동일고용 동일노동 동일임금'이 이루어진다 해도, 작가가 아닌 다른 직업을 갖게 된다고 해도 내 처참한 돈벌이 능력이 이보다 나아질 것 같지는 않다. 글을 그만 쓸 것 같지도 않다. 그렇게 어떤 문장들은 별도리 없이 평생 돈도 방도 없을 사람의 손끝에서 태어나고 만다.", "누군가는 내 글을 읽으며 돈도 방도 없어서 이렇게 됐다고 평하기도 할까? 지금이라도 생활의 초점을 자기만의 방을 얻는 일에 맞춰보는 게 좋을까? 그러나 살고 쓰는 일의 의미가 겨우 그것뿐일리가 없다. 내가 절대 가질 수 없는 게 있는, 그런데도 누군가는 나보다 덜 가질 수밖에 없는 세상에서 이토록 미련하게 쓰기를 멈추지 않는다는 것은 - 돈을 갖는 것, 나만의 무엇을 갖는 것 너머의 - 액체처럼 흘러가는 시간과 공간을 더듬는 꿈이라고 생각한다.", "거짓말 속에서, 누군가 책을 읽고 있다고 가정하자. 푹 쉬는 방법으로 계속 자살이 떠올라서 피곤한 사람이, 자신이 겪는 문제 - 정신병, 통증, 원인을 알 수 없는, 어느 정도 세계가 원인인 듯한 고통 - 와 연관된 것들을 다룬 이야기를 찾아 읽는 중이라면. 좋은 이야기들은 분명 미래 세상에 보탬이 될 것이다. 그러나 그 사람에게는 아직 미래가 안 왔다. 그가 느끼는 바는 다음과 같다. 돌봄 받는 경험은 역시 가족이나 연인, 돈이 있지 않으면 어렵구나. 나는 오롯이 내 몫이다. 끝까지 정신 차리고 마지막의 마지막까지 스스로를 돌보지 않으면 그다음은 없다.", "오해를 최소화하며 살고 싶다. 나와 내 주변의 진실에 대해 최대한 정확히 알고 싶다. 경험을 통해 조금씩 또렷해지는 것들을 잘 정리해두었다가 기회가 오면 놓치지 않고 좋은 방향으로 사용하고 싶다. 쓸모 있는 질문을 하고, 질문을 통해 도출된 답을 실제 행동으로 옮기고 싶다. 자기 앞가림도 못하는 주제에, 운동을 좀 못했다고는 해도 포기한다는 말은 아직 안 했던 것이다. 아직도 그런 방식으로 세상을 바꿀 수 있다고 믿는다.", "사회적 거리두기가 불가능한 출근길 전동차 안에서는 구석에 끼어 휴대폰 액정을 주시하는 것 외엔 달리 할 수 있는 게 없습니다. 유튜브 알고리즘은 아직도 '면접관이 듣고 싶어 하는 답변' '자소서 광탈을 피하는 방법'과 같은 영상을 추천 목록에 올려주네요. 취업 준비 기간의 광기 어린 플레이를 잊지 못한 모양입니다. 손가락이 앱과 앱 사이를 뒤적이며 새로운 관심사에 맞는 콘텐츠를 검색해봅니다.", "약해도, 아파도, 장애가 있어도, 돈이 많이 들어도, 앞으로 끝없이 잘못을 반복할 예정이라도, 심지어 태어난 게 민폐라도, 단 한 번도 원해진 적 없는 존재라 해도 살아갈 수 있어야 맞다는 얘기가 있거든. 그런 것 같긴 한데 진짜 잘 안돼. 누군가는 책임을 져야 하는데, 버리거나 포기하거나 죽이지 않아야 하는데", "어쨌든 힘든 일을 패션 아이템으로 장착하면 모든 게 좀 나아진다.", "울고 싶은 순간에는 상상 속에서만 조금 울었다. 눈물에는 체력이 녹아있어 한 방울이라도 몸 밖으로 내보내면 결국 나만 힘들다.", "\"내가 오늘 저녁으로 얼어있는 떡볶이를 먹었거든? 완전 해동하기 귀찮아서 근데 그랬더니 지금 내 몸 안에 있는 떡볶이의, 떡볶이의 내면이 아직 얼어있다는 게 느껴져. 먹은 지 두 시간이나 지났는데. 이럴 수가 있는 건가? 아직 얼어있는 거 같아.\" 라고 페이스북에 썼더니 J님이 음식은 적당한 온도에서 먹어야 한다고. 곡물류에서 얻는 녹말은 얼리면 풀 같은 결합 형태가 되기 때문에 떡볶이를 얼리면 녹말 이쑤시개처럼 된다고 가르쳐줬다. 나는 녹말 이쑤시개 한 그릇을 삼킨 거였다.", "쉬는 시간에 책 읽고 앉아있으면 책 좀 그만 읽으라고 화내는 애들이 있었다. 걔네는 내 책상 서랍을 뒤져 책을 뺏어가거나 찢어버리기도 했다. 매 학년 말, 내 롤링페이퍼에는 책 그만 읽으라는 말이 빼곡히 적혀 있었는데 그렇지만 이해가 안 가. 왜 그만 읽으라고 해? 내가 책 덮고 일어서면 나랑 놀아줄 거야? 네가 책보다 재밌어? 내게 책보다 더 나은 존재가 돼줄 자신 있어?", "근데 남자를 싫어하는 일보다 선행돼야 할 건 언제나 여자를 살리는 일이고, 그런 여자들에게 그런 남자들을 거부할 자유를 주는 방법은 안 그런 여자들이 그런 남자들보다 더 그런 여자를 사랑해버리는 거, 그거 하나뿐이다. 더 환호하고 더 욕망하고 더 열렬히 사랑하는 거. 침 흘리는 남자들보다 먼저 그 여자들을 약탈하고 자기 집으로 데려가는 거. 그런 걸 안 하면서 남자들이 문제다, 저런 남자를 받아주는 저런 여자도 좀 더럽다고 말하는 건 거의 그 남자랑 그 여자가 백년해로하라고 맺어주는 거나 다름없다.", "이 잘못 짜인 흐름이 보이지 않는다는 사람들에게 뭐가 문제인지 어떻게 설명할 것인가? 구조가 있다는 말은 가끔 얼마나 공허한가? 구조는 구조다. 너무 크거가 교묘하거나 익숙해서 느껴지지 않는 구조의 존재를 어떻게 드러내야 할지가 늘 고민이다.", "능력 있는 사람이 없는 사람보다 잘사는 게 당연하다고 믿는 가치관은 인류의 자기 객관화 부족에서 비롯된 착각이다. 당신은 공정하게 매겨진 개개인의 차등에 승복할 수 있겠는가? 피나는 노력 끝에 고난과 역경을 극복해 마침내 이 자리까지 온 우리는 평범하다. 더 뛰어난 능력을 갖췄지만 황당하고 부당한 이유로 저평가되거나 뒤 순번으로 밀렸을 뿐인 사람들이 반드시 있다. 그들보다 못한 취급을 받으며 내가 운 좋게 얻었던 것들을 잃게 되도 좋은가? 나는 싫다. 무슨 기준으로든 괜히 급을 나누지 말자고, 차별 없는 평등 사회 만들자고 하는 편이 좋다. 누구도 누구보다 '못한 취급'을 받지 않도록 하는 것만이 고만고만한 우리네 인생이 살길이다.", "여자라서 '그런 취급'을 받는다고 밝히는 건 너무 가오 상하는 일이다. 대부분의 상대가 '그런 취급'이 뭔지도 모른다는 것부터가 서럽다. 모두가 내가 여자임을 똑똑히 알고 있음에서 비롯되는 공포가 있다 나는 정말 약한 쪽이 되고 싶지 않다. 남 탓하고 싶지 않다.", "나는 웃어도 울어도 열어도 닫아도 틀린 그림이고 타인은 다른 그림 찾기 정답지처럼 인류의 원본처럼 나를 비춘다. 그러나 발 딛는 자리마다 뭉그러지고 녹아버리는 어두침침한 장소 말고 멀쩡해 보이는 곳 가고 싶다면, 친구 결혼식에도 참석할 수 있고 사교 모임에도 나갈 수 있는 인간이 되고 싶다면 어느 정도 입을 다물어야겠지. 침묵을 대가로 입장권을 받고 있다는 사실을 늘 명심해야 한다. 보고 느끼는 것들을 쓰지 않도록, 아무 데도 쓰지 않고 어쩌다 신음으로라도 발설하지 않도록 돌처럼 굳힌 마음 바닥에 새기고 또 새겨야 한다.", "그는 내게 \"눈을 떠보면 모두 저만치 앞으로 가 있는 것처럼 보인다\"라고 했다. 이 기억이 괴로운 건 자기 혼자고, 자기 혼자만 여기에 멈춰 있고, 다들 떠난 것 같다는 그의 말은 아마도 사실일 것이다. 누구에게 어떤 일이 일어나도 사실은 그렇게 된다. 기회가 닿을 때마다 애써 상대의 입장으로 돌아가보려고 노력하지 않으면 우리의 거리는 계속 멀어질 수밖에 없다.", "앨리스 앱이 개발 의도대로 좋은 방향으로만 사용되어 별 문제 없이 넘어간다고 해도, 나는 그다음에 올 시도와 이보다 더 나쁜 버전의 자본을 생각해보게 된다. 그리고 그렇게 피해자 수가 많을수록, 피해 규모가 커질수록 더 많은 돈을 얻게 되는 시장의 굴레 자체를 으스러뜨리고 싶어진다. 그래서 불법촬영물 유통 시장 규제 및 공적 피해복구 시스템 개발이 중요한 것이다.", "나와 함께 마리의 틱톡 영상을 보면서 틱톡 특유의 분위기를 비로소 견딜 수 있게 된 친구 안담은 다음과 같이 말했다. \"대놓고 즐거워하는 분위기가 있잖아. 인스타그램에서는 내가 보여주고 싶은 걸 세련되게 숨기는 게 미덕인 데 반해서 틱톡은 그래, 내가 보여주겠어. 이런 나를! 이러는 분위기가 허용되고 장려되는 차이가 느껴져.\"", "드라마 촬영장에서 쓰러진 경주마, 인간이 만든 유리벽에 부딪혀 죽은 새, 인간이 버리고 간 그물에 걸린 바다 생물, 인간이 오염시킨 물을 마시고 죽은 물살이, 고기로 가공되기 전 죽음을 앞두고 피눈물을 흘리는 소, 태어나자마자 기계에 갈려 다져지는 수평아리들, 도살장으로 향하는 트럭에 담겨 동물권 활동가들이 주는 물과 감자를 허겁지겁 받아먹는 돼지가 인간을 본다. 밥을 먹일 수도 밥으로 먹을 수도 있는 것, 옷을 입힐 수도 옷으로 입을 수도 있는 것, 쓰다듬을 수도 죽일 수도 있는 것들의 눈이 인간 말고는 만날 수 없는 장소까지 따라 들어와 나를 보고 있다. 동물이 인간을 본다. 신이 인간을 보듯이. 너무 많이 겹쳐서 누가 누구인지 모르겠는 얼굴이 투명한 입이 천천히 움직인다. 우리 중 누구도 천국에 갈 수 없다. 이제 어떻게 살고 어떻게 죽을 것인가.", "\"이 사람 타임라인 보니까 정신병 있는 사람 같아요. 신경 쓰지 말아요.\" 나는 이 말을 읽고 정말 크게 상심했다. 그러면 안 된다. 신경 쓰지 않으면 안 된다. 내 글이 눈에 띈 이상 신경이 쓰여야만 한다. 내가 정신병자라는 이유로 내 글을 신경 쓰지 않게 되면 안 되는데. 어떡하지? 내가 말하면 좋은 말로 할 때 들어라. 더 좋은 말로 하기 전에. 더 쉽게 더 간명하게 쓸 테니 읽어라. 뻑뻑한 구간엔 기름기 있는 농담을 칠해서 꿀떡꿀떡 넘어가도록 해볼 테니 먹어라. 그래도 어렵다면 죽으로 만들어 흘려주고 씹을 필요 없게 떠먹여주겠다. 끝내 돌아선다 해도 가랑비로 내려 옷깃을 적시고 말 테니까. 집에 가는 길에 그 여자의 이상한 소리가 자꾸 생각나도록.", "가만 생각해보면 다 내 잘못 그러니까 가만 생각하면 안 된다. 그만 생각해야 한다. 표어로 만들어 어디 벽에 붙여놓기라도 해야 한다.", "이 순간에도, 지금 이 순간에도 그래도 아직 살아있어서 다행이다. 우는 모습도 봐줄 만해서, 문자를 수족처럼 부릴 수 있어서, 친구들을 만나러 갈 수 있어서 다행이다. 다시 하면 되지. 뭐든 다시 하면 돼. 자고 일어나자. 다시 할 수 없는 시간이 올 때까지 포기하지 말자. 내일 저녁엔 소면 삶아서 열무 겉절이랑 비벼 먹어야지. 참기름 넣어서. 모두 제 이름을 가지고 있다는 게 언제나 놀라웠다.", "하고 싶었던 것은 작은 사각형 안에서 무언가의 자리를 알맞게 잡아주는 일이었는데 그 중심을 바로 찾지 못하고 멤도느라 그것이 그림이었다가, 설계도였다가, 웹 페이지였다가 비로소 사진이 된 것이라는 것을.", "사진은 기본적으로 무언가를 끊임없이 보게 만들고, 찍고자 하는 사람을 움직이게 만드는 힘이 있다.", "나에게 좋은 창작물의 기준은 노래 부르고 싶어지는 노래, 글 쓰고 싶어지는 글, 그림 그리고 싶어지는 그림 같은 것이다. 자연스럽게 그러한 마음들이 불러 일으켜지는 누군가의 결과물들을 좋아한다 나는 역시 작은 세계를 만들기를 좋아하는 사람이 맞다. 압도하는 무언가보다는 가능하다면 \"나도 뭔가 해보고 싶다\"라는 마음이 순환되는 창작을 하고 싶다.", "단독자로 힘을 내뿜는 사진보다는 이야기로서 덧붙여지거나 조력하는 사진들을 꾸준히 찍고 싶다. 글과 사진이 서로를 밀어주거나 받쳐주는 모양을 보면 근사하다고 느낀다.", "고된 일이다. 업무도 하고, 확성기도 들어야 한다. 내용물도 중요하지만 포장도 못지않게 중요하고, 전달도 잘 해내야 한다. 그래도 하다 보면 예상에 들어 있지 않던 부록 같은 성취가 있다. 혼자 소리치는 것 같아도 가끔 울려 퍼져 나가던 소리가 어딘가에 부딪혀 메아리로 돌아오기 때문이다."]}, {"title": "단 한 사람", "author": "최진영", "genre": "소설", "publisher": "한겨례출판", "passages": ["다음 해 봄. 두 나무는 정지했다. 죽음을 흉내 내는 방법으로 죽음의 눈에 띄지 않으려는 듯. 짙푸르고 무성한 잎을, 생명을 뽐내는 꽃을, 삶을 퍼트리는 열매를 단 한 번도 가져보지 못한 나무처럼, 태풍이 구겨버릴 삶은 거기 없는 것처럼, 그들은 죽은 듯이 살기로 했다. 더는 자라지 않고 그대로 멈추려고 했다.", "수수께끼처럼 남은 그루터기. 그와 같은 죽음은 처음이었다. 그처럼 강제적인 죽음은. 세월에 순응해 쓰러지거나 비바람에 뿌리째 뽑히거나 속부터 썩어 마침내 부러지는 나무는 숱했다. 쓰러지고 뽑힌 뒤에도 나무는 그 자리에서 숲이 되었다. 그루터기만 남기고 줄기는 통째로 사라져버리는 기괴한 죽음은 300년이 몇 번씩 거듭되는 동안 단 한 번도 없었다. 숲에서 보고 들은 죽음과 완전히 달랐다. 그러므로 그것은 죽음이 아니었다. 이별 또한 아니었다. 훼손이었다. 파괴였다. 폭발이자 비극이었다.", "쌍둥이가 혼자 힘으로 앉을 수 있게 되자 금화는 병원 놀이를 시작했다. 금화는 의사, 쌍둥이는 환자. 쌍둥이가 걸음마를 떼자 금화는 술래잡기를 시작했다. 금화는 도망가고 쌍둥이는 쫓아갔다. 쌍둥이가 말을 하기 시작하자 금화는 학교 놀이를 시작했다. 금화는 선생님, 쌍둥이는 학생. 금화는 쌍둥이에게 마음껏 숙제를 내고 야단을 치고 벌을 세웠다. 쌍둥이가 아무리 뛰어도 지치지 않는 나이가 되었을 때 금화는 대장놀이를 생각해 냈다. 이제부터 언니는 대장이고 너희는 부하야. 부하는 대장의 말을 무조건 따르는 거야. 예전과 달리 쌍둥이는 반발했다. 가위바위보를 해서 이기는 사람이 대장을 해야 한다고 주장했다. 금화는 놀라서 대꾸했다. 내가 언니니까 당연히 대장이지. 쌍둥이는 번갈아 가며 말했다. 그럼 우리는 언니랑 안 놀아. 쌍둥이가 금을 긋자 금화는 갑자기 외로워졌다. 외롭다는 감정은 무서웠다. 무서워서 금화는 목수에게 화를 냈다. 야, 너는 남자니까 우리를 누나라고 불러야지! 금화는 '우리'라는 말을 강조하며 목화를 자기 쪽으로 끌어당겼다. 일화도 월화도 금화도 언제나 자기들을 언니라고 칭했다. 목수는 그들을 언니라고 불렀으며 누구도 그것을 문제 삼은 적 없었다. 목수가 혼란에 빠져 울먹이자 목화는 목수를 끌어안았다. 금화는 학습지에서 풀던 '어울리는 단어 잇기' 문제를 떠올렸다. 신발을-신다. 옷을-입다. 모자를-쓰다. 밥을-먹다. 물을-마시다. 금화는 어울리는 가족들을 이어보았다. 미수-복일. 일화-월화. 목화-목수. 금화와 어울리는 이름은 없었다. 금화는 쌍둥이를 떼어놓으려는 시도를 포기하고 주저앉아 울었다. 그러자 쌍둥이는 저절로 떨어졌고 금화를 달래려고 번갈아 가며 말했다. 울지 마, 언니. 미안해, 언니. 우리가 부하 할게. 언니가 대장 해. 금화는 더욱 서럽게 울었다. 혼자인 대장은 싫었다. 함께하는 부하가 좋았다. 금화는 누구하고든 이어지길 원했다.", "목수도 목화도 그 누구도 그날의 일을 온전히 그대로 기억할 수 없었다. 사실 아닌 것이, 감정이, 착각이 섞였다. 그러므로 신뢰할 수 없었다. 그날의 사고와 금화의 실종은 겪었지만 이해할 수 없는 일, 목격했지만 설명할 수 없는 일, 기억하지만 가능하지 않은 일, 일어났지만 일어날 수 없는 일이었다.", "이건 거부할 일도 아니고 원망할 일도 아니야. 언젠가는 네가 기적 속에 있다는 걸 알게 될 거다. 네 자식을 그렇게 구한다고 생각해 봐. 그때도 오직 한 사람만 구할 수 있다고 불행해할까. 미수가 해보지 않은 생각은 아니었다. 동시에 미수는 다른 생각도 했다. 만약 내 자식이 대신 다른 사람을 구해야 한다면? 신이 그것을 지시한다면? 그것까지 기적이라고 말할 수 있을까?", "처음에는 그저 듣던 목수가 어느 날부터 목화의 말을 기록하기 시작했다. 기록이 중요하다고 목수는 말했다. 경험이 쌓이면 어떤 패턴을 찾을지도 몰라. 패턴을 알면 그 다음을 생각해 볼 수 있을거야. 때로 목화는 \"많이 죽었어\"라는 말 외에는 꺼내지 못했다. 그럴 때 목수는 \"한 명을 살렸다\"라고 기록했다.", "중개하면서 가장 많이 듣는 말이 뭔지 알아? 목수는 짐작하여 대답했다. 글쎄, 살려달라는 말? 목화는 천천히 고개를 저으며 대답했다. 사랑한다는 말. 그날 목수는 그 말을 기록했다.", "조언은 큰 도움이 되지 않았다. 삶이 이렇다 저렇다 말을 들어도 자기 삶을 살아내는 사람은 목화뿐이었다. 살아 봐야 알 수 있었다. 살아본 뒤 깨달은 진실이 부디 엄마와 같은 내용은 아니기를 목화는 바랐다.", "학비와 생활비를 온전히 혼자 감당했으므로 정원은 빚을 질 수 밖에 없었다. 빚을 지면서까지 다닌 대학이었으므로 반드시 좋은 직장에 취직해야 한다고 생각했다. 고생한 보람. 정원을 그것을 구하고자 했다.", "꿈속에서 금화는 목수에게 말했다. 영원한 건 오늘뿐이야. 세상은 언제나 지금으로 가득해. 목수야, 언젠가 나를 위해 작은 배를 만들어 바다에 띄워줄래? 목수는 그 말을 목화에게 전할 수 없었다. 마치 금화의 작별 인사 같았으니까. 하지만 금화는 \"언젠가\"라고 했다. 쌍둥이에게 시간을 맡겼다. 목수는 더 기다릴 수 있었다. 목화도 마찬가지일 것이다. 언젠가는 자연스레 당도할 것이다. 더욱 맑게 울 수 있을 때. 더는 누구도 탓하지 않을 수 있을 때. 받아들일 수 있을 때.", "신목화에게 '왜 나인가'란 질문은 중요하지 않았다. 태어나고 싶어서 태어난 게 아닌 것처럼 이미 주어진 운명이었다. 신목화에게 중요한 것은 따로 있었다. 내 운명에 내 몫이 있음을, 내 의지가 개입할 수 있음을, 내 삶의 주인은 나임을 증명하는 것.", "날카로운 칼을 휘두르듯, 싸우듯, 코너에 몰려 더는 후퇴할 곳이 없는 사람처럼 냉소와 증오를 쏟아내는 미수의 표정을 바라보다 목화는 찾았다. 장미수의 말에 상처받는 이유를. 미수는 삶을 경멸했다. 자기 삶을 저주하다가 끝내 자기가 구한 사람들의 삶까지 비웃었다. 죽음을 너무 많이 본 미수는 결국 그렇게 되어버렸다. 살려는 의지를, 자기도 모르는 사이, 구걸처럼 여겼다. 사람을 살릴 때마다 미수는 금화를 생각했다. 목화가 루나를 구했다는 말을 듣고도 금화를 생각했다. 장미수에게 자식은 다섯 명. 한편으로는 단 한 명. 단 한 명뿐이었으므로, 살아 있는 사람은 고통스러워야 했다. 자기와 다를 바 없는 운명으로 살아가는 목화는 불행할 수밖에 없었다. 목화는 그 덫에 빠지고 싶지 않았다. 엄마처럼 자기 삶을 저주하며 살고 싶지 않았다.", "일화는 정말 열심히 살았다. 그런데도 자꾸만 어긋났다. 예측 불가능하고 피할 수 없는 거대한 재난이 닥쳐오는 것만 같았다. 삶이라는 폭풍. 내일이라는 폭우. 타인이라는 지진. 잠을 자지 못하면 일을 할 수 없었다. 잠을 자도 일을 할 수 없었다. 일화 역시 약을 한움큼 씹어 먹고 오랫동안 잠든 적이 있다. 아무리 둘러봐도 그 방법뿐이었다. 쉬고 싶었다. 피하고 싶었다. 죽었다가 깨어나고 싶었다.", "목화는 미수가 갖지 않은 의문을 가졌고 답을 구하려고 애썼다. 주어지는 일을 꾸역꾸역 해내는 것에서 나아가 자기가 하는 일의 의미를 찾으려고 했다. 이 일을 왜 계속해야 하는가에 자기만의 이유를 확보하려는 시도. 미수가 증오하거나 경멸하면서 버텼던 시간을 목화는 다른 방법으로 통과하고 있었다. 그저 나이 들어 일이 줄어들기를 기다리는 것보다는 나은 방법일까? 미수는 궁금했다. 목화가 어디까지 나아가고 무엇을 취할지. 그것을 위해서라면 불법이든 범죄든 남에게 비난받을 짓이든 무엇이든 할 수 있었다. 마침내 목화가 자유를 얻는다면 미수는 모두 용서하고 받아들일 작정이었다. 자기 운명을 비롯해서 금화의 운명까지.", "살아난 사람이 어떻게 살든 여전히 살아 있음을 확인하는 과정은 목화를 조금씩 다른 사람으로 만들었다. 그들이 거기 존재했기에 목화의 나갈 길은 조금씩 이어졌다. 지름길은 아니었다. 확인하지 않았다면 더 좋았을 삶도 있었다. 그럴 때 길은 굽었다. 가로막혔다. 미로처럼 맴돌았다. 그렇더라도 어쨌든 나아가는 길이었다. 목화는 멈추지 않았다. 단 한 명을 살리는 일을 거부하지 않았다. 할 수 있는 일을 했다. 왜냐하면 누군가에게는 목화 또한 죽음이 덜 억울할 사람, 누군가를 위해서 대신 죽어야 할 사람, 죽어도 상관없는 사람으로 보일 테니까. 목화는 타인의 삶과 죽음에 판단을 멈추었다. 그리고 중개 중에 이전에는 하지 않는 것을 했다. 마음을 다해 명복과 축복을 전하는 일. 죽어가는 사람과 살아난 사람의 미래를 기원하는 일. 그것은 나무의 일이 아니었다. 사람으로서 목화가 하는 일이었다. 나무의 지시가 아니었다. 목화의 자발적인 마음이었다. 245 (작가의 말) 10여 년간 붙들고 지낸 여러 질문이 있습니다. 반복적으로 쓴 문장과 단어가 있습니다. 소설을 쓰면서 답을 찾고 싶었습니다. 답을 찾지 못했습니다. 이제 겨우 질문을 이해했을 뿐입니다. 내가 계속 묻던 것은 알고 싶지 않은 것이었어요. 모른 채 살고 싶은 것. 답을 알게 될까 두렵습니다. 풀지 못한 문제로 남겨두고 다른 질문으로 나아가고 싶습니다. 다른 질문. 그것이 가능할까요. 가까스로 사람에 불과한 내가. 글을 쓸수록 강렬하게 인지합니다. 한 번뿐인 삶, 다시없을 오늘을. 소설의 막바지에 이르렀을 때는 여름이 시작되고 있었어요. 파란 하늘에서 느닷없이 쏟아지는 소나기. 언젠가 사라져버릴 당신과 나를 영원히 사랑하기 위해 이 소설을 썼습니다."]}, {"title": "대온실 수리 보고서", "author": "김금희", "genre": "소설", "publisher": "창비", "passages": ["돌아보면 항상 어떤 장소를 지워버림으로써 삶을 견뎌왔다는 생각이 들었다. 잊어야겠다 싶은 장소들은 아예 발길을 끊어서 최대한 망각할 수 있게 노력해왔지만 이 일을 맡으면 그곳에 대해 생각하고 더 알게 될 것이었다. 거기에는 일년 남짓의 내 임시 일자리가 있었고 600년 전에 건축된 고궁이 있었고 잊지 않으면 살 수가 없겠구나 싶어 망각을 결심한 낙원하숙이 있었다. ​", "\"왜 안 하려고 하는데요?\" 산아는 태블릿 피시에서 눈을 떼지 않고 물었다. \"모르겠어.\" \"그럼 하면 되잖아.\" \"모르겠으면 하면 되는 건가?\" \"나는 모르겠으면 그냥 하거든. 아까 인사한 선생님인 것 같은데 또 해야 하나 말아야 하나 싶으면 그냥 해. 자기 전에 양치를 했나 안 했나 헷갈릴 때도 그냥 하고.\" \"그럼 나도 그냥 해야겠네.\" \"그래, 해요. 이모는 돈에 너무 관심이 없어. 이모랑 우리 엄마가 반반 섞였어야 했는데.\" ​", "\"이달에 가는데 니는 이달에 말했지. 남겨지는 사람에 대한 예의가 없었다. 매정하기가 쏜물 같은 년이다.\" 우리는 주먹다짐만 하지 않았지 그렇게 서로의 마음을 녹아웃시키고는 각자 집으로 돌아갔다. ​", "그런 사람을 무작정 만나러 가라니 나는 입맛을 잃을 것 같은 기분이었다. 하지만 그래 봤자 불친절하기밖에 더하겠어, 하는 오기도 생겨났다. 사는 게 친절을 전제로 한다고 생각하면 불친절이 불이익이 되지만 친절 없음이 기본값이라고 여기면 불친절은 그냥 이득도 손실도 아닌 '0'으로 수렴된다. ​", "아무도 누구도 관심 없다, 나에게, 라고 더 정확히 되뇌면 그 차가운 말에 마음까지 얼어붙을 듯하면서도 곧 그것에 지지 않겠다는 미약한 저항감이 들곤 했다. 음울함의 풀장으로 뛰어드는 건 어쩌면 어떻게든 힘을 내어 수면 밖으로 나오고 싶어서일지도 몰랐다. ​", "한탄하는 딩 아주머니 얼굴을 할머니는 별말 없이 멀거니 바라보았다. 마치 그렇게 보는 것만으로도 마음을 돌릴 수 있다는 듯이. 그때 나는 노인들의 눈에는 아주 진득한 감정이 들어 있다고 느꼈다. 단일하고 명징한 진심 같은 것. \"형님도, 친손네도 아닌데 공 들이지 말아요. 기런다고 그 집 아바이도 글코 형님 은공을 알 애가 아이에요.\" 나는 리사가 친손녀가 아니라는 말을 듣고는 놀랐다. \"그게 아깝나?\" \"아이, 아깝지. 늙으면 돈이 있어야지 더 늙어서 어디케요?\" \"그게 무섭나?\" 그때의 할머니는 어떤 사람이었을까. 아깝지 않고 무섭지도 않은 할머니는. 어떤 앞날이 보였기에 아깝지 않고 무섭지 않았을까. ​", "\"사람을 믿는 게 잘못은 아니야. 네 말대로 그렇게 혼자라면 믿어야 살 수 있으셨겠지. 어떤 사람들은 그래서 누군가를 믿기도 해.\" ​", "\"너무 마음 아파하지는 말자.\" 내가 산아에게 말했다. \"너무 마음이 아프면 외면하고 싶어지거든. 아까 우리도 말했지? 너무를 조심하자고.\" ​", "장과장은 역시 뭐랄까, 일부러 갈등 상황을 만들어 자기 통제력을 확인해야 하는 사람 같았다. 살얼음처럼 냉랭하게 구는 태도도 자신을 위한 포즈처럼 느껴졌다. 하지만 공문의 문단 위치나 띄어쓰기, 공사장 안전모자 같은 규칙과 명령들이 만들어주는 영향력만큼 허망한 게 있을까. 그런 식의 만족감이란 겨울의 빈 새둥지처럼 허망하고 쓸쓸하지 않나. 사람들에게는, 진심을 주지 않음으로써 누군가를 결국 무력화하는 힘이 있는데 어떤 부류들은 그런 진실에는 무관심하곤 했다. ​", "소목이 영두씨는 자기 세계가 분명한 사람이라고 그랬거든. 시간이든 생각이든 한번 하고 버리는 게 아니라 남겨두었다가 거기에 다시 시간과 생각을 덧대 뭔가 큰 걸 만들어가는 사람 같다고. ​", "동네 어귀에서 트럭 소리가 나면 아빠가 오나 했다가 맞아, 아빠는 죽었지, 하고 되짚기도 했다. 성당에 다니면서도 그 표현은 하늘나라에 갔지, 라든가 천국에 있지,라고 나오지 않았다. 죽었지, 라고 마음속으로 말했고 그게 더 진실에 가까운 듯 느껴졌다. 나처럼 신심이 모자란 신자에게 아빠의 죽음은 그냥 손쓸 수 없는 종료로만 남아버렸기 때문이다. ​", "아이 때는 다리가 있으나 없으나 어디를 갈 수 없는 건 매한가지다. 어른이라는 벽이 둘러싸고 있으니까. 우리 곁에 균열이 나지 않은 어른은 없다. 그러니 불안하지 않은 아이도 없다. 지금 목격하는 저 삶의 풍랑이 자신의 것이 될까 걱정했고 그러면서도 결국 자기를 둘어싼 어른들이 세파에 휩쓸려 사라질까봐 두려웠다. 마구 달려서 자기 마음에서 눈 돌리지 않으면 견딜 수 없는 순간이 아닐까. 나는 아마 산아도 그래서 자전거를 타고 달려오지 않았을까 짐작했다. ​", "\"사람들은 어쩐지 자주 보는 건 결국 싫어해. 마음이 닳아버리나봐.\" \"건전지예요? 닳게?\" \"많이 쓰면 닳지, 닳아서 아예 움직이지 않기도 하는걸.\" ​", "\"우리가 사실 각자 자기 일 하는 것 같아도 옆 사람 힘 빌려서 하는 거거든요. 옆에서 에너지 안 내주면 영 기계적이 되고 그러잖아요.\" ​", "할머니는 내게 시선을 던졌다. 그 눈길을 받자 나는 내가 그토록 원하지 않던 용기가 나는 것을 느꼈다. 한번 싸워보고 싶은 용기. 그렇게 해서 억울함을 바로잡고 여기 남아서 내가 그토록 원했던 미래를 포기하지 않겠다는 의지와 욕심. 나는 미래가 욕심나는 것이 두려웠다
